# cargo-fuzz smoke CI — ADR-021 Gate A3 (M-654), WS8 durability.
#
# Self-hosted Podman fleet. ADVISORY — does not gate merges. Confirms the three fuzz targets
# build and run without crashing for a bounded time under AddressSanitizer. A crash is a real
# bug (G2/VR-5); the artifact is uploaded for local repro.
#
# B1-01 note: `uses:` pins use mutable major tags (not 40-char SHAs). Dependabot surfaces updates.
name: fuzz smoke (advisory)

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Max fuzz time per target in seconds (default: 60)"
        type: number
        default: 60

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: [self-hosted, linux, x64, podman]
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_l1_parse
          - fuzz_m210_checker
          - fuzz_core_value_deser
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build fuzz target
        working-directory: fuzz
        run: cargo +nightly fuzz build ${{ matrix.target }}

      - name: Run fuzz smoke (${{ matrix.target }})
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ inputs.max_total_time || 60 }}
        # A non-zero exit means the fuzzer found a crash — that is a real bug (G2).
        # The artifact is uploaded below for local reproduction.

      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
