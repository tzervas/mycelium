# Local-parity checks, run on demand only.
#
# POLICY (see CLAUDE.md): no automatic remote CI. This workflow triggers ONLY via manual
# dispatch (no push / pull_request auto-triggers) to avoid surprise Actions cost, and it is
# ADVISORY — the check step is non-blocking so it informs without gating merges. It runs the
# exact same suite as local (`just ci` → scripts/checks/*), so results match what you saw
# before you pushed.
name: checks (manual, advisory)

# B1-01 (target posture): the `uses:` actions below are pinned to mutable major tags
# (@v4, @v5, …), not 40-char commit SHAs. Full-SHA pinning is the intended hardening target;
# the SHAs were not resolvable in the offline authoring environment, so Dependabot
# (.github/dependabot.yml, `github-actions` ecosystem) is configured to surface action updates
# and, once SHA-pinned, to keep those pins current. Resolve each `uses:` to its SHA when network
# access is available.

on:
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the run if checks fail (default: advisory / non-blocking)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  checks:
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up uv (drives the experiments/ Python 3.13 tests — M-092)
        uses: astral-sh/setup-uv@v7

      - name: Set up Rust (pinned to MSRV via rust-toolchain.toml — M-091)
        run: rustup show

      - name: Set up Haskell (GHC + cabal) for proofs — M-001
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.16.1.0"

      - name: Install z3 (LiquidHaskell proofs need it on PATH)
        # B1-03: z3 is intentionally unpinned. This is an advisory, manual-dispatch-only job and
        # z3 is a distro-signed apt package (Ubuntu archive, GPG-verified), so the supply-chain
        # risk is low; pinning a distro version would churn on every runner-image bump.
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Cache cabal store + LH build (proofs are a cold-build pole)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            proofs/lh-bundle/dist-newstyle
          key: lh-${{ runner.os }}-ghc9.8.2-${{ hashFiles('proofs/lh-bundle/*.cabal', 'proofs/lh-bundle/cabal.project') }}
          restore-keys: lh-${{ runner.os }}-ghc9.8.2-

      - name: Install check tools
        run: bash scripts/install-tools.sh

      - name: Run checks (advisory unless strict=true)
        id: run
        continue-on-error: ${{ !inputs.strict }}
        env:
          # Supply-chain gate is non-skip in the gate environment: a missing cargo-deny/cargo-audit
          # FAILS, not skips (G2 — a skip-pass is not a closed gate). The "Install check tools" step
          # above provisions them; this var makes deny.sh strict even if CI= were ever unset.
          MYCELIUM_REQUIRE_SUPPLY_CHAIN: "1"
        run: just ci

      - name: Python coverage + Codecov upload (advisory — M-092)
        if: always()
        continue-on-error: true
        run: |
          ( cd experiments && uv run --frozen pytest --cov=mycelium_experiments --cov-report=xml:coverage.xml )
      - name: Upload coverage to Codecov (advisory)
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: experiments/coverage.xml
          flags: experiments
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "success" ]; then
            echo "✅ All checks passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Checks reported findings (advisory). See the **Run checks** step log." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Reproduce locally: \`just setup && just check\`" >> "$GITHUB_STEP_SUMMARY"
          fi
