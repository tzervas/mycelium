# Local-parity checks on the self-hosted Podman fleet.
#
# POLICY: runs on push/PR to the persistent trunks and on workflow_dispatch. Jobs use
# `runs-on: [self-hosted, linux, x64, podman]` (not GitHub-hosted). Default posture is still
# ADVISORY — continue-on-error unless workflow_dispatch sets strict=true — so remote CI informs
# without gating merges. Same suite as local (`just ci` → scripts/checks/*).
name: checks (advisory)

# B1-01 (target posture): the `uses:` actions below are pinned to mutable major tags
# (@v4, @v5, …), not 40-char commit SHAs. Full-SHA pinning is the intended hardening target;
# the SHAs were not resolvable in the offline authoring environment, so Dependabot
# (.github/dependabot.yml, `github-actions` ecosystem) is configured to surface action updates
# and, once SHA-pinned, to keep those pins current. Resolve each `uses:` to its SHA when network
# access is available.

on:
  push:
    branches: [main, integration, dev]
  pull_request:
    branches: [main, integration, dev]
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the run if checks fail (default: advisory / non-blocking)"
        type: boolean
        default: false
      with_proofs:
        description: "Install GHC/cabal/z3 for LiquidHaskell proofs (default off — desktop-held; cold install hangs self-hosted)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  checks:
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up uv (drives the experiments/ Python 3.13 tests — M-092)
        uses: astral-sh/setup-uv@v7

      # Self-hosted Podman fleet does not ship rustup on PATH by default (observed 2026-07-16:
      # every checks run failed at `rustup show` with exit 127). Mirror fuzz.yml: install via
      # dtolnay/rust-toolchain so cargo/rustc/rustfmt/clippy land on PATH before `just ci`.
      # Pin matches rust-toolchain.toml / ADR-041 MSRV — do not bump without an ADR.
      - name: Set up Rust (pinned to MSRV via rust-toolchain.toml — M-091)
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: rustfmt, clippy

      # Proof toolchain is desktop-held (CLAUDE.md / DN-20): `just ci` skip-graceful without GHC/z3.
      # Default OFF on push/PR — observed 2026-07-16: haskell-actions/setup hung the self-hosted
      # Podman job for 10+ min after Rust was fixed, blocking the actual checks. Opt in via
      # workflow_dispatch `with_proofs=true` when deliberately exercising LH proofs remotely.
      - name: Set up Haskell (GHC + cabal) for proofs — M-001
        if: ${{ inputs.with_proofs == true }}
        continue-on-error: true
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.16.1.0"

      - name: Install z3 (LiquidHaskell proofs need it on PATH)
        if: ${{ inputs.with_proofs == true }}
        # B1-03: z3 is intentionally unpinned. Distro-signed apt package (Ubuntu archive).
        continue-on-error: true
        run: |
          set -euo pipefail
          if command -v z3 >/dev/null 2>&1; then
            z3 --version
            exit 0
          fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y z3
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y z3
          else
            echo "z3 not installed and no apt available — proofs will skip-graceful (G2)"
            exit 0
          fi

      - name: Cache cabal store + LH build (proofs are a cold-build pole)
        if: ${{ inputs.with_proofs == true }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            proofs/lh-bundle/dist-newstyle
          key: lh-${{ runner.os }}-ghc9.8.2-${{ hashFiles('proofs/lh-bundle/*.cabal', 'proofs/lh-bundle/cabal.project') }}
          restore-keys: lh-${{ runner.os }}-ghc9.8.2-

      - name: Install check tools
        run: bash scripts/install-tools.sh

      - name: Run checks (advisory unless strict=true)
        id: run
        continue-on-error: ${{ inputs.strict != true }}
        env:
          # Supply-chain gate is non-skip in the gate environment: a missing cargo-deny/cargo-audit
          # FAILS, not skips (G2 — a skip-pass is not a closed gate). The "Install check tools" step
          # above provisions them; this var makes deny.sh strict even if CI= were ever unset.
          MYCELIUM_REQUIRE_SUPPLY_CHAIN: "1"
        run: just ci

      - name: Python coverage + Codecov upload (advisory — M-092)
        if: always()
        continue-on-error: true
        run: |
          ( cd experiments && uv run --frozen pytest --cov=mycelium_experiments --cov-report=xml:coverage.xml )
      - name: Upload coverage to Codecov (advisory)
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: experiments/coverage.xml
          flags: experiments
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.run.outcome }}" = "success" ]; then
            echo "✅ All checks passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Checks reported findings (advisory). See the **Run checks** step log." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Reproduce locally: \`just setup && just check\`" >> "$GITHUB_STEP_SUMMARY"
          fi
