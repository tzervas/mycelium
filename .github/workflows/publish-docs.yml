# Publish the wiki (from docs/wiki/) and the full docsite — the themed myc-doc corpus site plus the
# agent code index and the rustdoc API docs — to GitHub Pages.
#
# Manual-dispatch only (workflow_dispatch) — Mycelium keeps CI advisory / on-demand by policy
# (see .github/workflows/checks.yml). Nothing here runs on push.
#
# Requires, in repo Settings:
#   - the **Wiki** feature enabled (for the wiki sync) and **Pages** set to "GitHub Actions"
#     (for the docsite deploy);
#   - **a repository secret `DOCS_PUBLISH_TOKEN`** (Settings -> Secrets and variables -> Actions) —
#     a fine-grained PAT with *Contents: write* (covers the wiki). This is preferred because the
#     default `GITHUB_TOKEN` cannot always push to the wiki under stricter org policies. The secret
#     is stored + masked by GitHub's Secrets feature and is never exposed in logs. If the secret is
#     absent the job falls back to the built-in `GITHUB_TOKEN` (also masked).
# (Pages deploy uses OIDC `id-token` + the workflow token; it needs no extra secret.)
name: Publish wiki & API docs

on:
  workflow_dispatch:
    inputs:
      publish_wiki:
        description: "Mirror docs/wiki/ to the GitHub wiki"
        type: boolean
        default: true
      publish_site:
        description: "Build + deploy the full docsite (themed corpus + agent index + rustdoc) to GitHub Pages"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish-wiki:
    if: ${{ inputs.publish_wiki }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # the wiki is part of the repository
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Mirror docs/wiki/ to the wiki repository
        env:
          # Prefer the repo-managed DOCS_PUBLISH_TOKEN secret (a PAT with Contents:write that can
          # push the wiki); fall back to the built-in token. Both come from GitHub's Secrets feature
          # and are masked in logs.
          GH_TOKEN: ${{ secrets.DOCS_PUBLISH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          url="https://github.com/${GITHUB_REPOSITORY}.wiki.git"
          # Inject the token via a masked HTTP auth header (the actions/checkout pattern) rather than
          # the remote URL, so it can never leak into the logs on a git failure.
          auth="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          git_wiki() { git -C "$tmp" -c http.extraheader="$auth" "$@"; }
          if ! git -c http.extraheader="$auth" clone "$url" "$tmp"; then
            echo "wiki repo not initialized yet — creating the first commit"
            git init -q "$tmp"
            git -C "$tmp" remote add origin "$url"
          fi
          # Sync: copy the source pages over (the wiki source of truth is docs/wiki/).
          cp docs/wiki/*.md "$tmp"/
          git -C "$tmp" add -A
          if git -C "$tmp" diff --cached --quiet; then
            echo "wiki already up to date"
            exit 0
          fi
          git -C "$tmp" \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -q -m "docs(wiki): sync from docs/wiki @ ${GITHUB_SHA::12}"
          # GitHub wikis default to the `master` branch; fall back to `main` if needed.
          git_wiki push origin HEAD:master || git_wiki push origin HEAD:main

  publish-site:
    if: ${{ inputs.publish_site }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build the docsite (themed corpus + agent index + rustdoc)
        run: |
          set -euo pipefail
          # rust-toolchain.toml pins the MSRV; rustup installs it on first invocation.
          # scripts/docsite.sh assembles target/docsite/ from three sources (corpus HTML via
          # myc-doc, the committed agent index, and rustdoc), skipping any section whose tool is
          # absent — the generated landing page reflects what actually built (never-silent, G2).
          bash scripts/docsite.sh
          # Guard: fail loudly if nothing was assembled, rather than deploying an empty site.
          test -f target/docsite/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/docsite
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
