# cargo-about configuration (M-… third-party attribution). Drives `just licenses` /
# `THIRD-PARTY-LICENSES.md` generation. Mirrors the permissive allow-list already enforced by
# `deny.toml` (cargo-deny) — this is the notice-preservation companion to that supply-chain gate,
# not a new policy: if a license isn't accepted here, `cargo deny check licenses` should already be
# failing on it first.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "MPL-2.0",
]

# First-party mycelium-* workspace members carry `publish = false` / no `license` field to clarify
# (they're covered by the repo-root `LICENSE`, MIT — ADR-022 §7); cargo-about's `private.ignore`
# excludes unpublished workspace members so this file stays scoped to genuine third-party crates.
[private]
ignore = true

