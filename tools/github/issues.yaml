  - id: M-732
    title: "M-732 — feat(spore): package manager — publish/resolve/registry"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-06-23) — mycelium-spore registry: publish/resolve over a local content-addressed store; spore_id (DAG identity, ADR-003) + artifact (integrity) both verified on publish and resolve; immutability, tamper, and missing-object are never-silent errors (G2); a SemVer range constraint is explicitly Unsupported (ADR-018 deferred, never mis-resolved). proptest hash-verification bound; spore publish/resolve CLI wired; clippy clean."
    epic: E16-1
    doc_refs: [corpus:DN-25, src:crates/mycelium-spore/src/lib.rs]
    body: |
      Extend `mycelium-spore` from its current role as the build artifact type to a
      full package-manager capability: `spore publish` (upload a content-addressed spore
      to a registry), `spore resolve` (resolve a name + version constraint to a specific
      artifact), and a registry query interface. Content-addressed identity (ADR-003)
      is preserved; fallibility is never-silent (`Result`/`Option` throughout, G2).

      User stories:
      - As a library/phylum author, I want `myc publish` to upload my spore to a registry,
        so that others can depend on it by name without manual file sharing.
      - As a downstream app developer, I want version resolution to be content-addressed
        and auditable, so that I can verify what I installed against what was published.

      Issues to resolve:
      - What is the registry backend (self-hosted, crates.io-compatible protocol, or a simpler file-based store)?
      - How are version constraints expressed in the phylum manifest (SemVer per ADR-018)?

      Definition of Done:
      - myc publish uploads a .spore artifact to a registry; the content hash is verified on upload and on fetch.
      - myc resolve finds and downloads a spore matching a name + version constraint; never-silent on resolution failure.
      - cargo clippy -D warnings clean; property test for hash verification; just check green.

  - id: M-733
    title: "M-733 — feat(toolchain): toolchain UX — one-command init/build/test/run + error-message quality"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-06-23) — new mycelium-cli crate; `myc init/build/check/test/run` with DN-22 structured Reports (error[code]: msg + location + help; no raw panic reaches the user). init/build/check work end-to-end on a scaffolded phylum; `test` runs the check verification and states a .myc unit-test runner is future work; `run` is honestly not-yet-wired (reports so, exit 70) — VR-5/G2. clippy clean; CLI smoke-tested."
    epic: E16-1
    doc_refs: [corpus:DN-25, corpus:DN-22]
    body: |
      Surface a polished one-command developer loop: `myc init` scaffolds a new phylum,
      `myc build` compiles it, `myc test` runs the test suite, `myc run` executes the
      entry point. Error messages meet the DN-22 structured-diagnostic quality bar:
      every error is actionable (a source location + a human-readable message + a
      suggested fix where possible); no opaque internal panics surface to the user.

      User stories:
      - As a language user, I want `myc init my-phylum` to create a working phylum
        skeleton in one command, so that I can start writing code immediately.
      - As a downstream app developer, I want `myc build` error messages to point to the
        exact source location and explain the problem, so that I can fix errors without
        reading compiler internals.

      Issues to resolve:
      - What is the minimum set of subcommands required at 1.0 vs deferred?
      - How is the error-message quality bar verified (test corpus? lint rule?)?

      Definition of Done:
      - myc init, myc build, myc test, myc run work end-to-end on the examples/ phyla.
      - Every user-visible error carries a source location and an actionable message (DN-22 bar); no raw Rust panics reach the user.
      - just check green.

  - id: M-734
    title: "M-734 — infra(toolchain): reproducible toolchain distribution — pinned, content-addressed install"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-06-23) — scripts/dist/ content-addressed pin/verify/install: byte-identical re-install, never-silent tamper/missing/added detection (`just dist-verify`); self-describing address blake3 (ADR-003) or sha256; STRICT (hard-fails on a missing hasher, never skips). Honest scope (VR-5): pinning the actual compiler binaries additionally needs a reproducible release build (deferred); the pin/verify/install mechanism is what landed. shellcheck clean."
    epic: E16-1
    doc_refs: [corpus:DN-25]
    body: |
      Produce a reproducible, content-addressed install path for the Mycelium toolchain:
      a pinned install script or manifest that downloads a specific, hash-verified
      toolchain artifact and verifies its integrity before installation. Re-running the
      install on the same pin produces a byte-identical result. This supports the
      ADR-021 durability bar and the full-language 1.0.0 release act (M-738).

      User stories:
      - As a maintainer, I want the toolchain install to be pinned and hash-verified,
        so that supply-chain attacks are detected and never silently accepted.
      - As a downstream app developer, I want to reproduce an exact toolchain environment
        from a lock file, so that my builds are stable across machines.

      Issues to resolve:
      - What is the install artifact format (binary, tarball, rustup-style toolchain)?
      - Is the hash-verification done on download or on first use?

      Definition of Done:
      - An install script (or manifest) pins the toolchain to a content-addressed artifact hash.
      - Re-running on the same pin produces byte-identical output; mismatch is a never-silent error.
      - just check green; the gate does not skip-gracefully on missing tools.

  - id: E17-1
    title: "E17-1 (epic) — Documentation, stability guarantees & 1.0.0 release"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:release, priority:P1, status:in-progress]
    landed_basis: "status:in-progress (2026-07-01, tag-readiness resync — corrects the 2026-06-23 text below) — 3 of 4 children done: M-735 (language reference + tutorial, docs/reference/, with a parser-verified conformance fixture), M-736 (generated stdlib API docs — lib/std wired into mycelium-doc + per-fn source-comment extraction, std.result covered, gaps flagged), M-737 (ADR-023 Draft->Proposed->Accepted). M-738 (the release act) is BLOCKED ONLY on the maintainer's own tag-cut act — its engineering deps are now closed: E13-1 is `status:done` (ADR-035-narrowed T4 bar — DN-66 stable-API freeze + M-714...M-718); E18-1's shared core-lib self-host slice (T9, ADR-022 §8 Q1) is met via that same E13-1 closure, and ADR-036 (2026-07-01) names E18-1's own remaining children (M-739...M-742) the non-tag-gating, within-1.0.0 comprehensive-dogfooding track (it gates the separate public-release milestone, not this tag) — so E18-1 staying `status:needs-design` on those children does NOT block M-738. ADR-022 enactment happens AT the M-738 act, not before — the 1.0.0 tag is still NOT cut (G2 / house rule #3), but only because the maintainer act has not run. Epic completes when M-738 fires."
    depends_on: [E13-1, E18-1]
    epic: E17
    doc_refs: [corpus:ADR-023, corpus:ADR-022, corpus:DN-25]
    body: |
      The terminal wave for the full-language Mycelium 1.0.0: make the language learnable
      (language reference + tutorial), generate per-module stdlib API docs, ratify the
      stability and API-compatibility guarantees (ADR-023), and cut the full-language
      1.0.0 release tag once E13-1 (self-hosting stdlib gate) and E18-1 (full-language
      readiness gate) are both done. The dual-version north star: the Rust kernel may
      reach 1.0.0 first (ADR-021 gate valid); the full-language 1.0.0 requires the stdlib
      and all libraries/phyla beyond the bare core to be written fully in Mycelium (.myc),
      stable, and fully usable.

      User stories:
      - As a language user, I want a language reference and tutorial that covers the full
        surface (keywords, types, effects, traits, generics, match, modules), so that I
        can learn Mycelium from the official documentation without reading compiler source.
      - As a library/phylum author, I want generated per-module stdlib API docs with every
        public symbol documented, so that I can understand the standard library without
        reading .myc source files.
      - As a downstream app developer, I want a documented, enforceable stability promise
        at 1.0.0 (API compatibility, deprecation policy, MIT license confirmed), so that
        I can build production software on Mycelium with confidence.
      - As a maintainer, I want the release act (ADR-022 Accepted -> Enacted + v1.0.0 tag)
        to be a gated, append-only step that only fires when every gate row is confirmed
        closed, so that 1.0.0 is never cut prematurely (G2 / house rule #3).
      - As a compiler engineer, I want the dual-version semver model (kernel version vs.
        full-language version) documented in ADR-023 and enacted at the tag, so that the
        two release lines are unambiguous in CHANGELOG and release notes.

      Issues to resolve:
      - What is the full-language 1.0.0 gate definition (ADR-022 criteria — the full-language analog of ADR-021)?
      - How is the language reference authored and maintained (Markdown, Typst, generated from corpus)?
      - What is the dual-version version carrier (a mycelium top-level crate, or release-manifest only)?

      Definition of Done:
      - M-735 done: language reference + tutorial complete, technically accurate, published.
      - M-736 done: per-module stdlib API docs generated; every public symbol documented; just docs green.
      - M-737 done: ADR-023 Draft -> Accepted; all §5 open questions resolved; MIT-only license gate confirmed.
      - M-738 done: all ADR-022 gate rows closed; ADR-021 + ADR-022 Accepted -> Enacted; cargo deny check licenses green; just check-full green; CHANGELOG [Unreleased] -> [1.0.0]; v1.0.0 tag cut.
      - Every guarantee tag honest (VR-5); no silent gate pass (G2).
      - E17-1 epic status updated; kickoff rel10.md Definition of Done fully checked.

      Children: M-735 (language reference + tutorial — user-facing docs for full usability), M-736 (stdlib API docs — generated, per-module), M-737 (stability & API-compatibility guarantees — ADR-023: what is stable at 1.0, deprecation policy, lang-vs-core semver enactment), M-738 (full-language 1.0.0 release act: verify ADR-022 Definition of Done is met, then move ADR-022 Accepted -> Enacted — append-only).

