  - id: M-1006
    title: "M-1006 — Phased whole-corpus rip-through ladder (expand E-B beyond the port surface)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:task, area:tooling, priority:P2, status:in-progress]
    epic: E33-1
    depends_on: [M-1003]
    doc_refs:
      - corpus:DN-34
      - corpus:DN-26
      - src:.claude/kickoffs/trx2.md
      - src:crates/mycelium-transpile/src/map.rs
      - src:crates/mycelium-transpile/src/emit.rs
    body: |
      Minted 2026-07-06 (maintainer decision, trx2 launch clarification -- upgrades the E-B
      breadth resolution from the orchestrator's `Declared` default to a decided two-stage
      plan). After the port-surface pass (M-1003) is refined: expand the rip-through to the
      REST of the Rust corpus of the Mycelium language codebase in CONTROLLED PHASES. Each
      phase: select a bounded target set -> transpile -> vet (M-1000 loop) -> patch drafts to
      close gaps -> fold the phase's lessons back into the transpiler (gap classes closed,
      emitter fixes, taxonomy refinements) -> record the phase manifest. Iterate until the
      transpiler is a highly polished solution. Phase target sets are minted per wave
      (mitigation #1 -- no pre-minting the whole ladder); phase boundaries are the maintainer's
      to confirm. Reconciliation guard: at Phase-II, this ladder's phase manifests become
      INPUTS to rwr's M-947..M-957 port-wave manifests -- coordinate via issues.yaml
      depends_on/body notes, never duplicate waves (the trx2 kickoff's FLAG-V2 note binds:
      compiler self-hosting stays boot10's lane).

      User stories:
      - As the maintainer, I want each rip-through phase to both port code and harden the
        transpiler, so that porting accelerates as the corpus is consumed and the tool converges
        to polished.

      Definition of Done:
      - Per phase: a recorded phase manifest (target set, before/after expressible_fraction +
        checked_fraction, drafts landed, transpiler fixes landed, lessons). Ladder: the
        remaining Mycelium Rust corpus covered by recorded phases; the transpiler's residual
        gap classes enumerated with counts and either closed or explicitly declared
        out-of-scope (G2 -- the stopping point is recorded, never silent).

      NOTE (2026-07-06, wave-1 close-out): the per-phase recipe is operationalized as skills so
      future sessions run light -- /transpile-vet (the instrument + its honesty rules) and
      /myc-drafts (corpus triage, lib/ graduation checklist, the 5-step ladder-phase recipe).
      Phase 1's input is the DN-34 SS8.9 812-gap ranked worklist.

      PHASE-1 LANDED (2026-07-06, status -> in-progress; DN-34 SS8.10, Empirical): ran the ladder's
      first phase over the same 17 wave-1 targets as two disjoint-file leaves (map.rs generic
      type-application; emit.rs string/float/array literal arms + sharpened MultiStmtBody
      diagnostics), octopus-merged and re-vetted. Union expressible 6.06% -> 6.19% (std-io read_all
      unblocked via nested Result[Vec[Binary{8}], IoError]), checked flat 3.69%, GenericBound 59 ->
      46. The M-1006-DoD residual enumeration is recorded (DN-34 SS8.10): the dominant remaining
      classes (type-coverage scalars, named-field structs/variants -- KEEP GAPPED, no field-projection
      surface; Import; bounded GenericBound; Rust built-in DeriveAttr) are language-surface design
      (E18-1), not transpiler defects -- the current-corpus transpiler-fixable surface is near
      exhausted (stopping point recorded, G2). Emission Declared; drafts stay in gen/myc-drafts/,
      never imported by lib/. Remaining ladder work (later phases): expand the target set beyond the
      port surface in controlled phases (per-phase minting, mitigation #1), each folding lessons back
      into the transpiler; reconcile with rwr's M-947..M-957 at Phase-II.

      PHASE-2 OPENED (2026-07-10, status stays in-progress; DN-34 SS8.19, Empirical): ran the ladder's
      first WHOLE-CORPUS profile (mycelium-transpile over crates/: 337 files, 0 parse failures, 5472
      items, 573 emitted) -- the Phase-2 mandate to expand beyond the 17-target port surface. Verify-first
      profiling of the opaque Other bucket (37.8% of all gaps) surfaced a taxonomy category error: 267
      bodyless `mod foo;` decls (file-linkage, not translatable surface -- nodule-per-file makes the module
      tree implicit; sibling file transpiles as its own nodule) and 58 crate-level inner attributes (`#![..]`,
      not syn::Items). Added two honest Category variants (ModuleDecl, InnerAttr); ModuleDecl is excluded
      from the expressible-fraction denominator exactly as TestItem is (recorded not dropped, G2; not counted
      against coverage). Inline `mod {..}` (dropped body) stays a counted Other gap (VR-5: only non-surface
      is excluded). Metric effect (never-silent): whole-corpus Other 2245 -> 1924; expressible 10.8% ->
      11.3%; on the committed 17-target manifest union expressible 13.4% -> 14.1% and checked_fraction 7.8%
      -> 8.2% with the numerator UNCHANGED (59 clean items) -- the whole move is the tighter denominator, no
      emission added/upgraded. Files: crates/mycelium-transpile/src/{gap,transpile}.rs + a taxonomy test
      module; gen/myc-drafts/ manifest regenerated. Phase-2 residual worklist (recorded, G2): Import (1085,
      18.3% -- the cross-nodule symbol-table prerequisite, the largest remaining automation lever, its own
      future wave), Impl (578), DeriveAttr (497, mostly language-surface), Struct (423); plus a path-qualified
      batch-output layout as the whole-corpus-completeness follow-on (a naive whole-crates run overwrites
      same-stem outputs -- never-silently but lossily).

      PHASE-2 FOLLOW-ON LANDED (2026-07-10, DN-34 SS8.20): the path-qualified batch-output layout is done --
      directory mode now mirrors the source tree under the out-dir (pure, unit-tested batch::output_rel_path),
      so the whole-crates/ run writes all 337 .myc files with zero collisions (was ~25 clobbered). Zero
      committed manifest churn (the 17 targets are flat single-crate src/ dirs, so mirrored path == bare
      stem). Emission-plumbing only; no metric/tag move. Remaining lever: Import cross-nodule resolution (its
      own scoped wave).

  - id: M-1007
    title: "semcore Stage-5 increment 2: checkty type algebra (has_var/type_head/subst_ty/param_subst)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:in-progress]
