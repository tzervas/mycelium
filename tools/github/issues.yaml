    body: |
      EPIC (kickoff trx2 E-C, launched 2026-07-06). Launch scope record: of the three candidate
      readings of "Mycelium doc ports", the orchestrator resolved interpretation (c) --
      auto-generated reference docs derived FROM the `.myc` sources (the docs/api-index/ analogue
      for lib/std/ + lib/compiler/) -- as the only reading satisfying the kickoff DoD
      ("deterministic + regenerable, drift-gated"); (b) a generator authored in Mycelium is noted
      as a possible follow-up dogfooding wave. Two reusable halves exist: mycelium-doc's
      apiref.rs already extracts `.myc` nodule headers + fn signatures (heuristic, M-736), and
      tools/docgen/code_index.py + scripts/checks/doc-index.sh define the committed-index +
      drift-gate pattern. Build the lib/ index from those halves. Honesty: the index is an
      `Empirical/Declared` heuristic; source is ground truth; flagged items never silently
      dropped (G2).

      User stories:
      - As an agent porting semcore, I want a grep-friendly index of every `.myc` nodule's
        symbols, so that I load targeted context instead of re-reading whole files.
      - As the maintainer, I want the lib/ index drift-gated like docs/api-index/, so that it
        cannot silently rot as the port grows.

      Definition of Done:
      - M-1004 + M-1005 done; docs/lib-index/ (INDEX.md + index.json) committed, deterministic,
        regenerable via a just recipe, drift-gated in just check; honestly labeled.

      DONE (2026-07-06): both children landed (see their DONE notes); index committed +
      drift-gated in just check; INDEX.md header carries the Empirical/Declared grading.
      Interpretation (b) -- a doc generator authored in Mycelium -- remains a candidate
