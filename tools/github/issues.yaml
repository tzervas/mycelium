  - id: E11-1
    title: "E11-1 (epic) — Surface-language completeness & grammar ratification"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P1, status:done]
    depends_on: [E7-1, E7-3]
    epic: E11
    landed_basis: "status:done (2026-06-29, s10 kickoff archived) — all five surface tasks landed: M-704 (dynamic HOF closures, three-way) + M-705 (operator syntax, prior) + M-706 (RFC-0030 grammar gap-closure: top-level impl_item/consume_expr/lambda_expr) + M-707 (RFC-0020 §10 carve-out enactment) + M-708 (surface stabilization, prior). The Mycelium surface language is feature-complete for real programs + a self-hosted stdlib. Never-silent residuals flagged + forward-tracked (NOT blocking E11-1): partial application is tuple-gated (RFC-0024 §4A.8 → maintainer tuple-type decision); or-patterns (R20-Q3) + list/for bidirectional inference (R20-Q5) deferred (RFC-0020 §9); the derive-site consumption model is underdetermined (DN-54). RFC-0020 stays Accepted (scoped), RFC-0024/DN-54/DN-57 Accepted + impl notes (Enacted steps reserved per house rule #3)."
    doc_refs:
      - corpus:RFC-0025
      - corpus:RFC-0030
      - corpus:RFC-0006
      - corpus:DN-25
    body: |
      Finish the Mycelium surface language so that real programs and a self-hosted stdlib are
      pleasant to write — ergonomic, complete, and backed by a ratified grammar. The surface
      language must be complete and stable before the self-hosting capstone (E18-1) can port
      the toolchain to Mycelium, and before downstream apps (E7-5 dogfooding / dfb) exercise
      it at scale. This epic is the surface-language arm of the full-language 1.0.0 path
      defined in DN-25 and ADR-022 (forthcoming).

      User stories:
      - As a language user writing a numeric algorithm, I want to write a * b + c rather than
        add(mul(a, b), c), so that my code reads like the mathematics it encodes.
      - As a stdlib author, I want closures and partial application so that I can write generic
        combinators without duplicating logic per operator or type.
      - As a tool author writing mycfmt or an editor syntax highlighter (DN-24), I want a
        committed EBNF reference grammar, so that formatting and highlighting rules can be derived
        mechanically.
      - As a compiler engineer, I want RFC-0006 Q3 and Q8 resolved with committed normative text,
        so that the surface has no pending open questions that could force breaking changes.
      - As a downstream app developer, I want a ratified, stable surface I can rely on not
        changing incompatibly, so that I can invest in tooling and training without surface churn.

      Issues to resolve:
      - Does the maintainer adopt the DN-23 hybrid (symbol sugar on top of word canonical) or
        stay words-only? (Binding decision in RFC-0025.)
      - What is the concrete spelling for RFC-0006 Q3 (implicit/explicit representation) and
        Q8 (unsafe-class constructs)? (Binding decisions in RFC-0030.)
      - Can dynamic HOF (closures, partial application) be implemented without adding a new L0
        kernel node? (KC-3 constraint; flag if not — do not add silently.)
      - Which RFC-0020 carve-outs (§4.2 polymorphic instantiation, §4.5 grow-derived traits)
        are ready to enact now vs. needing more design?

      Definition of Done:
      - RFC-0025 is Proposed or Accepted with a normative precedence table and desugaring map.
      - RFC-0030 is Proposed with a complete, updated mycelium.ebnf and conformance-corpus update.
      - RFC-0006 Q3 and Q8 are resolved with committed normative text.
      - RFC-0020 carved-out sections are enacted or explicitly re-deferred with forward refs.
      - Dynamic HOF residuals (RFC-0024 §5) are addressed or honestly flagged as future work.
      - just check is green on the integrated branch (all crates, all gates).
      - No surface form in the conformance corpus is silently refused (G2).

      Children: M-704 (full HOF — closures/partial application/dynamic fn-flow), M-705 (operator
      syntax / RFC-0025), M-706 (concrete surface grammar / RFC-0030 ratification), M-707
      (RFC-0020 L2 enactment), M-708 (surface stabilization).

  - id: M-704
    title: "M-704 — Full higher-order functions: closures, partial application, dynamic fn-flow"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [E7-3]
    epic: E11-1
    landed_basis: "status:done (core; one flagged residual) — RFC-0024 §5 dynamic-HOF residuals CLOSED via the §4A full Reynolds construction (hof kickoff, 2026-06-29): closures (env capture), closure-capturing-closure, dynamic fn-flow (match arms + data fields), named-fn-as-value, and a capturing `map` combinator all elaborate + run THREE-WAY (Empirical) — tests/closures.rs + differential/std_iter. KC-3 holds: NO new L0 node (closure = L1Value::Data tag-sum + generated `apply` Match dispatcher, whole-program emit at mono finish(); zero mycelium-core change). EXPLAIN via MonoSelections::closure_iter()/ClosureSpecialization. FLAGGED RESIDUAL (never-silent G2): multi-arg lambdas / partial application are tuple-gated (RFC-0024 §4A.8 — v0 has no tuple/product type); a multi-param lambda is an explicit checker refusal. Completing it needs a maintainer TUPLE-TYPE decision — forward ref RFC-0024 §4A.8. RFC-0024 stays Accepted with an append-only impl note (NOT Enacted — full HOF incl. partial-app not yet landed; VR-5). Verified post-merge: cargo test -p mycelium-l1 green (0 failed); fmt+clippy clean. Merge resolved a stale-base conflict (leaf lacked M-664; union-merged + Consume arms added to 3 new traversal helpers)."
    doc_refs:
      - corpus:RFC-0024
      - corpus:DN-25
      - src:crates/mycelium-l1/src/mono.rs
      - src:crates/mycelium-l1/tests/closures.rs
      - src:docs/spec/Surface-Stability-Declaration.md
    body: |
      DONE 2026-06-29 (hof kickoff; core complete, multi-arg/partial-app a flagged tuple-gated residual): RFC-0024 §5 dynamic-HOF residuals closed via §4A Reynolds defunctionalization. Closures/capture/closure-capturing-closure/dynamic-fn-flow (match+data-field)/named-fn-as-value + a capturing `map` run three-way (Empirical; tests/closures.rs). KC-3: no new L0 node (closure = L1Value::Data tag-sum + generated `apply` Match dispatcher; zero mycelium-core change). EXPLAIN-able (MonoSelections::closure_iter). RESIDUAL (flagged, never-silent): multi-arg/partial-application is tuple-gated (RFC-0024 §4A.8) — needs a maintainer tuple-type decision; a multi-param lambda is an explicit refusal, not a silent accept. RFC-0024 left Accepted + append-only impl note (NOT Enacted; partial-app outstanding). cargo test -p mycelium-l1 green; fmt+clippy clean.
      RESIDUALS DOCUMENTED (2026-06-23, M-708 wave): the RFC-0024 §5 dynamic-HOF residuals are
      catalogued in `docs/spec/Surface-Stability-Declaration.md` §3.2 — every dynamic case (closures
      capturing an environment; dynamic fn-flow out of a match arm / data field / fn return; partial
      application / multi-arg HOF; a still-generic function as a value) is a NEVER-SILENT `Residual`
      in `mono.rs` today (G2 holds). This issue remains OPEN for the actual implementation: full
      Reynolds defunctionalization (fn-tag sum + `apply` dispatch) is the eventual generalization,
      under the RFC-0024 §5 STOP-and-flag KC-3 guard — if any in-scope case cannot be made closed
      first-order at L1 without a new L0 node, that requires a new RFC (flag, never add silently). No
      implementation attempted this session (the dynamic leg is large + KC-3-risky; deferred per the
      surface-stabilization wave). — Original task:
      RFC-0024 (static defunctionalization) landed named top-level functions as first-class values,
      sufficient for std.result's map/and_then/fold. The explicit RFC-0024 §5 residuals — closures
      that capture an environment, dynamic fn-flow through match arms or data fields, partial
      application, and a still-generic function as a value — remain unimplemented. These are
      required for a fully expressive stdlib (std.collections iterators, std.math combinators) and
      for the self-hosting capstone (E18-1) to write the compiler's own passes in Mycelium.
      Full HOF is a prerequisite for the full-language 1.0.0 surface to be "pleasant to write."

      User stories:
      - As a stdlib author, I want to write closures (fn(x) => expr) and pass them to higher-order
        combinators, so that I can implement std.iter and std.collections without duplicating logic.
      - As a compiler engineer porting the L1 frontend to Mycelium (E18-1), I want partial
        application and dynamic fn-flow so that I can express the elaborator's recursive passes
        without a Rust-style trait-object workaround.

      Issues to resolve:
      - Can closures and dynamic fn-flow be implemented via Reynolds defunctionalization (fn-tag
        sum + apply dispatch) without adding a new L0 node? KC-3 is a hard constraint — flag
        immediately if a kernel node is needed.
      - Multi-argument arrows (A, B) -> C require a tuple type that the v0 surface defers. Is
        the tuple type a prerequisite for multi-arg arrows, or can they be encoded as curried
        single-arg arrows?

      Definition of Done:
      - Closure syntax (fn(x) => expr or an agreed form) is parsed and type-checked in
        crates/mycelium-l1/src/parse.rs and checkty.rs.
      - Dynamic fn-flow through match arms and data fields is lowered by mono.rs without adding
        an L0 kernel node (KC-3); if a kernel node is needed, this task is blocked and flagged.
      - Partial application is supported with an explicit surface form.
      - The RFC-0024 §5 residual sites in mono.rs are resolved or re-flagged as Residual with
        a forward issue ref (never silent, G2).
      - Conformance fixtures in docs/spec/grammar/conformance/ cover all new forms.
      - just check is green.

  - id: M-705
    title: "M-705 — Operator syntax (RFC-0025): infix sugar, precedence/associativity table"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: []
    epic: E11-1
    doc_refs:
      - corpus:RFC-0025
      - corpus:DN-25
      - src:crates/mycelium-l1/src/lexer.rs
      - src:crates/mycelium-l1/src/parse.rs
    body: |
      DONE (2026-06-23): RFC-0025 → Proposed (adopts DN-23's hybrid). Frontend-only infix/prefix
      operator sugar desugars to canonical word functions at parse time — NO L0/L1 kernel change
      (KC-3). Lexer (`lexer.rs`) gains the operator tokens (Minus/Slash/Percent/Caret/Amp/AmpAmp/
      PipePipe/EqEq/BangEq; Plus/Star/Pipe/Bang made context-dual); `parse.rs` gains a
      precedence-climbing layer (parse_binexpr/parse_unary + infix_op/op_call) desugaring a + b →
      add(a, b), -a → neg(a), etc. Precedence/associativity = Rust's table (RFC-0025 §4.1); the
      desugared App node IS the EXPLAIN record (no separate DesugarRecord — §4.4, resolves Q5).
      `mycelium.ebnf` extended (op_expr…unary_expr); accept/20-operator-syntax.myc + the
      tests/differential.rs M-705 corpus pin sugar↔word equivalence across all three execution
      paths (Empirical). Resolving prims today: add/sub/mul/xor + unary neg/not; div/rem/band/bor/
      eq/ne/and/or parse + desugar but surface an explicit "unknown prim" downstream (never silent —
      G2) pending their stdlib/kernel defs. Deferred → M-745: the angle-bracket operators
      < <= > >= << >> (type-arg <…> disambiguation, §4.3). Proposed → Accepted awaits maintainer
      ratification (house rule #3). — Original task:
      Mycelium's surface is word-based for operations: add(a, b), mul(x, y). DN-23 recommends a
      hybrid: keep words canonical in the kernel, add optional infix symbol sugar (a + b desugars
      to add(a, b)) as a frontend-only pass — no kernel change (KC-3). This task implements that
      decision (once RFC-0025 makes the binding choice) and delivers the precedence/associativity
      table, the sugar grammar extension to mycelium.ebnf, and the desugaring pass wired into the
      L1 frontend. Ergonomic symbolic math is needed for the stdlib (std.math, std.numerics) and
      for dogfooding builds (dfb) to be pleasant to write.

      User stories:
      - As a language user writing a numeric algorithm, I want to write a * b + c rather than
        add(mul(a, b), c), so that my code reads like the mathematics it encodes.
      - As a compiler engineer, I want the desugaring reified in an EXPLAIN record so that the
        transform is auditable (ADR-006: no black boxes).

      Issues to resolve:
      - Does the maintainer adopt the DN-23 hybrid or stay words-only? RFC-0025 must record this
        binding decision before implementation begins.
      - Which operators get sugar in v1 (arithmetic only, or bitwise/comparison/logical too)?
      - Which existing precedence table is the source of truth (Rust, C, Haskell)?

      Definition of Done:
      - RFC-0025 records the binding precedence/associativity table and desugaring map.
      - parse.rs parses infix operator expressions per the table (or the words-only decision is
        committed and this task closes without a grammar change).
      - mycelium.ebnf is updated with the operator-expression grammar (or a Residual note).
      - The desugaring pass produces an EXPLAIN record (extends MonoSelections or a new
        DesugarRecord).
      - Conformance fixtures cover precedence ordering, associativity, and sugar-word equivalence.
      - just check is green.

  - id: M-745
    title: "M-745 — Operator syntax: angle-bracket operators (< <= > >= << >>) with type-arg disambiguation"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    depends_on: [M-705, M-809]
    epic: E11-1
    doc_refs:
      - corpus:RFC-0025
      - corpus:RFC-0037
      - src:crates/mycelium-l1/src/lexer.rs
      - src:crates/mycelium-l1/src/parse.rs
      - src:docs/spec/grammar/mycelium.ebnf
    landed_basis: |
      DONE (2026-06-28, ops kickoff): the angle/shift operators are WIRED. The original type-arg
      ambiguity (which made this "needs-design") was dissolved upstream by RFC-0037 D1 (M-809): type
      arguments moved `<...>` -> `[...]`, so `<`/`>` are operator-only and need NO contextual lexing
      or speculative parse. Implementation (frontend-only, no L0/L1 change — KC-3):
      - lexer.rs: `<<`/`>>` lex whole as `Tok::Shl`/`Tok::Shr` (`lex_langle`/`lex_rangle`); `<`/`>`
        stay `Tok::LAngle`/`Tok::RAngle`. No nested-generic `>>` hazard (type args use `[…]`).
      - parse.rs `infix_op`: `<`/`>` -> lt/gt at bp 25 (RFC-0025 §4.1 Tier 8, between bor=30 and
        eq=20); `<<`/`>>` -> shl/shr at bp 55 (Tier 4, between add=60 and band=50). Follows the
        ratified §4.1 table (= Rust), NOT RFC-0037 §6's illustrative sketch (which nested shift
        looser than bitwise — flagged inconsistent; corrected in mycelium.ebnf + RFC-0025 changelog).
      - mycelium.ebnf: `cmp_expr` (Tier 8) and `shift_expr` (Tier 4) productions added with the
        precedence-correct nesting; the §4.3 deferral note retired.
      - Tests: src/tests/parse.rs (desugar + precedence + left-assoc for the new tiers),
        src/tests/lexer.rs (`<<`/`>>` whole-token lexing), accept/20-operator-syntax.myc parse cases.
      `<=`/`>=` have NO glyph (retired by RFC-0037 D1); word forms `lte`/`gte` are ordinary calls.
      The new word targets (lt/gt/shl/shr/lte/gte) parse + desugar but surface an explicit
      "unknown function/prim" refusal downstream until their prims land (M-809), never silent (G2).
      RFC-0025 Accepted -> ENACTED (maintainer ratified in-session 2026-06-28, after the wiring
      landed green): the maintainer made the Accepted -> Enacted move the RFC reserved for them
      ("do NOT self-Enact"; stepped through Accepted — house rule #3). This closes the M-745 wiring
      gate; Enacted covers the surface wiring + desugaring (word targets lacking a prim still refuse
      explicitly until M-809 — G2).
    body: |
      M-705 landed the infix/prefix operator sugar but DEFERRED the angle-bracket operators —
      ordering (`<`, `<=`, `>`, `>=`) and shift (`<<`, `>>`) — because `<`/`>` collide with the
      type-argument `<…>` grammar (`f<T>(x)`, `type Box<A>`): disambiguating an expression
      `a < b` from a generic instantiation needs contextual lexing or speculative parsing
      (RFC-0025 §4.3). This task resolves that collision and adds the six operators. The desugaring
      map already reserves their word targets (lt/le/gt/ge for ordering, shl/shr for shifts), so
      the extension is purely additive: slot them into the Rust-precedence tiers (shifts between
      additive and bitwise-and; ordering between equality and bitwise-or per Rust's table) and add
      conformance fixtures. Until this lands, the comparison/shift words remain available in their
      function form (never silently refused — G2).

      User stories:
      - As a language user, I want to write `a < b` and `a << n`, so that comparison and shift read
        naturally alongside the other infix operators (M-705).
      - As a compiler engineer, I want the type-arg vs comparison ambiguity resolved by a documented,
        inspectable rule (no black box), so that the parser stays auditable (ADR-006).

      Definition of Done:
      - The `<`/`>` type-arg vs comparison/shift ambiguity is resolved by a documented rule
        (contextual lexing or bounded speculative parse); the rule is grounded in the grammar.
      - parse.rs parses `< <= > >= << >>` per the Rust precedence tiers; each desugars to its word
        (lt/le/gt/ge/shl/shr).
      - mycelium.ebnf is extended with the ordering/shift tiers (RFC-0025 §4.3 lifted out of Deferred).
      - RFC-0025 §4.3 moves from Deferred to implemented; conformance fixtures cover the new ops and
        a type-arg-vs-comparison disambiguation case.
      - just check is green.

  - id: M-706
    title: "M-706 — Concrete surface grammar / L3 ratification (RFC-0030)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:spec, area:language, priority:P1, status:done]
    depends_on: [M-705, M-707, M-745]
    epic: E11-1
    landed_basis: "status:done — RFC-0030 is Enacted (2026-06-27; mycelium.ebnf regenerated against RFC-0037, conformance corpus green). M-706 close (s10, 2026-06-29): the dependency gate cleared (M-705/M-745 done; M-707 enacted this session) and an EBNF-completeness audit closed three genuine gaps the parser accepted but the grammar omitted — the top-level `impl_item` (trait + inherent forms; M-664), `consume_expr` (M-664), and `lambda_expr` (defined but unreferenced in `expr`). `just drift-check` green; conformance accept/reject green."
    doc_refs:
      - corpus:RFC-0030
      - corpus:RFC-0006
      - corpus:DN-25
      - src:docs/spec/grammar/mycelium.ebnf
    body: |
      DONE 2026-06-29 (M-706 close, s10): RFC-0030 is **Enacted** (since 2026-06-27 — Q8 = `wild {…}`; Q3 corrected/discharged via RFC-0018 + RFC-0012; `mycelium.ebnf` regenerated against RFC-0037; operator residue M-745/M-809 commissioned). The M-706 dependency gate (M-705 ✓, M-745 ✓, M-707 ✓ enacted this session) is now cleared. An EBNF-completeness audit against the parser closed three real gaps that "Enacted" had not caught: the top-level `impl_item` production was entirely MISSING from `item ::=` (added — trait + inherent forms, M-664), `consume_expr` was missing (added, M-664), and `lambda_expr` was defined but never referenced in `expr ::=` (added). `just drift-check` + conformance accept/reject green. Honest note (VR-5): or-patterns + the R20-Q5 relaxation stay deferred (RFC-0020 §9), so the surface grammar is "complete for the landed surface", not "frozen for all future surface".
      PARTIAL (2026-06-23): RFC-0030 advanced (stays Draft — full L3 ratification is GATED). Done
      this session: (1) the M-705 operator grammar is integrated into mycelium.ebnf (op_expr…
      unary_expr); (2) RFC-0030 §4.1 PROPOSES the RFC-0006 Q8 resolution = ratify `wild { … }` as the
      unsafe-class spelling (gated by @std-sys + !{ffi}; ratifies the implemented M-661 status quo;
      `unsafe`/`audited` alternatives declined); (3) RFC-0030 §4.2 CORRECTS the stub's Q3
      mischaracterization — RFC-0006 Q3 is the LR-6 guarantee-grading mechanism (already discharged by
      RFC-0018/M-663), and the implicit/explicit REPRESENTATION question is RFC-0012's (Enacted), so
      there is no open Q3 for this RFC. Draft → Proposed remains GATED on M-707 (RFC-0020 L2
      carve-outs) + M-745 (angle-bracket operators) per RFC-0030 §4.3 — a "complete ratified grammar"
      cannot be honestly claimed until those land (VR-5). depends_on updated to reflect the gate. —
      Original task:
      The mycelium.ebnf grammar is currently a "v0 working fragment" covering what is implemented
      in crates/mycelium-l1 today. It does not cover: full L2 surface forms (RFC-0020), effect
      annotations (!{...} — in the parser but not in the EBNF), phylum/nodule organization
      (M-662), operator sugar (M-705), or the guarantee-index annotation. RFC-0006 Q3 and Q8
      remain open (the concrete spelling for ambient-representation and unsafe-class constructs).
      A committed, complete EBNF reference grammar is required for tool authors, conformance
      testing, and the self-hosting capstone (E18-1) — the ported compiler must parse the same
      language the Rust compiler parses.

      User stories:
      - As a compiler engineer implementing a parser, I want a single normative EBNF document
        covering the complete surface, so that I do not reconcile a partial grammar against
        scattered RFC sections and implementation details.
      - As a tool author (mycfmt, syntax highlighter), I want a machine-readable, complete
        grammar so that I can derive tokenization and parse rules mechanically.

      Issues to resolve:
      - RFC-0006 Q3: which ambient-representation spelling is committed (implicit, explicit, hybrid)?
      - RFC-0006 Q8: is wild { ... } the committed unsafe-class spelling, or does this RFC
        explore alternatives?
      - Should mycelium.ebnf remain a separate file extended by this RFC, or should this RFC
        inline the complete grammar and mycelium.ebnf become a generated extract?

      Definition of Done:
      - docs/spec/grammar/mycelium.ebnf is updated to a complete L3 reference grammar covering
        all surface forms (L2 sugar, effect annotations, phylum/nodule, operator grammar, @ g).
      - RFC-0006 Q3 and Q8 are resolved with committed normative text in RFC-0030.
      - The EBNF SURFACE STATUS header is updated from "v0 working fragment" to "ratified"
        (append-only change to the EBNF comment block).
      - New accept/reject conformance fixtures cover every grammar extension.
      - parse.rs and the EBNF are in sync: every accepted production parses; every rejected
        production is refused with an explicit error (G2).
      - RFC-0030 is moved to Proposed (for maintainer review).

  - id: M-707
    title: "M-707 — RFC-0020 L2 surface term language enactment"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [E7-1]
    epic: E11-1
    landed_basis: "status:done — RFC-0020 carve-outs reconciled against the now-landed RFC-0018/RFC-0019/RFC-0001-r5 work (RFC-0020 §10 enactment update, 2026-06-29; append-only): §4.2 polymorphic instantiation ENACTED (type args inferred from call-site arg types — M-657/M-673), R20-Q1 RESOLVED (dictionary-free static monomorphization), R20-Q2 RESOLVED (grade inference = separate grade.rs pass, M-663), R20-Q4 ENACTED (FixGroup, M-343/M-391). §4.5 derive PARTIAL (surface+structural M-812; RHS-elab+KC-3 → M-812-cont). R20-Q3 (or-patterns) + R20-Q5 (list/for bidirectional) RE-DEFERRED (RFC-0020 §9). Grounded by tests/check.rs::rfc0020_* (Empirical). RFC-0020 stays Accepted (scoped) — full Enacted awaits §4.5 + or-pattern decision."
    doc_refs:
      - corpus:RFC-0020
      - corpus:DN-25
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      DONE 2026-06-29 (M-707, s10): the RFC-0020 carve-outs are reconciled — most are now ENACTED by landed work (the carve-outs were deferred *pending* RFC-0018/RFC-0019/RFC-0001-r5, which have since landed), the rest explicitly RE-DEFERRED. §4.2 polymorphic instantiation: ENACTED (call-site type-arg inference, M-657/M-673; undetermined ⇒ never-silent error). R20-Q1: RESOLVED (dictionary-free static monomorphization interface). R20-Q2: RESOLVED (grade inference is a separate grade.rs pass, grades stay Declared; M-663). R20-Q4: ENACTED (mutual recursion → FixGroup, M-343/M-391; MutualRecursionDeferred retired). §4.5 derive: PARTIAL (surface+structural M-812; RHS-elaboration + KC-3 guard → M-812-cont). R20-Q3 (or-patterns), R20-Q5 (list-literal/for bidirectional inference): RE-DEFERRED to RFC-0020 §9 (never-silent, G2). Acceptance tests: tests/check.rs::rfc0020_4_2_polymorphic_instantiation_is_inferred_at_call_site + rfc0020_r20q4_mutual_recursion_elaborates_not_deferred. RFC-0020 §10 + meta changelog updated append-only; RFC-0020 stays Accepted (scoped).
      RE-DEFERRED (2026-06-23, surface-stabilization wave): the RFC-0020 carve-outs are NOT enacted
      this session and are explicitly re-deferred with this issue (M-707) as their forward ref —
      §4.2 (polymorphic-instantiation inference sugar), §4.5 (grow-derived trait forms), and
      R20-Q1…Q5 all remain Accepted-scoped / Draft-staged, never silently. Rationale: the carve-outs
      are substantial type-inference machinery serial-on-`mycelium-l1` (checkty.rs), too large to
      enact partially without risking honesty/over-rejection; RFC-0020 stays "Accepted (scoped)" (no
      status change — append-only) and `grow`'s surface keyword is tracked separately by M-664.
      Coordination note (answered): polymorphic-instantiation inference is independent of the M-705
      operator sugar (the sugar desugars to ordinary `App` nodes before inference runs), so no
      cross-task coordination is required. This issue remains OPEN for the enactment. — Original task:
      RFC-0020 was Accepted with carve-outs: §4.2 (polymorphic instantiation inference sugar),
      §4.5 (grow-derived traits), and R20-Q1...Q5 were explicitly deferred. These carve-outs
      are the richer L2 surface + inference machinery that makes writing polymorphic, trait-bearing
      code ergonomic. They are required for the stdlib to be pleasant to write in Mycelium and
      for the self-hosting capstone (E18-1) to be practical. Without them, the programmer must
      always write fully explicit type annotations and manual trait dispatch.

      User stories:
      - As a stdlib author, I want polymorphic instantiation sugar (inferred type arguments at
        call sites) so that I do not write explicit type parameters everywhere.
      - As a language user, I want grow-derived trait forms so that common trait implementations
        can be derived rather than written by hand.

      Issues to resolve:
      - Which RFC-0020 carve-outs are ready to enact now (unblocked by landed RFC-0018/RFC-0019)
        vs. which need additional design?
      - Does polymorphic instantiation inference interact with the operator sugar (M-705) in
        ways that require coordination?

      Definition of Done:
      - RFC-0020 §4.2 (polymorphic instantiation sugar) is enacted in checkty.rs: inferred
        type arguments at call sites where the type is unambiguous.
      - RFC-0020 §4.5 (grow-derived forms) is enacted: at least one derived trait form works
        end-to-end.
      - R20-Q1...Q5 are each either enacted or explicitly re-deferred with a forward issue ref
        (never silent, G2).
      - RFC-0020 status is updated to Accepted (without the scoped qualifier) once all
        carve-outs are enacted (append-only; only the maintainer ratifies this flip).
      - just check is green.

  - id: M-708
    title: "M-708 — Surface stabilization: finalize E7-1 generics/traits/effects edge cases"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [E7-1]
    epic: E11-1
    doc_refs:
      - corpus:RFC-0030
      - corpus:DN-25
      - src:crates/mycelium-l1/src/checkty.rs
      - src:docs/spec/Surface-Stability-Declaration.md
    body: |
      DONE (2026-06-23): the stage-1 surface audit landed as `docs/spec/Surface-Stability-Declaration.md`
      — a per-feature catalogue consolidating DN-14 §3, the checker's own refusal comments, and the
      RFC residual sections. 12 features declared PRESENT (value types, ADTs+patterns, recursion,
      generics [checked + monomorphized M-673], traits+coherence [M-659/M-673], effects [M-660],
      wild/FFI [M-661, gated], phyla [M-662], grading stage-1a [M-663], colony/hypha [M-666], static
      HOF [RFC-0024], operators [M-705]); the DEFERRED set is enumerated with a never-silent refusal
      and a forward issue ref for each: dynamic HOF (RFC-0024 §5 → M-704), angle-bracket operators
      (→ M-745), effect→budget wiring (→ M-677), consume/grow/inherent-impl (→ M-664), R1/R2 runtime
      vocab (→ M-667/M-668), VSA/Substrate + wild execution (→ RFC follow-ups). The audit found NO
      silent-incorrect surface form (every refusal is an explicit CheckError/Residual/parse error —
      G2 holds). Honest open item (flagged, not silently dropped): multi-param traits / associated
      types / width-granular coherence are stage-1 boundaries without a dedicated tracking issue yet
      (recorded in §3.1/§4). Advisory doc; no normative move, no tag upgrade (VR-5). — Original task:
      E7-1 (L1 Stage-1 Language Completeness) landed the core generics, traits, and effects
      machinery. Edge cases, under-specified interactions, and undocumented behaviors remain —
      discovered during dogfooding and the first self-hosted stdlib modules. Stabilizing these
      is required before the surface is declared complete (E11-1 exit gate), and before tool
      authors and the self-hosting capstone (E18-1) can rely on the surface not changing under
      them. This task audits, fixes, and documents the edge cases to produce a stable-surface
      declaration.

      User stories:
      - As a language user, I want the generics, traits, and effects surface to have no
        undocumented surprises, so that I can write programs without hitting silent refusals or
        unexpected behavior.
      - As a tool author, I want a stable-surface declaration document, so that I can build
        on the surface without fear of breaking changes.

      Issues to resolve:
      - Which E7-1 edge cases remain open (not yet discovered — the audit finds them)?
      - Are there any generics/traits/effects interactions that produce silent incorrect behavior
        rather than an explicit CheckError (a G2 violation if so)?

      Definition of Done:
      - An audit pass over crates/mycelium-l1/src/ identifies all known edge cases in
        generics, traits, and effects.
      - Each edge case is either fixed (with a test) or explicitly deferred (with a forward
        issue ref and an honest capability label).
      - A stable-surface declaration document is committed summarizing what is present, what
        is deferred, and what the guarantee level is (Declared for the checker contract).
      - No surface form produces a silent incorrect result (G2); every refusal is explicit.
      - just check is green.

  - id: E18-1
    title: "E18-1 (epic) — Self-hosting capstone (toolchain + libs in Mycelium)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P2, status:needs-design]
    depends_on: [E11-1, E13-1]
    epic: E18
    doc_refs:
      - corpus:DN-26
      - corpus:DN-14
      - corpus:DN-25
      - corpus:ADR-035
      - corpus:ADR-036
    body: |
      The capstone criterion of full-language 1.0.0 (ADR-022, forthcoming; DN-25): everything
      beyond the bare Rust mycelium-core kernel is written in Mycelium (.myc files) and the
      toolchain bootstraps from itself. This is distinct from the Rust kernel's 1.0.0 (ADR-021,
      Accepted) which explicitly scopes self-hosting to Phase 5. DN-14 (Resolved, 2026-06-23)
      confirms the surface is now self-hosting capable; lib/std/result.myc is the first
      self-hosted nodule. This epic drives the staged port of the L1 frontend and the bootstrap
      CI gate that witnesses the capstone criterion is met.

      User stories:
      - As a language user who wants to audit the compiler, I want the frontend (lexer/parser/
        checker) written in Mycelium, so that I can read and verify the implementation in the
        same language I use to write programs.
      - As a maintainer, I want a three-way differential CI gate (Rust-host vs self-host vs
        AOT), so that the self-hosted compiler is continuously verified against the Rust frontend.
      - As a downstream app developer evaluating Mycelium for production, I want evidence that
        the language can build non-trivial real programs (including itself), so that I can assess
        maturity beyond hello-world-scale examples.
      - As an AI co-author agent generating Mycelium code, I want the compiler written in
        Mycelium so that I can use the same language tooling to inspect and verify my outputs.

      Issues to resolve:
      - What is the concrete port order for crates/mycelium-l1/src/ files (the DN-26 §4 sketch
        is advisory; M-739 makes it concrete)?
      - How is the wild/FFI execution gap (DN-14 row 9, staged) handled during the port? The
        ported compiler needs file I/O; what is the plan before wild execution is fully wired?
      - What is the bootstrap protocol: stage 2 (self-hosted compiler compiles itself) or a
        three-way differential (Rust-host == self-host == AOT)?

      Definition of Done:
      - DN-26 is filled out with a concrete, agreed port order and per-stage gates (M-739).
      - The L1 frontend (lexer, parser, checker, elaborator, mono) is ported to .myc with a
        passing three-way differential for each stage (Empirical — differential agreement across
        trials; VR-5: not upgraded to Proven without a theorem).
      - The self-hosted frontend passes the full L1 conformance corpus without regression.
      - A ratification document records that the DN-14 self-hosting gate is met at the
        full-toolchain level, with the differential evidence cited and graded Empirical.
      - The CI pipeline includes a bootstrap gate (just bootstrap or equivalent) that builds
        the compiler with itself and runs the three-way differential automatically.
      - NOTE (ADR-022 §8 Q1): only the core stdlib/corelib self-host slice (with E13-1/T4) is a
        lang 1.0.0 blocker; the full-toolchain self-host above is the long-term arc (ADR-022 §10).
      - cargo-mutants on the Rust frontend witnesses the differential before the port is
        declared canonical.
      - The full-language 1.0.0 capstone criterion (ADR-022) is demonstrably met.

      Children: M-739 (self-hosting bootstrap plan + staged port order), M-740 (port L1
      frontend to .myc with differential), M-741 (ratify self-hosted toolchain as canonical),
      M-742 (self-hosting CI gate: bootstrap + three-way differential + mutant-witnessed).

      NOTE (2026-07-01, ADR-035): the "core stdlib/corelib self-host slice" this epic's DoD shares
      with E13-1/T4 (ADR-022 §8 Q1) is now clarified + satisfied on the ADR-035-narrowed T4 bar
      (DN-66 stable-API freeze + M-714...M-718, all done) -- E13-1 itself closes for 1.0.0 purposes
      under that narrowing. This epic's OWN remaining children (M-739...M-742, the compiler/
      toolchain self-host) are UNAFFECTED and stay open (status:needs-design) -- they are the
      long-term-arc capstone work ADR-022 §8 Q1 already scopes past 1.0.0, not a 1.0.0 blocker.
      No status flip here; this is a clarifying cross-reference only (VR-5: not claiming this
      epic done when its own children are not).

      NOTE (2026-07-01, ADR-036): this epic is the project's dogfooding-capstone track --
      comprehensive self-hosting of the whole toolchain/stdlib/kernel in Mycelium, built beside
      the Rust reference and Rust-vs-Mycelium differential-validated (extending the
      interp==AOT==JIT discipline, RFC-0029 §7.5/M-210). Per ADR-036, this track is non-tag-gating
      except its core-lib slice (T9, ADR-022 §8 Q1, unchanged) -- the remainder (M-739...M-742 and
      whatever further comprehensive-rewrite work follows) runs within-1.0.0 and in parallel with
      the tag-gating tracks, and instead gates the project's separate PUBLIC-RELEASE milestone
      (repo stays private until this track is complete + validated and the targeted Rust
      components are replaced). Roadmapped by docs/planning/self-hosting-port-ledger.md. No status
      flip here; clarifying cross-reference only (VR-5).

  - id: M-739
    title: "M-739 — Self-hosting bootstrap plan (DN-26) + staged port order"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:language, priority:P2, status:done]
    depends_on: [E11-1]
    epic: E18-1
    landed_date: 2026-07-05
    doc_refs:
      - corpus:DN-26
      - corpus:DN-14
      - corpus:DN-25
      - src:crates/mycelium-l1/src/lexer.rs
    body: |
      Before porting any Rust frontend code to Mycelium (M-740), the port order and stage gates
      must be agreed and committed. DN-26 (Draft, 2026-06-23) is the planning stub; this task
      fills it out: which files in crates/mycelium-l1/src/ move first, what their mutual
      dependencies imply for sequencing, where the new .myc files live (e.g., lib/compiler/),
      and what the stage gate criterion is for each wave. A clear plan prevents mid-port
      discoveries from causing costly resequencing.

      User stories:
      - As a compiler engineer doing the port, I want a concrete, agreed port order before I
        start, so that I do not discover mid-port that a dependency was not yet ported.

      Issues to resolve:
      - What is the concrete directory structure for the self-hosted frontend (.myc files)?
      - How does the port handle files with mutual Rust dependencies (elab.rs <-> checkty.rs)?
      - What are the practical bootstrap steps (justfile recipe) for each stage gate?

      Definition of Done:
      - DN-26 is updated (append-only) with: the concrete port order per stage, the directory
        structure for lib/compiler/ (or chosen equivalent), and the stage gate criterion for
        each wave (a passing differential or a conformance-corpus pass).
      - The plan is reviewed by the maintainer and recorded (not ratified normatively -- it is
        advisory planning, DN posture).
      - No code is changed by this task (design only).

      DONE (2026-07-05, checked against the DoD): DN-26 §7 (concrete staged port order grounded
      in the measured mycelium-l1 dependency graph, incl. the 9-file semantic-core SCC finding),
      §7.4 (lib/compiler/ directory structure) and §7.3 (per-stage differential/conformance gate
      criteria) landed via PR #1159; §9 records the two maintainer flag resolutions and §8 the §5
      open-question resolutions — all maintainer-AUTHORED (2026-07-03 commits), which meets
      "reviewed by the maintainer and recorded" by construction. The lib/compiler/README.md wave
      map (scaffold, docs-only) landed via PR #1160. No code changed. M-740 is now ungated.

  - id: M-740
    title: "M-740 — Port the L1 frontend (lexer/parser/checker) to Mycelium (.myc)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:in-progress]
    # M-978/M-979 gate the port's AUTHORING SHAPE (DN-84 §11 correction, 2026-07-03): the depth/stack
    # architecture (explicit work-stack vs guarded recursion; the .myc iteration contract) must be
    # settled + adversarially reviewed BEFORE the .myc passes are authored, so the dogfooded compiler
    # implements the final shape once. Stage-1 scaffolding may proceed; pass-authoring waits on the RFC.
    depends_on: [M-739, E11-1, M-978]
    epic: E18-1
    doc_refs:
      - corpus:DN-26
      - corpus:DN-14
      - corpus:DN-25
      - src:crates/mycelium-l1/src/lexer.rs
      - src:lib/std/result.myc
    body: |
      Following the port order agreed in M-739, implement the staged port of the L1 frontend
      from Rust to Mycelium. Each stage produces .myc source files in lib/compiler/ (or the
      agreed directory), a passing three-way differential (Rust-hosted compiler output == self-
      hosted compiler output == AOT for a shared test program), and a green just check. The port
      is the largest implementation task of the self-hosting capstone and is itself a multi-wave
      swarm (one leaf agent per stage, sequenced per the M-739 plan).

      User stories:
      - As a language user, I want the compiler written in Mycelium so that I can audit the
        implementation in the same language I write programs.
      - As a compiler engineer, I want each stage of the port to have a differential witness,
        so that regressions are caught at stage boundaries.

      Issues to resolve:
      - Which Rust standard library types (HashMap, Vec, String) are used in the frontend and
        how are they replaced in the self-hosted version (self-hosted std.collections, or wild)?
      - Does the port surface any gaps in the Mycelium surface language that require E11-1
        items to be re-opened?

      Definition of Done:
      - The L1 frontend (lexer, parser, checker, elaborator, mono) is ported to .myc per the
        M-739 stage plan.
      - Each stage has a passing three-way differential (Empirical -- differential agreement
        across trials; VR-5: not upgraded to Proven).
      - The self-hosted frontend passes the full L1 conformance corpus without regression.
      - just check is green on the integrated branch.
      - No Rust source file in crates/mycelium-l1/src/ is deleted or modified (the Rust
        frontend remains as the reference host compiler until M-741 ratification).

      STAGE 1 LANDED (2026-07-05, in-progress): lib/compiler/token.myc + lex.myc (the full
      Tok/Pos/Spanned/keyword port, all 64 reserved words; the full lex path: trivia, punctuation/
      operators, ident+keyword, 0b/0x/0t + decimal Int, strings) with the Stage-1 gate
      crates/mycelium-l1/tests/compiler_stage1.rs — 9/9 green: 64-keyword classification
      differential vs the Rust oracle 1:1 + token-count differential over ALL 27 accept-corpus
      files + per-token kind/content spot checks. Honest narrowings (flagged in-file + README):
      differential runs the L1-EVAL leg only (the L0 leg is impractical at this scale — M-981);
      no float-literal scanning (none in the corpus); ASCII-only whitespace; token/lex nodules
      self-contained rather than cross-nodule use (execution staged — M-982). Three real findings
      minted from this stage: M-980 (usefulness nested-pattern panic), M-981 (L0 at self-hosted
      scale), M-982 (cross-nodule execution). Stages 2-6 remain per the lib/compiler/README.md map.

      STAGE 2 LANDED (2026-07-05, in-progress): lib/compiler/nodule.myc (the full nodule.rs port:
      parse_nodule_header first-non-blank-line scan with 1-based line tracking; the bare/named
      marker recogniser; never-silent ill-formed-name errors; dotted/canonical accessors) with the
      Stage-2 gate crates/mycelium-l1/tests/compiler_stage2.rs — 3/3 green: one three-way run
      (L1 == L0-interp == AOT, feasible at this stage's small scale) + a 26-case synthetic edge
      battery transcribed from the oracle's own unit tests + the header-parse differential vs the
      live Rust oracle over EVERY .myc file in the conformance corpus (accept AND reject) and
      lib/std/ + lib/compiler/ (66+ files; classification code + dotted name + canonical spelling +
      error line). Honest narrowings (flagged in-file): ASCII-only trim (FLAG-nodule-2); static
      error messages, line fidelity kept (FLAG-nodule-3); per-file sweep L1-eval-only (M-981).
      One real finding: DN-26 §7.3's nodule name `compiler.nodule` is UNSPELLABLE — `nodule` is a
      reserved word, so the surface declaration cannot parse; the nodule ships as
      compiler.nodule_header (FLAG-nodule-5; DN-26 append-only note carried in the same change).
      TCO acceptance criterion held: every source-length-bounded recursion is direct-tail
      (RFC-0041 s7 W7 amendment 11). Stages 3-6 remain per the lib/compiler/README.md map.

      STAGE 3 LANDED (2026-07-05, in-progress): lib/compiler/ast.myc (compiler.ast — the full
      ast.rs vocabulary: 36 types / 102 constructors + the small helper impls; FLAG-ast-1..8
      in-file, incl. FLAG-ast-5, a NEW collision class: the per-nodule constructor namespace is
      flat, so bare Rust variant names reused across different enums collide even when none is a
      keyword — resolved with per-type prefixes per the collections.myc precedent) and
      lib/compiler/parse.myc (compiler.parse — all ~91 parse.rs functions accounted for; BOTH
      parse and parse_phylum ported end-to-end, source text -> AST, with a self-contained
      token+lexer+AST copy per M-982, FLAG-parse-1; every match destructures exactly ONE
      constructor level, the M-980 discipline — zero checker panics; MAX_EXPR_DEPTH=4096
      preserved; source-length-bounded list-building loops re-shaped accumulator+reverse
      direct-tail in the PR #1166 review cycle after the Cons-after-return depth-ceiling
      finding — RFC-0041 s7 W7 amendment 11; the Stage-1 lexer twin is M-985).
      Gates green: compiler_stage3_ast.rs 26/26 (parse+check_nodule structural gate; 103-row
      ported-constructor inventory, Declared/audited; per-variant L1-eval construct+classify) and
      compiler_stage3.rs 4/4 (Empirical): classification parity vs the live Rust oracle over the
      FULL conformance corpus on both legs (accept 27/27 — 26 via parse, the phylum-headed file
      via parse_phylum with parse refusing it on both sides; reject 30/30; zero divergences) with
      a preorder per-constructor-tag AST fingerprint (tag table 1-109, rotl(7)-XOR mix + node
      count + Bytes-len/u32 leaf mixing; hand-locked Rust mirror walk) on every accepted leg,
      plus a 6-file real-stdlib subset leg; 171s wall via the args-in/verdict-out one-eval
      harness (~8x cheaper than per-driver programs — retrofit minted as M-983). Honest
      narrowings (flagged in-file): L1-eval leg only, no three-way at this scale (M-981);
      error message/position fidelity not compared, classification only (FLAG-parse-8); lib
      sweep limited to the 6 smallest stdlib nodules, full-tree sweep minted as M-984; eval
      fuel sized to 200M for the lib leg (evaluator default 1M — maintainer call whether the
      default moves, flagged not decided). New finding FLAG-parse-2: the lexer-keyword-ctor x
      AST-ctor flat-namespace collision (31 T-prefix names) surfaces whenever two frontend
      stages share one nodule — DN-26 append-only note carried in the same change. Stages 4-6
      remain per the lib/compiler/README.md map.

      STAGE 3 REVIEW CYCLE (2026-07-05, PR #1166): the /pr-review pass HIGH finding (four
      list-building loops + the embedded lexer loop were Cons-after-return, i.e. NOT direct-tail;
      reproduced at 5,000 items with DepthExceeded{4096}) was fixed by converting all 27
      source-length-bounded loops in parse.myc to accumulator + rev_acc direct-tail shape
      (fingerprint parity re-verified: 57 files x 2 legs, zero divergences — the rewrite changed
      no AST result). The fix surfaced three NEW kernel-side findings, minted rather than worked
      around silently: M-986 (the evaluator's TCO elides only bare-body self-calls — match/let
      tail calls are never elided, so NO in-language loop can exceed the 4096 depth budget today;
      the direct-tail source shape is the READY form, its depth benefit dormant until the kernel
      widens tail position), M-987 (L1-eval cost ~n^3 in token count: 0.6s/26s/133s at
      200/752/1252 tokens), M-988 (mono re-inference rejects generic bare Nil the checker
      accepted; 55 explicit ascriptions as the in-language workaround). Honest pins added to the
      Stage-3 gate: the TCO-gap micro-pin and a 150-item green + with_depth(512) explicit-refusal
      pin — both fail loudly when M-986 lifts. MEDIUM (stale 107-entry tag-table comments -> 109)
      and LOW (stale line count) fixed. Gate after patch: compiler_stage3 6/6 green.

      STAGE 4 LANDED (2026-07-06, in-progress): the three semantic-core dependency LEAVES —
      lib/compiler/substrate.myc (compiler.substrate), totality.myc (compiler.totality),
      ambient.myc (compiler.ambient) — porting substrate.rs/totality.rs/ambient.rs. Each depends
      only on ast (or nothing), so the entangled core is untouched. Gates: compiler_stage4_substrate
      5/5, _totality 6/6, _ambient 4/4 (Empirical). NEW capability: the native toolchain now vets
      the self-hosted path — `myc check` (mycelium-check) reports ok on all three AND the five prior
      nodules (token/lex/nodule/ast/parse), a second independent witness alongside the Rust
      differential. `mycfmt` parses all eight but they are non-canonical and it refuses two
      (lex.myc/parse.myc) on the M-690 formatter limitation. lib/compiler/ is not yet a
      mycelium-proj.toml root so just myc-check/myc-fmt skip it — to be lifted by a repeatable
      dual-tooling (Rust differential + native myc) parity gate /myc-dogfood (M-989), scoped to
      LIGHT checks (heavy VSA/GPU-bound work routes to local via session teleport). Honest limits,
      flagged in-file: substrate's Arc<AtomicBool> cross-alias consume-once is NOT representable in
      a pure-value port (FLAG-substrate-1, documented not faked); totality narrows BTreeMap/BTreeSet
      to sorted assoc-lists w/ a deterministic-order precondition + specializes the &mut impl FnMut
      walks (FLAG-totality-1/2); ambient's differential covers 8 hand-built fixtures + 4 refusals
      but NO raw corpus files — a STRUCTURAL limit (it consumes an already-parsed Nodule, cannot
      reach compiler.parse cross-nodule per M-982; a source file needs an AST-serializer bridge,
      minted M-990), NOT the M-987 cost wall (FLAG-ambient-6).

      STAGE 5 INCREMENT 1 LANDED (2026-07-06, in-progress): lib/compiler/semcore.myc (partial) —
      the tractable sub-core of the 9-file semantic SCC: Ty/Width/DataInfo/CtorInfo/Pat type vocab
      (data only) + the Maranget usefulness+decision pipeline + affine + grade (all depend on
      checkty's TYPES, not its logic or the evaluator). Gate
      crates/mycelium-l1/src/tests/compiler_stage5_semcore.rs 17/17 (Empirical) — a TRUE live-oracle
      IN-CRATE differential (white-box use crate::usefulness/decision/affine/grade vs the real Rust
      functions on small synthetic inputs; NOT hand-derived; perturbation-verified to fail loudly),
      resolving the first-cut FLAG-semcore-10. Native myc check = ok. No src/*.rs logic or visibility
      changed. Residual FLAG-semcore-10-b: grade's exact Strength recovered by probing the 4-level
      lattice via live check_guarantees (finer internals private even in-crate). DEFERRED,
      feasibility-gated on M-986/M-987 (recorded as an OPEN QUESTION, not narrowed): the heavy core
      checkty/elab/eval/mono + fuse (runs the evaluator), the whole-program L0-output differential,
      and the cargo-mutants witness. Minted M-993 (heavy-core port) + M-994 (L0-differential
      feasibility). The §9 flag-2 interpreted-first Stage-6 gate's practicality is where this bites;
      the lift (kernel TCO widening vs eval-cost work vs AOT leg) is a maintainer decision in DN-26.

  - id: M-741
    title: "M-741 — Ratify the self-hosted toolchain as canonical (DN-14 gate at full scale)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:needs-design]
    depends_on: [M-740, E13-1]
    epic: E18-1
    doc_refs:
      - corpus:DN-26
      - corpus:DN-14
      - corpus:DN-25
    body: |
      When M-740 (port) and E13-1 (stdlib completeness) are both landed, ratify the self-hosted
      toolchain as canonical -- confirming that the DN-14 self-hosting gate is met at the
      full-toolchain level (not just for std.result). This is a formal record-keeping and
      verification task: the differential evidence is reviewed, graded Empirical, and committed
      as an append-only entry in DN-26 (or a new ADR if the maintainer decides a binding
      decision is needed). The capstone criterion of full-language 1.0.0 is not declared until
      this task and M-742 are both done.

      User stories:
      - As a maintainer, I want a formal ratification record that the self-hosted toolchain
        passes the DN-14 gate, so that the full-language 1.0.0 capstone criterion is grounded
        in evidence, not intent.

      Issues to resolve:
      - Is DN-14 Status -> Resolved (already done for std.result) the right record, or does the
        full-toolchain ratification warrant a new ADR?
      - What is the required evidence strength for "canonical"? (Empirical differential is the
        minimum; Proven would require a formal proof -- not required here, VR-5.)

      Definition of Done:
      - A ratification record is committed (append-only entry in DN-26, or a new ADR) confirming:
        (a) DN-14 gate is met at the full-toolchain level; (b) the differential evidence is cited
        and graded Empirical; (c) the full conformance corpus passes against the self-hosted
        compiler.
      - The ratification is not pre-declared: the evidence (M-740 differential results) must
        exist before this task closes.

      MAINTAINER PRE-AUTHORIZATION (2026-07-07, @tzervas -- recorded on GitHub issue #444):
      "741 once its criteria are met is ratified, approved by me." The ratification act is
      PRE-APPROVED, conditional on the DoD (a)/(b)/(c) being VERIFIABLY met with checked, cited
      evidence (the evidence must exist first -- no pre-declaration, VR-5/G2). The two "issues to
      resolve" are resolved: record form = append-only DN-26 entry + DN-14 -> Resolved (a new ADR
      only if a genuinely binding decision is warranted); evidence strength = Empirical (the floor).
      SCOPE = M-741 ONLY -- the lang 1.0.0 tag (M-738) and the public flip (flp) are NOT
      pre-authorized and remain separate maintainer acts. The `myc-port-drive` completion driver
      executes the ratification at the capstone IF AND ONLY IF it independently verifies all three
      criteria hold; otherwise it flags what is missing on #444 and does not ratify. The act is
      append-only and reversible by supersession (house rule #3) if the maintainer disagrees on
      review. Status stays needs-design until M-993/M-740 land the evidence.

  - id: M-742
    title: "M-742 — Self-hosting CI gate: bootstrap + three-way differential + mutant-witnessed"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:verification, area:language, priority:P2, status:needs-design]
    depends_on: [M-741]
    epic: E18-1
    doc_refs:
      - corpus:DN-26
      - corpus:DN-25
      - src:crates/mycelium-l1/src/lexer.rs
    body: |
      Make the self-hosting capstone durable: wire a bootstrap CI gate so that the self-hosted
      compiler is continuously verified against the Rust frontend. The gate must: (a) build the
      self-hosted compiler using the Rust-hosted compiler, (b) use the self-hosted compiler to
      compile a test program, (c) use the AOT-compiled output to compile the same test program,
      (d) diff (b) and (c) for equality. Additionally, cargo-mutants on the Rust frontend must
      witness the differential -- survivors would identify genuine test gaps. This gate is the
      full-language 1.0.0 durability equivalent of WS8 for the kernel.

      User stories:
      - As a maintainer, I want the bootstrap CI gate to fail loudly if the self-hosted and
        Rust-hosted compilers diverge, so that a regression in the port is caught automatically.
      - As a compiler engineer, I want cargo-mutants on the Rust frontend to witness the
        differential, so that a mutation that changes compiler behavior also breaks the CI gate.

      Issues to resolve:
      - What is the just recipe name (just bootstrap, just self-host-check, or other)?
      - Which tier (just check or just check-full) does the bootstrap gate belong to? (Bootstrap
        is expensive; Tier 2 is likely, but the maintainer must decide.)
      - What test programs are used for the three-way differential?

      Definition of Done:
      - A just bootstrap recipe exists that runs the full three-way differential.
      - The recipe is wired into just check-full (or the tier the maintainer decides).
      - cargo-mutants on crates/mycelium-l1/src/ witnesses the differential: a mutant that
        changes compiler behavior causes the bootstrap gate to fail.
      - The CI pipeline runs the bootstrap gate on the release branch before the full-language
        1.0.0 tag is cut.
      - just check is green (bootstrap at the chosen tier).
  - id: E12-1
    title: "E12-1 (epic) — Runtime & concurrency execution maturity (RFC-0008)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:epic, area:execution, priority:P1, status:done]
    depends_on: [E7-2]
    epic: E12
    doc_refs: [corpus:RFC-0008, corpus:RFC-0027, corpus:ADR-020, corpus:DN-25]
    body: |
      Grow the skeletal v0 runtime (std.runtime R1 API exists in crates/mycelium-std-runtime)
      into a real, stable concurrency runtime — required for a fully-usable language at 1.0.0.
      The R1 slice (Colony/Scope/Task/Network, M-521) is landed; E7-2's hypha/colony/fuse/reclaim
      L1 constructs activate the vocabulary. This epic makes them execute end-to-end: a real
      scheduler on OS threads, the full RFC-0008 vocabulary running, deadlock-freedom enforced,
      the reclamation model (RFC-0027) live, and structured-concurrency supervision with
      never-silent failure propagation. Kickoff: .claude/kickoffs/r10.md.

      User stories:
      - As a language user, I want colony/hypha concurrency to execute on real OS threads, so
        that my Mycelium programs can use all available cores without a single-threaded fiction.
      - As a library/phylum author building on std.runtime, I want fuse/reclaim/tier to elaborate
        and dispatch end-to-end, so that I can write supervision policies and merge operations
        that actually run.
      - As a compiler engineer, I want the RFC-0008 sweep-order property to be a checked
        assertion (not a prose claim), so that deadlock-freedom is verifiable and never-silent.
      - As a downstream app developer, I want structured-concurrency cancellation to propagate
        honestly through the Colony tree, so that a cancelled scope never silently leaks a task.
      - As a maintainer, I want the reclamation model (RFC-0027) live and EXPLAIN-able, so that
        every reclamation event is auditable and the "no silent GC pause" stance is enforced by
        the runtime, not just asserted in prose.

      Issues to resolve:
      - What scheduler design (OS-thread pool, work-stealing, cooperative round-robin) satisfies
        RFC-0008 RT1/RT2 fairness + backpressure at the Empirical guarantee level?
      - How does the reclamation cascade respect the sweep order (RFC-0008 §4.3)? Is the coupling
        strong (required) or weak (permitted)?
      - When RFC-0027 reaches Accepted, what elaboration changes in elab.rs are needed to lower
        the reclaim construct to the runtime Supervisor API?
      - Does M-710 (vocabulary execution) depend on M-709 (scheduler) at the elab level, or only
        at the runtime dispatch level?

      Definition of Done:
      - Real OS-thread scheduler runs Colony/Scope tasks; fairness + backpressure documented and
        tagged Empirical (in-repo property test).
      - RFC-0008 R1 vocabulary (fuse/reclaim/tier) elaborates and dispatches; no Residual for any
        R1 construct; RT1-RT7 invariants hold by test.
      - Deadlock is never silent: sweep-order property is a checked assertion; violation is an
        explicit Deadlock error (G2), not a hang.
      - RFC-0027 reclamation model live: EXPLAIN records for reclamation events; cascade respects
        sweep order (property-tested).
      - Structured-concurrency supervision end-to-end: cancelled Colony propagates failure to
        every child; CancelToken path exercised by a never-silent property test.
      - just check green across all modified crates; guarantee tags honest per VR-5.
      - Orchestrator-owned files reconciled: CHANGELOG, issues.yaml updated, api-index
        regenerated.

      Children: M-709 (real scheduler: hypha/colony on OS threads, fairness + backpressure) /
      M-710 (runtime vocabulary execution: fuse/reclaim/tier/mesh/xloc/cyst end-to-end) /
      M-711 (deadlock-freedom: RFC-0008 sweep-order property checked/enforced, never-silent) /
      M-712 (memory management & reclamation per RFC-0027: reclaim model + lifetime guarantees,
      EXPLAIN-able) / M-713 (structured-concurrency supervision + cancellation with never-silent
      failure propagation).

      Progress (2026-06-23): M-709 (real OS-thread scheduler — fairness + demand-signalled
      backpressure + RT2 differential), M-711 (deadlock-freedom — never-silent sweep-order Deadlock,
      cooperative + OS-thread paths), and M-713 (structured-concurrency supervision + cancellation
      tree + EXPLAIN-able bounded-cascade restart) are implemented Rust-first in
      crates/mycelium-std-runtime (cargo test/clippy -D warnings/fmt green; 40 tests). M-710 BLOCKED
      on M-667 (the L1 fuse/reclaim/tier surface, not yet landed); M-712 BLOCKED on RFC-0027 reaching
      Accepted (maintainer sign-off). Epic stays in-progress. RFC-0008 remains Accepted (machinery
      implemented; spec not silently moved — VR-5).

  - id: M-709
    title: "M-709 — feat(runtime): real scheduler — hypha/colony execution on OS threads, fairness + backpressure"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [E7-2]
    epic: E12-1
    doc_refs: [corpus:RFC-0008, corpus:RFC-0027, corpus:DN-25, src:crates/mycelium-std-runtime/src/lib.rs]
    body: |
      The v0 R1 runtime (M-521, crates/mycelium-std-runtime) implements a cooperative single-
      threaded scheduler (run_sequential/run_interleaved/run_dataflow). For production use and
      full-language 1.0.0, Colony/Scope tasks must execute on OS threads with fairness guarantees
      and backpressure. This issue replaces the cooperative stub with a real OS-thread pool
      scheduler satisfying RFC-0008 RT1 (values move, no shared mutable state) and RT2
      (deterministic fragment is the default and trusted base).

      User stories:
      - As a language user, I want Colony/hypha concurrency to run on real OS threads, so that
        my programs exploit available cores.
      - As a compiler engineer, I want the scheduler to satisfy the RFC-0008 RT2 sequentialization
        differential, so that the Empirical guarantee tag is backed by a property test.

      Issues to resolve:
      - Which scheduler design (work-stealing a la rayon, simple thread pool, or cooperative)
        best preserves RT2 determinism while enabling real parallelism?
      - How is backpressure (demand-signalled per RFC-0008 §4.3) expressed in the scheduler API?

      Definition of Done:
      - Colony/Scope tasks run on OS threads; thread count configurable.
      - RT2 sequentialization differential holds (in-repo property test, tagged Empirical).
      - Backpressure is demand-signalled, never a silent unbounded buffer (G2).
      - just check green for crates/mycelium-std-runtime; guarantee matrix updated.

      Status (2026-06-27): DONE — OS-thread scheduler landed (crates/mycelium-std-runtime/src/
      scheduler.rs). DoD property tests green (104-test crate suite, 0 failed): RT2 sequentialization
      differential `parallel_run_equals_sequential_reference`; OS-thread completion
      `scheduled_satisfiable_network_completes_on_os_threads`; bounded backpressure
      `ready_queue_never_exceeds_capacity`. Guarantee Empirical (trial-tested). Status reconciled from
      a stale in-progress label (code+tests had landed via the runtime waves; issues.yaml lagged).

  - id: M-710
    title: "M-710 — feat(l1+runtime): runtime vocabulary execution — fuse/reclaim/tier/mesh/xloc/cyst end-to-end"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [E7-2, M-709]
    epic: E12-1
    partial_basis: "DONE (2026-06-28, prm wave — M-817 closes the residual). fuse + reclaim now execute END-TO-END three-way (L1-eval ≡ L0-interp ≡ AOT), Empirical via `crates/mycelium-l1/tests/differential.rs`: (1) Binary repr fuse runs via the registered `fuse_join:binary` meet prim (bitwise-AND + canonical `Derived{op:\"fuse_join\"}` provenance, DN-58 §A.5); (2) Data-type fuse desugars (monomorphization) to the resolved `Fuse::join` call and runs three-way (the user-merge case); (3) reclaim runs as its sequential reference (`Let{_ = policy, body}`), and the REAL RT7 supervision dispatch (bounded restart cascade + `SupervisionRecord` EXPLAIN trail) is the runtime-tier driver `mycelium_mlir::run_reclaim` over the lazy body node (`elaborate_reclaim`), validated equal to the reference on success. KC-3: no new L0 node (meet reuses `Op`, reference reuses `Let`, supervision layered over unchanged body eval like `run_colony`). Non-`Binary` repr meets remain an honest residual (DN-58 §A.6 F-A3 — no committed meet); policy→bounds mapping awaits F-B2. tier execution (RFC-0004 ExecutionMode) was already non-semantic. VR-5: tags Empirical (differential + M-713 property tests, not a mechanized theorem)."
    doc_refs: [corpus:RFC-0008, corpus:DN-25, src:crates/mycelium-std-runtime/src/lib.rs, src:crates/mycelium-mlir/src/runtime.rs]
    body: |
      E7-2's leaves (M-666/M-667) activate fuse/reclaim/tier as L1 surface constructs with
      Residual elaboration stubs. This issue makes them execute: elaborates each RFC-0008 R1
      construct through to the runtime dispatch layer (the M-709 scheduler + the mycelium-mlir
      runtime primitives). Subsumes the E7-2 lexer-to-L1-activation path for execution.

      User stories:
      - As a language user, I want fuse/reclaim/tier to do real work when my program runs, so
        that RFC-0008's runtime vocabulary is usable, not just parseable.
      - As a compiler engineer, I want each construct's elaboration to close the Residual gap
        and produce testable L0 or runtime dispatch, so that the three-way differential extends
        to cover runtime vocabulary.

      Issues to resolve:
      - Which of fuse/reclaim/tier can be elaborated before M-709's scheduler is done, and which
        are blocked on it?
      - Does fuse require session/protocol typing (RFC-0008 §4.3 hook) before it can execute, or
        can a structural semilattice check suffice for R1?

      Definition of Done:
      - fuse/reclaim/tier elaborate to runtime calls (no Residual); each has a property test.
      - RFC-0008 R1 vocabulary execution is end-to-end verified by the three-way differential
        (at least one construct per vocabulary term).
      - just check green for affected crates; guarantee tags Empirical (trial-tested).

      Status (2026-06-23): BLOCKED on M-667 — the fuse/reclaim/tier L1 surface constructs are not
      yet landed (M-667 is status:needs-design), so there is no surface to elaborate. The runtime
      machinery this construct elaborates *to* (scheduler M-709, deadlock M-711, supervision M-713)
      has landed Rust-first in crates/mycelium-std-runtime. Unblock: land M-667, then elaborate each
      construct to a runtime call. (Flagged, not guessed — VR-5/G2.)

  - id: M-711
    title: "M-711 — verify(runtime): deadlock-freedom — RFC-0008 sweep-order property checked/enforced, never-silent"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:verification, area:execution, priority:P1, status:done]
    depends_on: [M-709]
    epic: E12-1
    doc_refs: [corpus:RFC-0008, corpus:DN-25, src:crates/mycelium-std-runtime/src/lib.rs]
    body: |
      RFC-0008 §4.3 defines a sweep-order property (Kahn-determinism differential; the existing
      run_dataflow returns Err(Deadlock) explicitly). With the real OS-thread scheduler (M-709),
      the sweep-order invariant must be checked/enforced across threads — not just on the
      cooperative single-threaded path. Deadlock must never be a silent hang: it is always an
      explicit Deadlock error (G2).

      User stories:
      - As a compiler engineer, I want a property test that checks the sweep-order invariant
        holds under the real scheduler, so that deadlock-freedom is Empirical (not Declared).

      Issues to resolve:
      - Can deadlock be detected eagerly (at schedule time) or only lazily (at a full-stall
        epoch)? The answer affects the Empirical/Declared tag.

      Definition of Done:
      - A property test asserts that any stalled Colony emits Deadlock, never hangs silently.
      - Sweep-order invariant is checked across OS threads (not just cooperative path).
      - Guarantee tag: Empirical if property test covers real scheduler; Declared otherwise.
      - just check green.

      Status (2026-06-27): DONE — deadlock-freedom verified never-silent: `stalled_network_is_explicit_
      deadlock_never_hangs` + scheduled variant `scheduled_stalled_network_is_explicit_deadlock_never_
      hangs`; sweep-order determinism `sweep_direction_is_determinism_invariant`. Guarantee honestly
      Empirical, not Proven (`kahn_determinism_is_empirical_not_proven`, VR-5). Crate suite green
      (104/0). Status reconciled from a stale in-progress label.

  - id: M-712
    title: "M-712 — feat(runtime): memory management & reclamation (RFC-0027) — reclaim model + lifetime guarantees, EXPLAIN-able"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-709]
    epic: E12-1
    landed_basis: "status:done — the M-712 DoD is met by landed work: (1) RFC-0027 Accepted (2026-06-25, gate); (2) the L1 `reclaim` construct ELABORATES to the runtime reclamation/supervision path with an EXPLAIN trail — `mycelium_l1::elaborate_reclaim` (elab.rs) feeds `mycelium_mlir::run_reclaim` → `mycelium-std-runtime::supervise_with_restart`, the bounded restart cascade + `SupervisionRecord` EXPLAIN landed via M-817 (DN-58 §B → Enacted); (3) the reclamation mechanism (RcCell + ReclamationRecord/EXPLAIN sink, region/scope_region sweep-ordered teardown) is landed + green in mycelium-std-runtime. The M-667 L1 surface this previously awaited landed (r4v); M-710/M-817 wired execution. Verified: `tests/differential.rs::reclaim_sequential_reference_runs_three_way` + `::reclaim_real_supervision_driver_dispatches_with_explain` pass. NOTE: the adjacent routed M-677 (declared-effect → interp budget ledger + per-effect `retry(<=3)` SURFACE syntax) is a SEPARATE, still-partial item — the budget *mechanism* exists (`mycelium-interp/src/budget.rs`) but the per-effect surface syntax is not yet parsed; it is NOT part of this M-712 DoD."
    doc_refs: [corpus:RFC-0027, corpus:RFC-0008, corpus:DN-25, src:crates/mycelium-std-runtime/src/lib.rs, src:crates/mycelium-l1/src/elab.rs]
    body: |
      DONE 2026-06-29 (r10, status reconciliation): the L1 `reclaim`→runtime elaboration gate (the remaining M-712 gate per the r10 kickoff) is MET. `elaborate_reclaim` (elab.rs) lowers `reclaim(policy) { body }` to its sequential reference AND feeds the real RT7 supervision driver `mycelium_mlir::run_reclaim` (bounded restart cascade + `SupervisionRecord` EXPLAIN trail), dispatching to `mycelium-std-runtime::supervise_with_restart` — landed via M-817 (closes M-710; DN-58 §B → Enacted). Reclamation mechanism (RcCell + ReclamationRecord/EXPLAIN, region sweep-ordered teardown) landed + green in mycelium-std-runtime. Three-way reclaim differential tests pass. Honest scope (VR-5): the adjacent M-677 (effect→budget surface syntax `retry(<=3)`) is a SEPARATE partial item — mechanism exists (budget.rs), surface syntax not yet wired; flagged on M-677, not closed here.
      Implement the runtime memory management and reclamation model as specified by RFC-0027
      (once Accepted). The reclaim surface construct (reserved in ADR-020) must elaborate to
      a real runtime path: EXPLAIN records for reclamation events, cascade respects RFC-0008
      §4.3 sweep order, and reclamation is never silent (G2 — no silent drop, no silent pause).

      User stories:
      - As a language user, I want to know when and why values are reclaimed, so that I can
        reason about memory lifecycle without a hidden GC pause.

      Issues to resolve:
      - RFC-0027 must be Accepted before implementation begins — this issue is gated on that.
      - What is the EXPLAIN record schema for a reclamation event (scope id, sweep epoch,
        reclaimed bytes, RFC-0027 policy applied)?

      Definition of Done:
      - RFC-0027 is Accepted (gate).
      - reclaim elaborates to runtime reclamation with EXPLAIN record (no silent drop; G2).
      - Reclamation cascade respects sweep order (property test; tagged Empirical if tested).
      - just check green.

      Status (2026-06-23): BLOCKED on RFC-0027 reaching Accepted — RFC-0027 is Draft and its own
      Posture section reserves the Draft→Accepted move for maintainer sign-off. Not advanced
      unilaterally (architecturally significant — flag, don't guess; VR-5/G2). The M-709 scheduler +
      M-711 sweep-order driver this would dispatch through are landed. Unblock: maintainer ratifies
      RFC-0027, then elaborate `reclaim` to the runtime reclamation path (EXPLAIN record; cascade
      respects the sweep order).

      Status (2026-06-27): RFC-0027 was ratified Draft→Accepted (2026-06-25) — the RFC-0027-Accepted
      gate in this DoD is now MET. The reclamation MECHANISM is landed Rust-first and green: RcCell +
      ReclamationRecord/EXPLAIN sink, region/scope_region sweep-ordered teardown (crates/mycelium-std-
      runtime, 104-test suite green). REMAINING (still status:blocked): elaborating the L1 `reclaim`
      construct to this runtime path requires the fuse/reclaim/tier L1 surface — gated on M-667
      (status:needs-design), the same surface M-710 awaits. Blocker corrected from "RFC-0027 Draft"
      (now stale) to "M-667 L1 surface". Tracked jointly with M-710. (Flag, don't guess — VR-5/G2.)

  - id: M-713
    title: "M-713 — feat(runtime): structured-concurrency supervision + cancellation with never-silent failure propagation"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-709]
    epic: E12-1
    doc_refs: [corpus:RFC-0008, corpus:DN-25, src:crates/mycelium-std-runtime/src/lib.rs]
    body: |
      RFC-0008 RT7 requires structured concurrency: a scope does not exit until all children
      complete or are cancelled. The v0 R1 runtime has CancelToken/TaskOutcome (M-356) but the
      full supervision tree (OTP-style restart policies, cascade cancellation) is not yet
      end-to-end. This issue makes cancellation propagate through the Colony tree with
      never-silent failure reporting.

      User stories:
      - As a downstream app developer, I want a cancelled Colony to propagate failure to every
        child and report each outcome explicitly, so that partial failures are never silently
        swallowed.

      Issues to resolve:
      - Does the supervision policy (RestartIntensity from M-356) belong in std.runtime or in a
        reclaim sub-construct (per ADR-020 recommendations)?

      Definition of Done:
      - Cancellation propagates through the Colony tree to all children (never-silent; G2).
      - A never-silent property test covers cancel + outcome collection.
      - Supervision policy (at least one restart strategy) is live and EXPLAIN-able.
      - just check green.

      Status (2026-06-27): DONE — structured-concurrency supervision landed (crates/mycelium-std-
      runtime/src/supervision.rs). DoD property tests green: cascade cancellation
      `cancel_tree_cascades_to_every_descendant_never_silently`; outcome collection with no silent drop
      `run_supervised_collects_every_outcome_no_silent_drop`; external propagation
      `external_cancel_propagates_to_all_tasks`; restart policy `supervise_with_restart` live +
      EXPLAIN-able. Guarantee Empirical. Status reconciled from a stale in-progress label.

  - id: E14-1
    title: "E14-1 (epic) — FFI & system interface"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:epic, area:execution, priority:P1, status:done]
    depends_on: []
    epic: E14
    doc_refs: [corpus:RFC-0028, corpus:ADR-014, corpus:DN-25]
    body: |
      The wild/@std-sys FFI gate type-checks and is capability-gated (M-661, DN-14 row 9) but
      execution is staged as an explicit Residual. Every stdlib module that bottoms out in a
      syscall (std.io, std.fs, std.sys, std.rand, std.time) is therefore non-executable until
      the FFI floor executes for real. For full-language 1.0.0, programs must do real I/O and
      link C/Rust. This epic implements the capability-based FFI model (RFC-0028), makes wild
      execute, binds real syscalls, and audits the unsafe floor (ADR-014). Kickoff:
      .claude/kickoffs/ffi10.md.

      User stories:
      - As a language user, I want to write Mycelium programs that read files, write output, and
        generate entropy, so that Mycelium is usable for real programs at 1.0.0, not just
        in-memory demos.
      - As a library/phylum author writing std.io or std.rand, I want a normative FFI model with
        Declared guarantee tags on syscall-backed operations, so that the guarantee matrix
        (RFC-0016 §4.5) is grounded and auditable.
      - As a compiler engineer, I want the wild elaboration path to be a concrete, testable
        dispatch target (not a Residual stub), so that the three-way differential extends to
        wild-backed operations and DN-14 row 9 is fully closed.
      - As a tool author building sandboxing on top of Mycelium, I want the capability model to
        be an explicit surface (not ambient OS permissions), so that a program without the io
        capability cannot obtain it through a side channel.
      - As an AI co-author agent generating Mycelium stdlib code, I want the FFI protocol
        (capability annotation + wild body + SAFETY comment + guarantee tag) to be normative
        and verifiable, not inferred from source conventions.
      - As a maintainer, I want just safety-check to audit every wild site mechanically
        (SAFETY comment present, @std-sys context, !{ffi} annotation), so that the trusted-base
        boundary (ADR-007) is auditable as the FFI surface grows.

      Issues to resolve:
      - Is the capability model a Mycelium-language-level type (a Capability<io> value) or a
        build-time attribute (@std-sys is the full check, nothing runtime)?
      - What is the wild execution host: a Rust FFI trampoline baked into the interpreter, or a
        capability handle passed into the Scope context?
      - What guarantee tag is correct for a successfully-executed wild block: Declared (audited,
        not verified) or Empirical if covered by an in-repo property test?
      - How does just safety-check scope: SAFETY comment presence only (ADR-014), or also
        Mycelium-level audit (@std-sys context + !{ffi} annotation verified)?

      Definition of Done:
      - wild blocks in @std-sys nodules execute for real; Residual gap closed; three-way
        differential covers at least one wild-backed operation.
      - Capability model implemented: wild outside @std-sys remains a hard CheckError (G2).
      - Real syscall bindings: std.io (read/write), std.fs (open/close/read/write/stat),
        std.rand (entropy), std.time (clock) — each with a Declared guarantee matrix row.
      - ADR-014 unsafe-floor confinement: every wild site carries SAFETY comment; just
        safety-check mechanically verifies and is green.
      - Never-silent error paths: every syscall failure is an explicit Result/Option (G2).
      - just check green across all modified crates; guarantee tags honest per VR-5.
      - Orchestrator-owned files reconciled: CHANGELOG, issues.yaml updated, api-index
        regenerated.

      Children: M-720 (FFI surface per RFC-0028: capability-based Mycelium<->C/Rust calls,
      never-silent ABI claims) / M-721 (wild host execution: make @std-sys FFI floor execute
      — DN-14 row 9 full closure) / M-722 (syscall binding: real io/fs/sys bindings,
      sandboxed + capability-gated) / M-723 (time/clock + rand entropy real bindings hardened
      for 1.0) / M-724 (FFI safety: ADR-014 unsafe-floor confinement for the FFI surface,
      audited + just safety-check green).

      Resolution (2026-06-23, done): all five children landed. M-720/M-721 made wild execute
      (lowers to Op{prim:"wild:<name>"}, no new Core-IR node; three-way differential covers
      wild:echo) and M-724 audited the floor (just safety-check). M-722/M-723 landed the real
      syscall floors (mycelium-std-sys: io/fs/sys/rand[/dev/urandom]/time), their data guarantee
      matrix (crates/mycelium-std-sys/src/guarantee_matrix.rs — every op Declared, asserted in
      tests per RFC-0016 §4.5), and the production host wiring (new crate mycelium-std-sys-host:
      OsEntropy/OsClock fill std-rand's EntropySource / std-time's ClockSource from the audited
      floor, never-silent). FOLLOW-UP (not a regression — already deferred in RFC-0028 §4.4): the
      per-op wild: Value-encoding that makes the byte-oriented io/fs ops reachable from a Mycelium
      `wild { io.write(…) }` block is the @std-sys-author surface encoding, uncommitted in §4.4;
      the entropy/clock seams are wired today, the io/fs surface encoding follows when §4.4 lands.

  - id: M-720
    title: "M-720 — feat(ffi): FFI surface (RFC-0028) — capability-based Mycelium<->C/Rust calls, never-silent ABI claims"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: []
    epic: E14-1
    doc_refs: [corpus:RFC-0028, corpus:ADR-014, corpus:DN-25, src:crates/mycelium-std-sys/src/lib.rs]
    body: |
      Implement the capability-based FFI surface as specified by RFC-0028 (once Accepted). This
      includes: the elab.rs Residual-to-dispatch change for wild blocks in @std-sys context, the
      ABI boundary protocol (value layout, calling convention, SAFETY comment requirement), and
      the never-silent ABI claim policy (a wild block that violates its ascribed type is a hard
      runtime error, never a silent wrong-type call). RFC-0028 must be Accepted before this
      issue begins (gate).

      User stories:
      - As a language user, I want wild blocks to execute real C/Rust functions when my program
        runs in an @std-sys nodule, so that FFI is available and honest.

      Issues to resolve:
      - RFC-0028 must be Accepted (gate on this issue).
      - Does the elab.rs change require a new elaboration variant or can the Residual node be
        replaced in-place?

      Definition of Done:
      - RFC-0028 Accepted (gate).
      - wild in @std-sys elaborates to a concrete runtime dispatch (no Residual).
      - ABI boundary protocol is normative: SAFETY comment required; violation is explicit error.
      - just check green for crates/mycelium-l1 + crates/mycelium-std-sys.

  - id: M-721
    title: "M-721 — feat(ffi): wild host execution — @std-sys FFI floor executes (DN-14 row 9 full closure)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-720]
    epic: E14-1
    doc_refs: [corpus:RFC-0028, corpus:DN-25, src:crates/mycelium-std-sys/src/lib.rs, src:crates/mycelium-mlir/src/jit.rs]
    body: |
      M-661 staged wild execution as an explicit Residual (DN-14 row 9: conditionally present,
      execution staged). M-720 changes elab.rs to dispatch; this issue implements the host-side
      execution shim: the Rust trampoline or capability handle that resolves a wild block call to
      a real C/Rust function at runtime. The jit.rs dlopen/dlsym pattern (the only current unsafe
      site) is the reference for confinement discipline.

      User stories:
      - As a compiler engineer, I want the three-way differential to cover a wild-backed
        operation, so that DN-14 row 9 is fully closed (Empirical, not just Declared).

      Issues to resolve:
      - Trampoline vs capability handle (RFC-0028 decision; gated on that RFC).
      - Does the host shim live in mycelium-std-sys or in the interpreter/runtime layer?

      Definition of Done:
      - A wild block in an @std-sys nodule executes a real host function end-to-end.
      - Three-way differential covers at least one wild-backed operation (Empirical tag).
      - SAFETY comment on every unsafe site; confined per ADR-014/DN-21 pattern.
      - just check green.

  - id: M-722
    title: "M-722 — feat(std-sys): syscall binding — real io/fs/sys bindings, sandboxed + capability-gated"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-721]
    epic: E14-1
    doc_refs: [corpus:RFC-0028, corpus:ADR-014, corpus:DN-25, src:crates/mycelium-std-io/src/io.rs, src:crates/mycelium-std-fs/src/lib.rs, src:crates/mycelium-std-sys/src/lib.rs]
    body: |
      crates/mycelium-std-{io,fs,sys} are partial/stub today. With M-721's wild execution floor
      live, implement real syscall bindings: io (read/write/flush), fs (open/close/read/write/
      stat/remove), and sys (process/env basics). Each binding is sandboxed (capability-gated via
      @std-sys), carries a Declared guarantee matrix row (RFC-0016 §4.5 format), and uses
      never-silent fallibility (every syscall error is an explicit Result::Err, never ignored).

      User stories:
      - As a language user, I want std.io and std.fs to work for real file and stream I/O, so
        that Mycelium programs can do useful work.

      Issues to resolve:
      - Which syscalls are in scope for v0 (minimum for 1.0.0)?
      - Does each binding need its own SAFETY comment, or does a module-level comment cover the
        @std-sys nodule?

      Definition of Done:
      - std.io: read/write operations execute; Declared guarantee matrix row each.
      - std.fs: open/close/read/write/stat/remove execute; Declared guarantee matrix rows.
      - std.sys: at minimum process exit and env variable read; Declared.
      - All bindings capability-gated; every syscall failure is explicit Result/Option (G2).
      - just check green.

      Resolution (2026-06-23, done): the real syscall floors execute and are never-silent —
      io (read_to_end/read_line/write_out/write_err/flush_out), fs (read/write/exists/
      create_dir_all/remove_file; full stat lives in pure std-fs::metadata), sys (exit/get_env/
      args) in crates/mycelium-std-sys (#![forbid(unsafe_code)], thin std::* wrappers). The
      missing piece — a Declared guarantee matrix encoded as DATA (RFC-0016 §4.5, not prose) —
      landed in crates/mycelium-std-sys/src/guarantee_matrix.rs: one row per floor op, every op
      Declared, fallibility/effect/error-set columns asserted in tests. Capability-gating is the
      wild/@std-sys checker (M-661/M-720); the registry grants no host op by default (G2). The
      Mycelium-surface wild: byte-encoding for io/fs is the RFC-0028 §4.4 deferral (see E14-1).

  - id: M-723
    title: "M-723 — feat(std-sys): time/clock + rand entropy real bindings hardened for 1.0"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-721]
    epic: E14-1
    doc_refs: [corpus:RFC-0028, corpus:ADR-014, corpus:DN-25, src:crates/mycelium-std-rand/src/lib.rs, src:crates/mycelium-std-time/src/lib.rs]
    body: |
      crates/mycelium-std-rand and mycelium-std-time are partial stubs. With the wild execution
      floor live (M-721), implement and harden the real bindings: time/clock (monotonic +
      wall-clock reads via syscall), and rand entropy (OS entropy source — /dev/urandom or
      getrandom(2)). Both carry the !{time} and !{entropy} effects respectively (M-660 effect
      annotations), Declared guarantee tags, and never-silent error paths.

      User stories:
      - As a language user, I want std.rand and std.time to return real OS entropy and clock
        values, so that Mycelium programs can do random number generation and timing correctly.

      Issues to resolve:
      - Is getrandom(2) the required entropy source, or is /dev/urandom acceptable for v0?
      - Does wall-clock time carry a Declared tag only (monotonic reads are Exact structurally)?

      Definition of Done:
      - std.time: monotonic and wall-clock reads execute; Declared (wall-clock) / Exact
        (structural monotonicity) guarantee tags.
      - std.rand: OS entropy read executes; Declared guarantee tag; never-silent on failure.
      - Effect annotations correct: !{time} and !{entropy} match M-660 coverage checker.
      - just check green.

      Resolution (2026-06-23, done): the OS sources execute through the audited floor and are
      wired end-to-end. std-sys::rand::fill_bytes reads /dev/urandom via std::fs (no getrandom
      dep, #![forbid(unsafe_code)] preserved; never zero-fills — explicit
      Err(EntropyError::Unavailable) on a platform without it, G2). std-sys::time gives monotonic
      + wall reads. The new crate mycelium-std-sys-host wires these into the pure crates'
      injectable seams: OsEntropy: std-rand::EntropySource and OsClock: std-time::ClockSource,
      so std.rand/std.time bottom out in the real OS while staying wild-free. Guarantee matrices
      are data: std-sys (guarantee_matrix.rs), plus std-rand/std-time already had theirs. Tags:
      every floor read Declared; structural monotonic-instant arithmetic stays Exact in std-time.
      Effects carried structurally by DeclaredTime / DeclaredTimeEntropy (wall = time+entropy,
      RT3). FLAG: the Mycelium-surface M-660 effect-checker cross-test (a deterministic fragment
      may not call a DeclaredTimeEntropy reader without naming !{entropy}) belongs to M-660's
      checker integration (post-RFC-0014 surface), tracked there — the type-level markers are in
      place here.

  - id: M-724
    title: "M-724 — verify(ffi): FFI safety — ADR-014 unsafe-floor confinement for FFI surface, audited + just safety-check green"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:verification, area:execution, priority:P1, status:done]
    depends_on: [M-720, M-721, M-722, M-723]
