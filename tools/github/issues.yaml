      - corpus:DN-70
    body: |
      FLAG raised by M-914 (kickoff `enb`, H1 capstone) and confirmed at integration-reconcile
      2026-07-02. `crates/mycelium-fmt/src/lib.rs::render_expr_canonical` has no `Expr::Hypha`
      arm, so a hypha's optional `@forage(policy)` placement annotation (activated by M-906, DN-70
      D1) is silently dropped in the canonical render path — a formatter round-trip that erases the
