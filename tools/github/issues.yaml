  - id: E31-1
    title: "E31-1 (epic) — Phase-I H2: Rust-reference closeout + kernel-freeze"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P1, status:done]
    epic: E31
    depends_on: [M-958, M-959, M-960, M-961, M-962, M-963, M-964, M-965, M-966, M-967, M-968, M-969]
    doc_refs:
      - corpus:ADR-038
      - corpus:DN-56
      - corpus:DN-39
      - corpus:RFC-0038
      - corpus:DN-63
      - corpus:RFC-0027
      - corpus:DN-32
      - src:docs/planning/road-to-1.0.0-and-mycelium-rewrite.md
    body: |
      EPIC (Phase-I H2, kickoff `frz`; ADR-038 §2.7 + roadmap §4/§8). Close the H2
      "Rust-reference closeout remainder" — the tag-track items that are neither H0 foundations
      (`acy`), H1 enablers (`enb`), nor the H2a grammar set (`grm`) — so Phase I ends on a frozen,
      complete, honestly-tagged kernel + surface. Four lanes: (A) kernel freeze (DN-56 — audit →
      reject-ledger → the declaration, strictly last); (B) inject-mode enactment (RFC-0038,
      Accepted-but-unbuilt → the confirmed subset built, claims Declared → Enacted only for what
      is built); (C) runtime/concurrency maturity closeout (R2 remainder beyond `enb`'s D-lite +
      RT2/determinism honesty pass); (D) l1-semantics closeout tail (Fuse law-checker, `via`
      ordering, per-instantiation tag context, guard-clause dossier). Heavy runtime items
      (M-869/M-868/M-831) are needs-design/research: Phase-II build, NOT flip-gating (recorded
      so the omission is explicit — G2). Freeze is NOT a `flp` prerequisite (roadmap §2b).

      Delegation (2026-07-02): the maintainer DELEGATED the design decisions — the dossier tasks
      (M-958 → DN-76, M-960 → DN-77, M-962 → DN-78, M-968 → DN-79) are NOT maintainer-blocked;
      the orchestrator decides per each dossier's recommendation and records the decision
      append-only. The kernel-freeze declaration (M-969) executes ONLY on a green DN-56
      four-condition scorecard (M-958) — the orchestrator executes on green per the delegation.

      Collision law: the l1-tail tasks (M-965/M-966/M-967) share the serial `mycelium-l1` lane
      with `grm`/`enb` (one surgery in flight; status:blocked until the lane clears). The
      inject-mode lane (`mycelium-interp`/`mycelium-sec`) and the R2/runtime lane
      (`mycelium-std-runtime`) are disjoint and run in parallel. The four dossiers are docs-only
      and parallel.

      User stories:
      - As the maintainer, I want Phase I to close on a frozen, condition-checked kernel with the
        security axis real and the runtime surface honest, so that a public release stands on a
        stable, evidenced baseline.
      - As a deployer, I want inject-mode enforcement and never-silent refusals built, not
        declared, so that the security posture is checkable (VR-5).

      Definition of Done: DN-56's four conditions scored (M-958) + reject-ledger complete (M-959)
      + the freeze declaration executed on green (M-969, DN-39-only post-freeze diff policy
      stated); the confirmed inject subset built (M-961, deferred surface stays Declared,
      flagged); the directed R2 remainder activated (M-963) + RT2 tags honest (M-964); the l1
      tail landed (M-965/M-966/M-967) + guard clauses ratification-ready (M-968); every refusal
      never-silent (G2), property test per bound, doc-maintenance per `_doc-maintenance.md`.

      Children: M-958/M-959/M-969 (Lane A — freeze), M-960/M-961 (Lane B — inject-mode),
      M-962/M-963/M-964 (Lane C — runtime), M-965/M-966/M-967/M-968 (Lane D — l1 tail).

