  - id: M-1018
    title: "M-1018 — The VSA semantic layer (Layer 2) + the Empirical eval gate"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:tooling, priority:P2, status:todo]
    epic: E39-1
    depends_on: [M-1015, M-1016]
