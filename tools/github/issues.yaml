  - id: M-802
    title: "M-802 -- projection in Mycelium: research + relationship to RFC-0021 (capture; DN-47 / rsm F3)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:research, area:language, priority:P3, status:todo]
    epic: E23-1
    depends_on: []
    doc_refs:
      - corpus:DN-47
      - corpus:RFC-0021
    body: |
      CAPTURE-ONLY (rsm F3). Research what "projection" is in SE/PL broadly and how it works; whether
      Mycelium has it. Primary open question: is RFC-0021 (Semantic-Level Projection Framework, Enacted)
      the SAME notion, a SUBSET, or ADJACENT? If absent: do we want it, how would we implement it, what
      would it comprise, drawbacks/considerations, and the 2nd/3rd/4th-and-beyond-order effects. If
      present: can we PROVE it, and make it more economic/performant/safe/secure? (DN-47 §OQ.)

      User story: As a language designer, I want a grounded account of projection (vs RFC-0021) so we know
      whether a real capability is missing, redundant, or improvable -- before committing design effort.

      Definition of Done (to leave Draft): a research record establishing the RFC-0021 relationship + a DN
      taking a position; possibly an RFC. NOTHING decided here.

  - id: M-803
    title: "M-803 -- L3->L4 and the 'reveal' lowering: research (capture; DN-48 / rsm F4)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:research, area:language, priority:P3, status:todo]
    epic: E23-1
    depends_on: []
    doc_refs:
      - corpus:DN-48
    body: |
      CAPTURE-ONLY (rsm F4). Consider whether an L4 layer is appropriate -- what it would look like, what
      it would mean, and how layers REVEAL (the maintainer's vernacular for lowering to the next-lower
      level) downward. Open question: can L4 reveal STRAIGHT to L0? Rationale to explore: lowering is
      mechanized/schematized/highly repeatable, and L4/L3/L2/L1 all lower to L0 for both interpretation-
      and compile-time -- so a direct L4->L0 reveal may be coherent. (DN-48 §OQ.) Note: "reveal" is not
      yet in the Glossary -- a lexicon entry is a maintainer call (FLAG from W3).

      User story: As a language architect, I want the L4 question + the reveal model examined, so the
      lowering architecture is decided on merit before more surface sugar accretes.

      Definition of Done (to leave Draft): a DN/RFC + research record taking a position on L4 and the
      reveal model. NOTHING decided here.

  - id: M-804
    title: "M-804 -- post-critical quality passes: capture (DN-49 / rsm F6)"
