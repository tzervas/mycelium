    body: |
      SCOPE EXTENDED (2026-06-23, maintainer — RFC-0032 D6; enacted by ADR-024): the core `1.0.0` tag
      now ALSO waits on E19-1 (kernel self-hosting-enablement reprs/prims land IN core 1.0.0);
      depends_on includes E19-1. The ADR-021 Gate A/B rows remain met + unchanged. The T1-scope
      amendment is enacted append-only by the focused amending ADR-024 (Accepted 2026-06-23) -- NOT by
      rewriting ADR-022 §4/§5 (which carry an "amended by ADR-024" pointer). See ADR-024 + RFC-0032 D6.

      PRECONDITION CONFIRMED (2026-07-01, tag-readiness resync): E19-1 is now `status:done`
      (landed_date 2026-07-01 — M-746/747/748/749/750/751/752/798 all done, each differential-tested;
