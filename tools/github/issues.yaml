  - id: M-702
    title: "M-702 — Supply-chain gate: wire cargo-deny + cargo-audit into just check"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:release, priority:P1, status:done]
    depends_on: []
    epic: E10-1
    landed_pr: 303
    landed_date: 2026-06-21
    landed_basis: "Satisfied by reference to the prior ADR-021 kernel-gate landing M-652 (PR #303): deny.toml (MIT-aligned license allow-list + advisories + crates.io-only sources); just deny / scripts/checks/deny.sh runs cargo-deny + cargo-audit, wired non-silently into just check (scripts/checks/all.sh); cargo-deny/cargo-audit installed by scripts/install-tools.sh (skip-if-missing locally, never silent in CI). Refresh-status close (kickoff c10, maintainer-ratified, 2026-06-23); no fresh work this session — VR-5 grounding on the prior checked landing."
    doc_refs:
      - corpus:ADR-022
      - corpus:ADR-021
      - corpus:DN-19
      - corpus:DN-25
    body: |
      DONE (closed by reference, 2026-06-23, kickoff c10): the supply-chain gate was landed by the
      original kernel-gate wave (M-652, PR #303) — deny.toml + just deny (cargo-deny + cargo-audit)
      wired non-silently into just check; tools installed by just setup with the skip-if-missing
      pattern. E10-1 re-scoped the row under ADR-022 T1 but the wiring was already present; the
      maintainer ratified T1 as met (refresh-status, no fresh gate run). Original task framing follows.

      ADR-021 Gate A4 requires cargo-deny and cargo-audit to be wired into just check and green.
      Currently both tools skip (not installed), so just check passes silently without supply-chain
      verification. For a 1.0.0 release, "just check green" must include license policy,
      duplicate-dependency hygiene, and known CVE checks. This is a prerequisite for the
      kernel's honesty claim at 1.0.0 — a silent skip is itself a never-silent violation (G2).

      User stories:
      - As a maintainer, I want just check to fail if a known CVE is present in the dependency
        tree, so that a supply-chain risk cannot silently ship in a 1.0.0 release.
      - As a downstream app developer, I want to know the Mycelium 1.0.0 release passed
        license and advisory checks, so that I can adopt it without a separate audit.

      Issues to resolve:
      - Which licenses should the deny.toml permit? (MIT/Apache-2.0/ISC at minimum; any others?)
      - How are known false-positive advisories handled (deny.toml ignore list)?

      Definition of Done:
      - cargo-deny and cargo-audit are listed in just setup and installed by it.
      - A minimal deny.toml is committed (licenses + advisories sections; documented rationale
        for any ignores).
      - just check runs cargo-deny and cargo-audit (skip-if-missing pattern for local envs
        without the tools; never silent in CI).
      - just check is green with both tools active on the release branch.
      - Gate A4 criterion is met.

  - id: M-703
    title: "M-703 — Cut core/kernel 1.0.0 + enact ADR-022 track T1 (maintainer-reserved)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:release, priority:P1, status:todo]
    depends_on: [M-700, M-701, M-702, E19-1]
    epic: E10-1
    doc_refs:
