      - corpus:RFC-0024
      - corpus:ADR-033
      - corpus:DN-56
      - src:docs/planning/road-to-1.0.0-and-mycelium-rewrite.md
      - src:docs/planning/Blocked-Decisions-Ratification-Map.md
    body: |
      EPIC (Phase-I H2a, kickoff `grm`; ADR-038 §2.7 + roadmap §5). Close the four grammar-
      stability items so the surface a mass port writes against is the final one: (1) the RFC-0037
      follow-ons (D2-b short repr keywords; RFC-0025 operator wiring); (2) DN-54 completion — the
      extension-checker verified complete + the derive-site consumption model resolved (already
      = DN-71 Model S, maintainer-ratified 2026-07-02 via `enb`); (3) the tuple-type decision
      (RFC-0024 §4A.8); (4) ADR-033 FLAG-1 (`FieldSpec::Fn`; DN-56 kernel-freeze condition 2).
      Then regenerate `mycelium.ebnf`, editor grammars, and the api-index, and propose the
      no-normative-change window. Rule (roadmap §5): no mass `.myc` porting against a moving
      grammar — this epic is the gate between `opp` and the Phase-II corpus port.

      Delegation (2026-07-02): the maintainer DELEGATED the design decisions — the dossier tasks
      (M-920 → DN-73, M-922 → DN-74, M-917 → DN-75) are NOT maintainer-blocked; the orchestrator
      decides per each dossier's recommendation and records the decision append-only. The
      no-normative-change window length is proposed in M-924 (Declared until set).

      Collision law: the implementation slots (M-915/M-916/M-919/M-921/M-923) touch the
      `mycelium-l1` frontend — the repo's one serial lane, shared with `enb` — so they run one at
      a time, after `enb`'s lane clears (status:blocked until then). The dossier/audit tasks are
      docs-only and run in parallel with each other and with the lane.

      User stories:
      - As the mass-port effort, I want the grammar surface closed and dated, so that ported
        nodules never chase a moving target.
      - As the maintainer, I want the remaining grammar decisions closed via grounded dossiers
        under the 2026-07-02 delegation, so that "stable" is a checked claim, not a hope.

      Definition of Done: all four H2a items closed with their decisions cited (roadmap §5);
      `mycelium.ebnf` + editor grammars + api-index regenerated and stable; the window proposed
      (length = maintainer's call, Declared until set); every decision recorded append-only at
      its supportable strength (VR-5); doc-maintenance per `_doc-maintenance.md`.

      Children: M-915/M-916 (RFC-0037 follow-ons), M-917/M-918/M-919 (DN-54 completion),
      M-920/M-921 (tuple), M-922/M-923 (ADR-033 FLAG-1), M-924 (stability close-out).

