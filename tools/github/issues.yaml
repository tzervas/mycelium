  - id: M-793
    title: "M-793 -- memory-safe by default + explicit per-use unsafe escape (RFC-0034 §9, sharpens ADR-014)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P2, status:done]
    epic: E21-1
    depends_on: []
    doc_refs:
      - corpus:RFC-0034
      - corpus:DN-29
    body: |
      Sharpen the ADR-014 `permitted-but-warned` policy from a global toggle to an EXPLICIT PER-USE escape
      at the call site (RFC-0034 §9) -- so an unsafe mem op is a conscious, source-visible, grep-auditable
      choice, independent of the certification mode (even `fast` is memory-safe). ADR-014 is SHARPENED, not
      superseded (its dev/test warning + mandatory `// SAFETY:` still apply).
      Acceptance / DoD (TDD):
      - A `just`/security-review check asserts every `unsafe` block has an adjacent `// SAFETY:` and a
        per-use `#[allow(unsafe_code)]` (the ADR-014 follow-on, now enforced).
      - Trusted kernel crates (mycelium-core/-cert/-numerics/-vsa) stay unsafe-free (crate-level forbid).
      - check green; no new unsafe in the trusted base.

  - id: M-794
    title: "M-794 -- RFC-0034 §13 conformance suite + advance to Enacted-with-code (the E21-1 gate)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:verification, area:core-ir, priority:P1, status:done]
