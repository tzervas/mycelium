      RFC-0016 §4.3 Ring-0. The thin prelude: Value/Repr/Meta, Option/Result + error values, and the guarantee-lattice tags (Exact ⊐ Proven ⊐ Empirical ⊐ Declared), mostly re-exporting mycelium-core (RFC-0001; M-101) — NO new trusted code (KC-3). The foundation every other module builds on.
      Acceptance (needs-design): meets the M-501 §4.1 contract; adds no kernel surface (Ring-0 re-export only); the lattice tags + never-silent error values are the documented floor.

