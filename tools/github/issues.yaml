      - src:crates/mycelium-transpile/src/vet.rs:26
      - src:gen/myc-drafts/regenerate.sh:58
    body: |
      Filed 2026-07-12 at the DN-124 ratification close-out (mitigation #1 -- verified M-1079 free
      before minting; M-1078 was highest). DN-124 (Accepted 2026-07-12,
      `docs/notes/DN-124-Vet-Harness-Phylum-Visibility-And-Measurement-Basis.md`) verified the
      transpiler `--vet` loop and `gen/myc-drafts/regenerate.sh` check each emitted `.myc` in
      oracle (single-file) mode, which has zero phylum-import visibility -- so a correctly-resolved
      cross-nodule `use checkty.Width;` validates CLEAN under `myc check --phylum` but FAILS under
      oracle mode, making the whole cross-nodule/cross-phylum lever family (Import, DN-122
      external-trait impls, cross-phylum records) un-creditable even when the transpiler emits
      correctly. NOTE: the Import gap-class lever leaf (`claude/leaf/gc2-imp1-cross-nodule-symtab`,
      the finding's own source) is in-flight under the gap-close-2 wave and does not yet have its
      own minted M-id -- not added to depends_on here (flagged, not guessed, per G2/VR-5); a
      cross-reference should be added once that leaf's issue is filed.

      This issue tracks DN-124's ratified build (P-A + M-A, DN-124 SS5.3 Units 1-3):

      User stories (DN-124 SS10):
      - As a port-lever author, I want a correctly-emitted cross-nodule `use checkty.Width;` to be
        credited by `checked_fraction`, so that the Import / external-trait / cross-phylum levers I
        build are measured on the semantics of the real phylum build, not a counterfactual
        phylum-of-one.
      - As a maintainer reading the SS8 series, I want the one-time jump when the vet basis switches
        to be labeled a basis correction with its `Delta_basis`, so that I can trust every subsequent
        delta is a real transpiler/lever gain and never a ruler change dressed as progress (VR-5).
      - As a vet-harness consumer, I want a phylum with one gapped nodule to still credit its clean
        nodules without ever crediting a nodule whose cleanliness depended on the gapped one, so that
        the metric is both more informative and never false-clean (the import-closure invariant, G2).
      - As a kernel maintainer, I want this fix to reuse `check_phylum` unchanged, so that the small
        auditable kernel (KC-3) grows by zero and the driver composes the trusted resolver rather
        than duplicating it (DRY).

      Definition of Done (DN-124 SS8, restated as this issue's build gate):
      - Unit 1 -- `mycelium-check` partial verdicts: `PhylumReport` per-nodule `Clean|CheckError|
        Blocked` via the SS2.2 closure re-check, with the soundness / never-false-clean /
        monotonicity / never-fabricate property tests green.
      - Unit 2 -- `mycelium-transpile` phylum/directory vet mode (SS3.1): consumes the partial
        verdicts, dual-reports both fractions over one denominator, with
        `checked_fraction_phylum >= checked_fraction_oracle` and `Delta_basis` arithmetic verified.
      - Unit 3 -- `regenerate.sh` + CLI batch glue (SS3.2): semcore transpiled + vetted as one phylum
        with the cross-nodule `use checkty....` references resolving (the `lib.rs:530-560` witness,
        at the harness level); stdlib crates gain partial verdicts.
      - `vet.json`/manifest dual-report both fractions for the transition cycle with `Delta_basis`
        labeled; the historical oracle SS8 series annotated, never rewritten (house rule #3).
      - The emitted `.myc` stays `Declared` and the vet verdict `Empirical` (never upgraded past its
        checked basis, VR-5).
      - `mycelium-check` (and `mycelium-l1` if touched) is a base crate (DN-20) -- change-scoped
        tests run in cloud (`cargo test -p mycelium-check`, `-p mycelium-transpile`); the full sweep
        is desktop-held (`just check-canary` per-promotion; `just check-full` on the desktop).

  - id: M-1080
    title: "M-1080 -- external-trait-impls MVP: transpiler rule-swap (WU-A) + prelude-seed target-trait availability (WU-B) (DN-122)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:todo]
    epic: E28-1
    depends_on: [M-1060, M-1079]
    doc_refs:
      - "corpus:DN-122#13-build-ready-mvp-re-verified-post-m-1060-2026-07-12-empirical-dev-b36ebdbe"
      - src:crates/mycelium-transpile/src/emit.rs
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      Filed 2026-07-12 at the DN-122 ratification close-out (mitigation #1 -- verified M-1080 free
      before minting; M-1079 was highest). DN-122 (Accepted 2026-07-12,
      `docs/notes/DN-122-External-Trait-Impls-Across-The-Home-Boundary.md` SS13) ratified the
      build-ready MVP: the single-parameter, param-only-signature foreign-trait-impl class
