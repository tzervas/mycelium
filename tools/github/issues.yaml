  # 2026-06-19: Wave-1 native continuation — Increment-2 (closures App/Lam + heap). Continues M-373.
  - id: M-378
    title: "M-378 — Direct-LLVM backend: native closures (App/Lam) + heap (Increment-2 of M-373)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-373]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: M-378 — direct-LLVM native closures (App/Lam) + heap, Increment-2 of M-373)'"
    doc_refs: [corpus:RFC-0004, corpus:DN-15, src:crates/mycelium-mlir/src/llvm.rs, src:crates/mycelium-mlir/tests/native_differential.rs]
    body: |
      Increment-2 of the direct-LLVM native path (DN-15 §4.2/§7; RFC-0004 §11.5; the FOLLOW-ON minted from M-373). Turn the `App`/`Lam` explicit UnsupportedNode refusals in llvm.rs into real native closure codegen via closure-conversion: free-variable analysis over the ANF body -> heap closure record `[fn_ptr | captures]` + a top-level `@closure_N(i8* env, i64 arg)` function -> indirect call for `App`. Zero libMLIR (textual LLVM IR -> llc+clang). `Fix`/`FixGroup` STAY explicit UnsupportedNode (Increment-3, separate later session; never silent, G2). MLIR dialect half stays M-348 (blocked).
      Design forks (resolved with maintainer, grounded in DN-15 §7 / RFC-0004 §11.5): (a) NO-GC heap strategy = bump arena, freed at exit — Inc-2 has no recursion so closure allocations are statically bounded; one `@malloc`d block + a single `@myc_arena_alloc` seam (never-silent over-capacity `@abort`), `@free`d before normal completion; the seam is where Inc-3 attaches the DepthBudget ceiling (DN-05 #1, M-349) — designed in, not retrofitted. (b) Closure value ABI = narrow: `Binary{8}` values packed as one `i64` (`define i64 @closure_N(i8* %env, i64 %arg)`); other widths/Ternary/datums-across-boundary/currying/non-closure-App-head/closure-valued-program-result are all explicit UnsupportedNode (G2).
      Scope: IN = App/Lam + heap. OUT = Fix/FixGroup (Inc-3), MLIR dialect (M-348 blocked), general GC. KC-3 — touch only crates/mycelium-mlir (+ its tests); mycelium-core/-interp READ-ONLY (free-var analysis runs entirely off the public ANF accessors — no core change needed). Guarantee tag stays `Declared` (hand-written IR + empirical differential, not Proven — VR-5). Every lowering stage dumpable (no opaque pass — RFC-0004 §6/VR-4).
      Acceptance: applied closures compile + run natively and hold the M-302/M-210 three-way differential (interp ≡ AOT env-machine ≡ native) over a new closure_corpus; Fix/FixGroup + closure-valued results + currying stay honest UnsupportedNode; cargo test -p mycelium-mlir + full `just check` green.
      DONE (2026-06-19; Wave-1 Increment-2): llvm.rs lowers App/Lam via closure-conversion — closure_free_vars (lexical free-var analysis over the public ANF, no mycelium-core change) -> heap closure record `[fn_ptr | packed captures]` on a bump arena (single `@myc_arena_alloc` seam; never-silent over-capacity `@abort`, the Inc-3 DepthBudget attachment point) -> indirect `call i64 %fp(i8* %env, i64 %arg)`. Narrow ABI: Binary{8} packed/unpacked to i64 at the boundary. Fix/FixGroup, currying, closure-valued program results, closures-over-non-Binary{8}, and trit-in-closure stay explicit UnsupportedNode (G2). M-302 differential extended with a 7-program closure_corpus (incl. a nested capturing lambda) + a body-discriminating mutant-witness + the refusal-parity test; closure-free programs emit byte-identical IR (no arena). JIT path refuses closures explicitly (AOT-only). 11 mlir differential tests green; full local suite green (deny/audit skip — tools absent). Guarantee `Declared` (hand-written IR + empirical differential, not Proven — VR-5). Increment-3 (Fix/FixGroup recursion + DN-05 #1 stack-robustness) stays the next separate session (M-379, to be minted at that gate).

  # 2026-06-19: captured bug (maintainer to fix) — GH project sync robustness.
  - id: M-382
    title: "M-382 — gh-issues-sync.py: ProjectV2 graphql pagination aborts on transient `gh api graphql` EOF (add retry/backoff)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:toolchain, priority:P3, status:done]
    depends_on: []
    landed_date: 2026-06-20
    landed_basis: "CHANGELOG.md '### Fixed (2026-06-20: M-382 — `gh-issues-sync` EOF-aware retry/backoff + fault-tolerant migration + `--verbose`)'"
    doc_refs: [src:tools/github/gh-issues-sync.py]
    body: |
      BUG (captured 2026-06-19; maintainer will fix later). The GitHub Project-v2 reconcile in tools/github/gh-issues-sync.py walks `... ProjectV2{ items(first:100, after:<cursor>) }` over `gh api graphql` via the `gh_graphql()` helper (~L152). A transient network failure mid-pagination — observed `gh: Post "https://api.github.com/graphql": unexpected EOF` (gh exit 1) — propagates out of `gh()`/`gh_graphql()` and ABORTS the whole sync, even though the same network-error class is already classified with a hint at gh-issues-sync.py:132. The paginated query is read-only/idempotent, so it is safe to retry.
      Fix direction (policy is maintainer's call): wrap the `gh api graphql` calls (at least the paginated ProjectV2 reads) in a bounded retry with exponential backoff on the transient-network error class the :132 hint already recognizes; surface an explicit error only after retries are exhausted (never-silent, G2). Mutations stay idempotent/safe to re-run (the script's create-if-absent + update-to-match posture already supports re-runs).
      DONE (2026-06-20, PR #238): centralized EOF-aware transient retry/backoff in `_run_gh` (a new pure `_is_transient_network` recognizes `unexpected eof`/reset/tls/io-timeout + the prior DNS/dial/timeout set — the original symptom was misclassified as non-retryable; 4 retries, 1/2/4/8s, never-silent per-retry line) covering EVERY gh call. Also hardened the noncompliant-label migration to be fault-tolerant (one failing per-issue relabel no longer aborts the batch; open issues first; a stale label is never deleted while issues still carry it — G2) and added `--verbose` (echoes each `→ gh <args>` so a hang is pinpointable). --self-test + full `just check` green.
      Scope: tooling-only (tools/github/gh-issues-sync.py); no kernel/spec impact. Not started.

  # 2026-06-19: Wave-1 native continuation — Increment-3 (tail recursion + Binary branch). Continues M-378.
  - id: M-379
    title: "M-379 — Direct-LLVM backend: native tail-recursion (Fix) + Binary branch primitive (Increment-3 of M-373)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-378]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: M-379 — direct-LLVM native tail-recursion (Fix) + Binary branch, Increment-3 of M-373)'"
    doc_refs: [corpus:RFC-0004, corpus:DN-15, corpus:DN-05, src:crates/mycelium-mlir/src/llvm.rs, src:crates/mycelium-mlir/tests/recursion_differential.rs]
    body: |
      Increment-3 of the direct-LLVM native path (DN-15 §4.3/§8; RFC-0004 §11.6; DN-05 #1; the FOLLOW-ON minted from M-378). Turn the `Fix` UnsupportedNode refusal into native STACK-ROBUST recursion, plus a Binary branch primitive so terminating recursion is expressible and value-checked against the interpreter.
      Design forks (resolved with maintainer, grounded in DN-05 #1 and the aot.rs trampoline reference): (a) MECHANISM = tail-recursion-as-loop: a tail-position self-recursive `Fix` lowers to an iterative LLVM loop (O(1) C stack BY CONSTRUCTION — DN-05 #1 compliant, no unbounded C stack, never SIGSEGV), guarded by an AutoDepthBudget-resolved ceiling (budget.rs; M-349) that raises a graceful DepthLimit (generalizing the Inc-2 @myc_arena_alloc never-silent seam to a depth counter). NON-tail recursion stays explicit UnsupportedNode (later increment); FixGroup (mutual recursion) stays explicit UnsupportedNode (later increment). (b) BRANCH PRIMITIVE = native `Match` with `Lit` arms on a Binary lane: compare the scrutinee lane to each literal Binary value and branch — the base-case conditional terminating recursion needs. Extends the Inc-1 Match codegen (Datum scrutinee + Ctor arms) to a repr-lane scrutinee + Lit arms.
      Scope: IN = tail-recursive Fix + Binary Lit-arm Match + DepthBudget ceiling/DepthLimit. OUT = non-tail Fix, FixGroup, recursive heap data (all explicit UnsupportedNode, G2), MLIR dialect (M-348 blocked). Narrow Binary{8} ABI continues. KC-3 — touch only crates/mycelium-mlir (+ its tests); mycelium-core/-interp READ-ONLY (FLAG up). Guarantee `Declared` (hand-written IR + empirical differential, not Proven — VR-5). Every lowering stage dumpable (no opaque pass — RFC-0004 §6/VR-4).
      Acceptance: a terminating tail-recursive Binary{8} program (e.g. an iterate/countdown mod 256) compiles + runs natively and holds the M-302/M-210 three-way differential (interp ≡ AOT env-machine ≡ native); a non-terminating recursion hits a graceful DepthLimit (parity with the interpreter's non-productive refusal — never SIGSEGV); non-tail Fix + FixGroup + recursive data stay honest UnsupportedNode; cargo test -p mycelium-mlir + full `just check` green.
      DONE (2026-06-19; Wave-1 Increment-3, swarm-built): STAGE 1 (parent) — factored the two duplicated Match handlers into one shared `lower_match` and added the Binary branch primitive (repr-lane scrutinee + `Lit` arms → pack lane, `switch i64` on packed literals; `lit_binary8_packed`); `binary_branch_corpus` value-checked interp≡native. STAGE 2 (Sonnet leaf, isolated worktree, deconflicted/pulled-down to parent) — `App(Fix{λparam.Match}, init)` lowers to an iterative LLVM phi loop: depth-counter checked each iteration against an `AutoDepthBudget`-resolved ceiling (budget.rs, M-349) → graceful `AotError::DepthLimit` via a distinct read-back sentinel (`#`), never SIGSEGV/hang (host C stack O(1) by construction — DN-05 #1). `EnvValue::Fix(FixVal)` defers lowering to the application site; tail-position classification (`classify_arm`/`anf_refs_name`); the diverging no-base-case exit traps with `@abort`+`ret` (never raw `unreachable`, G2). NON-tail Fix, FixGroup, non-λ.Match Fix bodies, recursion over non-Binary{8}, and a bare-Fix result all stay explicit UnsupportedNode (G2). New tests/recursion_differential.rs: countdown + one-step value-checked interp≡native, a non-terminating program → graceful DepthLimit, + 3 refusal tests. 114 mycelium-mlir tests green; clippy -D warnings clean; guarantee `Declared` (VR-5). FULL trampoline (general non-tail recursion) + FixGroup + recursive heap data remain deferred to a later increment (DN-15 §8.1/§8.5).

