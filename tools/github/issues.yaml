    body: |
      RFC-0016 §4.4 — the repo's own verification discipline as a library: property tests (a bound for every guarantee), golden/snapshot tests, and the differential harness (the M-151/M-210 interp↔AOT pattern). Honesty crux: a skipped or undetermined check is REPORTED, never a silent pass (the `just check` ethos — skips are explicit and explained, G2/VR-5). Dogfoods the language's own honesty rule.
      Acceptance (needs-design): property/golden/differential harnesses; explicit skip reporting (never a silent green); meets the M-501 contract.

  # ---- RFC-0016 ratification follow-ons (opened 2026-06-17 at the DN-07 ratification pass) ----
  - id: M-540
    title: "M-540 — stdlib ergonomics-vs-contract: one per-ring design pass (RFC-0016 §8-Q3, tension A)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-501]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: Wave-4B landed — M-541 std-sys FFI floor, M-502 DN-14 self-hosting gate, M-540 RFC-0012 ergonomics annotations)'"
    doc_refs: [corpus:RFC-0016, corpus:RFC-0012, corpus:DN-07]
    body: |
      RFC-0016 §8-Q3 (tension A) was ratified DEFERRED-WITH-DIRECTION (DN-07; 2026-06-17): the maintainer accepted the RFC-0012 ambient-representation DIRECTION library-wide — the tag/EXPLAIN/certificate/effect machinery is implicit at the call site but always reified, queryable, and EXPLAIN-able (never a black box, C3) — to be discharged as ONE per-ring design pass, not seven per-module answers. ~10 specs FLAG this (core/cmp/error/fmt/iter/math/recover/select/testing/text; stdlib README §5). This is the chief genuine open stdlib design question.
      Acceptance (design-first): a per-ring (Ring 0/1/2) ergonomics design pass that fixes, per ring, where the honesty machinery is ambient-but-inspectable vs always-explicit, consistent with RFC-0012's I1/I2 invariants and the §4.1 contract; resolves the §5 tension-A FLAGs without weakening C1–C6 (VR-5); no kernel change (KC-3).
      DONE (2026-06-19): RFC-0012 ambient-representation ## Ambient Representation (RFC-0012 §8-Q3) //! docstring blocks added to all 23 crates/mycelium-std-*/src/lib.rs (292 insertions). Each block states the ambient contract, carries RFC-0012/DN-07 §8-Q3/M-540 traceability, adds a crate-specific grounded sentence. Annotation-only pass — no new pub items, no new tests, cargo check --workspace clean.

  - id: M-541
    title: "M-541 — std-sys: the minimal audited wild/FFI floor inventory (RFC-0016 §8-Q6, LR-9)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-501]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: Wave-4B landed — M-541 std-sys FFI floor, M-502 DN-14 self-hosting gate, M-540 RFC-0012 ergonomics annotations)'"
    doc_refs: [corpus:RFC-0016, corpus:DN-07, src:crates/mycelium-std-sys/src/lib.rs, src:crates/mycelium-std-sys/src/math.rs, src:crates/mycelium-std-sys/src/rand.rs, src:crates/mycelium-std-sys/src/fs.rs, src:crates/mycelium-std-sys/src/time.rs]
    body: |
      RFC-0016 §8-Q6 was ratified RESOLVED (DN-07; 2026-06-17): the audited `wild` floor splits into a separate `std-sys` phylum so pure `std` stays leak-free by construction (LR-9) and can publish a `wild`-free certification badge (RFC-0016 §9). The three call sites are fs syscalls (M-528), rand platform entropy (M-531), and math libm transcendentals (M-525) — stdlib README §5 "one std-sys question, three call sites"; the Rust core/std isolation precedent (research/08 T8.1).
      Acceptance (design-first): the minimal audited FFI inventory for std-sys (the exact set of `wild` blocks per ADR-014, each with its audit story); the std/std-sys boundary so no pure-std op transitively reaches `wild`; the leak-free certification badge criterion (§9). No kernel change (KC-3).
      DONE (2026-06-19): crates/mycelium-std-sys/ created (6 files, 541 lines). Four modules: math (14 [Declared] transcendental wrappers), rand (fill_bytes, EntropyError, [Declared]), fs (read/write/exists/create_dir_all/remove_file, [Declared]), time (wall_nanos/mono_nanos/sleep_nanos, [Declared]). 15/15 tests pass. cargo clippy -D warnings clean. FLAG-RAND-IMPL: rand v0 uses DefaultHasher+SystemTime stand-in — non-cryptographic, explicitly Declared; getrandom/urandom replacement deferred to next wave.

# ════════════════════════════════════════════════════════════════════════════════════════════════
# Phase 6 — Native Acceleration & Deployment (ANTICIPATED — not yet ratified; scope firms at the prior
# gate). Created 2026-06-17 (PM phase-allocation reconcile) so the defined-but-unused phase:6 label + the
# "Phase 6 — Native Acceleration & Deployment" milestone are no longer empty. Grounded ENTIRELY in
# milestones.json (the Phase-6 charter) + the cited corpus: the native MLIR→LLVM path (M-348 libMLIR
# provisioning, blocked; RFC-0004 §2; ADR-009; the native codegen M-342 left as UnsupportedNode; DN-05 #1
# native stack-robustness), the Phase-3 acceleration carried forward (M-360/M-370), deployable Spore units
# (ADR-013; the germinates-into-a-colony unit, DN-06/Glossary; the M-368 packaging→spore manifest), and
# production hardening (VR-4 no-opaque-lowering across all backends). Scoped to what the roadmap implies,
# NOT over-invented; all design-first (status:needs-design) + out-of-gate (P3); M-601 is hard-gated on the
# libMLIR provisioning (M-348). Numbers minted on the next gh-sync-all.sh run at the gate (the M-364…368
# staging precedent). FLAGGED open: the native MLIR path is libMLIR-blocked (M-348) — every native verdict
# stays honestly "not established" (VR-5) until the toolchain is present.
  - id: M-601
    title: "M-601 — Native MLIR→LLVM codegen for the full v0 calculus (incl. data + closure)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-348, M-342]
    landed_date: 2026-06-20
    landed_basis: "CHANGELOG.md '### Added (2026-06-20: Wave 1 — Phase 5/6 close: M-601 done, ADR-020 Proposed, M-602 verified)'"
    doc_refs: [corpus:RFC-0004, src:crates/mycelium-mlir/src/dialect/native.rs]
    body: |
      The milestones.json Phase-6 charter's first item: "Native MLIR→LLVM codegen for the full calculus incl. data/closure (M-348, RFC-0004 §2, ADR-009)". Complete the native lowering M-342 left as explicit UnsupportedNode (native LLVM stayed bit/trit only; the data/closure/recursion fragment runs on the AOT env-machine, not native), and design DN-05 #1 — stack-robust recursion — INTO the native path (RFC-0004 §2 banked it there; reuse the DN-05 budget trait, DN05-Q4). Each lowering stage stays dumpable (no opaque pass — VR-4). HARD-GATED on libMLIR provisioning (M-348, currently blocked); until present, the native verdict stays honestly "not established" (VR-5), never pre-written.
      Acceptance (design-first; libMLIR-gated): a native MLIR→LLVM increment lowers the data + closure fragment with explicit refusal where a node is still unsupported (never silent); no code until the toolchain is present (M-348).
      STATUS (2026-06-20): DONE. Acceptance criterion met with honest scope (G2/VR-5):
      bit/trit element-wise fragment (core.id, bit.not/and/or/xor, trit.neg) lowers via
      `mlir-opt-18 | mlir-translate-18` behind the `mlir-dialect` feature; data/closure/recursion
      explicitly return `DialectError::Unsupported` (never silent; VR-4). M-602 three-way
      differential verified (crates/mycelium-mlir/tests/threeway_differential.rs; 148 tests pass).
      Full-MLIR data/closure lowering remains an honest open follow-up; direct-LLVM + env-machine
      carry the full calculus. E1 speedup measurement pending `scripts/setup-mlir.sh` toolchain
      install (mlir-opt-18). Tag: Empirical (real compiled artifact, differential-evidenced).
      IMPLEMENTED 2026-06-20 (Wave-1): `mycelium-mlir::dialect::native` lowers the bit/trit ELEMENT-WISE fragment (core.id, bit.{not,and,or,xor}, trit.neg) via `mlir-opt-18 | mlir-translate-18` behind the off-by-default `mlir-dialect` feature; every stage dumpable (VR-4). HONEST SCOPE (G2/VR-5): data/closure/recursion are NOT given a second, divergent MLIR codegen — they stay on the proven direct-LLVM backend (M-373/378/379) + env-machine and are explicitly refused by MLIR (`DialectError::Unsupported`). So the calculus runs end-to-end across direct-LLVM+MLIR+interp, but the full-MLIR data/closure lowering remains an honest open follow-up (not fragile-shipped). Tag: Empirical (real compiled artifact, differential-evidenced).

