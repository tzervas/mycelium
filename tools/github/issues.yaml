      EPIC. Full LSP + rich diagnostics; linter/formatter maturity; build-system stable/experimental management + content-addressed caching + certificate artifacts.

  - id: E3-4
    title: "E3-4 (epic) — JIT optimization"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:execution, priority:P2]
    depends_on: [E2-3]
    body: |
      EPIC (ADR-009). JIT for dynamic/long-running VSA pipelines; same lowering + runtime specialization. Exit: NFR-7 equivalence + speedup target.

  - id: E3-5
    title: "E3-5 (epic) — Resonator factorization (opt-in, probabilistic)"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:vsa, priority:P2, status:needs-design]
    depends_on: [E2-4, E2-5]
    body: |
      EPIC (FR-C2/G4). Factorization for unknown-factor products; per-factor codebooks + approximate inverse; probabilistic-only guarantee; never in core. Exit: documented convergence regime + bounds.

  - id: E3-6
    title: "E3-6 (epic) — BitNet-class packed-ternary acceleration"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:execution, priority:P2]
    depends_on: [E2-7]
    body: |
      EPIC (FR-C3/G3). Production acceleration paths beyond the Phase-2 selector baseline.

  - id: E3-7
    title: "E3-7 (epic) — Native-ternary forward-compatibility path"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:execution, priority:P2]
    depends_on: [M-150, E2-7]
    body: |
      EPIC (R7). Documented mapping from the ternary value-semantics contract to a future 3-state hardware backend; stubbed dialect target.
