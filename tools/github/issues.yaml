    depends_on: []
    landed_date: 2026-07-06
    landed_basis: "Verified per mitigation #14 (verify-first): the deterministic rule was already implemented + self-tested; git -S locates the engine+config multi:'primary' at the #1022 merge. Engine: gh-issues-sync.py label_to_field_values honours a field_label_map rule carrying multi:'primary' — a multi-area item anchors to the PRIMARY area (value earliest in the field's declared project.json option order; alphabetical tie-break for any value outside it) and records the full span as a never-silent info, so the 'multiple area:* labels — not set' branch is never taken for Area (G2). Config: project.json field_label_map.Area carries multi:'primary' (config-to-engine wiring asserted by --self-test). Wiring: reconcile_project builds field_option_order from project.json fields, passes it to label_to_field_values, and prints infos non-silently. Tests: --self-test covers the primary anchor + span, the preserved default flag path (Phase/Priority two-value conflict), single-area unaffected, out-of-order alphabetical tie-break, and the project.json multi:'primary' assertion (exits 0). Corpus check: an offline dry-run-equivalent over all 512 area-bearing issues.yaml items yields 0 'Area: ... — not set' punts. This close-out (branch claude/tul-m676-projects-v2-area) documents the rule in the project-v2-spec.md companion (Label-to-field mapping section) and refreshes the stale Area option list to the 12 project.json options, then flips status. Acceptance met: deterministic Area value for multi-area items; --self-test covers the rule; no 'not set' punt for any item with at least one area label. FLAG: the CHANGELOG.md 'Added' entry is deferred to the integrating parent (CHANGELOG is orchestrator-owned, not tul-owned)."
    doc_refs: [src:tools/github/gh-issues-sync.py, src:tools/github/project-v2-spec.md]
    body: |
      DONE (2026-07-06): the deterministic, honest multi-area rule is implemented + self-tested. The Projects-v2 **Area** single-select anchors a multi-`area:*` item to its PRIMARY area — the value earliest in the field's declared `project.json` option order (alphabetical tie-break for any value outside it) — and records the full span as a never-silent `info`, so an item carrying at least one area label is never left `Area: … — not set` (G2), mirroring the #353 primary-task milestone anchor. `project.json` `field_label_map.Area` carries `multi: primary`; `label_to_field_values` + `reconcile_project` implement and print it (`field_option_order` built from `project.json` `fields`); `--self-test` covers the primary anchor, span, preserved default flag path (Phase/Priority), single-area, and out-of-order tie-break (exits 0); an offline dry-run over all 512 area-bearing items shows 0 "not set" punts. This close-out documents the rule in `project-v2-spec.md` (the companion doc had not described it) and refreshes the stale Area option list to the 12 `project.json` options. Verified per mitigation #14 (code already landed; `git -S` locates it at the #1022 merge). — Original task:
      SECONDARY / nice-to-have (maintainer-flagged 2026-06-22). When a PR/issue carries multiple `area:*` labels, the Projects-v2 **Area** single-select field is left "not set" (`! #NNN: Area: multiple area:* labels [...] — not set`). Decide + implement a deterministic, honest rule for the single-select field under multi-value labels — likely anchor to the PRIMARY area (first/declared `area:*`, mirroring the primary-task milestone fix landed in #353) with the span recorded, or a dedicated multi-select field. Low priority — does NOT block the language/dogfooding work (E7-1 chain + dfb).
      Acceptance: a multi-`area:*` item gets a deterministic Area field value (never a silent skip); `--self-test` covers the rule; a dry-run shows no "Area: ... — not set" punts for items carrying at least one area label.
  - id: M-660
    title: "M-660 — spec + feat(l1): Effect annotations on fn signatures (RFC-0014 stage-1 surface)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-659]
    epic: E7-1
    doc_refs: [corpus:RFC-0014, corpus:RFC-0007, src:crates/mycelium-l1/src/ast.rs]
    body: |
      DONE (2026-06-22): effect annotations land on fn signatures — surface `fn … -> ret !{eff1, eff2}` (maintainer-decided `!{}`; absent ⇒ pure; effect names = identifiers; duplicate = parse refusal — G2); `ast.rs` `FnSig.effects`, `Tok::Bang`. The `checkty.rs` **effect-coverage** pass enforces **declared ⊇ performed** (performed = union of every callee's declared effects — a top-level fn OR an unqualified trait method — checked over fn AND impl-method bodies, so no effect is hidden from a caller; under-declaration = explicit `CheckError`, over-declaration OK — I5). Guarantee `Declared`; no new L0 node (KC-3). RFC-0014 §3.4 pins the surface (append-only, still Enacted); DN-14 §3 row 8 → `present`. **Deferred (was task 5, out of scope):** wiring declared effects into the `mycelium-interp::budget` runtime ledger + per-effect budget syntax (`retry(<=3)`) → **M-677**; `wild`-sourced effects → M-661. 203 `mycelium-l1` tests green (effect suite + monotonicity property + trait/impl conformance + a soundness regression for trait-method/impl-body coverage). — Original task:
      RFC-0014 §4.3 defines declared effects (RT3); the L1 surface has no effect-annotation syntax in `FnSig` or `FnDecl` (DN-14 §3 row 8). This issue: (1) amends RFC-0007 or RFC-0014 to define the stage-1 surface syntax (`fn f() -> T / {time, entropy}`); (2) extends `ast.rs` `FnSig` with an effects field; (3) adds effect-annotation parsing to `parse.rs`; (4) implements an effect-checking pass in `checkty.rs` (declared effects propagate; undeclared effect in a callee is a `CheckError` — I3); (5) wires declared effects into the `mycelium-interp::budget` ledger (M-353 landed the enforcement mechanism). Effect inference is monotone (adding a callee never removes effects from the caller) — property tested.
      Acceptance: `fn rng() -> Binary{64} / {entropy} = wild { … }` is a valid annotated signature; an unannotated caller of `rng` is a `CheckError`; property test for monotone effect inference; DN-14 §3 row 8 → `present`.

  - id: M-677
    title: "M-677 — feat(runtime): wire declared effects → mycelium-interp budget ledger + per-effect budget syntax"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-660]
    epic: E12-1
    doc_refs: [corpus:RFC-0014, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      M-660 landed the effect-annotation SURFACE + the checker-side coverage check (declared ⊇ performed); it does NOT wire declared effects into the runtime. This issue: (1) thread a fn's declared effect set through elaboration to the L0 evaluator so the `mycelium-interp::budget` ledger (M-353) is primed/consumed per declared effect; (2) add the per-effect BUDGET surface syntax (`!{retry(<=3), alloc(<=64KiB)}` — RFC-0014 §3.4/I4) that M-660 left out (M-660 parses the effect SET only); (3) an overrun yields the explicit `EffectBudgetExhausted` (RFC-0014 I4), never a hang/OOM. No new L0 node (KC-3) — effects stay metadata threaded as budgets. Acceptance: a budgeted effectful fn runs under its budget and yields `EffectBudgetExhausted` on overrun; the M-210 three-way differential agrees; property test for budget monotonicity.
  - id: M-678
    title: "M-678 (epic) — Unsafe-code hardening (DN-21): justify, confine, and lifetime-bind the JIT FFI"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:epic, area:execution, priority:P2, status:done]
    doc_refs: [corpus:DN-21, corpus:ADR-014, src:crates/mycelium-mlir/src/jit.rs]
    body: |
      Parent for the DN-21 unsafe-code hardening survey. At survey time the workspace had exactly 6 `unsafe` blocks, all dynamic-linking FFI in `crates/mycelium-mlir` (`jit.rs` ×4: dlopen/dlsym/dlclose/transmute-call; `bitnet.rs:349`; `specialize.rs:128`); 29 crates were `#![forbid(unsafe_code)]` and the interpreter trusted base unsafe-free. All 6 carried ADR-014 `// SAFETY:` comments (3 thin, none wrong). This epic enacts ADR-014's named follow-ons + closes the `BitnetDotKernel` co-location dangling-ptr risk, all behaviour-preserving and zero-new-dependency. Children: M-679 (quick-win SAFETY hardening), M-680 (forbid-pin the trusted base + zero-unsafe mlir submodules), M-681 (`just safety-check` adjacency gate), M-682 (in-house `Sym<'lib,T>` lifetime-binding newtype), M-683 (document the audit_wild/.rs scope split). See DN-21 §6 for the priority/risk table; §7 names the irreducible-unsafe floor (do NOT rewrite the SIMD in Rust intrinsics — it lives in JIT'd LLVM IR by design). LANDED (#373/#374): all children done. After M-682 the `bitnet.rs`/`specialize.rs` call-site `unsafe` no longer exist — the entire workspace unsafe surface is now confined to `crates/mycelium-mlir/src/jit.rs` (the FFI + one private `unsafe fn` ABI choke-point + its audited safe accessors); DN-21 §6 holds the current per-site inventory.

  - id: M-679
    title: "M-679 — chore(mlir): strengthen the 3 thin JIT-FFI `// SAFETY:` comments + add null-ptr debug_asserts"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:chore, area:execution, priority:P1, status:done]
    depends_on: [M-678]
    doc_refs: [corpus:DN-21, corpus:ADR-014, src:crates/mycelium-mlir/src/jit.rs]
    body: |
      DN-21 §3/§4: three `// SAFETY:` comments are thin (none wrong). Strengthen them — behaviour-preserving (docs + dev-asserts only): (1) `jit.rs:150` `dlclose` — state the dangling-pointer obligation (no derived symbol ptr may outlive the `Lib`; §4); (2) `jit.rs:181` `dlsym` — spell out the handle-liveness chain (`self.0` is non-null by `open_lib` construction); (3) `jit.rs:168` `dlopen` — note the `RTLD_NOW = 2` platform assumption + the no-global-ctors fact. Add `debug_assert!(!ptr.is_null())` at the 4 FFI/transmute sites so the "checked non-null" preconditions are machine-checked in dev/test builds (zero release cost — ADR-014 dev-warn ethos). Acceptance: comments updated, asserts in place, `just check` green, no behaviour change.

  - id: M-680
    title: "M-680 — chore: re-pin `#![forbid(unsafe_code)]` on the trusted base + zero-unsafe mlir submodules"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:chore, area:execution, priority:P1, status:done]
    depends_on: [M-678]
    doc_refs: [corpus:DN-21, corpus:ADR-014]
    body: |
      DN-21 §5 F-1/F-2: convert "no unsafe by convention" into compiler-enforced. (1) Add `#![forbid(unsafe_code)]` to the ADR-014-designated trusted base that lacks it — `mycelium-core`, `mycelium-cert`, `mycelium-numerics`, `mycelium-vsa`, `mycelium-interp`, `mycelium-select` (all zero-unsafe today; ADR-014 recommends this). (2) Add a per-file `#![forbid(unsafe_code)]` to the 11 zero-unsafe `mycelium-mlir` submodules (`aot`, `llvm`, `pack`, `dialect`, `runtime`, `simd`, `inject`, `budget`, `channel`, `deploy`, `vr4`), confining unsafe to exactly `jit`/`bitnet`/`specialize` while the crate stays `"warn"` for those three. Acceptance: the pins compile (proving zero-unsafe), `just check` green; a deliberate `unsafe` added to any pinned module now hard-fails (mutant-witness).

  - id: M-681
    title: "M-681 — infra(check): `just safety-check` — assert every Rust `unsafe` has an adjacent `// SAFETY:`"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:infra, area:toolchain, priority:P2, status:done]
    depends_on: [M-678]
    doc_refs: [corpus:DN-21, corpus:ADR-014, src:scripts/checks]
    body: |
      DN-21 §5 F-3: close the ADR-014-named follow-on. Add a `just safety-check` recipe (skip-graceful shell/python, no new dependency) that finds every `unsafe {` / `unsafe fn` / `unsafe impl` in `crates/` and asserts a `// SAFETY:` comment within a small window above (the ADR-014 convention), failing loudly otherwise (G2). Wire it into `scripts/checks/all.sh` (the `just check` non-test gate set). On landing the gate is green (every workspace `unsafe`, all confined to `jit.rs`, carries its `// SAFETY:` block comment or `# Safety` doc); it prevents a future undocumented `unsafe` from slipping past the `"warn"` lint + review. Acceptance: gate green now; a deliberately un-commented `unsafe` trips it (mutant-witness); local↔CI parity preserved.

  - id: M-682
    title: "M-682 — feat(mlir): in-house `Sym<'lib, T>` newtype — lifetime-bind dlsym results to the owning Lib"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-678, M-679]
    doc_refs: [corpus:DN-21, corpus:ADR-014, src:crates/mycelium-mlir/src/jit.rs, src:crates/mycelium-mlir/src/bitnet.rs]
    body: |
      DN-21 §4/§6: close the `BitnetDotKernel`/`SpecializedDotKernel` co-location dangling-pointer risk (the `fptr: *mut c_void` raw field is kept live only by field-ordering convention, not a compiler-checked lifetime). Maintainer-chosen approach (over `libloading`): a small **in-house `Sym<'lib, T>` newtype** (zero new dependency — KC-3) that ties a `dlsym` result's lifetime to the `&'lib Lib` that owns it, so the borrow checker enforces "symbol does not outlive library" structurally. Replace the raw `fptr` field with the lifetime-bound type. The irreducible unsafe (calling the JIT'd fn-ptr; the ABI `transmute`) stays — DN-21 §7 — now behind a single audited choke-point. NEEDS-DESIGN: the kernel structs own their `Lib`, so a naive `Sym<'lib,T>` field is self-referential — design the ownership carefully (e.g. resolve-at-call-time keeping the current pattern but lifetime-expressed, or an owning-handle shape). Acceptance: no raw `*mut c_void` field survives; the JIT differential + workspace suite green (behaviour-preserving); no hot-path perf regression; no new dependency.

  - id: M-683
    title: "M-683 — docs(spec): document the `audit_wild` (.myc) vs `clippy -A unsafe_code` (.rs) two-population split"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:docs, area:spec, priority:P3, status:done]
    depends_on: [M-678]
    doc_refs: [corpus:DN-21, src:docs/spec/Security-Checks-Contract.md]
    body: |
      DN-21 §5 F-4: the `myc-sec` `audit_wild` gate scans `.myc` files for the in-language `wild { }` surface; it does NOT cover the Rust `unsafe { }` in `mycelium-mlir` (those are governed by `clippy -A unsafe_code` + the `// SAFETY:` convention + the new M-681 gate). This two-population model (`.myc` ⟂ `.rs`) is architecturally correct but implicit. Add one clarifying paragraph to `docs/spec/Security-Checks-Contract.md` §4 making the boundary explicit, so a reader does not mistake `audit_wild` for covering Rust unsafe. Docs-only. Acceptance: the §4 clarification lands; `just check` (doc gates) green.

  - id: M-661
    title: "M-661 — feat(l1): `wild` block typechecking — enable auditable FFI surface in std-sys context"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-660]
    epic: E7-1
    doc_refs: [corpus:RFC-0016, corpus:RFC-0006, corpus:DN-14, src:crates/mycelium-l1/src/checkty.rs, src:crates/mycelium-l1/src/lexer.rs, src:crates/mycelium-l1/src/elab.rs]
    body: |
      DONE (2026-06-22): the audited `wild`/FFI floor type-checks in `mycelium-l1`, gated to an explicit **`@std-sys` nodule-header attribute** (`nodule std.sys.fs @std-sys`) — **not** a naming convention (maintainer-decided). Atomic `Tok::AtStdSys` lexing (`lexer.rs`/`token.rs`; narrow whole-word — `@std`/`@ Exact`/`@std-system` unaffected) → `Nodule.std_sys` (`ast.rs`/`parse.rs`), threaded through ambient resolution + the resolved twin to `checkty.rs` `Cx::check_wild`. A `wild { body }` block type-checks **iff** it is inside a `@std-sys` nodule **and** its `fn` declares the **`ffi` effect** (`wild` is the `ffi` effect *source*, fed into the M-660 coverage pass); a `wild` elsewhere is a **hard `CheckError`** — the issue's "lint warning" wording is **amended to a hard refusal** (cleaner LR-9; never silent — G2). The `wild` body is the **trusted/opaque** FFI escape — NOT recursively type-checked (audited, not verified — VR-5/ADR-014) — so synthesis refuses with "ascribe …"; the gate covers **impl-method bodies** too. **Execution stays staged** (no FFI host in v0): `elab.rs` lowers `wild` → an explicit `Residual`, `eval.rs` refuses with a staged message (never a fabricated value — G2), consistent with M-657/659/660. Guarantee **`Declared`**; no `unsafe` added. `myc-sec` `audit_wild` (the `// SAFETY:` audit) is orthogonal + unchanged. DN-14 §3 row 9 → `conditionally present (audited, std-sys context; type-checks + gates; execution staged)`; RFC-0016 §8-Q6 + RFC-0006 LR-9 carry append-only "implemented Rust-first, pending ratification" notes. 217 `mycelium-l1` tests green (10 `wild` cases + lexer/parser unit tests + `accept/18-wild-std-sys.myc`); `cargo fmt`/`clippy --lib -D warnings`/`test -p mycelium-l1` green. — Original task:
      `checkty.rs` rejects all `wild` blocks ("denied by default, LR-9"). DN-14 §3 row 9 records this as a gate-fail. RFC-0016 §8-Q6 resolved that the audited `wild` floor splits into a `std-sys` phylum (M-541 design done). This issue implements the typechecker path that accepts `wild { body }` inside a function annotated with the appropriate effect set (e.g., `/ {ffi}`). The `myc-sec` wild-audit gate must flag any `wild` block in a non-`std-sys` nodule (never a silent accept — G2). Enables the three call sites: `fs` syscalls, `rand` entropy, `math` libm.
      Acceptance: `fn read_byte() -> Binary{8} / {ffi} = wild { … }` typechecks and runs; a `wild` block in a non-`std-sys` nodule is a lint warning; `myc-sec` wild-audit gate continues to flag unapproved wild blocks; DN-14 §3 row 9 → `conditionally present (audited, in std-sys context)`.

  - id: M-662
    title: "M-662 — feat(l1): `phylum` construct + cross-nodule import resolution"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-657, M-659]
    epic: E7-1
    doc_refs: [corpus:DN-06, corpus:RFC-0006, corpus:RFC-0019, src:crates/mycelium-l1/src/parse.rs, src:crates/mycelium-l1/src/checkty.rs, src:crates/mycelium-l1/tests/phylum.rs]
    body: |
      `phylum` is lexed as `Tok::Phylum` (token.rs:29) but no parser production consumes it — falls to error arm (parse.rs:218); confirmed by lib.rs:87–95 test. This issue implements: (1) `phylum <path> { … }` header construct in the parser and typechecker (library-scale organizational unit per DN-06 §4); (2) cross-nodule `use` path resolution so `use std.collections.List` resolves across phylum boundaries; (3) multi-nodule typechecking (a phylum's nodules see each other's exported names). Requires generics (M-657) and traits (M-659) to already be in the typechecker because a phylum's public surface will include generic types and trait impls.
      Acceptance: a two-nodule phylum with cross-nodule `use` type-checks and elaborates; `phylum` is an active keyword in the grammar (conformance corpus updated); `just check` green; DN-14 §3 row 10 → `present`.
      LANDED 2026-06-22 (maintainer-confirmed design). Realized as a **single-file** model — an optional `phylum <path>` HEADER (not a `{ … }` block) grouping multiple `nodule` blocks; a header-less single nodule is a phylum-of-one (`check_phylum(of_one) ≡ check_nodule`). Cross-nodule visibility is `pub` (default private-to-nodule) + `use` (specific `use a.b.X` and glob `use a.b.*`) over a qualified per-phylum import registry; precedence is local-decl > explicit-use > glob, and absent/private/duplicate/referenced-glob-ambiguity are never-silent `CheckError`s (G2). The RFC-0019 §4.5 orphan rule is generalized **phylum-wide** over a pub-blind coherence view (the M-659-staged cross-nodule enforcement), staying `Declared` (VR-5). Surface printer `expand_phylum_to_source` round-trips header/`pub`/`use`; no new L0 node (KC-3), cross-nodule execution staged where needed. Grammar oracle + `accept/19`/`reject/10` updated (gate now oracles via `parse_phylum`); RFC-0006 / RFC-0019 §4.5 / DN-06 carry append-only notes; DN-14 §3 row 10 → `present`. 247 `mycelium-l1` tests green.

  - id: M-663
    title: "M-663 — feat(l1): Enact RFC-0018 stage-1 static guarantee grading in checkty.rs/elab.rs"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-657]
    epic: E7-1
    landed_date: 2026-06-22
    landed_basis: "CHANGELOG.md '### Added (2026-06-22: M-663 — RFC-0018 stage-1a static guarantee grading (E7-1); RFC-0018 → Enacted)'; implemented in crates/mycelium-l1/src/grade.rs (Pass 3d) + elab.rs Residual removal; RFC-0018 Status → Enacted (stage 1a); DN-14 §3 row 11 → present. Branch claude/lex-kickoff-d4y98k; full just check green."
    doc_refs: [corpus:RFC-0018, corpus:RFC-0007, src:crates/mycelium-l1/src/grade.rs, src:crates/mycelium-l1/src/elab.rs, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      RFC-0018 is Accepted (2026-06-18) but not yet enacted in `mycelium-l1`. `elab.rs` returns `Residual` for any `@ g` guarantee annotation on function return types or parameters (lines 215–223, 542–546, 580–583, 880–887). This issue implements the RFC-0018 Design A (data-lineage / data-provenance integrity) graded typing pass: the guarantee index `@ g` on a type becomes a statically-checked constraint; the checker enforces the lattice (`Exact ⊐ Proven ⊐ Empirical ⊐ Declared`) and propagates guarantee meets at call sites. Honesty: the noninterference argument remains `Declared-with-argument` per RFC-0018 §4 — this issue does not upgrade it.
      Acceptance: `fn f(x: Binary{8} @ Exact) -> Binary{8} @ Exact = …` type-checks correctly; calling `f` with a `@ Empirical` argument is a `CheckError`; `elab.rs` no longer returns `Residual` for `@ g` annotations; RFC-0018 Status → Enacted (after audit per M-648 criteria); DN-14 §3 row 11 → `present`.

  - id: M-664
    title: "M-664 — feat(l1): `consume`/`derive`/`impl` — surface language keywords for substrate consumption, generative trait derivation, and inherent methods"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    depends_on: [M-659]
    epic: E7-1
    landed_basis: "status:done — `consume <expr>` (affine Substrate acquisition, LR-8) active + inherent `impl T { … }` blocks (desugar to top-level fns) landed in mycelium-l1 (parse/checkty/elab/eval/mono/grade/totality/ambient); `cargo test -p mycelium-l1` green (203 lib + 105 check + conformance accept/reject). `derive` already landed via M-812 (DN-54). The `reveal` inspector companion (DN-38 §8.1) remains not-yet-lexed — tracked as a residual, NOT part of M-664's reconciled surface scope (README §srf: M-664 = consume + inherent impl)."
    doc_refs: [corpus:DN-03, corpus:DN-38, corpus:RFC-0006, src:crates/mycelium-l1/src/token.rs, src:crates/mycelium-l1/src/parse.rs]
    body: |
      DONE 2026-06-28 (M-664 surface step): `consume <expr>` is an ACTIVE expression — the checker requires a `Substrate{tag}` operand (never-silent on any other type, G2); execution + single-use affinity are honestly STAGED (`Substrate` has no v0 value forms / no L0 lowering, so `consume` elaborates to a never-silent `Residual`; guarantee `Declared` — no value-level affine-usage tracker exists in v0). Inherent `impl T { fn … }` (no `for`) is ACTIVE — methods desugar at Phase 0 (alongside `object`) to top-level free functions (KC-3, zero kernel growth); the `for_ty` is organizational metadata in v0 (no qualified `T::m` call syntax). `derive` was already landed via M-812 (DN-54); `reveal` remains not-yet-lexed (residual). Conformance: accept fixture 25 added; reject fixture 18 renamed `18-consume-not-an-item.myc` (consume at item position is an expression, not an item). Lexicon + `mycelium.ebnf` (added the missing top-level `impl_item` + `consume_expr`) reconciled.
      RECONCILED 2026-06-27 (DN-38 §8.1): the generative-construct keyword is `derive`, NOT `grow`. DN-03 §1 originally adopted the themed `grow` (with a flagged "mild genericness" note) and §6 deferred the `grow`-vs-`derive` overlap "until generative features are specified"; DN-38 (Accepted 2026-06-26) specifies them and ratifies the conventional `derive` (over the coined `weave`), with `via` (delegation) and `reveal` (inspector) companions — see DN-03's 2026-06-27 changelog. This issue now tracks `consume`/`derive`/`impl`; `consume` (affine `Substrate` acquisition, LR-8) and `impl` (inherent method blocks) are unchanged.
      DN-03 §1 ratifies `consume` (acquire affine `Substrate` resource) and `impl` (inherent method blocks); DN-38 §8.1 ratifies `derive` (generative trait derivation) + `reveal` (inspector). None are in the lexer or parser. Note: `impl` reservation is a prerequisite of M-658 (the spec amendment); the lexer change for `impl` should land with M-658. This issue completes the constructs: (1) reserves `consume` and `derive` in `keyword()` (token.rs) — and decides whether the now-superseded `grow` is released or kept reserved-as-declined; (2) implements `consume <expr>` expression for affine substrate acquisition (paired with `Substrate{name}` type); (3) implements `derive <trait> for <type> { … }` as the generative trait-derivation surface (RFC-0020 §4.5 direction, observationally-equivalent + `reveal`-dumpable), plus the `reveal` inspector; (4) implements `impl <type> { fn … }` inherent-method block parsing and checking. Gated on traits (M-659) for the `derive` and `impl` constructs.
      Acceptance: `consume`, `derive`, `impl` are reserved keywords (never silent identifiers; reject-corpus entries added); `consume` elaborates to an affine move of a `Substrate` value (never copyable; LR-8); `derive Debug for MyType { … }` generates the declared trait impl (and `reveal` dumps the synthesized L1 term, S4); `impl MyType { fn to_bits(self: MyType) -> Binary{64} = … }` type-checks.

