      recorded here rather than silently left out): AFTER this issue landed, the Scheduler this body
      describes was RELOCATED from `crates/mycelium-std-runtime/src/scheduler.rs` to a new
      foundational crate, `crates/mycelium-sched` (PR #864), below `mycelium-interp`, so the
      interpreter could depend on it directly without an `interp`<->`std-runtime` cycle (needed by
