    body: |
      Phase-1 research DONE (research/29). Phase-2 RFC AUTHORED, Phase-3 adversarially reviewed
      (Rev 2 — 4 Critical + 15 High resolved), Phase-4-unblocking ratification DONE: RFC-0041 is
      **Accepted** (2026-07-03, maintainer-ratified Rev 2) — decided architecture with all four
      maintainer ratifications baked in (floor+headroom budget amending DN-05; DN-39 iterative-Drop
      admission via the §6 within-freeze channel; TCO in evaluators; convert-eval/guard-frontend).
      Phase-4 staged implementation (7 waves W0-W6, RFC-0041 §7); `Accepted -> Enacted`
      per-stage as each wave lands differential + error-parity green.
      W0 LANDED (2026-07-03, to dev): the safety-net gates only — §4.0 metric property test, §5.1
      error-parity differential (#[ignore="W5"]; canonical over-budget variant fixed as
      DepthExceeded{u32} on the metric), the RR-29 guard-hole census (per-crate #[ignore="Wn"]
      real-repros across 8 crates), depth-structured fuzz (interp target reproduces the known
      SIGABRT), and mutants/unsafe-audit scope (mycelium-l1, mycelium-mlir, mycelium-stack). NO
      behavior change, NO frozen-core edits.
      W1 LANDED (2026-07-03, to dev): mycelium-workstack budget crate (RecursionBudget on the metric +
      memory ceiling + ProcessArena + canonical BudgetError::DepthExceeded{u32} + ensure_sufficient_stack
      passthrough + §4.2 invariant fn; forbid(unsafe), DN-68 downward-only) + frontend guard-hole wiring
      (mycelium-l1 checker + check_list data-vs-control iteration fix + parser 256->4096;
      fmt/lsp/transpile/doc/mir-passes). 14 frontend census tests un-ignored+green. Scoping correction
      (G2): write_canon (frozen core) + is_pure/plan_parallel (interp) re-tagged W1->W3/W4 (checkpoint).
      Residuals tracked: recursive-Drop bomb incl NEW mycelium-doc::ir::Node member (W3); mir-passes
      eval(&RcNode)/emit_elided/emit_reuse + count_occurrences O(N^2) (W2); syn native recursion (3rd-party).
      W2 LANDED (2026-07-03, to dev): mycelium-stack fine-grained runtime-gated stacker grow (exact-pin
      =0.1.24 + psm 0.1.31; stays forbid-unsafe — switch contained upstream, ADR-014) + never-silent
