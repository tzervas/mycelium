# Phase 4 (M-34x) — the interpreted<->compiled ABI + hot-inject + AOT-fragment completion. Created
# 2026-06-16; gated on ADR-016/017 (Accepted 2026-06-16). The Phase-4 milestone + phase:4 label are now
# cut (milestones.json / labels.json, 2026-06-16); these tasks are tagged phase:4 / "Phase 4 — …".
# NOTE (2026-06-16): GitHub milestones are created by `gh-bootstrap-local.sh` (local `gh`); the GitHub
# MCP server cannot create them. Run that script to create the five milestones and assign every issue.
  - id: M-341
    title: "M-341 — In-process hot-inject prototype (ADR-016/017)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-340]
    body: |
      ADR-017's named first build step on the M-340 dlopen JIT (ADR-016 call ABI): a ContentHash -> entry dispatch table (mycelium-mlir::inject::Image); a call resolves to a compiled entry if present, else interprets (never a silent miss); inject = load a content-addressed unit + register a new hash -> entry (never mutates a live entry); the recompile set is the changed dependency-closure by hash reachability (recompile_closure).
      Acceptance: the safety argument under test (in-flight old hash finishes on old code while a new caller dispatches new) + interp == injected-compiled via the shared M-210 checker (NFR-7). In-process scope only; args-carrying value ABI + cross-process/native units deferred (VR-5). LANDED (first increment).

  - id: M-342
    title: "M-342 — Extend the AOT path to the data + recursion fragment (RFC-0011 Q5)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-301, M-340]
    body: |
      Bring Construct/Match/Lam/App/Fix into mycelium-core::lower (ANF) + the mycelium-mlir AOT env-machine so is_aot_lowerable admits the data + recursion fragment, and extend the three-way differential (L1-eval == L0-interp == AOT) to the full v0 calculus. Closes RFC-0011 §4.4 Q5. Native LLVM stays bit/trit only (explicit UnsupportedNode; VR-5). LANDED 2026-06-16.
      Acceptance: the data_corpus (incl. recursion + for-folds) runs on all three paths, validated through the shared M-210 checker; honest where a node stays deferred (VR-5). Follow-on M-347 (env-machine recursion stack-robustness).

  - id: M-347
    title: "M-347 — Investigate + improve AOT env-machine recursion (stack-robustness / efficiency)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:execution, priority:P1, status:done]
    depends_on: [M-342]
    body: |
      Surfaced by M-342: the AOT env-machine evaluates object recursion on the HOST call stack (O(depth)); the fuel clock bounds productive work (explicit FuelExhausted, never a hang) but depth beyond the host stack aborts. DN-05 records the design + empirical grounding (xtask recursion-probe: env-machine aborts at ~600 Fix-unfolds vs the interpreter's O(1) stack). Maintainer-set priority: (1) bank native MLIR->LLVM stack-robustness as a design requirement [libMLIR-gated, M-348]; (2) explicit control stack / trampoline [near-term buildable, makes never-silent total]; (3) tail-call detection [cautious, optional, on top of #2, KC-3/YAGNI]. Constraints: never-silent (a limit is an explicit error, never a hang OR abort), no black boxes, M-210 differential holds (NFR-7).
      Acceptance (design-first): DN-05 presented; then implement #2 (trampoline) so deep recursion is a graceful explicit limit (re-measured by recursion-probe), with #1 banked for the native path and #3 gated on measurement.
      #2 ENACTED 2026-06-16: aot rewritten as a trampoline (O(1) host stack); fuel + DepthLimit budgets, both graceful; recursion-probe confirms no abort to fuel 5e6 (was ~600); RFC-0004 §2 banks #1 for the native path (M-348). Dynamic budget (§2.4/DN05-Q5) ENACTED as M-349; tail-call (#3) remains open (measurement-gated).

  - id: M-349
    title: "M-349 — Dynamic depth budget for the AOT env-machine (DN-05 §2.4 / DN05-Q5)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-347]
    body: |
      DN05-Q5: the M-347 trampoline put the control stack on the heap, so the depth ceiling must be a DYNAMIC policy over memory headroom, not a magic constant (a fixed value is too timid on a large host, too bold on a small one). Resolve it cleanly + cautiously (KC-3/YAGNI), with minimal unsafe (ADR-014).
      ENACTED 2026-06-16: mycelium-mlir::budget — a small DepthBudget trait -> DepthResolution{max_depth, basis}. Default AutoDepthBudget derives the ceiling from detected memory headroom (MemAvailable capped by a finite RLIMIT_AS, read via pure-std /proc on Linux — ZERO unsafe), 70% margin / a conservative 1 KiB-per-frame estimate (Declared over-count, not Proven), clamped to [10_000, 2_000_000]; non-Linux/parse-failure -> conservative static fallback (200_000), never a guess. Basis is EXPLAIN-able (DepthBasis Display; aot::default_depth_budget; printed by xtask recursion-probe) — no black box (G2); the limit stays an explicit EvalError::DepthLimit (never abort/hang). run/run_core/run_core_with_fuel resolve dynamically; run_core_with_budget keeps the explicit override. Property test bounds the derivation ([floor,ceil], monotone). Measured on host: MemAvailable ~15.99 GB -> clamped to 2_000_000 (was 200_000). DN05-Q4 (native stack detection) reuses the trait under M-348.
      Acceptance: dynamic ceiling derived + EXPLAIN-able + conservative fallback; never-silent error preserved; trusted interpreter + three-way differential unchanged (NFR-7). DONE.

  - id: M-348
    title: "M-348 — Provision libMLIR to unblock the native MLIR->LLVM path"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:execution, priority:P1, status:done]
    depends_on: [M-301]
    landed_date: 2026-06-20
    landed_basis: "CHANGELOG.md '### Added (2026-06-20: Wave-1 — native MLIR→LLVM path keystone (M-348/M-603, M-601, M-602); epic E6-1)'"
    doc_refs: [corpus:RFC-0004, corpus:DN-15, corpus:ADR-019, src:scripts/setup-mlir.sh]
    body: |
      The MLIR->LLVM native AOT path (RFC-0004 §2, ADR-009) is gated on libMLIR, absent in the current environment. Maintainer intends to provision it near-term (Windows/Claude Code desktop, or via WSL) to unblock native dialect lowering / cross-target codegen, the native data/closure codegen M-342 left as UnsupportedNode, and DN-05 #1 (stack-robust recursion designed into the native path). Verdicts needing it stay honestly "not established" (VR-5) until present.
      Acceptance: libMLIR provisioned + a first native lowering increment runs; no code until the toolchain is present.
      DECOMPOSED 2026-06-19 (Wave-5; DN-15): M-348 was two parts lumped as one external wall. (a) GENUINELY libMLIR-gated — the real `ternary`→arith/vector→LLVM dialect lowering (dialect.rs is a textual skeleton stand-in) — until the C++ infra is present (VR-5). (b) ADVANCEABLE NOW with zero libMLIR — the direct-LLVM-IR backend (llvm.rs) extension to the data fragment, sanctioned by the RFC-0004 §2 "lighter direct-LLVM backend" revisit clause — split out as M-373 (in-progress). M-342 left the data/recursion nodes as explicit UnsupportedNode by a SEQUENCING choice, not an intrinsic libMLIR requirement.
      UNBLOCKED 2026-06-20 (VERIFIED on Linux): the "libMLIR absent" premise no longer holds in the Linux CI/dev environment. `apt-get install -y --no-install-recommends libmlir-18-dev mlir-18-tools` (candidate 1:18.1.3-1ubuntu1, matching the installed LLVM 18.1.3) provides `mlir-opt-18`/`mlir-translate-18` (/usr/bin) + `libMLIR.so.18.1` (/usr/lib/llvm-18/lib); the pipeline `mlir-opt-18 --convert-func-to-llvm --convert-arith-to-llvm --reconcile-unrealized-casts | mlir-translate-18 --mlir-to-llvmir` is verified to emit valid LLVM IR. Status moves blocked -> needs-design. Folded into epic E6-1: durable provisioning recipe + ADR-019 (libMLIR toolchain decision) + DN-15 append are M-603; the real ternary-dialect lowering is M-601; the three-way differential is M-602.

  - id: M-343
    title: "M-343 — Mutual recursion: full elaboration (R7-Q3 remaining half)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-342]
    body: |
      The content-addressed identity of a Fix-group is done; the surface -> Fix-group elaboration + the totality checker's mutual-descent classification remain (currently an explicit ElabError::Residual). DESIGN the Fix-group node/encoding first (does L0 need a Fix-group node, or do nested Fixes + the cycle registry suffice?) and present a frozen-spec change (likely an RFC-0001 revision) before folding, then enact + extend the differential.
      Acceptance: mutual recursion elaborates (no Residual) and agrees across the differential paths; the totality checker classifies mutual descent.

  - id: M-344
    title: "M-344 — RFC-0012: Ambient Representation (paradigm defaults + scoped overrides)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P2, status:done]
    depends_on: [M-310]
    body: |
      RFC-0012 (Draft, 2026-06-16): a surface-only declared, scoped, paradigm-only representation default + scoped override/conversion blocks, to offset honesty's verbosity (tension A) without a black box. Two normative invariants: the ambient emits no Swap (I1); resolution is observationally the identity (I2, identical L0 ⟹ identical hash), defended by a meaning-preservation differential (NFR-7). Cross-paradigm edges stay explicit swaps; a missing one is an explicit MissingConversion. Kernel untouched (KC-3); exported signatures are concrete reprs (ADR-016).
      Acceptance (design-first): RFC-0012 Draft presented; on ratification, wire the resolution pass + the never-silent checks + M-142/LSP rendering + the §4.6 differential into mycelium-l1. R12-Q1..Q4 open.

  - id: M-345
    title: "M-345 — DN-04: optional structured diagnostics / error-handling (DynEL-inspired)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-310]
    body: |
      DN-04 (Draft, 2026-06-16): evaluate DynEL's (gitlab:albedo_black/DynEL) feature set as OPTIONAL structured/graded/dual-format diagnostics over Mycelium's existing explicit errors. Governing constraint: diagnostics are additive presentation, never a substitute for a never-silent error (G2). Import the contracts (graded levels; human+JSON projections; reified per-fn {exceptions, custom_message, tags} a la RFC-0005); EXCLUDE the anti-patterns (eval-on-config, os.environ dump, logger.catch swallowing) per the security posture. Rust-first (no Python; ADR-007), eventually self-hosted in Mycelium-lang. Tooling-layer home; kernel takes no logging dep (KC-3).
      Acceptance (design-first): DN-04 presented; RFC-0013 drafted, ratified Draft->Accepted (2026-06-16, maintainer), and ENACTED (2026-06-16): the registry (no eval, X1), the content-addressed diagnostic record + dual human/JSON round-trip projection (G11), graded levels + allowlisted detailed tier (X2), the reified on-ErrorClass policy (RFC-0005 pattern, content-addressed PolicyRef), and the representation-crossing audit view (RFC-0012 R12-Q2; honesty read off, never upgraded, VR-5) are code in crates/mycelium-lsp/src/diagnostics, verified by tests/diagnostics.rs incl. the central never-silent invariant (I1). Recovery deferred to RFC-0014 (M-352). Early candidate stdlib module (M-346).

  - id: M-346
    title: "M-346 — Mycelium core library / stdlib (roadmap epic)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-310]
    body: |
      Roadmap anchor for a core library / standard library — the feature set that makes Mycelium usable, not just a substrate+kernel. Decomposed once the surface language is self-hosting enough to write stdlib modules in Mycelium itself (dogfooding; free of other languages). Principles inherited and non-negotiable: never-silent (G2), honest per-op guarantee tags, no black boxes / EXPLAIN, small auditable kernel (stdlib lives above it, KC-3), content-addressed (ADR-003); Rust-first now (ADR-007), Mycelium-lang eventually. Early candidate modules: diagnostics (DN-04/M-345), collections, numerics helpers (ADR-010), VSA/encoding utils (RFC-0003), I/O + serialization (RFC-0001 §4.8).
      Acceptance (roadmap): when self-hosting is close, draft a Core Library RFC (scope, module boundaries, the guarantee/EXPLAIN contract every stdlib op must meet, Rust->Mycelium migration) and decompose into per-module tasks. Present before folding.

  - id: M-352
    title: "M-352 — RFC-0014: Declarative error recovery & bounded effects"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-345]
    body: |
      RFC-0014 (Accepted — Enacted, 2026-06-16): the isolated declarative error-recovery + bounded-effects subsystem RFC-0013 §8/§9 deferred (the DN04-Q1 recovery half). Errors propagate/bubble and can TRIGGER functionality (fallback, retry, cleanup, escalation) via an explicit handling site (elaborates to L0 Match — KC-3, no new kernel node) + a reified RFC-0005-pattern `on <ErrorClass> => <action>` policy. Effects are DECLARED on signatures (no unknown side effects) and BOUNDED by explicit budgets (EffectBudgetExhausted is graceful — the generalisation of the Fix/FixGroup fuel clock, M-347 depth ceiling, DN-05 budgets). Maintainer discipline: effects/cascades allowed WHEN explicitly declared/implemented so they stay known+bounded; the enemy is unintended/unknown/unbounded effects; default tightly scoped, broader opt-in by explicit declaration; always additive over the explicit error (never-silent G2; never fabricates/upgrades a guarantee, VR-5). Separable subsystem: budget enforcement lives with RFC-0004/0008/DN-05, not the kernel; clean RFC-0013 split (presentation vs recovery), does not weaken RFC-0013 I1.
      Acceptance (design-first): RFC-0014 presented, all §8 questions resolved (the three gating ones + the four remaining v0 dispositions), prior art traced (Research Record 05), then RATIFIED Draft->Accepted (maintainer, 2026-06-16) and ENACTED: the reified recovery subsystem (result-sum Outcome, closed recovery-action set, registry-shared on-ErrorClass policy with content-addressed PolicyRef, declared+budgeted effects with graceful EffectBudgetExhausted, the no-undeclared-effect check, and the never-silent handle — every error recovered or re-propagated, never dropped) is code in crates/mycelium-lsp/src/recover, verified by tests/recover.rs (the central never-silent invariant I1 + I2/I3/I4/I5 + X1). The L0-Match-over-error-sums lowering target is differentially verified in mycelium-l1 (no new kernel node; NFR-7). Out of v0 scope: wiring the budget ledger into the AOT env-machine is the RFC-0008 integration.

  # Phase 4 (M-35x) — RFC-0008 integration: the deferred RUNTIME halves of the RFC-0013/0014 work.
  # Created 2026-06-16. M-353/M-354 complete RFC-0014 §4.8 / RFC-0013 §8 deferrals and are shovel-ready
  # over already-landed machinery (DN-05 budget resolver; the diagnostics layer) — they need NO RFC-0008
  # ratification, so they stay in the active Phase 4. The broader RFC-0008 runtime/concurrency model is
  # the anticipated Phase 7 (M-355..M-357 below).
  - id: M-353
    title: "M-353 — RFC-0008 integration: unify the effect-budget mechanism (RFC-0014 §4.8)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-352, M-349]
    body: |
      Wire the reified recovery effect-budget ledger (crates/mycelium-lsp/src/recover/effect.rs::Budgets) into the runtime so it composes with the DN-05 dynamic depth resolver (crates/mycelium-mlir/src/budget.rs) and the Fix/FixGroup fuel clock as ONE enforcement mechanism over SEPARATE named budgets (the ratified RFC-0014 §8 disposition). EffectBudgetExhausted must surface from the runtime/AOT env-machine on the SAME explicit-refusal path as mycelium_interp::EvalError::FuelExhausted / DepthLimit — graceful, never a hang/OOM (I4). No kernel change (KC-3); no kernel-visible budget hook (confirmed §8). Mind the dependency graph: recover lives in mycelium-lsp, the resolver in mycelium-mlir/-interp — pick the shared-primitive home that avoids a cycle (consider lifting a small shared budget-resolution surface) and keeps the kernel untouched.
      DONE (2026-06-16): the ledger primitive (EffectKind/EffectBudget/EffectBudgetExhausted/Budgets) is LIFTED into mycelium-interp::budget — the shared budget-resolution surface both the env-machine (mycelium-mlir) and the recovery driver (mycelium-lsp) depend on (no crate cycle; sits where the fuel clock lives; no kernel node — KC-3; no kernel hook). An overrun routes through mycelium_interp::EvalError::EffectBudget, the effect sibling of FuelExhausted/DepthLimit on the one runtime refusal channel. The env-machine threads the same ledger (run_core_with_effects) and charges a declared `alloc` budget per control-stack frame (opt-in sibling of the DN-05 depth ceiling); absent ⇒ unchanged behaviour (I5). Verified: bounded-overrun-is-explicit extended to the RUNTIME path (mycelium-mlir) + a meaning-preserving three-way differential on the recovery Match where it touches L0 (mycelium-l1, NFR-7). recover::effect re-exports the moved types (RFC-0014 API stable) and keeps the no-undeclared-effect checker (I3) in the tooling layer. Completes RFC-0014 §4.8. just check green.
  - id: M-354
    title: "M-354 — RFC-0008 integration: diagnostic route targets ↔ observability sinks (RFC-0013 §8)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: [M-345]
    body: |
      Close RFC-0013 §8's open route-targets question: define the closed v0 set of diagnostic `route` targets (crates/mycelium-lsp/src/diagnostics/record.rs + policy.rs) and bind each to an RFC-0008 runtime/observability sink. Honor I1 (routing NEVER gates propagation — re-run the never-silent invariant test across every route) and RT5 (a sink's delivery guarantee is tagged on the Exact⊐Proven⊐Empirical⊐Declared lattice and never upgraded — VR-5; no unguaranteed "fire and forget" claimed as reliable). The diagnostic stream lives in RFC-0008 (RFC-0013 §4.8 Feeds). Tooling layer only; no kernel logging dependency (KC-3).
      DONE (2026-06-16): closed v0 route vocabulary stream/audit/log/null/mesh (maintainer: 4-set then mesh) in crates/mycelium-lsp/src/diagnostics/sink.rs, each bound to an rfc0008.* sink with an honest Delivery guarantee on the lattice (synchronous/durable/best-effort = Declared; null = honestly NOT delivered; mesh = probabilistic with a declared ProbabilityBound δ, never upgraded without a checked basis — VR-5/T4.2/RT5). Route resolution is checked against the closed set (X1 applied to routes — an out-of-set route is an explicit UnknownRoute, never silent) and lives OUTSIDE present (DiagnosticRecord::sink), so routing/failed-resolution never gates propagation (I1). Verified in tests/diagnostics.rs: never-silent across every closed route, honest sink guarantees (RT5/VR-5), explicit unknown-route. RFC-0013 §8 route-targets RESOLVED; all §8 RFC-0008-tied deferrals discharged. just check green.

  # ---- L1 completion: the two remaining L1 gaps (DN-10; minted by DN-11, 2026-06-18) ----
  - id: M-390
    title: "M-390 — R7-Q4: migrate the prim table Π to content-addressed declarations"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:core-ir, priority:P2, status:done]
    depends_on: [M-101, M-343]
    body: |
      RFC-0007 §8 R7-Q4 / DN-10 §3: the prim signature table Π (RFC-0007 §4.4: Π(p) = (τ₁…τₙ)→τ) is a fixed builtin table hard-coded in the elaborator/typechecker (crates/mycelium-l1/src/checkty.rs prim_sig/prim_family/prim_kernel_name) and the interpreter's intrinsic guarantee (crates/mycelium-interp/src/prims.rs, hard-coded Exact). It SHOULD become content-addressed declarations (ADR-003) living in the registry beside data declarations Σ (RFC-0001 §4.3 r3, crates/mycelium-core::data::DataRegistry) — so each prim is an inspectable, EXPLAIN-able registry entry (G2/SC-3), not a black box. Purely additive (DN-10 §4): preserves Π-lookup semantics exactly — Π_new(hash(p)) = Π_old(name(p)) — so the existing M-210 differential plus a per-prim equivalence test is the regression check (no new theorem). The intrinsic-guarantee-with-citation sub-question is RP-7 (a spike): all v0 prims are Exact, so it does not block the migration.
      Acceptance (needs-design): a content-addressed prim table in mycelium-core (mirroring DataRegistry) populated from the fixed v0 set, each carrying its signature + intrinsic guarantee; the elaborator/typechecker validate prims against it; the LSP surfaces prim declarations as inspectable entries (the EXPLAIN-over-prims gain); Π_new == Π_old equivalence tested; M-210 differential stays green; KC-3 (no L0 node-grammar change). Deferred (own follow-ups, not this task): Node::Op carrying a PrimRef content hash in the term; RP-7's BoundBasis-with-citation schema for non-Exact prims.
      DONE (2026-06-18): crates/mycelium-core/src/prim.rs — PrimTable/PrimDecl/PrimSig/PrimRef content-addressed via Canon (new PRIM_DECL tags in content.rs), populated with the v0 kernel set, each Exact. The LSP feedback facade surfaces a prim declaration at every Op site (crates/mycelium-lsp/src/feedback.rs, the EXPLAIN-over-prims gain; unknown prims surfaced, never silent). Π_new == Π_old drift-guards pin the surface table (mycelium-l1) and the interpreter intrinsic (mycelium-interp) to PrimTable. M-210 three-way differential stays green; cargo test --workspace + clippy -D warnings clean (KC-3 — no L0 node-grammar change). The two deferred follow-ups above remain unscheduled (their own future tasks).

  - id: M-391
    title: "M-391 — R7-Q3: surface elaboration for mutually-recursive function groups"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:language, priority:P2, status:done]
    depends_on: [M-343]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: M-391 — surface mutual-recursion elaboration confirmed; RP-6 resolved)'"
    body: |
      RFC-0007 §8 R7-Q3 (surface half) / DN-10 §2: the elaboration MECHANICS for mutual recursion are settled (RFC-0001 r5 FixGroup node + the Tarjan SCC path in crates/mycelium-l1::elab + the §4.5 mutual-structural-descent totality classifier, all enacted via M-343). The residual is the SURFACE GRAMMAR for a mutually-recursive group of ≥2 top-level functions, and the front-end that parses it and feeds the existing Tarjan path. GATED on RP-6 (the grammar choice: explicit `let rec … and …` vs nodule-boundary fixpoint vs explicit `mutually_recursive { … }` block) — the choice affects docs/spec/grammar/mycelium.ebnf and the diagnostic story; it must be decided (append-only DN or RFC-0007 amendment) before the front-end lands.
      Acceptance (needs-design): RP-6 grammar choice recorded append-only; surface parsing + call-graph construction for top-level mutual-recursion groups in mycelium-l1::elab, feeding the existing Tarjan→FixGroup emission unchanged; ≥2 surface-written mutual-recursion programs added to the M-210 three-way differential (L1-eval ≡ elaborate→L0-interp), each producing the same FixGroup the programmatic path does (identity-first, ADR-003). Scope: the elaboration front-end only — no change to mycelium-core, mycelium-interp, or the totality checker (DN-10 §2.5).
      DONE (2026-06-19): RP-6 decided — nodule-wide mutual visibility, no new syntax (DN-13). The surface front-end was already realized by M-343 (nodule-wide visibility in checkty Pass 2/3 + the Tarjan SCC → FixGroup path in mycelium-l1::elab), so this task confirms + pins it rather than building new front-end: the M-210 three-way differential gains two further surface-written mutual-recursion shapes (a repr-returning pair; a multi-field-constructor pair), an identity assertion pins the deterministic FixGroup lowering (ADR-003), and a never-silent regression pins that an undefined reference stays an explicit checker error (not a silent phantom group member, G2). Grammar spec records the scoping rule (no production change); RFC-0007 §8 R7-Q3 surface half resolved; research-prompts RP-6 → Resolved. No public-API / cargo-public-api baseline change (KC-3); cargo test -p mycelium-l1 + clippy -D warnings -A unsafe_code + fmt --check green. Append-only.

# Phase 7 (M-355..M-357) — Runtime & Concurrency Execution Model (RFC-0008). ANTICIPATED (not yet
# ratified); created 2026-06-16 as the forward home for the runtime/concurrency track the RFC-0013/0014
# work pointed to (RFC-0014 §8 concurrency deferral; RFC-0008 §4.7 RT2 runtime "natural successor to the
# L1 track"). Sequencing vs Phases 5–6 firms up at the Phase-4 gate. The RFC-0008 §4.5 runtime vocabulary
# (hypha/fuse/xloc/cyst/graft/forage/backbone/mesh/tier/reclaim) decomposes into per-construct tasks at
# the Phase-7 gate, like the M-346 stdlib epic. Run gh-bootstrap-local.sh to create the Phase 7 milestone
# + phase:7 label and assign these.
  - id: M-355
    title: "M-355 — RFC-0008 ratification: the runtime model (RT1–RT7) Draft → Accepted"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:execution, priority:P3, status:done]
    depends_on: []
    body: |
      RFC-0008 (Draft) is the Runtime-tier grounding ADR-012 §7.3 required: the seven runtime invariants RT1–RT7 (§4.1) — values move/state never shared (RT1), deterministic fragment default (RT2), nondeterminism reified/named/explained (RT3), partial failure explicit / no distribution transparency (RT4), runtime guarantees tagged on the lattice (RT5), fusion = lawful semilattice merge (RT6), structured lifetimes / no orphan hypha (RT7) — and the §4.5 vocabulary (hypha/fuse/xloc/cyst/graft/forage/backbone/mesh/tier/reclaim). This is the design-first gate before ANY runtime/concurrency code (M-356/M-357 depend on it). No kernel change anticipated (KC-3); honest probabilistic guarantees where applicable (RT5/VR-5).
      DONE (2026-06-16): maintainer ratified RFC-0008 Draft → Accepted — RT1–RT7 and the §4 model are now normative. The vocabulary stays reserved/not-active until the implementation RFCs land (§4.5 status rule). Ratification unblocks M-356 (concurrency/supervision) and M-357 (RT2 runtime); the budget-unification slice (M-353) and route→sink binding (M-354) needed no RT1–RT7 commitment and proceeded independently. Append-only.
  - id: M-356
    title: "M-356 — RFC-0014 concurrency: per-task budgets, cancellation & bounded-cascade supervision"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P3, status:done]
    depends_on: [M-355, M-353]
    body: |
      Lift RFC-0014's single-task v0 boundary (its §8 concurrency deferral) onto the RFC-0008 runtime: per-task effect budgets, cancellation, and cross-task failure propagation (RT4/RT7), with `reclaim` supervision (T4.5) as the bounded-cascade home — where the Erlang/OTP max-restart-intensity grounding (Research Record 05, T5.3) becomes a real declared, bounded cascade (a restart storm is capped, never unbounded). Recovery stays additive over the explicit error (RFC-0014 I1); effects stay declared + bounded (I3/I4); a per-task budget overrun is an in-that-task EffectBudgetExhausted. Builds on the unified budget mechanism (M-353).
      DONE (2026-06-16): frozen-spec presented before folding (RFC-0008 §4.7 concurrency-composition section + RFC-0014 §8 amendment, append-only). Maintainer dispositions: (scope) spec + scheduler-independent composition primitives that feed forward into M-357; (reclaim) COMBINED bound — total `cascade` budget AND windowed max-restart-intensity over a LOGICAL clock (wall-clock deferred to R8-Q3); (cancellation) cooperative + additive. Enacted in mycelium_interp::supervise (CancelToken/TaskOutcome/RestartIntensity/Supervisor — no L0 node, trusted base stays sequential; KC-3), composed with the recovery driver in mycelium-lsp/tests/recover.rs. C1 per-task budgets (in-that-task EffectBudgetExhausted), C2 cooperative additive Cancelled (never preemptive), C3 cross-task propagation via explicit TaskOutcome (no silent/dropped variant — I1), C4 reclaim bounded cascade (both axes → explicit Escalation, never a storm). The task scheduler/executor + RT2 differential are M-357 (built on these). just check green.
  - id: M-357
    title: "M-357 — RFC-0008 RT2 deterministic-fragment runtime + reference-sequentialization differential"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P3, status:done]
    depends_on: [M-355, M-356]
    landed_date: 2026-06-16
    landed_basis: "CHANGELOG.md '### Added (2026-06-16: typed SPSC channels — the RT2 communicating fragment, M-357 follow-on)'"
    body: |
      Enact the RT2 deterministic concurrency fragment (the default forms over immutable values — hypha/fuse, §4.5) and its reference sequentialization, validated by the RT2 differential (the deterministic concurrent run ≡ its sequentialization; the NFR-7-equivalent obligation RFC-0008 §4.6/§4.7 names "the natural successor to the L1 track"). Nondeterministic forms stay RT3 constructs with named, reified policies (out of this task's scope). No kernel change (KC-3).
      v0 SLICE DONE (2026-06-16): the maintainer-chosen minimal scope — deterministic fork/join + the RT2 differential, typed channels deferred — is landed in crates/mycelium-mlir/src/runtime.rs (the scheduler lives OUTSIDE the kernel — RT2; KC-3): a structured-concurrency Scope (RT7 — every child joined, none orphaned) over cooperative Tasks, each carrying its own Budgets ledger + the shared CancelToken (M-356 C1/C2), with run_sequential (the reference) and run_interleaved (a deterministic round-robin) strategies. Verified: the RT2 SEQUENTIALIZATION DIFFERENTIAL — interleaved ≡ sequential over a counter corpus (with an interleave trace proving non-triviality) AND over the REAL env-machine (tasks running run_core_with_effects on bit.not L0 programs; each scheduled outcome == the standalone evaluation — no new meaning, KC-3/NFR-7); RT7 scope-cancellation (every pending child → explicit additive Cancelled, all joined); C1 per-task budget isolation (one task's overrun never exhausts a sibling). just check green.
      REMAINING (next slice, needs-design): typed single-producer/single-consumer CHANNELS (the Kahn-deterministic communicating-tasks half of the RT2 fragment — §4.3 backpressure), then the §4.5 vocabulary activation (hypha/fuse) per the construct-by-construct gate. Research/docs: confirm R8-Q1 scheduler-normativity scope and that the M-356 logical clock suffices for v0 (no R8-Q3 wall-clock needed yet). Acceptance (design-first): present the channel-slice scope before folding.

  # DN-06 lexicon migration — static `colony` keyword → `nodule`; introduce `phylum`; free `colony`
  # for the dynamic runtime grouping (RFC-0008 §4.7). Created 2026-06-16. The decision is ratified
  # (DN-06, superseding DN-02 §2); this is the mechanical surface/grammar migration it requires.
  - id: M-358
    title: "M-358 — DN-06 lexicon migration: static keyword `colony` → `nodule`; introduce `phylum`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: []
    landed_date: 2026-06-16
    landed_basis: "CHANGELOG.md '### Changed (2026-06-16: DN-06 lexicon migration — static keyword `colony` → `nodule`, M-358)'"
    body: |
      DN-06 (Resolved 2026-06-16) ratifies the static-organization / dynamic-grouping lexicon — `phylum` (library-scale), `nodule` (the basic unit, replacing the generic "module"), and `colony` reassigned from its DN-02 static meaning to the RFC-0008 §4.7 DYNAMIC runtime grouping of `hypha`. This task is the mechanical surface migration the reassignment requires (the DECISION is already ratified; this executes it): rename the L1 surface keyword `colony` → `nodule` across the lexer/token/parser/AST/checker/elaborator (~226 refs in crates/mycelium-l1), the grammar EBNF + LR(1) oracle + the 23-file accept/reject conformance corpus (docs/spec/grammar/), and the prototype binaries/tests; reserve `phylum` (the library grouping above nodules — reserved-not-active until its construct lands) and `colony` (dynamic; realized by mycelium-mlir::runtime's Colony). Keep it ONE auditable change (it alters the grammar contract): the reserved-word set + M-141 linter, the conformance fixtures, and the M-142 formatter spelling move together. No kernel change (KC-3); no semantic change — pure renaming + two reserved additions. Document singular/plural (phylum/phyla, nodule/nodules, colony/colonies, hypha/hyphae). Also wire the DN-06 §6 nodule HEADER-COMMENT convention into the linter/formatter: a file declares nodule status via `// nodule: <dotted.name>` (or bare `// nodule`) on the first non-blank line — NOT in the filename/path (paths stay conventional); the M-141 linter recognises it; content-addressed identity (ADR-003) stays canonical. Acceptance (design-first): present the rename map + grammar diff before folding; verify the full conformance corpus + just check green; the content-addressed identities are unchanged (a rename is not a semantic edit). Until executed, `colony` is the deprecated spelling of `nodule` (DN-06 §2).

  # Phase 7 (M-359) — the STRUCTURED nodule header + project manifest schema (maintainer preference,
  # 2026-06-16). Design-first: the spec is Proposed; format choices need sign-off before any code.
  - id: M-359
    title: "M-359 — Structured nodule header + project manifest (mycelium-proj.toml) + top-down inheritance"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-358]
    landed_date: 2026-06-16
    landed_basis: "CHANGELOG.md '### Added (2026-06-16: structured nodule header + project manifest, M-359)'"
    body: |
      The maintainer prefers a STRUCTURED nodule header over DN-06's minimal `// nodule:` marker: license, authors, first publication, last update, version — on a nodule/phylum ROOT, with subnodules INHERITING most fields top-down; plus a config form like Python UV's pyproject.toml but scoped for Mycelium. Designed in docs/spec/Nodule-Header-and-Project-Manifest.md (Proposed 2026-06-16): a closed-key in-file header (`// @key: value` — version/license/authors/since/updated/summary), a `mycelium-proj.toml` manifest (the pyproject/Cargo analogue), and explicit, EXPLAIN-able top-down inheritance (in-file > nodule-root > mycelium-proj.toml). Honesty-aligned: no ambient metadata (unknown keys/conflicts are explicit errors — G2), metadata is NOT identity (the content hash stays canonical — ADR-003), declared-only license/version (VR-5), tooling-layer (KC-3). Acceptance (design-first / maintainer-gated): ratify the §7 format choices (manifest filename `mycelium-proj.toml`; header sigil `// @key:`; the closed v0 key set; `@updated` discipline) BEFORE folding. Then enact: the header parser + manifest loader + inheritance resolver + an `EXPLAIN` of the resolved header, with a JSON schema under docs/spec/schemas/ and conformance fixtures; the M-141 linter recognises + checks the header (unknown key / bad SPDX / non-ISO date = explicit error). just check green. No kernel change.

  # Phase 8 (M-361) — the FULL Mycelium toolchain epic (ANTICIPATED forward anchor). The maintainer
  # (2026-06-16): a full-fat toolchain beyond LSP+interpreter+compiler — formatting, correctness,
  # error/issue checking AND fixing, security checks — is a long-term PROD-RELEASE requirement.
  # Decomposes into per-tool tasks at its gate, like the M-346 stdlib epic. Sequencing firms at the gate.
  - id: M-361
    title: "M-361 — Full Mycelium toolchain epic (format / correctness / lint+fix / security) — full-fat suite"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-346, M-359]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: the M-361 toolchain is wired into the CI-parity gate — Phase 9 Wave A; epic #132 done)'"
    body: |
      Roadmap anchor for the FULL Mycelium toolchain — the "full-fat suite" the maintainer names as a prod-release requirement (2026-06-16), beyond today's LSP + interpreter + AOT compiler: a formatter (mycfmt — M-142 grows up), correctness/type checking, error/issue checking AND auto-fixing (the RFC-0013 diagnostics + RFC-0014 recovery surfaced as actionable fixes), security checks (secrets/supply-chain/`wild`-block audit — the /security-review posture as tooling), and the packaging/metadata layer (the M-359 header/manifest + spore publishing). Principles inherited and non-negotiable: never-silent (G2), honest per-op guarantee tags, no black boxes / EXPLAIN, small auditable kernel (the toolchain lives ABOVE it — KC-3), content-addressed (ADR-003); Rust-first now (ADR-007), Mycelium-lang eventually (dogfooding). Full-fat = a release gate, not a v0 deliverable. Decomposes into per-tool tasks at its gate. Anticipated forward anchor (not yet ratified roadmap); marked so. Run gh-bootstrap-local.sh to create the Phase 8 milestone + phase:8 label and assign.

  # Phase 7 (M-362) — RFC-0015 automatic baseline diagnostics & recovery (the DynEL "automated baseline"
  # design point the maintainer added to the roadmap, 2026-06-16). Design-first: RFC-0015 is Draft.
  - id: M-362
    title: "M-362 — RFC-0015: automatic baseline diagnostics & recovery (DynEL auto-wrapping + logging)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-345, M-352]
    landed_date: 2026-06-16
    landed_basis: "CHANGELOG.md '### Added (2026-06-16: RFC-0015 automatic baseline diagnostics & recovery, M-362)'"
    body: |
      RFC-0015 (Draft 2026-06-16): the DynEL "automated baseline" intent — easily automated, dynamically-applied baseline error handling + logging — as an AUTOMATION LAYER over RFC-0013 (presentation) + RFC-0014 (recovery). Auto-derive a zero-config BASELINE diagnostic/logging policy from the language's structured mapping (the error-class registry + each class's level/route + a definition's declared effects) and auto-apply it (wrapping for logging/QoL), with a ladder: auto (floor) -> light overrides -> fully manual (manual always wins). The load-bearing HONESTY BOUNDARY (fixed in RFC-0015 §4.1): automatic = ADDITIVE presentation/logging ONLY by default (safe to auto-apply because RFC-0013 never changes control flow — I1); automatic RECOVERY is OPT-IN, declared, bounded (RFC-0014 I3/I4/I5 — no implicit control-flow change, only scaffolding + named opt-in profiles); the auto-baseline is a reified, content-addressed, EXPLAIN-able RFC-0005 policy (no black box — SC-3); the derivation is a TOTAL, inspectable function of the mapping, never learned (VR-5/RFC-0005). Feeds the toolchain epic (M-361) and the M-359 project manifest (project-level baseline profiles). Acceptance (design-first): trace prior art (DynEL/tracing/OTP) into research/, resolve §8 (the derivation function, the opt-in recovery-profile set, auto-wrap scope, default-on presentation vs default-off recovery), then ratify Draft->Accepted before any code. No kernel change (KC-3). Lineage: DN-04 -> RFC-0013 + RFC-0014 -> RFC-0015.

  # Phase 8 (M-363) — narrative capture + automated authoring (blog / language book / reference manual),
  # distributed free with the language. Initial capture this session (docs/notes/Narrative-Capture-and-
  # Authoring.md + the seeded docs/devlog/); full pipeline design is a fresh session (maintainer 2026-06-16).
  - id: M-363
    title: "M-363 — Narrative capture + automated authoring (blog / language book / reference manual)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-346]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: M-363 documentation BUILD pipeline + the §4.1 doc quality-bar lint — Phase 9 Wave B)'"
    body: |
      Capture enough development narrative — decisions, struggles, problems solved, the how AND the why — to enable PARTIALLY-TO-FULLY AUTOMATED authoring of (1) project BLOG posts, (2) a full LANGUAGE BOOK, (3) a LANGUAGE REFERENCE MANUAL, and (4) FULLY-AUTOMATED documentation + API reference, distributed FREE with the language in digital formats (HTML/PDF/EPUB) and served live (browsable site + LSP hover). Initial capture is done (docs/notes/Narrative-Capture-and-Authoring.md — intent, data model, capture discipline, honesty constraints, the §4.1 format/quality bar; plus the seeded docs/devlog/ append-only narrative layer that fills the one gap the formal docs leave: the struggle / problem-solving "how"). The honesty rule already makes the corpus a grounded, cited, append-only narrative (~80% of the raw material). Output (4) docs/API ref is the MOST automatable (pure PROJECTION from code + schemas + the M-359 nodule-header metadata, no interpretive layer), so FULLY automated is the goal there; rustdoc-first now, Mycelium-lang doc-comments later (dogfooding). All outputs are SYNTHESIS FROM THE CITED CORPUS under the same discipline as the language: grounded + cited (no hallucination — the prose analogue of never-silent G2; "undocumented is FLAGGED, never invented"), projection-not-parallel-truth (generated from the RFCs/specs/code so they cannot drift — ADR-003), human-in-the-loop for interpretive narrative (draft-then-review; for pure projection the human gate is the generator/templates, not each page), append-only provenance. CRITICAL: the output must clear a CHECKABLE QUALITY BAR (§4.1) — clean/presentable/legible/intelligible/digestible: one consistent template, index->detail navigation, progressive-disclosure graded depth (reuse RFC-0013 levels), checked inline examples, dual human/machine projection (G11), legibility/accessibility by construction. Acceptance (design-first, fresh session): trace prior art (rustdoc/docs.rs, docs-as-code, literate programming, mdBook/Sphinx/Antora, spec-generated manuals), design the generators + templates + the HTML/PDF/EPUB build + the quality-bar lint, place it in the Phase-8 toolchain (M-361), then ratify before building. No kernel change (KC-3); tooling/docs layer only.

      ENACTED (Phase 9 Wave B, 2026-06-17 → status:done): `crates/mycelium-doc/` builds the content-addressed doc-IR (projection of corpus + schemas + M-359 metadata; undocumented-is-flagged, never invented), emits HTML + Typst(→PDF) + machine JSON (EPUB an honest deferral, spec §8.5), and the §4.1 quality-bar lint is ACTIVE — 8 checks over the IR (checked examples actually type-check via the L1 checker; dual-projection parity; legibility partially-dormant for contrast/typography). Gated via `scripts/checks/myc-doc.sh` (green over 98 docs / 2632 nodes); `mycelium_lint::doc_lint_status()` flipped dormant→active. No kernel change; no new workspace dependency.

  # ── M-361 decomposition (per-tool children) — STAGED 2026-06-16 ───────────────────────────────────
