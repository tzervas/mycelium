  - id: M-738
    title: "M-738 — chore(release): full-language 1.0.0 release act"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:release, priority:P1, status:blocked]
    landed_basis: "status:blocked (2026-07-01, tag-readiness resync — corrects the 2026-06-23 text below, which had gone stale) — the release act is correctly NOT yet performed, but every ENGINEERING gate row it waited on is now closed; the sole remaining precondition is the maintainer's own tag-cut act (this issue). Corrections to the prior text: E13-1 (T4 stdlib-in-Mycelium) is `status:done` — ADR-035 (2026-07-01, maintainer-ratified) narrows T4's Definition of Done to the DN-66 stable-API freeze + the core-lib self-host slice (M-714...M-718), NOT full RFC-0031 §5 D6 Rust-crate retirement of all 26 mycelium-std-* crates (that continues post-1.0, off the critical path, as M-867); E18-1 stays `status:needs-design` but is NOT a blocker in full — its shared core-lib self-host slice (T9, ADR-022 §8 Q1) is met via the same E13-1 closure, and ADR-036 (2026-07-01, maintainer-ratified) names E18-1's own remaining children (M-739...M-742, the full toolchain/compiler self-host) the project's comprehensive-dogfooding track: real, within-1.0.0, tracked work that gates the project's separate PUBLIC-RELEASE milestone, not this tag; E15-1 (T6 native AOT, re-gated as a hard row by ADR-034) is `status:done` via the E25-1 umbrella epic's M-863 ratification act (2026-07-01) — RFC-0029 -> Enacted, DN-15 -> Resolved. M-737 (ADR-023 Accepted) was already done. ADR-022 stays Accepted (NOT Enacted) — Enactment happens AT this act, not before. This task now unblocks purely on the maintainer performing the tag-cut + ADR-022 Accepted -> Enacted record; no open engineering gate remains (VR-5: a status report on checked, cited closures — DN-66, ADR-034/035/036, the E13-1/E15-1/E25-1 `done` entries — not a fresh gate run)."
    depends_on: [E15-1]
    epic: E17-1
    doc_refs: [corpus:ADR-022, corpus:ADR-023, corpus:ADR-021, corpus:ADR-034, corpus:ADR-035, corpus:ADR-036, corpus:DN-25]
    body: |
      The terminal step: verify that every ADR-022 (full-language 1.0.0 release-readiness
      gate) row is closed, then record the conscientious release decision by moving
