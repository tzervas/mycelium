  # ════════════════════════════════════════════════════════════════════════════════════════════════
  # 2026-06-19: Wave-5 — M-348 native-path unblock (decompose the libMLIR wall) + two independent
  # secondaries. Orchestrated as a swarm on claude/orch-wave5-mlir-unblock-s0li6o. Append-only; the
  # libMLIR-gated half of M-348 stays blocked (VR-5) — only the direct-LLVM half (M-373) is unblocked.
  - id: M-373
    title: "M-373 — Direct-LLVM backend: native data-fragment increment (the unblocked half of M-348)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-342, M-348]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: M-379 — direct-LLVM native tail-recursion (Fix) + Binary branch, Increment-3 of M-373)'"
    doc_refs: [corpus:RFC-0004, corpus:DN-15, src:crates/mycelium-mlir/src/llvm.rs, src:crates/mycelium-mlir/tests/native_differential.rs]
    body: |
      The direct-LLVM half of M-348, advanceable NOW with zero libMLIR (DN-15). RFC-0004 §2 explicitly sanctions a "lighter direct-LLVM backend" — llvm.rs already compiles the bit/trit subset to native code via llc+clang (passing the M-302 native differential). M-342 left the data/recursion fragment (Construct/App/Lam/Fix/FixGroup/Match) as an explicit UnsupportedNode "deferred to the MLIR->LLVM backend"; DN-15 shows that was a SEQUENCING choice, not an intrinsic libMLIR requirement — heap/closure codegen in textual LLVM IR needs no MLIR.
      Leaf 1A (design): DN-15 honest split (libMLIR-gated vs direct-LLVM-advanceable) + the closure-conversion/heap/DN-05 #1 stack-robustness strategy + a per-increment table; an APPEND-ONLY RFC-0004 revision scoping the direct-LLVM data-fragment extension under the §2 revisit clause (no Accepted text rewritten; house rule #3).
      Leaf 1B (code, gated on 1A scope): extend llvm.rs to natively compile a NON-RECURSIVE data sub-fragment (Construct + Match over bounded, non-recursive data — simple struct/tag codegen in textual LLVM IR, no GC); App/Lam/Fix/FixGroup STAY explicit UnsupportedNode (closure-conversion + heap + stack-robustness is the NEXT increment, deferred). Extend the M-302 differential to the new nodes. Every refusal explicit (G2); no guarantee upgraded without a checked basis (VR-5).
      Acceptance: a non-recursive Construct/Match sub-fragment compiles + runs natively, holds the interp<->native differential; recursion/closures remain honest UnsupportedNode; cargo test -p mycelium-mlir green.
      DONE (2026-06-19; Wave-5): Leaf 1A landed DN-15 + RFC-0004 r3 (§11, append-only — the §2 revisit clause scoped to the data-fragment increment). Leaf 1B extended llvm.rs to natively compile non-recursive Construct (stack `alloca [N+1 x i64]`, tag at slot 0) + Match (`switch i64` + explicit `@abort()` default — never silent UB, G2; `phi i32` merge); App/Lam/Fix/FixGroup split into separate explicit UnsupportedNode refusals (recursion/closures stay honestly deferred, VR-5). M-302 differential extended with a 5-program data_corpus + a refusal-still-holds test; 104 tests pass. Guarantee `Declared` (hand-written IR + empirical differential, not Proven). FOLLOW-ON (deferred, DN-15 / RFC-0004 §11.3): Increment-2 closures (App/Lam) + heap, Increment-3 recursion (Fix/FixGroup) + DN-05 #1 stack-robustness — minted at the next gate (YAGNI). The libMLIR-gated MLIR dialect half stays M-348 (blocked).

