  # ---------------- 2026-06-23: Wave — L1 surface completeness (HOF · comments · operators) ----------------
  # Maintainer re-sequencing (2026-06-23): complete the L1 surface (E7-3 HOF, E7-4 comment-preserving
  # mycfmt, E7-5 operator syntax) BEFORE the dogfooding builds (dfb: M-670/M-671), which now depend on it.
  # Capstone of the `run` kickoff. Honesty floor as E7-1: no DN-14 row flips / no tag upgrade without a
  # landed, `just check`-green implementation (VR-5).
  - id: E7-3
    title: "E7-3 (epic) — L1 Higher-Order Functions via Static Defunctionalization (RFC-0024)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P1, status:done]
    depends_on: [M-673]
    epic: E7
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, corpus:DN-14, src:crates/mycelium-l1/src/mono.rs]
    body: |
      landed on main via #397 squash-merge (2026-06-23)
      Capstone of the `run` kickoff: make higher-order functions RUN so the stdlib combinators
      (`map`/`and_then`/`fold`) can self-host. The v0 surface is first-order (no function type `A -> B`
      as a value); this epic adds a minimal HOF surface and lowers it by **static defunctionalization**
      entirely in the L1 frontend (`mono.rs`), so the L0 kernel stays first-order — **no `mycelium-core`
      change (KC-3)** — exactly the discipline M-673 used for generics/traits.
      Children (dependency-ordered): M-684 (spec: RFC-0024) -> M-685 (function-type surface: parser + AST,
      `BaseType::Fn`, `->` infix) -> M-686 (checker: `Ty::Fn`, fn-value typing, higher-order application,
      inference) -> M-687 (defunctionalizing mono: specialize each HOF call by its statically-known fn
      argument) -> M-688 (HOF capability differential + conformance tests). M-649 completes its `std.result`
      combinator swap under this epic once M-687 lands.
      Scope (honest boundary, RFC-0024): IN — named top-level functions as first-class values, resolved
      statically at the call site. OUT (never-silent `Residual`, deferred): closures/lambdas, a fn value
      flowing dynamically (from a match / data field / fn return), partial application, a still-generic fn
      passed as a value; full Reynolds defunctionalization. Guarantee Declared; differential agreement
      Empirical. STOP-and-flag guard: if any in-scope case needs an L0 node, that breaks KC-3 — escalate,
      do not add a kernel node.
      Acceptance: map/and_then/fold over Result run to closed L0 (M-210 three-way agreement on the mono'd
      env); no `mycelium-core` change; `just check` green; M-649 retires its pseudocode companion; DN-14 HOF
