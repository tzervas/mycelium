    body: |
      Minted 2026-07-07 from the M-993 staged-port plan (increment 7). Ports elab.rs's PURE lowering
      helpers -- lit_value, type_repr, scalar_kind, sparsity_class, field_spec, ty_to_repr,
      ty_to_field_ty_ref, policy_name_ref -- which produce mycelium_core::{Value, Repr, FieldSpec}, i.e.
      KERNEL L0 types. This is the FIRST wave to touch the frontend/kernel seam (DN-26 SS7.2), so it
      carries an architecturally-significant FLAG: how to represent the L0 Value/Repr in-language --
      (a) an in-language mirror model of Value/Repr (diffable against the kernel types), or (b) reach the
      kernel constructors through the @std-sys + wild FFI seam (DN-14 row 9, executes). status:needs-design
      until the maintainer picks the boundary; the pure ARITHMETIC-free helpers (scalar_kind/
      sparsity_class) can land first under either choice. This decision also fixes the L0 Node model that
      increment 8 (elab core, M-1013) and the eval leg depend on.

      User stories:
      - As the maintainer, I want the frontend/kernel L0-value boundary decided before the elaborator's
        lowering is ported, so that the self-hosted elaborator's output model is chosen once, not
        re-litigated per wave.

      Definition of Done:
      - a recorded decision (append to DN-26) selecting the L0 Value/Repr representation (mirror model vs
        wild FFI seam); the pure elab lowering helpers ported into semcore.myc under that choice; native
        `myc check` ok; live-oracle differential where a value can be materialised for comparison
        (Empirical); no logic *.rs modified. FLAGGED, not pre-decided (G2/VR-5).

  - id: M-1013
    title: "semcore Stage-5 heavy sequential core: checkty-logic -> elab -> mono -> eval -> fuse -> L0 differential"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:needs-design]
    epic: E18-1
    depends_on: [M-1009, M-1010, M-1011, M-1012, M-994]
    doc_refs:
