  # 2026-06-20: concurrent/batched sync (M-382 follow-up; speed).
  - id: M-397
    title: "M-397 — gh-issues-sync: bounded-concurrency, rate-negotiated, batched execution"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: [M-361, M-382]
    landed_date: 2026-06-20
    landed_basis: "CHANGELOG.md '### Added (2026-06-20: M-397 — `gh-issues-sync` bounded-concurrency, rate-negotiated, batched execution)'"
    doc_refs: [src:tools/github/gh-issues-sync.py]
    body: |
      Speed up the sync (M-382 follow-up) with a `--concurrency N` thread pool (default 6; N=1 = exact sequential fallback) over the existing retry/backoff/120s-timeout-wrapped `gh()`. Batched dispatch (label/milestone/issue-create/issue-update/PR-backfill/migration-relabel) preserves cross-batch dependency order; a pool-wide `RateGate` pauses the whole pool on secondary-rate-limit/abuse/403/429/Retry-After then retries once; an optional `gh api rate_limit` probe dials N down when the budget is low; never-silent fault-tolerant lock-ordered per-batch aggregation (one failure never aborts a batch).
      DONE (2026-06-20, PR #256): --self-test (all new pure helpers) + full `just check` green. HONESTY: the rate-limit tuning (N=6, pause windows, low-water) is **Declared** — GitHub does not publish secondary-limit thresholds and no live gh was run; confirm with a small live run before trusting high `--concurrency`. N=1 reproduces today's exact sequential behaviour (the safe fallback + the baseline-equivalence diff target).

  # 2026-06-20: E-BENCH — honest benchmarking & evaluation harness (E3-9 deliverable).
  - id: M-645
    title: "M-645 — mycelium-bench: cross-backend WIN/LOSS harness + LLM-report ingestion (E-BENCH)"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:toolchain, priority:P2, status:done]
