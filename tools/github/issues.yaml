  - id: M-1035
    title: "enb ENB-12 — L1 `match` on a `Bytes` scrutinee (string-literal-pattern enabler)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    epic: E28-1
    depends_on: [M-1023]
    doc_refs:
      - corpus:DN-105
      - corpus:DN-99
      - corpus:DN-34
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/src/elab.rs
      - src:crates/mycelium-l1/src/usefulness.rs
      - src:lib/compiler/semcore.myc
    body: |
      From the trx transpiler-increment profiling (DN-34 §8.21, 2026-07-10; FLAG-L1-match-Bytes). The L1
      checker categorically REJECTS a `match` whose scrutinee is `Bytes` (`check-error: match scrutinee
      must be a data, Binary, or Ternary type, got Bytes` — verified against the real `myc check` oracle).
      This blocks DN-99 register #72 (string-literal match pattern): grammatically valid Mycelium surface
      (`pattern ::= literal ::= StrLit`) that the transpiler now gaps never-silently rather than emit
      check-failing `.myc` (VR-5/G2). Reclassified from DN-99 #72's `tr-only` guess to a LANGUAGE-ENABLER
      gap (mitigation #14) — the enabler unblocks #72 and every string-`match` port target. HIGH
      semcore-lane collision — touches `crates/mycelium-l1/**` (the checker's match-scrutinee-type rule):
      cloud-semcore-lane, coordinate the serial enb pipeline / M-1013 (unfrozen-actionable per ADR-045,
      not deferred-by-freeze). Needs a Draft DN before the L1 change.

      User stories:
      - As a stdlib porter, I want to `match` on a `&str`/`Bytes` value in `.myc`, so that string-dispatch
        Rust ports keep their `match "literal" => …` shape instead of hand-lowering to an if-else chain.

      Definition of Done:
      - The L1 checker accepts a `match` on a `Bytes` scrutinee with string-literal arms (or the ratified
        equivalent surface); a differential vs the Rust semantics plus conformance accept + reject; the
        transpiler's #72 gap flips from gapped to emitted once the enabler lands (the trx pin
        `string_literal_pattern_gaps_with_l1_enabler_reason` updated in lockstep); never-silent on a
        non-exhaustive/ill-typed match (explicit error, not a panic); a Draft DN records the rule before
        the L1 change.

      LANDED (2026-07-10, PR #1371 → dev; DN-105 Draft). The `check_match` scrutinee-type gate
      (`checkty.rs:~5805`) was lifted to admit `Ty::Bytes`; a one-clause enabler, since everything
      downstream already handled an open-domain literal column generically (`usefulness::signature() →
      None` for `Bytes`; `try_match` already compares `Repr::Bytes`/`Payload::Bytes` by content).
      `elab.rs::lit_key_to_value` decodes the `by:`/`s:` literal-pattern keys to a `Repr::Bytes` value
      (established `Meta::exact` literal form — no guarantee tag upgraded, VR-5). Byte-content equality
      (`"foo"` ≡ `0x666f6f`); an OPEN domain, so a default arm is REQUIRED (a non-exhaustive `Bytes`
      match is a never-silent W7 refusal). `.myc` mirror: a dedicated `LReprBytes(Bytes)` carrier so
      `lval_try_match`'s `PLit` arm does a real byte-content match for the text form (all three `LVal`
      consumers updated; no AST/pattern node changed). Verified: three-way differential
      (`tests/enablement.rs`: text hit, fall-through-to-default, hex/text cross-spelling, static
      non-exhaustive + ill-typed rejects, explicit native-LLVM refusal) + the `.myc` eval-match oracle
      (`compiler_stage5_evalmatch.rs`); `cargo test -p mycelium-l1` green, `cargo clippy -p mycelium-l1
      --all-targets -D warnings` clean, `myc check lib/compiler/semcore.myc` clean.

      Honest residuals (VR-5/G2, tracked, NOT part of this done): the `.myc` `0x…`-hex value synthesis
      stays deferred (FLAG-semcore-25 — no wild-free hex→byte primitive; an explicit `Err`, the text
      form has full parity); the native-LLVM `Binary8`-switch backend REFUSES a `Bytes`-scrutinee match
      explicitly (`AotError`) and the trampoline AOT handles it (DN-105 §6.5); the cross-surface-form
      redundancy key stays per-form (`by:`/`s:`) — a conservative missed redundancy *lint*, never a
      wrong-arm miscompile (DN-105 §4).

      FOLLOW-UP (now UNBLOCKED, separate transpile-crate PR — outside the mycelium-l1 lane): the trx #72
      pin `string_literal_pattern_gaps_with_l1_enabler_reason` (`crates/mycelium-transpile/src/emit.rs`
      + `tests/emit.rs`) can flip from *gapped* to *emitted* now that the L1 enabler has landed.

      DISCHARGED (2026-07-10, PR #1372 → dev): the language-enabler this issue delivered is now
      consumed by the transpiler — the trx #72 arm flips *gapped* → *emitted* (`emit.rs` `Expr::Match`
      now emits a string-literal match WITH a wildcard/default arm, else gaps the open-`Bytes`
      non-exhaustive surface never-silently; the pin was renamed `string_literal_pattern_gaps_with_l1_
      enabler_reason` → `string_literal_pattern_emits_with_l1_enabler`). The measured `checked_fraction`
      corpus win is small (+0.547pp, 6.193% → 6.740%) because most string-`match` arm bodies are
      ownership/identity-conversion no-ops (`.to_owned()`/`.clone()`/…) that the same PR now GAPS rather
      than fabricates (the honest never-silent outcome, G2/VR-5). The full corpus win awaits the
      conversion-method mapping — filed as M-1037 (the next `checked_fraction` lever).

  - id: M-1037
    title: "transpiler conversion-op method mapping — ToOwned/Clone/ToString/Into → identity-or-real-surface"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:transpile, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1035]
    doc_refs:
      - corpus:DN-99
      - corpus:DN-34
      - corpus:DN-101
      - src:crates/mycelium-transpile/src/emit.rs
    body: |
      Minted 2026-07-10 (PR #1372 → dev integration close-out, the trx #72 emit-flip follow-up). The
      next `checked_fraction` lever on the 24-target port-surface corpus. PR #1372 landed the DN-99 #72
      string-literal `match` emit flip (riding the M-1035/ENB-12 L1 enabler) but the measured corpus
      gain was small (+0.547pp, 6.193% → 6.740%) because most string-`match` arm bodies — and much of
      the surrounding port surface — are Rust **ownership/identity-conversion no-op methods**
      (`ToOwned::to_owned`, `Clone::clone`, `ToString::to_string`, `Into::into`, `AsRef`/`Borrow`/
      `Deref` accessors, `to_vec`, `as_str`/`as_slice`). Mycelium is value-semantic (ADR-003), so a
      bare-call desugar (`recv.to_owned()` → `to_owned(recv)`) FABRICATES a call to a non-existent prim
      (`myc check`: `unknown function/constructor/prim to_owned`) — a G2/VR-5 violation. PR #1372's
      interim fix GAPS these never-silently (`is_unmappable_conversion_method` in `emit.rs`), which is
      correct-but-lossy: the emission is honest, but the arm/expression does not count toward
      `checked_fraction`.

      This issue is the real fix: map each conversion op to its faithful Mycelium surface — an
      **identity lowering** where value semantics make it a no-op (`recv.to_owned()`/`.clone()`/`.into()`
      /`.as_ref()` → `recv`), or a **real free-function/prim surface** where one exists or should be
      surfaced (`.to_string()` on a non-`Bytes` value → a `Display`/format lowering; `.to_vec()` → the
      Seq copy form). Also resolve the pre-existing gap-vs-fabricate decision for the other unmapped
      method receivers surfaced by the vet loop (`ne`, `fetch_add`, `contains`) — each either maps to a
      real prim or gaps never-silently, never fabricates. Every mapping is an EXPLAIN-able, never-silent
      decision; emissions stay `Declared` until a differential upgrades them (M-991 verdict, DN-34
      §8.7–§8.8); no guarantee tag upgraded (VR-5).

      **Relates to M-1024 (ENB-1) / the transpiler unknown-prim symbol-table FLAG (FLAG-tr-unknown-prim,
      DN-101):** the general fix for "does this method/prim have a real referent?" is the symbol table
      the transpiler currently lacks — a bare-call desugar cannot today distinguish a real prim from a
      fabricated one without it. M-1037 can land the conservative hand-mapped conversion set immediately
      (the closed, canonical no-op class), and fold into the symbol-table-driven check once M-1024's
      unknown-prim table exists (avoid re-litigating the same gap-vs-fabricate decision per method).

      User stories:
      - As a stdlib porter, I want the transpiler to lower a Rust `.to_owned()`/`.clone()`/`.into()`
        conversion to its faithful (usually identity) Mycelium surface, so that a string-dispatch port
        whose arm bodies are `"MAP-I".to_owned()` counts toward `checked_fraction` instead of gapping
        the whole file.

      Definition of Done:
      - Each ownership/identity-conversion no-op method maps to a faithful Mycelium surface (identity or
        real free-function/prim), `myc check`-clean, verified against the real oracle in the vet loop; a
        measured `checked_fraction` rise on the 24-target corpus recorded (`Empirical`).
      - The `ne`/`fetch_add`/`contains` (and any remaining) unmapped receivers are each mapped or gapped
        never-silently — no fabricated bare call survives (the `conversion_noop_method_gaps_never_
        fabricates_unknown_prim` pin generalized to assert no unknown-prim fabrication for the mapped set).
      - No guarantee tag upgraded; emissions stay `Declared` pending a differential (VR-5/G2). Cross-ref
        M-1024 / FLAG-tr-unknown-prim resolved or explicitly deferred with the symbol-table dependency
        noted.

  - id: M-1038
    title: "api gate tool-flag drift — cargo-public-api 0.52.0 removed --toolchain (fixed) + baseline catch-up"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:tooling, priority:P2, status:done]
    epic: E28-1
    depends_on: []
    doc_refs:
      - src:scripts/checks/api.sh
      - src:scripts/api-baseline.sh
    body: |
      Found at the enb-batch (M-1024/1025/1026/1027/1035/1033) integration close-out, 2026-07-10.
      `cargo-public-api` 0.52.0 (the version installed in this environment) REMOVED the `--toolchain`
      flag that `scripts/checks/api.sh:49` and `scripts/api-baseline.sh:37` both passed
      (`cargo public-api --toolchain "$api_toolchain" --package "$pkg" --simplified`), so every
      invocation failed identically for every crate regardless of branch content — pure environmental
      tool-version drift, not a batch-content defect (it fails the same way on `main`). This is
      logically separate from the enb batch and tracked here rather than folded into any of the batch
      issues (mitigation #14 honesty — the batch itself was clean).

      Root cause verified empirically (not guessed, G2): `cargo public-api --help` on 0.52.0 has no
      `--toolchain` option; the correct replacement is the rustup toolchain-selector form
      (`cargo +"$api_toolchain" public-api --package "$pkg" --simplified`), confirmed to build and
      emit a non-empty surface (`cargo +nightly public-api --package mycelium-fmt --simplified`, 120
      lines, exit 0).

      Fixed in both scripts (same one-line change, same `$api_toolchain` knob preserved). With the gate
      unblocked, the surface-vs-baseline diff ran for the first time since the baselines were last
      regenerated (2026-07-06) and surfaced FIVE crates' worth of accumulated, legitimate surface
      growth — not just the enb batch's stated deltas (`mycelium-l1`: `Expr::Try`/`Expr::Wrapping`/
      `Ctor::sealed`/`InherentImplDecl::params`/`PhylumEnv::link`/`Tok::Priv`/`Tok::Question`/
      `Tok::Wrapping`; `mycelium-transpile`: the `emit_expr`/`emit_block_as_expr` param thread, new
      `gap::Category` variants, `prim_map`, `batch::output_rel_path`) but ALSO prior work that landed
      2026-07-07..08 while this same broken gate silently masked the drift: `mycelium-core::binary`
      (CU-1/CU-3/CU-5/CU-6 — `bit.mul`/popcount/clz/ctz, never-silent Binary<->Float conversion,
      wrapping-mode add/sub/mul), `mycelium-interp::prims::eval_wrapping` (CU-5 dispatch), and
      `mycelium-check` (`PhylumReport`/`PhylumError`/`check_phylum_dir`/`check_phylum_sources`, the
      M-1006 `--phylum` cross-nodule check mode). Every added symbol was traced to a landed, merged
      commit (`git log -S`) — nothing unreviewed, no accidental `pub`, no leaked surface from an
      unrelated crate (the transparency review this issue's DoD requires). Baselines regenerated via
      `just api-baseline`; `scripts/checks/api.sh` re-run GREEN (57/57 crates checked/skip-N/A, zero
      FAIL) after the regen.

      User stories:
      - As an integrator closing out a batch, I want the api-surface gate to actually run (not silently
        fail on every crate due to a stale CLI flag), so that a real surface regression is caught instead
        of masked behind a uniform tool error.

      Definition of Done:
      - `scripts/checks/api.sh` and `scripts/api-baseline.sh` invoke `cargo-public-api` with a form valid
        for the installed 0.52.0 (verified empirically, not assumed); the gate runs to completion and
        distinguishes a real surface diff from a tool failure again; baselines regenerated and reviewed
        (every added symbol traced to a landed commit, no unintended leak); `bash scripts/checks/api.sh`
        green.

      DONE (2026-07-10, this close-out). Both scripts fixed to `cargo +"$api_toolchain" public-api …`;
      baselines regenerated for the 5 affected crates (`mycelium-check`/`-core`/`-interp`/`-l1`/
      `-transpile`); gate re-run confirms GREEN. No further action — a future `cargo-public-api` major
      version may drift the flag shape again; re-verify empirically against `--help` if the gate starts
      uniformly failing again (the tell: identical failure across every crate, not a per-crate diff).

  - id: M-1039
    title: "tree-sitter editor grammar missing the priv constructor-seal keyword (M-1027/DN-104 gap)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:bug, area:tooling, priority:P3, status:done]
    epic: E16-1
    depends_on: [M-731, M-1027]
    doc_refs:
      - corpus:DN-104
      - corpus:RFC-0026
      - src:tools/grammar/generate.py
      - src:tools/grammar/tree-sitter-mycelium/grammar.js
    body: |
      Found at the follow-up-batch terminal review (2026-07-10), after M-1027/DN-104 landed the
      per-constructor visibility seal (`pub type T = priv Mk(..)`, `Tok::Priv`, `parse_ctor` in
      `crates/mycelium-l1/src/parse.rs`). `tools/grammar/generate.py`'s hand-maintained
      `STRUCTURAL_KEYWORDS` set (the mechanism M-731/RFC-0026 uses to decide which lexer keywords a
      structural tree-sitter production actually consumes vs. lexes-only-as-`reserved_keyword`) was
      never updated for `priv`, so the generator auto-mis-classified it as reserved-inactive — and the
      tree-sitter `constructor` rule (`grammar.js`) had no `priv` prefix at all. Net effect: the L1
      compiler accepts a sealed constructor but the editor grammar (VS Code / any tree-sitter consumer)
      could not parse it, silently diverging from the language it is supposed to highlight (a real gap,
      not a cosmetic one — G2).

      User stories:
      - As an editor-tooling user, I want the tree-sitter grammar to parse every construct the L1
        compiler accepts, so that a sealed constructor is highlighted correctly instead of erroring.

      Definition of Done:
      - `priv` added to `STRUCTURAL_KEYWORDS`; the `constructor` production template gains
        `optional('priv')` ahead of the name field; `python3 tools/grammar/generate.py` regenerates
        `grammar.js`/`highlights.scm`/`keywords.json` with `priv` removed from `KW_RESERVED_INACTIVE`
        and the constructor rule updated; `--self-test`, `--check`, `scripts/checks/drift.sh`, and
        `scripts/checks/grammar.sh` all green.

      DONE (2026-07-10, PR #1385 -> dev). Fixed exactly as scoped above; the committed `grammar.js`
      delta is the mechanical regen output, not hand-edited. No `tree-sitter test` corpus case was
      added for the new `priv` prefix (the `tree-sitter` CLI was not available offline in this
      session) — `scripts/checks/grammar.sh`'s accept/reject corpus + the generator's own
      `--self-test`/`--check` are the gates that ran; a `tree-sitter parse` smoke test on a
      `priv`-sealed fixture is a reasonable follow-up if the CLI becomes available (not blocking —
      the grammar.js rule shape mirrors `parse_ctor` exactly, `Empirical` by code-reading, not yet by
      a tree-sitter-CLI witness).

  - id: M-1040
