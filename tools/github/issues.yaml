    body: |
      EPIC (kickoff trx2 E-B, launched 2026-07-06; gated on E32-1's hardening). Run the hardened
      transpiler across the targeted Rust to produce draft `.myc` STARTING POINTS in a dedicated
      staging tree (gen/myc-drafts/ -- outside lib/ so the /myc-dogfood gate never sees Declared
      drafts), each vetted by `myc check` and recorded in a manifest (draft -> Rust source + vet
