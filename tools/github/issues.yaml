      - src:lib/compiler/semcore.myc
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/src/eval.rs
    body: |
      Minted 2026-07-07 from the M-993 staged-port plan (the heavy sequential-core tracker, increments
      8..14). Once the tractable pure/leaf waves (M-1007..M-1012) land, the remaining, mutually-dependent
      bulk is ported in this dependency order (each a scoped PR into dev, sub-decomposed as it is worked
      -- NOT pre-fragmented here, since each sub-wave's split depends on the prior wave's data model):
        8. checkty checking core A -- declaration registration + resolution (register_types/traits/
           instances, resolve_imports, the Env model). ~1.5k Rust lines. Pure; M-987 whole-nodule cost.
        9. checkty checking core B -- the bidirectional checker (Cx, check_fn_body, check_bounds, effect
           coverage, totality integration). ~3.5k Rust lines; the heart of checkty; may itself split.
       10. elab core -- AST->L0 lowering (elaborate, Elab, build_registry, recursive_sccs [Tarjan],
           elab_fn_lam), producing the in-language L0 Node. ~2k Rust lines. Depends on increment 7's
           L0-model decision (M-1012).
       11. mono core -- monomorphization + defunctionalization (monomorphize, Mono, HOF/closure
           specialization). ~2.5k Rust lines. Depends on M-1009 (mangling) + M-1010 (free-vars) + elab.
       12. eval -- the L1 evaluator restated in value semantics (L1Value, Evaluator, the Frame/Ctrl/Regs
           stack machine, fuel/depth, to_core). ~2k Rust lines. THE hardest wave and the acute M-986/
           M-987 feasibility risk (the M-994 epicenter); may lean on the AOT leg per DN-26 SS9 flag-2.
       13. fuse -- check_fuse_laws (RUNS the ported evaluator; enumerate_finite_domain). ~292 Rust lines;
           small but gated on eval (increment 12).
       14. the whole-program L0-output differential (Rust-host == self-host over the conformance corpus)
           + the cargo-mutants witness -- the DN-26 SS7.3 Stage-5 gate proper; operationalizes M-994's
           interpreted-first-then-AOT decision (SS9 flag-2). Feeds M-741 ratification + M-742 (Stage-6).
      status:needs-design because the eval feasibility path (interpreted vs AOT for a self-hosted
      evaluator run inside the L1 evaluator) is a live M-994-adjacent question that firms up only as
      increments 8..11 land; recorded here rather than silently pre-scoped (G2/VR-5).

      User stories:
      - As a language user, I want the type-checker/elaborator/evaluator written in Mycelium, so that the
        whole frontend is auditable in the language it compiles (the M-993 parent story, at scale).

      Definition of Done:
      - checkty checking logic + elab + mono + eval + fuse ported into semcore.myc; the whole-program
        L0-output differential green (Rust-host == self-host) over the conformance corpus with the
        appropriate leg (interpreted where feasible, else AOT -- M-994); cargo-mutants witness on the
        Rust SCC; native `myc check` ok; Empirical; no logic *.rs modified. This closes the M-993 ladder
        and gates M-741.

  - id: M-1014
    title: "M-1014 -- Optimize the heavy-check surface: safe concurrency/multicore + integration-tier scheduling (quality-first)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:toolchain, priority:P2, status:todo]
    depends_on: []
    doc_refs:
      - corpus:DN-20
      - src:scripts/vsa-desktop-checks.sh
      - src:justfile
    body: |
      Minted 2026-07-07 (maintainer directive). Standing direction for the check/test
      infrastructure: heavier checks may run in the staging tier's promotion PRs, and the whole
      heavy surface should be optimized with concurrency/multicore WHEREVER SAFE -- better
      quality of evaluation, delivered fast; never quality sacrificed for speed. The 2026-07-06
      vsa-desktop-checks episode is the motivating datum: a debug single-threaded default turned
      a ~6-minute release workload into a 67-minute pinned-core run (fixed in PR #1229); the same
      class of wall-clock waste likely exists elsewhere in the heavy tier.

      Candidate optimizations (audit first; each carries an EQUIVALENCE ARGUMENT -- same trials,
      same seeds/determinism, same verdicts, only wall-clock changes -- VR-5):
      - Parallelize independent Monte-Carlo seed batches inside the heavy VSA property tests
        (rayon over per-seed batches: deterministic per-seed, order-independent aggregation).
      - cargo-mutants --jobs N; parallel z3 obligation discharge; cargo-nextest partitioning for
        the durability tier (nextest is already the Tier-0/1 runner -- extend to check-full).
      - Profile-correctness sweep: every heavy invocation runs --release unless a debug profile
        is semantically required (the PR #1229 lesson, applied repo-wide).
      - Integration-tier scheduling: record WHERE the heavy tier runs on dev -> staging promotion
        (deliberate manual dispatch or a scripted step; remote CI stays manual-dispatch/advisory
        per the standing no-auto-CI policy -- this issue does NOT change that policy).

      User stories:
      - As the maintainer, I want the durability tier to saturate the hardware it runs on, so that
        better evaluation quality costs minutes, not hours.
      - As an integrator, I want heavy checks schedulable at the staging promotion without
        wall-clock pain, so that promotion quality rises without slowing the loop.

      Definition of Done:
      - An audited list of heavy checks with their current wall-clock + parallelization status;
        each applied optimization lands with its equivalence argument (determinism/verdict
        preservation stated and, where feasible, differentially verified); the staging-promotion
        heavy-check scheduling recorded in the tier docs; no guarantee weakened (VR-5) and no
        gate silently skipped (G2).

  - id: E39-1
    title: "E39-1 (epic) — the transparent memory substrate & agent knowledge API (DN-87; name TBD)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:tooling, priority:P2, status:in-progress]
    epic: E39
    depends_on: [M-1015, M-1016, M-1017, M-1018, M-1019]
    doc_refs:
      - corpus:DN-87
      - src:.claude/kickoffs/mem.md
      - src:docs/api-index/INDEX.md
    body: |
      EPIC (DN-87, maintainer vision 2026-07-07; kickoff `mem`, stowed). Convert the project's
      corpus (methodologies, decisions, intents, language docs, tracker state) into an optimized,
      GENERATED, TRANSPARENT encoding that supplements the human-friendly format -- search/access
      akin to but improved upon RAG -- exposed as a secure, platform-agnostic API (MCP + HTTP)
      any agent platform can use, with an optimized skill set on top. Hybrid two-layer substrate:
      a deterministic structured index (the api-index/lib-index pattern generalized -- the floor)
      + a VSA semantic layer on Mycelium's own hypervector substrate (the improved-on-RAG bet,
      Empirical-gated per DN-87 §6). Rust core + Python ingestion for v0; the Mycelium-lang
      package is phase-gated (M-1019). MIT-only. NAMING IS THE MAINTAINER'S -- the build wave
      fires when the name lands; everything here is name-agnostic until then.

      NAMED (2026-07-07): **mycelium-tero** -- the maintainer's quiet homage to Atsushi Tero,
      for his contribution to science and engineering. Kickoff `mem` FIRED; the
      crates/mycelium-tero scaffold (workspace-registered, buildable, tested) landed with the
      naming PR; wave 1 = the M-1015 lane, then M-1016/M-1017/M-1018 parallel.

      User stories:
      - As an agent (Claude Code, Grok, any platform), I want cited answers about this project's
        decisions and methods in one query, so that I load context instead of re-reading the corpus.
      - As the maintainer, I want the encoding transparent and provenance-carrying, so that a
        wrong answer is traceable to its source in one hop -- never an opaque embedding artifact.

      Definition of Done:
      - M-1015..M-1019 done; the eval harness demonstrates the DN-87 §6 gate; the API + skills
        serve at least two distinct platforms; every answer carries resolvable provenance;
        regeneration is deterministic + drift-gated; MIT headers throughout.

  - id: M-1015
    title: "M-1015 — Corpus ingestion + the deterministic structured index (Layer 1)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:tooling, priority:P2, status:done]
    epic: E39-1
    depends_on: []
    doc_refs:
      - corpus:DN-87
      - src:tools/docgen/code_index.py
      - src:crates/mycelium-doc/src/lib_index.rs
      - src:tools/tero-rs/PROVENANCE.md
      - src:docs/tero-index/INDEX.md
      - src:scripts/checks/tero-index.sh
    body: |
      Minted 2026-07-07 (DN-87 §4). Generalize the proven deterministic-index pattern
      (api-index/lib-index: committed, grep-friendly MD + machine JSON, drift-gated, flagged
      section for extraction limits) over the WHOLE corpus: docs/ (RFC/ADR/DN/specs/guides),
      tools/github/issues.yaml (+idmap), CHANGELOG, research/ records, .claude/skills, and the
      existing api-/lib-index outputs (referenced, not duplicated). Rust crate core
      (mycelium-<NAME>, name pending) + Python ingestion glue where it genuinely fits. Entries
      carry: source ref (file:line/id), kind, status, guarantee tag of the cited claim where one
      exists, and stable anchors for cross-platform citation.

      User stories:
      - As an agent, I want one queryable index over decisions/issues/docs with stable anchors,
        so that a cross-cutting question is one lookup, not a dozen file reads.

      Definition of Done:
      - Deterministic regeneration (byte-identical across runs at a commit); committed artifact +
        drift gate (skip-graceful) wired the doc-index way; extraction limits in a flagged
        section (G2); every corpus family above covered or its exclusion recorded.

      DONE (2026-07-07, epic branch claude/epic/E39-m1015-corpus-index @ 1a2d7d31 + the
      integration commit): crates/mycelium-tero Layer-1 engine (reuses mycelium_doc::corpus,
      no pub widening; purpose-built YAML-subset reader, no new deps) +
      docs/tero-index/{INDEX.md,index.json} (5140 rows / 6 honestly-flagged; families
      docs/research/issues/changelog/skills each grep-cross-checked; api-/lib-index referenced
      not duplicated) + scripts/checks/tero-index.sh drift gate (wired as `just tero-index`;
      COMPONENT_ID shares doc-index's 23 -- the 5-bit space is exhausted at 31; a 32nd unique id
      needs a byte-scheme redesign, an open deliberate decision) + docs/spec/api/mycelium-tero.txt
      baseline. Deterministic two-run byte-identical (incl. the self-referential fixpoint fix);
      27 tests; change-scoped gates green. DoD met.

      TRIM (2026-07-10, chore/extract-tero-trim): crates/mycelium-tero was extracted verbatim into
      its own published repo (tzervas/tero-rs, renamed `tero`; tools/tero-rs/PROVENANCE.md) and
      removed from this workspace -- mycelium now consumes a checksum-pinned published `tero-index`
      binary (scripts/fetch-tero-index.sh) instead of recompiling the crate in-tree. Verified via a
      three-way differential (in-tree crate / published binary / committed docs/tero-index/, all
      byte-identical) before removal -- no behavior change, a build-speed trim only. The MCP/HTTP/
      eval fronts this issue's Layer-1 engine underpins are unaffected: `.mcp.json` still runs the
      vendored packages/tero-mcp-lite/ Python server, unchanged.

  - id: M-1016
    title: "M-1016 — Query engine + mandatory provenance (EXPLAIN-able retrieval)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
