    landed_basis: "CHANGELOG.md '### Added (2026-06-18: Phase-5 Batch P5-B — Rust-first Ring-2 stdlib commons, M-511/514/524/525/526/527/528/529/531/532/533/534)'"
    body: |
      RFC-0016 §4.4 — filesystem access over affine `substrate` handles (LR-8 — a handle is consumed exactly once), building on the M-514 IO surface. Every path/permission/IO failure is an explicit error (G2); no silent create-on-write, no silent truncation. OS facilities are confined to an audited `wild` block (ADR-014); the `wild`/FFI floor is RFC-0016 §8-Q6 (FLAGGED — may live in a separate std-sys phylum so pure `std` stays leak-free, LR-9).
      Acceptance (needs-design): every fs op explicit + fallible; substrate single-consumption enforced; the `wild` surface inventoried + justified.

  - id: M-529
    title: "M-529 — stdlib: `time` (clocks, durations, instants)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:done]
    depends_on: [M-501, M-502]
    landed_date: 2026-06-18
    landed_basis: "CHANGELOG.md '### Added (2026-06-18: Phase-5 Batch P5-B — Rust-first Ring-2 stdlib commons, M-511/514/524/525/526/527/528/529/531/532/533/534)'"
    body: |
      RFC-0016 §4.4 — clocks, durations, instants. Honesty crux: MONOTONIC vs WALL-CLOCK time is a typed distinction, never a silent swap (a deterministic-fragment program cannot read wall-clock entropy silently — RT2/RT3); the RFC-0008 logical clock (the M-356 reclaim windowing basis) is the in-runtime time source. Reads are declared effects (C6).
      Acceptance (needs-design): the monotonic/wall/logical clock distinction typed + explicit; time reads declared as effects; meets the M-501 contract.

  - id: M-531
    title: "M-531 — stdlib: `rand` (random number generation)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:numerics, priority:P3, status:done]
    depends_on: [M-501, M-502]
    landed_date: 2026-06-18
    landed_basis: "CHANGELOG.md '### Added (2026-06-18: Phase-5 Batch P5-B — Rust-first Ring-2 stdlib commons, M-511/514/524/525/526/527/528/529/531/532/533/534)'"
    body: |
      RFC-0016 §4.4 — RNG. Honesty crux: nondeterminism is REIFIED and NAMED (RT3) — entropy is a declared effect (C6), so a deterministic-fragment program cannot pull randomness silently; a seeded/deterministic generator is a distinct, reproducible construct. Distribution guarantees are tagged honestly (Declared/Empirical), never claimed Proven without a checked basis (VR-5).
      Acceptance (needs-design): entropy as a declared effect; seeded vs entropy generators distinct; honest distribution tags.

  - id: M-532
    title: "M-532 — stdlib: `cmp` / `convert` (ordering, equality, non-representation conversions)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:done]
    depends_on: [M-501, M-502]
    landed_date: 2026-06-18
    landed_basis: "CHANGELOG.md '### Added (2026-06-18: Phase-5 Batch P5-B — Rust-first Ring-2 stdlib commons, M-511/514/524/525/526/527/528/529/531/532/533/534)'"
    body: |
      RFC-0016 §4.4 — ordering/equality traits + value conversions that are NOT representation changes (a representation change is a `swap`, M-516 — visible + certified; this is the ordinary widening/conversion surface). Honesty crux: a LOSSY convert is an explicit fallible op, never a silent narrowing/truncation (C1); equality respects content-addressed identity where it applies (ADR-003).
      Acceptance (needs-design): lossy conversions explicit + fallible; the cmp/convert boundary vs `swap` documented; meets the M-501 contract.

  - id: M-533
    title: "M-533 — stdlib: `fmt` (formatting / display)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
