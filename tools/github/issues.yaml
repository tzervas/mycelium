  - id: M-381
    title: "M-381 — LLM-leverage validation (T3.6 retention-ratio ablation) — isolated, non-blocking"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:research, area:toolchain, priority:P3, status:done]
    depends_on: [M-380, M-002]
    landed_pr: 310
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Changed (2026-06-21: M-647/M-648/M-650/M-381/M-646 — editorial enactment sweep)'; merged-PR-list #310 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0021, corpus:RFC-0006, corpus:DN-09, src:tools/llm-harness/coauthor.py]
    body: |
      The empirical LLM-leverage gate split out of RFC-0021 (Accepted framework) as its OWN isolated, NON-BLOCKING track (RP-1 / DN-09 §4 / RFC-0006 §8 Q1). It does NOT gate RFC-0021 or RFC-0020; its only coupling is a SUPERSESSION (RFC-0021 §4.7): if the text-grammar arm retains < ~70% of the LlmCanonical familiar-skin arm's pass@1 on composition tasks, a future RFC supersedes the text-primary framing and promotes LlmCanonical to primary. Until it runs, NO leverage result is asserted (VR-5; DN-09 §4 — the working hypothesis stays supported-but-not-confirmed).
      Turnkey protocol (research/11 T11.7): the five arms (bare novel; +grammar-in-context; +constrained decoding (a new GBNF/Outlines/Guidance dependency); LlmCanonical familiar-skin (the crates/mycelium-lsp/src/project.rs renderer); embedded-DSL RR-3), >=3 seeds, >=1 frontier model, over the experiments/ harness (M-002 substrate). Headline metric: retention ratio vs the familiar-skin arm; falsification threshold < ~70% (RFC-0006 §8 Q1). Report each arm at the strength actually run (Empirical/Declared); never pre-write the verdict (experiments/README.md §3).
      Acceptance (needs-design first): the run executed per the protocol; the retention ratio + verdict recorded append-only; on falsification, the superseding RFC opened (the §4.7 trigger). Build deps it requires: the grammar-constrained decoder integration (arm 3) and the LlmCanonical renderer (arm 4, done). NON-BLOCKING: nothing in the Accepted framework waits on this.
      STATUS (2026-06-20, in-progress): retention ratio INDETERMINATE. Grok/xAI live run attempted; blocked by HTTP 403 (xAI account has no credits). Harness self-test 14/14 verified (Empirical/plumbing). Schema mismatch noted: Grok harness output (metadata/quality/performance/outcomes) differs from mycelium-bench ingestion format (harness/summary/results). Re-run requires: (1) xAI account credits, (2) schema bridge or bench-crate update. See DN-09 §7.
      STATUS (2026-06-20 retry, in-progress): harness fixed (stdout diagnostic fallback + --resume-from selective retry; self-test 16/16 incl. T14-resume). Retry run `20260620T151333Z` completed live. grok-build-0.1: syntactic_valid 14.3% (1/7 scored), typecheck_pass 14.3%, $0.006097; grok-4.3: syntactic_valid 12.5% (1/8), typecheck_pass 0.0%, $0.011025. Total spend ≈$0.035 cumulative (well within cap). Diagnostic feedback confirmed working (is_correction=true, parse-error text in rounds 2+). New PASSes: grok-build-0.1 g01-identity (1st attempt, 9s, 19 tokens); grok-build-0.1 g08-roundtrip (resumed from prior run). arm1 pass@1 4.2%; arm2 pass@1 95.8–100% (grammar-in-context). Arms 3/4/5 still BLOCKED: arm3 needs grammar-constrained decoder (OpenAI REST surface does not expose GBNF); arm4 needs harness integration of the LlmCanonical renderer (prototype enacted in crates/mycelium-lsp/src/project.rs via M-380, but not yet wired into the ablation harness as the arm4 projection path); arm5 needs embedded-DSL baseline (RR-3). Retention ratio INDETERMINATE — arm4 denominator run not executed (T11.7 step 3). KC-2 verdict unchanged: proceed. See DN-09 §8.
      STATUS (2026-06-20 ablation, in-progress): arm 4 now runnable (llm_canonical_parse compiled, M-381 W2L3 landed). Ablation run `20260620T195352Z` completed. grok-build-0.1, seeds [11,23,42], 8 tasks × 3 seeds = 24 samples/arm. Per-arm results: arm1-bare 0/24 = 0.0% [Empirical]; arm2-grammar-primer 24/24 = 100.0% [Empirical]; arm3 blocked — grammar-constrained decoder [Declared]; arm4-LlmCanonical 0/24 = 0.0% [Declared — scoring artifact: myc-check cannot parse S-expressions, not a model failure]; arm5 blocked — embedded-DSL [Declared]. Retention ratio: INDETERMINATE — arm4 denominator is 0 (arm4 result reflects scorer limitation, not model capability). Gold set new PASSes: g04-widen-swap PARTIAL_PASS (self-corrected after 1 diagnostic round), g05-narrow-swap PASS (first attempt). Total spend $0.0373 this run, ≈$0.072 cumulative. To get a determinate arm4: (a) use parse_llm_canonical_py as standalone scorer (S-expression validity only) or (b) build a LlmCanonical→L1 bridge (RFC-0021 §4.1). KC-2 verdict unchanged: proceed. See DN-09 §9.
      STATUS (2026-06-20 rigorous ablation, in-progress): retention ratio now DETERMINATE — landed the LlmCanonical→L1 bridge (DN-09 §9.4 option b; src:tools/llm-harness/grok/llm_canonical_to_l1.py), scoring arm 4 at the SAME myc-check parse+typecheck bar as arms 1/2. Two models, seeds [11,23,42], 8 tasks = 24 samples/arm. grok-build-0.1 (run 20260620T230403Z): arm1 2/24=8.3%, arm2 22/24=91.7%, arm4 4/24=16.7% [all Empirical] → retention 5.50 (550%). grok-4.3 (run 20260620T234224Z): arm1 1/24=4.2%, arm2 22/24=91.7%, arm4 10/24=41.7% [Empirical] → retention 2.20 (220%). Both ≥ ~70%: the RFC-0021 §4.7 promote-LlmCanonical trigger does NOT fire. Honest biases (VR-5): arm4's dominant failure was bridge-non-convertible model output (19/24, 12/24) and the Empirical bridge can only reject (G2) ⇒ arm4 is a lower bound; the supplied fn signature is an opposing advantage ⇒ net bias uncertain, but non-falsification is robust (arm2 91.7% dominates). Leverage claim stays Declared/open — still only 3 of 5 arms. arm3 (grammar-constrained decoding) needs a local GBNF backend (M-331/llama.cpp; xAI REST exposes no grammar param); arm5 (embedded-DSL) is the RR-3 contingency, unspent since KC-2=proceed. Self-test 17/17 (T15 bridge). Spend $0.088 this run, ≈$0.17 cumulative. Follow-ups (independent branch): arm3 GBNF backend, arm5 RR-3, fuller LlmCanonical→L1 converter, xai_sdk 1.17.0 batch-API reconciliation (gRPC CA + create/add/get/list_batch_results). KC-2 verdict unchanged: proceed. See DN-09 §10.
      STATUS (2026-06-21, clarity — NON-BLOCKING): M-381's headline deliverable (the T3.6 retention ratio + KC-2 verdict, recorded append-only) is DONE — the ratio is determinate (DN-09 §10) and the verdict (proceed) recorded. Status stays in-progress ONLY because arm 3 (grammar-constrained decoding — needs a local GBNF/llama.cpp model; xAI REST exposes no grammar param) and arm 5 (embedded-DSL, the RR-3 contingency, unspent since KC-2=proceed) are not yet run. These are research follow-ups that do NOT gate Phase-3 closure or 1.0.0 — ADR-021 Gate B2 (KC-2 verdict recorded) is MET on the recorded verdict. arm 3 / arm 5 are being built on branch claude/orch-0000-llm-ablation-arms-35 (does not block release).
      STATUS (2026-06-21, BACKLOGGED — maintainer decision): arm 3 + arm 5 modules LANDED (PR #290; arm 5 runnable, arm 3 implemented + offline-tested, runtime-blocked pending a local GBNF backend; local-LLM WSL/5080 setup automation in tools/llm-harness/local/). Per maintainer call, the remaining arm-3/arm-5 LIVE runs are now BACKLOGGED as a nice-to-have — they do NOT gate 1.0.0 (ADR-021 §5 out-of-scope; Gate B2 already met). To resume: run tools/llm-harness/local/setup_local_llm.py on a CUDA box then run_arm3_local.py (arm 3), or ./run.sh --ablation (arm 5 live). M-381 headline (retention ratio) stays DONE; status remains in-progress only to track the backlogged arms. The road to 1.0.0 is tracked in DN-19.
      DONE (2026-06-21, M-646/M-381 close, M-648 editorial sweep): Gate B2 headline met — DN-09 §10 determinate retention ratio recorded (proceed). arm-4 LlmCanonical→L1 bridge landed in M-381; arms 3/5 live runs backlogged (need a local GBNF model, ADR-021 §5 out-of-scope). Closing as done.

