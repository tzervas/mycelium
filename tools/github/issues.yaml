  # epic into per-module tasks per the user's request to capture the FULL standard library on the roadmap:
  # the Tier-A DIFFERENTIATOR modules (the library form of an Accepted RFC/ADR — unique to Mycelium) and
  # the Tier-B COMMON modules (table-stakes, held to the same RFC-0016 §4.1 per-op contract). M-510/511/512/
  # 513/514/520 above are the M-346 "early candidates" subset; the rest are added here. Every module ships a
  # checked guarantee matrix (RFC-0016 §4.5). All grounded in the cited corpus (a module whose intent isn't
  # grounded is FLAGGED in RFC-0016 §8, never invented — G2). status:needs-design / P3; numbers minted at
  # the Phase-5 gate (the M-364…368 staging precedent).
