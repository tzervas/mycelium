    body: |
      The value-model collections + precision leg. RFC-0033 (Proposed) + ADR-025..031 (Proposed) decide
      the corrected Repr/Payload: Seq/Bytes length-in-type (aligned with RFC-0032 D3/D4), Binary
      sign-free, Ternary arbitrary-width (BigTernary, REMOVES the ~40-trit cap -- core::ternary is
      already cap-honest), Dense granularity-descriptor quant in Repr + scale arrays in Payload, VSA
      explicit element-space + block-sparsity + complex carrier. Source: an external value-model research
      bundle (research/14-value-model-integration-report-RECORD.md, research/15-embeddonator-leverage-map-RECORD.md).

      HONESTY / append-only: the docs land Proposed; the maintainer ratifies -> Accepted (house rule #3,
      never skipping steps). Two decisions (ADR-030 Dense, ADR-031 VSA) deliberately DISAGREE with the
      input draft on never-silent grounds and are CONTENT-ADDRESS ONE-WAY DOORS -- they, plus the swap/
      guarantee/M-I reconciliation (M-781, which EXTENDS the ratified ADR-011 bound.basis; OQ-3 already
      closed, not reopened), land in a SINGLE content-address rehash (M-780) BEFORE any value is
      persisted for dogfooding (RFC-0033 §7, the DOGFOOD GATE).

      ID layout: design gate = M-785 (this docs PR: RFC-0033 + ADR-025..031). Implementation tasks are
      pre-allocated M-754..M-784 by docs/planning/value-model-implementation-plan.md (was provisional
      VM-010..VM-071). V0 (M-754..M-759, ternary substrate, OFF the content-address critical path) is
      scoped here now; V1-V6 (M-760..M-784) are reserved in the plan and created at their phase gates
      (the E19-1 pattern -- children scoped incrementally). NB: M-785 > the impl block because the impl
      ids were pre-allocated by the plan; ids are unique keys, not a sequence.

      User stories:
      - As a kernel engineer, I want the corrected Repr/Payload (quant descriptor, VSA element-space,
        arbitrary-width ternary) decided + ratified before mycelium-core is touched, so a content-address
        one-way door is not crossed twice (KC-3, NFR-5).
      - As an ML integrator, I want per-channel/per-block quant, FP8, and complex/integer/block-sparse
        VSA representable WITHOUT silent misrepresentation (never-silent at the Repr level).
      - As an auditor, I want every swap to carry a correctly-typed certificate after the changes
        (LosslessWithinRange growable-vs-fixed split; Bounded dequant from QuantScheme).

      Definition of Done:
      - RFC-0033 + ADR-025..031 reach Accepted (M-785 ratified).
      - V0 ternary (BigTernary) lands reconciled into core::ternary, cargo +1.92 test/clippy/fmt green
        (M-754..M-757); PackedTernary/mul-fastpath gated on a bench (M-758/M-759, YAGNI).
      - The content-address one-way doors (M-771 Dense quant, M-775 VSA elem) + the reconciliation
        (M-781) land in a single rehash (M-780) before any value is persisted.
      - just check green; CHANGELOG append-only; honest "implemented (Rust-first), pending ratification"
        framing; OQ-4/OQ-5 stay declared-open.

      DESIGN-HALF DONE (2026-07-01, maintainer ratification act): RFC-0033 flips Proposed -> Accepted;
      ADR-025/026/027/028 flip Proposed -> Accepted in the same act (ADR-029/030/031 were already
      Accepted 2026-06-24). This epic's first DoD bullet ("RFC-0033 + ADR-025..031 reach Accepted") is
      MET; M-785 (the design-gate task) flips to done. **The epic itself stays status:in-progress, NOT
      done** -- the remaining DoD bullets (V1-V6 content-address rehash M-780, the swap/guarantee
      reconciliation M-781) are UNMET and are explicitly DEFERRED to a post-1.0 wave (per the
      maintainer's 2026-07-01 ratification, recorded in RFC-0033's own changelog) -- V0 (M-754..M-757,
      already done) is the only V-numbered work landing before 1.0.0. No V-task (M-758..M-784) is
      flipped by this act; this is a status report on the design half only (VR-5: not claiming the
      impl half done when it is not).

