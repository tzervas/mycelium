      phylum-mode fix) because this MVP's `checked_fraction` payoff needs phylum-mode credit to be
      measurable -- oracle-mode vetting cannot see the emitted `use <trait-home>.<Trait>` import (a
      cross-nodule/cross-phylum reference) as clean, per DN-124 SS1.5's finding that the whole
      cross-phylum lever family is un-creditable under the current oracle-mode vet basis.

      User stories (DN-122 SS13, restated):
      - As a port-lever author, I want `impl ForeignTrait for LocalType` for a single-parameter,
