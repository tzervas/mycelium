  - id: E7-5
    title: "E7-5 (epic) — Operator syntax: words canonical, optional symbol sugar (DN-23 -> RFC-0025)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P2, status:done]
    depends_on: [E7-3]
    epic: E7
    doc_refs: [corpus:DN-23, corpus:RFC-0007]
    body: |
      The "whole other leg" of basic-mathematics / operator syntax (maintainer, 2026-06-23). Mycelium is
      word-based today (`add`/`xor`/`neg`/`and`/`cmp`). DN-23 records the decision space + recommendation:
      keep WORDS canonical in the kernel (a word operator is a named fn — first-class once RFC-0024 lands),
      and if symbolic math is wanted add it as pure surface SUGAR that desugars to the word functions
      (frontend-only, no kernel change — KC-3). Side effects already handled/moot: `-`/`->`/`=>` are distinct
      atomic tokens (no conflict); identifiers are snake_case (no forced casing change). Sequenced AFTER the
      L1 surface work (E7-3/E7-4) and BEFORE the dogfooding builds (dfb). Children: M-692 (RFC-0025 + sugar
      impl, future). Acceptance: a binding decision in RFC-0025; if symbols adopted, sugar desugars to word
      fns with no L0 change.
