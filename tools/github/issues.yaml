  - id: M-805
    title: "M-805 -- kernel & primitives consolidation; multi-kernel question (capture; RFC-0036 / rsm F5)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:spec, area:core-ir, priority:P3, status:todo]
    epic: E23-1
    depends_on: []
    doc_refs:
      - corpus:RFC-0036
      - corpus:DN-39
      - corpus:RFC-0001
      - corpus:RFC-0003
    body: |
      CAPTURE-ONLY (rsm F5). The kernel stays minimal, but the model is: ALL primitives live in the kernel,
      and the kernel is the most heavily TESTED/BENCHMARKED/CHAOS-ENGINEERED artifact -- every condition +
      error mapped/handled -- so it can be FROZEN/LOCKED/PINNED as the 1.0 kernel, rarely if ever touched
      again. Small BECAUSE targeted: only primitives, only doing in primitives what should be; everything
      else builds on top. Open structural question: ONE kernel, or SEVERAL (e.g. mycelium + binary/ternary
      + embedding + VSA/HDC kernels)? Best approach TBD. Frames the "what must be a primitive vs built on
      top" boundary review. (RFC-0036 §OQ.) Ties KC-3, DN-39 (zero promotions, boundary unchanged),
      RFC-0001/0003.

      User story: As a kernel maintainer, I want the primitive taxonomy + one-vs-many-kernel question
      resolved before the 1.0 freeze, so the trusted core is locked deliberately, not by accretion.

      Definition of Done (to leave Draft): an RFC + research enumerating the boundary + the one-vs-many
      options with a recommendation. NOTHING decided here.

  - id: M-807
    title: "M-807 -- parsable-vs-runnable gap analysis (capture; DN-50 / rsm F7)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:research, area:language, priority:P3, status:done]
    epic: E23-1
    depends_on: []
    landed_basis: "DONE (2026-06-27, lang-design wave). The census deliverable landed as DN-52 (docs/notes/DN-52-Parsable-vs-Runnable-Census.md): ~50 construct categories classified runs / explicit-Residual / silent-gap. KEY: NO silent-gaps found -- the never-silent (G2) floor holds across the v0 surface; two Undetermined rows (Dense three-way, cross-nodule three-way -- not yet in the differential corpus). Recommends a narrow standing gate (accept => runs OR explicit Residual). Census record is Draft/Empirical."
    doc_refs:
      - corpus:DN-50
      - corpus:DN-52
      - corpus:RFC-0024
    body: |
      CAPTURE-ONLY (rsm F7; from the maintainer's observation during M-753). Systematically analyze,
      parse, and determine the GAP between code that is parsable/checkable and code that is actually
      runnable/instantiable -- the frontier where the parser/checker ACCEPTS a construct but the
      elaborator/monomorphizer/runtime cannot yet RUN it three-way (L1-eval == L0-interp == AOT) or
      instantiate it at a concrete type/width. Generalizes the recurring "type-checks but doesn't run"
      pattern: traits before M-673 elaboration; iter HOFs (M-715) that type-check but don't monomorphize;
      width-generics (M-753) that parse but don't instantiate without unify width-binding. Never-silent
      (G2) applied to the implementation frontier: every accepted construct either runs three-way OR
      carries an explicit Residual/FLAG -- never a silent accept-but-unrunnable. (DN-50 §OQ.)

      User story: As a maintainer, I want a census of the accept<->instantiate frontier (runs /
      explicit-Residual / silent-gap) so the implementation gap is mapped and deliberate, never mistaken
      for "done because it parses."

      Definition of Done (to leave Draft): a research/audit record fixing the "runnable" definition,
      producing the frontier census, and recommending whether a standing gate is warranted. Generalizes
      M-719 (one slice). NOTHING decided here.

