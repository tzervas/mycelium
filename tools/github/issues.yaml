# Mycelium — GitHub issues import source.
# Source: the Phase 0–3 task breakdowns (docs/planning/phase-0.md … phase-3.md — the
# human-readable task source of truth; the docs/planning/ set is forthcoming in-repo).
# Consumers (mcp-bootstrap.md over MCP; gh-bootstrap-local.sh for labels/milestones; Grok for
# the board): create issues in the order listed; then in a SECOND pass
# resolve each `depends_on` task-id to its created issue number and set it as a dependency
# ("blocked by") and/or add it to the parent epic as a sub-issue. The `id` is the stable task key.
# Phase 2/3 entries are EPICS (decompose into child issues when that phase's gate opens).

issues:
  # ---------------- Phase 0 ----------------
  - id: M-001
    title: "M-001 — Liquid-Haskell bundle capacity-refinement probe"
    milestone: "Phase 0 — Confirm & Specify"
    labels: [phase:0, type:verification, area:numerics, priority:P0, status:done]
    depends_on: [M-010]
    doc_refs: [corpus:RFC-0003]
    body: |
      Encode MAP-I `bundle` as a capacity refinement instantiating the cited theorems (RFC-0003 §5; T0.2: Clarkson 2023, Thomas 2021) and confirm Z3 discharges it for >=3 concrete (d,k,s,m,delta) settings.
      Acceptance: LH module type-checks; Z3 discharges; short writeup confirms the axiomatized-theorem + checked-instantiation strategy; KC-1 upgraded "passed (literature)" -> "confirmed (build)".

