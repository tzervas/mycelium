    doc_refs: [corpus:RFC-0006, corpus:DN-09]
    body: |
      Fixed benchmark: tasks generated in the minimal Mycelium surface fragment vs a Python-embedded DSL baseline; measure syntactic validity + type-check pass rate + edit-to-fix iterations (Foundation §6 P0.2; SC-5b; G10).
      Acceptance: SC-5b baseline number + a written KC-2 verdict (proceed / reweight-to-human / fall-back-to-embedded-DSL).
      DONE (2026-06-18/2026-06-20): KC-2 verdict = proceed, recorded in DN-09 with basis (local Qwen2.5-Coder ≤7B, 10-task gold set, seed 42; best arm 7B+examples 40%→70%, +30pp edit-to-fix). Grok/xAI follow-up arm (2026-06-20) blocked by API 403 (account has no credits); harness self-test 14/14 verified; verdict stands on local-model evidence. Full Grok run remains open (M-381 / DN-09 §7).

