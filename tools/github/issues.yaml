    body: |
      Gate RFC-0002 certificate EMISSION and the M-210 checker / ADR-010 bound kernels behind the mode:
      `fast` = neither; `balanced` = emit (unchecked); `certified` = emit + check. The certificate
      machinery itself is UNCHANGED.
      Acceptance / DoD (TDD):
      - Property test: `fast` swaps run cert-free; `certified` swaps emit + check (and reject on
        check-failure, never-silent); `balanced` emits without checking.
      - Out-of-range stays an explicit Option/error in EVERY mode (Axis-B is not gated here).
      - fmt/clippy -D warnings/test -p mycelium-cert green.

