  - id: M-364
    title: "M-364 — `mycfmt`: the standalone canonical formatter (M-142 grows up)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-142, M-358, M-361]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: `mycfmt` — the canonical formatter, folded — M-364)'"
    body: |
      Sub-issue of M-361. Grow the M-142 canonical formatter (today: the Core-IR α-normalizing dump + the surface `expand_to_source` printer in mycelium-lsp/mycelium-l1) into a standalone `mycfmt` CLI over `.myc` sources: idempotent canonical formatting that PRESERVES the DN-06 `// nodule:` header marker + the M-359 structured `// @key:` header (M-358/M-359), never changes content-addressed identity (ADR-003 — formatting is a projection, RFC-0001 §4.8), and is EXPLAIN-able about any normalization it applies (no black box). Reads the `[toolchain].format` pin from `mycelium-proj.toml` (M-359). Honesty: a file it cannot parse is an explicit error, never a partial/garbled rewrite (G2). No kernel change (KC-3). Acceptance (design-first): the formatter contract + idempotence/identity-preservation tests before folding.
  - id: M-365
    title: "M-365 — toolchain correctness / type-check driver (`myc-check` grows up)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: `myc-check` — the correctness driver, folded — M-365)'"
    body: |
      Sub-issue of M-361. The toolchain-grade correctness/type-checking entry point: grow the `myc-check` prototype (mycelium-l1) + the M-210 shared TV checker into a project-aware driver that checks a whole `phylum`/program (resolving the `mycelium-proj.toml` surface + dependencies, M-359), reports every refusal as an RFC-0013 structured diagnostic (routed via the M-362 baseline), and exits non-zero on any error (CI-usable). Honest per-op guarantees preserved (VR-5); a `NotValidated`/`TypeMismatch`/`UnresolvedName` is explicit, never silent (G2). Lives above the kernel (KC-3). Acceptance (design-first): the driver's project-resolution + diagnostic-aggregation contract before folding.
  - id: M-366
    title: "M-366 — lint + auto-fix (RFC-0013/0014/0015 diagnostics surfaced as actionable fixes) + the §4.1 doc quality-bar lint"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
