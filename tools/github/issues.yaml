  - id: M-1023
    title: "enb — enabler FLAGs surfaced by the spw Wave-0 stdlib ports (numerics/time/content)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1020, M-1021, M-1022]
    doc_refs:
      - corpus:ADR-038
      - corpus:RFC-0031
      - corpus:ADR-040
      - src:crates/mycelium-core/src/binary.rs
      - src:crates/mycelium-interp/src/prims.rs
      - src:.claude/kickoffs/spw.md
      - src:lib/std/numerics.myc
      - src:lib/std/time.myc
      - src:lib/std/content.myc
    body: |
      Consolidated backlog issue (kickoff `spw`, Wave-0 pilot, 2026-07-09). The three differential-
      witnessed stdlib ports (M-1020/M-1021/M-1022) surfaced real below-grammar / runtime blockers that
      keep each port an HONEST PARTIAL (VR-5/G2). Routed here to the `enb` epic (E28-1) so the Wave-0
      residual has a tracked path to closure — never silently dropped (G2). None was forced; each blocked
      op was FLAGged, not faked. This is a tracking/consolidation issue, not a single-PR feature; each
      item below either maps to an existing `enb` gap (cross-referenced) or is a newly-surfaced need.

      ALREADY TRACKED (cross-reference, not a duplicate):
      - Scalar-Float VALUE in the `.myc` runtime — Gap A / M-895 (ADR) · M-896 (Repr variant) ·
        M-897…M-900 (literal/arith/cmp/conformance) · ADR-040 §2.5. The DOMINANT std.numerics blocker:
        the entire float-valued eps/delta magnitude surface (error_bound/prob_bound/union_delta/
        accuracy_to_probability/check_error/check_union, combine's eps-composition, Bound/BoundKind,
        DECLARED_FLOAT_EPS, matrix magnitudes) stays Rust (mycelium-numerics, RFC-0031 D1) until it lands.

      NEWLY SURFACED (not previously tracked in issues.yaml):
      - TC_MAX_WIDTH=64 two's-complement ARITHMETIC prim cap (crates/mycelium-core/src/binary.rs:140,362 —
        add_s/sub_s/neg_s/mul_s refuse when the width itself exceeds 64, via an i128 intermediate range
        check). The DOMINANT std.time blocker: faithful signed 128-bit Duration/WallInstant arithmetic
        (duration_add/sub/scale, checked_neg/abs) and the u64-difference ops (mono_diff/logical_diff need
        >=65-bit signed) all refuse at width 128 regardless of value — a structural cap, not an edge case.
        The signed COMPARE family (binary::cmp_signed -> lt_s) is width-uncapped, so the ORDERING surface
        IS ported. Fix options: a multi-limb TC arithmetic prim lane, OR a DN-ratified Binary{64}-narrowed
        Duration with a domain-bounded differential.
      - No top-level `const` item production in the grammar — blocks a literal port of const tables
        (DECLARED_FLOAT_EPS, the GUARANTEE_MATRIX/MATRIX). Non-hard: the lib/std/core.myc precedent
        (`fn matrix() => Vec[Row] = Cons(row_a(), Cons(row_b(), ...))`) is the standing workaround, reused
        by all three ports. Recorded because this const-table gap class recurs across ports.
      - No slice/array type (`&[T]` / `[T]`) anywhere in the grammar — blocks signatures like
        `&[GuaranteeRow]` / `&[MatrixRow]` and the union_delta/check_error/check_union/composed_prob_basis
        surface.
      - No unit/void (`-> ()`) return type representable — matrix.rs `assert_matrix_invariants() -> ()`
        was gapped for exactly this.
      - No sealed/private-field or private-constructor VISIBILITY primitive — blocks reproducing the
        FR-N3 ProvenThm capability-gate (Rust's `mod sealed { pub(super) struct Sealed }` + private-field
        pattern has no `.myc` analogue). Approx::proven was OMITTED rather than ported ungated (porting an
        ungated public `proven` would fabricate a `Proven`-strength escape hatch, violating the invariant
        it protects — VR-5). A real DESIGN gap: needs an `enb` sealing/visibility enabler OR an accepted
        alternate idiom (a DN) before `Approx::proven` can be honestly ported.
      - No `bytes.find` / `split_once` / `contains` prim (only bytes.len/get/slice/concat/eq + hash.blake3
        are registered in crates/mycelium-interp/src/prims.rs) — std.content's parse_ref and
        content_ref_from_str are hand-rolled recursive byte scans; a find/split_once prim would collapse
        them.
      - No kernel structural-hash prim over the interpreter's own Value/Node (std.content's
        hash_of_value / hash_of_def) — RFC-0031 D1 boundary; only raw-bytes hash.blake3 is surfaced
        (M-912). Candidate enabler: a kernel prim analogous to hash.blake3 but over the interpreter's own
        alpha-normalized Value/Node representation, OR full Value/Node self-hosting in lib/compiler
        (explicitly out of the spw kickoff's scope).
      - Cross-nodule `use` / import with a resolvable symbol table still open (DN-34 §4/§8.2) — sidestepped
        today by LOCALLY MIRRORING the needed kernel ADTs (lib/std/core.myc, lib/std/diag.myc precedent),
        a confirmed-viable convention; noted so the underlying import gap is not forgotten.

      NON-BLOCKING (ergonomics backlog; workarounds exist, recorded per G2, not gating any port):
      - No inherent-impl generic-parameter slot (`impl<T> Foo<T>` has no grammar production) — worked
        around with top-level `[A]`-parameterized fns (lib/std/option.myc idiom).
      - No saturating_add prim / never-silent-variant DN — std.time's saturating advance_mono/step_logical
        omitted (Rust `saturating_add` silent-clamp != the self-hosted never-silent checked add_u).

      DEFERRED HOST-FFI (not an `enb` grammar/runtime enabler — tracked elsewhere):
      - OS SystemClock read + the ClockSource trait object (std.time) -> M-541 (std-sys clock floor,
        wild/@std-sys side-effect handling). The deterministic ManualClock half IS ported.

      VERIFY-FIRST NOTE, surfaced not acted on (mitigation #14, for the recover/swap owners): both
      lib/std/recover.myc (FLAG-recover-1) and lib/std/swap.myc (FLAG-swap-1) assert "no content-hash
      primitive is exposed to .myc" for ContentHash broadly. M-912's hash.blake3/bytes_eq (landed
      2026-07-02) now make ContentHash-as-opaque-digest expressible (std.content's digest_eq is landed),
      so that claim is now TRUE ONLY for the hash_of_value/hash_of_def STRUCTURAL-hash surface, not the
      opaque-digest surface. Landing ordering is ambiguous (both files + M-912 share the 2026-07-02
      landing day), so this is NOT a confirmed staleness and NOTHING was re-implemented — flagged for the
      recover/swap owners (or a later integrator) to re-verify + append-only clarify, not acted on here
      (out of this wave's ownership boundary).

      User stories:
      - As the `enb` epic owner, I want the spw Wave-0 ports' surfaced blockers consolidated with their
        exact kernel/grammar loci and their existing-gap cross-references, so that the Wave-0 residual has
        a single tracked path to closure and the Rust oracle crates a concrete ADR-043 retirement trigger.

      Definition of Done:
      - Each newly-surfaced enabler above is either scheduled under `enb` (mapped to a Gap A–E lane or a
        new child) or explicitly maintainer-deferred with rationale (G2); as its enablers land, the
        corresponding M-1020/M-1021/M-1022 residual becomes `.myc`-expressible and a follow-up whole-crate
        differential can re-attempt the full port and (per ADR-043) trigger the Rust crate's retirement.
      - No enabler here is silently dropped; the verify-first note is either resolved (append-only) by the
        recover/swap owners or explicitly left open with rationale.

  - id: M-1024
    title: "enb ENB-1 — cross-nodule symbol resolution + runtime execution"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:in-progress]
    epic: E28-1
    depends_on: [M-982, M-1023]
    doc_refs:
      - corpus:DN-99
      - corpus:DN-101
      - corpus:DN-34
      - corpus:RFC-0031
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/src/eval.rs
      - src:crates/mycelium-l1/tests/phylum_exec.rs
    body: |
      From DN-99 §8 ENB-1 (Draft backlog, kickoff `spw`). Closes register rows #41 (cross-nodule
      runtime exec), #13 (mod-declaration), #1 (import-use), #16/#18 (qualified path). The check-time
      half is LANDED (resolve_imports, M-662); the runtime half is open — the evaluator holds a single
      per-nodule env. Under the whole-project unfrozen posture (ADR-045) this is the PREFERRED real close
      over the local-mirror sidestep: give the evaluator a phylum-wide view that reuses the check-time
      import registry as the runtime link table (DRY, KC-3 — no new L0 node), then AOT parity. Rides
      M-982. HIGH semcore-lane collision — touches `crates/mycelium-l1/**`: cloud-semcore-lane, coordinate
      M-1013 (unfrozen-actionable, NOT deferred-by-freeze). Needs a Draft DN before implementation.

      Cross-ref (trx increment, 2026-07-10; DN-34 §8.21): also tracks **FLAG-tr-unknown-prim** — the
      transpiler's generic method-call desugar (`emit.rs` `Expr::MethodCall` fallthrough) emits unknown
      prim methods blindly (`b.is_ascii_alphanumeric()` becomes `is_ascii_alphanumeric(b)`, a
      plausible-but-wrong VR-5/G2 emission). Closing it cleanly needs a known-prim set / symbol table,
      which the cross-nodule symbol resolution this issue establishes (register #21/#50) is the natural
      home for — so no separate issue is filed (mitigation #14).

      User stories:
      - As a stdlib porter, I want a `.myc` nodule to call symbols defined in another nodule at RUNTIME,
        so that a multi-nodule port runs end-to-end instead of local-mirroring every shared ADT.

      Definition of Done:
      - Two-nodule phylum witness green under both the interpreter and AOT; the runtime link table reuses
        the check-time import registry (no duplicate resolution); never-silent on an unresolved symbol
        (explicit error, not a panic); a Draft DN records the design before the L1 change.

      Progress (2026-07-10, PR #1360 — FIRST landable increment; status → in-progress, NOT done):
      - LANDED: `PhylumEnv::link()` (checkty.rs) folds every nodule's checked decls into one linked `Env`
        the existing elab/mono/eval pipeline consumes unchanged (KC-3 no new L0 node; DRY reuses the
        check-time registry). Draft DN recorded (DN-101, renumbered from DN-100 to avoid M-1032's).
      - Verify-first (mitigation #14): DIRECT cross-nodule execution already worked (undocumented); the
        real gap closed is TRANSITIVE (a `pub` fn calling its home nodule's private helper). 6 differential
        witnesses in `tests/phylum_exec.rs` (direct + transitive vs an inlined oracle on the L1-eval and
        L0-elaborate legs; never-silent collision refusal; without-link `Stuck` control; positive
        direct-without-link control; phylum-of-one). Coherence-map merges (impls/instances/lower/prov)
        are uniformly never-silent (G2) after PR review — no first-wins winner on any duplicate key.
      - v0 flat namespace: a cross-nodule name collision is a never-silent `CheckError` (G2). No tag upgraded.
      - RESIDUAL (this issue stays open): AOT/MLIR parity leg = follow-up increment (interpreter + L0 legs
        witnessed here, not AOT). `.myc` runtime parity = N/A until the `.myc` evaluator exists (feasibility
        -gated on M-986/M-987; the check-time dual resolve_imports is already ported, M-1013 STEP 4).
        Collision DISAMBIGUATION (qualified per-nodule scoping) deferred to M-982 — needs a ratifying DN
        (see DN-101 §5). FLAG-tr-unknown-prim (the known-prim symbol table) still owed here (register
        #21/#50). Register rows #72/#85 corrected `tr-only` → `language-enabler` (DN-34 §8.21).

      CLI reconciliation (2026-07-11, PR #1427, `claude/leaf/m1024-linker-reconciliation`, merged to
      `dev` — append-only, does not edit the record above). Collapses `mycelium-cli`'s own duplicate
      flatten-by-name linker (`merge_phylum_env`/`merge_map`/`fmt_pair_key`, ~155 LOC) onto the
      canonical `PhylumEnv::link` from this issue (DRY — one linker, not two); `run_multi_nodule` now
      calls `phylum_env.link()` directly. Fixes a real user-facing bug found along the way: `myc check`
      type-checked each `.myc` source in isolation (a phylum-of-one) so a project with a genuine
      cross-nodule `use` always refused, even though the identical project ran fine under `myc run`
      (which already assembled every source into one `Phylum`). New shared seam
      `assemble_and_check_phylum` in `mycelium-cli` is now the one path both `myc check` and
      `myc run`/`myc build` share. Intentional behavioral delta (per DN-101 §5-A v0 flat-namespace
      semantics): `link` refuses ANY cross-nodule simple-name duplicate, even byte-identical, stricter
      than the retired linker's identical-bytes tolerance — a correctness upgrade, not a regression.
      `CheckReport.checked`/`failures` corrected to the same all-or-nothing honesty as
      `mycelium-check`'s `PhylumReport` (VR-5) since `check_phylum` cannot supply a per-nodule verdict.
      `checkty.rs` untouched (confirmed via diff — parallel-safe with the concurrent M-1054 facility
      build touching that file). `cargo test -p mycelium-cli`: 36 passed (2 new); `cargo test -p
      mycelium-check`: 9 passed unchanged; `cargo test -p mycelium-l1 --test phylum_exec`: 6 passed
      unchanged (the `link` differential this issue landed, untouched by the CLI-side change).
      FLAGGED follow-up (not done here, out of this leaf's declared scope): `mycelium-check`'s
      `check_project`/`check_sources` (phylum-of-one) still exist alongside `check_phylum_dir`
      (already phylum-aware) — a smaller in-crate follow-up could point `myc-check --project` at
      `check_phylum_dir` instead. Does not change this issue's own `status:in-progress` / AOT-parity
      residual above.

  - id: M-1025
    title: "enb ENB-2 — `?` try-operator grammar sugar + desugar"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:in-progress]
    epic: E28-1
    depends_on: [M-527, M-1023]
    doc_refs:
      - corpus:DN-99
      - corpus:DN-102
      - corpus:DN-34
      - src:crates/mycelium-l1/src/token.rs
      - src:crates/mycelium-l1/src/parse.rs
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/tests/try_operator.rs
    body: |
      From DN-99 §8 ENB-2 (Draft backlog). Closes register rows #60 (`?` grammar sugar, genuinely open —
      verified zero `?`/`Question` tokens in token.rs) and #52 (the try-operator idiom facet). A
      `Question` token plus a postfix desugar to the already-present `Result`/`Option` bind — surface +
      lowering over EXISTING runtime semantics, NO new kernel semantics. Pins the error-type unification
      rule. HIGH semcore-lane collision — touches `crates/mycelium-l1/**` (token/parse/elab + the
      self-hosted frontend under port): cloud-semcore-lane, coordinate M-1013 (unfrozen-actionable, not
      deferred-by-freeze). Needs a Draft DN.

      User stories:
      - As a stdlib porter, I want to write `expr?` in `.myc`, so that error-propagating Rust ports keep
        their shape instead of hand-desugaring every `?` to nested `match`.

      Definition of Done:
      - Differential `?` ≡ the hand-`match`/`and_then` desugar (three-way where forms close); the
        error-type unification rule pinned; conformance accept + reject; a Draft DN records the desugar.

      Landed — FIRST INCREMENT (2026-07-10, PR #1363; `status: in-progress`, NOT done). The `let`-binder-RHS
      scope of `?` is landed in the Rust reference frontend: `Tok::Question` (lexer) -> `parse_app` postfix
      `e?` -> `Expr::Try` -> the CHECKER desugars `let x = e? in body`, type-directed on `e`'s checked
      `Result`/`Option` type, to the existing `match` bind (`Ok(x) => body, Err($f) => Err($f)` /
      `Some(x) => body, None => None`) with the continuation inside the binding arm — so the propagation
      arm unifies with NO early-return and NO never-type (the DN-102 §2 fork resolution). `Try` never
      survives checking (KC-3, no new L0 node); elab/eval keep only a defensive never-silent residual.
      The `.myc` mirror REPRESENTS `Try(Expr)` (all 5 encoders + every walker) but does not yet PRODUCE
      it (`Wrapping` precedent). Design recorded in Draft DN-102 (maintainer ratifies the v0 scoping +
      the CPS-lift follow-up — house rule #3, not self-ratified). VERIFIED: `cargo test -p mycelium-l1`
      (`tests/try_operator.rs` — 6 behavioural cases Ok/Err + Some/None + chained on L1-eval AND the
      three-way L0 leg, plus 4 never-silent reject witnesses), `-p mycelium-fmt`, `-p mycelium-lsp` green;
      `cargo fmt --check` + `cargo clippy -p mycelium-l1 --all-targets -D warnings` clean; `myc check` on
      the touched `.myc` mirrors green.

      Residual (flagged, VR-5/G2 — NOT done):
      - FLAG-try-1 — general `?` position (the CPS lift). `?` outside a `let`-binder RHS (`g(f()?)`,
        `f()?.m`, tail `e?`, repeated `e??`) is a never-silent refusal, not lowered. Generalizing it
        needs a CPS lift of the enclosing expression, which is gated on the never-type `-> !` / an
        early-return form (M-1030 / DN-99 #88) — deferred to an ENB continuation (DN-102 §5/§6).
      - FLAG-try-2 — no `From`-error widening. The error-type unification rule (DN-102 §3) is exact-match
        only; a widening `?` (Rust's `From::from` on the error) is refused until an error-conversion trait
        lands.
      - FLAG-try-3 — the `.myc` frontend represents-but-does-not-produce `?` (no self-hosted lex/parse
        rule yet); `myc check` (Rust-backed) handles `?` in a `.myc` file. The `.myc` elab/eval mirror
        follows the port's general cadence (DN-26), not this increment.
      - FLAG-try-5 — `?` dispatches on the operand's type NAME (`Result`/`Option`), not its structure
        (DN-102 §6). A user type shadowing the name with a different shape fails closed (never-silent
        constructor-mismatch, G2) rather than with a targeted diagnostic; structural dispatch is the
        follow-up if a port witnesses the need (PR #1363 review).

      Review (PR #1363, pr-reviewer T2 deep): the Expr-walker sweep verified COMPLETE (no missed
      walker across the Rust core, 6 test-harness encoders, 5 `.myc` mirrors, and the mycelium-fmt/-lsp
      consumers); one HIGH fixed pre-merge — the type-peek in `check_try_let` double-invoked the affine
      tracker (spurious `double-consume` on an affine-`Substrate` `?`-operand), resolved by snapshotting
      the affine tracker around the peek, with a regression witness in `tests/try_operator.rs`.

      Progress note (2026-07-11, DN-107 ratification — corrects FLAG-try-1's framing, append-only):
      DN-107 (ENB-7, host-effect + never-type) was ratified with its §6 fork resolved in favour of the
      note's own lean — general-position `?` (this issue's FLAG-try-1) is INDEPENDENT of the never-type
      `-> !`. The CPS lift `match f() { Ok(x) => Ok(g(x)), Err(e) => Err(e) }` unifies both arms by
      ordinary structural equality (`Result[B,E]`), no bottom type needed. FLAG-try-1's "gated on the
      never-type `-> !` / an early-return form (M-1030 / DN-99 #88)" framing above is therefore
      RELAXED: the general-`?` CPS lift is its own follow-up (tracked via M-1049, DN-102's
      second-research-pass issue), independent of M-1030/DN-107's scope. No change to this issue's own
      landed status or DoD.

      Progress note (2026-07-10, DN-102 ratification, append-only): DN-102 is ratified → Accepted
      (SP.5 Rank 1). M-1049 (the second-research-pass issue) is now `done`; the general-`?` CPS-lift
      follow-up this progress note referenced is now tracked as its own issue, **M-1059**
      (decoupled from M-1030 per DN-107 §6-a). No change to this issue's own landed status or DoD.

  - id: M-1026
    title: "enb ENB-3 — impl-level generic-parameter slot"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    epic: E28-1
    depends_on: [M-1023]
    doc_refs:
      - corpus:DN-103
      - corpus:DN-99
      - corpus:DN-34
      - src:crates/mycelium-l1/src/parse.rs
      - src:crates/mycelium-l1/src/ast.rs
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      From DN-99 §8 ENB-3 (Draft backlog). Closes register row #63 (generic-parameterized impl-block,
      partial — no impl type-params slot). Add the `type_params` slot to `parse_impl_item` (mirroring
      fn/object), thread it into the impl AST, monomorphize via the existing path; decide lifetime
      erasure. Needed for a faithful impl-block-preserving self-host; the stdlib lane is unblocked
      meanwhile by impls-as-functions. HIGH semcore-lane collision — touches `crates/mycelium-l1/**`:
      cloud-semcore-lane, coordinate M-1013. Needs a Draft DN.

      DONE (landed-basis, PR #1367 → dev, 2026-07-10). The inherent-impl slot `impl[T] Foo[T] { … }`
      parses, checks, and monomorphizes: a `[T, …]` slot is parsed immediately after `impl`
      (`parse_impl_item`, unambiguous — no base type begins with `[`), threaded into
      `InherentImplDecl.params`, and desugared at Phase-0 by prepending the params to each lifted
      method's own `fn` type-params — so monomorphization reuses the EXISTING fn-generics path with zero
      new mono code (KC-3/DRY; VR-5 — no tag upgraded). Verified: `crates/mycelium-l1/tests/check.rs`
      differential (`generic_inherent_method_monomorphizes_across_two_type_args` — two type args ⇒ two
      specializations + a closed monomorphized env), a backward-compat identity witness, and three
      never-silent reject witnesses (generic-trait-instance / bound-in-slot / duplicate-param). The
      four `.myc` mirrors + stage-5 encoder + stage-3 classify-test carry the 3-field `IID` slot; dogfood
      `myc check` strict. Lifetime-erasure resolves N/A (no lifetime surface in v0). Design: Draft DN-103
