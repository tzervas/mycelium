  - id: M-1002
    title: "M-1002 — Stand up gen/myc-drafts/ staging tree + manifest schema + batch vet driver"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E33-1
    depends_on: [M-1000]
    doc_refs:
      - src:crates/mycelium-transpile/src/batch.rs
      - corpus:DN-34
    body: |
      Minted 2026-07-06 (kickoff trx2 E-B). Create the staging tree (gen/myc-drafts/, greenfield
      -- nothing references it yet) with a README stating the honesty contract (everything here
      is `Declared` draft material, never imported by lib/, never dogfood-gated), a manifest
      schema (per draft: Rust source path + content hash, transpile stats, gap counts by
      category, vet status + myc-check exit class, timestamp), and a batch driver that runs
      transpile -> vet (M-1000's loop) over a target list and writes drafts + manifest
      deterministically.

      User stories:
      - As the orchestrator, I want a manifest that says per-draft where it came from and whether
        it checks, so that M-993 can triage drafts without re-running anything.

      Definition of Done:
      - gen/myc-drafts/README.md (honesty contract + regeneration command); manifest schema
        implemented + documented; batch driver runs the M-1000 loop over an explicit target list;
        deterministic output (stable ordering, no timestamps that churn diffs -- or timestamps
