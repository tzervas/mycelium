      - As a Mycelium developer, I want to `expand`/`EXPLAIN` a named-field sugar to see the
        positional grammar it compiles to (house rule #2 / DN-106 GP1 transparency).
      - As a maintainer, I want the named-field surface to be sugar with zero kernel-semantic growth
        (KC-3), so a rename stays identity-neutral and no named-field resolver enters the trusted
        base.

