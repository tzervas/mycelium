    landed_basis: "DESIGN DONE + IMPLEMENTED PARTIAL (Rust-first) (2026-06-28, obj+low integration wave). DESIGN: DN-54 AUTHORED + ratified-pending (docs/notes/DN-54-*.md). IMPLEMENTED (surface + STRUCTURAL checks only): `lower`/`derive` active keywords (settling grow->derive, DN-38 §8.1); AST Item::Lower/Item::Derive + LowerDecl/DeriveDecl; parse_lower_decl/parse_derive_decl (item position; rejected at expr position, G2); checker Pass-3e structural checks -- rule-name uniqueness, param-name uniqueness, derive name-resolution -- all never-silent (CheckError, G2); rule registered in Env::lower_rules. Conformance accept/22-lower-derive + reject/26-lower-missing-eq + reject/27-derive-missing-for. DEFERRED to M-812-cont (held Declared, VR-5): (1) RHS elaboration to L0 -- derive emits NO L0 today (honest never-silent residual, pinned by guard tests); (2) §4.1 IL-grammar RHS type-check; (3) §6 KC-3 kernel-growth guard; (4) §4.2 cross-rule acyclicity; (5) §7 verification harness. Guards (2)/(3) meaningful only once (1) lands. DN-54 status: Implemented (Rust-first, surface + structural checks), remaining pending -- pending ratification. Prior: DONE (2026-06-27, lang-design wave) -- DN-54 AUTHORED, status Proposed."
    doc_refs:
      - src:docs/notes/DN-54-User-Extensible-Generative-Lowering-Surface.md
      - corpus:DN-38
    body: |
      User-extensible generative-lowering (DN-38 extensibility ruling). DESIGN done; IMPLEMENTED PARTIAL Rust-first
      (M-812, obj+low integration wave): `lower`/`derive` active keywords + STRUCTURAL checks (uniqueness,
      param-uniqueness, derive name-resolution -- never-silent). The load-bearing SAFETY work -- RHS elaboration
      to L0, the §4.1 IL-grammar RHS type-check, and the §6 KC-3 kernel-growth guard -- is DEFERRED to M-812-cont
      (derive emits no L0 today; honest residual, not a fabricated accept). Held Declared (VR-5).

  - id: M-812-cont
    title: "M-812-cont -- DN-54 derive elaboration + KC-3 kernel-growth guard + IL-grammar RHS check (the load-bearing safety)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    epic: E7-1
    depends_on: [M-812]
    landed_basis: "status:done (core; consumption-model residual flagged) — DN-54 §4.1/§4.2/§4.6/§6/§7 landed (lwd kickoff, 2026-06-29): (1) RHS elaboration to L0 — `elab::elaborate_lower_rule` reads Env::lower_rules and lowers a rule RHS through the SAME path a hand-written nullary fn body takes (Empirical, via the §7 differential + M-210 check_core); (2) §4.1 IL-grammar RHS type-check (`check_lower_rule_rhs_type`, Declared); (3) §4.6 purity — `wild` refused in a rule RHS even in @std-sys (Declared); (4) §4.2 cross-rule acyclicity (`check_lower_rule_acyclicity`, iterative DFS; self+mutual cycles refused, Declared); (5) §6 KC-3 kernel-growth guard — GENUINELY SOUND (Proven-by-construction, narrow checked sense: the elaborator returns the closed `mycelium_core::Node` enum, so a rule cannot construct a variant outside the frozen L0 grammar; host-op growth closed by §4.6; non-vacuously confirmed by Node::is_aot_lowerable over the frozen node set). §7 harness `tests/lower_derive.rs` (5 tests: structural identity, run-value differential, KC-3-in-fragment, hygiene, round-trip) REPLACES the two no-L0 residual guard tests. Also fixed a latent bug: lowercase true/false are NOT L1 names (prelude is True/False) — the new §4.1 check correctly rejects them; fixtures corrected. Verified: cargo test -p mycelium-l1 671 passed/0 failed; fmt+clippy clean. FLAGGED RESIDUAL (architecturally significant, never-silent): DN-54 underdetermines the `derive`-SITE consumption/attachment model + parametric instantiation — landed the nullary/monomorphic elaboration, left the consumption model for maintainer ratification. DN-54 stays Accepted + append-only impl note (NOT Enacted — the consumption model is outstanding; house rule #3)."
    doc_refs:
      - src:docs/notes/DN-54-User-Extensible-Generative-Lowering-Surface.md
      - src:crates/mycelium-l1/src/elab.rs
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      Deferred load-bearing safety for DN-54 user-extensible generative lowering (continuation of M-812).
      M-812 shipped the `lower`/`derive` surface + structural checks (uniqueness, param-uniqueness,
      derive name-resolution -- all never-silent). This issue lands, in order:
      (1) RHS ELABORATION TO L0 -- teach crate::elab to instantiate a `lower` rule's RHS at the `derive`
          target type and splice the resulting L0 into the program (today crate::elab never reads
          Env::lower_rules, so derive emits no L0 -- an honest residual).
      (2) IL-GRAMMAR RHS TYPE-CHECK (DN-54 §4.1) -- infer_type the (instantiated) RHS; reject `wild`/FFI,
          mutation, and ill-formed terms at definition time (never-silent, G2).
      (3) KC-3 KERNEL-GROWTH GUARD (DN-54 §6) -- the elaborated RHS must lower to EXISTING L0 nodes only;
          a RHS that would require a new kernel node is a structural refusal (G2). Meaningful once (1) lands.
      (4) CROSS-RULE ACYCLICITY (DN-54 §4.2) -- reject cycles in the lower-rule dependency graph (today only
          same-nodule name-uniqueness is enforced).
      (5) VERIFICATION DISCIPLINE (DN-54 §7) -- differential (observe(surface)==observe(lower)), hygiene
          (no free-var capture), round-trip (certified mode) over a generated corpus; tiered (DN-20).
      On completion, revisit the residual-posture guard tests in src/tests/checkty.rs and move DN-54 toward
      Enacted. Tags stay Declared until each piece has a checked basis (VR-5).

