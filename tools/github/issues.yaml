      Resolution-Single-Nodule.md` -- Accepted (delegated ratification) -- finds single-nodule
      def-site resolution / referential transparency already holds **by construction** since Stage
      1b (Pass-1 elaboration against the def-site env); Stage 2 is *prove it + close two narrow
