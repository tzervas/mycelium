    doc_refs: [corpus:RFC-0019, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      Add `Ty::Fn(Box<Ty>, Box<Ty>)` + all total-match arms (subst_ty, has_var, type_head->None, Display,
      unify [structural], resolve_ty for BaseType::Fn). `check_path` synthesizes `Ty::Fn` for a bare
      monomorphic top-level fn (a generic fn referenced bare without fixable type args = never-silent
      refusal). `check_app` types `f(x)` for a fn-typed binder. Inference at `map(mk_ok(), double)` falls out
      of the new `unify` Fn arm. Every refusal explicit (G2); guarantee Declared. Acceptance: map/and_then/
      fold over Result type-check; arrow-type mismatch + generic-fn-as-value + partial application all refuse
