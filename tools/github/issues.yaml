  - id: E10-1
    title: "E10-1 (epic) — Core/kernel 1.0.0 sub-gate (honesty-integrity durability)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:release, priority:P1, status:in-progress]
    depends_on: []
    epic: E10
    doc_refs:
      - corpus:ADR-022
      - corpus:ADR-024
      - corpus:ADR-021
      - corpus:DN-19
      - corpus:DN-25
    body: |
      The residual ADR-021 Gate A work required to declare the Mycelium Rust core/kernel at
      1.0.0. The kernel reaching 1.0.0 is a precondition for full-language 1.0.0 (ADR-022 /
      DN-25): the full-language gate inherits the kernel's honesty-integrity and durability
      guarantees. Gate A's rows (A2 Medium ledger, A3 WS8 durability, A4 supply-chain) must all
      close before the kernel 1.0.0 tag is cut and track T1 is enacted at the tag. NOTE: ADR-021 is
      now Superseded by ADR-022, so the inherited kernel-gate enactment attaches to ADR-022 track T1
      (not ADR-021 -> Enacted); see the Status section below.

      SCOPE EXTENSION (2026-06-23, maintainer — RFC-0032 D6; enacted by ADR-024): T1's Definition of
      Done also includes E19-1 (the kernel self-hosting-enablement reprs/prims land IN core 1.0.0, so
      the language is fully self-hosting at the tag). The original ADR-021 Gate A/B rows remain met +
      unchanged. This is a CRITERIA change to an Accepted ADR, so per ADR-022's Status (supersede to
      change criteria, house rule #3) it is enacted append-only by the focused amending ADR-024
      (Accepted 2026-06-23) -- NOT applied to ADR-022 §4/§5 in place (which carry an "amended by
      ADR-024" pointer). M-703 carries the operational depends_on E19-1. See ADR-024 + RFC-0032 D6.

      User stories:
      - As a maintainer, I want every ADR-021 Gate A row demonstrably met before cutting the
        1.0.0 tag, so that the "kernel stabilizes" claim is grounded, not pre-declared (VR-5).
      - As a compiler engineer, I want cargo-mutants green on the trusted base and cargo-fuzz
        targets in CI, so that the honesty fixes from WS1-WS7 are durable and cannot regress
        silently.
      - As a downstream app developer evaluating Mycelium, I want the 1.0.0 release to carry
        a supply-chain gate (cargo-deny + cargo-audit green), so that I can assess license and
        CVE hygiene before adopting the substrate.
      - As a language user, I want the Medium-findings ledger closed with explicit rationale
        per finding, so that "no open Mediums" is a checkable fact, not an assertion.

      Issues to resolve:
      - What is the explicit deferral rationale for each remaining Medium finding (WS2/WS3/WS4/
        WS5/WS6 per DN-19 §2 GAP-2), and which are truly fixed vs. still open?
      - Does the maintainer treat WS8 (cargo-mutants + fuzz) as a hard 1.0.0 blocker or a
        1.0.1 hardening follow-up? (DN-19 §2 GAP-4 open question — must be answered before M-703.)

      Definition of Done:
      - ADR-021 Gate A rows A2, A3, A4 are all demonstrably met (not speculatively declared).
      - Every Medium finding is either fixed or carries an explicit one-line deferral rationale.
      - cargo-mutants is green on mycelium-core, -cert, -numerics, -vsa (the trusted base).
