    body: |
      The lexer's `skip_trivia` discards `//`...EOL. Capture each comment instead into an ordered side table
      (text verbatim + line + col + trailing flag) via a new `pub fn lex_with_comments`, keeping the existing
      `lex` byte-identical. `Tok` unchanged (no comment token). lexer.rs only — disjoint from E7-3.
      IN PROGRESS (branch claude/feat/mycfmt-comments-lexer, SHA c3ff439) — capture + 10 tests green.
      Acceptance: existing lexer tests green; lex_with_comments returns correct text/line/trailing for
      full-line/trailing/consecutive/blank-separated/header comments; exact capture, never-silent (G2).
      landed on main via #397 squash-merge (2026-06-23)
