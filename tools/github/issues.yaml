  - id: M-687
    title: "M-687 — feat(l1): defunctionalizing monomorphization (specialize HOF by static fn argument)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-686]
    epic: E7-3
    doc_refs: [corpus:RFC-0019, corpus:RFC-0007, src:crates/mycelium-l1/src/mono.rs]
    body: |
      Extend the M-673 worklist (mono.rs): key a HOF specialization by its statically-known fn argument(s)
      (extend `Item::Fn` with fn-arg identities; extend item_key/mangle injectively + a pinning test). In
      `rewrite_app`, resolve a fn-valued argument to a top-level fn, enqueue both it and the HOF
      specialization, and drop the fn arg from the call. In the emitted specialization, rewrite `f(x)` to a
      direct call to the baked-in callee and drop the fn-param. Output stays closed first-order L0 — confirm
      `mycelium-core` untouched (KC-3). Keep/extend never-silent `Residual` for the OUT-of-scope cases
      (closures, dynamic fn-flow, partial application, generic-fn-as-value). Acceptance: `map(mk_ok(),double)`
      monomorphizes to closed first-order L0 and runs (three paths agree); dynamic-fn case = explicit
      Residual; determinism (mono twice = byte-equal); `cargo test -p mycelium-l1` green.
      landed on main via #397 squash-merge (2026-06-23)
