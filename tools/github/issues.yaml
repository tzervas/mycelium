  - id: M-864
    title: "Persistent bounded work-stealing pool for the Scheduler (nested-safe submission)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-862]
    landed_date: 2026-07-01
    landed_basis: "branch claude/dev-m864-workstealing-pool. Scheduler::run_indexed's per-call std::thread::scope replaced by one process-wide persistent pool (mycelium_sched::pool, sized to available_parallelism(), never resized/recreated); nested submission is help-stealing (Pool::help_while). run_indexed's bound tightened to F: Send + 'static / T: Send + 'static (DN-67 §2 ratifies; every caller audited/adjusted -- Node/Interpreter/CancelToken/task ownership, none needed unsafe). Initial commits c4eef4e/84458d2/178e502/9a495c2. IMPORTANT -- CORRECTNESS REWRITE (same day, after an adversarial deadlock review REPRODUCED a real hang; DN-67 §3.0): the first cut kept M-861's capacity backpressure, whose feeder bare-blocked BEFORE help-stealing -> a nested-submission deadlock at width > capacity + P (the committed [15,15,6] test would have hung on any <=4-core box; it only passed on the 28-core dev box). Second defect: a panicking job hung the join and killed the pool worker. BOTH FIXED AT ROOT: (1) backpressure/capacity REMOVED (non-normative per DN-61 A.2, and the deadlock cause) -- the pool queue is unbounded, each batch populates its lanes up front then runs, so no lane or feeder ever bare-blocks; help_while is the only wait on a batch's critical path. (2) panic-safe join -- catch_unwind per job keeps the persistent worker alive, first job panic re-raised at join (thread::scope-like), RAII drop-guard decrements the countdown on every unwind path. SCHEDULER_BACKPRESSURE_STRENGTH (Exact) const + its std-runtime re-export REMOVED (would be a false claim, VR-5); capacity/with_workers(_,capacity) retained for source-compat but bound nothing (documented). VALIDATION (hardware-independent, the coordinator's guardrail): a pub(crate) Pool::with_workers_for_test(P) + Scheduler::run_indexed_on(pool,..) hook forces a small P through every nesting level; forced_low_p_wide_fanout_does_not_deadlock_p1_through_p4 runs [15,15,6] at P in {1,2,3,4} under a 60s timeout. REPRODUCTION CONFIRMED: with the pre-fix feeder-block reverted in a scratch worktree (+ the same hook), that test HANGS at every P (timeout fires ~15s); on the fixed code it PASSES. Plus forced-P deep/mixed shapes, forced P=1, two panic-safety tests, global-pool nested stress, and a Linux thread-count regression witness. Tests: 29/29 mycelium-sched; M-860 parallel_emit_matches_sequential_emit_byte_identical + M-862 parallel differential/determinism re-verified green unmodified; mycelium-std-runtime 98/98 (dataflow restore test strengthened to assert exact step total; supervision cancel-token test honestly downgraded). 15+ consecutive full-suite runs, zero flakes. cargo fmt --check, clippy -p mycelium-sched -p mycelium-mlir -p mycelium-interp -p mycelium-std-runtime --all-targets -D warnings -A unsafe_code, cargo build --workspace all green. Tag: Empirical (deadlock-freedom + determinism), never Proven absent a mechanized proof (VR-5)."
    doc_refs: [corpus:DN-61, corpus:DN-67, corpus:RFC-0008, src:crates/mycelium-sched/src/scheduler.rs, src:crates/mycelium-sched/src/pool.rs]
    body: |
      Minted 2026-07-01 (Wave-1 reconciliation close-out) from the interim measure M-862's landed
      body explicitly named as deferred: `Scheduler::run_indexed` currently spawns fresh OS threads
      per call, so M-860's parallel codegen and M-862's parallel-eval both cap their parallelism at
      a single, non-nested, top-level batch to bound spawned-thread count. This issue is the
      follow-up that replaces the per-call-spawn scheduler with a PERSISTENT, bounded thread pool
      that is safe to submit to from WITHIN an already-running worker (a nested/recursive
      `run_indexed` call) without deadlocking the pool -- the precondition for either M-860 or
      M-862 to parallelize below their current single top-level batch.

      DEFER past the 1.0.0 tag: this is a perf path, not a correctness gate (DN-61 §A.2 -- the R1
      scheduler's only normative commitment is the RT2 determinism obligation + fuel-compatible
      cooperative stepping; internal strategy, including whether the pool is persistent or
      per-call-spawn, is an implementation artifact). YAGNI until a nested consumer actually exists
      (neither M-860 nor M-862 needs nesting to meet their own landed DoD); pursue this once a
      concrete caller wants parallelism below the top-level batch.

      User stories:
      - As a compiler/runtime engineer, I want to submit work to the Scheduler from inside an
        already-running worker, so that nested parallel structures (e.g. a parallel AOT codegen
        batch that itself wants to parallelize a sub-batch) don't have to flatten to sequential.
      - As a maintainer, I want the pool's nested-safety proven by a stress test, not asserted, so
        that "deadlock-free" is Empirical/Proven per VR-5, never Declared-and-hoped.
      - As a downstream consumer of `run_indexed`, I want the closure-bound contract change (if any)
        ratified at the ADR/DN level before I depend on it, so the API is stable when I build on it.

      Issues to resolve:
      - Ratify the `run_indexed` closure-bound contract change this pool requires (today `F:
        'static` per the current signature) at the ADR/DN level -- ratification, not a leaf's own
        unilateral API change.
      - Design a provably-deadlock-free help-steal nested-join wait-loop (a nested submitter parks
        or helps steal while waiting, never blocks the pool's only worker holding its own answer).
      - Size the pool (bounded, not unbounded -- explicit capacity, never-silent backpressure/
        refusal on exhaustion, mirroring the existing deque backpressure bound).

      Definition of Done:
      - The `run_indexed` contract change (if any) is ratified at the ADR/DN level, not silently
        shipped as an implementation detail.
      - A nested-join wait-loop is proven deadlock-free (property test over nested submission
        depths, not just the single-level case) -- Empirical at minimum, Proven if a checked
        argument is available.
      - Nested stress tests (multiple levels of nested `run_indexed`, saturating the bounded pool)
        pass without deadlock or starvation.
      - M-860/M-862 are re-validated unaffected (their existing differentials stay green) or
        explicitly extended to use the new nesting where it helps; just check green; honest tag.

  - id: M-865
    title: "Harness-level parallel AOT/JIT dispatch extending M-862's pure-arg batch (NOT hypha/colony/async parity)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P2, status:done]
    epic: E25-1
    depends_on: [M-861, M-862]
    doc_refs:
      - corpus:RFC-0008
      - corpus:DN-61
      - src:crates/mycelium-sched/src/scheduler.rs
      - src:crates/mycelium-mlir/src/concurrent.rs
      - src:crates/mycelium-mlir/tests/concurrent_threeway_differential.rs
    body: |
      Minted 2026-07-01 (Wave-1 reconciliation close-out). RESCOPED same-day (maintainer decision,
      2026-07-01) after a scoping pass established the original title over-claimed: the language has
      NO executable concurrency surface today -- `hypha` is ratified-not-lexed (RFC-0008 §4.5),
      `async` is unimplemented, and AOT/JIT/the interpreter all run compiled/interpreted programs
      SEQUENTIALLY. "AOT-runtime concurrency + async execution parity with the interpreter" was
      therefore vacuous as originally framed -- there is no hypha/colony/async surface on EITHER side
      to compare. What is real and closeable today: M-862 gave the interpreter a bounded,
      top-level-only PARALLEL-EVAL path (a pure, >=2-argument top-level `Op`/`Construct` fanned across
      `mycelium_sched::scheduler::Scheduler::run_indexed`), and M-860 already proved the pattern of
      dispatching AOT work through that same `Scheduler` for a sibling case (parallel per-function
      codegen). The AOT-compiled and JIT execution paths had no analogous HARNESS-LEVEL parallel
      dispatch of their own validated against M-862's -- that narrower, real gap is this issue's scope.

      Real hypha/colony/async concurrency parity -- the ORIGINAL title's claim -- is carved out
      honestly to a new post-1.0.0-tag issue, **M-869**, gated on the language actually growing a
      spawn/hypha surface to drive it. This issue does not claim that; see the DoD below.

      User stories:
      - As a compiler engineer, I want the AOT/JIT paths' harness-level dispatch to reuse
        `mycelium-sched::Scheduler::run_indexed` directly (no FFI/ABI shim, no second scheduler), so
        the three execution paths (interp/AOT/JIT) can't silently diverge on scheduling semantics
        (DRY; KC-3).
      - As a maintainer, I want the interp == AOT == JIT differential extended to the SAME batch
        fragment M-862 already validates for the interpreter, so "the compiled paths parallelize the
        same fragment, the same way" is a checked claim, not an assumption.
      - As a future concurrency-surface implementer, I want the honest boundary between "a parallel
        performance path exists" (this issue) and "the language has spawn/hypha/async" (M-869) drawn
        explicitly, so neither claim is read as covering the other (VR-5).

      Issues to resolve -- answered:
      - What AOT-compiled surface exercises Colony/hypha/async today? NONE. The only real
        parallel-execution surface anywhere in the stack is M-862's interpreter-side top-level
        pure-argument batch. This issue extends that SAME fragment's harness-level dispatch to
        AOT/JIT; it does not add a new Colony/hypha surface to either compiled path.
      - Does the AOT runtime call into `mycelium-sched` directly, or through a shim? DIRECTLY --
        `mycelium-mlir::concurrent` depends on `mycelium-sched` and calls
        `Scheduler::new().run_indexed(..)` at the Rust harness level, submitting one job per batch
        argument and recomposing through the SAME trusted sequential runner
        (`compile_and_run_with_swap_mode` / `jit_run`) the sequential reference already uses -- no
        FFI/ABI bridge, no second scheduler, no re-implemented prim-application semantics.
      - How does the RT2 differential extend? The SAME sequentialization-equivalence property
        M-357/M-861/M-862 already established, over the SAME fragment M-862 defines (narrowed further
        here to `Op`-headed batches only -- see the DoD's honest scope note) --
        `tests/concurrent_threeway_differential.rs` checks interp-sequential == interp-parallel (M-862)
        == AOT-parallel == JIT-parallel, each pair through the M-210 `ObservationalEquiv` checker.
      - Relationship to M-864 (pool hardening)? Inherited for free, not separately needed: this
        issue's batch is a single, non-nested, depth-1 fan-out (mirroring M-862's own top-level-only
        bound) dispatched through `Scheduler::run_indexed`, which as of M-864 already routes onto the
        persistent bounded pool. No nested submission occurs here, so M-864's nested-safety guarantee
        is inherited but not exercised, and M-868 (leapfrogging / help-frame depth bound) is not
        needed for this issue's single-level batch.

      Definition of Done (rewritten honestly, 2026-07-01 -- supersedes the original DoD, which
      claimed Colony/hypha/async parity this issue does not deliver):
      - `mycelium-mlir::concurrent` extends M-862's exact `Op`-headed pure-argument-batch fragment to
        the direct-LLVM AOT path (`compile_and_run_concurrent`) and the in-process JIT
        (`jit_run_concurrent`), dispatched at the Rust harness level through
        `mycelium_sched::scheduler::Scheduler::run_indexed` -- no second scheduler, no new
        LLVM-IR-level concurrency primitive.
      - `Construct`-headed batches are explicitly OUT of this dispatcher's scope (a checked reason,
        not a hand-wave: the direct-LLVM whole-program contract requires a top-level `Lane` result,
        which a bare `Construct` cannot produce standalone -- `mycelium-mlir::concurrent` module
        docs) -- a never-silent, documented narrowing (G2), not a silent gap.
      - The interp-sequential == interp-parallel (M-862) == AOT-parallel == JIT-parallel differential
        (`tests/concurrent_threeway_differential.rs`) passes non-vacuously (verified on this box:
        libMLIR-18 + `llc`/`clang` present, `ran_aot`/`ran_jit` asserted true) plus a plan-level
        non-vacuity guard (`ConcurrentPlan::OpBatch` genuinely selected, never a silent fall-through).
      - A mutant witness (`mutant_witness_catches_a_wrong_index_compose_aot`/`_jit`) demonstrates the
        differential actually CATCHES a deliberately-broken concurrent dispatch (a wrong-index
        recompose over a non-commutative op), not merely asserts agreement.
      - Real hypha/colony/async concurrency parity is explicitly NOT claimed here -- carved out to
        **M-869**, which depends_on this issue and is gated on the language's own concurrency surface.
      - `cargo fmt`/`clippy -D warnings`/`cargo test -p mycelium-mlir` green with AND without
        `--features mlir-dialect`; honest tag (`Empirical`, differential-checked, never `Proven`
        absent a checked argument -- VR-5); CHANGELOG append-only.

      Landed 2026-07-01: branch `claude/dev-m865-aot-parallel-differential` (isolated worktree off
      `origin/dev`, per the maintainer-narrowed M-865 tag) -- `cargo build --workspace`,
      `cargo clippy -p mycelium-mlir -p mycelium-cert --all-targets -- -D warnings -A unsafe_code`,
      and `cargo test -p mycelium-mlir` (with and without `--features mlir-dialect`) all green on
      this box. NOT YET MERGED to `dev`/`main` -- pending PR review + integration by the orchestrating
      wave (this agent was explicitly instructed not to open a PR); reported branch + SHA + this FLAG
      up rather than landing directly (never-silent — the "done" status here reflects the WORK being
      complete and independently verified, not a merged-to-dev claim).

  - id: M-866
    title: "Bound mono.rs free_vars/pattern_binders recursion (M-674 follow-up)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P2, status:done]
    landed_basis: "status:done (2026-07-02, kickoff `acy`, PR #935, branch acy/m866-mono-recursion-bound, commit 0eb721f \"fix(mono): bound free_vars/pattern_binders recursion depth\"). `free_vars`/`pattern_binders` threaded with an explicit depth counter (`free_vars_at`/`pattern_binders_at`), reusing `totality::MAX_WALK_DEPTH` (4096) and `WalkDepthExceeded` (M-674) rather than a second budget shape (DRY). The one external caller (`rewrite_lambda`) maps the refusal to `ElabError::DepthExceeded` — the same error `finish()` already surfaces from `totality::classify_all`, so both depth-budget paths share one error shape. Two depth-bound regression tests added to `src/tests/mono.rs` (just-under/past-budget, mirroring `totality.rs`/`ambient.rs`'s pattern). `cargo test -p mycelium-l1` green; tag Empirical (measured headroom, per VR-5)."
    depends_on: [M-674]
    doc_refs: [corpus:ADR-032, src:crates/mycelium-l1/src/mono.rs, src:crates/mycelium-l1/src/totality.rs]
    body: |
      Minted 2026-07-01 (Wave-1 reconciliation close-out), closing the FLAG M-674 left open: `mono.rs`'s
      own `free_vars`/`pattern_binders` recursion (monomorphization's AST descent over a specialized
      body, walking `Expr`/`Pattern` directly) carries NO explicit depth budget of its own. This is
      distinct from both the totality/ambient budgets M-674 landed (`MAX_WALK_DEPTH`/`MAX_AMBIENT_DEPTH`
      on `totality.rs`'s `walk_expr`/`descend_walk`/`pattern_binders` and `ambient.rs`'s traversal) and
      from the `classify_all` -> `ElabError::DepthExceeded` mapping `mono.rs::finish` already has (that
      mapping only covers the totality re-check `finish` invokes, not `free_vars`/`pattern_binders`'
      own recursion during specialization). A pathologically-nested specialized body can today overflow
      the host stack (process abort) instead of a clean never-silent refusal (G2).

      User stories:
      - As a compiler maintainer, I want the monomorphizer's own AST recursion bounded, so that a
        pathologically-nested input refuses cleanly instead of aborting.

      Definition of Done:
      - `free_vars` and `pattern_binders` in `mono.rs` each carry an explicit `MAX_WALK_DEPTH`-style
        budget matching `totality.rs`'s discipline, returning an explicit error (never a silent abort
        or a host-stack overflow — G2) once exceeded.
      - A nesting regression test asserts the explicit error is returned just past the budget (mirroring
        the just-under/past-budget pattern `totality.rs`/`ambient.rs` already use).
      - just check green; honest tag (Empirical — measured headroom, not merely asserted, per VR-5).

  - id: M-868
    title: "Leapfrogging (own-subtree help-steal) to bound the scheduler pool's help-frame stack to O(depth)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:chore, area:execution, priority:P2, status:needs-design]
    depends_on: [M-864]
    epic: E25-1
    doc_refs:
      - corpus:DN-67
      - corpus:DN-61
      - src:crates/mycelium-sched/src/pool.rs
    body: |
      Minted 2026-07-01 (M-864 re-review follow-up). M-864's persistent work-stealing pool is
      deadlock-free / panic-safe / deterministic at any nesting depth, but its help_while steals
      cross-batch indiscriminately, so a deep-AND-wide low-P nested submission stacks ~O(w^(d-1))
      help-steal frames on one OS thread -> stack overflow (a crash, not a hang) beyond a measured
      moderate depth x width region (DN-67 3.4). Current consumers (M-860 codegen, M-862 eval) submit
      a single non-nested batch, so they are trivially safe -- NOT a 1.0.0-tag blocker (post-tag).

      Implement Cilk/TBB/ForkJoinPool-style leapfrogging: a thread joining on its own batch executes
      only tasks descending from that batch's subtree (not arbitrary sibling batches), bounding the
      help-frame stack to O(depth) and making arbitrarily deep+wide nesting stack-safe -- without
      re-introducing the backpressure deadlock M-864 removed.

      User story: As a runtime author, I want the work-stealing pool stack-safe under arbitrary
      nested parallelism, so a deeply+widely concurrent Mycelium program cannot crash the process.
      Definition of Done: help_while confined to own-subtree descendants (leapfrogging); the DN-67
      3.4 deep+wide overflow shapes complete at forced low P within a normal stack; the
      "moderate depth x width" caveat in the Scheduler/pool/DN-67 docs upgraded to "any depth";
      deadlock-freedom + determinism + panic-safety re-validated; post-1.0.0-tag.

  - id: M-867
    title: "(post-1.0) Full RFC-0031 D6 stdlib self-hosting: per-op .myc ports + Rust-crate retirement for all mycelium-std-* crates"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:stdlib, priority:P3, status:todo]
    depends_on: [M-719]
    epic: E13-1
    doc_refs:
      - corpus:RFC-0031
      - corpus:DN-66
      - corpus:ADR-035
      - src:crates/mycelium-std-runtime/src/lib.rs
    body: |
      Minted 2026-07-01 (ADR-035 ratification act), spun out of M-719's "broader closure" clause.
      ADR-035 narrows ADR-022 track T4's lang 1.0.0 Definition of Done to the stable-API freeze
      (DN-66) + the core-lib self-host slice (M-714...M-718) -- M-719 closes for 1.0.0 on that
      narrowed bar. This issue carries the DEFERRED remainder: DN-66 §3 grounds that zero of the 26
      `mycelium-std-*` crates yet clear the RFC-0031 §5 D5/D6 whole-module bar -- the six same-named
      `.myc` nodules (`cmp`/`math`/`collections`/`text`/`iter`/`fmt`) are structurally disjoint
      prototypes (e.g. `math.myc`'s width-indexed bitwise ops share zero op-name or domain overlap
      with `mycelium-std-math`'s `f64`/`i64` surface), not D5-clearing ports, and the other 20 crates
      have no `.myc` nodule at all. This is real, tracked, POST-1.0 work (ADR-022 §10 long-term
      zero-Rust arc) -- explicitly OFF the `lang 1.0.0` critical path per ADR-035.

      User stories:
      - As a maintainer pursuing the zero-Rust long-term vision, I want a tracked issue for the full
        stdlib self-hosting effort, so that narrowing the 1.0.0 bar (ADR-035) does not silently drop
        the ambition -- it is deferred, not abandoned.
      - As a language user, I want every `mycelium-std-*` crate eventually superseded by a real
        `.myc` port (not a same-named prototype), so that the stdlib is genuinely self-hosted, not
        merely frozen-API.

      Issues to resolve:
      - Per-op D5 audit + a genuine `.myc` port for each of the 20 crates with no existing
        prototype, and completion of the 6 disjoint prototypes (`cmp`/`math`/`collections`/`text`/
        `iter`/`fmt`) into true supersets of their Rust crate's exported surface.
      - `mycelium-std-sys-host` needs a `docs/spec/stdlib/sys-host.md` before any D5 audit (DN-66 §4.a).
      - `mycelium-std-runtime` is load-bearing (`crates/mycelium-mlir` depends on it directly for
        RC-plan/refcounting behavior, per its `Cargo.toml`) -- its retirement, if ever, needs
        cross-crate coordination with `mycelium-mlir`, not a unilateral stdlib-side change.
      - Final crate removal (vs `#[deprecated]` marking) waits for RFC-0031 to reach Enacted plus an
        explicit maintainer act (RFC-0031 §5 D6), even once D5 is cleared per crate.

      Definition of Done:
      - Every one of the 26 `mycelium-std-*` crates has a `.myc` port whose exported-op surface is a
        true superset of (or equivalent to) the Rust crate's, each op differential-tested three-way
        (L1-eval == L0-interp == AOT where applicable), honestly tagged, and never-silent (G2) --
        the RFC-0031 §5 D5 bar cleared per-op, per-module, not asserted.
      - Each cleared crate's Rust public API is marked `#[deprecated(note = "...")]` per RFC-0031 §5
        D6, citing the differential-tested `.myc` replacement.
      - `mycelium-std-runtime`'s retirement path (if any) is coordinated with `mycelium-mlir` and
        recorded at the ADR/DN level before any change to its status.
      - just check green; CHANGELOG append-only; RFC-0031 -> Enacted considered once this + D7 close.

  - id: M-869
    title: "AOT/interp hypha/colony/async concurrency parity (requires the language concurrency surface)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P2, status:needs-design]
    depends_on: [M-865]
    epic: E25-1
    doc_refs:
      - corpus:RFC-0008
      - corpus:DN-61
      - src:crates/mycelium-mlir/src/concurrent.rs
      - src:crates/mycelium-std-runtime/src/lib.rs
    body: |
      Minted 2026-07-01, spun out of M-865's rescoping (maintainer decision, same day): M-865's
      original title claimed "AOT-runtime concurrency + async execution parity with the interpreter",
      but a scoping pass established that claim was vacuous today -- the language has NO executable
      concurrency surface: `hypha` is ratified-not-lexed (RFC-0008 §4.5), `async` is unimplemented,
      and every execution path (interpreter, AOT env-machine, direct-LLVM AOT, JIT) still runs a
      SEQUENTIAL program end-to-end. M-865 landed the real, narrower thing that was actually
      closeable -- a harness-level parallel-eval dispatch (reusing `mycelium-sched::Scheduler` for
      AOT/JIT, mirroring the interpreter's M-862 batch) -- and explicitly carved OUT this issue's
      claim as not delivered. This is POST-1.0.0-TAG, explicitly out of the E25-1 epic's own 1.0.0
      gating DoD (like its sibling M-864/M-868): it cannot be designed, let alone landed, before the
      language itself grows a spawn/hypha/async surface to drive it.

      This is where "real" concurrency parity -- a program that actually SPAWNS concurrent
      hyphae/tasks and observes them scheduled, on both the interpreter and the AOT-compiled path,
      with a checked equivalence between the two -- lives once that surface exists. It is NOT
      satisfied by M-862 (a parallel-eval PERFORMANCE optimization over a pure fragment, invisible to
      the program) or M-865 (the same performance optimization's harness-level extension to AOT/JIT)
      -- neither of those involves a `hypha`/`colony`/`spawn` construct the *program* itself writes;
      this issue is precisely the gap between "the runtime can execute things in parallel" and "the
      language lets a program EXPRESS concurrency and observe its effects."

      User stories:
      - As a language user, I want a program that spawns concurrent hyphae to behave identically
        (up to RT2's deterministic-fragment equivalence) whether it runs on the interpreter or the
        AOT-compiled path, so native compilation is never an escape hatch from that guarantee.
      - As a compiler engineer, I want the AOT-compiled path to reuse `mycelium-sched` for any real
        `hypha`/`colony` execution (not grow a second scheduler), continuing the precedent M-860/
        M-862/M-865 already established for the performance-path batches.
      - As a maintainer, I want this claim to stay `needs-design` (not `todo`) until the language's
        own `hypha`/`spawn` surface is lexed and elaborated (M-710 is the tracked gate for that),
        so the issue cannot be picked up prematurely against a surface that does not exist yet.

      Issues to resolve:
      - What is the minimal `hypha`/`spawn` surface (L1 syntax + elaboration) this issue needs before
        design can start -- is M-710 (the reserved-vocabulary activation track) the correct
        prerequisite, or does a narrower slice suffice?
      - Once a program can express concurrency, does the AOT-compiled path drive
        `mycelium-sched::scheduler::Scheduler` directly (as M-865's harness-level dispatch already
        does for its performance-path batch), or does a genuinely spawning/observing construct need
        different plumbing (e.g. a runtime callback surface, not a pure batch-and-recompose harness)?
      - How does RT2 (deterministic-fragment equivalence) extend to a program-visible spawn/join,
        rather than an invisible performance optimization -- the same sequentialization-equivalence
        property (M-357/M-861/M-862/M-865), or a new one specific to observable concurrency?

      Definition of Done:
      - Blocked on the language concurrency surface existing (spawn/hypha syntax + elaboration,
        tracked via M-710) -- this issue cannot leave `needs-design` before that lands.
      - AOT-compiled programs that spawn hyphae/tasks execute on
        `mycelium-sched::scheduler::Scheduler`, the same substrate the interpreter uses -- no second
        scheduler implementation (continuing M-860/M-862/M-865's precedent).
      - The interp == AOT == JIT differential (M-151/NFR-7 lineage, extended per M-858/M-865) is
        further extended to a genuinely concurrent (program-spawns-hyphae) corpus and passes
        non-vacuous; a divergence is caught by a property test or cargo-mutants witness, not merely
        asserted.
      - RT2's deterministic-fragment equivalence holds across all execution paths for this corpus;
        any narrowing vs. the interpreter's own concurrency surface is an explicit, never-silent
        refusal (G2), not a silent gap.
      - just check green; honest tag (Empirical, not Proven, absent a checked argument); CHANGELOG
        append-only.

  - id: E16-1
    title: "E16-1 (epic) — Toolchain, IDE & package distribution"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-06-23) — all 5 children done: M-730 (full LSP), M-731 (editor grammars finalized — RFC-0026 Accepted, scope names ratified), M-732 (spore registry), M-733 (myc UX), M-734 (reproducible dist). just check green; guarantee tags at honest strength (VR-5)."
    # E16-1's only cross-epic dependency was M-731 -> M-693 (RFC-0026), now done. Narrowed from the
    # whole E9-1 epic (whose M-697 packaging leg is unrelated to E16-1) so a `done` issue is not
    # blocked-by an in-progress epic (Copilot #517).
    depends_on: [M-693]
    epic: E16
    doc_refs: [corpus:RFC-0026, corpus:DN-24, corpus:DN-25]
    body: |
      The day-to-day developer experience required for a usable full-language 1.0.0: a
      complete LSP server beyond the current skeleton, syntax highlighting delivered
      across all major editors (per RFC-0026), a package manager capable of spore publish
      and resolution, a polished one-command toolchain UX, and a reproducible content-
      addressed install. Without this wave, the language is technically complete but not
      practically usable by external developers.

      User stories:
      - As a language user, I want completions, hover, and go-to-def in VS Code and
        Neovim via LSP, so that I can write Mycelium code with the same IDE support I
        have for other languages.
      - As a library/phylum author, I want to publish a spore to a registry and have
        users resolve it by name + version, so that distributing my phylum requires no
        manual file copying.
      - As a downstream app developer, I want `myc init`, `myc build`, and `myc run`
        to work in one command, so that I can start a Mycelium project without reading
        implementation internals.
      - As a tool author, I want syntax highlighting in TextMate, tree-sitter, and LSP
        semantic-token form, so that my editor tooling can colour `.myc` files correctly
        out of the box.
      - As a maintainer, I want a content-addressed, pinned toolchain install, so that
        reproducible builds are verifiable and the install step is never-silent on failure.

      Issues to resolve:
      - What is the registry backend for spore publish/resolve (self-hosted, crates.io-compatible, or other)?
      - What is the error-message quality bar and how is it verified at the toolchain UX gate?
      - What constitutes a complete LSP (which capabilities are required vs optional at 1.0)?

      Definition of Done:
      - M-730 done: LSP provides completions, hover, semantic tokens, go-to-def; all existing tests green.
      - M-731 done: TextMate + tree-sitter + LSP semantic-token grammars ship; generator derives from token.rs keyword(); just drift-check green in CI (G2 — never silent divergence).
      - M-732 done: spore publish / resolve / registry query work end-to-end; content-addressed identity preserved (ADR-003); never-silent fallibility.
      - M-733 done: myc init/build/test/run work; error messages meet DN-22 quality bar (structured, actionable, not opaque).
      - M-734 done: reproducible install script; pinned, content-addressed artifact; re-install is byte-identical.
      - just check green; all guarantee tags honest (VR-5); property test per bound.
      - E16-1 epic status updated; kickoff tool10.md Definition of Done fully checked.

      Children: M-730 (full LSP: completions/hover/semantic-tokens/go-to-def beyond the skeleton), M-731 (editor syntax highlighting delivery — RFC-0026: TextMate + tree-sitter + LSP semantic tokens, subsumes E9-1 leaves), M-732 (package manager: spore publish/resolve/registry beyond the build artifact), M-733 (toolchain UX: one-command init/build/test/run + error-message quality bar), M-734 (reproducible toolchain distribution: pinned, content-addressed install).

  - id: M-730
    title: "M-730 — feat(lsp): full LSP completions/hover/semantic-tokens/go-to-def"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-06-23) — mycelium-lsp adds textDocument/hover, definition, and semanticTokens/full (lexical/Declared scope; hover refuses to fabricate an identifier's type per VR-5; definition is single-document; never-silent on unknown position/symbol). Capabilities advertised; all prior completions/diagnostics/fmt tests green; clippy -D warnings clean."
    epic: E16-1
    doc_refs: [corpus:DN-24, corpus:DN-25, src:crates/mycelium-lsp/src/lib.rs]
    body: |
      Extend `mycelium-lsp` beyond its current skeleton (completions, diagnostics, fmt)
      to provide the full set of LSP capabilities expected at a 1.0.0 IDE experience:
      hover (type + guarantee info), go-to-definition, and semantic tokens. The semantic-
      token provider is the foundation that M-731 (RFC-0026 highlighting) will extend,
      so M-730 must land first.

      User stories:
      - As a language user, I want hover to show the type and guarantee tag of any symbol,
        so that I can understand code without leaving my editor.
      - As a language user, I want go-to-definition to navigate to any function, type, or
        trait declaration, so that I can explore a codebase without grep.

      Issues to resolve:
      - Which LSP capabilities are required at 1.0 vs optional (e.g. rename, references)?
      - How does semantic-token classification map to the guarantee-strength lattice (Exact/Proven/Empirical/Declared)?

      Definition of Done:
      - textDocument/hover returns type + guarantee tag for every symbol in a valid .myc file; never-silent on unknown symbols.
      - textDocument/definition navigates to the declaration; never-silent on unresolvable refs.
      - textDocument/semanticTokens/full returns a correct legend and token stream for a .myc file.
      - All existing completions/diagnostics/fmt tests remain green; cargo clippy -D warnings clean.

  - id: M-731
