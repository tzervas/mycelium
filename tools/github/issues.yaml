  - id: M-1041
    title: "M-1041 — DRY ExprVisitor/fold trait across the mycelium-l1 walkers and the transpiler's emit.rs (the visitor-DRY meta-gap)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:language, priority:P2, status:in-progress]
    epic: E32-1
    depends_on: [M-641]
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-l1/src/totality.rs
      - src:crates/mycelium-transpile/src/emit.rs
      - src:crates/mycelium-transpile/src/visit.rs
    landed_basis: >
      status:in-progress (Scope-A of this issue's two-crate DoD landed, Scope-B/C outstanding) —
      PR #1398 (`claude/m1041a-expr-visitor`, merged to `dev` 2026-07-10) lands the pilot
      `ExprVisitor`/`TypeVisitor` abstraction (new `crates/mycelium-transpile/src/visit.rs`,
      associated-`Output`-type traits with a required `fallback`) over `mycelium-transpile`'s
      `emit.rs` (3 independently hand-rolled `syn::Expr` matches -> 1 canonical `walk_expr`
      dispatcher) and `map.rs` (2 independently hand-rolled `syn::Type` matches -> 1 canonical
      `walk_type` dispatcher) — behavior-preserving, byte-identical `cargo test -p
      mycelium-transpile` (65/65) before and after. Explicitly out of this leaf's scope (flagged,
      not silently dropped): `prim_map.rs`'s 9 more `Expr::` matches, the `Pat`/`map_pattern`
      dispatch, and the full DoD's OTHER half — the 8 exhaustive `mycelium-l1` walkers (parse,
      ambient, checkty, elab, eval, grade, mono, totality) this issue's own DoD names. This is the
      **pilot** setting the pattern; a follow-on Scope-B/C leaf should extend it to `prim_map.rs`/
      `Pat` and then to the `mycelium-l1` walker side before this issue can flip to `done`.
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §3/§4.5, DN-109 §9). TWO independent analyses converged on the same gap: the L2 engine audit found
      that a new `Expr` variant touches ~13 sites (8 exhaustive walkers in mycelium-l1 — parse, ambient,
      checkty, elab, eval, grade, mono, totality — plus fmt, plus ~5 mirror encoders in lib/compiler/*.myc);
      the DX/QoL audit independently found emit.rs/map.rs in mycelium-transpile are ~15 free `emit_*`/`map_*`
      functions (emit_expr_inner alone a 19-arm match) with the same shape of tax. M-641 (E4-1, done)
      already extracted `totality::walk_expr`, a depth-budgeted callback HOF reused for pure *collection*
      passes (call-set/cycle/free-var) — it is NOT a semantic visitor: every pass needing per-variant
      handling still writes its own exhaustive match. This issue is the force-multiplier: a real
      trait-based `ExprVisitor`/fold (or an equivalent dispatch macro) that lets one new Expr variant be
      ONE edit instead of ~13, spanning both mycelium-l1's walkers and mycelium-transpile's emit/map
      dispatch. The M-1006 transpiler ladder pays this tax every phase, so this is on the critical path.

      User stories:
      - As a compiler engineer adding a new Expr variant, I want one visitor trait to implement instead
        of hand-editing 13 separate exhaustive matches, so that language-surface closure work (the
        dominant zero-hand-port lever per the ledger §2) isn't slowed by a DRY tax on every construct.

      Definition of Done:
      - A trait-based `ExprVisitor`/fold abstraction lands over the mycelium-l1 walkers AND
        mycelium-transpile's emit/map dispatch (or a documented reason the two crates need separate
        abstractions); adding a synthetic test variant/case demonstrates a single-site edit; Rust
        exhaustiveness still catches a missed arm at compile time (no silent gap); `cargo test`
        byte-identical on existing walker outputs; no guarantee-tag change (VR-5); net LOC trends down
        or flat despite the added abstraction.

  - id: M-1042
    title: "M-1042 — structured (source-tree-mirroring) transpiler output with path-qualified nodule names"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E32-1
    depends_on: []
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/bin/mycelium-transpile.rs
      - src:crates/mycelium-transpile/src/batch.rs
      - src:crates/mycelium-transpile/src/transpile.rs
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §4/§4.5, DN-109 §5.1/§9). `run_batch` (mycelium-transpile.rs) writes FLAT `out_dir/<stem>.myc`,
      discarding the Rust module directory structure; two files sharing a stem (e.g. two `mod.rs`)
      collide last-writer-wins with only a WARNING (bin:222-229) — a real data-loss bug, mitigated today
      only at the workflow layer (regenerate.sh gives each target its own out-dir) but not in the CLI
      itself. This is DN-109 §5.1's path-model prerequisite: preserve the Rust `mod` tree as a nodule
      dotted path (`a/b/mod.rs` -> `nodule a.b;`) and mirror the source tree under out_dir
      (`<rel/path>.myc`), making the CLI collision-safe on its own, not just via the driver-script
      workaround.

      User stories:
      - As a hand-porter running the transpiler directly (not via regenerate.sh), I want the output tree
        to mirror the Rust source tree with path-qualified nodule names, so that I never silently lose a
        file to a stem collision.

      Definition of Done:
      - Batch-mode output mirrors the source directory structure under out_dir; nodule paths are
        dotted-qualified from the mod tree; two same-stem files (e.g. two `mod.rs`) both survive with
        distinct qualified names; the last-writer-wins WARNING path is removed (structurally impossible,
        not just warned); existing single-file-mode behavior unchanged; tests in the crate's
        src/tests/ layout; `just transpile-vet` still green.

      RE-SCOPED 2026-07-10 (mitigation #14 — verify-first caught this issue stale before
      implementation): the output-path half of this DoD (structurally-impossible flat-emit
      collision, source-tree mirroring under out_dir) was ALREADY LANDED by `e0085ec0` ("M-1006
      Phase-2 — path-qualified batch output") — `run_batch` now mirrors the source tree under
      `out_dir` via `batch::output_rel_path` (5 unit tests pin the mapping); the last-writer-wins
      WARNING path is gone. Confirmed against the codebase (`git show e0085ec0 --stat`,
      `src/batch.rs`) before starting — not re-implemented.

      DONE 2026-07-10 (the residual): `derive_nodule_path` (transpile.rs) still derived the
      `// nodule: <path>;` header from the crate directory name alone, so two nested `mod.rs`
      files in the same crate kept emitting the SAME nodule header even though M-1006 Phase-2
      now writes them to distinct output paths. Fixed by anchoring the derivation on the file's
      last `src` path component and appending its intra-crate module path as dotted segments
      (`mod.rs`/`lib.rs` leaves contribute no segment of their own — they name the enclosing
      directory): `crates/mycelium-std-cmp/src/foo/mod.rs` -> `std.cmp.foo`,
      `crates/mycelium-std-cmp/src/foo/bar.rs` -> `std.cmp.foo.bar`. Self-contained in
      `transpile.rs` (no root parameter threaded through `batch.rs`/the CLI — every real
      invocation already passes a `<crate>/src`-rooted or file-rooted path, and the derivation
      is anchored on the path's own `src` component, which generalizes to both). The existing
      top-level case (a file directly under `src/`, e.g. `lib.rs`) is unchanged.
      Data-driven fixture-table tests added in `src/tests/transpile.rs` (regression + nested +
      two-deep + non-mod-rs submodule + hyphenated-crate + no-`src`-ancestor fallback cases, plus
      a same-crate-sibling-non-collision property test). `derive_nodule_path` promoted to
      `pub(crate)` for white-box testability (existing crate precedent: `emit::binary_width` etc.).
      Verified end-to-end against real source (`mycelium-core/src` — `lib.rs` -> `core`,
      `ternary/mod.rs` -> `core.ternary`), not just the fixture table.

      FLAG (follow-up, out of this change's scope — `crates/mycelium-transpile/src/` only): the
      committed `gen/myc-drafts/semcore/{checkty,elab,eval,mono,fuse}/*.myc` drafts all emit
      `// nodule: l1` today (single-file transpiles of 5 `crates/mycelium-l1/src/*.rs` targets,
      which previously collided identically on the crate-level prefix — a second latent instance
      of the same collision class this fix closes for single-file mode too). After this change
      they will instead each derive their own file-qualified nodule (`l1.checkty`, `l1.elab`, …)
      on the next `gen/myc-drafts/regenerate.sh` run — a comment-text-only diff (`manifest_gen.py`
      does not parse the emitted header, only carries descriptive prose about the eventual
      hand-merge into `compiler.semcore`), not a functional break. Left un-regenerated here per
      this leaf's disjoint-ownership scope; a follow-up `/myc-drafts` regenerate pass should pick
      it up.

  - id: M-1043
    title: "M-1043 — per-item `// src: file:line` provenance breadcrumbs in emitted .myc"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P3, status:todo]
    epic: E32-1
    depends_on: [M-1042]
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/emit.rs
      - src:crates/mycelium-transpile/src/gap.rs
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §4.5 DX-D3b). The `// nodule:` header and `@summary` provenance banner are already emitted
      (transpile.rs:449-465) but there is no PER-ITEM `// src: <file>:<line>` breadcrumb above each
      emitted item — a hand-porter must cross-reference gap.json to locate the original Rust source for
      any given emitted item. The span data already exists on `Gap`/the syn node; this is a small,
      high-leverage addition (rated the single biggest hand-porter accelerator in the DX audit).

      User stories:
      - As a hand-porter refining an emitted draft, I want each item's Rust source location inline as a
        comment, so that I don't have to cross-reference a separate gap report to find what I'm editing.

      Definition of Done:
      - Every emitted top-level item carries a `// src: <relative-path>:<line>` comment immediately
        above it; span data sourced from the same location already captured for `Gap`; comment format
        documented in the crate README; `just transpile-vet` / `mycfmt` unaffected (comment syntax
        already supported); tests assert the breadcrumb on a small fixture.

  - id: M-1044
    title: "M-1044 — the remap manifest (remap.json / REMAP.md): item-granular structural + idiom provenance ledger"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E32-1
    depends_on: [M-1042]
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/batch.rs
      - src:crates/mycelium-transpile/src/remap.rs
    body: |
      Filed 2026-07-10 from DN-109 §5.2 (the L5 structural-remapping design). Gated on DN-109's
      ratification of §7-c (whether the manifest is a new artifact or extends the existing
      summary.json/union.gap.json) and the v0 auto-fire set (§7-e) — do not begin implementation before
      those forks are resolved by the maintainer (house rule #3). Once ratified: a committed,
      item-granular sidecar per transpiled phylum — machine-readable `remap.json` plus a rendered
      `REMAP.md` — recording, per target nodule, the restructuring `operation`
      (Keep/Consolidate/Split/Relocate/CrateToPhylum), `sources` (rust_path/rust_span/moved_items),
      `rationale`, `safety` (Safe/Review per DN-109 §4.2), `api_surface_changed`, `identity_neutral`
      (ADR-003), plus an `idiom_choices` EXPLAIN trail (the L4 decision-class + chosen/alternative +
      reason per DN-109 §3.2 clause 4). This is the maintainer's "mapped, documented, explained
      (how/where/why)" hard requirement, mandatory from v0 even for pure 1:1 Keep.

      User stories:
      - As a reviewer of a ported phylum, I want one machine-readable ledger with every non-1:1
        structural decision and every non-mechanical idiom choice explained, so I can audit a port
        without diffing the Rust by eye (DN-109 §1.2).

      Definition of Done:
      - DN-109 §7-c and §7-e ratified first (this issue does not decide them); schema matches the
        ratified version of DN-109 §5.2; emitted for every batch run (v0: pure Keep entries plus any
        idiom_choices already made, e.g. `&T` erasure); `REMAP.md` byte-derivable from `remap.json`;
        never a black box (S4) — every non-Mechanical choice has a `reason`; tests assert schema +
        round-trip; no guarantee-tag upgrade from the manifest's existence alone (VR-5).

      **Landed 2026-07-11 (mitigation #14, checked basis — verify-first: `grep -rn remap
      crates/mycelium-transpile/src` was empty before this change, confirmed no prior partial
      landing).** DN-109's §7-c/§7-e forks were already ratified (2026-07-11, see DN-109's
      ratification section) before this leaf began. Per §7-c: **extends** `summary.json`
      (`BatchSummary.remap: RemapManifest`, `crates/mycelium-transpile/src/batch.rs`) rather than
      minting a new sidecar — no standalone `remap.json` file is written; the manifest ships inside
      `summary.json` and `REMAP.md` is rendered from that same struct
      (`crates/mycelium-transpile/src/remap.rs::render_remap_md`, a pure projection — checked by a
      round-trip test: serialize -> deserialize -> re-render -> byte-compare). Schema fields match
      DN-109 §5.2 field-for-field (`phylum{source_crate,target_phylum}`,
      `nodules[]{target_nodule,operation,sources[],rationale,safety,api_surface_changed,
      identity_neutral,guarantee}`, `idiom_choices[]{target_span,rust_span,decision,class,chose,
      alternatives,reason}`). v0 scope per the ratified §7-e Mechanical-only auto-fire: every
      transpiled file gets exactly one pure `Keep` entry (structure-preserving 1:1, target nodule
      derived via the already-`pub(crate)` `transpile::derive_nodule_path` from M-1042 — zero
      changes to `transpile.rs`/`emit.rs`/`map.rs`/`visit.rs`); `idiom_choices` ships as an honestly
      **empty** vec (the schema field is never-silent-present, but no per-item `&T`-erasure EXPLAIN
      instrumentation exists yet in `map.rs`/`emit.rs` to populate it from — not invented here,
      KISS/YAGNI boundary, tracked as residual future work rather than fabricated). Guarantee tag
      stays `Declared` throughout, never upgraded from the manifest's mere presence (VR-5) — the
      module doc comment states this explicitly. 11 new tests in
      `crates/mycelium-transpile/src/tests/remap.rs` (JSON round-trip, the REMAP.md
      byte-derivability property named in this DoD, rendering determinism, a Markdown-table
      pipe/newline-escaping regression added during self-review — `render_remap_md` now escapes
      `|`/`\n` in every free-text cell so a future non-`Keep` rationale/reason can never corrupt the
      rendered table, v0 Keep-only behavior, a data-driven phylum-name fixture table, guarantee-tag
      posture) plus 2 new assertions folded into the existing `src/tests/batch.rs` multi-file test;
      `cargo test -p mycelium-transpile` green at 75 (was 66 + 9 net); `cargo clippy -p
      mycelium-transpile --all-targets -D warnings` clean; `cargo fmt --check` clean; verified
      end-to-end against a real corpus target (`crates/mycelium-std-cmp/src` -> `std.cmp`, matching
      the phylum-naming convention DN-109 §2 cites) in addition to the unit-test fixtures.

  - id: M-1045
    title: "M-1045 — actionable suggested_idiom field on transpiler gap diagnostics"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P3, status:todo]
    epic: E32-1
    depends_on: []
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/gap.rs
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §4.5 DX-D6). Gap reasons already say what/why (gap.rs, e.g. good detail on `NamedFieldDrop`) but
      rarely give the exact hand-idiom to apply next — never-silent is satisfied but not maximally
      helpful. Add an optional `suggested_idiom` field to `Gap`, populated for the common, well
      understood classes (record literal -> positional ctor ordering hint; `use` -> the cross-nodule
      FLAG with the DN-109-recommended manual workaround; reserved-word -> a rename suggestion). Must
      never guess a *semantic* answer (Judgment-class gaps get no suggestion, or an explicitly-flagged
      one) — this is a documentation aid, not a new auto-transform (does not change §3.2's ratchet).

      User stories:
      - As a hand-porter facing a gap, I want a suggested next step where one is safely knowable, so
        that never-silent diagnostics are also genuinely actionable, not just honest.

      Definition of Done:
      - `Gap.suggested_idiom: Option<String>` populated for at least the record/reserved-word/import
        classes; never populated for Judgment-class gaps without an explicit human-facing caveat; field
        surfaced in `gap.json` and the human-readable report; tests cover populated + intentionally-empty
        cases; no change to `checked_fraction`/`expressible_fraction` semantics.

  - id: M-1046
    title: "M-1046 — \"closest-to-clean\" investment ranking in the vet report"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P3, status:todo]
    epic: E32-1
    depends_on: []
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/vet.rs
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §4.5 DX-D8). `checked_fraction` is file-gated all-or-nothing (vet.rs:143,
      checked_clean_items_is_file_gated_all_or_nothing) — one poison item zeros a whole file's credit,
      and the report never says which item to fix first, nor ranks files by how close they are to fully
      clean. `VetRecord::diagnostic` already captures the first check-error per file. Add a ranked
      worklist to the vet/manifest output: files ordered by (emitted minus checked) delta, each with its
      first blocking diagnostic surfaced, so a porter knows where to invest fix-up effort first.

      User stories:
      - As a porter working through the M-1006 ladder, I want the vet report to rank files by how close
        they are to fully clean with the blocking diagnostic up front, so that I fix the highest-leverage
        file first instead of scanning the whole union report.

      Definition of Done:
      - Vet output includes a ranked-by-delta file list with each entry's first blocking diagnostic
        (reusing the existing `VetRecord::diagnostic` capture, no new parsing); ranking is stable/
        deterministic; tests assert the ranking on a small fixture with a known delta ordering; no
        change to the underlying file-gated `checked_fraction` metric itself (this is a reporting
        addition, not a metric change).

  - id: M-1047
    title: "M-1047 — transpiler DX polish: mycfmt post-pass, dry-run/summary mode, minimal arg parsing"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:tooling, priority:P3, status:todo]
    epic: E32-1
    depends_on: []
    doc_refs:
      - corpus:DN-109
      - src:crates/mycelium-transpile/src/bin/mycelium-transpile.rs
      - src:crates/mycelium-transpile/src/transpile.rs
    body: |
      Filed 2026-07-10 from the zero-hand-port delta-ledger analysis (docs/planning/zero-hand-port-delta-ledger.md
      §4.5 DX-D4/D5/D12), combined into one polish issue per the ledger's own recommendation (these are
      small, disjoint-effort, non-blocking QoL items on the same CLI binary). Three closures: (D4)
      emitted `.myc` is hand-rolled `chunks.join("\n\n")` (transpile.rs:462) with no canonical
      formatting — add an optional `--fmt` post-pass piping emission through `mycfmt` (M-364) for
      readable drafts; (D5) the CLI always writes artifacts, add `--summary`/`--dry-run` to compute and
      print the gap/category/fraction table without writing files, for fast gap-profiling; (D12) arg
      parsing is a hand-rolled `env::args` loop with no `--help` (bin:33-42) — once these flags land
      (>=3 total), adopt a minimal arg helper. Watch/incremental mode explicitly deferred (YAGNI, corpus
      is small).

      User stories:
      - As a porter profiling a crate before committing to a full port, I want a dry-run mode that
        prints the gap distribution without writing files, so I can triage quickly (ties to the
        /myc-drafts triage-before-porting workflow).
      - As a reader of a generated draft, I want it passed through mycfmt, so the formatting is
        canonical rather than whatever the emitter hardcoded.

      Definition of Done:
      - `--fmt` post-pass available (opt-in, off by default to keep byte-for-byte reproducibility the
        default per the DX audit's confirmed-GOOD determinism finding); `--summary`/`--dry-run` writes
        nothing and prints the same table already computed for stdout; `--help` documents all flags;
        existing default (no-flag) behavior byte-identical to today; tests cover each new flag.

  - id: M-1048
    title: "DN-101 long-term cross-nodule-link API — determine option B vs C, design API, iterate"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:research, area:language, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1024]
    doc_refs:
      - corpus:DN-101
    body: |
      Filed 2026-07-11 from the maintainer's ratification of DN-101 (ENB-1, cross-nodule runtime link).
      DN-101 moved Draft → Accepted with the v0 flat-namespace collision policy (§5 option A) confirmed
      as the shipped baseline, but the maintainer explicitly left the LONG-TERM choice open between
      DN-101 §5's two deferred alternatives: **option (B)** qualified names + per-frame home-nodule
      scoping (the fully general end-state, tracked at M-982) and **option (C)** name-mangling to
      qualified keys (a medium-cost AST/elab rewrite-pass middle path). Maintainer: "I'd rather
      determine if option C or B is best long term, hard work is fine, plan it out first, nail down
      what the api should look like, and go from there progressively/iteratively and keep the docs
      updated and aligned."

      User stories:
      - As a language designer, I want the long-term cross-nodule name-resolution model settled (B vs
        C) with its API shape planned before implementation starts, so that the v0 flat-namespace
        refusal has a clear, iteratively-buildable successor rather than an open-ended deferral.

      Definition of Done:
      - A design pass (a new or amended DN) compares option B and option C against the project's
        current cross-nodule call-site shapes, names the API surface each implies (how a disambiguated
        reference reads at a call site), and recommends one for maintainer ratification; the docs
        (DN-101, DN-99 register row #41, M-982) stay updated and aligned with the decision as it forms;
        implementation then proceeds progressively/iteratively per the ratified plan, not as one big
        rewrite.

  - id: M-1049
    title: "DN-102 second research pass + resolve FLAG-try-2 via language gap closure; re-stage for ratification"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:research, area:language, priority:P2, status:done]
    epic: E28-1
    depends_on: [M-1025]
    doc_refs:
      - corpus:DN-102
      - corpus:DN-99
      - corpus:DN-106
      - corpus:DN-109
    landed_basis: >
      status:done (2026-07-10) — DN-102 is ratified → **Accepted** (maintainer, 2026-07-10), adopting
      SP.5 Rank 1 in full: the landed v0 desugar (§2/§3/§5, PR #1363) plus the second-pass resolutions.
      PR #1395 (`claude/dn-102-second-pass`, merged to `dev` 2026-07-10) appended DN-102's "Second
      research pass (2026-07-11) — M-1049" section (SP.1–SP.8): reconciles the design with DN-106/
      DN-109/DN-107 (all ratified since the first pass); resolves FLAG-try-2 by scoping implicit
      `From`-error widening as a deliberate exclusion (DN-109 D13 inferred-conversion black-box
      family) mapped to the native `map_err(e, conv)?` idiom (`lib/std/result.myc:39`), no
      error-conversion-trait subsystem; reframes FLAG-try-1 as an independent CPS-lift follow-up
      decoupled from the never-type (DN-107 §6-a) — now tracked as **M-1059**. The matching
      append-only addendum on DN-99's ENB-2 backlog row is confirmed on this ratification. All three
      DoD clauses are complete: the pass is documented, FLAG-try-2 is resolved by the ratified
      permanent-exact-match-plus-native-`map_err` decision, and DN-102 is ratified on this basis
      (house rule #3 — only the maintainer ratifies; verified against the DN-102 "Ratification
      (maintainer, 2026-07-10)" section, mitigation #14).
    body: |
      Filed 2026-07-11 from the maintainer's non-ratification of DN-102 (ENB-2, the `?` try-operator
      desugar). The maintainer declined to ratify DN-102 as drafted: "many must be resolved via
      language gap closure; the flag try 2 issue presents an issue that must be resolved from that gap
      review pass and should have been raised as part of it. much of this may just need a second
      research pass to stage for ratification based on the data, project intent, and solid reasoned
      research." DN-102 stays Draft pending this pass.

      Two coupled closures:
      1. A second research pass over DN-102's desugar rule (§2), error-type unification rule (§3), and
         v0 `let`-RHS position restriction (§5) — grounded in the DN-99 surface-gap-closure register's
         data and the project's zero-hand-port intent (ADR-045) — to re-stage the note for ratification.
      2. Resolve **FLAG-try-2** (no `From`-error widening; the error-type unification rule is
         exact-match only because Mycelium has no error-conversion trait wiring) via genuine language
         gap closure, per the DN-99 ENB-2 gap-routing addendum (§8) this issue is cross-referenced from.

      User stories:
      - As a stdlib porter relying on `?`, I want error-widening (`From`-style) to be either supported
        or explicitly, permanently scoped out by a ratified decision, so that the `?` desugar's coverage
        is settled rather than an open residual FLAG.

      Definition of Done:
      - The second research pass is documented (a DN revision or a new companion DN) citing DN-99 data
        and project-intent grounding for each of DN-102's open design points; FLAG-try-2 is resolved
        either by a concrete error-conversion-trait design (with its own DoD) or by a ratified,
        permanent exact-match-only decision with reasoning recorded; DN-102 is re-submitted for
        maintainer ratification on this basis.

  - id: M-1050
    title: "design + implement pub(path) scoped visibility (successor to the binary priv seal, DN-104 §3 option B)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1036]
    doc_refs:
      - corpus:DN-104
      - corpus:DN-53
    body: |
      Filed 2026-07-11 from the maintainer's forward-direction decision on DN-104 (ENB-4, the
      per-constructor visibility seal). DN-104 §3 confronted a fork — binary seal (option A, shipped
      v0 via M-1027) vs full `pub(path)` scoped visibility (option B: `pub(nodule)`, `pub(phylum)`,
      `pub(in a.b)`) — and recommended (A) for v0 under KISS/YAGNI, noting (A) is forward-compatible
      with (B) ("`priv Mk` is exactly `pub(nodule) Mk`"). The maintainer directs pursuing the FULLER
      option B as the long-term design: "if option B full pub(path) is better long term, especially in
      the scope of this project's intents as a programming language, it makes sense to plan and
      implement that. We're literally driving to multi-phylum work already; once fully self-hosted
      after we close every gap, we'll dogfood via the transpiler, then hand-check/correct the resulting
      code nodule/phylum by nodule/phylum."

      This is related to, but distinct from, **M-1036** (nodule-qualified type identity — the fix for
      the same-named-local-shadow bypass): M-1036 is about identity RESOLUTION (making the seal
      unforgeable against a colliding name), while this issue is about visibility SCOPING (generalizing
      the binary nodule-boundary seal to a path-scoped grammar). Both bear on making DN-104's mechanism
      a real capability boundary; this issue depends on M-1036 landing first since a `pub(path)` grammar
      layered on a still-bare-name-resolved seal would inherit the same shadow-bypass gap.

      User stories:
      - As a stdlib/semcore author organizing multi-phylum code, I want visibility scoped to an
        arbitrary nodule/phylum path (not just a binary sealed/unsealed nodule boundary), so that a
        capability type's construction can be shared with a designated subset of trusted nodules
        without exporting it phylum-wide.

      Definition of Done:
      - A Draft DN designs the `pub(path)` grammar (`pub(nodule)`/`pub(phylum)`/`pub(in a.b)`), its
        interaction with the M-1036 nodule-qualified-identity fix, and a migration story for existing
        `priv`-sealed constructors (forward-compatible re-expression as `pub(nodule)`, per DN-104 §3);
        the maintainer ratifies; implementation follows the DN's plan, conformance accept/reject +
        differential witnesses per the usual ENB pattern, never-silent on any unsupported path form.

  - id: M-1051
    title: "desugar/expand-on-demand tooling for surface sugars (the DN-106 sugar-transparency principle, general)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:in-progress]
    epic: E28-1
    depends_on: []
    doc_refs:
      - corpus:DN-106
      - corpus:DN-109
      - corpus:DN-110-8.2-hygiene-deepdive
      - src:crates/mycelium-l1/src/reveal.rs
    landed_basis: >
      status:in-progress (Increment-1 of a 3-increment DoD landed, Increments 2/3 outstanding) —
      PR #1412 (`claude/leaf/m1051-reveal-increment1`, merged to `dev` 2026-07-10) lands
      `crates/mycelium-l1/src/reveal.rs`: `reveal_l0` (Exact — a direct wrap of `elab::elaborate`),
      `alpha_eq` (Empirical — structural alpha-equivalence, unit-tested against hand-built
      adversarial pairs incl. Fix/FixGroup/Match binder forms), `render_surface` (Empirical, never-
      silent `RenderError::Unrenderable` refusal for a `Dense`/`Vsa` `Const` payload or a non-finite
      `Float` — no black boxes, house rule #2), and `reelaborate` (Empirical, an honestly-scoped
      closedness re-derivation — NOT a full surface re-parse pipeline). `cargo test -p mycelium-l1`
      green (21/21 new reveal tests; 0 regressions). **Honest scope note (VR-5):** the module's own
      doc flags that the shipped corpus test is closedness-preservation, not the DN-110-8.2-hygiene-
      deepdive §7 E3 alpha-equivalence regression — that composition is definitionally vacuous at v0
      (`reelaborate` has no lossy step to invert; see M-1055's landed_basis). Increment-2 (CLI/LSP
      surfacing of `desugar`/`expand`) and Increment-3 (the `certified`-mode round-trip check, DN-38
      §5/§8.3) remain unbuilt — this issue stays `in-progress`, not `done`.

      **Increment-3 landed (2026-07-11, append-only, does not edit the record above).** PR #1423
      (`claude/leaf/m1051-inc3-e3-reveal-roundtrip`, merged to `dev`, adversarial-review fast-follow
      `2ae0cd63`) adds `certified_roundtrip` (DN-38 §5's `delaborate . lower = id` obligation gated by
      `certified` mode): always computes the L0-term-level identity witness (`reelaborate` +
      `alpha_eq`), and, as a secondary best-effort convenience, attempts a genuine surface round-trip
      (real reparse → real re-check → real re-elaborate → `alpha_eq`) whenever `render_surface` flags
      the text `reparseable` — reporting an explicit `SurfaceOutcome`, never trusting the flag alone
      (G2). **Verify-first finding (empirical, review-hardened):** `reparseable = true` is necessary
      but not sufficient for real parser acceptance — confirmed for `Node::Lam` (no param-type
      annotation in the render), every `Node::Op` (unconditionally non-reparseable via the `#op[..]`
      marker, kernel prim names being `.`/`:`-namespaced), and — added during adversarial review —
      `App`/`Match` also fail real re-check even when `%`/`#`-marker-free. The genuinely surface-
      round-trippable fragment is narrow: `Const`/`Var`/`Let`(-of-those) only. **OQ-H3 disposition
      confirmed as option (1)/(a): L0-term-level identity witness, never a surface re-parse for
      `%`-names**; option (2) (display-renaming) stays deferred. This is the M-1051 half of M-1055's
      E3 experiment (`crates/mycelium-l1/src/tests/reveal_roundtrip_e3.rs`, 6 tests green — see
      M-1055's own landed_basis for the experiment-side verdict). The reveal spine moves
      `Declared → Empirical` **only** for the L0-term-level claim on the reparseable fragment, not a
      blanket upgrade (VR-5). **Increment-2 (CLI/LSP surfacing) is the sole remaining gap** — this
      issue stays `in-progress`, not `done`.
    body: |
      Filed 2026-07-11 from the maintainer's ratification of DN-106 (ENB-10 triage). The maintainer
      established a general **surface-sugar transparency** principle ("that's re 106"): "We can carry
      the named surface sugars as well, try to drive developers to the language's native targets, but
      realistically the surface sugar hides nothing — it can all be expanded/revealed at any point by
      the dev to its lower desugared grammar. So sugar is merely memetic and mnemonic convenience." And
      the companion **gap-closure default**: "Outside of those cases where it's 'the language chooses
      not to do this', [a gap] should be resolved by creating the convenience sugar and ensuring it
      lowers mechanically and reliably."

      Today `EXPLAIN` covers the transpiler's idiom-choice manifest (DN-109 §5.2, the L4 idiom-decision
      EXPLAIN trail) but there is no general, uniform "reveal this surface sugar's lower desugared
      grammar" capability surfaced to a developer at an arbitrary sugar site in the language itself
      (e.g. at a `?`-operator use, a `let _`-sequencing site, a future record-update-literal sugar per
      DN-106's reframed §3 fork B). This issue tracks building that capability so the transparency
      principle is actually load-bearing tooling, not just a documented intent.

      User stories:
      - As a Mycelium developer using a surface sugar (`?`, a future record-update literal, or any
        other mechanically-lowering convenience form), I want a command/tool that shows me exactly what
        core-grammar form my sugar expands to, so that the sugar never becomes a black box I have to
        trust rather than verify (house rule #2).

      Definition of Done:
      - A `desugar`/`expand` operation (CLI flag, LSP action, or `EXPLAIN`-integrated command — design
        choice for the implementing DN) that, given a source span containing a surface sugar, shows its
        fully-desugared lower-grammar equivalent; covers at minimum the sugars landed under the ENB
        wave (`?` per DN-102, `let _` per DN-106, any future record-update sugar); never silently
        approximates the expansion (an unsupported sugar site is a never-silent refusal, not a guess);
        cross-referenced from DN-109's idiom-choice EXPLAIN manifest so the transpiler and the
        interactive tooling share one transparency mechanism rather than diverging ones.

  - id: M-1052
    title: "DN-109 F1 (reframed) — optional borrowck/rust-analyzer precision aid for auto-detecting deliberate-exclusion sites (D7/D8), vs the flagged-suggested-native-idiom default path"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:research, area:tooling, priority:P3, status:todo]
    epic: E32-1
    depends_on: [M-1045]
    doc_refs:
      - corpus:DN-109
      - corpus:DN-34
    body: |
      Filed 2026-07-11 from the maintainer's ratification of DN-109 (L4 idiom-decision framework / L5
      structural remapping). DN-109 §7-b (fork "F1" in the companion zero-hand-port delta ledger, its
      most pivotal open fork) originally framed acquiring a rustc/rust-analyzer borrowck front-end as
      close to necessary for handling D7 (`&mut` aliasing) and D8 (unbounded-iterator boundedness) at
      all — without it, both stay "Judgment/flags forever."

      The maintainer reframed this: D7 and D8 are exactly the project's DELIBERATE-EXCLUSION set
      (in-place aliasable mutation; unbounded iteration), and Mycelium has NATIVE SOLUTIONS to the
      underlying problems those Rust constructs solved — destructure-and-reconstruct functional update
      (D7's native solution; the same mapping DN-106 ratified for record-update) and bounded `for` /
      structural recursion (D8's native solution, RFC-0007 §4.8). So porting these is
      problem-to-native-solution mapping, not merely refusal: auto-emit where the mapping is
      safe/mechanical (as D4's `&T`-erasure already does), and where it needs judgment (a case `syn`
      cannot statically settle), FLAG WITH THE SUGGESTED NATIVE IDIOM (the `suggested_idiom` gap-
      diagnostic field, M-1045) rather than a bare, unhelpful refusal. A borrowck frontend is therefore
      an OPTIONAL PRECISION AID — it would let some D7/D8 sites be proven safe and promoted from
      Judgment to Heuristic/Mechanical (fewer flags, more auto-emission) — but is NOT required for
      mechanical porting to proceed, since the flag-with-suggestion path already gets a developer to
      the native solution without it.

      User stories:
      - As a maintainer deciding whether to acquire a borrowck/rust-analyzer front-end for the
        transpiler, I want a concrete accounting of what it would upgrade (which D7/D8 sites move from
        Judgment-flag to Heuristic/Mechanical auto-emit) versus what already works without it (the
        flag-with-suggested-native-idiom path), so the large scope commitment (DN-34 §6-Q1/Q3) is
        weighed against its actual marginal benefit rather than treated as a porting blocker.

      Definition of Done:
      - A study (a DN or an appendix to the zero-hand-port delta ledger) that (a) confirms
        `suggested_idiom` (M-1045) is landed and covers D7/D8 gap sites with the correct native-idiom
        suggestion; (b) estimates, from the corpus, what fraction of D7/D8 sites a borrowck frontend
        would provably resolve (auto-emit-eligible) versus what fraction are irreducibly judgment calls
        even with perfect aliasing information; (c) recommends, on that evidence, whether to acquire the
        frontend now, later, or never — explicitly NOT gated on this issue for mechanical porting to
        continue using the flag-with-suggestion default.

  - id: M-1053
    title: "DN-108 companion ADR (transcendental prim accuracy contract, parallel to ADR-040) + OQ-3 vendored-vs-host-libm implementation decision"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:numerics, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1028]
    doc_refs:
      - corpus:DN-108
      - corpus:ADR-040
    body: |
      Filed 2026-07-11 from the maintainer's ratification of DN-108 (ENB-5, transcendental + eps/delta
      float numerics). DN-108 §8 requires, for the *implementing* increment beyond the ratified design:
      (item 4) a companion ADR for the transcendental prim class's accuracy contract, parallel to
      ADR-040's scalar-float landing; and (§7 OQ-3) a decision on whether v0 calls a vendored /
      version-locked transcendental routine (reproducible, heavier) or the ambient host libm (light,
      platform-dependent) — DN-108 itself leans vendored, "for a never-silent, reproducible result"
      (§6.4: most libms are not correctly-rounded, so a bit-identical three-way differential needs a
      version-locked implementation to diff against). The ratification adopted the vendored lean as
      direction but left the concrete routine/integration choice as implementation work.

      User stories:
      - As a numerics implementer landing `flt.sqrt/exp/ln/sin/cos/pow` (M-1028), I want a ratified ADR
        naming the accuracy contract (v0 tag `Declared`, asserted-ULP sourcing, the composition-refusal
        rule) and a settled vendored-vs-host-libm choice, so the M-1028 implementation has a stable
        target rather than re-litigating DN-108's design mid-implementation.

      Definition of Done:
      - A Draft ADR (parallel to ADR-040) records the transcendental prim class's accuracy contract
        (DN-108 §5.1's minimal v0 scope: the six named functions, `Declared` tag, asserted-ULP bound
        sourcing, `NumErr::Domain` refusals, `ApproxRule::Refuse` composition) and is ratified; OQ-3 is
        settled with a concrete implementation choice (a specific vendored/version-locked routine or
        library, or a reasoned decision to use the host libm after all with the reproducibility
        trade-off explicitly accepted); M-1028 proceeds against the ratified ADR + OQ-3 decision.

  - id: M-1054
    title: "native metaprogramming/sugar facility -- generalize lower/derive to expression-position sugar rules (DN-110 Rank 1)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P2, status:in-progress]
    epic: E28-1
    depends_on: [M-812, M-1051, M-1055]
    doc_refs:
      - corpus:DN-110
      - corpus:DN-54
      - corpus:DN-38
      - corpus:DN-106
      - corpus:DN-110-8.2-hygiene-deepdive
      - corpus:DN-115
      - corpus:DN-116
      - corpus:DN-117
      - src:crates/mycelium-l1/src/tests/hygiene_expr_sugar.rs
    body: |
      Filed 2026-07-10 from the maintainer's ratification of DN-110 (native metaprogramming / sugar-
      lowering facility). Implements DN-110 §5-A Rank 1: generalize the landed `lower`/`derive`
      term-level lowering framework (DN-54/M-812) to expression position -- the J3 "expression-position
      mechanically-lowering sugar" gap (`format!`/`matches!`/`vec!`-role constructs), co-gated on
      `reveal`/expand-on-demand (M-1051, the mandatory transparency spine per DN-110 §3.4/§8.4).

      This is an EPIC -- its DoD is design-gated: DN-110 is ratified as a design (Accepted, NOT
      Enacted), but the concrete expression-position hygiene/scoping model is its own gating
      sub-design, not yet built. The **§8.2 hygiene model is its own sub-design carrying open questions
      OQ-H1 through OQ-H6** (`docs/notes/DN-110-8.2-hygiene-deepdive.md` §10) -- OQ-H1 (def-site
      resolution across phyla/separate compilation) and OQ-H3 (`reveal` round-trip fidelity for
      `%`-namespace names) are on the critical path and gate the go/no-go (tracked separately, see
      M-1055's E1+E3 experiments). This epic does not decompose into leaf issues until the go/no-go
      experiments (M-1055) return a PASS verdict.

      User stories:
      - As a self-hosting engineer porting the Rust stdlib, I want `impl_narrow_int!`/`impl_std_error!`
        boilerplate to map to `lower`/`derive` sites and `format!`/`matches!` to map to expression sugar
        rules, so a macro-heavy Rust module becomes mechanically portable (DN-110 §4 user story 1).
      - As a Mycelium application developer, I want to eliminate my own repeated boilerplate with a
        named sugar I define once that lowers to ordinary code, and to `reveal` the lower form at any
        point, so the abstraction never becomes a black box (house rule #2; DN-110 §4 user story 2).
      - As a reviewer/auditor, I want every generated or sugared form to carry an EXPLAIN-able trail to
        the exact core grammar it compiles to (DN-110 §4 user story 3).

      Definition of Done (DN-110 §3.6, ratified 2026-07-10):
      - Every sugar rule is (a) a mechanical, reliable lowering to existing core grammar with zero
        L0-node growth (KC-3, the DN-54 §6 guard), (b) `reveal`-able / reversibly expandable on demand,
        and (c) hygiene-witnessed by the DN-38 §7 differential+hygiene harness (the E1-E5 corpus, per
        the DN-110-8.2 companion note); guarantee tags propagate the weakest tag of the RHS, never
        upgraded (VR-5). Blocked on M-1051 (`reveal`) landing and M-1055's E1+E3 go/no-go passing before
        any code lands (VR-5: no guarantee tag claimed until the checked basis exists).

      Design notes appended 2026-07-10 from the M-1055 E1 language-fit review (append-only, house
      rule #3 -- carried here so they survive to inform the eventual build; none of this is a build
      or ratification claim, all `Declared` unless independently checked, VR-5):

      1. **OQ-H5 (per-site fresh-counter architecture).** The E1 prototype's `expand()` resets its
         gensym counter per call (`%0`, `%1`, ...) -- fine for E1's single-expansion fixtures, but it
         is explicitly NOT what the real facility must do. The facility must use the elaborator's
         GLOBAL `Elab::fresh` counter, minting site-qualified names of the deep-dive §4(A) shape
         (`%sugar#<rule>@<siteN>%tmp`), so that nested/repeated expansions freshen into DISTINCT
         per-expansion-site scopes (the E4 nested-expansion property, DN-110-8.2-hygiene-deepdive
         §7 E4 / §10 OQ-H5) rather than colliding on a reused local counter. Building the facility
         against E1's per-call reset instead of the global fresh counter would silently reintroduce
         cross-expansion capture the moment two sugar invocations appear in the same elaboration.
      2. **OQ-H1 (def-site resolution).** E1 deliberately does not implement deep-dive §4(C) -- def-
         site resolution of a sugar RHS's free identifiers to content-addressed L0 references
         (ADR-003) -- it substitutes only the RHS's own bound parameters. The facility must build
         this resolution pass; it is not something E1's PASS verdict already covers, and the
         cross-phylum residual (OQ-H1's own open question, deep-dive §10/§8 item 1) is unresolved.
      3. **Long-term (separate decision, not scoped to this epic): alpha-canonical `Node` hashing.**
         Canonicalizing binders to de Bruijn indices before `content_hash` would make content-
         addressing alpha-aware and give free expansion dedup (the deep-dive §6 "true half" finding
         -- today two alpha-equivalent terms hash differently because binders are named strings, DN-
         110-8.2-hygiene-deepdive §3 finding #1 / §6 "false half"). This is real, but it touches the
         ADR-003 content-addressed identity model repo-wide, well beyond this epic's J3 scope, and is
         flagged here as a future direction, not decided or scheduled by this note (house rule #3).

      Further design notes appended 2026-07-10 from the M-1055 E2/E5 review (PR #1415, additive/
      non-gating exploration -- append-only, house rule #3; none of this is a build or ratification
      claim, `Declared` unless independently checked, VR-5):

      4. **OQ-H1 confirmed still open (cross-phylum def-site resolution).** E2 validated def-site
         resolution (deep-dive §4(C)) only for the in-scope, same-nodule case; the cross-phylum case
         OQ-H1 names was not exercised and remains open. E2's PASS is not evidence toward OQ-H1's
         resolution.
      5. **New: E2's verbatim-splice composition gap.** E2's prototype `DefEnv::get` splices the
         resolved def-site `Node` back into the expansion **verbatim**, without routing it back
         through the (A) `%`-namespace freshening walk. Not an issue for the real DN-110 §4(C) design
         (content-addressed references, not textual re-splicing), but an unexercised composition case
         (a def-site helper binder colliding with an RHS/use-site binder spelling) the facility's
         hygiene-witness corpus should cover once built.
      6. **New: OQ-H4 (affine def-time vs use-time) sharpened by E5.** E5 confirms the landed M-919
         static pass enforces only the affine **upper bound** (duplication); the **lower bound**
         (drop-without-consume) is a documented M-904 **runtime** concern, not a static rejection
         (`tests/affine.rs:304-312`'s own doc comment; DN-71 §8 FLAG-4). OQ-H4's "recommended:
         use-time precise, optional def-time lint" framing should read this as **already the landed
         posture for the upper bound**; the lower bound is out of E5's (and any static
         affine-on-expanded-L0 pass's) reach by construction, not by an implementation gap.

      Gate-met correction + FLAG-A architecture ratification (2026-07-10, append-only -- corrects the
      stale "blocked ... until M-1055 PASS" framing above without editing it; mitigation #14, the
      tracker lagged the codebase). **M-1055's E1+E3 go/no-go is now SATISFIED**: E1 PASSED (design
      notes above) and **E3 PASSED** (`crates/mycelium-l1/src/tests/reveal_roundtrip_e3.rs`, landed PR
      #1423, "E3 BUILT AND RUN, PASS, narrowly scoped" per DN-110-8.2-hygiene-deepdive.md's "E3 Result"
      addendum) -- M-1055's own E1+E3 Definition of Done is met (M-1055 status corrected to `done`
      below, same pass). **This epic is UNBLOCKED**; status corrected `todo -> in-progress` above (real
      Stage-0 work is underway -- see below). Per maintainer direction relayed at this integration pass
      and recorded in DN-110 §8.4 addendum 2 (2026-07-10), **FLAG-A, the facility's two-phase build
      architecture, is ratified**: (1) an L1 check-phase resolving a value-parametric sugar call's
      def-site and running the M-919 affine tracker on the *substituted* `Expr`, and (2) an L0
      elab-phase extending `elaborate_lower_rule` to be value-parametric, freshening `%`-namespace
      binders off the GLOBAL `Elab::fresh` counter (OQ-H5 above -- never a locally-reset counter). The
      facility builds as a **staged serial pipeline**: **Stage 0** is the sanctioned entry point -- a
      provably-inert, always-refusing recognition+matcher skeleton (recognizes a value-parametric sugar
      call, arity/type-matches its arguments, but CANNOT emit an expansion -- every path a named
      refusal, adversarially verified by construction); **hygiene (the %-freshening + capture-avoiding
      substitution FLAG-A point 1 names) lands in Stage 1**, not Stage 0. A Stage-0 skeleton branch
      (`claude/leaf/m1054-stage0-facility-skeleton`) exists with real, not-yet-merged work
      (`LowerDecl::value_params`, `Cx::check_sugar_call`, `elaborate_lower_rule_with_args`) consistent
      with this architecture. Guarantee posture unchanged: DN-110 stays `Accepted`, NOT `Enacted`;
      nothing here upgrades a tag past its checked basis (VR-5) -- this corrects the epic's
      blocked/gate status and records the architecture; it does not itself certify any stage as built,
      which remains for this epic's own DoD to show, checked independently.

      **Stage 0 + Stage 1 landed (2026-07-11, append-only, integration close-out; mitigation #14 --
      verified against the merged code, not rubber-stamped).** Stage 0 landed via PR #1426
      (`claude/leaf/m1054-stage0-facility-skeleton`, merged to `dev`): `LowerDecl::value_params`
      (ast.rs), `Cx::check_sugar_call` (checkty.rs, tried only as `check_app`'s last resort, after
      every existing resolution path has missed -- arity/type-matches then unconditionally refuses,
      naming the Stage-1 gate), and `elaborate_lower_rule_with_args` (elab.rs, a value-parametric
      extension of `elaborate_lower_rule`, which becomes a thin empty-args wrapper so its public
      signature and every existing caller are untouched). Stage 1 landed via PR #1429
      (`claude/leaf/m1054-stage1-facility-hygiene`, merged to `dev`, human + Grok adversarial review
      resolved in follow-up commit `26344f99`): **the first facility stage that actually emits an
      expansion.** `elab.rs` gains a two-pass hygienic expansion in `elaborate_lower_rule_with_args`
      -- pass 1 ordinary `Elab::expr` elaboration of the RHS with value params bound to their bare
      surface spelling, pass 2 `sugar_expand` (a direct port of the M-1055 E1 prototype's
      `Expander::go`) freshening every RHS-introduced binder via `Elab::fresh` under a process-wide
      site-qualified namespace (`SUGAR_EXPANSION_SITE`) and substituting value-parameter
      placeholders with their matched argument `Node`s. New `src/tests/facility_stage1_hygiene.rs`
      (7 fixtures post-review, each checked 3 ways: `alpha_eq` vs. an independent oracle,
      `Interpreter::eval` agreement, and a disable-freshening negative control). **Verdict: PASS --
      production capture-avoidance (A)+(B) on the real `elaborate_lower_rule_with_args` path moves
      `Declared -> Empirical`, for that path specifically** (E1's own `Empirical` stays scoped to the
      test-only prototype it covered). `cargo test -p mycelium-l1 --lib`: 526 passed, 0 failed, 1
      ignored (was 519 pre-Stage-1; +7). `clippy -D warnings` / `fmt` clean.

      **Stage 1b residual -- the facility is NOT yet reachable end-to-end (honest, not a full DoD
      close).** (C) def-site resolution and (D) affine-on-expanded-L0 stay `Declared` (Stage 2/3,
      untouched by Stage 1). `checkty::Cx::check_sugar_call` is UNCHANGED by Stage 1 -- it still
      refuses every recognized sugar-rule call site; the facility is not yet wired into the
      ordinary program-elaboration dispatch (`Cx::check_app` / `self.app`), so no ordinary `.myc`
      program can invoke it yet. Also flagged: `elaborate_lower_rule`'s synthetic-single-function-
      `Env` mechanism cannot elaborate a `lower` rule whose RHS is a lambda IIFE at all (pre-existing,
      confirmed independent of Stage 1); free RHS identifiers (neither a value parameter nor an
      RHS-local binder) are left as bare `Var`s (Stage 2's OQ-H1 def-site-resolution job, not
      attempted); `SUGAR_EXPANSION_SITE` is a process-wide monotonic counter, not bit-reproducible
      across separate process runs (does not affect alpha-equivalence correctness; flagged for
      anyone needing a stable content-hash through an expanded sugar site). Status stays
      `in-progress` (label unchanged) -- Stage 0+1 are real, checked progress against this epic's
      DoD, but the DoD itself (every sugar rule mechanical + `reveal`-able + hygiene-witnessed, wired
      into ordinary elaboration) is not yet met. DN-110 stays `Accepted`, NOT `Enacted`; no tag
      upgraded past its checked basis (VR-5).

      **Stage 1b LANDED (2026-07-11, append-only, PM close-out; mitigation #14 -- verified against
      `dev`, not rubber-stamped).** PR #1434 (`claude/leaf/m1054-stage1b-check-accept`, merged to
      `dev` -- confirmed via `git log dev` merge commit `3cd7dbc2`) lands the check-phase accept path
      `checkty.rs::Cx::check_sugar_call` (Option B -- the def-time RHS type-scheme, `want == got`
      typed once from the RHS) plus `Elab::app`'s new dispatch to the existing Stage-1 expansion
      machinery, closing the Stage-1b residual named above: a value-parametric sugar-rule call site
      is now reachable end-to-end from ordinary elaboration, over the white-box, affine-free,
      single-nodule, monomorphic fragment (two never-silent gates -- OQ-H1 free-identifier refusal,
