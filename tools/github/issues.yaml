    body: |
      The `@certification` attribute on the mycelium-proj manifest / nodule header, resolved
      most-specific-wins across `global` > `phylum` > `nodule`, REUSING the RFC-0012 ambient-representation
      + scoped-override mechanism (no new scoping machinery). Per-op `thaw`-style granularity is DEFERRED
