    doc_refs: [src:crates/mycelium-bench/src/lib.rs, src:crates/mycelium-bench/src/verdict.rs]
    body: |
      EPIC (E-BENCH). Deep, honest measurement of what this language actually buys us — when, where, how, and why — and crucially where we LOSE capability or performance. Lands `crates/mycelium-bench/` (lib + `bench` bin): times whole v0-calculus programs across every execution backend (interpreter trusted-base, AOT env-machine, JIT, direct-LLVM, MLIR-dialect behind `mlir-dialect`) over a shared corpus, classifies each (backend,case) as speed WIN/LOSS/neutral, correctness LOSS, capability LOSS (with reason), or graceful Skip — vs the interpreter via a provenance-insensitive observable differential (repr+payload+guarantee; RFC-0001 §4.6 / M-210). Ingests the LLM-harness quality/cost/latency report (KC-2/SC-5b; synthetic labeled synthetic). Every number Empirical (trial count + spread); no pre-written performance target (VR-5); a capability/correctness loss is recorded, never hidden (G2). Complements `xtask e1`/`kc4` (which time packing kernels / cert overhead).
