  - id: M-980
    title: "usefulness::useful_budgeted panics (bounds check) on two-level nested patterns over a wide enum"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P2, status:todo]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-l1/src/usefulness.rs:209
      - src:crates/mycelium-l1/tests/compiler_stage1.rs
    body: |
      Minted 2026-07-05 from the M-740 Stage-1 port (FLAG-stage1-checker-1). A combined two-level
      nested match pattern (e.g. Some(Scalar(SF16)), or Some(Sp(Ctor, _))) panics
      usefulness::useful_budgeted with a panic_bounds_check at usefulness.rs:209 whenever the
      OUTER type has ~80 variants (observed with compiler.token's Tok). Bisected by the Stage-1
      leaf: the nesting itself triggers it, not aggregation or which inner variant. A checker
      PANIC on plausibly-valid source is a G2 (never-silent) violation — the checker must refuse
      explicitly or accept, never crash. Workaround in the Stage-1 tests: the split-match idiom
      (unwrap Option, then match Spanned, then match the wide enum, as three separate matches);
      lex.myc's own logic never destructures Tok so the port is unaffected.

      User stories:
      - As a Mycelium developer, I want nested matches over wide enums to check (or refuse
        never-silently), so that idiomatic pattern code does not crash the compiler.

      Definition of Done:
      - The panic is reproduced as a regression test (a two-level nested pattern over an
        80-variant enum); the root cause in the usefulness matrix specialization is fixed (or the
        input refused never-silently with an explicit diagnostic if it is a documented budget);
        the Stage-1 split-match workaround sites are noted as un-blockable; change-scoped
        just check green.
  - id: M-981
    title: "L0 reference interpreter impractical at self-hosted-compiler scale (eval_core minutes+ where L1-eval is sub-second)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:execution, priority:P2, status:todo]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-interp/src/lib.rs
      - src:crates/mycelium-l1/tests/compiler_stage1.rs
      - corpus:RFC-0041
    body: |
      Minted 2026-07-05 from the M-740 Stage-1 port (FLAG-stage1-checker-2). For a lex.myc-scale
      elaborated program, mycelium_interp::Interpreter::eval_core does not return within several
      minutes even though parse/check/mono/elaborate and L1-eval all finish in well under a
      second. This is the known L0 substitution-machine O(N^2)+ behavior (RFC-0041 §5.1 notes it
      for deep runtime recursion) surfacing on REAL self-hosted source for the first time. It
      narrows every self-hosting stage gate: the std_*.rs-style three-way differential
      (L1 ≡ L0 ≡ AOT) is not currently feasible at compiler scale, so Stage 1 compares the
      L1-eval leg only (recorded in lib/compiler/README.md — honest, but a weaker gate). The
      Stage-6 bootstrap three-way (M-742) needs either an L0 performance fix, a bounded L0
      sub-corpus strategy, or a ratified re-definition of the gate's legs.

      User stories:
      - As a compiler engineer, I want the trusted L0 leg of the differential to run at
        compiler scale, so that the self-hosting stage gates keep their full three-way strength.

      Definition of Done:
      - The L0 cost profile at lex.myc scale is measured and its dominating term identified;
        either a fix lands (keeping L0 substitution semantics per RFC-0041 §4.1) or a maintainer-
        ratified gate re-definition records which stages run which legs (VR-5 — the narrowing is
        decided, not silent); the Stage-1 harness is extended back to three-way if feasible.
  - id: M-982
    title: "Cross-nodule EXECUTION still staged (check_phylum) — self-hosted nodules must self-contain shared types"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:todo]
