      Follow-up candidate, NOT fixed in the reconcile PR (out of the close-out's scope). Recorded so
      the gap is tracked, not lost.

      User stories:
      - As a Mycelium developer, I want `mycfmt` to preserve `@forage(policy)` on a hypha, so that
        formatting never silently changes my program's placement policy.

      Definition of Done:
      - `render_expr_canonical` (and the comment-aware token path, if separately affected) emit the
        `@forage(policy)` annotation; a round-trip conformance case (`format(parse(x)) preserves
        @forage`) added; guarantee tag at the supportable strength.

      DONE (status reconciled 2026-07-05; the fix itself landed earlier via PR #1027, maintainer-
      authored — the todo was a stale close-out): render_expr_canonical_inner's Colony arm
      destructures Hypha { forage, body } and emits @forage(<policy>) hypha <body>; canonical
      round-trip test (C1 identity + C2 idempotence over a with/without/mixed corpus) landed with
      it. The 2026-07-05 leaf (claude/leaf/M970-forage-render) closed the residual DoD gap by
      adding the READABLE-path round-trip witness and a hypha-with-forage FLATTEN corpus case
      (both paths verified to delegate to the fixed canonical renderer); cargo test -p
      mycelium-fmt 38+6 green. The stale :1410 doc_refs line pointer dropped (line drifted).

  - id: M-971
    title: "Phase-I wave regressed the acyclic-deps invariant — 12 violations (3 cycles + upward-tier dev-deps)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:core-ir, priority:P1, status:done]
    epic: E27-1
    depends_on: [M-877, M-878, M-879]
    landed_date: 2026-07-02
    landed_basis: "PR #1015 'fix(deps): M-971 — resolve DN-68 acyclic-deps regression (12→0 violations)'; CHANGELOG.md '### Fixed (2026-07-02: M-971 — DN-68 acyclic-deps regression, 12 to 0 violations; dev to integration close-out)'"
    doc_refs:
      - corpus:DN-68
      - src:xtask/deps-strata.toml
      - src:crates/mycelium-std-conformance/src/lib.rs
      - src:crates/mycelium-vsa-decode/src/lib.rs
    body: |
      FLAG raised at integration-reconcile 2026-07-02. The Phase-I H1 wave (enb/opp) reintroduced
      dependency-graph violations that kickoff `acy` (H0, M-881/M-882) had driven to 0. `cargo run
      -p xtask -- deps` now reports 12 violations — so `just check` (which wires the gate via
      scripts/checks/all.sh) is RED on `deps-acyclic`. None were introduced by the reconcile PR
      (it changed no Cargo.toml); they are pre-existing on `dev` from the wave's crate wiring.

      Root causes (Empirical, cargo metadata at dev HEAD):
      - `mycelium-interp -[normal]-> mycelium-vsa` (added for the VSA prims, M-892…M-894): a
        same-stratum normal edge (normal-downward-only violation) that also closes the cycle
        {mycelium-interp, mycelium-select, mycelium-vsa} via `mycelium-select -[dev]-> mycelium-interp`.
      - `mycelium-l1 -[dev]-> mycelium-std-{core,diag,error,recover,select,spore,swap,ternary,testing}`
        (added for the opp differential tests, M-926…M-934): nine upward-tier (core -> std) dev edges,
        which also close the cycle {mycelium-l1, mycelium-proj, mycelium-spore, mycelium-std-spore,
        mycelium-std-testing}.

      Fix is the M-881/M-882 pattern (NOT a strata/tier whitelist — DN-68 forbids folding an
      exception into the PR that needed it, and a cycle cannot be mapped away): replace the
      cross-crate dev-imports with local, fixture-driven tests carrying the same assertions +
      guarantee-tag strength (VR-5), and route the interp->vsa need without a same/upward edge.
      Its own scoped, reviewed PR. BLOCKS the dev->integration promotion gate until green.

      User stories:
      - As the maintainer, I want the acyclic-deps invariant to stay at 0 violations, so that the
        acy hardening is not silently regressed by later waves.

      Definition of Done:
      - `cargo run -p xtask -- deps` reports 0 violations; the interp/vsa and l1/std-* edges are
        removed or relocated per DN-68's change-procedure; `just check` green on deps-acyclic;
        no guarantee tag weakened (VR-5).

      DONE (2026-07-02, PR #1015): both categories fixed by structural extraction, no whitelist.
      Category A — the 11 oracle-backed port-differential tests + shared harness relocated out of
      `mycelium-l1` into a new `mycelium-std-conformance` crate (tier std, stratum 0); 9
      `mycelium-std-*` dev-deps dropped from `mycelium-l1`, dissolving the l1/proj/spore/std-spore/
      std-testing dev-cycle. Category B — `decode_select`/`reconstruct_factors_selected` extracted
      out of `mycelium-vsa` into a new `mycelium-vsa-decode` crate, breaking the interp/select/vsa
      cycle and the interp-to-vsa upward-stratum violation (`mycelium-vsa` stratum re-derived 2 to
      1). `cargo run -p xtask -- deps` reports 0 violations; full-workspace test/fmt/clippy/build
      and the `api` gate all green (baselines regenerated). Unblocks dev to integration promotion.

  - id: E32-1
    title: "E32-1 (epic) — trx2 E-A: transpiler up-to-snuff (harden mycelium-transpile + vet loop)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:tooling, priority:P2, status:done]
    epic: E32
    depends_on: [M-1000, M-1001]
    doc_refs:
      - corpus:DN-34
      - corpus:DN-26
      - src:crates/mycelium-transpile/src/lib.rs
      - src:.claude/kickoffs/trx2.md
    body: |
      EPIC (kickoff `trx2` E-A, launched 2026-07-06; executes + extends M-991). Harden the
      Rust->Mycelium transpiler PoC (M-873, DN-34 SS8: ~12.4% grand-union expressibility,
      `Empirical` over a `Declared` heuristic) toward useful coverage on the boot10 port surface
      (the semcore heavy core checkty/elab/eval/mono/fuse + the 12 unported stdlib crates), and
      wire the missing vet loop: today the transpiler NEVER validates its emitted `.myc` against
      the real toolchain (`mycelium-check` exists but is unwired). Two lanes: M-1000 (the
      transpile -> `myc check` -> classify loop) and M-1001 (close the highest-value gap classes,
      macro expansion first per DN-34 SS8.3's ~55% finding). Output honesty is unchanged by
      hardening: emitted `.myc` stays `Declared` until a differential upgrades it (VR-5/G2).

      Launch scope record (orchestrator-resolved, kickoff defaults; maintainer may override):
      E-B breadth = port surface only; staging dir = gen/myc-drafts/; E-C = generated reference
      docs from `.myc` sources; rwr pull-forward confirmed per the maintainer's dated decision.
      AMENDED same day: the maintainer confirmed all four, upgrading E-B breadth to a decided
      two-stage plan -- port surface first, THEN phased expansion over the remaining Mycelium
      Rust corpus (M-1006), each phase polishing the transpiler with its lessons.

      User stories:
      - As a compiler engineer porting semcore (M-993), I want transpiler drafts that mostly pass
        `myc check`, so that hand-porting ~15k lines becomes fix-up work instead of cold authoring.

      Definition of Done:
      - M-1000 + M-1001 done; measurably higher `myc check`-clean emission on 2-3 representative
        crates vs the DN-34 SS8 baseline, with the numbers recorded append-only in DN-34; every
        narrowing/limitation `Declared`/flagged, never silent.

      DONE (2026-07-06): both children landed (see their DONE notes); the "measurably higher"
      bar is met against the REAL baseline the vet loop exposed (0% checked everywhere ->
      eval 2.4% / std-time 8.1%); the honest headline is M-991's NO-GO-as-bulk / GO-as-
      profiling verdict, recorded in DN-34 SS8.7-SS8.8. "Up-to-snuff" is hereby re-scoped by
      evidence: snuff = a trustworthy profiling instrument, not a bulk porter (VR-5 -- the
      claim downgraded to what the measurement supports).

  - id: M-1000
    title: "M-1000 — Wire the transpile -> myc-check vet loop (classify check failures into the gap report)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E32-1
    depends_on: []
    doc_refs:
      - corpus:DN-34
      - src:crates/mycelium-transpile/src/gap.rs
      - src:scripts/checks/myc-check.sh
    body: |
      Minted 2026-07-06 (kickoff trx2 E-A). The transpiler's "coverage" metric
      (gap.rs expressible_fraction) measures only that SOME `.myc` text was emitted -- it never
      runs the toolchain over the emission. Close the loop: after transpiling a file/crate, run
      `myc check` (per-file oracle mode, as scripts/checks/myc-dogfood.sh does:
      `cargo run -p mycelium-check --bin myc-check -- <file>`) on each emitted `.myc`, and fold
      each failure back into the report as a structured vet record (exit 2 parse / 3 check, plus
      the diagnostic), so the transpiler's accuracy is measured against the REAL toolchain. A
      draft is then `myc-check-clean` or `gap/vet-flagged` -- never silently broken (G2). The
      metric split must be explicit: expressible_fraction (emitted) vs checked_fraction
      (myc-check-clean), both honestly labeled; checked_fraction is the number that matters for
      the port.

      User stories:
      - As a compiler engineer, I want each transpiled draft vetted by `myc check` with failures
        classified, so that I can trust "clean" drafts and see exactly why the rest fail.
      - As the transpiler maintainer, I want check-failures folded into the gap taxonomy, so that
        the fix worklist is driven by real toolchain rejections, not emission heuristics.

      Definition of Done:
      - A scripted transpile -> vet -> classify loop (in-crate driver + a scripts/ wrapper the
        justfile can call) producing a per-file and union vet report; `checked_fraction` reported
        alongside `expressible_fraction`; failures carry the myc-check exit class + diagnostic;
        tests in the crate's src/tests/ layout; loop documented in the crate README or DN-34
        append-only.

      DONE (2026-07-06, epic branch E32 commit b35866f; merged to the trx2 head): vet.rs
      (VetClass from the 0/2/3/64/66 exit contract; unknown/signal -> ToolUnavailable, never
      counted clean -- G2), CLI --vet writing vet.json, scripts/checks/transpile-vet.sh
      (advisory; builds the oracle once, MYC_CHECK_CMD), crate README, DN-34 SS8.7 appended.
      checked_fraction is file-gated (a failing file credits 0 -- honestly-conservative lower
      bound; denominator = non-test top-level items, so checked <= expressible always).
      31 tests green incl. a skip-graceful live-oracle witness; wired as `just transpile-vet`
      by the integrator (on-demand, not a gate).

  - id: M-1001
    title: "M-1001 — Close highest-value transpiler gap classes for the port surface (macro expansion first)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E32-1
    depends_on: [M-1000]
    doc_refs:
      - corpus:DN-34
      - src:crates/mycelium-transpile/src/emit.rs
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      Minted 2026-07-06 (kickoff trx2 E-A). DN-34 SS8.3: macros are the dominant gap class (62/112
      ~55% on std-cmp); after macro handling, the surface worklist is trait impls/conversions,
      bounded generics, payload variants, derives. Prioritize by what the port surface actually
      needs: sample the gap/vet profile of the semcore heavy core (checkty/elab/eval/mono/fuse)
      and the unported stdlib crates, then close the top classes. Macro expansion may use
      `cargo expand`-style pre-expansion or targeted handling of the common macro idioms --
      whichever is chosen, the narrowing is recorded (`Declared`) and unexpandable macros stay
      honest gaps. Fallback arms keep returning Err(GapReason) -- never a fabricated body (the
      DN-34 SS8 honesty-correction precedent binds).

      User stories:
      - As a compiler engineer, I want the gap classes that block the semcore/stdlib drafts closed
        first, so that transpiler work converts directly into port acceleration.

      Definition of Done:
      - Measurably higher checked_fraction (M-1000's metric) on 2-3 representative crates
        (at least one semcore module + one stdlib crate), before/after numbers recorded
        append-only in DN-34; every new emission path traced to a mycelium.ebnf production;
        remaining classes ranked with counts as the follow-on worklist.

      DONE (2026-07-06, epic branch E32 commit c121dc1; merged to the trx2 head): the vet
      baseline showed ALL targets at 0% checked, so the top VET-blocking classes (not SS8.3's
      emission-ranked macros) were closed first, both flag-don't-guess: unresolved `use` ->
      Category::Import gaps (the universal check-poison) and reserved-word collisions ->
      Category::ReservedWord gaps (reserved.rs, a drift-guarded snapshot of the l1 lexer
      table). checked_fraction: eval.rs 0 -> 2.4%, std-time 0 -> 8.1% (semcore + stdlib DoD
      wins); expressible_fraction FELL where it had over-counted fake emissions (honest
      correction). DN-34 SS8.8 appended with the ranked 673-gap residual worklist (Other/
      type-coverage 274, Impl 93, Struct 70, Import 69, Macro 64, tail) -- the M-1006 ladder's
      phase-1 input. Macro expansion deliberately deferred: it blocks emission, not check
      (recorded, not silent).

  - id: E33-1
    title: "E33-1 (epic) — trx2 E-B: mass .myc boilerplate drafts for the port surface (gen/myc-drafts/)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:tooling, priority:P2, status:in-progress]
