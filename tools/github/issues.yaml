    body: |
      RFC-0016 §4.4 — formatting / display with the dual HUMAN + MACHINE (JSON) projection (G11; the RFC-0013 diagnostics precedent) over one canonical form. A value's display is a projection, not its identity (ADR-003 — the content hash stays canonical). Honest: a truncated/elided display says so, never silently drops data.
      Acceptance (needs-design): dual human/machine projection round-trips (G11); display is a projection (identity unchanged); meets the M-501 contract.

  - id: M-534
    title: "M-534 — stdlib: `testing` (property / golden / differential harness)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:done]
