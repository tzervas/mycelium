  - id: M-666
    title: "M-666 — feat(l1+runtime): RFC-0008 R1 `hypha` + `colony` L1 surface constructs"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-665]
    epic: E7-2
    landed_pr: 342
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Added (2026-06-21: M-666 — RFC-0008 R1 `hypha`/`colony` real-concurrency L1 constructs)'; merged-PR-list #342 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0008, corpus:DN-06, src:crates/mycelium-mlir/src/runtime.rs, src:crates/mycelium-l1/src/parse.rs]
    body: |
      M-357 (done) implemented Rust-level `Scope`/`Colony`/`Task` runtime in `mycelium-mlir::runtime`; M-356 (done) implemented per-task budgets and supervision. The gap is the L1 surface constructs: no parser production consumes `Tok::Colony` or (once M-665 lands) `Tok::Hypha`. This issue implements: (1) `colony { … }` as the L1 concurrency scope construct (wraps a `hypha`-spawning block; elaborates to runtime `Scope::join_all`); (2) `hypha <expr>` as the L1 concurrent task spawn (elaborates to a `Task` over a deterministic computation). Per RFC-0008 §4.6 R1: deterministic forms only; RT3 nondeterminism constructs are separate. FLAG: verify current state of SPSC channels in `mycelium-mlir::runtime` / `channel.rs` — M-357 body notes channels as a "next slice" item; this issue is gated on that clarity.
      Acceptance: `colony { hypha compute(x), hypha compute(y) }` parses, type-checks, and elaborates to `Scope::join_all` + `Task` calls; RT7 invariant enforced (a `colony` block cannot exit before all `hypha` children complete); RT2 differential holds; `hypha` and `colony` become active keywords in the grammar.

  - id: M-667
    title: "M-667 — feat(l1+runtime): RFC-0008 R1 remaining vocabulary — `fuse`, `reclaim`, `tier`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-666]
    epic: E7-2
    landed_basis: "DONE (2026-06-28, r4v integration wave) — fuse/reclaim/tier L1 surface ACTIVE in mycelium-l1: parse (`parse_fuse_expr`, `parse_reclaim_expr`, `@tier` attribute path), AST (`Expr::Fuse`, `Expr::Reclaim`, `FnDecl.tier`), checkty (homogeneity + Fuse-instance check; policy-type check; tier-attribute check — all never-silent G2), elab dispatch (fuse three-way Empirical via differential; reclaim + tier surface active with Residual stubs pending runtime registry wiring — follow-on M-817). Conformance: accept/24-fuse-reclaim-tier.myc added; reject/12 updated (mesh/graft/cyst/xloc/forage/backbone stay reserved-not-active). `cargo test -p mycelium-l1` 201 green."
    doc_refs:
      - corpus:RFC-0008
      - corpus:DN-58
      - src:crates/mycelium-l1/src/parse.rs
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/src/elab.rs
    body: |
      After `hypha`/`colony` activate (M-666), the R1 vocabulary remaining is: `fuse` (lawful state fusion — RT6 semilattice merge), `reclaim` (supervision-tree reclamation of runtime units — RT7; the L1 surface hook into the `Supervisor`/`RestartIntensity` mechanism from M-356), and `tier` (execution-mode switch — the RFC-0004 `ExecutionMode` bridge). Each needs: (1) an L1 surface construct; (2) a type-checking pass; (3) elaboration to the runtime/AOT layer. `fuse` requires declared merge operations satisfying semilattice laws (RFC-0008 RT6); `reclaim` attaches a reified supervision policy (RT3/RFC-0005); `tier` switches RFC-0004 `ExecutionMode` with an EXPLAIN-able record.
      Acceptance: `fuse` expression type-checks with declared semilattice constraint (non-associative merge is a `CheckError`); `reclaim` supervision construct elaborates to `Supervisor` calls (M-356); `tier` switches execution mode with EXPLAIN-able record; all three active in the grammar; `just check` green.

  - id: M-668
    title: "M-668 — design: RFC-0008 R2 planning — `xloc`, `mesh`, `cyst`, `graft`, `forage`, `backbone`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
