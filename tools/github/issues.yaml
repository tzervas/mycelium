  - id: M-651
    title: "M-651 — Harness→bench schema bridge: Grok report ingestion in mycelium-bench"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: [M-645, M-381]
    landed_pr: 308
    landed_date: 2026-06-21
    landed_basis: "git log 024f33b (2026-06-21) 'feat(bench): ingest Grok harness reports into mycelium-bench (M-651)'; merged-PR-list #308 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:DN-09, src:tools/llm-harness/coauthor.py, src:crates/mycelium-bench/src/lib.rs, src:crates/mycelium-bench/src/report.rs, src:crates/mycelium-bench/src/llm.rs]
    body: |
      The Grok/xAI ablation harness (tools/llm-harness/coauthor.py) emits a JSON report with the schema `{metadata: {...}, quality: {...}, performance: {...}, outcomes: [...]}`. The mycelium-bench crate (M-645) ingests LLM reports via `crates/mycelium-bench/src/report.rs` which expects the schema `{harness: {...}, summary: {...}, results: [...]}`. These are incompatible; a live Grok run's output cannot be directly ingested by mycelium-bench (DN-09 §7 / M-381 STATUS 2026-06-20).

      Two paths:
      (a) BRIDGE IN THE HARNESS — add a `--emit-bench-format` flag (or a post-processing script) that translates harness output to mycelium-bench's expected schema. Keeps both schemas honest (no stealth mutation of either contract).
      (b) BRIDGE IN MYCELIUM-BENCH — add a `#[serde(deny_unknown_fields)]`-guarded alternate `LlmReportV2` struct matching the harness output; a tagged-union dispatch; a conversion. Extend `the_harness_ingests_the_llm_report_and_labels_synthetic` with a V2 fixture.
      DONE (2026-06-21, #308): path (b) landed — `GrokLlmReport` (`deny_unknown_fields`, `#[serde(default)]` ablation/mean_latency) + tagged/untagged dispatch + `GrokLlmReport → LlmSection` conversion in `crates/mycelium-bench/src/llm.rs`; ingested metrics stay Empirical/Declared (never upgraded); `cargo test -p mycelium-bench` green.

      Path (b) is preferred — bench-crate is the consumer and should be robust to the harness format; path (a) adds a runtime transform that can drift. BOTH must be pinned by a committed JSON fixture so serde tag drift is caught (not just round-trip tested — banked guard §3 from dev-workflow).

      Acceptance:
      - mycelium-bench ingests a Grok harness report (real or synthetic fixture) without schema error
      - The LLM results are correctly labelled synthetic/live (the existing `labels_synthetic` check)
      - A committed JSON fixture for the Grok harness schema pins the contract (deny_unknown_fields on deserialize)
      - `cargo test -p mycelium-bench` green (all 33 existing tests + the new V2 ingestion test)
      - Honest guarantee tags: ingested numeric metrics remain Empirical/Declared per their origin
      - After this lands, a live Grok run's output can be fed directly to mycelium-bench for bench-level analysis

  - id: M-652
    title: "M-652 — Gate A4: make the cargo-deny/cargo-audit supply-chain gate non-skip"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P1, status:done]
    depends_on: []
    landed_date: 2026-06-20
    landed_basis: "git log 9806d31 (2026-06-20) 'feat(ci): make the cargo-deny/cargo-audit supply-chain gate non-skip (M-652)'"
    doc_refs: [corpus:ADR-021, corpus:DN-19, src:scripts/checks/deny.sh, src:deny.toml, src:justfile]
    body: |
      ADR-021 Gate A4 / DN-19 GAP-3. The supply-chain gate is already WIRED: `deny.toml` exists at the repo root, `scripts/checks/deny.sh` runs both `cargo deny check` + `cargo audit`, the `deny:` recipe is in the `justfile`, and `deny` is in the `all.sh` check set — so `just check` already invokes it. The remaining gap is that the gate is skip-graceful and currently SKIPs when `cargo-deny`/`cargo-audit` are not installed: a skip-pass is not a closed gate (G2 — never silently green). Close it: provision the tools (`just setup` / CI setup) so the gate genuinely RUNS, confirm it passes against the current tree, and refine `deny.toml` policy (licenses, bans, advisories, sources) as the run surfaces. Standalone — independent of code changes (DN-19: parallelizable).
      Acceptance: with the tools installed, `just check` runs cargo-deny + cargo-audit GREEN (or with an explicit, rationale-tagged allowlist for any advisory that cannot be resolved — never a silent ignore); the gate no longer skip-passes in the gate environment; `deny.toml` policy reviewed. Closes ADR-021 Gate A4.

      DONE (2026-06-21): cargo-deny + cargo-audit provisioned via `scripts/install-tools.sh` (`cargo install --locked`; current stable — intentionally NOT version-pinned, since you want the latest advisory tooling). `scripts/checks/deny.sh` now runs GREEN, not skip — `cargo deny check` (advisories/bans/licenses/sources all ok) + `cargo audit` (101 deps scanned, no known advisories) — AND is now strict in the gate environment: a missing cargo-deny/cargo-audit FAILS (not skips) when `CI` / `MYCELIUM_REQUIRE_SUPPLY_CHAIN=1` is set (the CI workflow sets it), so the gate cannot silently skip-pass in CI (G2). Local dev keeps the graceful skip. deny.toml policy reviewed: license allow-list matches the tree; `multiple-versions` stays "warn" (pre-1.0 transitive churn); `wildcards` stays "warn" + added `allow-wildcard-paths = true` so internal v0.0.0 path-dep noise clears, leaving one genuine, non-silent (G2) smell visible — the publishable std crates (e.g. `mycelium-std-math` v0.1.0) carry version-less path deps, which `allow-wildcard-paths` cannot excuse; FLAGGED to the ADR-018 per-crate-SemVer / release-engineering track, out of scope for the gate. (PR branch: claude/m-652-supply-chain-gate)

