    body: |
      The E3-9 deliverable. A standalone crate `crates/mycelium-bench/` (lib + `bench` bin) — chosen over an `xtask bench` subcommand because the WIN/LOSS classifier, report emission, and LLM-report ingestion are real, testable library logic (`cargo test -p mycelium-bench`). Measures all five backends over a 14-program corpus (bit-subset / swap / data / recursion): warm per-run wall time (compile-once/run-many — compile cost reported separately, not charged per call), one-time compile cost, and a differential vs the interpreter classified WIN / LOSS / capability-LOSS / correctness-LOSS / error / skip. The differential compares the OBSERVABLE (repr+payload+guarantee / content-identity, provenance excluded per RFC-0001 §4.6 — matching the M-210 ObservationalEquiv checker; this fix turned 10 false-positive "correctness losses" into honest speed verdicts). Ingests the LLM-harness report (M-330/M-331; KC-2/SC-5b) and labels synthetic as synthetic. Harness plumbing Empirical (test-verified); every measured number Empirical (trial count + spread); capability-loss/skip/error Declared; no verdict Proven/Exact; no pre-written target (VR-5). Zero new external deps (only workspace serde/serde_json + the internal crates it measures, read-only).
      Acceptance: `cargo test -p mycelium-bench` green (29 lib + 4 integration: WIN/LOSS classification incl. the provenance case, report determinism, LLM-report ingestion); fmt + clippy -D warnings clean; emits deterministic md+JSON with a "where we're losing" section. DONE (2026-06-20).

  # ---- 2026-06-20: next-wave open items — M-646 through M-651 ----

  - id: M-646
    title: "M-646 — Close M-381 arm4: standalone LlmCanonical scorer for determinate retention ratio"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:toolchain, priority:P1, status:done]
    depends_on: [M-381, M-380]
    landed_pr: 310
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Changed (2026-06-21: M-647/M-648/M-650/M-381/M-646 — editorial enactment sweep)'; merged-PR-list #310 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:DN-09, corpus:RFC-0021, src:tools/llm-harness/coauthor.py, src:crates/mycelium-lsp/src/project.rs]
    body: |
      The ablation run `20260620T195352Z` (M-381) produced arm4 pass@1 = 0.0% [Declared — scoring artifact]: myc-check exits 2 on S-expression syntax, so every arm4 sample was marked failing even when the LlmCanonical projection was structurally valid. The pass criterion for arm4 MUST be S-expression parse validity (parse_llm_canonical_py), NOT L1 surface validity (myc-check). This is the minimal remaining piece to get a determinate retention ratio and close the M-381 gate.

      The LlmCanonical parser is already available in crates/mycelium-lsp/src/llm_canonical_parser.rs (enacted in M-380). The ablation harness (tools/llm-harness/coauthor.py) calls myc-check as the universal scorer; arm4 needs its own scorer branch.

      Two implementation paths (pick the simpler one):
      (a) FAST PATH — invoke parse_llm_canonical_py (or llm_canonical_parse_rs via the LSP project.rs renderer) as arm4's scorer: a sample passes if the projection round-trips through the canonical parser without error. This is SUFFICIENT to give arm4 a pass@1 > 0 and make the retention ratio determinate.
      (b) COMPLETE PATH — build a LlmCanonical→L1 bridge (RFC-0021 §4.1 projection endpoint) so arm4 samples are scored by the same myc-check gate as arm2. This gives a directly comparable pass@1 but requires the bridge implementation.

      Start with (a); escalate to (b) if the retention ratio is marginal and comparability matters.

      Separate blocker (NOT this task): the Grok harness output schema mismatch vs mycelium-bench ingestion format is tracked in M-651.

      Acceptance (design → impl → run):
      (1) arm4 branch in the ablation harness uses parse_llm_canonical_py (or the Rust LSP renderer) as its scorer, not myc-check.
      (2) Re-run the ablation (grok-build-0.1, seeds [11,23,42], 8 tasks × 3 seeds = 24 samples) with the corrected scorer; arm4 pass@1 is now a genuine S-expression validity rate [Empirical].
      (3) Retention ratio computed: arm2.pass@1 / arm4.pass@1; if ≥ ~70%, text syntax retains leverage; if < ~70%, RFC-0021 §4.7 supersession trigger (record honestly — do NOT pre-write the verdict, VR-5).
      (4) DN-09 §9 (or §10) updated append-only with final result; M-381 and M-646 closed.
      Guarantee tags: scorer pass/fail logic Exact (deterministic parser); trial counts Empirical; retention ratio verdict Empirical (if run completes with ≥3 seeds).
