      `done` on that evidence. No superseding ADR was required (ADR-009 already sanctioned
      interpreter/JIT); src/mode.rs carries the explicit, named ExecMode.

      IMPLEMENTED (2026-06-26, waveN2-p3): JIT exposed as a named ExecMode (Interpreter/Aot/Jit) with NO
      Default/Auto/fallback arm -- reachable only by naming ExecMode::Jit (never-silently-selected, G2;
      out-of-subset/toolchain-absent are explicit ModeError). Differential RAN: JIT==interp over the subset
      + explicit-refusal-no-fallback. src/mode.rs. Empirical. Status stays ready until landed.

      FORMALIZE the in-process dlopen JIT (already implemented under M-340 in
      crates/mycelium-mlir/src/jit.rs; E6-1 `done`) as a first-class, never-silently-selected
      execution mode for dynamic VSA/HDC workloads. This is hardening, NOT a deferral lift:
      ADR-009 already sanctions interpreter/JIT as part of the hybrid execution model (RFC-0029
      §5.3/§7.3), so no superseding ADR is required. The JIT must be selected ONLY explicitly
      (API/flag), never engaged transparently (G2 -- no silent substitution of JIT for interpreter
      or AOT). Correctness obligation: JIT result == interpreter result (Empirical), already
      exercised by tests/jit_differential.rs. Scope: VSA/HDC dynamic + the bit/trit subset the
      JIT already compiles; REPL/interactive deferred beyond 1.0.0 (RFC-0029 §5.3).

      User stories:
      - As a downstream app developer, I want JIT available for streaming VSA/HDC pipelines,
        so that I get native performance without an offline AOT compilation step.
      - As a maintainer, I want JIT to be an explicit mode (never silently engaged), so that
        interpreter-vs-JIT divergence is always detectable (G2).

      Issues to resolve (ALL RESOLVED by RFC-0029 §5.3/§7.3):
      - JIT scope: VSA/HDC dynamic + the bit/trit subset already compiled; REPL deferred.
      - Correctness bar: JIT == interpreter (Empirical), per tests/jit_differential.rs.
      - Mode selection: explicit API/flag, never a heuristic.

      Definition of Done:
      - The M-340 JIT (crates/mycelium-mlir/src/jit.rs) is exposed as an explicit, named
        execution mode with a documented selection API.
      - JIT is never silently selected (explicit mode selection, not a heuristic; G2).
      - Differential tests: JIT result == interpreter result (Empirical) on the test suite.
      - No superseding ADR is required (ADR-009 already sanctions interpreter/JIT); the JIT's
        first-class status is recorded honestly (RFC-0029 §7.3).
      - just check green.

