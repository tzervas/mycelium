  - id: M-1073
    title: "M-1073 -- value-semantics-aware security scanning + exploit hardening for Mycelium programs (BACKLOG)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:language, priority:P3, status:todo]
    epic: E22-1
    depends_on: []
    doc_refs:
      - corpus:ADR-032
      - corpus:ADR-003
      - corpus:RFC-0035
      - corpus:DN-30
      - src:.claude/skills/security-review/SKILL.md
    body: |
      Filed 2026-07-11 (maintainer direction, gap-close-run). BACKLOG -- deferred until the core
      zero-hand-port language/transpiler levers land (no single blocking M-id; the zero-hand-port
      tree is a diffuse set of in-flight ports/transpiler-gap-closure work, not one dependency --
      left undepended rather than fabricating a false edge, VR-5). Scope: determine the best
      approaches to statically scan/analyze *Mycelium programs* (not the Rust kernel -- that is
      M-1075) for security issues and harden against exploits, LEVERAGING Mycelium's value
      semantics. This is the value-semantics-specific angle within the existing E22-1 Security
      Scanning Toolkit epic (DN-30/RFC-0035, Proposed) -- E22-1's own body notes its leaves are
      "scoped when the binding security-scanning RFC lands (the forward-epic pattern)"; this issue
      is filed forward against that epic now, gated on RFC-0035's ratification and the zero-hand-port
      levers, rather than left unrecorded.

      Working hypothesis (to VALIDATE, not assume -- `Declared` until the scoping note checks it):
      Mycelium's value-semantic nature -- immutable content-addressed values (ADR-003), no
      aliasing-induced UB, never-silent representation swaps (G2), explicit `Option`/error on
      out-of-range -- yields a SMALLER, more tractable attack surface than pointer-aliasing
      languages (no use-after-free/double-free/data-race class by construction), so security
      analysis over Mycelium programs should be *easier* and more decidable than the C/Rust
      equivalent. This is a real, checkable claim, not a marketing assertion -- the scoping note
      must ground it or refute it.

      User stories:
      - As a Mycelium developer, I want static security analysis of my program, so that I catch
        exploitable patterns before shipping.
      - As a security reviewer, I want the analysis to exploit value-semantics (no aliasing/UB) so
        that it gives stronger, more decidable guarantees than a C/Rust equivalent.
      - As the maintainer, I want a scoped recommendation of the best approach/tooling before we
        build, so we don't over-invest prematurely on an unvalidated hypothesis.

      Definition of Done:
      - A design/scoping note (Draft DN, or a research note feeding a future DN) that: (a)
        validates or refutes the value-semantics-eases-analysis hypothesis above with grounding
        (cite ADR-003/ADR-032/G2, and the actual vuln classes RFC-0035 §2/D1 already enumerates,
        rather than asserting in the abstract); (b) enumerates candidate approaches (e.g.
        taint/flow analysis over the RFC-0035 inspectable-Core-IR substrate, provenance/audit-trail
        leverage per ADR-032, capability/guarantee-tag checking against the Exact/Proven/
        Empirical/Declared lattice); (c) recommends a ranked approach with honest guarantee tags
        (no upgrade past the checked basis, VR-5); (d) names the deferred-until conditions
        precisely (which zero-hand-port/transpiler milestones actually unblock this, once known).
        NO implementation lands under this backlog item -- the note is the deliverable.

  - id: M-1074
    title: "M-1074 -- extensible CPU+GPU acceleration for identity hashing & crypto (BACKLOG)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:design, area:execution, priority:P3, status:todo]
    depends_on: []
    doc_refs:
      - corpus:ADR-003
      - corpus:DN-93
      - src:justfile
      - src:scripts/vsa-desktop-checks.sh
    body: |
      Filed 2026-07-11 (maintainer direction, gap-close-run). BACKLOG -- deferred; no epic fits
      cleanly (E15-1/E25-1, the Native-AOT-acceleration epics, are both `status:done` and
      subsumed; filed standalone with no `epic:`, the same pattern already used for the adjacent
      M-832/M-1014 desktop-held perf tracks -- FLAG: if this bucket grows, a live
      "acceleration/perf" epic successor to E15-1/E25-1 may be warranted; not minted speculatively
      here). Accelerate content-address identity hashing (ADR-003) and any encryption support to be
      performant AND rock-solid, via an EXTENSIBLE, capability-detected accelerator-backend
      abstraction with an ALWAYS-PRESENT portable fallback (never-silent capability swap -- G2, the
      same discipline the runtime's representation swaps already use). First concrete backends
      (directly in hand, maintainer's desktop): the i7-14700K (SHA-NI hardware SHA-256 as the
      always-available low-latency + rock-solid tier; AES-NI for encryption; AVX2/AVX-VNNI for
      vectorized hash-batch/VSA/dense ops; hybrid P/E-core + thread-director scheduling) AND the
      RTX 5080 (batch-throughput tier). Designed as pluggable/extensible to FUTURE hardware (the
      3090Ti, other CPUs/GPUs/accelerators) -- NOT hardcoded to today's box. Ties to the VSA/GPU
      lane (M-832/M-1014, both desktop-held per the standing cloud-session policy), the AOT-perf
      track (E15-1/E25-1), and DN-93's content-address rehash-settlement discipline (batch any
      identity-changing change into one rehash, never piecemeal). Heavy perf verification is
      desktop-held (per the standing "heavy checks run on the maintainer's desktop" policy,
      `scripts/vsa-desktop-checks.sh`); this issue's own DoD is design-only.

      User stories:
      - As a Mycelium runtime, I want identity hashing accelerated by whatever the host CPU/GPU
        offers, so content-addressing is fast without sacrificing correctness.
      - As a user on a machine without a GPU (or without SHA-NI), I want a correct portable
        fallback with a disclosed capability swap, so behavior is never silently degraded (G2).
      - As the maintainer, I want the backend layer extensible to future hardware without rework.
      - As a security-conscious user, I want crypto/hashing rock-solid (constant-time where it
        matters, validated) regardless of backend.

      Definition of Done:
      - A design note specifying: the backend-abstraction + capability-detection +
        never-silent-fallback contract; an initial 14700K (SHA-NI/AES-NI/AVX) + 5080 backend plan;
        a differential/validation strategy (every accelerated path must be bit-identical to the
        portable oracle -- VR-5, no correctness traded for speed); an explicit extensibility seam
        for future hardware. Heavy perf verification stays desktop-held (unchanged policy).
        Implementation is deferred past this backlog item -- no code lands here.

  - id: M-1075
    title: "M-1075 -- standard Rust-kernel security scans: establish + maintain a hardened baseline"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:toolchain, priority:P1, status:todo]
    depends_on: []
    doc_refs:
      - corpus:DN-44
      - src:CONTRIBUTING.md
      - src:.claude/skills/security-review/SKILL.md
      - src:scripts/checks/deny.sh
      - src:scripts/checks/unsafe-per-use.sh
    body: |
      Filed 2026-07-11 (maintainer direction, gap-close-run). NEAR-TERM PREP, not backlog --
      ongoing hygiene, `status:todo` (the repo's real "not started / in the backlog" status; the
      informal "near-term prep" framing is priority, not a distinct status label -- no `backlog`
      status exists in this repo's vocabulary, `tools/github/labels.json`). No epic fits cleanly:
      E22-1 (Security Scanning Toolkit) is scoped to scanning *Mycelium programs* (DN-30/RFC-0035),
      not the Rust kernel's own dependency/license/unsafe hygiene; M-678 (the prior Rust-kernel
      unsafe-hardening epic, DN-21) is `status:done` and narrower in scope (JIT-FFI unsafe only,
      not supply-chain/license/advisory hygiene workspace-wide). FLAG: a dedicated
      "hardened-baseline maintenance" epic may be warranted if this recurring-hygiene bucket grows
      beyond this one issue -- not minted speculatively here; filed standalone with no `epic:`.

      Because the zero-hand-port pipeline transpiles FROM the Rust reference implementation, run
      standard Rust security scans -- `cargo-audit` for RUSTSEC advisories, `cargo-deny` for
      licenses/bans/advisories/sources (`justfile`'s existing `deny`/`deny-net-fix` recipes,
      `scripts/checks/deny.sh`), supply-chain (pinned deps + lockfile integrity + no curl|bash,
      per CONTRIBUTING's licensing/security posture), secrets hygiene, and an `unsafe` audit
      (`scripts/checks/unsafe-per-use.sh`, the ADR-014 `// SAFETY:`-adjacency gate already wired
      into `just check`) -- to establish and MAINTAIN a solid hardened baseline that the
      transpiled output inherits. This is ONGOING hygiene, not a one-off report. Heavy/periodic
      runs stay desktop-held per the standing cloud-session policy; the light gates already run in
      `just check`. DN-44 (Codebase Security Posture) is the existing consolidating reference this
      issue's baseline report extends, not duplicates.

      User stories:
      - As the maintainer, I want a documented security baseline of the Rust kernel, so we
        transpile from a hardened state.
      - As a contributor, I want dependency advisories/license violations caught in the gate, so
        regressions don't land.
      - As a security reviewer, I want the `unsafe` surface inventoried + justified.

      Definition of Done:
      - A baseline security report of the current posture (advisories, license findings, `unsafe`
        site inventory, secrets-scan result); `cargo-audit` + `cargo-deny` confirmed wired into the
        gate config (already present per `scripts/checks/deny.sh` -- this issue verifies + documents
        rather than assumes, house rule #14) with a documented policy; an `unsafe`-usage inventory
        cross-checked against `scripts/checks/unsafe-per-use.sh`'s live gate; a recurring-scan
        cadence documented (tied to the existing tier policy: light in `just check`, heavy
        desktop-held). The first baseline report is this issue's initial deliverable; DN-44 is
        updated (append-only) rather than superseded if this report sharpens its posture map.

  - id: M-1076
    title: "M-1076 -- full cross-phylum trait/fn signature re-homing (close DN-113 §7 / DN-122's general fix)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P3, status:todo]
    epic: E28-1
    depends_on: [M-1060]
    doc_refs:
      - corpus:DN-113
      - corpus:DN-122
      - corpus:DN-112
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/tests/cross_phylum.rs
    body: |
      Filed 2026-07-11 at the M-1060/DN-113 integration close-out (mitigation #1 -- verified M-1076
      free before minting; M-1075 was highest). M-1060's four fix cycles (PRs #1503/#1506/#1508/#1511)
      closed the cross-phylum bare-name type-identity collapse class at every reachable site via
      **narrow, conservative never-silent refusals**: a foreign trait's method sig invoked through a
      generic bound, or a foreign fn's sig referenced at a call/generic-call/value position, is
      REFUSED whenever that un-re-homed signature names a concrete type beyond its own generic
      parameters (see DN-113 §7.1, added this close-out, and each fix commit's own disclosed residual).
      This is sound (a false-refuse never silently accepts the wrong type) but not the full fix: it
      trades soundness for coverage, refusing some LEGITIMATE cross-phylum trait/fn signatures that a
      full re-homing would correctly accept. This issue is that general fix -- mirroring the CRITICAL
      ctor-field re-homing (PR #1506) that already re-homes every constructor field's `Ty::Data`
      identity against its declaring phylum, extend the SAME re-homing mechanism
      (`qualify_ty_cross_phylum`) to every foreign trait/fn signature `TypeRef` at merge time (not
      lazily at call/impl-check time against the wrong registry), so the four conservative refusals
      become full acceptance.

      User stories:
      - As a phylum author, I want a legitimate cross-phylum trait-method call through a generic
        bound (or a legitimate cross-phylum fn call/value-ref) whose signature genuinely names a
        concrete foreign type to TYPE-CHECK, rather than being conservatively refused, so the M-1060
        soundness fix doesn't cost me an otherwise-valid cross-phylum program.
      - As a kernel reviewer, I want the re-homing done ONCE at merge time (mirroring the ctor-field
        precedent), not four times lazily at each call site, so the mechanism stays DRY and auditable
        (KC-3).

      Definition of Done:
      - Every foreign trait/fn signature `TypeRef` reachable from `check_app` / `check_app_generic_fn`
        / `check_trait_method_call` / `check_path` is re-homed against its declaring phylum at
        `merge_phyla_exports` (or an equivalent single merge-time pass), the same way ctor fields
        already are.
      - The four existing conservative-refusal regressions in `crates/mycelium-l1/tests/cross_phylum.rs`
        (holes A/A2/B, the fn-as-value 4th site) are extended with the previously-refused-but-legitimate
        cases now correctly ACCEPTED, with no regression on the genuine-mismatch refuse cases.
      - Guarantee posture for the affected resolution paths moves `Declared -> Empirical` once
        witnessed by the extended differential (VR-5 -- no upgrade past the checked basis).

  - id: M-1077
    title: "M-1077 -- loose/gradual typing DX mode + Python-transpile enabler"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P3, status:todo]
    epic: E28-1
    depends_on: []
    doc_refs:
      - corpus:ADR-032
      - corpus:RFC-0034
      - corpus:RFC-0018
    body: |
      Filed 2026-07-11 at the gap-close-run integration close-out (backlog, P3 -- not gating the
      current wave). Proposes a **loose/gradual typing developer-experience mode** on the fast
      interpreted path: types are inferred and used as HINTS for diagnostics/tooling, but do not GATE
      iteration -- a program with an unresolved/mismatched type can still run on the `fast` tier
      (ADR-032/RFC-0034's honesty-lattice framing: an unverified type binding is `Declared`, not a
      hard compile-time refusal), while STRICT typing continues to gate `certified`-tier COMPILATION
      as it does today. This is explicitly a DEV-ITERATION ACCELERATOR, not a soundness relaxation of
      the certified path -- the transparency rule (house rule #1) still applies: a loose-mode program
      that would fail strict checking is FLAGGED, never silently accepted as if checked.

      A grounded, concrete payoff this mode inherently enables: composing a **Python -> Mycelium**
      pipeline via the EXISTING py2rust tooling (Python -> Rust) followed by the existing
      Rust -> Mycelium transpiler, using py2rust's own inferred/duck types as the loose-mode TYPE
      HINTS rather than requiring them resolved to Mycelium's strict kernel vocabulary up front. This
      does not build a new Python frontend -- it reuses two existing pipeline stages and only adds the
      loose-typing acceptance mode this issue scopes.

      User stories:
      - As a developer iterating quickly, I want to run/explore a program whose types aren't fully
        resolved yet, so I'm not blocked by the strict checker during exploration (fast tier only).
      - As a maintainer, I want strict typing to remain the unconditional gate for `certified`
        compilation, so loose mode never weakens the certified guarantee (ADR-032 tier separation).
      - As a porting engineer, I want a Python source to flow through py2rust's inferred types as
        Mycelium loose-mode hints, so a Python -> Rust -> Mycelium composition becomes a realistic
        porting path without a bespoke Python frontend.

      Definition of Done:
      - A DN scoping the loose-mode mechanism (what "hint, don't gate" means precisely on the `fast`
        interpreter path; how it interacts with RFC-0018's grading and the honesty lattice) is
        ratified before implementation (house rule #3 -- design first).
      - A fixture demonstrates a type-unresolved program running on `fast` with a flagged (not
        silent) diagnostic, and an equivalent `certified`-tier compile of the same program still
        refuses via strict typing.
      - A minimal py2rust-sourced Python fixture flows through Python -> Rust -> Mycelium end to end,
        using py2rust's inferred types as loose hints, with the honest `Declared`/`Empirical` boundary
        preserved (VR-5) -- no fabricated "full Python support" claim from a narrow fixture.

