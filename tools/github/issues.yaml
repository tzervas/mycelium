# Phase 4 (M-34x) — the interpreted<->compiled ABI + hot-inject + AOT-fragment completion. Created
# 2026-06-16; gated on ADR-016/017 (Accepted 2026-06-16). The Phase-4 milestone + phase:4 label are now
# cut (milestones.json / labels.json, 2026-06-16); these tasks are tagged phase:4 / "Phase 4 — …".
# NOTE (2026-06-16): GitHub milestones are created by `gh-bootstrap-local.sh` (local `gh`); the GitHub
# MCP server cannot create them. Run that script to create the five milestones and assign every issue.
  - id: M-341
    title: "M-341 — In-process hot-inject prototype (ADR-016/017)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2]
    depends_on: [M-340]
    body: |
      ADR-017's named first build step on the M-340 dlopen JIT (ADR-016 call ABI): a ContentHash -> entry dispatch table (mycelium-mlir::inject::Image); a call resolves to a compiled entry if present, else interprets (never a silent miss); inject = load a content-addressed unit + register a new hash -> entry (never mutates a live entry); the recompile set is the changed dependency-closure by hash reachability (recompile_closure).
      Acceptance: the safety argument under test (in-flight old hash finishes on old code while a new caller dispatches new) + interp == injected-compiled via the shared M-210 checker (NFR-7). In-process scope only; args-carrying value ABI + cross-process/native units deferred (VR-5). LANDED (first increment).

  - id: M-342
    title: "M-342 — Extend the AOT path to the data + recursion fragment (RFC-0011 Q5)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2]
    depends_on: [M-301, M-340]
    body: |
      Bring Construct/Match/Lam/App/Fix into mycelium-core::lower (ANF) + the mycelium-mlir AOT env-machine so is_aot_lowerable admits the data + recursion fragment, and extend the three-way differential (L1-eval == L0-interp == AOT) to the full v0 calculus. Closes RFC-0011 §4.4 Q5. Native LLVM stays bit/trit only (explicit UnsupportedNode; VR-5). LANDED 2026-06-16.
      Acceptance: the data_corpus (incl. recursion + for-folds) runs on all three paths, validated through the shared M-210 checker; honest where a node stays deferred (VR-5). Follow-on M-347 (env-machine recursion stack-robustness).

  - id: M-347
    title: "M-347 — Investigate + improve AOT env-machine recursion (stack-robustness / efficiency)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:execution, priority:P1, status:needs-design]
    depends_on: [M-342]
    body: |
      Surfaced by M-342: the AOT env-machine evaluates object recursion on the HOST call stack (O(depth)); the fuel clock bounds productive work (explicit FuelExhausted, never a hang) but depth beyond the host stack aborts. DN-05 records the design + empirical grounding (xtask recursion-probe: env-machine aborts at ~600 Fix-unfolds vs the interpreter's O(1) stack). Maintainer-set priority: (1) bank native MLIR->LLVM stack-robustness as a design requirement [libMLIR-gated, M-348]; (2) explicit control stack / trampoline [near-term buildable, makes never-silent total]; (3) tail-call detection [cautious, optional, on top of #2, KC-3/YAGNI]. Constraints: never-silent (a limit is an explicit error, never a hang OR abort), no black boxes, M-210 differential holds (NFR-7).
      Acceptance (design-first): DN-05 presented; then implement #2 (trampoline) so deep recursion is a graceful explicit limit (re-measured by recursion-probe), with #1 banked for the native path and #3 gated on measurement.
      #2 ENACTED 2026-06-16: aot rewritten as a trampoline (O(1) host stack); fuel + DepthLimit budgets, both graceful; recursion-probe confirms no abort to fuel 5e6 (was ~600); RFC-0004 §2 banks #1 for the native path (M-348). Dynamic budget (§2.4/DN05-Q5) ENACTED as M-349; tail-call (#3) remains open (measurement-gated).

  - id: M-349
    title: "M-349 — Dynamic depth budget for the AOT env-machine (DN-05 §2.4 / DN05-Q5)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-347]
    body: |
      DN05-Q5: the M-347 trampoline put the control stack on the heap, so the depth ceiling must be a DYNAMIC policy over memory headroom, not a magic constant (a fixed value is too timid on a large host, too bold on a small one). Resolve it cleanly + cautiously (KC-3/YAGNI), with minimal unsafe (ADR-014).
      ENACTED 2026-06-16: mycelium-mlir::budget — a small DepthBudget trait -> DepthResolution{max_depth, basis}. Default AutoDepthBudget derives the ceiling from detected memory headroom (MemAvailable capped by a finite RLIMIT_AS, read via pure-std /proc on Linux — ZERO unsafe), 70% margin / a conservative 1 KiB-per-frame estimate (Declared over-count, not Proven), clamped to [10_000, 2_000_000]; non-Linux/parse-failure -> conservative static fallback (200_000), never a guess. Basis is EXPLAIN-able (DepthBasis Display; aot::default_depth_budget; printed by xtask recursion-probe) — no black box (G2); the limit stays an explicit EvalError::DepthLimit (never abort/hang). run/run_core/run_core_with_fuel resolve dynamically; run_core_with_budget keeps the explicit override. Property test bounds the derivation ([floor,ceil], monotone). Measured on host: MemAvailable ~15.99 GB -> clamped to 2_000_000 (was 200_000). DN05-Q4 (native stack detection) reuses the trait under M-348.
      Acceptance: dynamic ceiling derived + EXPLAIN-able + conservative fallback; never-silent error preserved; trusted interpreter + three-way differential unchanged (NFR-7). DONE.

  - id: M-348
    title: "M-348 — Provision libMLIR (desktop/WSL) to unblock the native MLIR->LLVM path"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:execution, priority:P2, status:blocked]
    depends_on: [M-301]
    body: |
      The MLIR->LLVM native AOT path (RFC-0004 §2, ADR-009) is gated on libMLIR, absent in the current environment. Maintainer intends to provision it near-term (Windows/Claude Code desktop, or via WSL) to unblock native dialect lowering / cross-target codegen, the native data/closure codegen M-342 left as UnsupportedNode, and DN-05 #1 (stack-robust recursion designed into the native path). Verdicts needing it stay honestly "not established" (VR-5) until present.
      Acceptance: libMLIR provisioned + a first native lowering increment runs; no code until the toolchain is present.

  - id: M-343
    title: "M-343 — Mutual recursion: full elaboration (R7-Q3 remaining half)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-342]
    body: |
      The content-addressed identity of a Fix-group is done; the surface -> Fix-group elaboration + the totality checker's mutual-descent classification remain (currently an explicit ElabError::Residual). DESIGN the Fix-group node/encoding first (does L0 need a Fix-group node, or do nested Fixes + the cycle registry suffice?) and present a frozen-spec change (likely an RFC-0001 revision) before folding, then enact + extend the differential.
      Acceptance: mutual recursion elaborates (no Residual) and agrees across the differential paths; the totality checker classifies mutual descent.

  - id: M-344
    title: "M-344 — RFC-0012: Ambient Representation (paradigm defaults + scoped overrides)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P2, status:done]
    depends_on: [M-310]
    body: |
      RFC-0012 (Draft, 2026-06-16): a surface-only declared, scoped, paradigm-only representation default + scoped override/conversion blocks, to offset honesty's verbosity (tension A) without a black box. Two normative invariants: the ambient emits no Swap (I1); resolution is observationally the identity (I2, identical L0 ⟹ identical hash), defended by a meaning-preservation differential (NFR-7). Cross-paradigm edges stay explicit swaps; a missing one is an explicit MissingConversion. Kernel untouched (KC-3); exported signatures are concrete reprs (ADR-016).
      Acceptance (design-first): RFC-0012 Draft presented; on ratification, wire the resolution pass + the never-silent checks + M-142/LSP rendering + the §4.6 differential into mycelium-l1. R12-Q1..Q4 open.

  - id: M-345
    title: "M-345 — DN-04: optional structured diagnostics / error-handling (DynEL-inspired)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-310]
    body: |
      DN-04 (Draft, 2026-06-16): evaluate DynEL's (gitlab:albedo_black/DynEL) feature set as OPTIONAL structured/graded/dual-format diagnostics over Mycelium's existing explicit errors. Governing constraint: diagnostics are additive presentation, never a substitute for a never-silent error (G2). Import the contracts (graded levels; human+JSON projections; reified per-fn {exceptions, custom_message, tags} a la RFC-0005); EXCLUDE the anti-patterns (eval-on-config, os.environ dump, logger.catch swallowing) per the security posture. Rust-first (no Python; ADR-007), eventually self-hosted in Mycelium-lang. Tooling-layer home; kernel takes no logging dep (KC-3).
      Acceptance (design-first): DN-04 presented; RFC-0013 drafted, ratified Draft->Accepted (2026-06-16, maintainer), and ENACTED (2026-06-16): the registry (no eval, X1), the content-addressed diagnostic record + dual human/JSON round-trip projection (G11), graded levels + allowlisted detailed tier (X2), the reified on-ErrorClass policy (RFC-0005 pattern, content-addressed PolicyRef), and the representation-crossing audit view (RFC-0012 R12-Q2; honesty read off, never upgraded, VR-5) are code in crates/mycelium-lsp/src/diagnostics, verified by tests/diagnostics.rs incl. the central never-silent invariant (I1). Recovery deferred to RFC-0014 (M-352). Early candidate stdlib module (M-346).

  - id: M-346
    title: "M-346 — Mycelium core library / stdlib (roadmap epic)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-310]
    body: |
      Roadmap anchor for a core library / standard library — the feature set that makes Mycelium usable, not just a substrate+kernel. Decomposed once the surface language is self-hosting enough to write stdlib modules in Mycelium itself (dogfooding; free of other languages). Principles inherited and non-negotiable: never-silent (G2), honest per-op guarantee tags, no black boxes / EXPLAIN, small auditable kernel (stdlib lives above it, KC-3), content-addressed (ADR-003); Rust-first now (ADR-007), Mycelium-lang eventually. Early candidate modules: diagnostics (DN-04/M-345), collections, numerics helpers (ADR-010), VSA/encoding utils (RFC-0003), I/O + serialization (RFC-0001 §4.8).
      Acceptance (roadmap): when self-hosting is close, draft a Core Library RFC (scope, module boundaries, the guarantee/EXPLAIN contract every stdlib op must meet, Rust->Mycelium migration) and decompose into per-module tasks. Present before folding.

  - id: M-352
    title: "M-352 — RFC-0014: Declarative error recovery & bounded effects"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-345]
    body: |
      RFC-0014 (Accepted — Enacted, 2026-06-16): the isolated declarative error-recovery + bounded-effects subsystem RFC-0013 §8/§9 deferred (the DN04-Q1 recovery half). Errors propagate/bubble and can TRIGGER functionality (fallback, retry, cleanup, escalation) via an explicit handling site (elaborates to L0 Match — KC-3, no new kernel node) + a reified RFC-0005-pattern `on <ErrorClass> => <action>` policy. Effects are DECLARED on signatures (no unknown side effects) and BOUNDED by explicit budgets (EffectBudgetExhausted is graceful — the generalisation of the Fix/FixGroup fuel clock, M-347 depth ceiling, DN-05 budgets). Maintainer discipline: effects/cascades allowed WHEN explicitly declared/implemented so they stay known+bounded; the enemy is unintended/unknown/unbounded effects; default tightly scoped, broader opt-in by explicit declaration; always additive over the explicit error (never-silent G2; never fabricates/upgrades a guarantee, VR-5). Separable subsystem: budget enforcement lives with RFC-0004/0008/DN-05, not the kernel; clean RFC-0013 split (presentation vs recovery), does not weaken RFC-0013 I1.
      Acceptance (design-first): RFC-0014 presented, all §8 questions resolved (the three gating ones + the four remaining v0 dispositions), prior art traced (Research Record 05), then RATIFIED Draft->Accepted (maintainer, 2026-06-16) and ENACTED: the reified recovery subsystem (result-sum Outcome, closed recovery-action set, registry-shared on-ErrorClass policy with content-addressed PolicyRef, declared+budgeted effects with graceful EffectBudgetExhausted, the no-undeclared-effect check, and the never-silent handle — every error recovered or re-propagated, never dropped) is code in crates/mycelium-lsp/src/recover, verified by tests/recover.rs (the central never-silent invariant I1 + I2/I3/I4/I5 + X1). The L0-Match-over-error-sums lowering target is differentially verified in mycelium-l1 (no new kernel node; NFR-7). Out of v0 scope: wiring the budget ledger into the AOT env-machine is the RFC-0008 integration.

  # Phase 4 (M-35x) — RFC-0008 integration: the deferred RUNTIME halves of the RFC-0013/0014 work.
  # Created 2026-06-16. M-353/M-354 complete RFC-0014 §4.8 / RFC-0013 §8 deferrals and are shovel-ready
  # over already-landed machinery (DN-05 budget resolver; the diagnostics layer) — they need NO RFC-0008
  # ratification, so they stay in the active Phase 4. The broader RFC-0008 runtime/concurrency model is
  # the anticipated Phase 7 (M-355..M-357 below).
  - id: M-353
    title: "M-353 — RFC-0008 integration: unify the effect-budget mechanism (RFC-0014 §4.8)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-352, M-349]
    body: |
      Wire the reified recovery effect-budget ledger (crates/mycelium-lsp/src/recover/effect.rs::Budgets) into the runtime so it composes with the DN-05 dynamic depth resolver (crates/mycelium-mlir/src/budget.rs) and the Fix/FixGroup fuel clock as ONE enforcement mechanism over SEPARATE named budgets (the ratified RFC-0014 §8 disposition). EffectBudgetExhausted must surface from the runtime/AOT env-machine on the SAME explicit-refusal path as mycelium_interp::EvalError::FuelExhausted / DepthLimit — graceful, never a hang/OOM (I4). No kernel change (KC-3); no kernel-visible budget hook (confirmed §8). Mind the dependency graph: recover lives in mycelium-lsp, the resolver in mycelium-mlir/-interp — pick the shared-primitive home that avoids a cycle (consider lifting a small shared budget-resolution surface) and keeps the kernel untouched.
      DONE (2026-06-16): the ledger primitive (EffectKind/EffectBudget/EffectBudgetExhausted/Budgets) is LIFTED into mycelium-interp::budget — the shared budget-resolution surface both the env-machine (mycelium-mlir) and the recovery driver (mycelium-lsp) depend on (no crate cycle; sits where the fuel clock lives; no kernel node — KC-3; no kernel hook). An overrun routes through mycelium_interp::EvalError::EffectBudget, the effect sibling of FuelExhausted/DepthLimit on the one runtime refusal channel. The env-machine threads the same ledger (run_core_with_effects) and charges a declared `alloc` budget per control-stack frame (opt-in sibling of the DN-05 depth ceiling); absent ⇒ unchanged behaviour (I5). Verified: bounded-overrun-is-explicit extended to the RUNTIME path (mycelium-mlir) + a meaning-preserving three-way differential on the recovery Match where it touches L0 (mycelium-l1, NFR-7). recover::effect re-exports the moved types (RFC-0014 API stable) and keeps the no-undeclared-effect checker (I3) in the tooling layer. Completes RFC-0014 §4.8. just check green.
  - id: M-354
    title: "M-354 — RFC-0008 integration: diagnostic route targets ↔ observability sinks (RFC-0013 §8)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: [M-345]
    body: |
      Close RFC-0013 §8's open route-targets question: define the closed v0 set of diagnostic `route` targets (crates/mycelium-lsp/src/diagnostics/record.rs + policy.rs) and bind each to an RFC-0008 runtime/observability sink. Honor I1 (routing NEVER gates propagation — re-run the never-silent invariant test across every route) and RT5 (a sink's delivery guarantee is tagged on the Exact⊐Proven⊐Empirical⊐Declared lattice and never upgraded — VR-5; no unguaranteed "fire and forget" claimed as reliable). The diagnostic stream lives in RFC-0008 (RFC-0013 §4.8 Feeds). Tooling layer only; no kernel logging dependency (KC-3).
      DONE (2026-06-16): closed v0 route vocabulary stream/audit/log/null/mesh (maintainer: 4-set then mesh) in crates/mycelium-lsp/src/diagnostics/sink.rs, each bound to an rfc0008.* sink with an honest Delivery guarantee on the lattice (synchronous/durable/best-effort = Declared; null = honestly NOT delivered; mesh = probabilistic with a declared ProbabilityBound δ, never upgraded without a checked basis — VR-5/T4.2/RT5). Route resolution is checked against the closed set (X1 applied to routes — an out-of-set route is an explicit UnknownRoute, never silent) and lives OUTSIDE present (DiagnosticRecord::sink), so routing/failed-resolution never gates propagation (I1). Verified in tests/diagnostics.rs: never-silent across every closed route, honest sink guarantees (RT5/VR-5), explicit unknown-route. RFC-0013 §8 route-targets RESOLVED; all §8 RFC-0008-tied deferrals discharged. just check green.

# Phase 7 (M-355..M-357) — Runtime & Concurrency Execution Model (RFC-0008). ANTICIPATED (not yet
# ratified); created 2026-06-16 as the forward home for the runtime/concurrency track the RFC-0013/0014
# work pointed to (RFC-0014 §8 concurrency deferral; RFC-0008 §4.7 RT2 runtime "natural successor to the
# L1 track"). Sequencing vs Phases 5–6 firms up at the Phase-4 gate. The RFC-0008 §4.5 runtime vocabulary
# (hypha/fuse/xloc/cyst/graft/forage/backbone/mesh/tier/reclaim) decomposes into per-construct tasks at
# the Phase-7 gate, like the M-346 stdlib epic. Run gh-bootstrap-local.sh to create the Phase 7 milestone
# + phase:7 label and assign these.
  - id: M-355
    title: "M-355 — RFC-0008 ratification: the runtime model (RT1–RT7) Draft → Accepted"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:execution, priority:P3, status:done]
    depends_on: []
    body: |
      RFC-0008 (Draft) is the Runtime-tier grounding ADR-012 §7.3 required: the seven runtime invariants RT1–RT7 (§4.1) — values move/state never shared (RT1), deterministic fragment default (RT2), nondeterminism reified/named/explained (RT3), partial failure explicit / no distribution transparency (RT4), runtime guarantees tagged on the lattice (RT5), fusion = lawful semilattice merge (RT6), structured lifetimes / no orphan hypha (RT7) — and the §4.5 vocabulary (hypha/fuse/xloc/cyst/graft/forage/backbone/mesh/tier/reclaim). This is the design-first gate before ANY runtime/concurrency code (M-356/M-357 depend on it). No kernel change anticipated (KC-3); honest probabilistic guarantees where applicable (RT5/VR-5).
      DONE (2026-06-16): maintainer ratified RFC-0008 Draft → Accepted — RT1–RT7 and the §4 model are now normative. The vocabulary stays reserved/not-active until the implementation RFCs land (§4.5 status rule). Ratification unblocks M-356 (concurrency/supervision) and M-357 (RT2 runtime); the budget-unification slice (M-353) and route→sink binding (M-354) needed no RT1–RT7 commitment and proceeded independently. Append-only.
  - id: M-356
    title: "M-356 — RFC-0014 concurrency: per-task budgets, cancellation & bounded-cascade supervision"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P3, status:done]
    depends_on: [M-355, M-353]
    body: |
      Lift RFC-0014's single-task v0 boundary (its §8 concurrency deferral) onto the RFC-0008 runtime: per-task effect budgets, cancellation, and cross-task failure propagation (RT4/RT7), with `reclaim` supervision (T4.5) as the bounded-cascade home — where the Erlang/OTP max-restart-intensity grounding (Research Record 05, T5.3) becomes a real declared, bounded cascade (a restart storm is capped, never unbounded). Recovery stays additive over the explicit error (RFC-0014 I1); effects stay declared + bounded (I3/I4); a per-task budget overrun is an in-that-task EffectBudgetExhausted. Builds on the unified budget mechanism (M-353).
      DONE (2026-06-16): frozen-spec presented before folding (RFC-0008 §4.7 concurrency-composition section + RFC-0014 §8 amendment, append-only). Maintainer dispositions: (scope) spec + scheduler-independent composition primitives that feed forward into M-357; (reclaim) COMBINED bound — total `cascade` budget AND windowed max-restart-intensity over a LOGICAL clock (wall-clock deferred to R8-Q3); (cancellation) cooperative + additive. Enacted in mycelium_interp::supervise (CancelToken/TaskOutcome/RestartIntensity/Supervisor — no L0 node, trusted base stays sequential; KC-3), composed with the recovery driver in mycelium-lsp/tests/recover.rs. C1 per-task budgets (in-that-task EffectBudgetExhausted), C2 cooperative additive Cancelled (never preemptive), C3 cross-task propagation via explicit TaskOutcome (no silent/dropped variant — I1), C4 reclaim bounded cascade (both axes → explicit Escalation, never a storm). The task scheduler/executor + RT2 differential are M-357 (built on these). just check green.
  - id: M-357
    title: "M-357 — RFC-0008 RT2 deterministic-fragment runtime + reference-sequentialization differential"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P3, status:done]
    depends_on: [M-355, M-356]
    body: |
      Enact the RT2 deterministic concurrency fragment (the default forms over immutable values — hypha/fuse, §4.5) and its reference sequentialization, validated by the RT2 differential (the deterministic concurrent run ≡ its sequentialization; the NFR-7-equivalent obligation RFC-0008 §4.6/§4.7 names "the natural successor to the L1 track"). Nondeterministic forms stay RT3 constructs with named, reified policies (out of this task's scope). No kernel change (KC-3).
      v0 SLICE DONE (2026-06-16): the maintainer-chosen minimal scope — deterministic fork/join + the RT2 differential, typed channels deferred — is landed in crates/mycelium-mlir/src/runtime.rs (the scheduler lives OUTSIDE the kernel — RT2; KC-3): a structured-concurrency Scope (RT7 — every child joined, none orphaned) over cooperative Tasks, each carrying its own Budgets ledger + the shared CancelToken (M-356 C1/C2), with run_sequential (the reference) and run_interleaved (a deterministic round-robin) strategies. Verified: the RT2 SEQUENTIALIZATION DIFFERENTIAL — interleaved ≡ sequential over a counter corpus (with an interleave trace proving non-triviality) AND over the REAL env-machine (tasks running run_core_with_effects on bit.not L0 programs; each scheduled outcome == the standalone evaluation — no new meaning, KC-3/NFR-7); RT7 scope-cancellation (every pending child → explicit additive Cancelled, all joined); C1 per-task budget isolation (one task's overrun never exhausts a sibling). just check green.
      REMAINING (next slice, needs-design): typed single-producer/single-consumer CHANNELS (the Kahn-deterministic communicating-tasks half of the RT2 fragment — §4.3 backpressure), then the §4.5 vocabulary activation (hypha/fuse) per the construct-by-construct gate. Research/docs: confirm R8-Q1 scheduler-normativity scope and that the M-356 logical clock suffices for v0 (no R8-Q3 wall-clock needed yet). Acceptance (design-first): present the channel-slice scope before folding.

  # DN-06 lexicon migration — static `colony` keyword → `nodule`; introduce `phylum`; free `colony`
  # for the dynamic runtime grouping (RFC-0008 §4.7). Created 2026-06-16. The decision is ratified
  # (DN-06, superseding DN-02 §2); this is the mechanical surface/grammar migration it requires.
  - id: M-358
    title: "M-358 — DN-06 lexicon migration: static keyword `colony` → `nodule`; introduce `phylum`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: []
    body: |
      DN-06 (Resolved 2026-06-16) ratifies the static-organization / dynamic-grouping lexicon — `phylum` (library-scale), `nodule` (the basic unit, replacing the generic "module"), and `colony` reassigned from its DN-02 static meaning to the RFC-0008 §4.7 DYNAMIC runtime grouping of `hypha`. This task is the mechanical surface migration the reassignment requires (the DECISION is already ratified; this executes it): rename the L1 surface keyword `colony` → `nodule` across the lexer/token/parser/AST/checker/elaborator (~226 refs in crates/mycelium-l1), the grammar EBNF + LR(1) oracle + the 23-file accept/reject conformance corpus (docs/spec/grammar/), and the prototype binaries/tests; reserve `phylum` (the library grouping above nodules — reserved-not-active until its construct lands) and `colony` (dynamic; realized by mycelium-mlir::runtime's Colony). Keep it ONE auditable change (it alters the grammar contract): the reserved-word set + M-141 linter, the conformance fixtures, and the M-142 formatter spelling move together. No kernel change (KC-3); no semantic change — pure renaming + two reserved additions. Document singular/plural (phylum/phyla, nodule/nodules, colony/colonies, hypha/hyphae). Also wire the DN-06 §6 nodule HEADER-COMMENT convention into the linter/formatter: a file declares nodule status via `// nodule: <dotted.name>` (or bare `// nodule`) on the first non-blank line — NOT in the filename/path (paths stay conventional); the M-141 linter recognises it; content-addressed identity (ADR-003) stays canonical. Acceptance (design-first): present the rename map + grammar diff before folding; verify the full conformance corpus + just check green; the content-addressed identities are unchanged (a rename is not a semantic edit). Until executed, `colony` is the deprecated spelling of `nodule` (DN-06 §2).

  # Phase 7 (M-359) — the STRUCTURED nodule header + project manifest schema (maintainer preference,
  # 2026-06-16). Design-first: the spec is Proposed; format choices need sign-off before any code.
  - id: M-359
    title: "M-359 — Structured nodule header + project manifest (mycelium-proj.toml) + top-down inheritance"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-358]
    body: |
      The maintainer prefers a STRUCTURED nodule header over DN-06's minimal `// nodule:` marker: license, authors, first publication, last update, version — on a nodule/phylum ROOT, with subnodules INHERITING most fields top-down; plus a config form like Python UV's pyproject.toml but scoped for Mycelium. Designed in docs/spec/Nodule-Header-and-Project-Manifest.md (Proposed 2026-06-16): a closed-key in-file header (`// @key: value` — version/license/authors/since/updated/summary), a `mycelium-proj.toml` manifest (the pyproject/Cargo analogue), and explicit, EXPLAIN-able top-down inheritance (in-file > nodule-root > mycelium-proj.toml). Honesty-aligned: no ambient metadata (unknown keys/conflicts are explicit errors — G2), metadata is NOT identity (the content hash stays canonical — ADR-003), declared-only license/version (VR-5), tooling-layer (KC-3). Acceptance (design-first / maintainer-gated): ratify the §7 format choices (manifest filename `mycelium-proj.toml`; header sigil `// @key:`; the closed v0 key set; `@updated` discipline) BEFORE folding. Then enact: the header parser + manifest loader + inheritance resolver + an `EXPLAIN` of the resolved header, with a JSON schema under docs/spec/schemas/ and conformance fixtures; the M-141 linter recognises + checks the header (unknown key / bad SPDX / non-ISO date = explicit error). just check green. No kernel change.

  # Phase 8 (M-361) — the FULL Mycelium toolchain epic (ANTICIPATED forward anchor). The maintainer
  # (2026-06-16): a full-fat toolchain beyond LSP+interpreter+compiler — formatting, correctness,
  # error/issue checking AND fixing, security checks — is a long-term PROD-RELEASE requirement.
  # Decomposes into per-tool tasks at its gate, like the M-346 stdlib epic. Sequencing firms at the gate.
  - id: M-361
    title: "M-361 — Full Mycelium toolchain epic (format / correctness / lint+fix / security) — full-fat suite"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-346, M-359]
    body: |
      Roadmap anchor for the FULL Mycelium toolchain — the "full-fat suite" the maintainer names as a prod-release requirement (2026-06-16), beyond today's LSP + interpreter + AOT compiler: a formatter (mycfmt — M-142 grows up), correctness/type checking, error/issue checking AND auto-fixing (the RFC-0013 diagnostics + RFC-0014 recovery surfaced as actionable fixes), security checks (secrets/supply-chain/`wild`-block audit — the /security-review posture as tooling), and the packaging/metadata layer (the M-359 header/manifest + spore publishing). Principles inherited and non-negotiable: never-silent (G2), honest per-op guarantee tags, no black boxes / EXPLAIN, small auditable kernel (the toolchain lives ABOVE it — KC-3), content-addressed (ADR-003); Rust-first now (ADR-007), Mycelium-lang eventually (dogfooding). Full-fat = a release gate, not a v0 deliverable. Decomposes into per-tool tasks at its gate. Anticipated forward anchor (not yet ratified roadmap); marked so. Run gh-bootstrap-local.sh to create the Phase 8 milestone + phase:8 label and assign.

  # Phase 7 (M-362) — RFC-0015 automatic baseline diagnostics & recovery (the DynEL "automated baseline"
  # design point the maintainer added to the roadmap, 2026-06-16). Design-first: RFC-0015 is Draft.
  - id: M-362
    title: "M-362 — RFC-0015: automatic baseline diagnostics & recovery (DynEL auto-wrapping + logging)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-345, M-352]
    body: |
      RFC-0015 (Draft 2026-06-16): the DynEL "automated baseline" intent — easily automated, dynamically-applied baseline error handling + logging — as an AUTOMATION LAYER over RFC-0013 (presentation) + RFC-0014 (recovery). Auto-derive a zero-config BASELINE diagnostic/logging policy from the language's structured mapping (the error-class registry + each class's level/route + a definition's declared effects) and auto-apply it (wrapping for logging/QoL), with a ladder: auto (floor) -> light overrides -> fully manual (manual always wins). The load-bearing HONESTY BOUNDARY (fixed in RFC-0015 §4.1): automatic = ADDITIVE presentation/logging ONLY by default (safe to auto-apply because RFC-0013 never changes control flow — I1); automatic RECOVERY is OPT-IN, declared, bounded (RFC-0014 I3/I4/I5 — no implicit control-flow change, only scaffolding + named opt-in profiles); the auto-baseline is a reified, content-addressed, EXPLAIN-able RFC-0005 policy (no black box — SC-3); the derivation is a TOTAL, inspectable function of the mapping, never learned (VR-5/RFC-0005). Feeds the toolchain epic (M-361) and the M-359 project manifest (project-level baseline profiles). Acceptance (design-first): trace prior art (DynEL/tracing/OTP) into research/, resolve §8 (the derivation function, the opt-in recovery-profile set, auto-wrap scope, default-on presentation vs default-off recovery), then ratify Draft->Accepted before any code. No kernel change (KC-3). Lineage: DN-04 -> RFC-0013 + RFC-0014 -> RFC-0015.

  # Phase 8 (M-363) — narrative capture + automated authoring (blog / language book / reference manual),
  # distributed free with the language. Initial capture this session (docs/notes/Narrative-Capture-and-
  # Authoring.md + the seeded docs/devlog/); full pipeline design is a fresh session (maintainer 2026-06-16).
  - id: M-363
    title: "M-363 — Narrative capture + automated authoring (blog / language book / reference manual)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-346]
    body: |
      Capture enough development narrative — decisions, struggles, problems solved, the how AND the why — to enable PARTIALLY-TO-FULLY AUTOMATED authoring of (1) project BLOG posts, (2) a full LANGUAGE BOOK, (3) a LANGUAGE REFERENCE MANUAL, and (4) FULLY-AUTOMATED documentation + API reference, distributed FREE with the language in digital formats (HTML/PDF/EPUB) and served live (browsable site + LSP hover). Initial capture is done (docs/notes/Narrative-Capture-and-Authoring.md — intent, data model, capture discipline, honesty constraints, the §4.1 format/quality bar; plus the seeded docs/devlog/ append-only narrative layer that fills the one gap the formal docs leave: the struggle / problem-solving "how"). The honesty rule already makes the corpus a grounded, cited, append-only narrative (~80% of the raw material). Output (4) docs/API ref is the MOST automatable (pure PROJECTION from code + schemas + the M-359 nodule-header metadata, no interpretive layer), so FULLY automated is the goal there; rustdoc-first now, Mycelium-lang doc-comments later (dogfooding). All outputs are SYNTHESIS FROM THE CITED CORPUS under the same discipline as the language: grounded + cited (no hallucination — the prose analogue of never-silent G2; "undocumented is FLAGGED, never invented"), projection-not-parallel-truth (generated from the RFCs/specs/code so they cannot drift — ADR-003), human-in-the-loop for interpretive narrative (draft-then-review; for pure projection the human gate is the generator/templates, not each page), append-only provenance. CRITICAL: the output must clear a CHECKABLE QUALITY BAR (§4.1) — clean/presentable/legible/intelligible/digestible: one consistent template, index->detail navigation, progressive-disclosure graded depth (reuse RFC-0013 levels), checked inline examples, dual human/machine projection (G11), legibility/accessibility by construction. Acceptance (design-first, fresh session): trace prior art (rustdoc/docs.rs, docs-as-code, literate programming, mdBook/Sphinx/Antora, spec-generated manuals), design the generators + templates + the HTML/PDF/EPUB build + the quality-bar lint, place it in the Phase-8 toolchain (M-361), then ratify before building. No kernel change (KC-3); tooling/docs layer only.

  # ── M-361 decomposition (per-tool children) — STAGED 2026-06-16 ───────────────────────────────────
  # The M-361 epic "decomposes into per-tool tasks at its gate". These are the five per-tool children the
  # epic body names (formatter / correctness / lint+fix / security / packaging). Staged here (the
  # authoritative planning source) so the decomposition is reviewable + version-controlled; GitHub issues
  # + sub-issue links to M-361 (#132) are created at the Phase-8 gate via gh-sync-all.sh (the MCP cannot
  # create milestones/colored labels; phase:8 + the Phase 8 milestone already exist). Sequencing firms at
  # the gate. Each is design-needed before build (status:needs-design), priority P3 (out-of-gate).
  - id: M-364
    title: "M-364 — `mycfmt`: the standalone canonical formatter (M-142 grows up)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-142, M-358, M-361]
    body: |
      Sub-issue of M-361. Grow the M-142 canonical formatter (today: the Core-IR α-normalizing dump + the surface `expand_to_source` printer in mycelium-lsp/mycelium-l1) into a standalone `mycfmt` CLI over `.myc` sources: idempotent canonical formatting that PRESERVES the DN-06 `// nodule:` header marker + the M-359 structured `// @key:` header (M-358/M-359), never changes content-addressed identity (ADR-003 — formatting is a projection, RFC-0001 §4.8), and is EXPLAIN-able about any normalization it applies (no black box). Reads the `[toolchain].format` pin from `mycelium-proj.toml` (M-359). Honesty: a file it cannot parse is an explicit error, never a partial/garbled rewrite (G2). No kernel change (KC-3). Acceptance (design-first): the formatter contract + idempotence/identity-preservation tests before folding.
  - id: M-365
    title: "M-365 — toolchain correctness / type-check driver (`myc-check` grows up)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361]
    body: |
      Sub-issue of M-361. The toolchain-grade correctness/type-checking entry point: grow the `myc-check` prototype (mycelium-l1) + the M-210 shared TV checker into a project-aware driver that checks a whole `phylum`/program (resolving the `mycelium-proj.toml` surface + dependencies, M-359), reports every refusal as an RFC-0013 structured diagnostic (routed via the M-362 baseline), and exits non-zero on any error (CI-usable). Honest per-op guarantees preserved (VR-5); a `NotValidated`/`TypeMismatch`/`UnresolvedName` is explicit, never silent (G2). Lives above the kernel (KC-3). Acceptance (design-first): the driver's project-resolution + diagnostic-aggregation contract before folding.
  - id: M-366
    title: "M-366 — lint + auto-fix (RFC-0013/0014/0015 diagnostics surfaced as actionable fixes) + the §4.1 doc quality-bar lint"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-345, M-352, M-362, M-363, M-361]
    body: |
      Sub-issue of M-361. The error/issue checking AND auto-fixing tool: surface the M-141 invariant lints + the RFC-0013 diagnostics + the RFC-0015 auto-baseline "this class is only logged — add a handler?" lint (RFC-0015 §9) as ACTIONABLE fixes, and offer RFC-0014 recovery scaffolds (an explicit handler skeleton — never an implicit control-flow change; A2/I5). Also hosts the M-363 §4.1 documentation quality-bar lint (the 8 checks over the doc IR — checked examples, undocumented-is-flagged, dual-projection parity, …). Every fix is a reified, inspectable, opt-in edit (no silent rewrite; G2). No kernel change (KC-3). Acceptance (design-first): the fix model (suggest vs apply; the opt-in boundary) before folding.
  - id: M-367
    title: "M-367 — security checks as tooling (secrets / supply-chain / `wild`-audit)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361]
    body: |
      Sub-issue of M-361. The /security-review posture as a tool: secret scanning, supply-chain checks (pinned deps, lockfile integrity, no `curl|bash`), and a `wild`-block audit (LR-9/S6 — every denied-by-default unsafe region is inventoried + justified). Reuses the existing scripts/checks/{secrets,deny}.sh discipline, lifted into the full-fat suite with honest, EXPLAIN-able findings (a flagged item cites why; G2). Adding any new external dependency stays a decision (ADR), not a build detail. No kernel change (KC-3). Acceptance (design-first): the check set + severity/honesty contract before folding.
  - id: M-368
    title: "M-368 — packaging & publishing: `mycelium-proj.toml` → spore (ADR-013)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-359, M-361]
    body: |
      Sub-issue of M-361. The packaging/metadata + publishing layer: consume the M-359 `mycelium-proj.toml` manifest (the `[spore]`/`[surface]`/`[dependencies]` tables M-359 accepts-but-does-not-yet-interpret) to build a `spore` — the content-addressed, deployable artifact of a `phylum`/program (ADR-013; the germinates-into-a-colony unit, DN-06/Glossary). Content-addressed identity is canonical (ADR-003); metadata is not identity. Honest: a missing/ambiguous publish input is an explicit error, never a guessed default (G2). No kernel change (KC-3). Acceptance (design-first): the spore build + dependency-resolution contract before folding.

  # Phase 9 (M-369) — the toolchain gate's end-to-end conformance fixture (Wave D). Folds under the
  # M-361 gate: grow examples/ from the minimal hello-phylum into a richer, still-green-and-real
  # corpus that dogfoods all four gates over representative L1 programs. Landed this session; no
  # GitHub issue number minted yet (resolved at the next gh-sync-all.sh board reconcile).
  - id: M-369
    title: "M-369 — examples/ end-to-end conformance fixture (Phase 9 Wave D): richer toolchain dogfood"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361, M-364, M-365, M-366, M-367, M-368]
    body: |
      Sub-issue of M-361 (Phase 9 Wave D). Grow examples/ from the Wave-A minimal `hello-phylum` into a richer end-to-end fixture that exercises MORE of the L1 surface through ALL FOUR gates (mycfmt --check, myc-check --project, myc-sec wild-audit, myc-lint), so the gate proves the tools on representative programs rather than a toy. Lands `examples/repr-tour/` — a multi-nodule phylum touring a guarantee-annotated swap (the LR-6 honesty index across the Exact ⊐ Proven ⊐ Empirical ⊐ Declared lattice), a trait, a matured fn (matured ⟹ total), ambient representation (RFC-0012 default paradigm / `{N}` / `with paradigm`), and a `for` fold (RFC-0007 §4.8) — every nodule canonicalized with `mycfmt --write` and PASSING all four gates. Adds a NON-GATING `myc-spore` packaging smoke (`spore build`, M-368) that always exits 0 — it dogfoods the 5th tool without gating, since packaging is a build artifact not a correctness property. Honest findings, deliberately kept OUT of the gated examples (each an open deferral, not a forced-green gate; G2/VR-5): the L1 `spore(…)` expression is deferred in the type-checker (E2-5/M-260), and mycfmt v0 refuses interior comments (the §10.2 comment-preserving deferral). New fixtures live under examples/ (real project roots) and MUST stay green — they are NOT must-fail inputs (locked decision #3: tests/fixtures/ + reject/ stay ungated). No kernel change (KC-3), no new dependency. Acceptance: `bash scripts/checks/all.sh` prints ALL CHECKS PASSED with both phyla green across the four gates.

  # ════════════════════════════════════════════════════════════════════════════════════════════════
  # BACK-FILL (2026-06-17, PM reconcile) — the Phase-2 M-2xx epic decomposition + M-351, recovered into
  # the manifest. These task-ids were CREATED on GitHub (idmap.tsv #48–#65, #114) from docs/planning/
  # phase-2.md when Phase 2 was worked, but the entries were never written back into issues.yaml — so the
  # manifest was the incomplete side (gh-issues-sync.py --validate flagged "idmap.tsv: 19 task(s) not in
  # issues.yaml"). Recovered here APPEND-ONLY (existing entries untouched; ordering preserved) and grounded
  # ENTIRELY in the cited corpus (phase-2.md §2/§6 for the M-2xx set; CHANGELOG + RFC-0012 §8/§9 for M-351)
  # — reconstructed, never invented (the planning analogue of never-silent, G2). All are DONE at the task
  # level (phase-2.md §8 exit-gate met 2026-06-12; M-351 #114 decided 2026-06-16); status:done is a label,
  # not a state change — the reconciler never infers OPEN/CLOSED from it.
  # ── Phase 2 — E2-4 (verified-numerics) decomposition: M-201…M-204 ──────────────────────────────────
  - id: M-201
    title: "M-201 — ErrorBound (ε) affine-arithmetic kernel"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:numerics, priority:P0, status:done]
    depends_on: [M-101]
    body: |
      E2-4 (#31) decomposition (ADR-010 §1 / RFC-0001 §4.7). Affine-form ε composition (add/sub/mul/neg/scale) with a radius→eps projection; Soundness/Monotonicity/Determinism each property-tested. The kernel only ever degrades strength (composition is monotone-downward); a norm mismatch is an explicit None, never a coercion (G2).
      DONE (2026-06-09): mycelium-numerics::error — AffineForm (shared noise symbols cancel — the correlation advantage over interval arithmetic) with exact linear ops + a sound mul (second-order remainder); the scalar ErrorBound{eps,norm} projection; 20k-trial property tests per law. (phase-2.md §6.1.)

  - id: M-202
    title: "M-202 — ProbBound (δ) union-bound kernel"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:numerics, priority:P0, status:done]
    depends_on: [M-101]
    body: |
      E2-4 (#31) decomposition (ADR-010 §2 / RFC-0001 §4.7). union(δ₁..δₙ)=min(1,Σδ); apRHL [SEQ] ⟨ε,δ⟩; Soundness/Monotonicity/Determinism tested; a DIFFERENT monoid from ε by construction (T0.1c) — does NOT supply VSA crosstalk content (ADR-010 §5; that stays on RFC-0003's cited-theorem path).
      DONE (2026-06-09): mycelium-numerics::prob — ProbBound{delta} with saturating union/or + ApRhlJudgment{eps,delta} with seq; union over-estimates the empirical "any fails" rate over 200k Monte-Carlo trials. (phase-2.md §6.2.)

  - id: M-203
    title: "M-203 — Shared {ε,δ,strength} certificate + tier-i checker"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:numerics, priority:P0, status:done]
    depends_on: [M-201, M-202]
    body: |
      E2-4 (#31) decomposition (ADR-010 §3/§4 + the trusted base). Certificate{eps,delta,strength} (strength by meet, serializable); a tier-i Rust checker that REJECTS a too-tight certificate; accuracy_to_probability the single legal cross-kernel rule. Incompleteness is an explicit Rejected/Malformed, never a silent pass (RFC-0002 §2); strength never upgraded without a checked basis (VR-5).
      DONE (2026-06-09): mycelium-numerics::cert — Certificate + recompute_error; check_error_claim/check_union_claim → Valid/Rejected{recomputed,claimed}/Malformed (tighter-than-rederivation rejected, looser is sound); compose_error_bound (the M-204 entry, basis by meet). (phase-2.md §6.3.)

  - id: M-204
    title: "M-204 — Interpreter honest approximate composition"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:core-ir, priority:P0, status:done]
    depends_on: [M-201, M-202, M-203]
    body: |
      E2-4 (#31) decomposition (RFC-0001 §4.7). Retire EvalError::ApproxCompositionUnsupported for composable approximate inputs: an exact-over-exact op stays Exact/bound=None (M-I1); an op over approximate inputs carries the kernel-composed Bound + meet-strength; a golden test checks the propagated {bound,guarantee} against the kernel's direct composition; M-I1…M-I4 stay enforced.
      DONE (2026-06-09): mycelium-interp::prims — exact_result generalized to compose_result with a per-prim ApproxRule (core.id Passthrough; trit add/sub/neg sound 1-Lipschitz ε; bit.* and trit.mul still Refuse — explicit, never silent). Closes the documented Phase-1 honesty gap. (phase-2.md §6.4.)

  # ── Phase 2 — E2-3 (full swap + shared certificate checker) decomposition: M-210…M-212 ─────────────
  - id: M-210
    title: "M-210 — Shared translation-validation certificate checker"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:swap, priority:P0, status:done]
    depends_on: [E2-4, M-120, M-151]
    body: |
      E2-3 (#30) decomposition (RFC-0002 §2 / RFC-0004 §3). ONE check(A,B,R,claimed-bound,certificate) with a RefinementRelation (bijection | bounded-similarity | observational-equiv); Exact instances discharge by equality, bounded instances consume the E2-4 certificate; TV incompleteness is an explicit fallback, never a silent pass; the M-120 swap cert and the M-151 interp↔AOT differential both validate through the one checker.
      DONE (2026-06-10): mycelium-cert::check — CheckVerdict::Validated{strength}/NotValidated{reason,fallback}; bijection by structural re-derivation equality (re-checks the round-trip lemma + legal_pair side-condition), BoundedSimilarity twice-validated through the tier-i kernel (a claim never outruns its checked evidence, VR-5), ObservationalEquiv folding the M-151 differential. This is the M-302 native differential's checker. (phase-2.md §6.5.)

  - id: M-211
    title: "M-211 — Bounded/lossy swap (Dense F32→BF16)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [E2-4, M-210, M-230]
    body: |
      E2-3 (#30) decomposition (RFC-0002 §5 / ADR-010 §1) — the first Bounded swap. dense_f32_to_bf16 emits the converted value + a Bounded cert with a basis-derived ε bound; validates through M-210; NaN/Inf handling explicit. Subnormal/approximate sources are REFUSED, not tagged with a bound the theorem doesn't cover (VR-5; RFC-0002 §5 "type error, not a Declared gamble").
      DONE (2026-06-10): mycelium-cert::dense — round-to-nearest-even with the proven per-element {eps:2^−8, norm:Rel} bound, ProvenThm basis (Higham 2002 Thm 2.2 at β=2,p=8) checked PER ELEMENT; 20k-sweep soundness + idempotence. Scope note: needed only the Phase-1 Dense{dim,dtype} repr (M-101/M-103); M-230's Dense ops stayed independent. (phase-2.md §6.6.)

  - id: M-212
    title: "M-212 — KC-4 cert-overhead measurement + SC-3 global exit"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:swap, priority:P1, status:done]
    depends_on: [M-210, M-211]
    body: |
      E2-3 (#30) decomposition (KC-4 / SC-3). A bench harness reporting cert-check cost per swap kind with an HONEST measured verdict vs the KC-4 budget (no pre-written "within budget", VR-5); a test asserting every swap in the legal-pair table emits and validates a certificate, and every unimplemented/rejected row fails EXPLICITLY (SC-3 global, never silent anywhere).
      DONE (2026-06-10): cargo xtask kc4 (refuses to measure a debug build) — measured per-swap cert checking costs the SAME ORDER as the swap itself (bijective ≈1.3×, bounded ≈0.13×), so the KC-4 downgrade path is NOT triggered on this evidence; a numeric budget ratification stays a pending maintainer decision. tests/sc3.rs pins SC-3 global. (phase-2.md §6.7.)

  # ── Phase 2 — E2-6 (selection policy + EXPLAIN) decomposition: M-220…M-222 ─────────────────────────
  - id: M-220
    title: "M-220 — Decision-table SelectionPolicy + cost function"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P0, status:done]
    depends_on: [M-101, M-102, M-103]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §2/§3). Ordered (predicate over queryable Meta) → candidate rules + explicit cost; TOTAL (default arm) and terminating by construction; deterministic; content-addressed; first-class override; fixed declared precedence. The "statistics" are the kernel's exact metadata — the cardinality-estimation opacity trap does not arise (RFC-0005 §2.5).
      DONE (2026-06-10): new crate mycelium-select (KC-3 §5 decision — selection stays out of the trusted kernel) — SelectionPolicy with a validating constructor, a small closed non-Turing-complete Predicate language, a CostModel in real storage BITS (not "arbitrary internal units"), policy_ref() content-addressing the canonical serialization. (phase-2.md §6.8.)

  - id: M-221
    title: "M-221 — Mandatory EXPLAIN trace + LSP surfacing"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P0, status:done]
    depends_on: [M-220, M-140]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §2.2/§4 / SC-5). A serializable Explanation populated on EVERY selection (candidates + per-candidate cost + chosen + override state); explain(policy, meta) total and deterministic; the LSP facade exposes EXPLAIN as a surfaced artifact kind; a ranking test. Mandatory EXPLAIN is the operational form of "no black boxes" (G2/ADR-006).
      DONE (2026-06-10): Explanation emitted by select on every call (no selection without an EXPLAIN); mycelium-lsp::analyze_with adds the FIFTH artifact kind to the M-140 facade + a policy-divergence warning that keeps even overridden selections inspectable. (phase-2.md §6.9.)

  - id: M-222
    title: "M-222 — Wire selection into swap-target (and packing) sites"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P1, status:done]
    depends_on: [M-220, M-221]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §4) — one mechanism, two sites. The swap path records Meta.policy_used = PolicyRef + EXPLAIN on auto-selection; a single select(policy, candidates, meta) → (choice, explanation) serves both sites; override forces the alternate target deterministically; a wrong-kind candidate is an explicit WrongSiteKind refusal, never a coercion.
      DONE (2026-06-10): select_swap_target / select_packing thin adapters over the single select; the wiring test asserts "which policy chose this?" is answerable from the value alone. The packing-site CONSUMPTION is honestly deferred to E2-7/M-250 exactly as the issue scopes it. (phase-2.md §6.10.)

  # ── Phase 2 — E2-1 (Dense) decomposition: M-230…M-231 ──────────────────────────────────────────────
  - id: M-230
    title: "M-230 — Typed dim-tracked Dense{dim,dtype} ops"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [M-101]
    body: |
      E2-1 (#28) decomposition (RFC-0001 §4.1 / RFC-0002 §5). Dense construction over ScalarKind (F32/BF16) with dim IN the type; elementwise + similarity ops with Exact/Bounded tags per op; dim mismatch a typed error; property tests; float-op ε via E2-4. An off-grid payload contradicts its Repr — refused, never re-rounded.
      DONE (2026-06-11): new crate mycelium-dense (KC-3, like numerics/selection) — add/sub/scale Proven per-element Rel ε (Higham Thm 2.2 checked per element), neg Exact; dot/similarity f64 helpers; a 20k-pair sweep per dtype (SC-2). F16/F64 explicitly unsupported; approximate-source composition refused (ApproximateSource), the open magnitude-aware rule recorded. (phase-2.md §6.11.)

  - id: M-231
    title: "M-231 — Dense↔VSA swaps with ε/δ bounds"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [E2-4, M-210, M-230, M-130]
    body: |
      E2-1 (#28) decomposition (RFC-0002 §5 / RFC-0003). dense_to_vsa / vsa_to_dense emit Bounded certs with ε and/or δ, basis DERIVED (ProvenThm where a cited capacity theorem's side-conditions check, else EmpiricalFit); certs validate through M-210; SC-2 for the new swaps.
      DONE (2026-06-11): mycelium-cert::dense_vsa — bipolar Dense encoded as a MAP-I superposition over a deterministic versioned codebook (so the T0.2 capacity theorem applies), provenance-gated decode; δ basis = ProvenThm iff vsa_dim ≥ requiredDim(n,δ) (reusing the M-131 checked instantiation) else EmpiricalFit else explicit InsufficientCapacity. The M-210 checker's δ-side lands here (the Incomplete placeholder retired). General-real components refused (NotBipolar). (phase-2.md §6.15.)

  # ── Phase 2 — E2-2 (remaining VSA models) decomposition: M-240…M-242 ───────────────────────────────
  - id: M-240
    title: "M-240 — VSA models MAP-B + BSC"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4). MapB/Bsc implement the VsaModel trait; bind/unbind/permute Exact (property-tested round-trips); bundle carries the HONEST capacity tag per the §4 matrix. A Proven value tag without a corpus formula would violate M-I2/VR-5 — so Value-level bundles carry a trial-backed Empirical δ instead, with an explicit refusal outside the validated profile (OutsideEmpiricalProfile).
      DONE (2026-06-11): mycelium-vsa::{mapb,bsc} — MAP-B (bipolar, sign-rounded bundle) + BSC (XOR bind, majority bundle, centered Hamming similarity); intrinsic bundle tag Proven per the matrix but Value-level Empirical from declared EmpiricalProfile constants exercised with exactly the declared 10⁴ trials (M-I3). RR-13 NestedBundleUnsupported refusal landed here. (phase-2.md §6.12.)

  - id: M-241
    title: "M-241 — VSA models HRR + FHRR (Empirical unbind)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130, M-132, E2-4]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4 / T1.2). Hrr/Fhrr implement the trait; bind algebraic; unbind tagged Empirical with a trial-validated EmpiricalFit bound, routed through cleanup; bind→unbind→cleanup recovery trials within the stated δ. The matrix is normative, never upgraded (FHRR stays Empirical even where pure-pair recovery is near-exact).
      DONE (2026-06-11): mycelium-vsa::{hrr,fhrr} — HRR (naive-O(d²) circular convolution reference; correlation unbind) + FHRR (phase-angle, explicit DegenerateBundleComponent refusal); unbind is the residual Empirical weak link, Value-level unbind_values trial-validated and provenance-gated to the validated single-factor regime (T1.2). Multi-factor recovery left to the Phase-3 resonator, not silently approximated. (phase-2.md §6.13.)

  - id: M-242
    title: "M-242 — Sparse/SBC + the §4 matrix + RR-13"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-240, M-241]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4 / RR-13). A sparse model with declared sparsity as a static refinement + observed sparsity as runtime metadata (T1.3, both halves); the §4 matrix as a SINGLE source-of-truth table asserted in tests; MAP-B deep nesting an explicit flagged condition.
      DONE (2026-06-11): mycelium-vsa::sbc (sparse block codes; exact algebraic unbind; counting-Bloom bundle) carrying declared Sparse{max_active} in the Repr + observed SparsityObs in Meta; mycelium-vsa::matrix encodes RFC0003_MATRIX (6 models × 4 ops) with tests/matrix.rs asserting every implemented tag equals the table; RR-13 NestedBundleUnsupported enforced. A Value-level SBC bundle bound is recorded future work (no corpus Bloom formula), not approximated. (phase-2.md §6.14.)

  # ── Phase 2 — E2-7 (packing selector) decomposition: M-250…M-251 ───────────────────────────────────
  - id: M-250
    title: "M-250 — Schedule-staged packing selector (I2_S/TL1/TL2)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-222, M-112]
    body: |
      E2-7 (#34) decomposition (RFC-0004 §5 / DN-01). A packing candidate set + cost function; EXHAUSTIVE selection over the fixed bitnet.cpp set (I2_S/TL1/TL2) through the M-222 select API, emitting an EXPLAIN trace; the chosen layout recorded in meta.physical (lossless, M-I5); determinism + override tested; an E1 perf-harness stub recorded. Packing is a SCHEDULE concern, not a type distinction (DN-01 §2/§6) — never in the type or content hash.
      DONE (2026-06-12): mycelium-select::{bitnet_packing_policy, select_layout, record_packing_layout} — the one E2-6 mechanism (no parallel selector), bits/element cost (TL2 the deterministic cheapest), the lossless Meta::with_physical (M-I5), cargo xtask e1 stub with an explicit "not established" verdict (VR-5). The packing-codec bytes live in mycelium-mlir, NOT the trusted kernel (KC-3). (phase-2.md §6.17.)

  - id: M-251
    title: "M-251 — E3 wrong-layout soundness differential"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:execution, priority:P1, status:done]
    depends_on: [M-250, M-151]
    body: |
      E2-7 (#34) decomposition (RFC-0004 §8 / NFR-7). Extend the M-151 interp↔AOT differential so a deliberately MISLABELED meta.physical layout FAILS observational equivalence through the M-210 checker, and a correct one passes — proving the layout record is sound-by-checking (the Mycelium analogue of the MLIR-transpose / Rust-packed "wrong layout misreads memory" bug DN-01 §4 cites).
      DONE (2026-06-12): mycelium-mlir::pack (bijective trit↔byte codec, the three schemes mutually distinct; total decode — a misread, never a panic) + aot::run_with_layout; tests/wrong_layout.rs flips the M-210 verdict SOLELY on the layout tag (correct ⇒ Validated, mislabeled ⇒ NotValidated{Diverged} ⇒ fall back to the reference). Real native pack/unpack kernels + the calibrated E1 answer deferred to the native backend (ADR-009). (phase-2.md §6.18.)

  # ── Phase 2 — E2-5 (reconstruction manifest) decomposition: M-260 ──────────────────────────────────
  - id: M-260
    title: "M-260 — Reconstruction manifest (ReconInfo)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130, E2-4]
    body: |
      E2-5 (#32) decomposition (RFC-0003 §6). A ReconInfo serializing to reconstruction-manifest.schema.json (the ratified name — the issue's recon-info.schema.json reconciled, §7 naming OQ resolved) distinguishing indexed retrieval from compositional reconstruction; content-addressed codebooks; attached bound; the compositional path recovers a NOVEL combination; round-trip + reconstruction tests. Resonator factorization stays Phase-3 with the probabilistic-only ceiling enforced IN THE TYPE (a ProvenThm basis is refused — FR-C2).
      DONE (2026-06-11): mycelium-core::recon (kernel carries the metadata field per RFC-0003 §2) + Meta.reconstruction; mycelium-vsa::recon::reconstruct_role executes the manifest. Acceptance: bundle(color⊗red, shape⊗cube) with both pairs absent from every codebook recovered role-by-role (the §6 exit criterion). This is the M-350 resonator's gated dependency. (phase-2.md §6.16.)

  # ── Phase 4 — M-351 (RFC-0012 ambient deferred extensions) ─────────────────────────────────────────
  # NB: idmap.tsv files M-351 (#114) under "Phase 4 (RFC-0012 ambient deferred extensions)"; the task is
  # the M-344 ambient follow-up that resolves RFC-0012 §8 R12-Q1/Q2. (The PM-task prompt's "Phase-3
  # toolchain task" label does not match the corpus — grounded here in Phase 4 where the corpus places it;
  # the milestone/phase is recorded as found, not as described, per "ground every task / never invent".)
  - id: M-351
    title: "M-351 — RFC-0012 R12-Q1 & R12-Q2 resolution (ambient deferred extensions)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-344]
    body: |
      The two RFC-0012 §8 open questions the M-344 ambient enactment deferred. R12-Q1 (per-use size) → NO new sugar: a paradigm-less ascription `e : {N}` already states an explicit size at the use site (paradigm from the central default), elaborating identically to longhand (I2); sizes stay explicit (no ambient default width) and a u8/f64 literal suffix was REJECTED (imports signed/dtype affordances the kernel does not provide — a false-affordance footgun; v0 Binary is unsigned). R12-Q2 (paradigm-boundary swaps) → crossings stay at swap sites: no default swap policy; `with paradigm` stays pure tag-scoping (SoC); the boundary-AUDIT value is routed to observability tooling (M-345 → DN-04 / RFC-0013 §4.6, the representation-crossing audit view) where lossy conversions are enumerated with their honesty bound (never upgraded, VR-5).
      DECIDED — DONE (2026-06-16): M-351 (#114) closes with NO new ambient surface; R12-Q1/Q2 both resolve to the M-344 baseline. The enforced block-edge boundary is recorded as an optional future discipline (RFC-0012 §9, not adopted). (CHANGELOG "Decided (Phase 4 — M-351 …)"; RFC-0012 §8/§9.)

# ════════════════════════════════════════════════════════════════════════════════════════════════
# Phase 5 — Self-Hosting & Core Library (ANTICIPATED — not yet ratified; scope firms at the Phase-4 gate).
# Created 2026-06-17 (PM phase-allocation reconcile) so the defined-but-unused phase:5 label + the
# "Phase 5 — Self-Hosting & Core Library" milestone are no longer empty (gh-issues-sync.py --validate
# flagged both). DECOMPOSES the M-346 stdlib epic (which already NAMES its candidate modules + acceptance:
# "draft a Core Library RFC … and decompose into per-module tasks") and the milestones.json Phase-5 charter
# (self-host the RFC-0013/0014 diagnostics + recovery in Mycelium-lang). Grounded ENTIRELY in M-346 +
# milestones.json + RFC-0013/0014; scoped to what the roadmap implies, NOT over-invented. All design-first
# (status:needs-design) and out-of-gate (P3); M-501 is the keystone gate the rest depend on. Like the
# M-364…M-368 staging precedent: GitHub issue numbers are minted on the next gh-sync-all.sh run at the
# Phase-5 gate (the MCP cannot create milestones/colored labels); idmap records them then. Sequencing vs
# Phases 6-7 is a maintainer gate decision (MILESTONES.md). FLAGGED open question: whether self-hosting
# precedes or follows the Phase-7 runtime track is unresolved in the corpus — recorded, not decided here.
  - id: M-501
    title: "M-501 — Core Library RFC (scope, module boundaries, the per-op guarantee/EXPLAIN contract, Rust→Mycelium migration)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-346]
    body: |
      The design-first keystone M-346's acceptance NAMES: "when self-hosting is close, draft a Core Library RFC (scope, module boundaries, the guarantee/EXPLAIN contract every stdlib op must meet, Rust→Mycelium migration) and decompose into per-module tasks. Present before folding." This is that RFC — the gate the rest of Phase 5 depends on. The contract every stdlib op must meet is the language's own house rules lifted to library scope: never-silent (G2), honest per-op guarantee tags (VR-5), no black boxes / EXPLAIN, content-addressed (ADR-003), small auditable kernel — the stdlib lives ABOVE it (KC-3). Rust-first now (ADR-007), Mycelium-lang eventually (dogfooding).
      Acceptance (design-first): the Core Library RFC presented + ratified (Draft→Accepted, maintainer) before any stdlib code; it fixes the module set, the per-op guarantee/EXPLAIN contract, and the Rust→Mycelium migration order. FLAG any module whose intent is not yet grounded rather than inventing scope.

  - id: M-502
    title: "M-502 — Self-hosting readiness gate (surface language sufficient to author stdlib modules in Mycelium)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:language, priority:P3, status:needs-design]
    depends_on: [M-346, M-320]
    body: |
      M-346 conditions the whole stdlib decomposition on a precondition: it is "decomposed once the surface language is self-hosting enough to write stdlib modules in Mycelium itself (dogfooding; free of other languages)". This task makes that precondition CHECKABLE: enumerate the surface-language capabilities a stdlib module needs (the RFC-0007 term language M-320 extends; data + recursion; the RFC-0012 ambient surface; nodules/phyla per DN-06; the M-359 manifest) and produce an honest readiness verdict — self-hosting is "close" / "not yet" (never pre-declared, VR-5).
      Acceptance (design-first): a readiness assessment against M-501's contract; a "not established" verdict stays honest until the surface actually supports it. Gates M-510…M-520.

  - id: M-510
    title: "M-510 — stdlib: diagnostics module (self-hosted)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-501, M-502]
    body: |
      The first M-346 candidate module ("diagnostics (DN-04/M-345)") — self-host the RFC-0013 structured-diagnostics layer (today crates/mycelium-lsp/src/diagnostics, Rust) in Mycelium-lang per its stated self-hosting trajectory ("Rust-first … eventually self-hosted in Mycelium-lang"). Must preserve the central never-silent invariant I1 (presentation never gates propagation) and honest sink guarantees on the lattice (RT5/VR-5).
      Acceptance (needs-design): meets the M-501 per-op guarantee/EXPLAIN contract; the I1 never-silent test holds in the self-hosted form; differential against the Rust implementation where they coexist (NFR-7-style). The early candidate-module anchor M-345 names.

  - id: M-511
    title: "M-511 — stdlib: collections module"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-501, M-502]
    body: |
      The M-346 candidate module "collections". A core-library collections module authored in Mycelium-lang, every operation carrying its honest guarantee tag + EXPLAIN per the M-501 contract; bounds/refusals explicit (G2). Scope (which collections, which operations) is fixed by the M-501 RFC, not pre-committed here.
      Acceptance (needs-design): module scope ratified in M-501; ops meet the guarantee/EXPLAIN contract; content-addressed (ADR-003); lives above the kernel (KC-3).

  - id: M-512
    title: "M-512 — stdlib: numerics helpers (ADR-010)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:numerics, priority:P3, status:needs-design]
    depends_on: [M-501, M-502]
    body: |
      The M-346 candidate module "numerics helpers (ADR-010)". Stdlib helpers over the ε/δ bound kernels (the M-201/M-202 monoids + the M-203 shared certificate), authored in Mycelium-lang, each tagged at the strength its basis supports and never upgraded (VR-5). The trusted ADR-010 kernels stay the small trusted base; these are certificate CONSUMERS above it (KC-3).
      Acceptance (needs-design): scope ratified in M-501; honest per-op tags; the tier-i checker still re-validates; no guarantee upgraded without a checked basis.

  - id: M-513
    title: "M-513 — stdlib: VSA / encoding utilities (RFC-0003)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:vsa, priority:P3, status:needs-design]
    depends_on: [M-501, M-502]
    body: |
      The M-346 candidate module "VSA/encoding utils (RFC-0003)". Stdlib encoding/utility helpers over the VSA models (M-130/M-240…M-242) and the reconstruction manifest (M-260), authored in Mycelium-lang. Honest tags per the RFC-0003 §4 matrix (the normative source-of-truth table M-242 encodes); approximate paths stay Empirical/refused, never silently upgraded.
      Acceptance (needs-design): scope ratified in M-501; tags match the §4 matrix; reconstruction stays the probabilistic-only ceiling (FR-C2); above the kernel (KC-3).

  - id: M-514
    title: "M-514 — stdlib: I/O + serialization (RFC-0001 §4.8)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-501, M-502]
    body: |
      The M-346 candidate module "I/O + serialization (RFC-0001 §4.8)". Stdlib serialization/IO authored in Mycelium-lang over the content-addressed value model (RFC-0001 §4.8; the (de)serialization M-104 established in Rust). Round-trip is a checked property; a malformed input is an explicit error, never a silent partial read (G2); serialization is a projection, not identity (ADR-003 — the content hash stays canonical).
      Acceptance (needs-design): scope ratified in M-501; round-trip property holds; meets the guarantee/EXPLAIN contract; above the kernel (KC-3).

  - id: M-520
    title: "M-520 — Self-host the RFC-0013/0014 diagnostics + recovery runtime in Mycelium-lang"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P3, status:needs-design]
    depends_on: [M-501, M-345, M-352]
    body: |
      The milestones.json Phase-5 charter names this directly: "self-host the RFC-0013/0014 diagnostics + recovery (per their self-hosting trajectory)". Port the reified recovery subsystem (RFC-0014, today crates/mycelium-lsp/src/recover, Rust) into Mycelium-lang — the result-sum Outcome, the closed recovery-action set, the registry-shared on-ErrorClass policy, declared+budgeted effects with graceful EffectBudgetExhausted, and the never-silent handle (every error recovered or re-propagated, never dropped — I1). Builds on the self-hosted diagnostics (M-510). Recovery elaborates to L0 Match — no new kernel node (KC-3, NFR-7).
      Acceptance (needs-design): meets the M-501 contract; the central never-silent invariant I1 + the effect-budget invariants (I3/I4/I5) hold in the self-hosted form; differential against the Rust implementation (NFR-7). FLAG: depends on the surface supporting error-sum Match + the effect-budget surface (M-353) being expressible in Mycelium-lang.

# ════════════════════════════════════════════════════════════════════════════════════════════════
# Phase 6 — Native Acceleration & Deployment (ANTICIPATED — not yet ratified; scope firms at the prior
# gate). Created 2026-06-17 (PM phase-allocation reconcile) so the defined-but-unused phase:6 label + the
# "Phase 6 — Native Acceleration & Deployment" milestone are no longer empty. Grounded ENTIRELY in
# milestones.json (the Phase-6 charter) + the cited corpus: the native MLIR→LLVM path (M-348 libMLIR
# provisioning, blocked; RFC-0004 §2; ADR-009; the native codegen M-342 left as UnsupportedNode; DN-05 #1
# native stack-robustness), the Phase-3 acceleration carried forward (M-360/M-370), deployable Spore units
# (ADR-013; the germinates-into-a-colony unit, DN-06/Glossary; the M-368 packaging→spore manifest), and
# production hardening (VR-4 no-opaque-lowering across all backends). Scoped to what the roadmap implies,
# NOT over-invented; all design-first (status:needs-design) + out-of-gate (P3); M-601 is hard-gated on the
# libMLIR provisioning (M-348). Numbers minted on the next gh-sync-all.sh run at the gate (the M-364…368
# staging precedent). FLAGGED open: the native MLIR path is libMLIR-blocked (M-348) — every native verdict
# stays honestly "not established" (VR-5) until the toolchain is present.
  - id: M-601
    title: "M-601 — Native MLIR→LLVM codegen for the full v0 calculus (incl. data + closure)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P3, status:needs-design]
    depends_on: [M-348, M-342]
    body: |
      The milestones.json Phase-6 charter's first item: "Native MLIR→LLVM codegen for the full calculus incl. data/closure (M-348, RFC-0004 §2, ADR-009)". Complete the native lowering M-342 left as explicit UnsupportedNode (native LLVM stayed bit/trit only; the data/closure/recursion fragment runs on the AOT env-machine, not native), and design DN-05 #1 — stack-robust recursion — INTO the native path (RFC-0004 §2 banked it there; reuse the DN-05 budget trait, DN05-Q4). Each lowering stage stays dumpable (no opaque pass — VR-4). HARD-GATED on libMLIR provisioning (M-348, currently blocked); until present, the native verdict stays honestly "not established" (VR-5), never pre-written.
      Acceptance (design-first; libMLIR-gated): a native MLIR→LLVM increment lowers the data + closure fragment with explicit refusal where a node is still unsupported (never silent); no code until the toolchain is present (M-348).

  - id: M-602
    title: "M-602 — Native-path NFR-7 three-way differential + E1 speedup verdict"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:verification, area:execution, priority:P3, status:needs-design]
    depends_on: [M-601, M-302, M-303]
    body: |
      The Phase-6 gate's verification half: "native path holds the NFR-7 differential + a speedup". Extend the M-302 interp↔native differential (and the M-210 shared checker) so the full-calculus corpus runs under the interpreter AND the real native MLIR→LLVM artifact with observable equivalence (a divergent lowering caught — NFR-7/RR-12), and replace the M-303 E1 stub's "not established" with a MEASURED native-vs-interpreter speedup on the full calculus (honest caption, refuses a debug build, no pre-written target — VR-5).
      Acceptance (design-first; gated on M-601): the three-way differential holds across the calculus on the native path; a recorded native/interp ratio with caveats; the E1 verdict moves "not established" → "measured".

  - id: M-610
    title: "M-610 — BitNet / native-ternary acceleration on the native backend"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P3, status:needs-design]
    depends_on: [M-601, M-360, M-370]
    body: |
      The Phase-6 charter's "BitNet / native-ternary acceleration (Foundation §6 Phase-3 acceleration carried forward)". Carry the M-360 production packed-ternary kernels (real pack/unpack/compute for I2_S/TL1/TL2, packing as inspectable meta.physical — NFR-1/NFR-4, not hidden lowering) and the M-370 native-ternary forward-compat mapping (R7) onto the real native backend M-601 unblocks. The M-251 E3 wrong-layout differential guards soundness (a mislabeled layout is caught). Packing stays a schedule concern recorded on meta.physical, never in the type/hash (DN-01).
      Acceptance (design-first; gated on M-601): a packed-ternary kernel runs on the native backend with the layout recorded + inspectable; within the E2-7 exit criterion (~0.01 PPL / 0.1% of full precision); the E3 differential still catches a mislabeled layout (NFR-7).

  - id: M-620
    title: "M-620 — Deployable Spore units on the native path (ADR-013)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P3, status:needs-design]
    depends_on: [M-601, M-368]
    body: |
      The Phase-6 charter's "deployable Spore units (ADR-013)". Produce a deployable Spore — the content-addressed deployable artifact of a phylum/program (ADR-013; the germinates-into-a-colony unit, DN-06/Glossary) — from the native-compiled backend, consuming the M-368 packaging layer (mycelium-proj.toml → spore). Content-addressed identity is canonical (ADR-003); metadata is not identity. A missing/ambiguous deploy input is an explicit error, never a guessed default (G2).
      Acceptance (design-first; gated on M-601): a Spore built from the native backend deploys + runs; the content hash is canonical; the no-opaque-lowering guarantee (VR-4) holds end-to-end into the deployed unit.

  - id: M-630
    title: "M-630 — Production hardening + the VR-4 no-opaque-lowering cross-backend gate"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:verification, area:execution, priority:P3, status:needs-design]
    depends_on: [M-601, M-620]
    body: |
      The Phase-6 charter's "production hardening" + its gate condition "a deployable Spore (VR-4 no-opaque-lowering across ALL backends)". Establish the cross-backend VR-4 obligation: every lowering stage on every backend (interpreter, AOT env-machine, native MLIR→LLVM, JIT) stays dumpable/inspectable — no opaque pass anywhere — and a deployed Spore carries that guarantee. Production hardening = the honest soak/robustness work a release needs, with every verdict tagged at its established strength (VR-5).
      Acceptance (design-first; gated on M-601/M-620): VR-4 demonstrated across all backends (a dumpable stage at every lowering step); the production-hardening checklist met with honest per-item verdicts; this is the Phase-6 exit gate.
