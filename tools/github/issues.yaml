      - corpus:DN-44
    body: |
      CAPTURE-ONLY (rsm F2; explicitly named in DN-44 §1.1 as a tracked follow-on). Operationalize the
      never-silent residual-insecurity discipline into a STANDARD DISCLOSURE BLOCK (disclaimer + reasoning
      /justification + program-author guidance) for every intentionally-unhardened or unpatchable-at-
      language-level surface. Preference order is FIRM: fix it in the language/toolchain first; the
      program-level workaround + disclosure is the FALLBACK. Block format/placement are open (DN-46 §OQ).

      User story: As a security reviewer, I want every intentional-escape surface to carry a standard,
      never-buried disclosure of residual risk + how to insulate against it, so residual insecurity is
      accountable (G2) rather than a hidden trap.

      Definition of Done (to leave Draft): a DN that fixes the disclosure-block format + placement; the
      enforcing gate is M-806. Fix-in-language-first preference preserved. NOTHING decided here.

