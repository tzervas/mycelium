  - id: M-801
    title: "M-801 -- operationalize honest-insecurity disclosure: standard block (capture; DN-46 / rsm F2)"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:spec, area:toolchain, priority:P3, status:todo]
    epic: E23-1
    depends_on: []
    doc_refs:
