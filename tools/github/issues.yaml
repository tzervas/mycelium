      now closed; the sole remaining item is the maintainer's own tag-cut + ADR-022-T1-Enacted act
      this issue names — no open engineering precondition remains (VR-5: a status report on the E19-1
      epic's own checked closure, not a fresh gate run). Status stays `todo` (maintainer-reserved act,
      not performed by this note).

      maintainer-reserved (like M-655 — no agent cuts the tag or enacts the status). The A/B engineering
      rows are met (2026-06-23, kickoff c10): M-700/M-701/M-702 are satisfied and ADR-022 §4/§5 records
      track T1's A1–A5/B1–B2 all met; the gate SCOPE now additionally requires E19-1 (above). The
      remaining acts are the maintainer's:
      cut the `core 1.0.0` tag per ADR-018 and record the enactment. NOTE on the supersession: ADR-021
      is now SUPERSEDED by ADR-022, so it cannot move Accepted -> Enacted; the inherited kernel-gate
      enactment attaches instead to ADR-022 track T1 (mark T1 Enacted at the tag — house rule #3,
      append-only). This issue overlaps the pre-existing maintainer-reserved M-655 (cut 1.0.0 tag);
      resolve them together. Original (pre-supersession) framing follows.

      The release act: once Gate A rows A2/A3/A4 are all demonstrably met (M-700/M-701/M-702
