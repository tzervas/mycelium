  - id: E29-1
    title: "E29-1 (epic) — Phase-I opportunistic .myc ports (ready-now; non-gating)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:stdlib, priority:P2, status:done]
    epic: E29
    depends_on: [M-925, M-926, M-927, M-928, M-929, M-930, M-931, M-932, M-933, M-934, M-935]
    doc_refs:
      - corpus:ADR-038
      - corpus:RFC-0031
      - corpus:DN-34
      - src:docs/planning/self-hosting-port-ledger.md
      - src:docs/spec/stdlib/self-hosting-readiness.md
    body: |
      EPIC (Phase-I, kickoff `opp`; ADR-038 §2.2/§2.5 + roadmap §6). Port the ~9 pure/structural
      `mycelium-std-*` crates the surface can express TODAY — no H1 enabler needed — as `.myc`
      phyla/nodules under the RFC-0031 D5 method: verify-the-surface first, pre-port polish,
      transpiler-assisted where coverage genuinely helps (progressive hardening: start smallest),
      hand-finished, then the `std_result.rs`-pattern harness with three-way execution + a
      differential vs the retained Rust reference oracle (D6 — no crate retirement; M-867 is
      post-1.0). Candidate order, smallest-first by non-test LOC (Empirical, 2026-07-01):
      diag (531) → core (623) → select (1105) → swap (1118) → recover (1380) → error (1606) →
      testing (1671) → ternary (1924) → spore (2613). `convert` is NOT in this wave's set — FLAG it
      to the port ledger as a next-wave candidate rather than growing this scope.

      POSTURE: welcome, honest, and NEVER the release gate (ADR-038 §2.2). Sequencing: sits under
      H0 `acy` (E27-1), which LANDED 2026-07-02 — no live blocker; `enb` (E28-1) is NOT a
      prerequisite — this set was chosen precisely because it needs no H1 enabler (each task
      re-verifies that claim first and FLAGs instead of waiting). A candidate that needs an enabler
      is FLAGged back to `enb`, never forced (G2). Transpiler is an assist, not a gate
      (`crates/mycelium-transpile`, landed — `trx`); transpiler feature demand routes to E18-1.

      Every port task's DoD includes the same five D5 rows: (1) surface-check recorded before
      porting (Empirical — or the task STOPS and FLAGs); (2) pre-port polish committed separately
      Rust-side, behavior-neutral (tests prove it); (3) `.myc` nodule + `include_str!` harness,
      three-way where forms close; (4) differential vs the Rust oracle green (D5 bar; signature
      frozen); (5) per-op tags carried at the same strength, transpiler-assist fraction recorded
      honestly in the port ledger.

      User stories:
      - As a stdlib author, I want the expressible-today crates self-hosted, so that dogfooding
        starts now instead of after full grammar maturity.
      - As the maintainer, I want measured assist/defect data from real ports, so that the Phase-II
        mass-port plan is grounded in data, not the PoC's estimates.

      Definition of Done: each of the 9 crates either ported (D5 rows all green) or explicitly
      FLAGged blocked with the named missing enabler routed to `enb`/the ledger — never forced,
      never silently dropped (G2); Rust oracles retained (D6); transpiler-assist fractions measured
      + recorded per crate; ledger/indices reconciled at the integration tier.

      Children: M-925 (harness fixture), M-926…M-934 (the 9 ports, smallest-first), M-935 (ledger
      + readiness close-out).

