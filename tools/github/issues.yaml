    body: |
      LANDED (#518; status:done). The kernel comparison/equality prims cmp.eq/cmp.lt over
      Binary{N}/Ternary{N} reduce to Binary{1} (the realized Bool — a kernel prim returns a
      representation value, never a .myc data value; RFC-0032 D1), registered in
      mycelium-interp::prims and surfaced via prim_kernel_name + a dedicated width-collapsing checker
      branch (declared in the Π table with a new WidthRel::Collapse). Guarantee Exact (a total
      decidable relation); differential-tested three-way (L1-eval == L0-interp == AOT). UNBLOCKS
      E13-1 M-718 (width-typed cmp/Eq/Ord) and the ordering basis for M-716 Map/Set.

      Definition of Done:
      - The prim(s) registered + surfaced; an unsupported domain is an explicit never-silent error (G2).
      - Three-way differential test green; honest Exact tag with the test as Empirical agreement.
      - E13-1 M-718 cmp precondition marked satisfied (status note), .myc smoke port in M-752.

  - id: M-748
    title: "M-748 -- binary arithmetic prim surface (bit.and/bit.or + never-silent add/sub)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:core-ir, priority:P1, status:done]
    epic: E19-1
    depends_on: [M-746]
    doc_refs:
      - corpus:RFC-0032
      - src:crates/mycelium-interp/src/prims.rs
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      LANDED (#518; status:done). Surfaced the already-registered bit.and/bit.or (as and/or) and added
      binary add/sub over Binary{N} (surface add_bin/sub_bin -> kernel bit.add/bit.sub) -- a fixed-width
      ripple-carry/borrow chain with NEVER-SILENT overflow (a result outside [0, 2^N) is an explicit
      EvalError::Overflow, mirroring the ternary prims' in-range contract; G2 -- no wrapping, per
      RFC-0032 D2). Guarantee Exact on the in-range result; three-way differential incl. overflow/
      underflow refusal. UNBLOCKS E13-1 M-718 (binary math half).

      Definition of Done:
      - bit.and/bit.or surfaced; binary add/sub registered + surfaced with the RFC-0032-decided overflow
        semantics (never-silent unless declared wrapping).
      - Three-way differential test green (incl. an overflow-refusal case); honest tag.
      - E13-1 M-718 binary-math precondition marked satisfied; .myc smoke port in M-752.

