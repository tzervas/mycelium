  - id: E25-1
    title: "E25-1 (epic) -- Native AOT full-language coverage, parallelism, and 1.0.0 gating"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:epic, area:execution, priority:P1, status:done]
    depends_on: [E15-1]
    epic: E25
    landed_date: 2026-07-01
    landed_basis: "M-863 ratification act: all 14 named children (M-850..M-863, M-863 being this closing act itself) plus the split-out M-856b are done -- confirmed per-child in this resync (M-850/851/852/853/854/855/856/856b/857/858/859/860/861/862 all status:done). RFC-0029 -> Enacted, DN-15 -> Resolved, DN-25 T6 row refreshed in the same act. ADR-034 itself stays Accepted (its Enactment is coupled to the lang 1.0.0 tag act, M-738, not to this epic's landing -- FLAGGED, not guessed past that basis)."
    doc_refs:
