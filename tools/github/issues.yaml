    body: |
      `EXPLAIN` of the ACTIVE MODE is always available (mode-independent, RFC-0034 §3.1/§13d). Implement
      the generation != consumption split: the cheap inspectability SIGNAL is always generated >= middle
      tier (safe default), while DX/UX CONSUMPTION (verbosity/noise) is tunable and lean at `fast` -- so a
      dev can dial consumption up mid-session with the history already captured (no re-run, no mode switch).
      Acceptance / DoD (TDD):
      - Property test: EXPLAIN of the active mode is available in EVERY mode incl. `fast`.
      - Property test: the inspectability signal is generated even when consumption is lean (dial-up
        surfaces already-captured history).
