  - id: M-978
    title: "Dynamic host-stack growth + unified tunable recursion-depth budget (DN-84)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:core-ir, priority:P2, status:done]
    epic: E31-1
    depends_on: [M-977]
    landed_date: 2026-07-05
    doc_refs:
      - corpus:DN-84
      - src:crates/mycelium-stack/src/lib.rs
      - src:crates/mycelium-l1/src/parse.rs
    body: |
      Harden the recursive frontend passes to be crash-proof (no host-stack SIGABRT) with an
      essentially-unbounded, cleanly-handled nesting capability, per DN-84. DIRECTION DECIDED by the
      maintainer (DN-84 §11, 2026-07-03): implement (B) — wire the already-documented mycelium-stack
      grow-on-demand feature (stacker::maybe_grow — safe API, unsafe contained in the leaf,
      KC-3/ADR-014 intact) so the host stack is never the binding limit — with: ONE GLOBAL
      recursion-depth budget under a shared policy (§9.1), unifying the scattered per-pass constants
      (parser 256, eval 64, ambient/elab/totality/checkty 4096); maybe_grow guards at COARSE
      pass-entry points only (§9.2 — minimize per-call cost, prove no segment overrun, e.g. reserve
      >= budget x max_frame at entry); a DETERMINISTIC default budget of 4096, tunable, with headroom
      to a few tens of thousands as future use cases witness (§9.5) — accept/reject a function of
      (source, budget) only, never the machine (G2 + corpus determinism + self-hosting portability);
      plus an opt-in, non-deterministic, corpus-excluded --unbounded REPL/exploration mode (design C,
      §9.3). Data-shaped desugaring depth (RFC-0040 Cons chains — size-driven, not logic) is routed
      through iteration/grow-on-demand, NOT the control budget (§5). Motivated by the ADR-041 near-miss
      (a toolchain frame-size change turned a 256-deep guard into a SIGABRT). Companion (D) track =
      M-979. Lands via its own RFC/ADR; DN-84 stays Draft until then.
      User stories + Definition of Done: see DN-84 §2 (stories) + §7/§11 (decided direction / criteria).
      DONE (2026-07-05): delivered via RFC-0041 (Enacted 2026-07-05), which subsumed (B) as supporting
      infrastructure of (D) rather than a separate RFC — checked against this issue's decided scope:
      ONE global RecursionBudget unifying the per-pass constants incl. parser 256->4096 (W1);
      mycelium-stack fine-grained runtime-gated stacker grow, never-silent no-grow refusal, and the
      mem_ceiling >= floor x max_frame startup assertion + frame-size CI baseline (W2 — the coarse
      pass-entry guard discipline, §9.2); deterministic default 4096, (source, budget)-only
      accept/reject (§9.5/G2); the opt-in corpus-excluded --unbounded mode, refused by the
      conformance runner (design C, W7); data-shaped depth routed off the control budget (W1
      check_list + W6). DN-84 -> Resolved in the same landing.
  - id: M-979
    title: "Explicit heap work-stack (DN-84 design D) — RFC-0041 ACCEPTED; Phase-4 implementation (7 waves)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:core-ir, priority:P2, status:done]
