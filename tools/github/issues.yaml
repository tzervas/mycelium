  - id: M-649
    title: "M-649 — Self-hosting Stage-2: first stdlib module written in Mycelium-lang L1 syntax"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P0, status:needs-design]
    depends_on: [M-502, M-647]
    evidence_pr: 310
    evidence_date: 2026-06-21
    landed_basis: "status:needs-design (NOT done) — evidence is a REFERENCE/partial, not a completed landing; git log 824449f (2026-06-21) 'docs: enactment & resolution sweep (M-647/648/650 done; M-381/646 closed; M-649 deferred)'; merged-PR-list #310 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:DN-14, corpus:RFC-0020, corpus:RFC-0007, src:docs/spec/stdlib, src:crates/mycelium-l1/src/lib.rs]
    body: |
      M-502 produced the honest verdict: self-hosting NOT YET established. Gate-fails (5): generics, trait interfaces, effect annotations, wild/FFI blocks, static guarantee index. PRESENT (5): value types + ADTs, pattern matching, functions + recursion, let/lambda, nodule organization.

      Self-hosting does NOT require all 11 features. It requires ≥1 stdlib module written in Mycelium-lang that passes myc-check and meets the M-501 guarantee/EXPLAIN contract. The 5 present features are SUFFICIENT for a pure-function module with no generics, traits, effects, or FFI.

      CANDIDATE MODULES (ranked by feasibility with current surface):
      1. `std.ternary` sub-module — basic ternary predicates (is_zero, is_pos, is_neg, negate, add, sub) using existing ternary primitives + pattern match + recursion. No generics, no traits, no effects needed.
      2. A utility fragment of `std.math` — pure arithmetic helpers over binary types (min, max, abs) using match + recursion.
      3. A simple `std.option` fragment — Option type + map/unwrap/is_some using ADTs + pattern match.

      Recommended path:
      (1) DESIGN FIRST: pick one candidate; audit it against the mycelium-l1 feature inventory (checkty.rs, ast.rs, eval.rs) to confirm every construct is in the accept corpus. Write the design note (or DN-14 append).
      (2) WRITE the module in `.myc` L1 syntax (nodule + phylum/colony header per M-359 format; fn items; pattern match where needed).
      (3) VERIFY: `myc-check <module>.myc` exits 0. If it exits 2 (parse error) or 3 (type error), this is signal: either fix the module (if the feature IS supported but the syntax is wrong) or record the gap (if a needed feature is absent — flag it, don't guess, VR-5).
      (4) DIFFERENTIAL: for each exported function, write a `mycelium-l1` evaluation test comparing the Mycelium-lang definition's output to the Rust reference impl's output. The three-way differential (`l1-eval ≡ elaborate→l0-interp`) should cover the self-hosted functions.
      (5) UPDATE: DN-14 Status → Resolved (or append §N recording the first milestone). Doc-Index + CHANGELOG.

      Acceptance:
      - ≥1 `.myc` file implementing a stdlib sub-module passes myc-check
      - Each exported function has a differential test (Mycelium-lang value ≡ Rust reference)
      - Module meets the M-501 contract: never-silent G2, honest per-op guarantee tags, EXPLAIN-able selections
      - Phase 5 gate logged as "partially met" (first module in Mycelium-lang exists)
      - DN-14 Status: Resolved (with honest recording of remaining gate-fails — no silent upgrade)
      DEFERRED (2026-06-21, M-648 editorial sweep): scoped post-1.0 per ADR-021 §5. The 5 gate-fails (generics, trait interfaces, effect annotations, wild/FFI, static guarantee index) block all non-trivial stdlib authoring in Mycelium-lang; the 5 present features are insufficient for any module in the RFC-0016 taxonomy. This issue stays OPEN; resumption requires Stage-1 generics/traits RFC amendments (Phase-6). DN-14 deferral note appended (2026-06-21).

