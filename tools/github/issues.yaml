  - id: M-640
    title: "M-640 — L1 parser DRY: extract separated-list + punctuation-expect helpers"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:language, priority:P2, status:done]
    depends_on: []
    doc_refs: [src:crates/mycelium-l1/src/parse.rs, src:crates/mycelium-l1/src/token.rs, src:crates/mycelium-l1/src/lexer.rs]
    body: |
      DRY leaf (owns only `crates/mycelium-l1/src/{parse.rs,token.rs,lexer.rs}`). The recursive-descent parser hand-rolls the same `push(one); while eat(Comma) { push(one) } expect(close)` separated-list shape at 8 sites (parse.rs constructor fields ~180, value params ~234, type params ~253, type args ~377, match arms ~562, subpatterns ~591, call args ~683, list literals ~722) and inlines a bespoke message at every `expect(&Tok::X, "...")` punctuation site (parse.rs:69 `expect` + dozens of callers). Extract a `Parser::parse_separated<T>(open,sep,close, parse_one)` helper and a punctuation-message-templating `expect_punct(&Tok)`, folding the callers onto them. Behaviour-preserving: identical tokens consumed, identical `ParseError` produced (same pos+message text where a custom message is kept). No grammar/AST change.
      Acceptance: every folded site produces byte-identical parse results + diagnostics on the accept/reject corpus; `cargo test -p mycelium-l1` + clippy -D warnings + fmt --check green; no public-API/guarantee change (cargo public-api baseline unchanged); net LOC down.

