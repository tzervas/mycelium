    body: |
      Minted 2026-07-07 (DN-87 §2.1/§6 -- the improved-on-RAG bet, honestly gated). Encode
      facts/relations from Layer 1 as hypervector structures on mycelium-vsa (bind/bundle;
      retrieval via resonator/cleanup decode with EXPLAIN-able traces). Ships WITH its eval
      harness: a question set drawn from real agent tasks over this corpus, graded on answer
      correctness + provenance fidelity + latency, comparing Layer 2 vs the Layer-1 baseline
      (optionally + a conventional embedding baseline). THE GATE: until Layer 2 measurably
      beats/complements the baseline, the improved-on-RAG claim stays aspiration and the system
      serves Layer-1 answers (G2/VR-5). A Layer-2 answer always names its Layer-1 evidence.

      User stories:
      - As the maintainer, I want the novel retrieval claim proven on a graded harness before it
        is made, so that the memory system's own honesty matches the language's.

      Definition of Done:
      - Layer-2 encode/decode lands; the harness + question set committed; the comparison numbers
        recorded (Empirical, with denominators + seed discipline); the gate verdict recorded
        append-only in DN-87; provenance preserved through Layer 2.

