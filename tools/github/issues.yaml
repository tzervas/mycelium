      User stories:
      - As a maintainer, I want ADR-021 to move Accepted -> Enacted at the moment of the
        tagged release, so that the decision record matches the release event (append-only, G2).
      - As a downstream app developer, I want a 1.0.0 tag on main that I can depend on, so
        that I have a stable artifact to evaluate.

      Issues to resolve:
      - Is the maintainer satisfied that all Gate A rows are demonstrably met before cutting the
        tag? (This is the final maintainer confirmation step — no agent can make this call alone.)
      - Does ADR-022 (full-lang 1.0.0) require any additional gate beyond ADR-021 Enacted?

      Definition of Done:
