  - id: M-1059
    title: "general-position `?` — the CPS-lift follow-up (decoupled from the never-type, DN-102 SP.3/DN-107 §6-a)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1025]
    doc_refs:
      - corpus:DN-102
      - corpus:DN-107
      - corpus:DN-99
    body: |
      Filed 2026-07-10 on DN-102's ratification (SP.5 Rank 1, item 3 / FLAG-try-1 reframed) — the
      residual FLAG-SP-2 routing from DN-102's second research pass (M-1049, now `done`). DN-102 v0
      (landed, M-1025/PR #1363) restricts `?` to a `let`-binder RHS; `?` in any other position
      (`g(f()?)`, `f()?.method`, a tail `e?`) is a never-silent refusal (FLAG-try-1). DN-102 §SP.3
      found this is the **same sugar** as the let-RHS case, generalized by a **CPS lift** that
      recovers the implicit continuation: `g(f()?)` ⇓ `match f() { Ok(x) => Ok(g(x)), Err(e) =>
      Err(e) }`. DN-107 §6-a (Accepted, adopted at ratification) found this lift unifies both arms by
      **ordinary structural equality** (`Result[B, E]`) — **no bottom type, no early return** — so
      this issue is explicitly **decoupled from M-1030** (the never-type / host-effect issue) and
      gates on nothing there.

      User stories:
      - As a stdlib porter, I want `?` usable in non-let-RHS positions (`g(f()?)`, a tail `e?`,
        chained `e??`), so that Rust ports whose `?` usage is not already a `let`-statement don't need
        a manual `let tmp = inner? in outer(tmp)` rewrite.

      Definition of Done:
      - The CPS-lift lowering step is implemented in the checker (extending `check_try_let`'s
        type-directed dispatch, DN-102 §4/SP.3) so a `?` in a non-let-RHS position recovers its
        enclosing expression as the success continuation and lowers to the DN-102 §2 `match` form,
        for at least the `g(f()?)` call-argument shape and a tail `e?` (chained `e??` optional,
        FLAG if deferred); a differential witnesses the lift ≡ the manual `let tmp = … in …` rewrite
        for both `Result` and `Option`; a `?` shape the lift cannot recover stays a never-silent
        refusal (G2), never a fabricated lowering; the honest `Declared`/`Empirical` split (VR-5) is
        preserved — no tag upgraded past what the differential actually witnesses. DN-107's
        confidence that the general lift is bottom-free is `Empirical` for the simple shape and
        `Declared` for full generality (DN-107 §6) — this issue's differential either witnesses the
        remaining generality or surfaces the one shape that needs divergence (reusing DN-107's
        `diverges` effect, never a new bottom type).

  - id: M-1060
    title: "implement the DN-113 v1 cross-phylum import/resolution subsystem"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    epic: E28-1
    depends_on: [M-1024]
    doc_refs:
      - corpus:DN-113
      - src:crates/mycelium-l1/src/checkty.rs:1086
      - src:crates/mycelium-proj/src/manifest.rs:84
    landed_basis: >
      status:done (2026-07-11, integration close-out; mitigation #14 -- verified against `dev`, not
      rubber-stamped). v1 (DN-113 Rank 1) is SOUND at the checker level: PR #1503 (`98908c8d`) landed
      the core mechanism (`::` phylum-boundary `use`, the additive `Phyla`/`check_phylum_with_deps`
      type layered over `PhylumEnv::link`, DN-112 home-qualified identity extended across the phylum
      boundary). Four adversarial-verification fix cycles then closed the bare-name type-identity
      collapse class this landing's own audit surfaced, each with its own regression corpus (full
      `cargo test -p mycelium-l1` green after each): PR #1506 (`9a03f988`, CRITICAL -- re-home every
      ctor field's `Ty::Data` identity, closing the M-1036-pattern-one-level-up exploit); PR #1508
      (`a282104a`, holes A/A2/B -- `check_trait_method_call` through a generic bound, and the
      `check_app`/`check_app_generic_fn` unbaked-fn-signature fallback); PR #1511 (`343276e2`, the
      4th/final site -- `check_path`'s fn-as-first-class-VALUE synthesis). An exhaustive
      carrier×position enumeration (ctor field / call / generic-call / trait-method-call / value-ref)
      confirms these four sites are the complete reachable set for this collapse class -- see DN-113
      §7.1 (v1-limitation disclosure, added this close-out). Deferred, never-silently: the general fix
      (re-home every foreign trait/fn signature `TypeRef` against its declaring phylum, replacing the
      four narrow refusals with full acceptance -- tracked **M-1076**); separate compilation, re-export,
      glob cross-phylum `use`, version ranges (v1's own disclosed deferrals, unchanged). Guarantee tags:
      the closed collapse class is `Empirical` (checked by the four fix cycles' regression corpora);
      the deferred general-fix scope and P3 items stay `Declared` (VR-5 -- no upgrade past the checked
      basis).
    body: |
      Filed 2026-07-10 on DN-113's ratification (delegated -- maintainer-authorized, orchestrator-
      selected the recommended design on the merits). Implements DN-113 v1: the cross-phylum
      (crate-to-crate) import/resolution subsystem. `use dep::nod.sym` extends `use` with a `::`
      phylum-boundary head (the local `[dependencies]` name); an additive `Phyla` dep-graph type plus
      `check_phylum_with_deps` (`check_phylum` unchanged for a dep-free phylum); loading is v1 B2
      (verified source tree, content hash asserted against the manifest pin) plus B4 (a generated
      content-pinned lock); resolution is content-pinned to `(phylum_hash, qualified_name)` def-site
      refs (the cross-phylum half of DN-110-8.2 OQ-H1, per-function hashing deferred); the diamond
      policy is strict -- two different pinned hashes are two different phyla, never a silent
      SemVer-coalesce (a type mismatch across them is a never-silent refusal); layered over the
      existing `Exports`/`resolve_imports`/`PhylumEnv::link` machinery (M-1024, the canonical linker)
      via a phylum-qualifier key dimension -- no second linker (DRY). v1 defers, never-silently:
      separate compilation, re-export, glob cross-phylum `use` (folds into M-982), version ranges, and
      runtime/dynamic multi-spore linking.

      User stories (DN-113 §2):
      - As a phylum author, I want to `use` a dependency phylum's `pub` symbol, so that I can build on
        a published library without copying its code into my phylum (US-1).
      - As a phylum author, I want a hash/version mismatch between what my manifest pins and what
        actually resolves to be a loud, explicit error, so that I never silently link the wrong bytes
        (US-2, ADR-003/G2).
      - As a sugar-facility author (DN-110/M-1054), I want a cross-phylum def-site reference to expand
        to a content-addressed, stable, unforgeable ref, so a `sugar` rule defined in phylum P and used
        in phylum Q captures P's intended symbol across separate compilation (US-3).
      - As the maintainer, I want cross-phylum resolution to be a layer over the single canonical
        linker (M-1024), so I maintain one resolution path, not a third parallel one (US-4, DRY).
      - As a kernel reviewer, I want v1 to add the minimum surface that makes US-1 work and defer
        everything else never-silently, so the auditable kernel stays small (US-5, KC-3/YAGNI).

      Definition of Done (DN-113 §11, ratified 2026-07-10):
      - A two-phylum `myc check` fixture (a dep phylum plus a consumer) resolves a cross-phylum `use`
        successfully.
      - A hash-mismatch fixture refuses never-silently, naming the dep, the expected pin, and the
        computed hash.
      - A cycle fixture (`A` depends on `B` depends on `A`) refuses never-silently with the cycle path.
      - A differential proves the linked `Env` a cross-phylum reference resolves through is the SAME
        one `PhylumEnv::link` produces (the DRY proof, DN-113 §7) -- if an implementer finds themselves
        writing a second `resolve_imports`, that is the signal the layering was abandoned.
      - Every other named failure mode (unknown dep, unknown/private symbol, version skew, cross-phylum
        name collision) is an explicit `CheckError`/refusal, never a silent winner.
      - `.myc` parity noted, not silently assumed, per the checkty `.myc` port's own progress.
      - Guarantee tags stay `Declared` until this DoD's fixtures/differentials land, then `Empirical`
        (VR-5 -- no upgrade past the checked basis).

