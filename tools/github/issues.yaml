    doc_refs: [corpus:ADR-034, corpus:RFC-0008, corpus:DN-25]
    body: |
      DONE (2026-07-01 resync): PR #843 landed the per-worker-deque work-stealing scheduler this
      issue's DoD requires, with the RT2 differential extended under stealing and the steal policy
      reified per RT3.

      Replace the single shared FIFO VecDeque (scheduler.rs) with per-worker deques + steal-on-empty.
      RFC-0008 RT1/RT2: tasks share no mutable state, so the observable result is order-independent --
      the existing SCHEDULER_RT2_STRENGTH=Empirical differential ("parallel run == spawn-order
      sequential reference") carries over (it asserts result-equality, not scheduling-equality). The
      steal policy (LIFO-own/FIFO-steal, victim selection) is a placement-style decision -> an RT3
      reified, EXPLAIN-able policy (mirroring forage), never silent. Keep stealing SEMANTICS-FREE:
      completion-order + worker-identity stay unobservable, so RT2's deterministic default holds.

      Definition of Done:
      - The RT2 differential is extended to assert result-equality UNDER stealing (property-tested);
        the total backpressure bound (sum of deque lengths <= capacity) stays Exact or is honestly
        downgraded with the reason; the steal policy is EXPLAIN-able (RT3). just check green; honest tag.

