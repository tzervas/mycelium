  # ---------------- 2026-06-21: Web phylum (RFC-0022) ----------------
  - id: M-670
    title: "M-670 — feat(web): build the mycelium-web phylum (HTTP client/server/routing/JSON) per RFC-0022"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:stdlib, priority:P2, status:blocked]
    depends_on: [M-657, M-659, M-666, E7-3, E7-4]
    evidence_pr: 345
    evidence_date: 2026-06-21
    landed_basis: "status:blocked (NOT done) — evidence is a REFERENCE/partial, not a completed landing; git log ea112bb (2026-06-21) 'docs(rfc-0022): draft Web-Tooling Phylum + research RECORD (M-670, RP-10)'; merged-PR-list #345 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0022, corpus:RFC-0016, corpus:RFC-0008]
    body: |
      **Wave-2:** built on head `claude/head/dogfood-build` (kickoff `dfb`).
      **✅ RP-10 research gate CLEARED (dfr, 2026-06-21).** Discharged at design-soundness — all four obligations sound vs primary specs (RFC 9110/9112, RFC 8259, WHATWG-URL), no falsification (`research/12-web-phylum-RECORD.md` §8); RFC-0022 **RATIFIED → Accepted (2026-06-21, maintainer)** — design agreed; Enacted gated on this build. **Ratified calls:** `web.server` runs on the Mycelium runtime (realization `mycelium-mlir::runtime`, no external executor); IDNA pinned at build (policy fixed — nontransitional, fail-closed); HTTP/2-3 + TLS + smuggling-model = v1 non-goals. The research dependency is discharged; the build's remaining block is **E7-1/E7-2 only** (M-657/M-659/M-666). **Build constraints (full list: `research/12-web-phylum-RECORD.md` §8.3):** never-silent located errors (byte-offset + field; no sentinel/partial); take the RFC-9112 *reject* branch at every fork (obs-fold, CL+TE, invalid request-line; CL+TE/dup-CL ⇒ explicit Err); strict CRLF + chunk-size overflow guard; a **versioned, reified IDNA/UTS-46 table** (pin a Unicode version, nontransitional, fail-not-best-effort — WHATWG leaves it unpinned); `web.json` **zero codec outside `std.io`** + non-finite-f64 refusal + decode `Empirical` (carry `no_op_is_proven_without_a_checked_theorem`); **RT2 differential** (interpreter-vs-AOT, ≥3 seeds, zero divergences, non-vacuity guard) carrying `kahn_determinism_is_empirical_not_proven`; `RouteMatch` per dispatch + ambiguity ⇒ `CheckError` at construction (a value, not a panic). Carry-forward (NOT this build's gate; §8.4): cross-peer smuggling model, HTTP/2-3, TLS, streaming backpressure, wall-clock time, RT3.
      build the `web` phylum (Rust-first `mycelium-web`): nodules web.http / web.json / web.route / web.server / web.client per RFC-0022. **BLOCKED** on E7-1 (M-657 generics, M-659 traits — the typed `Json<T>` handler surface) + E7-2 (M-666 `hypha`/`colony` — the `colony { hypha … }` server surface). v1 Rust-first; honest guarantee matrix (never `Proven` without a checked basis); never-silent throughout (G2).
      SHELVED (2026-06-23, maintainer re-sequencing): dogfooding waits behind the L1 surface-completeness wave — E7-3 (HOF), E7-4 (comment-preserving mycfmt), E7-5 (operator syntax). Building real apps is what most exercises these surface gaps; resume `dfb` once the surface is complete + ergonomic. status stays blocked.
      RE-SHELVED (2026-07-05, maintainer decision): deferred until after boot10 (the self-hosting/comprehensive-dogfooding kickoff) and the public flip (flp Stage 1); status stays blocked; revisit at the flip milestone.

