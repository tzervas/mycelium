        caught automatically (never-silent — G2).
      Issues to resolve:
      - Resolve the dependency-license policy (ADR-022 §8 Q2): keep allowing Apache/BSD for third-party Rust
        deps vs tighten — distinct from the first-party MIT rule.
      - Add the enforcement check (cargo-deny [licenses] over first-party crates, or a script) without
        mistaking the mycelium-proj SPDX parser's example data for project policy.
      Definition of Done:
      - A CI gate (in just check) fails on any first-party artifact whose license is not MIT.
      - ADR-023 records the MIT-only policy + resolves the dependency-license question (Q2).
      - No first-party Apache/dual-license remains; the audit is green.

      DONE (2026-07-01, W1-743 leaf): `scripts/checks/license-first-party.sh` added, wired into
      `scripts/checks/all.sh` as a standing gate (index 27, `license-first-party`) rather than a
      one-time sweep. Checks: root `LICENSE` is the MIT text; all 53 in-scope workspace `Cargo.toml`
      manifests declare `license = "MIT"`; shipped `mycelium-proj.toml` phylum manifests are MIT;
      shipped `.myc` `@license` headers declare MIT — with explicit, ADR-023 §3.4-precedented
      exceptions for non-shipped test fixtures/teaching walkthroughs (never a silent skip). The Q2
      dependency-license question was already RESOLVED by ADR-022 §8 (2026-06-23): MIT governs
      first-party only, third-party deps keep Apache/BSD; ADR-023 §3.4 already records the MIT-only
      gate criterion — this issue's own DoD line item was thus already satisfied by prior ADR work,
      confirmed rather than re-decided here. Gate verified green.
  - id: M-870
    title: "M-870 — chore(licenses): third-party attributions + NOTICE generation wired for release"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:release, priority:P2, status:done]
    depends_on: [M-743]
    epic: E17-1
    landed_date: 2026-07-01
    landed_basis: "status:done — THIRD-PARTY-LICENSES.md generated at the repo root via cargo-about (about.toml + about.hbs, both committed for reproducible regeneration): 53 third-party (crate, version) entries across 51 unique crate names in the Rust dependency graph, grouped into 25 unique license-text blocks (MIT x22, Apache-2.0, BSD-2-Clause, Unicode-3.0), each with the crate's actual license text (spot-checked: arrayref/BSD-2-Clause and unicode-ident/Unicode-3.0 texts verified byte-faithful against source). `cargo about generate --workspace --fail` exits 0 (no unresolved license). Companion to M-743 (first-party MIT axis) and deny.toml (which-licenses-allowed axis) — this is the notice-preservation axis those two don't cover. Wired into the toolchain: `just licenses` regenerates (skip-graceful message if cargo-about absent); `scripts/checks/licenses.sh` is a drift gate (component 28 in scripts/checks/all.sh, part of `just check`/`just check-full`) that skip-gracefully passes when cargo-about isn't installed and otherwise fails on staleness or an unresolved license — never a silent gap (G2). FLAG resolved during the work: `command -v cargo-about` does not find the tool here because `cargo install` places it in $CARGO_HOME/bin, which is not on $PATH in this environment (mitigation #3) — the gate probes via `cargo about --version` (cargo's own subcommand dispatch, which does search $CARGO_HOME/bin) instead of a raw PATH lookup. Separately disclosed (not this issue's Rust scope, but the same never-silent principle): experiments/README.md now documents that the optional Python `gpu` dependency-group pulls NVIDIA-proprietary CUDA runtime packages under NVIDIA's own EULA (opt-in only, experiments-only, never redistributed)."
    doc_refs:
      - corpus:ADR-022
      - corpus:ADR-023
      - src:THIRD-PARTY-LICENSES.md
      - src:about.toml
      - src:about.hbs
      - src:scripts/checks/licenses.sh
      - src:experiments/README.md
    body: |
      The audit behind M-743 (first-party MIT-only) also established that the Rust dependency tree
      is 52-ish third-party crates, all permissive (MIT/Apache-2.0/BSD/ISC/Unicode/Unlicense/CC0/
      MPL-file-level) — `cargo deny check licenses` (deny.toml) is green with zero copyleft
      conflicts. The gap that audit surfaced: no `THIRD-PARTY-LICENSES.md`/`NOTICE` file existed,
      even though MIT/BSD/Apache-2.0 all require the license text to travel with a shipped
      artifact. This issue closes that attribution gap ahead of the public 1.0.0 release.

      User stories:
      - As a downstream consumer of a Mycelium release artifact, I want the third-party license
        notices bundled and readable in one file, so that I can confirm my own compliance
        obligations without re-deriving the dependency tree myself.
      - As a maintainer, I want the attribution file to regenerate deterministically from
        `Cargo.lock`, so that a dependency bump never silently drifts the notice file out of date.
      - As a contributor evaluating the optional GPU experiment path, I want an explicit,
        honest disclosure that it pulls NVIDIA-proprietary (non-OSI) binaries, so that opting in
        is informed, not accidental (G2).

      Issues to resolve:
      - Which tool generates the attribution file reproducibly? RESOLVED: `cargo-about` (the
        standard tool for this), configured via `about.toml` (accepted-license allow-list mirroring
        `deny.toml`) + a custom Markdown `about.hbs` template (the stock template emits HTML).
      - Should the drift check gate `just check` or only `just check-full`? RESOLVED: it gates
        `just check` too (component 28) — generation is sub-second and the check is
        skip-graceful when cargo-about is absent, so it never blocks an environment without the
        tool installed, matching the `deny`/`doc-index` precedent.

      Definition of Done:
      - `THIRD-PARTY-LICENSES.md` exists at the repo root, enumerates every third-party Rust crate
        with its license identifier and the actual license text (deduped by identical text,
        referenced by SPDX id), and is regenerable from committed config (`about.toml`/`about.hbs`).
      - A `just` recipe regenerates the file (`just licenses`, aliased `just third-party-licenses`).
      - A drift-check script exists (`scripts/checks/licenses.sh`) and is skip-graceful when the
        generator tool is absent.
      - `experiments/README.md` discloses the NVIDIA-proprietary CUDA runtime packages pulled by
        the optional `gpu` dependency-group (opt-in only, experiments-only, never redistributed).
      - `deny.toml` and all first-party licensing are left untouched (this issue is additive).
      - `just` licenses generation verified end-to-end; `markdown.sh`/`links.sh`/`manifest-check.py`
        clean on the touched files.
  - id: M-744
    title: "M-744 — infra: gh-issues-dedup.py — reliable duplicate-issue reconcile (safety net)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:project, priority:P2, status:todo]
    depends_on: []
    epic: E8-1
    doc_refs: [src:tools/github/gh-issues-dedup.py, src:tools/github/RECONCILE.md]
    body: |
      gh-issues-sync.py is designed never to duplicate (matches idmap-number-then-title), but a re-run
      before idmap.tsv is committed has historically created twin issues (#126-129 duplicated
      M-302/M-330/M-342/M-348). gh-issues-dedup.py is the safety net: group issues by task-id
      (M-xxx/Exx-x) + normalized title, pick the lowest-numbered canonical, and (dry-run by default)
      report; --apply closes the non-canonical OPEN twins (never the canonical), --fix-idmap re-anchors
      idmap.tsv. Landed with a dry-run report + offline --self-test; the --apply path awaits a live,
      token-scoped run.
      User stories:
      - As the maintainer, I want a one-command duplicate report after a sync, so erroneous twins are
        caught before they pollute the tracker.
      - As the maintainer, I want --apply to close only non-canonical twins (never the canonical) with a
        pointer comment, so reconciliation is safe and auditable (G2).
      - As an AI co-author, I want the dedup logic offline-testable (--self-test), so I can trust it
        without a live run.
      Issues to resolve:
      - Validate --apply + --fix-idmap against live GitHub (token-scoped): confirm the close reason /
        comment and idmap re-anchor behave as designed.
      - Decide whether gh-issues-sync.py --all should invoke a post-create dedup pass automatically, or
        keep dedup a separate explicit command.
      Definition of Done:
      - gh-issues-dedup.py exists, ruff-clean, --self-test green (DONE).
      - A live --apply run reconciles a known duplicate set correctly (canonical kept, twins closed,
        idmap re-anchored), every action printed (never-silent).
      - RECONCILE.md documents it (DONE) and the sync -> dedup workflow is recorded.

  - id: E19-1
    title: "E19-1 (epic) -- Kernel self-hosting-enablement surface (value reprs + primitive floor)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:core-ir, priority:P1, status:done]
    epic: E19
    landed_date: 2026-07-01
    landed_basis: "M-863 ratification act (stale-label resync): all children confirmed done -- M-746 (RFC-0032 Accepted), M-747/748/749/750 (enablers), M-751 (closed as a pointer to M-753/E11-1), M-752 (conformance + .myc smoke ports), M-798 (width-cast prim, DN-41 Accepted). This epic's own DoD (RFC-0032 Accepted; each enabler landed with differential tests; the E13-1 unblock demonstrated) is met; the status:in-progress label had simply lagged its already-done children."
    doc_refs:
      - corpus:RFC-0032
      - corpus:RFC-0031
      - corpus:RFC-0001
      - corpus:ADR-022
      - corpus:ADR-024
      - src:crates/mycelium-core/src/repr.rs
      - src:crates/mycelium-interp/src/prims.rs
    body: |
      Dependency direction: E19-1 is a PREREQUISITE OF E13-1 (it unblocks E13-1's blocked tiers), not
      dependent on it -- so no `depends_on: [E13-1]` (that would invert the DAG). The unblock is wired
      the correct way via the E13-1 children's depends_on (M-716 <= M-749, M-717 <= M-750, M-718 <=
      M-747/M-748/M-751). E19-1's only internal gate is its own RFC-0032/M-746.

      MAINTAINER DECISIONS (2026-06-23, recorded for M-746 to ratify in RFC-0032):
      - Q6 (placement) = IN CORE 1.0.0. The new reprs/prims land in the core kernel BEFORE the 1.0.0
        tag, so the language is fully self-hosting at 1.0.0. CONSEQUENCE: this makes E19-1 a core-1.0.0
        gate prerequisite -- the E10-1/c10 "gate-met / tag-ready" status (ADR-022 track T1) now also
        waits on E19-1. FLAG (coordinate, do not edit here): ADR-022 + E10-1 + the c10 kickoff need a
        maintainer update so the core tag accounts for E19-1; this epic does not rewrite that gate
        (append-only, c10-owned).
      - Q5 (width-generics ownership) = E11-1/s10. M-751 (fn f<N>(x: Ternary{N})) is reassigned to the
        s10 surface-language leg (it edits the mycelium-l1 type system); M-751 stays as a pointer.

      The kernel work leg that unblocks E13-1's blocked tiers. RFC-0031 §5 D4 tiered the stdlib
      migration and found Tier-0 (structural/polymorphic core) executable (landed, M-715) but the
      heavier tiers blocked on kernel surface that does not yet exist: Tier-1 (width-typed cmp/Eq/Ord
      + binary math) needs a reduce-to-Bool comparison prim + binary arithmetic (today bit.not/bit.xor
      are surfaced + bit.and/bit.or registered-but-unsurfaced; no comparison or add/sub); Tier-2
      (efficient collections, text/fmt) needs a
      sequence/array value + a byte/string value (the value model Repr = Binary/Ternary/Dense/Vsa has
      neither). These additions ENLARGE the value model / trusted base (KC-3), so the epic is
      DESIGN-GATED by RFC-0032 (M-746) exactly as E13-1 was gated by RFC-0031 (M-714).

      Owned trees (collision profile): crates/mycelium-interp/src/prims.rs (new prims) +
      crates/mycelium-l1/src/checkty.rs::prim_kernel_name (the localized surface map). The value-model
      additions (M-749/M-750) touch crates/mycelium-core and are KC-3-significant -- their core-1.0.0-
      vs-post-1.0.0 placement is an RFC-0032 decision, coordinated with the c10 kernel-T1 ownership.
      Width-generics (M-751) touches the mycelium-l1 type system -- RFC-0032 decides whether it is owned
      here or by E11-1 (s10), to avoid an l1 collision.

      User stories:
      - As a stdlib author, I want the exact set of new prims + reprs named (signature, semantics,
        honest guarantee, never-silent behaviour), so the blocked E13-1 ports have a concrete surface.
      - As a kernel engineer, I want each addition's KC-3/1.0.0 placement decided before mycelium-core
        is touched, so a new Repr does not silently reopen the gate-met value model (ADR-022).
      - As a maintainer, I want each enabler tied to the E13-1 module it unblocks via depends_on, so
        cross-leg continuity rides the issues, never a shared-file edit.

      Definition of Done:
      - RFC-0032 reaches Accepted (M-746): boundary, signatures, KC-3 placement, width-generics
        ownership, and sequencing all decided or explicitly deferred with direction.
      - Each named enabler (M-747..M-750, and M-751 if owned here) lands with differential tests and
        honest tags; never-silent (G2) on overflow/out-of-range/invalid-encoding.
      - The corresponding E13-1 issues (M-716/M-717/M-718) move blocked -> needs-design/in-progress as
        their precondition lands; the unblock is demonstrated by a .myc smoke port (M-752).
      - just check green; CHANGELOG append-only; honest "implemented, pending ratification" framing
        where RFC-0032 is not yet Enacted.

      CLOSED (2026-07-01, M-863 ratification act resync): all children (M-746..M-752, M-798) are
      status:done; this epic's own DoD is met. status:in-progress -> status:done (a stale-label
      correction -- the underlying work landed prior waves, only the epic label had not caught up).

  - id: M-746
    title: "M-746 -- author RFC-0032: kernel self-hosting-enablement surface (the E19-1 gate)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:core-ir, priority:P1, status:done]
    epic: E19-1
    doc_refs:
      - corpus:RFC-0032
      - corpus:RFC-0031
      - corpus:ADR-022
      - src:crates/mycelium-core/src/repr.rs
      - src:crates/mycelium-interp/src/prims.rs
    body: |
      Author RFC-0032 (Kernel Self-Hosting Enablement Surface) to Accepted. The design gate for E19-1:
      resolve the 7 open questions in RFC-0032 §5 -- (1) the comparison/equality prim shape (eq->Bool vs
      cmp->Ordering; over Binary{N}/Ternary{N}; guarantee Exact); (2) binary arithmetic (surface the
      registered bit.and/bit.or + a never-silent carry-chain add/sub vs a declared-wrapping modular add);
      (3) whether an indexed sequence/array Repr is required or the recursive-ADT List covers enough of
      collections (minimal addition); (4) byte/string representation (dedicated Repr vs Seq<Binary{8}> +
      codepoint ops; never-silent invalid-encoding); (5) width-generics ownership (E19-1 vs E11-1/s10);
      (6) KC-3/1.0.0 placement of each addition (core 1.0.0 vs post-1.0.0 vs a non-trusted repr-extension;
      ADR-022 is the gate of record); (7) the implementation sequencing.

      This must reach Accepted before any M-747..M-751 implementation leaf starts -- getting the
      value-model boundary or the KC-3 placement wrong would force a kernel re-do.

      User stories:
      - As a kernel engineer, I want the irreducible "what must the kernel add" set named before I touch
        mycelium-core, so the trusted-base growth is deliberate (KC-3) and gated by ADR-022, not ad hoc.
      - As a compiler engineer, I want the width-generics ownership decided so exactly one work leg edits
        the mycelium-l1 type system (no s10 collision).

      Definition of Done:
      - RFC-0032 §5 open questions all resolved or explicitly deferred with direction.
      - RFC-0032 reaches Accepted (maintainer ratification); status table + Doc-Index + README updated.
      - Each enabler issue (M-747..M-751) has its E13-1 depends_on wired and its scope/owning-crate fixed.

  - id: M-747
    title: "M-747 -- reduce-to-Bool comparison/equality prim over Binary{N}/Ternary{N}"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:core-ir, priority:P1, status:done]
    epic: E19-1
