  - id: M-985
    title: "lex.myc run loop is Cons-after-return (non-tail) — token-count depth ceiling at L1-eval"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P3, status:todo]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:lib/compiler/lex.myc
      - corpus:RFC-0041
      - corpus:DN-26
    body: |
      Minted 2026-07-05 from the PR #1166 /pr-review pass (the Stage-3 HIGH finding's Stage-1
      twin). lib/compiler/lex.myc's token-accumulation loop (run, ~L833-846) recurses once per
      token with the Cons/Ok wrapping AFTER the recursive call returns — not tail position — so
      Mycelium-level call depth scales with the token count of the input, and a large-enough
      source trips the host evaluator's generic DepthExceeded guard rather than completing
      (clean Err, no SIGABRT — RFC-0041's safety goal holds; the ceiling is a scale limit, not
      a crash). Stage 1 never CLAIMED direct-tail for this loop (the claim was introduced by
      Stage 2 for nodule.myc and by Stage 3 for parse.myc, where the Stage-3 loops were
      rewritten accumulator+reverse in PR #1166 itself), but the ceiling was undocumented —
      this issue is the G2 flag. Fix: the same accumulator+reverse direct-tail rewrite the
      Stage-3 patch applied to parse.myc's list-building loops, plus a regression case in the
      Stage-1 gate. Note parse.myc carries its own self-contained lexer copy (FLAG-parse-1),
      fixed in PR #1166; this issue covers the standalone Stage-1 nodule only, so the two
      copies stay shape-identical for the eventual M-982 deduplication.

      User stories:
      - As a compiler engineer working toward M-741 ratification, I want the self-hosted lexer
        to scale to real-file token counts under L1-eval, so that the Stage-6 bootstrap
        (compiler compiles itself) is not capped by an accidental recursion shape.

      Definition of Done:
      - lex.myc's source-length-bounded loops are direct-tail (accumulator+reverse), verified
        by a synthetic large-input regression case in compiler_stage1.rs that failed on the old
        shape; the token-stream differential stays green with zero divergences; the in-file
        recursion-discipline note is updated to the nodule.myc-precision wording;
        change-scoped just check green.
  - id: M-986
    title: "L1 evaluator TCO elides only bare-body self-calls — match/let tail calls never elided (no in-language loop can exceed the depth budget)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:execution, priority:P2, status:done]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-l1/src/eval.rs
      - src:crates/mycelium-l1/tests/compiler_stage3.rs
      - corpus:RFC-0041
      - corpus:DN-26
    body: |
      Minted 2026-07-05 from the PR #1166 review-cycle patch (FLAG-parse-11). The L1 evaluator's
      TCO elides a self-call only when the caller's InvokePost frame is directly on top of the
      CEK stack — i.e. only from BARE-BODY position (the kernel's own spin(n)=spin(n) witness
      shape). A tail call from inside a match arm runs under Frame::MatchPop, from a let body
      under Frame::LetPop (scope-restore frames), so the elision precondition never holds there.
      Probed empirically: a 10,000-iteration match-arm tail countdown trips
      DepthExceeded{limit:4096} with tco_trace().total_elided == 1; same for let-body. Since
      every TERMINATING loop needs a match, no in-language loop shape can iterate past the depth
      budget today — RFC-0041 s7 W7 amendment-11's "10k worklist" goal is currently unmeetable
      for any in-language loop (the amendment's direct-tail-only SCOPE is the right criterion;
      the depth BENEFIT is dormant until this gap lifts). This capped the PR #1166 HIGH fix:
      parse.myc's 27 list-building loops are now accumulator+reverse direct-tail (the READY
      shape), but a 5,000-item source still refuses cleanly. Pinned honestly by
      l1_eval_tco_gap_match_arm_tail_call_is_not_elided and the with_depth(512) known-gap leg of
      parse_myc_many_item_nodule_depth_semantics (both fail loudly when the gap lifts). Fix:
      widen tail position through binder-restoring frames (truncate the scope eagerly before a
      tail call) in eval.rs — a kernel change, correctly FLAGged up by the leaf rather than
      edited (KC-3). Blocking-relevant for DN-26 Stage-5/6 economics and M-984/M-985.

      User stories:
      - As a compiler engineer, I want tail calls inside match/let elided, so that the
        self-hosted frontend's source-length-bounded loops actually run at O(1) depth and the
        RFC-0041 10k-worklist goal is meetable in-language.

      Definition of Done:
      - Match-arm and let-body tail self-calls are elided (the two pinned tests flip: the gap
        pin fails loudly and is updated to assert elision + a >4096-iteration green run);
        RFC-0041's acceptance suite still green; no semantic change to non-tail programs;
        change-scoped just check green; DN-26 gets an append-only note when the lift lands.
  - id: M-987
    title: "L1-eval cost super-linear (~n^3) in token count for the self-hosted parser"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:execution, priority:P2, status:done]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-l1/src/eval.rs
      - src:crates/mycelium-l1/tests/compiler_stage3.rs
      - corpus:DN-26
    body: |
      Minted 2026-07-05 from the PR #1166 review-cycle patch. Evaluating the self-hosted
      parser's parse(src) under L1-eval scales super-linearly with input token count —
      measured (debug build, one eval each): ~200 tokens = 0.6s; 752 tokens = 26.3s; 1,252
      tokens = 133.4s (~n^3 over this range). The parser's own algorithm is linear in tokens
      (single-pass recursive descent, accumulator lists); the blow-up points at per-step value
      copying in the evaluator (value-semantics environment/frame copies), not the .myc source.
      Empirical, environment-dependent numbers — the SHAPE (super-linear) is the finding. This
      is what limits the Stage-3 differential's real-library leg to the 6 smallest stdlib files
      (M-984) and, with M-986, what makes the DN-26 s9 flag-2 interpreted-first bootstrap gate
      impractical at full scale today. Related: M-981 (the L0 interpreter's own scale wall —
      this is the L1-eval analog at one level up).

      User stories:
      - As a maintainer driving the DN-26 Stage-6 bootstrap, I want L1-eval cost near-linear in
        source size, so that the interpreted-first validation gate (s9 flag-2) stays practical
        for compiler-scale .myc programs.

      Definition of Done:
      - The cost curve for parse.myc's parse(src) over the same three sizes is re-measured and
        documented; the dominant super-linear term is identified and either fixed (near-linear
        observed growth over the probe range) or explicitly characterized with a bound and an
        append-only DN-26 note recording the accepted ceiling; M-984's full-tree sweep is
        re-costed against the result; change-scoped just check green.
  - id: M-988
    title: "monomorphize re-inference fails on generic bare Nil that check_nodule accepted (checker/mono parity gap)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P3, status:todo]
    epic: E18-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-l1/src/mono.rs
      - src:lib/compiler/parse.myc
    body: |
      Minted 2026-07-05 from the PR #1166 review-cycle patch. monomorphize's re-inference
      failed on generic bare-Nil call sites (loop_acc(ts, Nil) / rev_acc(acc, Nil)) that
      check_nodule had already inferred and accepted — a checker/mono parity gap: a program
      that type-checks green must not fail later at mono for a type the checker already knew
      (G2-adjacent; the failure is at least explicit, and the error message prescribes the
      workaround). Worked around in-language in parse.myc with explicit `Nil : Vec[T]`
      ascriptions at all 55 sites (check/eval behavior unchanged). Fix: carry or re-derive the
      checker's instantiation at mono re-inference for value-constructor literals of generic
      type, or thread the checked types into mono, so the ascriptions become unnecessary.

      User stories:
      - As a language user, I want a program that passes the checker to pass monomorphization,
        so that generic empty-collection literals do not need ritual ascriptions.

      Definition of Done:
      - A minimal two-fn witness (accumulator + reverse over a generic Vec with bare Nil
        arguments) monomorphizes without ascriptions; the parse.myc ascriptions are removable
        (removal optional, tracked as cleanup); a regression test pins the witness;
        change-scoped just check green.

  - id: M-989
    title: "/myc-dogfood — native-toolchain parity gate for the self-hosted lib/compiler path"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:done]
    epic: E18-1
    depends_on: []
    doc_refs:
      - corpus:DN-26
      - src:scripts/checks/myc-check.sh
      - src:lib/compiler/README.md
    body: |
      Minted 2026-07-06 from the M-740 Stage-4 wave. The self-hosted lib/compiler/*.myc files are
      today vetted only by the Rust cargo-test differential harnesses; the native toolchain also
      accepts them (myc check reports ok on all eight nodules) but lib/compiler/ has no
      mycelium-proj.toml root, so the just myc-check / myc-fmt gates skip it. Persist a repeatable
      /myc-dogfood skill + scripts/checks/myc-dogfood.sh that runs BOTH tool paths over the
      self-hosted tree to ensure parity (two independent witnesses: the old Rust differential AND
      the new native myc). Scope: LIGHT checks that run in the remote env — myc check is the
      blocking core (passes today, per-file; project-level pending the M-982 cross-nodule-execution
      lift); mycfmt / myc-lint / myc-sec run advisory (mycfmt currently refuses lex.myc/parse.myc on
      the M-690 formatter limitation). EXCLUDE heavy VSA / GPU-bound checks — those route to the
      maintainer's local system (session teleport, GPU-assisted), never the remote gate.

      User stories:
      - As a compiler engineer, I want the self-hosted .myc frontend gated by BOTH the Rust
        differential and the native myc toolchain, so that parity between old and new tooling is
        continuously proven as the port grows.
      - As a maintainer, I want the remote gate to stay light and defer heavy VSA/GPU work to my
        local machine, so that CI stays fast and GPU-bound checks run where the hardware is.

      Definition of Done:
      - A /myc-dogfood skill + scripts/checks/myc-dogfood.sh run myc check (blocking) over
        lib/compiler/*.myc and report mycfmt/myc-lint/myc-sec advisory, skipping heavy VSA/GPU work
        with a never-silent note of what was deferred.
      - The gate is wired advisory (non-blocking on the heavy/deferred parts) and documented in
        lib/compiler/README.md; M-690 is filed/linked as the mycfmt-enhancement follow-on.
      - Graduation to project-level myc check (cross-nodule) is tracked against M-982.

  - id: M-990
    title: "AST-serializer bridge (Rust L1 AST -> L1 value) to feed source files through post-parse .myc passes"
    milestone: "Phase 5 — Self-Hosting & Core Library"
