  - id: M-684
    title: "M-684 — spec(rfc-0024): Higher-Order Functions via Static Defunctionalization"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:spec, area:language, priority:P1, status:done]
    depends_on: [M-673]
    epic: E7-3
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, src:lib/std/result.myc]
    body: |
      Author RFC-0024 (Draft -> Proposed): a new RFC superseding RFC-0007 §4.4's "no function values"
      clause for the NAMED-function case (append-only; do not rewrite RFC-0007). Normative content: the
      function type `A -> B` (single-arg v1; multi-arg `(A,B)->C` deferred + flagged); a bare top-level fn
      name as a function value; static-defunctionalization semantics (each HOF call specialized by its
      statically-known fn argument; `f(x)` -> a direct call; L0 stays first-order, no kernel change — KC-3);
      the honesty/scope boundary (closures, dynamic fn-flow, partial application, generic-fn-as-value all
      stay never-silent `Residual`; full Reynolds defunctionalization deferred). Grounding: contracts
      Declared, differential agreement Empirical (VR-5). References RFC-0019 §4.4 (mono as the vehicle).
      Acceptance: RFC-0024 added + Doc-Index row + CHANGELOG; status Draft -> Proposed; no RFC-0007 rewrite.
  - id: M-685
    title: "M-685 — feat(l1): function-type surface `A -> B` + named-fn-as-value (parser + AST)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-684]
    epic: E7-3
    doc_refs: [corpus:RFC-0007, src:crates/mycelium-l1/src/parse.rs, src:crates/mycelium-l1/src/ast.rs]
    body: |
      Add `BaseType::Fn(Box<TypeRef>, Box<TypeRef>)` to ast.rs and extend `parse_type_ref` (parse.rs) to
      consume a trailing `Tok::Arrow` in type position (right-associative; `@` binds tighter than `->`).
      `->`/`=>` are already distinct atomic tokens, and a bare fn name in value position already parses as
      `Expr::Path` — so this is a localized, additive parser change; the checker (M-686) gives the meaning.
      Single-arg arrow only in v1 (multi-arg deferred — FLAG). Serial-on-L1 (shares ast.rs/parse.rs with the
      rest of E7-3 and with E7-4's optional anchoring fallback). Acceptance: `f: A -> B` parses to
      `BaseType::Fn`; `map(mk_ok(), double)` parses with `double` as `Path`; conformance corpus green.
      landed on main via #397 squash-merge (2026-06-23)
  - id: M-686
    title: "M-686 — feat(l1): checker — `Ty::Fn`, fn-value typing, higher-order application, inference"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-685]
