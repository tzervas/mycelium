    body: |
      DRY leaf (owns only `crates/mycelium-l1/src/{elab.rs,totality.rs,usefulness.rs,decision.rs}`). Two confirmed duplications: (a) the full Expr traversal exists twice — `totality.rs:133` `walk(e,f)` and the 10-arm `elab.rs:400` `collect_calls` re-walk every variant identically; extract ONE shared `walk_expr(&Expr, &mut impl FnMut(&Expr))` (or `pub(crate)` in ast.rs) and express both `collect_calls` over it. (b) `specialize_ctor`/`specialize_lit` are duplicated row-for-row between `usefulness.rs:62/85` (over `Vec<Pat>`) and `decision.rs:239/262` (over `Row`); parameterize on the row type so one implementation serves both. Behaviour-preserving: same call-set collected, same matrix specialization; totality/usefulness/decision verdicts unchanged.
