  - id: M-918
    title: "DN-54 derive-site consumption-model dossier — RESOLVED: DN-71 Model S"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:language, priority:P1, status:done]
    epic: E30-1
    depends_on: []
    landed_date: 2026-07-02
    landed_basis: "docs/notes/DN-71-Substrate-Consume-Execution-Model-Confirm-Memo.md — Model S, maintainer-ratified 2026-07-02 (via kickoff `enb` M-901)"
    doc_refs:
      - corpus:DN-54
      - src:docs/notes/DN-71-Substrate-Consume-Execution-Model-Confirm-Memo.md
    body: |
      Minted 2026-07-02 (kickoff `grm`, Phase-I H2a) — ALREADY RESOLVED at minting. The kickoff
      table scoped this as an options + recommendation dossier from the M-824 §10 design-pass,
      with an `enb` M-901 cross-check ("the two kickoffs must not fork the model"). That
      resolution landed first: the consume model was ratified 2026-07-02 as DN-71 Model S (via
      `enb`'s M-901 memo), so no separate grm dossier is needed — do NOT fork the model. M-919
      enacts DN-71 Model S in the extension-checker. Deviation from the kickoff table recorded
      here: the table's depends_on (M-917, audit input) is mooted by the ratified decision, so it
      is dropped (transparency over literal fidelity — G2). Model: Sonnet (not spawned).

      CORRECTION (2026-07-02, integration reconcile — house rule #4 grounding): the title/mint
      CONFLATED two DISTINCT constructs. DN-71 "Model S" is the **Substrate/consume affine
      execution model** (ratified via `enb` M-901; enacted in the extension-checker by M-919). It
      is NOT the DN-54 §10 **attachment model** (how derived/lowered sibling items attach), which
      is a separate decision — resolved as **Model A (sibling-item injection)** in the DN-81
      dossier and enacted by M-973. So "DN-54 derive-site consumption-model = DN-71 Model S" was
      wrong: derive-site *attachment* (DN-54 §10 / DN-81 / M-973) and *affine-consume* (DN-71 §7 /
      M-901 / M-919) are different constructs that merely both touch the lower/derive surface. Both
      are now landed; this record is corrected, not re-scoped (the work M-918 tracked — no separate
      grm consume-model fork — still stands; only the DN-71↔DN-54§10 equation is retracted).

      User stories:
      - As the maintainer, I want the consume-model choice laid out with tradeoffs, so that I
        ratify a grounded design, not a default. (Satisfied by DN-71 Model S.)

      Definition of Done:
      - Dossier with options, evidence, recommendation, and the `enb` M-901 cross-check (same
        model — FLAG if they diverge); decision requested. MET BY: DN-71 Model S (ratified
        2026-07-02) — one model, no fork.

