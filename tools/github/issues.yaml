      - corpus:DN-25
    body: |
      RE-GATED INTO lang 1.0.0 by ADR-034 (2026-06-30, maintainer-ratified): native AOT (E15-1) is a
      HARD lang-1.0.0 gate row, scope expanded to FULL-LANGUAGE native-codegen coverage. This epic is
      the umbrella for the coverage-widening increments, the perf/parallelism extension, and the
      ratification act. It does NOT replace E15-1 (waveN2 M-725..M-729 stay; they are subsumed under
      ADR-034's expanded DoD); it carries the new work.

      Honest base state (verified 2026-06-30, PRE-WAVE -- the state this epic was scoped against;
      superseded by the refresh below, kept for the historical record): crates/mycelium-mlir is
      landed on main and BUILDS clean; direct-LLVM (llvm.rs) covers bit/trit + non-recursive
      Construct/Match + Binary{8} closures + tail-only Fix, and REFUSES (never-silent) Swap /
      FixGroup / non-tail Fix / wide-curried closures / Dense / VSA. MLIR-dialect (native.rs,
      feature mlir-dialect, libMLIR-gated per ADR-019) covers bit/trit + trit.add/sub, refuses
      trit.mul + data + recursion + Swap + Dense/VSA. The interpreter is the trusted-base reference
      throughout (ADR-007/NFR-7); the native path is the perf layer.

      Base-state REFRESH (2026-07-01, integration close-out -- honest supersession of the pre-wave
      paragraph above, VR-5): after M-850..M-858, direct-LLVM now additionally covers non-tail
      Fix + FixGroup (heap trampoline, M-850), closures over any repr/width + currying (M-851),
      certified binary<->ternary Swap (M-852), un-quantized Dense element-wise (M-853), and
      MAP-I/BSC/HRR/FHRR VSA bind/unbind/bundle/permute/similarity (M-854) -- each Empirical via a
      checked three-way differential, never Proven beyond the one checked single-op MAP-I capacity
      bound (M-854). MLIR-dialect additionally covers trit.mul (M-857) and Construct/Match + Swap
      (M-856); it STILL REFUSES Dense/VSA (tracked as the new **M-856b**). A JIT path for dynamic
      VSA/HDC now exists (M-855, cleanup/resonator loops deferred). The remaining never-silent
      refusal surface is materially smaller than the pre-wave paragraph describes, but is NOT
      empty: M-856b's dialect Dense/VSA gap, JIT cleanup/resonator loops, and whatever M-860's
      parallel-codegen and M-862's parallel-eval increments still gate on. Read the pre-wave
      paragraph as "why this epic exists", not "current state" -- this paragraph is current as of
      2026-07-01.

      User stories:
      - As a language user, I want the native AOT to compile the WHOLE language (closures, recursion,
        Swap, Dense, VSA), so that 1.0.0 is fully featured natively, not only on the interpreter.
      - As a maintainer, I want every coverage increment carried by a checked three-way differential
        (interp == AOT == JIT), so that native correctness is by construction, never by assertion.
      - As a performance-sensitive user, I want demonstrated single- and multi-core scaling with
        honest Empirical numbers, so that "performant" is measured, not claimed.

      Definition of Done:
      - All E25-1 children (M-850..M-863) done with checked three-way differentials + honest tags.
      - Every remaining unsupported fragment (if any) is an explicit never-silent refusal routed to
        the interpreter (G2) -- no silent miscompile.
      - RFC-0029 -> Enacted; DN-15 -> Resolved; ADR-034 -> Enacted with ADR-022 at the lang 1.0.0 tag.
      - M-738 (lang 1.0.0 release act) depends_on E15-1; the tag waits on full native coverage.

      PROGRESS (2026-06-30, manifests resync): 6 of 14 children landed `done` with checked
      three-way differentials -- M-850 (recursion trampoline, PR #818), M-851 (closure-ABI widening,
      PR #821), M-852 (Swap codegen, PR #823), M-853 (Dense codegen, PR #824), M-854 (VSA codegen,
      PR #825), M-857 (trit.mul dialect, PR #820). REMAINING (still `ready`/`needs-design`, none
      started this wave): M-855 (dynamic-VSA JIT), M-856 (dialect catch-up for Construct/Match/Swap/
      Dense/VSA), M-858 (unified mutant-witnessed three-way differential across all new fragments),
      M-859 (bench scaling + regression gates), M-860 (parallel codegen), M-861 (scheduler
      work-stealing), M-862/M-863 (post-tag-cautious perf eval + ratification act). The DoD's
      "RFC-0029 -> Enacted / DN-15 -> Resolved / ADR-034 -> Enacted" bullet stays unmet -- RFC-0029
      and RFC-0039 both stay Accepted (not Enacted) per house rule #3 (Enacted requires the full path
      complete + stable, not a partial landing); DN-15's Draft->Resolved judgment is FLAGGED in this
      resync's report, not unilaterally decided. status:in-progress (was todo) reflects the partial
      landing honestly -- not done, not unstarted.

      PROGRESS (2026-06-30, integration close-out resync): 3 more children landed `done` since the
      prior resync -- M-855 (dynamic-VSA JIT, PR #848; cleanup/resonator loops explicitly deferred),
      M-856 (dialect catch-up for Construct/Match + Swap, PR #850; Dense/VSA-dialect split out as
      the new **M-856b**, not silently dropped -- G2), M-858 (unified mutant-witnessed three-way
      differential, PR #851; closed the 5 dialect mutant survivors M-856 introduced, earning the
      codegen Empirical basis). Also landed this wave: a stale bench capability-loss assertion fix
      (PR #849, noted under M-859) correcting Swap's classification post-M-852. REMAINING OPEN:
      M-856b (Dense/VSA through the dialect, new), M-860 (parallel codegen), M-862/M-863
      (post-tag-cautious perf eval + ratification act). FLAG: M-859 and M-861 carry `landed_pr`
      merges (PR #845, #843) per git history but this manifest still shows their pre-existing
      `status:ready` -- a gap from the prior resync this agent did not unilaterally resolve (out of
      this close-out's explicit scope; flagged for the next resync/maintainer, not silently carried
      forward as fact). DoD's Enacted/Resolved bullet stays unmet for the same house-rule-#3 reason
      as above.

      PROGRESS (2026-07-01, Wave-1 reconciliation close-out): 3 more children landed `done` --
      **M-856b** (Dense/VSA through the dialect path, W1-AOT-856b-860 leaf), **M-860** (parallel
      per-function AOT codegen, same leaf, reworked onto the native scheduler -- see below), and
      **M-862** (parallel pure-fragment interpreter eval, W1-862 leaf, landed PRE-tag -- the
      maintainer decided pre/post-tag at this PR, per the issue's own flagged open question). A
      previously-UNTRACKED landing enabled two of these: the M-861 work-stealing Scheduler was
      RELOCATED to a new foundational crate, `mycelium-sched`, below `mycelium-interp` (PR #864),
