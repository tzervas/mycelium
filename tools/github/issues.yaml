    body: |
      RFC-0008 §4.6 R2 covers the distribution vocabulary: `xloc` (explicit value movement across nodes), `mesh` (gossip/pub-sub overlay — RT5, probabilistic guarantees), `cyst` (content-addressed checkpoint of a dormable computation — RT2), `graft` (capability contract with external infrastructure — RT4), `forage` (adaptive placement policy — RFC-0005 site), `backbone` (declared high-bandwidth transport path — RT3). None have implementation RFCs yet; RFC-0008 §4.5 status rule requires each to have its own implementation RFC committing typing + elaboration. This planning issue produces the R2 decomposition: a design note or DN-11 append splitting R2 into per-construct implementation RFCs, with explicit dependency ordering, honesty bounds (probabilistic guarantee tags for `mesh` per RT5/T4.2, fallible typing for `xloc` per RT4), and gate conditions.
      Acceptance: a design note (or DN-11 append) decomposing R2 into per-construct implementation RFCs with explicit gates and honest guarantee tags; each R2 term's typing + elaboration strategy sketched (sufficient for a future implementation RFC); R2 explicitly gated on R1 completion (M-667); CHANGELOG entry.

