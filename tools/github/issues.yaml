  - id: M-847
    title: "M-847 -- Inject enforcement granularity + scope resolution + deviation manifest (RFC-0038 §8.4-§8.7)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:execution, priority:P2, status:needs-design]
    depends_on: [M-836, M-838, M-840]
    doc_refs:
      - corpus:RFC-0038
      - corpus:RFC-0034
      - corpus:DN-64
    body: |
      DN-64 §7 OQ-K/M/O refinement (maintainer direction 2026-06-29, RFC-0038 §8.4-§8.7): make the
      inject/signing security posture an ergonomic, developer-adjustable spectrum — not per-call by default.
      As a Mycelium developer, I want to set the signing/verification posture (mode x enforcement
      granularity) once at a scope and have it auto-apply, with easy granular override, so that security/
      provenance/performance is tunable without being overbearing.
      Direction (Declared): (1) an ENFORCEMENT-GRANULARITY axis orthogonal to loose/inoculated —
      `whole` (application/spore signature, checked once at compile/load; the application DEFAULT, not
      per-call), `module` (per-phylum/nodule), `call` (per-dispatch; opt-in trusted-computing extreme);
      (2) a SCOPE-RESOLUTION hierarchy (global > project > colony > module > nodule > function > line) with
      inward resolution + AUTO-DECORATION (set-once-applies-beneath) + granular OVERRIDE; (3) a never-silent
      DEVIATION MANIFEST (G2) — the declared default plus an enumerated list of sites that differ, EXPLAIN-able;
      (4) DEFAULTS by project kind/maturity (scripts/interpreted/early -> loose; library -> inoculated/module;
      application -> inoculated/whole; trusted-computing -> inoculated/call opt-in); (5) interpreted defaults
      loose with opt-in per-inject signing (private key signs, TrustRoot public key verifies; BadSignature
      on mismatch); (6) per-colony posture in a mesh (own TrustRoot). Gives M-838 (OQ-M scoping) its shape.
      DoD: RFC-0038 §8.4-§8.7 ratified; the config surface + resolution algorithm chosen (the residual R&D
      under §K.2/§M); the granularity/scope/override + deviation-manifest realized Rust-first; never-silent.

      INTEGRATOR NOTE (2026-07-02, integration-reconcile): the Phase-I `frz` wave built ONLY the
      `whole` enforcement grain (RFC-0038 §8.4/§8.6) via M-961 (DN-77 §4 confirmed subset;
      Declared->Enacted for that slice). This issue COORDINATES WITH — it is NOT duplicated by —
      that built subset: M-847 remains the fuller design (the `module`/`call` grains, the full
      scope-resolution hierarchy + auto-decoration + override, and the never-silent deviation
      manifest), which M-961 deliberately left `Declared`/unbuilt. Stays `needs-design`.
  - id: M-848
    title: "M-848 -- Scoped-toolchain setup automation (just setup-scoped) per DN-65"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:infra, area:toolchain, priority:P3, status:in-progress]
    depends_on: []
    doc_refs:
      - corpus:DN-65
      - src:justfile
    body: |
      DN-65 §2.3 automation: turn the change-kind -> toolchain map into a runnable workspace-prep step.
      As an agent (or contributor) about to work a scoped PR, I want one command that determines which
      toolchain components my change-kind needs beyond the default and installs exactly those, so that I
      have the right tools for the work with no mid-flight surprises.
      Direction: a `just setup-scoped <profile>` recipe (or a per-kind probe) that, given the change scope
      (rust / python / docs / proofs / mixed), emits + runs the precise setup commands (cargo-nextest/
      cargo-public-api; uv sync --group <g>; markdownlint + doc_refs; z3/LH/Lean), layered on `just setup`.
      Pairs with the sync-off-tip step (already a standing rule). Never-silent: prints what it installed/
      skipped + why.
      DoD: the recipe lands; DN-65 §2.3 references it; a scoped PR's agent can prep its env in one step.

      MARKER (2026-06-30, manifests resync, status todo/needs-design -> in-progress): a sibling
      toolchain agent was reported (this wave) to be making the setup tooling idempotent/auto-installing
      so differentials are non-vacuous without changing test semantics (see CHANGELOG.md "toolchain
      made idempotent/auto-installing (M-848)" methodology-resolution note). NO `claude/leaf/E25-toolchain`
      (or equivalent) branch, commit, or `just setup-scoped` recipe was found in `origin` at the time of
      this resync (`git ls-remote origin` checked 2026-06-30; `justfile` has no `setup-scoped` target
      yet) -- so this status move records that the work is reported in-flight, NOT that it has landed.
      FLAGGED for the maintainer: confirm whether the sibling toolchain agent's branch was pushed
      elsewhere / under a different name, or is still local-only / not yet started.
  - id: M-849
    title: "M-849 -- Colony trust topology: controller / masterless / node invalidation (RFC-0038 §8.8)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:execution, priority:P3, status:needs-design]
    depends_on: [M-842, M-847]
    doc_refs:
      - corpus:RFC-0038
      - corpus:RFC-0008
      - corpus:DN-44
    body: |
      RFC-0038 §8.8 (maintainer direction 2026-06-29): a configurable mesh trust topology generalizing
      cross-colony own-TrustRoot verification (§7.2) into mesh-level trust distribution.
      As an operator of a colony mesh, I want to choose how trust is distributed — a central controller
      (or redundant controller stack, regionally partitioned, for enterprise-scale central management) or
      a fully masterless self-managed mode where each colony trusts against its own store — and to flag/
      blacklist nodes that break trust, so that safe AI-mesh auto-development stays auditable.
      Direction (Declared): (1) CONTROLLER mode — one+ controller colonies distribute the TrustRoot; a
      controller stack gives redundancy + scaling; configurable in the mesh; (2) MASTERLESS mode — each
      colony resolves trust against its own internal store on its own authority; (3) NODE INVALIDATION —
      flag + blacklist a node permanently/temporarily (config), as an inspectable never-silent decision.
      Framed by the no-black-box inspectability thesis (reveal/EXPLAIN/provenance). Open infrastructure
      R&D: controller protocol, trust-propagation, blacklist scope/TTL, masterless<->controller transition;
      extends RFC-0008 mesh + R8-Q4 adversarial mesh.
      DoD: RFC-0038 §8.8 ratified; controller protocol + blacklist semantics specified; realized atop the
      RFC-0008 mesh model; every trust decision EXPLAIN-able + provenance-tagged (never-silent).
  - id: E26-1
    title: "E26-1 (epic) — Networked spore registry: GHCR/OCI dense-map distribution + registry dogfood"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:toolchain, priority:P1, status:done]
    landed_basis: "status:done (2026-07-01) — M-871 done: the remote backend landed (mycelium-spore::remote) and the DOGFOOD is live: example phyla hello + std published to ghcr.io/tzervas/{hello,std}:0.0.0-dogfood and resolved back with hash-verified, byte-identical spore_ids (local registry:2 AND live GitHub Packages). ADR-037 Enacted. One disclosed v0 gap: remote name@version immutability not yet enforced (M-872). just check green; tags Empirical/Declared (VR-5)."
    depends_on: [M-732]
    epic: E26
    doc_refs: [corpus:ADR-037, corpus:DN-28, corpus:ADR-013]
    body: |
      Give the spore registry a networked home so Mycelium's packaging units (phylum / nodule /
      spore) are installable without crates.io, hosted in the GitHub Packages container registry
      (GHCR) — and use that publish path as a live dogfood of the registry design (DN-28) and
      implementation (mycelium-spore), per the maintainer release strategy (ADR-036). The remote
      backend distributes the DN-28 dense-map over OCI (each content-object -> one deduped OCI blob;
      the dense-map DAG -> the OCI config; name@version -> the OCI tag), fixed by ADR-037.

      User stories:
      - As a phylum author, I want `spore publish --registry ghcr://<owner>` to host my phylum in
        the GitHub Packages registry, so that users install it by name+version without crates.io.
      - As a downstream developer, I want `spore resolve <name> <version> --registry ghcr://<owner>`
        to fetch a hash-verified spore, so that what I install is exactly what was published (G2).
      - As the maintainer, I want the real example phyla published to GHCR before the repo flips
        public, so that the registry design + implementation are proven operational on a production
        registry (the dogfood), not just asserted.

      Issues to resolve:
      - Whole-spore artifact vs per-object dense-map? RESOLVED (ADR-037): DN-28 dense-map (per-object
        OCI blobs, deduped) — the point of the dogfood is to exercise the dense-map design.
      - Wire transport: pure-Rust OCI client vs a driver? RESOLVED (ADR-037): `oras` is the v0 driver
        behind an `OciTransport` trait; a pure-Rust client is append-only future work.

      Definition of Done:
      - M-871 done: remote backend (dense-map encode/decode, build/verify/reconstruct, OciTransport +
        oras driver + in-memory double, publish_remote/resolve_remote) lands never-silent (G2), tags
        Empirical/Declared; `spore publish/resolve --registry oci://|ghcr://` route by scheme.
      - Round-trip verified against a local OCI registry AND a live GHCR publish->resolve of the
        example phyla (the dogfood); ADR-037 -> Enacted on that basis.
      - just check green; guarantee tags honest (VR-5); property test per bound.

      Children: M-871 (remote spore registry backend — DN-28 dense-map over GHCR/OCI).
  - id: E27-1
    title: "E27-1 (epic) — Phase-I H0: acyclic-deps enforcement + workspace hygiene"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:toolchain, priority:P1, status:done]
    depends_on: [M-866, M-877, M-878, M-879, M-880, M-881, M-882, M-883, M-884, M-885, M-886]
    epic: E27
    doc_refs: [corpus:ADR-038, corpus:DN-68]
    body: |
      EPIC (Phase-I H0, ADR-038 §2 / roadmap §2 "Foundations"). Make the workspace's acyclic,
      downward-only dependency structure enforced by construction: a structural gate (`cargo xtask deps`,
      wired into `just check`) that goes red on an introduced cycle (normal or dev), an upward-tier edge,
      or an `interp -> std-*` edge, and green on clean state. Resolve the known dev-dep cycles, extract
      the `mycelium-rt-abi` runtime-ABI seam (removing the `mlir -> std-runtime` upward edge), verify the
      `publish = false` sweep, author the invariant note (DN-68), and fix the `mono.rs` recursion bound.

      User stories:
      - As a contributor, I want an introduced upward/cyclic dependency to fail `just check` naming the
        offending edge, so that the acyclic architecture cannot erode silently (G2).
      - As the maintainer, I want the KC-3 trusted-base boundary (interp free of std-*) machine-checked.

      Definition of Done: the structural gate rejects regressions and passes clean state (proven by
      negative fixtures); zero dev-dep cycles at HEAD; mlir no longer depends on std-runtime;
      publish = false workspace-wide; DN-68 authored; M-866 bounded with a property test.

      DONE (2026-07-02, kickoff `acy`): all leaf tasks M-877..M-886 + M-866 landed (PRs #935/#936);
      cargo xtask deps = 0 violations; DN-68 authored (Draft); DN-66 §6 currency note appended.
  - id: M-871
    title: "M-871 -- feat(spore): remote registry backend — DN-28 dense-map over GHCR/OCI (ADR-037)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P1, status:done]
    landed_basis: "status:done (2026-07-01) — crates/mycelium-spore/src/remote.rs: DenseMap encode/decode (injective, byte-cursor strict parser, proptest round-trip + injectivity + adversarial), build_dense_map, verify_and_reconstruct (every object BLAKE3-checked, spore_id recomputed via canonical content_address; missing/extra/duplicate/tamper/id-mismatch all explicit Integrity errors, G2), OciTransport trait + OrasTransport (subprocess; oras-absent -> ToolMissing, never silent) + MemTransport double, parse_registry (scheme routing), publish_remote/resolve_remote (exact + latest; range -> Unsupported), RemoteError (exit-coded). CLI routes publish/resolve by --registry scheme; remote resolve -o materializes the verified tree. 57 unit tests + 1 ignored (live-oras); fmt/clippy -D warnings clean. VERIFIED: local registry:2 AND live GHCR round-trip (ghcr.io/tzervas/{hello,std}). No new runtime dep (KC-3). Disclosed v0 gap: remote immutability check deferred to M-872."
    depends_on: [M-732]
    epic: E26-1
    doc_refs:
      - corpus:ADR-037
      - corpus:DN-28
      - corpus:ADR-013
      - src:crates/mycelium-spore/src/remote.rs
    body: |
      Implement the ADR-037 remote/networked backend for the spore registry: a published spore is an
      OCI 1.1 artifact in GHCR (ghcr.io/<owner>/<phylum>:<version>), decomposed into the DN-28
      dense-map — each source object is its own BLAKE3-addressed OCI blob (deduped by digest across
      versions), the dense-map DAG is the OCI config blob, name@version is the OCI tag. `oras` is the
      v0 wire-transport driver behind an `OciTransport` trait (pure-Rust client is future work).

      As a phylum author, I want to publish/resolve spores against GHCR by name+version, so that
      distribution needs no crates.io and every fetch is hash-verified end-to-end.

      Fetch-and-verify is mandatory + never-silent (G2): on resolve every object's bytes must BLAKE3
      to its declared content address AND the reconstructed DAG must recompute (via the single
      canonical `mycelium_spore::content_address`) to the recorded spore_id; a missing object, a
      byte-mismatch, an extra layer, or a spore_id mismatch is an explicit error. A SemVer range stays
      Unsupported (ADR-018 deferred), never mis-resolved. No new runtime dependency (KC-3): the
      dense-map is a hand-rolled injective length-prefixed encoding with a strict parser; the
      transport shells to `oras` (absent -> explicit ToolMissing error, never a silent skip).

      Definition of Done:
      - `crates/mycelium-spore/src/remote.rs`: DenseMap encode/decode (injective, strict, property-
        tested + adversarial), build_dense_map, verify_and_reconstruct, OciTransport trait + oras
        driver + in-memory test double, parse_registry (scheme routing), publish_remote/resolve_remote,
        RemoteError (exit-coded, never-silent).
      - `spore publish/resolve --registry oci://|ghcr://` route to the remote backend by explicit
        scheme; a bare path keeps the M-732 local store. resolve -o <dir> materializes the verified tree.
      - Tests green: encode/decode round-trip + adversarial proptest; verify/tamper/missing cases;
        publish->resolve via the in-memory double (exact + latest); range -> Unsupported. A live-oras
        integration test is #[ignore]d (orchestrator runs the local + GHCR round-trip).
      - cargo fmt / clippy -D warnings / test -p mycelium-spore green; tags Empirical/Declared (VR-5).
  - id: M-872
    title: "M-872 -- feat(spore): enforce name@version immutability on remote (OCI) publish"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    landed_basis: "status:done (2026-07-01) — publish_remote gained a best-effort immutability pre-check: list_tags -> pull -> compare spore_id; a DIFFERING re-publish under an existing name@version is refused as RemoteError::Conflict (exit 6), an identical re-publish is idempotent, a first publish proceeds. Grounded oras error classification (registry:2 AND GHCR verified 2026-07-01: 'name unknown'/'not found' -> NotFound; auth errors stay Transport, never read as 'nothing published' — G2). Honest ceiling (Declared, VR-5): OCI tags are server-side mutable, so this is a client-side guard, not a proven server invariant. 59 unit tests (2 new immutability cases) + live-verified against a local registry:2. cargo fmt/clippy -D warnings/test green."
    depends_on: [M-871]
    epic: E26-1
    doc_refs:
      - corpus:ADR-037
      - src:crates/mycelium-spore/src/remote.rs
    body: |
      Disclosed v0 gap from M-871 (ADR-037 §Status / §5): the LOCAL spore registry (M-732) refuses to
      republish a DIFFERENT artifact under an existing name@version (immutability, RegistryError::Conflict),
      but the REMOTE (OCI/GHCR) backend does not yet — OCI tags are mutable by default and publish_remote
      pushes unconditionally. RemoteError::Conflict is defined but currently unconstructed.

      As a phylum consumer, I want a published name@version to be immutable on the remote too, so that a
      resolve returns the same bytes tomorrow as today (supply-chain integrity, ADR-003).

      Approach (best-effort, never-silent): before pushing, check whether the tag already exists (via
      OciTransport::list_tags on the repo); if it does, pull + decode its dense-map and compare spore_id —
      identical => idempotent (skip/allow), different => RemoteError::Conflict (refuse, G2). Honest caveat:
      OCI tags are server-side mutable, so a client-side check is best-effort (a racing client could still
      overwrite) — document that ceiling (Declared), never overclaim it as Proven immutability. Distinguish
      "repo/tag absent -> proceed" from a real transport error -> propagate (no silent swallow).

      Definition of Done:
      - publish_remote refuses a conflicting re-publish with RemoteError::Conflict; an identical re-publish
        is idempotent; a first publish is unaffected. Tests via MemTransport (+ an #[ignore]d live case).
      - The best-effort ceiling is documented (Declared, not Proven). cargo fmt/clippy/test green.
  - id: M-873
    title: "M-873 -- feat(transpile): Rust→Mycelium transpiler PoC (existing surface + gap-report)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: [M-719]
    epic: E18-1
    doc_refs:
      - corpus:DN-34
      - corpus:DN-26
      - src:docs/planning/dogfooding-effort-and-usage-assessment.md
      - src:crates/mycelium-transpile/src/transpile.rs
      - src:crates/mycelium-transpile/src/gap.rs
    body: |
      Kickoff `trx` (.claude/kickoffs/trx.md). Get a Rust→Mycelium transpiler working against the
      LANGUAGE SURFACE THAT ALREADY EXISTS (do not wait for full maturity): emit what the current
      surface expresses, FLAG what it cannot (never guess, G2). Use it to partially implement the 26
      Rust mycelium-std-* crates, and produce the prioritized surface-feature backlog (the union of
      gap-reports) as a first-class output — grounding E18-1's needs-design work with real demand data.

      As a maintainer accelerating self-hosting, I want a transpiler that turns each Rust stdlib crate
      into a best-effort Mycelium port + an exact inventory of the language features still missing, so
      that the dogfooding rewrite is both accelerated and demand-prioritized.

      The cheap design (diff against known-good): the core-lib slice already has hand-written .myc twins
      (M-714-719: lib/std/{cmp,option,result,iter,collections,text,fmt,math}.myc). Point the transpiler
      at those crates' Rust source and DIFF its output against the existing .myc — correctness is a cheap
      diff, not an execution/differential run. PoC target: mycelium-std-cmp (623 LOC, has a .myc twin).
      Seed from the maintainer's py2rust + py-rust-bridge (DN-34); do not build the Rust parser greenfield.
      New dep (syn/quote) is scoped to the transpiler crate only (KC-3, not the kernel).

      Efficiency (maintainer is usage-constrained): Hybrid model tiering (Opus design/gap-judgment, Sonnet
      emitter, Haiku mechanical rows); ~1-2 agents NOT a Workflow fan-out; Explore agents for read-heavy
      scoping; change-scoped checks during iteration; structured (schema) gap-report; one warm session.

      Definition of Done:
      - crates/mycelium-transpile transpiles std-cmp's Rust -> .myc emitting the expressible fraction +
        a never-silent structured gap report ({file,line,rust_construct,reason}); fmt/clippy -D warnings/
        test -p green.
      - Diff vs lib/std/cmp.myc characterized (matched/refined/flagged), never a silent mismatch.
      - Gap report captured as the seed of the surface-feature backlog (a DN entry / E18-1 issues).
      - The MEASURED token cost recorded -> converts the assessment doc's Declared rates to Empirical
        (update docs/planning/dogfooding-effort-and-usage-assessment.md + the self-hosting port ledger).
      - Landed as a scoped PR to dev via /pr-land. Non-tag-gating (ADR-036).

      LANDED (2026-07-01, kickoff trx, Hybrid swarm). crates/mycelium-transpile: syn-based AST-walk
      -> best-effort .myc + never-silent structured gap report (exhaustive dispatch, fallback always
      records a gap -- NOT the seed's allowlist anti-pattern). Run on mycelium-std-cmp, diffed vs
      lib/std/cmp.myc. Measured (Empirical): 4/111 non-test top-level items expressible = 3.6% against
      the current surface WITHOUT macro expansion (lower bound); 112 gap records. Dominant blocker:
      macros ~55% -> top lever is transpiler-side macro expansion. Prioritized surface-feature backlog
      (the E18-1 needs-design demand data) recorded in DN-34 section 8.3. Measured PoC cost
      ~0.85-0.95M tokens -> converts the assessment doc's Declared build/PoC rows to Empirical (5a).
      Review fix (G2/VR-5): 12 numeric-widening impls with a fabricated from(self) body reclassified
      emitted->gapped (never emit plausible-but-wrong). fmt/clippy -D warnings/test -p green (7/7).
      DN-34 stays Draft (a spike, not the gated full transpiler phase). The macro-expansion lever and
      the surface gaps (rows 2-7 of the backlog) are the follow-on needs-design items under E18-1.

      HARDENING FOLLOW-ON LANDED (2026-07-01, PR to dev). DN-41 width_cast faithful conversion
      emission (unsigned Binary widening now emits the real width_cast prim, not a fabricated body;
      std-cmp 3.6%->12.6%); directory/batch CLI mode; and the UNION gap-report across 6 core-lib
      crates (grand union 43/346 = 12.4% expressible, Empirical) recorded in DN-34 section 8.5 +
      crates/mycelium-transpile/fixtures/UNION-BACKLOG.md. Re-ranked backlog across the slice:
      unsupported TYPES #1 (36% -- String/text, usize/isize, char, closures, signed ints [ADR-028
      sign-free]), macros #2 (22%), trait-bounded generics #3 (12%). Grounded finding (DN-34 8.6):
      std.option/std.result have NO Rust source -- already self-hosted (M-715/M-649), excluded from
      the corpus not substituted. The demand-grounded surface-feature backlog is filed as the
      needs-design issues M-874/M-875/M-876 below. Deferred (tooling-blocked in-env): macro-expansion
      (needs nightly + cargo-expand) and the cargo-public-api baseline. 16/16 tests green.

  - id: M-874
    title: "M-874 -- design: surface type-coverage for Rust->Mycelium transpilation targets"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:language, priority:P2, status:needs-design]
    depends_on: [M-873]
    epic: E18-1
    doc_refs:
      - corpus:DN-34
      - corpus:DN-41
      - src:crates/mycelium-transpile/fixtures/UNION-BACKLOG.md
    body: |
      The #1 demand bucket in the transpiler union backlog (DN-34 §8.5): 36% of all gaps across the
      6-crate core-lib slice are UNSUPPORTED RUST TYPES with no confirmed Mycelium surface form --
      String/&str (vs Mycelium text), usize/isize (platform-dependent width, no fixed Binary{N}),
      char, closures/fn-pointers, and (a real semantic gap, not a transpiler shortcoming) SIGNED
      integers -- ADR-028 scoped Binary as sign-free, so i8..i128 have no representation at all.

      User stories:
      - As a self-hosting engineer, I want the surface (or a documented bridge) to express the scalar
        types the Rust stdlib actually uses, so that the transpiler emits them instead of flagging
        every signed-int / platform-width / text-typed item.
      - As a language designer, I want a grounded decision on signed representation (a signed paradigm,
        a sign+magnitude Binary variant, or an explicit "not supported, use X" ruling), so the gap is
        resolved by decision, not left implicit.

      Issues to resolve:
      - Signed integers: introduce a signed representation, or rule them out-of-surface with a
        documented mapping (e.g. via a library type)? (ADR-028 supersession vs a new paradigm.)
      - usize/isize platform-width: fix a canonical Binary{N} mapping, or a platform-abstract width?
      - char / String / &str: the bridge to Mycelium text (std.text) -- a surface form or a std API.

      Definition of Done:
      - A DN (or RFC) that decides each type-coverage question above (append-only; honest tags), OR
        an explicit deferral with the rationale. The transpiler's `map_type` gap reasons cite it.
      - No code required by this task (design only); it unblocks a transpiler emission follow-on.

  - id: M-875
    title: "M-875 -- design/arch: transpiler-side macro expansion (expand-first)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P2, status:needs-design]
    depends_on: [M-873]
    epic: E18-1
    doc_refs:
      - corpus:DN-34
      - corpus:DN-110
      - src:crates/mycelium-transpile/fixtures/UNION-BACKLOG.md
    body: |
      The #2 demand bucket (DN-34 §8.5): 22% of gaps are macro_rules! definitions + item-position
      macro invocations (syn cannot expand macros). The load-bearing conclusion from the PoC: the
      highest-leverage transpiler lever after type-coverage is an EXPAND-FIRST pre-pass (expand Rust
      macros via `cargo expand` / rustc `-Zunpretty=expanded` before the syn walk), converting the
      macro-generated bulk into ordinary impls the transpiler already handles.

      User stories:
      - As a self-hosting engineer, I want macro-generated impls transpiled (not flagged), so the
        transpiler covers real crates (~55% of std-cmp is macro-generated) instead of their skeleton.

      Issues to resolve:
      - Tooling: `cargo expand` needs nightly; is that acceptable in the transpiler's build env, or
        use a vendored expansion? (This session's env lacked nightly + cargo-expand -- FLAGGED.)
      - Post-expansion, the expanded bodies still hit type-coverage gaps (M-874) -- sequence M-874 first.

      Definition of Done:
      - A design decision (DN/arch note) on the expand-first approach + the toolchain requirement,
        then (follow-on) the transpiler gains an optional expansion pre-pass, never-silent about
        whether a run was expanded or raw. No code required by this design task.

      Note (2026-07-10, DN-110 ratification -- redirect, NOT supersede): the native TARGET facility
      for the macro role (a Rust `#[derive]`/`impl_*!` mapping to a Mycelium `lower`/`derive` rule) is
      designed in DN-110 -- complementary, not a re-decision of this issue's scope. This issue stays
      scoped to the transpiler-side expand-first question, which DN-100 already answered; DN-110 is
      the native-language-side counterpart DN-100's expansions map INTO (DN-110 §10).

  - id: M-876
    title: "M-876 -- design: surface completeness for transpilation (bounded generics, records, trait Self-bodies)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:language, priority:P3, status:needs-design]
    depends_on: [M-873]
    epic: E18-1
    doc_refs:
      - corpus:DN-34
      - "corpus:DN-122#132-disjoint-implementation-work-units-against-the-real-tree-property-tests"
      - corpus:DN-123
      - corpus:DN-121
      - src:crates/mycelium-transpile/fixtures/UNION-BACKLOG.md
    body: |
      **Append-only note (2026-07-12, gap-close-2 integration close-out — doc_refs split).** M-876's
      three sub-scopes now each point at their own design note: external-trait impls → **DN-122**
      (Accepted); records/named-fields → **DN-123** (Accepted); bounded generics → **DN-121 §5 P3**
      (`docs/notes/DN-121-Kernel-Type-Vocabulary-Lever-Scoping.md`, the bounded-`Ty::Var` lever,
      `needs-design` — the fourth sub-scope, trait Self-bodies, has no dedicated DN yet and stays
      tracked only by this issue's own body). This does not close any part of M-876.

      **Append-only note (2026-07-12, DN-122 ratification close-out).** DN-122 (Accepted,
      `docs/notes/DN-122-External-Trait-Impls-Across-The-Home-Boundary.md` SS13.2) names the
      `Self`-in-trait-signature grammar gap (the two-type `Widen`-class witness, WU-C) as this
      issue's residual sub-scope -- shared ownership confirmed via the doc_refs link above; see
      **M-1080** for the MVP that this sub-gap is explicitly excluded from.

      **Append-only note (2026-07-11, integration close-out, FLAG-5 from DN-123).** The records/
      named-field sub-scope (item 5 below) now has a dedicated design: **DN-123**
      (`docs/notes/DN-123-Records-Named-Fields-Surface-Lever.md`, Draft) — sugar-over-positional
      (Option A) via the existing `StructLayout` field-name↔index map, per DN-106's ratified
      gap-closure default; a first-class kernel record variant (Option B) stays rejected. See
      **M-1078** (new, this close-out) for the residual faithfulness + self-hosted-surface tracking.
      This does not close any part of M-876 — the other three sub-scopes (bounded generics,
      payload-variant enums, trait Self-bodies) remain `needs-design`.

      The remaining surface gaps from the transpiler union backlog (DN-34 §8.5), grouped: (3)
      trait-bounded generics `<T: Bound>` (12% -- `[T]` type-params landed M-656/7, but the bound
      slot on impl/fn generics is missing); (5) named-field records/structs (7% -- only a single-ctor
      positional shape maps today); (7) payload-variant enums with named/generic fields (error enums
      like ClampError<T>); (8) trait definitions with Self-referencing default-method bodies +
      supertrait bounds.

      User stories:
      - As a self-hosting engineer, I want the surface to express bounded generics, record structs,
        and richer enum payloads, so the transpiler stops flagging the ordinary shapes the Rust
        stdlib is built from.

      Issues to resolve:
      - Trait-bounded generics surface (bound slot on type_params / impl generics).
      - A named-field record/product-type surface (vs today's positional single-constructor only).
      - Payload-variant enums with named + generic fields.
      - Trait default-method bodies that reference Self at definition site.

      Definition of Done:
      - A DN/RFC deciding each (append-only; honest tags), or explicit deferral with rationale. These
        are lower-frequency than M-874/M-875 so are P3; sequence after them. Design only.

  - id: M-877
    title: "Stratum-map data file + structural check v0: normal-deps downward-only (xtask deps)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:toolchain, priority:P1, status:done]
    epic: E27-1
    landed_basis: "status:done (2026-07-02, kickoff `acy`, PR #935, branch acy/deps-acyclic-check). `xtask/deps-strata.toml` (data, not prose) + `xtask/src/deps/` (graph.rs/checks.rs/strata.rs/mod.rs) landed: `check_normal_downward` validates every normal edge's source stratum is strictly greater than its target stratum against the frozen `[strata]` map (Empirical). Violation output names the offending edge + rule (G2). `xtask/src/tests/deps.rs` proves the check fails on a synthetic upward-edge fixture and passes at HEAD. `cargo run -p xtask -- deps` verified 0 violations at HEAD post-wave."
    doc_refs:
      - corpus:DN-68
      - src:xtask/deps-strata.toml
      - src:xtask/src/deps/graph.rs
      - src:xtask/src/deps/checks.rs
    body: |
      Minted 2026-07-02 (kickoff `acy`, Phase-I H0). The 52-crate workspace's normal-dependency graph
      is already a clean acyclic 8-stratum DAG (`mycelium-core`: 41 dependents, 0 dependencies), but
      nothing mechanically checks it — an upward-layer edge could be introduced silently. This issue
      builds the structural check v0: a frozen per-crate stratum map plus a `cargo metadata`-based
      xtask subcommand that validates every normal edge respects it.

      User stories:
      - As a contributor, I want an introduced upward dependency to fail `just check` naming the
        offending edge, so that the acyclic architecture cannot erode silently.

      Definition of Done:
      - Committed stratum map (data, not prose); check fails on a synthetic upward edge in a test
        fixture and passes at HEAD; violation output names edge + rule (G2); change-scoped tests
        green.

  - id: M-878
    title: "Extend the acyclic-deps check to dev-deps (cargo never rejects a dev-dep cycle)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:toolchain, priority:P1, status:done]
    epic: E27-1
    landed_basis: "status:done (2026-07-02, kickoff `acy`, PR #935, branch acy/deps-acyclic-check). `check_acyclic_including_dev` (xtask/src/deps/checks.rs) runs Tarjan's SCC over the combined normal+dev+build graph (Exact — finds every crate in any cycle, not just the ones a single DFS traversal order happens to hit). Verified against the three known `mycelium-cert`-centered dev-cycles pre-fix (Empirical, historical re-run); dev/normal/build edges are distinguished in the diagnostic output."
    depends_on: [M-877]
    doc_refs:
      - corpus:DN-68
      - src:xtask/src/deps/checks.rs
      - src:xtask/src/tests/deps.rs
    body: |
      Minted 2026-07-02 (kickoff `acy`, Phase-I H0). `cargo` rejects a `[dependencies]` cycle (it
      cannot resolve one) but never rejects a `[dev-dependencies]` cycle — a dev-dep cycle compiles
      and tests run fine, so nothing in the ordinary toolchain surfaces one. Three such cycles existed
      at kickoff start, centered on `mycelium-cert`.

      User stories:
      - As a contributor, I want dev-dep cycles caught by the same gate, so that test-only edges
        can't reintroduce the `cert` cycle class.

      Definition of Done:
      - Check detects all three known cert dev-cycles when run pre-fix (fixture or historical
        verification); dev/normal edges distinguished in diagnostics.

  - id: M-879
    title: "Encode no-interp-std-dep + no-upward-tier-edges as named, inspectable rules"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:chore, area:toolchain, priority:P1, status:done]
    epic: E27-1
    landed_basis: "status:done (2026-07-02, kickoff `acy`, PR #935, branch acy/deps-acyclic-check). `[[named_rules]]` in `xtask/deps-strata.toml` encodes `no-interp-std-dep` (kind = forbidden-target-prefix, source = mycelium-interp, forbidden_target_prefix = mycelium-std-) and `no-upward-tier-edges` (kind = tier-order, over the `[tiers]` core<std<tools bucket map). `check_named_rules` (checks.rs) evaluates every entry by its declared kind; an unrecognized kind is itself reported as a violation (G2), never silently skipped. Each violation message cites the rule's `basis_ref` (DN-68). Negative fixtures in `xtask/src/tests/deps.rs` prove each rule fires."
    depends_on: [M-877]
    doc_refs:
      - corpus:DN-68
      - src:xtask/deps-strata.toml
      - src:xtask/src/deps/checks.rs
    body: |
      Minted 2026-07-02 (kickoff `acy`, Phase-I H0). Beyond generic acyclicity, two specific
      cross-boundary invariants are architecturally load-bearing: `mycelium-interp` (the trusted-base
      kernel, KC-3) must never depend on any `mycelium-std-*` crate in any dependency kind; and no
      crate may depend on a crate in a strictly higher `core < std < tools` architectural tier.

      User stories:
