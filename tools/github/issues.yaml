      - src:crates/mycelium-cert
    body: |
      The conformance gate. A suite asserting ALL RFC-0034 §13 conformance clauses end-to-end, EACH
      parameterized over the CertMode tiers (using the M-795 harness):
      (a) every result carries a never-silent mode tag; (b) no `fast` result carries Empirical/Proven;
      (c) memory safety + Axis-B hold in every mode; (d) EXPLAIN-of-mode always available; (e) spores
      mintable with the runtime cert off; (f) cross-mode composition surfaces the boundary.
      Acceptance / DoD (TDD):
      - All six clauses green in CI, each parameterized over fast/balanced/certified + the cross-mode
        NEGATIVE cases (the invariant absent/relaxed where it should be); just check green; docs/api-index
        regenerated for the new surface.
      - RFC-0034 advances Enacted(design) -> Enacted-with-code; ADR-032 decision 1 (mechanism adoption)
        realized; the relaxed RFC/ADR footnotes' "pending" notes updated where landed.
      - CHANGELOG append-only; honest "implemented (Rust-first)" framing; no guarantee tag upgraded
        without a checked basis (VR-5).

  - id: M-795
    title: "M-795 -- adapt + parameterize the test suite across CertMode tiers (cross-cutting)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:verification, area:core-ir, priority:P1, status:done]
    epic: E21-1
    depends_on: [M-786]
    doc_refs:
      - corpus:RFC-0034
      - corpus:DN-20
      - src:crates/mycelium-core/src/cert_mode.rs
    body: |
      The cross-cutting TEST-ADAPTATION leaf -- the KERNEL-LEVEL (Rust) instance of the general
      mode-parametric-testing principle that M-796 generalizes into the developer-facing toolkit. The
      existing suite implicitly assumes the all-on (`certified`) behaviour; this leaf makes the suite
      MODE-AWARE and provides the shared harness every other leaf's tests use.
      Scope:
      - A reusable parameterization harness (e.g. `for mode in CertMode::ALL { ... }` helpers + per-mode
        fixtures) so a mode-sensitive test runs across fast/balanced/certified and maps to the INTENDED
        per-mode behaviour, not one tier's.
      - CROSS-MODE NEGATIVE tests as a first-class pattern: assert each invariant (a) FIRES in the tiers it
        applies to AND (b) is correctly ABSENT/relaxed in the tiers it does not -- so we catch "the
        invariant holding when it shouldn't." Examples: swap-cert CHECKING present in `certified`, absent
        in `fast`; `Empirical`/`Proven` reachable in `certified`, NEVER in `fast`; certificate emission in
        balanced+certified, none in `fast`; Axis-B never-silent in EVERY mode (not relaxed by mode).
      - Adapt existing fixtures: pin to `certified` where they encode the all-on contract, or parameterize
        where behaviour differs by tier. NO test is dropped -- only its mode-scope is made explicit
        (the DN-20 transparency rule for tiered tests: over-specify, never silently drop coverage).
      Acceptance / DoD (TDD):
      - Shared harness lands + is used by >=2 leaves; the negative-case pattern is documented + exercised.
      - Every adapted fixture states its mode-scope; a grep/CI check (or review) confirms no mode-sensitive
        assertion is left implicitly all-on. fmt/clippy -D warnings/test green; just check green.
      - Lands incrementally with the wiring leaves (M-788..M-792) and is consolidated by the M-794 gate.

  - id: M-796
    title: "M-796 -- native scoped mode-parametric testing in the Mycelium testing toolkit (downstream)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:toolchain, priority:P2, status:done]
    epic: E21-1
    depends_on: [M-790, M-795]
    doc_refs:
      - corpus:RFC-0034
      - corpus:RFC-0012
      - corpus:RFC-0016
      - src:crates/mycelium-std-testing
    body: |
      Generalize the mode-parametric-testing principle (the kernel instance is M-795) into a FIRST-CLASS,
      NATIVELY-WIRED-IN capability of the Mycelium testing toolkit (`mycelium-std-testing`), so downstream
      developers GET IT FOR FREE instead of hand-rolling it (RFC-0034 §13, "native scoped test toolkit").
      Capability:
      - A developer marks a test/suite to run ACROSS the CertMode tiers, with the cross-mode NEGATIVE
        pattern (fires-where-it-applies / absent-where-it-doesn't) supported as a built-in -- the §13
        conformance contract becomes the toolchain's behaviour, not a per-project re-implementation.
      - CONFIGURABLE SCOPE, reusing the §6 `@certification` resolution (most-specific-wins, via RFC-0012
        ambient/scoped-override): PROJECT-WIDE default test-mode-set (manifest) > NODULE-WIDE (nodule
        header) > GRANULAR per test/unit. Sensible default (a mode-sensitive unit covers the tiers whose
        behaviour differs + the negatives); a unit may pin or widen explicitly. Never forces one way (the
        §7 ergonomic, never-cornering stance applied to testing).
      Acceptance / DoD (TDD):
      - The toolkit exposes the scoped mode-parametric API + the negative-case helpers; scope resolves
        project/nodule/granular reusing the @certification mechanism (shared resolver, not a parallel one).
      - A worked example + docs show a downstream dev getting per-tier + negative coverage with zero
        boilerplate; default behaviour is documented and never-silent about which tiers ran.
      - fmt/clippy -D warnings/test green; just check green. NOTE: developer-facing surface generalization
        -- depends on the @certification resolution (M-790) + the testing toolkit; may extend into its own
        surface-phase follow-on if the toolkit work outgrows this leaf (flag at design time, don't guess).

  - id: M-816
    title: "M-816 -- prune 84 deprecated stale branches to the three protected tiers (external action)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:toolchain, priority:P2, status:blocked]
    epic: E21-1
    depends_on: []
    doc_refs:
      - src:CHANGELOG.md
      - src:CLAUDE.md
    body: |
      MAINTAINER-DIRECTED (2026-06-27): the repo should retain only the three protected tiers.
      Recovery artifacts live on branch `claude/recovery/stale-branch-archive-2026-06-27` under
      `recovery/` (not on dev; see CHANGELOG "Deprecated" entry).
      `main`/`integration`/`dev`. The 84 non-protected branches (all `claude/*` plus
      `reconcile/main-to-integration`, `revert-532-fix/*`, `worktree-agent-*`) are stale artifacts of
      completed/landed waves and are DEPRECATED for deletion.

      BLOCKED in-session (never-silent record — G2): remote ref deletion is platform-gated for the
      Claude-Code-web session. `git push --delete` via the session git relay -> 403; direct
      api.github.com / github.com (token auth, egress proxy) -> 403 ("GitHub access is not enabled for
      this session. An org admin must connect the Claude GitHub App for this organization"); GitHub MCP
      exposes no delete-ref tool. Normal pushes work (additive); only deletion is blocked.

      DONE (in-session, durable): recovery consolidated + retained on branch
      `claude/recovery/stale-branch-archive-2026-06-27` -> `recovery/`:
      `pruned-branches-backup.bundle` (every commit unique to the 84), `branch-prune-manifest.tsv`
      (tip SHA + merge status per branch), `prune-stale-branches.sh` (runnable deleter), `DEPRECATION.md`.

      Definition of Done (the remaining EXTERNAL step):
      - An org admin connects the Claude GitHub App for `tzervas` with branch-deletion permission, OR
        the maintainer runs `bash recovery/prune-stale-branches.sh` from a local clone / uses the
        GitHub branches UI.
      - Only `main`, `integration`, `dev`, and the recovery branch remain.
      - Then this task -> done; the recovery branch may be removed once the maintainer is satisfied.

  - id: M-817
    title: "M-817 — feat(l1+runtime): execute fuse (data) + reclaim three-way (close M-710)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-667, M-710]
    epic: E12-1
    completed_basis: "DONE (2026-06-28, prm wave). MECHANISM CORRECTION (grounded in ratified DN-58 §A.5/§B.4 + the dep graph + the M-666 colony precedent — flagged to + approved by maintainer): the original 'register fuse_join:data + reclaim:supervised prims in PrimRegistry::with_builtins()' framing was NOT implementable honestly — (a) DN-58 §A.5 (ratified) says fuse elaborates to a resolved `Fuse::join` CALL, not an opaque prim; (b) `mycelium-interp` cannot depend on `mycelium-std-runtime` (cycle), so reclaim supervision cannot be an interp prim; (c) a bare `PrimFn` has no env access (cannot resolve a user `join`) and eager args (cannot supervise a lazy body); a 'supervised' prim that does no supervision is a black box (G2). IMPLEMENTED: (1) `fuse_join:binary` registered as a pure meet prim (bitwise-AND + canonical `Derived{op:\"fuse_join\"}` provenance) in interp + core PrimTable; (2) data-type fuse desugared in `mono.rs` to the resolved `Fuse::join` call (records the instance selection — EXPLAIN, no black box); (3) reclaim elaborates to its sequential reference `Let{_ = policy, body}` (runs three-way), and `mycelium_l1::elaborate_reclaim` + `mycelium_mlir::run_reclaim` provide the REAL RT7 supervision driver (`supervise_with_restart` + `SupervisionRecord` EXPLAIN), validated equal to the reference on success — the run_colony pattern. Four three-way differential tests + generic_corpus case green. KC-3: no new L0 node. VR-5: Empirical."
    doc_refs:
      - corpus:RFC-0008
      - corpus:DN-58
      - corpus:RFC-0027
      - src:crates/mycelium-l1/src/elab.rs
      - src:crates/mycelium-l1/src/mono.rs
      - src:crates/mycelium-interp/src/prims.rs
      - src:crates/mycelium-mlir/src/runtime.rs
      - src:crates/mycelium-std-runtime/src/supervision.rs
    body: |
      Follow-on to the r4v wave (M-667 DONE, M-710 PARTIAL): close the execution residual so fuse +
      reclaim RUN three-way (L1-eval ≡ L0-interp ≡ AOT) and DN-58 can move toward Enacted.

      RESOLVED (mechanism corrected vs the original prim-registration framing — see completed_basis;
      the correction is grounded in ratified DN-58 §A.5/§B.4, the crate dependency graph, and the
      landed M-666 `colony` two-path precedent, and was flagged to + approved by the maintainer):

      1. `reclaim(policy) { body }` runs three-way via its sequential reference (`Let{_ = policy,
         body}`); the real RT7 supervision (bounded restart cascade + `SupervisionRecord` EXPLAIN
         trail) is the runtime-tier driver `mycelium_mlir::run_reclaim` over the lazy body node
         (`mycelium_l1::elaborate_reclaim`), validated equal to the reference on success. The trusted
         base (`mycelium-interp`/`-l1`) cannot depend on `mycelium-std-runtime`, so the dispatch lives
         in the runtime tier — exactly like the concurrent `colony` executor. (NOT an interp prim.)

      2. `fuse(a, b)`: Binary repr executes via the registered `fuse_join:binary` meet prim (bitwise-
         AND + canonical `Derived{op:"fuse_join"}` provenance, DN-58 §A.5); a Data type with a `Fuse`
         instance desugars (monomorphization) to the resolved `Fuse::join` call and runs three-way —
         the user-merge case. Non-Binary repr meets stay an honest residual (DN-58 §A.6 F-A3).

      Definition of Done (met):
      - Data-type `fuse` + `reclaim` run three-way (Empirical); the supervision driver dispatches with
        the `SupervisionRecord` EXPLAIN trail (never-silent restart/escalation, G2). No new L0 node (KC-3).
      - Four three-way differential tests (`fuse_repr`, `fuse_data`, `reclaim_sequential_reference`,
        `reclaim_real_supervision_driver`) + a `generic_corpus` data-fuse case; `just check` green.
      - DN-58 → propose Enacted (surface + execution landed); M-710 → done.

  - id: M-797
    title: "M-797 -- extract inline #[cfg(test)] tests to in-crate src/tests/ (no tests in logic files)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:chore, area:toolchain, priority:P2, status:todo]
    epic: E21-1
    depends_on: []
    doc_refs:
      - src:crates/mycelium-std-recover/src/tests.rs
      - src:CLAUDE.md
    body: |
      The TEST-LAYOUT retrofit (CLAUDE.md "Test layout" rule, maintainer-directed). Logic `.rs` files must
      carry NO test code; every `#[cfg(test)]` unit test moves to a dedicated IN-CRATE test module
      (`#[cfg(test)] mod tests;` in lib.rs -> `src/tests/` with a `mod.rs` declaring one submodule per
      source module), each `use crate::…::*` for WHITE-BOX access to private items. Precedent:
      `mycelium-std-recover/src/tests.rs`. This keeps logic files clean WITHOUT the black-box coverage loss
      of fully-external `tests/` (chosen over that on merit; the alt would force internals `pub`).
      Scope: ~185 source files across the workspace carry inline tests (mycelium-core alone is 18 files /
      ~5k test lines). ROLLOUT = ENFORCE GOING-FORWARD + LAZY RETROFIT (maintainer's chosen rollout, not a
      big-bang swarm): new/changed code complies immediately; existing inline tests are extracted
      OPPORTUNISTICALLY when their file is next modified for other reasons. The codebase stays mixed until
      the lazy sweep completes -- accepted. No behaviour change -- a pure move; a touched crate's
      `cargo test` count must be identical before/after (count it -- mitigation #2/#7).
      Also: complex test logic moves to FIXTURES + PARAMETERIZATION (corpus tables, CertMode::ALL-style
      params, REJECT_EXPECTED, differential::data_corpus) -- a test body asserts over a case, not bespoke
      logic. New tests already follow the rule (CLAUDE.md); this leaf retrofits the existing inline tests.
      Acceptance / DoD: every crate's logic files are `#[cfg(test)]`-free (grep proves it); tests live in
      `src/tests/`; identical test counts pre/post per crate; just check green; CHANGELOG append-only.

  # ---------------- E22-1: Security Scanning Toolkit (DN-30) ----------------
  - id: E22-1
    title: "E22-1 (epic) -- Security Scanning Toolkit (automated detection, standard reporting, honest safe auto-fix)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:toolchain, priority:P2, status:todo]
    epic: E22
    doc_refs:
      - corpus:DN-30
      - corpus:RFC-0034
      - corpus:RFC-0002
      - corpus:RFC-0013
      - corpus:RFC-0028
      - corpus:ADR-014
      - corpus:DN-28
      - src:scripts/checks/deny.sh
      - src:crates/mycelium-cert
    body: |
      A shippable, Mycelium-native SECURITY SCANNING TOOLKIT as a first-class toolchain component (like the
      LSP / linter / formatter / testing toolkit), inherited by downstream developers. Direction captured in
      DN-30; this epic is the backlog. Leaves are scoped when the binding security-scanning RFC lands (the
      forward-epic pattern -- children minted at the design gate, not pre-allocated here).

      Pillars (DN-30 §2-§6):
      - AUTOMATED DETECTION over the inspectable Core IR (RFC-0001) -- the toolchain logically enumerates +
        finds vulnerability classes, NOT solely from documented findings; runs in conjunction with them
        (correlate if documented, report the same way if found independently). Never-silent (G2): a flaw the
        toolchain can see is surfaced, never hidden.
      - STANDARD, MACHINE-CONSUMABLE REPORTING: SARIF + CWE class + CVE/OSV id + VEX applicability, each
        finding carrying provenance + an honest confidence tag (Exact/Proven/Empirical/Declared, RFC-0034) --
        a proven taint-flow vs a heuristic match is disclosed, never conflated.
      - FIND-ONCE, REPORT-TO-COMMUNITY (two sinks): the CLI report (local) AND the REGISTRY -- the same
        registry that hosts packages (phyla + nodules; DN-28) ALSO hosts the security findings, as
        SCREENED/ANONYMIZED/PRIVATIZED entries (vulnerable logic minimized to a content-addressed pattern
        fingerprint -- detectable + mitigable ecosystem-wide WITHOUT exposing the victim's source; disclose
        enough to defend, never to weaponize). Hosted finding: what (CWE + screened pattern) / severity /
        affected content-addressed versions (+ VEX) / logic-retaining mitigations / honest confidence.
      - HONEST, SEMANTICS-PRESERVING SAFE AUTO-FIX: a fix ships a certificate (REUSING the RFC-0002
        refinement/translation-validation machinery) that it (a) eliminates/mitigates the vuln AND (b)
        refines the original modulo the vuln (logic preserved), each honestly tagged. EXPLAIN-able
        (RFC-0005/0013); a Declared-strength fix is always flagged + gated behind human acceptance -- no
        black-box "trust me" rewrites (G2/VR-5).
      - NATIVE + SCOPED like the testing toolkit (M-796): project / nodule / granular scan profile, reusing
        the @certification resolution (RFC-0034 §6 / RFC-0012) -- never forced, the §7 ergonomic stance.

      User stories:
      - As a phylum author, I want the toolchain to automatically find + report security flaws in my code in
        a standard format, so I catch them without relying on someone having documented them first.
      - As a consumer, I want a found vulnerability in a dependency reported to a community feed keyed by
        content-hash, so I know precisely which versions I use are affected and what fix supersedes them.
      - As a developer, I want an offered auto-fix to come with a certificate that it preserves my intended
        logic while removing the vuln (honestly tagged), so I can accept it without fearing a silent
        behaviour change.

      Definition of Done (epic):
      - A binding security-scanning RFC is Accepted (shaped by DN-30 §2-§6 + the §7 open questions resolved).
      - v0 detects an agreed class set (DN-30 §7 Q1), emits SARIF+CWE (+OSV where applicable), and offers at
        least one honest, certificate-backed safe-fix class.
      - Findings report to BOTH sinks: the CLI report AND the registry (DN-28), the registry hosting them as
        SCREENED/anonymized entries (content-addressed pattern fingerprint, no victim source); the screening
        policy is decided (DN-30 §7 Q4) before any finding is published. The security catalog reuses DN-28's
        LIGHTWEIGHT reconstruction-on-render model (store hashes/manifest, reconstruct + hash-verify finding
        bodies on render -- tamper-evident, as cheap as the package side).
      - Native + scope-configurable (project/nodule/granular) reusing the @certification resolver; findings +
        fixes reified, EXPLAIN-able, never-silent; honest confidence tags throughout (VR-5/G2).
      - just check green; CHANGELOG append-only; the /security-review skill consumes the toolkit's findings
        (DN-30 §7 Q5) or the relationship is explicitly decided.

  - id: M-798
    title: "M-798 -- width-cast/zero-extension kernel prim (bit.width_cast) [DN-41]"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:core-ir, priority:P1, status:done]
    epic: E19-1
    depends_on: [M-750]
    landed_date: 2026-07-01
    landed_basis: "Commit f9f6c5b (waveN2, 2026-06-26); CHANGELOG.md '### Added (2026-06-26: waveN2 Phase-1 — stdlib enablers, width-cast prim, MLIR carry-chain, design notes (E13-1/E19-1/E15-1))' — bit.width_cast landed in crates/mycelium-interp/src/prims.rs, surfaced + width-checked in mycelium-l1; 12 three-way differential tests incl. narrow-overflow refusal on all three paths. DN-41 is Accepted (docs/notes/DN-41-Width-Cast-Prim.md, ratified by the maintainer 2026-06-26) -- the body's own '(DN-41 Proposed -- maintainer ratifies -> Accepted)' framing predates the ratification; label was stale."
    doc_refs:
      - corpus:RFC-0032
      - src:crates/mycelium-interp/src/prims.rs
      - src:crates/mycelium-l1/tests/std_widthcast.rs
    body: |
      DONE (2026-07-01 resync): status label was stale (`in-progress`); DN-41 has since been
      ratified Accepted (2026-06-26) and the implementation below satisfies this issue's DoD
      (widen Exact, narrow never-silent Overflow, three-way differential green). Flipped on that
      evidence.

      IMPLEMENTED Rust-first (2026-06-26, waveN2-p1; DN-41 Proposed -- maintainer ratifies -> Accepted).
      The never-silent Binary width-cast prim wave-n1 flagged as missing: re-width an unsigned Binary{N} ->
      Binary{M}. Widen (M>N) = zero-extension, Exact (ADR-028 sign-free); identity Exact; narrow (M<N) = keep
      low M bits iff dropped high bits are zero, else never-silent EvalError::Overflow (G2 -- mirrors add_bin,
      never a silent truncation). Surface width_cast(v, into); kernel bit.width_cast (target width = witness
      operand's width). 12 three-way differential tests (L1-eval == L0-interp == AOT) incl. narrow-overflow
      refusal on all three paths and the M-717 composite lt(width_cast(idx8, len32), len32). UNBLOCKS M-717
      multi-byte UTF-8 + byte_at + Bytes-native slice. Tags: widen/identity/in-range-narrow Exact; narrow-fit
      Declared; three-way Empirical. Forced minimal mycelium-core PrimTable + count-guard edit (registry<->Pi
      drift guard requires every prim declared). No GitHub issue yet -- a gh-issues-sync follow-up.

      Definition of Done:
      - bit.width_cast in mycelium-interp; surfaced + width-checked in the mycelium-l1 checker.
      - Widen Exact (lossless); narrow never-silent Overflow when high bits set (G2).
      - Three-way differential green incl. narrow-overflow refusal on all paths.
      - DN-41 ratified (Proposed -> Accepted); just check green.

