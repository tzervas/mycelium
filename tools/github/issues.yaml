  - id: M-1027
    title: "enb ENB-4 — per-constructor visibility seal (never-silent import-path refusal only — NOT a capability boundary; see M-1036)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    epic: E28-1
    depends_on: [M-1023]
    doc_refs:
      - corpus:DN-104
      - corpus:DN-99
      - corpus:DN-53
      - src:crates/mycelium-l1/src/ast.rs
      - src:crates/mycelium-l1/src/token.rs
      - src:crates/mycelium-l1/src/parse.rs
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/tests/ctor_seal.rs
    body: |
      From DN-99 §8 ENB-4 (Draft backlog). Closes register row #37 (sealed-constructor visibility,
      genuinely open — verified `ast.rs` has item-level-only `enum Vis {Private,Pub}`) and the #69
      field-visibility sub-case. A `priv`/seal marker on the `constructor` production so
      `pub type T = priv Mk(..)` exports the type NAME but withholds cross-nodule CONSTRUCTION — the
      analogue of Rust's `mod sealed { pub(super) struct Sealed }` capability-gate the spw Wave-0 hit
      (M-1023's Approx::proven was OMITTED rather than ported ungated — VR-5). Design with named-field
      visibility (DN-53 §B.5); resolve DN-53 §B.6 Q1 first. HIGH semcore-lane collision — touches
      `crates/mycelium-l1/**`: cloud-semcore-lane, coordinate M-1013. Needs a Draft DN.

      User stories:
      - As a stdlib author, I want a sealed constructor so a capability type's name is exported but its
        construction is withheld cross-nodule, so that FR-N3-style `Proven`-gates port without fabricating
        an ungated escape hatch.

      Definition of Done:
      - Conformance accept (in-nodule construction) + reject (cross-nodule construction) + differential;
        DN-53 §B.6 Q1 resolved; the seal never-silent (an out-of-nodule construction is an explicit
        checker error); a Draft DN records the marker and its interaction with named-field visibility.

      Landed (PR #1370, feature commit ccda3954 + integration-review correction commit, merged to dev
      2026-07-10 — status:done for the scope actually delivered, see the CRITICAL note below):
      - Rust frontend, full + verified: `Tok::Priv` reserved keyword; `ast::Ctor.sealed`; `parse_ctor`
        reads the optional `priv`; checkty `Exports.sealed_ctors` (per-`pub`-type) folded into a
        per-nodule `NoduleImports.sealed` withheld set (own ctors subtracted), reusing the M-662/M-1024
        export layer; the withheld-construction refusal at both constructor-application sites for a
        caller that imports the sealed ctor by name; the redundant-`priv`-on-non-`pub`-type refusal at
        registration; the `priv`-in-`object`-body parse refusal (Rust frontend only — the `.myc` mirror
        does not yet match, a minor parity gap). All refusals never-silent (G2). DN-53 §B.6 Q1 resolved
        to the BINARY seal (Draft DN-104 — maintainer ratifies the corrected, narrower scope below).
      - **CRITICAL (found + independently reproduced at integration review, house rule #4): this is NOT
        an enforced security/capability boundary.** Mycelium resolves types/ctors by bare name in the
        *caller's own scope* (own local decls shadow imports — pre-existing RFC-0006 §4.3 / M-662), so a
        foreign nodule that declares its **own same-named local (unsealed) type**, never importing the
        real sealed one, bypasses the seal entirely — `check_phylum` accepts it. This falsifies the
        issue's "FR-N3-style Proven-gates" / "unforgeable" framing above; **M-1023's `Approx::proven`
        port must NOT rely on this as a real security boundary.** The real fix needs nodule-qualified
        type identity, tracked as **M-1036** (higher-priority follow-on). As landed, `priv` is an
        opt-in API-discipline nudge for a well-behaved caller going through `use home.Ctor` — a useful,
        honestly-scoped never-silent hint, not a capability gate. Witnessed by 11 differentials
        (`tests/ctor_seal.rs`): home-construct OK, foreign-construct-via-import refused (+ unsealed
        control), cross-nodule type-use + pattern-match OK, redundant/object-body refusals, per-ctor
        subset seal, **+ `known_gap_a_same_named_local_shadow_type_bypasses_the_seal` pinning the
        bypass** so it is never silently absent from the suite's claimed coverage.
      - Residual (honest, not silent — DN-104 §6): the `.myc` mirror carries the **surface + AST +
        structural-fingerprint** parity only (`Priv` token; `Ctor` `sealed` field; `parse_ctor` reads
        `priv`; fingerprint tag 110 both sides). The **cross-nodule *enforcement* mirror** (the export-
        table withheld set) is **Rust-only** and rides the checkty `.myc` port (**M-741**) — the whole
        M-662/M-1024 cross-nodule checking layer is not yet ported to `.myc`. Minor parity gap: `priv`
        in a `.myc` `object` body is accepted-then-unused (the Rust frontend refuses it at parse).
        Native `myc check` is clean over the touched `.myc` (dogfood parity, 9 self-hosted nodules); the
        `.myc` surface is additionally Rust-differential-witnessed. Enforcement-mirror completion tracked
        under M-741.

  - id: M-1036
    title: "nodule-qualified type identity — the real fix for M-1027's ctor-seal capability-gate bypass"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P1, status:done]
    epic: E28-1
    depends_on: [M-1027]
    landed_date: 2026-07-11
    landed_basis: "landed on dev via claude/leaf/m1036-ctor-seal (5fe6471f), merged with dev's facility-Stage-3/DN-117 pull-down; verified: cargo test -p mycelium-l1 = 565 lib + 26 ctor_seal.rs tests green, clippy/fmt clean. DoD met: nodule-qualified identity (DataInfo::home, checkty.rs) closes the shadow-bypass; ctor_seal.rs's known_gap_a_same_named_local_shadow_type_bypasses_the_seal renamed + flipped to assert the refusal; the DN-112 SS10 item 9 builtin/prelude uniform-home-invariant regression test shipped (ctor_seal.rs L542+, tests/checkty.rs L1358-9). Two CRITICAL soundness holes found+fixed during the leaf's own adversarial audit (generic-callee shadow reopening; shadow-plus-cross-nodule-reach pattern-match type confusion via lookup_data_home_checked). Disclosed, NOT silently closed, residuals filed as follow-ups: M-1070 (full per-import-provenance correct-home resolution — the shipped fix is the conservative refuse-on-home-mismatch closure, not the full correct-home resolution), M-1071 (pre-existing M-919 affine-tracker prior-handle-alias gap, confirmed not a regression), M-1072 (LOW doc-nit in decision.rs's compile_rows audit comment)."
    doc_refs:
      - corpus:DN-104
      - corpus:DN-99
      - corpus:DN-112
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/tests/ctor_seal.rs
    body: |
      Found + independently reproduced during PR #1370's (M-1027 / ENB-4) integration review
      (2026-07-10, house rule #4 — no claim upgraded past a checked basis). Mycelium resolves
      types/ctors by **bare name, re-resolved in the calling nodule's own scope** (own local decls
      shadow imports — the pre-existing RFC-0006 §4.3 / M-662 precedence rule), not by
      **nodule-qualified nominal identity** (the way Rust's `mod::Type` path-qualifies a type). This
      means M-1027's per-constructor `priv` seal (DN-104) — whose entire stated purpose is an
      "unforgeable capability-gate" for FR-N3-style `Proven`-tokens — is **bypassed** by a foreign
      nodule that declares its **own same-named local (unsealed) type**, never importing the real
      sealed one: `check_phylum` accepts a program that passes a locally-forged value of the decoy
      type wherever the sealed type is expected. Reproduced standalone (`cargo run` against a small
      `mycelium-l1` harness) and pinned as a differential witness
      (`crates/mycelium-l1/tests/ctor_seal.rs::known_gap_a_same_named_local_shadow_type_bypasses_the_seal`,
      asserting the current `Ok` — flip it to assert the refusal once this issue lands). Until this
      lands, DN-104's `priv` seal is an opt-in API-discipline nudge for a well-behaved `use`-based
      caller — **not** a security/capability boundary — and **M-1023's `Approx::proven` port must not
      rely on it as one**.

      User stories:
      - As a stdlib author relying on M-1027's sealed-constructor capability-gate (e.g. M-1023's
        `Approx::proven`), I want the seal to actually withhold construction from ANY foreign nodule
        (including one that declares its own same-named local type), so that the "unforgeable" claim
        DN-104 makes is true rather than bypassable by an adversarial or accidentally-colliding name.

      Definition of Done:
      - Types/constructors are resolved against their **declaring nodule** (nodule-qualified nominal
        identity), not bare name alone — so a same-named local type in a foreign nodule is a distinct
        type from the sealed one and cannot satisfy a signature/pattern expecting it (a type mismatch,
        never-silent, not a values-forged-through pass). `known_gap_a_same_named_local_shadow_type_
        bypasses_the_seal` is updated to assert the refusal and renamed to drop "known_gap". A property
        test over generated same-name-collision programs. DN-104 §6's CRITICAL residual is closed and
        the note's capability-gate framing is restored/ratified. Backward compatibility: an unambiguous
        same-named-but-unrelated local type in a phylum that never crosses with the sealed one still
        checks unchanged (no false-positive collision across unrelated phyla/nodules).

      Progress note (2026-07-11, maintainer direction on DN-104 — this issue's own DoD unchanged):
      the maintainer directed pursuing DN-104 §3's fuller **option B, `pub(path)` scoped visibility**,
      as the long-term successor to the shipped binary `priv` seal (filed separately as **M-1050**,
      which `depends_on` this issue). The two are RELATED but DISTINCT: this issue (M-1036) fixes
      identity RESOLUTION (bare-name lookup lets a foreign same-named local type impersonate the
      sealed one); M-1050 generalizes visibility SCOPING (binary nodule-boundary seal → an arbitrary
      nodule/phylum path grammar). A `pub(path)` grammar layered on today's bare-name resolution would
      still inherit this issue's shadow-bypass gap, so M-1036 (this issue) is the prerequisite — fixing
      nodule-qualified identity first is what lets `pub(path)` (M-1050) actually deliver a real
      capability boundary rather than compounding an unforgeable-in-name-only mechanism. No change to
      this issue's own scope or DoD.

      Mechanism note (2026-07-10, DN-112 ratified -- maintainer-delegated, orchestrator-selected on the
      merits; append-only, does not edit the body above). This issue's mechanism is now decided:
      **DN-112 Rank 1** (`docs/notes/DN-112-Nodule-Qualified-Type-Identity.md`) -- a nodule-qualified
      name carried in the existing `Ty::Data` `String` slot, stamped at `resolve_ty` from the resolved
      `DataInfo.home` (the declaring nodule, never the use-site), plus the `type_head` coherence-key fix
      (in-scope, an automatic consequence of Rank 1). DN-112's ratification adds a CONDITION to this
      issue's own Definition of Done: the implementation MUST ship a dedicated regression test pinning
      the builtin/prelude uniform-home invariant (`Bool`/`Option`/`Result`/`Tuple$N` stay under one
      reserved home across every nodule; a resolution path that over-qualifies a builtin must be
      caught, not merely avoided by convention) -- DN-112 §10 item 9, the direct answer to its own
      sharpest adversarial finding (§9). Guarantee posture: `Empirical` once the flipped
      `ctor_seal.rs` differential, the general same-name-collision property test, and this
      builtin-invariant test all land; `Declared` if a narrower point-patch is chosen instead (VR-5).
      Status stays `todo` here -- DN-112 ratifies the mechanism, it does not implement it.

      Landed (2026-07-11, integration close-out for `claude/leaf/m1036-ctor-seal`, status
      todo -> done, append-only). DN-112 Rank 1 implemented: `DataInfo::home` + `qualify_type_name`/
      `nodule_home` (`checkty.rs`) stamp the nodule-qualified identity at `resolve_ty`; the flipped
      `ctor_seal.rs` differential (26 tests) and the DN-112 SS10 item 9 builtin/prelude
      uniform-home-invariant regression test both land, moving this issue's guarantee posture to
      `Empirical` per the mechanism note's own stated condition above. Two CRITICAL soundness holes
      (generic-callee shadow reopening; a shadow-plus-cross-nodule-reach pattern-match type
      confusion) were found and closed during the leaf's own adversarial self-audit before landing
      (mitigation #14 — verified, not rubber-stamped). Three residuals are explicitly disclosed, not
      silently folded into "done": the shipped fix is the conservative refuse-on-home-mismatch
      closure, not the full per-import-provenance correct-home resolution (filed as **M-1070**); the
      pre-existing M-919 affine-tracker prior-handle-alias gap is confirmed not a regression (filed
      as **M-1071**); a LOW doc-nit in `decision.rs`'s `compile_rows` audit comment is filed as
      **M-1072**. DN-112 itself stays `Accepted` (design ratification) -- this landing is the
      implementation the note's own DoD condition names, but stepping DN-112 to `Enacted` is a
      separate, deliberate review this close-out does not perform (house rule #3: `Enacted` is
      reserved for a decision confirmed fully complete and outside ongoing integration, and this
      issue's own residuals above mean the identity-resolution story is not yet fully closed).

