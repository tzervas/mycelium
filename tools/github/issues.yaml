  # ---------------- Phase 3 (M-3xx build tasks; decomposed 2026-06-15, docs/planning/phase-3.md) ----------------
  # Batch J — native execution path (keystone). Direct-LLVM AOT first; MLIR deferred (libMLIR absent) — RFC-0004 §2 fallback, RR-N1.
  - id: M-301
    title: "M-301 — Direct-LLVM-IR AOT backend (kernel subset)"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:feature, area:execution, priority:P1]
    depends_on: [M-150, M-110]
    body: |
      Emit textual LLVM IR for the kernel subset (bit/trit ops + consts over the lowered ANF), compile via llc + clang to a native artifact, run it, read back the result Value (RFC-0004 §2 direct-LLVM fallback; ADR-007/009). Each stage dumpable (no opaque pass). The MLIR ternary-dialect lowering stays the eventual path (textual emitter is its skeleton) and is deferred until libMLIR is provisioned.
      Acceptance: a Core IR kernel-subset program compiles to native and runs; the emitted IR is dumpable; unsupported ops are an explicit refusal (never silent).

  - id: M-302
    title: "M-302 — interp<->native differential (extend M-151)"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:verification, area:execution, priority:P1]
    depends_on: [M-301, M-151]
    body: |
      Extend the M-151 differential so the kernel corpus runs under the interpreter AND the real compiled native artifact, asserting observable equivalence through the M-210 ObservationalEquiv checker; a deliberately divergent lowering must be caught (NFR-7; VR-4; RR-12; mutant-witness convention).
      Acceptance: corpus passes both paths; a mislabeled/divergent lowering fails the checker.

  - id: M-303
    title: "M-303 — E1 perf verdict on the native path"
    milestone: "Phase 3 — Tooling, Projections & Acceleration"
    labels: [phase:3, type:verification, area:execution, priority:P1]
    depends_on: [M-301, M-302]
    body: |
      Replace the cargo xtask e1 stub's "not established" with a measured native-vs-interpreter number on the kernel subset (E1; NFR-4). Honest caption: a real measurement, not "within an agreed target" unless one is ratified (VR-5). Refuses to measure a debug build.
      Acceptance: a recorded native/interp ratio with caveats; the E1 verdict moves from "not established" to "measured".

