  # ---------------- E21-1: Tunable Certification & Transparency Modes (RFC-0034 / ADR-032) ----------------
  - id: E21-1
    title: "E21-1 (epic) -- Tunable Certification & Transparency Modes (RFC-0034 / ADR-032 implementation)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:core-ir, priority:P1, status:done]
    epic: E21
    landed_date: 2026-07-01
    landed_basis: "All 11 children done: M-786, M-787, M-788, M-789, M-790, M-791, M-792, M-793, M-794, M-795, M-796 (each carries its own landed_pr/landed_basis in this manifest). RFC-0034 -> 'Enacted -- with code (Rust-first)' (docs/rfcs/RFC-0034-Tunable-Certification-and-Transparency-Modes.md, 2026-06-24, maintainer-ratified) once the §13 conformance suite (M-794) landed green -- the epic's own acceptance criterion."
    doc_refs:
      - corpus:RFC-0034
      - corpus:ADR-032
      - corpus:DN-29
      - corpus:RFC-0001
      - corpus:RFC-0002
      - corpus:RFC-0005
      - corpus:RFC-0012
      - corpus:ADR-010
      - corpus:ADR-013
      - src:crates/mycelium-core/src/meta.rs
      - src:crates/mycelium-core/src/guarantee.rs
      - src:crates/mycelium-core/src/content.rs
      - src:crates/mycelium-cert
      - src:crates/mycelium-proj
      - src:crates/mycelium-spore
      - src:crates/mycelium-mlir/src/inject.rs
    body: |
      The PAIRED TDD IMPLEMENTATION of RFC-0034 + ADR-032 (both Enacted design-driven 2026-06-24; the
      corpus amendments landed, the runtime mechanism did not). RFC-0034 made certification/hashing/tag
      machinery a TUNABLE POLICY over the existing RFC-0001/0002/0005 substrate; this epic lands the
      runtime mechanism Rust-first so the docs advance from "Enacted (design)" to fully Enacted-with-code.

      Cross-cutting core-runtime feature: it spans mycelium-core (Meta mode tag, guarantee/tag gating,
      content-hash exclusion), mycelium-cert (mode-gated emit/check), mycelium-proj (the @certification
      declaration + resolution), mycelium-l1 (scoped resolution, reusing RFC-0012 ambient/scoped-override),
      mycelium-spore + mycelium-mlir/inject (the compile/runtime phase split). The machinery it tunes is
      UNCHANGED -- only WHEN it runs becomes a policy.

      HONESTY / never-silent (VR-5/G2): every result carries a never-silent certification-mode tag; `fast`
      never claims a tag it did not earn (no Empirical/Proven in `fast`); the mode is excluded from the
      content hash (ADR-003, no spore-identity perturbation); cross-mode composition is an explicit,
      visible event. Specs move to "implemented (Rust-first), pending ratification" as leaves land -- never
      silently to Enacted-with-code until the M-794 conformance gate is green.

      ID layout: design gate = the RFC-0034 + ADR-032 docs (already landed, PR #538). Implementation =
      M-786..M-794 (this epic), dependency-ordered from the Meta mode tag outward. Phase placement follows
      the active Phase-5 implementation wave (E19/E20); the feature is core-runtime, not self-hosting per se.

      User stories:
      - As an application developer, I want a `fast`-by-default build that pays no runtime cert/hash cost
        yet stays inspectable + deployable, so day-to-day code is fast without forfeiting assurance I can
        opt into later.
      - As a phylum author, I want to declare `@certification certified` at project/phylum/nodule scope and
        have it resolve most-specific-wins, so published guarantees are checked where it matters.
      - As an auditor/AI agent, I want every value mode-tagged and `EXPLAIN`-able, and every cross-mode
        boundary explicit, so I can always tell what assurance a value actually carries (never silent).

      Testing strategy (cross-cutting -- M-795 owns the harness, every leaf obeys it):
      The existing suite implicitly assumes the all-on (`certified`) behaviour. As modes land, tests
      become MODE-AWARE: every mode-sensitive test is PARAMETERIZED over the CertMode tiers
      (fast/balanced/certified) and maps to the INTENDED per-mode behaviour, not a single tier's. Each
      invariant is asserted (a) to FIRE in the tiers it applies to AND (b) to be correctly ABSENT/relaxed
      in the tiers it does not -- the negative/cross-mode cases, so we catch "the invariant holding when
      it shouldn't" (e.g. swap-cert CHECKING present in `certified`, ABSENT in `fast`; `Empirical`/`Proven`
      reachable in `certified`, NEVER in `fast`; certificate emission in balanced+certified, none in fast).
      Existing fixtures that asserted all-on behaviour are adapted: pinned explicitly to `certified` where
      they encode that contract, or parameterized where the behaviour differs by tier. No test is dropped
      -- only its mode-scope is made explicit (the DN-20 transparency rule for tiered tests).

      Definition of Done:
      - M-786..M-793 land Rust-first, each with property tests for its invariant; cargo +1.92
        fmt/clippy -D warnings/test green per crate.
      - Tests are MODE-PARAMETERIZED per the strategy above: each leaf's tests cover the relevant tiers
        + the cross-mode NEGATIVE cases (invariant absent where it should be); existing all-on fixtures
        adapted (pinned-to-certified or parameterized), none dropped. M-795 lands the shared harness.
      - M-794 conformance suite asserts all RFC-0034 §13 clauses (a)-(f) green, EACH parameterized over
        the modes; RFC-0034 advances Enacted(design) -> Enacted-with-code; ADR-032 decision 1 realized.
      - just check green; CHANGELOG append-only; docs/api-index regenerated for the new public surface.
      - No content-hash perturbation by the mode (ADR-003 property test); `fast` never carries
        Empirical/Proven (VR-5 property test).

      DONE (2026-07-01 resync): all 11 children (M-786..796) landed done; RFC-0034 advanced to
      "Enacted -- with code (Rust-first)" (2026-06-24) once M-794's §13 conformance suite landed
      green, meeting this epic's own Definition of Done.

