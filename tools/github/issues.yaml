        phylum witness; the compiler.token/compiler.lex duplication is removed (lex.myc imports
        token.myc's types via use); DN-26 gets an append-only note recording the lift;
        change-scoped just check green.
  - id: M-983
    title: "Retrofit the Stage-1/2 differential gates to the args-in/verdict-out one-eval harness"
