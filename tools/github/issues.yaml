      - corpus:RFC-0001
      - src:crates/mycelium-core/src/guarantee.rs
      - src:crates/mycelium-core/src/meta.rs
    body: |
      Make guarantee-tag computation/propagation mode-aware (the provenance tag as an adjustable unit).
      In `fast`, results sit at the structural tags (`Exact` where the repr is exact, else `Declared`) and
      NEVER compute `Empirical` (trials) / `Proven` (checked theorem); `balanced`/`certified` compute +
      propagate as today.
      Acceptance / DoD (TDD):
      - Property test (the VR-5 floor): NO `fast` result ever carries `Empirical` or `Proven`.
      - Property test: `certified` reproduces today's meet-propagation exactly (mechanism unchanged).
      - fmt/clippy -D warnings/test -p mycelium-core green.

  - id: M-788
    title: "M-788 -- mode-gated swap-cert emission + checking (RFC-0034 §4)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:numerics, priority:P1, status:done]
