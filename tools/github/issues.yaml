  - id: M-1079
    title: "M-1079 -- vet-harness phylum visibility: partial PhylumReport verdicts + phylum-mode --vet wiring + dual-report measurement basis (DN-124)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P2, status:todo]
    epic: E28-1
    depends_on: [M-1060]
    doc_refs:
      - corpus:DN-124
