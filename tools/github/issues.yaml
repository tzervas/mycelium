      A tiny throwaway-grade concrete syntax covering declare-value / swap / one VSA op, sufficient to run M-002 (SPEC §10.1). NOT a committed surface (gated on KC-2).

  - id: M-010
    title: "M-010 — Ratify core data-contract schemas"
