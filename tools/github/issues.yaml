  - id: M-1070
    title: "M-1036 residual: full per-import-provenance correct-home type resolution (the (a) fix, not the shipped conservative (b) closure)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P3, status:todo]
    epic: E28-1
    depends_on: [M-1036]
    doc_refs:
      - corpus:DN-112
      - src:crates/mycelium-l1/src/checkty.rs
    body: |
      Filed 2026-07-11 at the M-1036/DN-112 ctor-seal integration close-out (`claude/leaf/
      m1036-ctor-seal`), a disclosed residual named honestly rather than folded silently into
      M-1036's `done` (G2/VR-5). M-1036 shipped `lookup_data_home_checked` (`checkty.rs`), the
      **conservative (b) closure**: when the bare-local fallback would resolve a qualified name
      against a `DataInfo` whose `home` disagrees with the qualifier, it refuses explicitly rather
      than proceeding with the wrong declaration's shape. This is sound (a false-refuse is safe) but
      is NOT the full **(a) correct-home resolution** -- a single bare-keyed registry (own decls
      shadow imports, RFC-0006 §4.3) holds at most one `DataInfo` per bare name, so once a nodule
      locally shadows a foreign type's bare name, the foreign type's own `DataInfo` is not reachable
      from `types` at all. There is nothing correct to resolve against without a structurally larger
      change.

      User stories:
      - As a `.myc` author with a legitimate same-named-but-unrelated local type that also
        legitimately reaches (via a pattern match) a foreign nodule's same-named sealed type, I want
        my program to type-check correctly rather than being conservatively refused, so that the
        ctor-seal fix's soundness doesn't cost me an otherwise-valid shadow+cross-nodule-reach
        program.

      Definition of Done:
      - `crate::mono` (or an equivalent resolution layer) gains **per-import-provenance-scoped**
        type registries -- not one merged bare-keyed `BTreeMap<String, DataInfo>` -- so a qualified
        name resolves against the FOREIGN type's own `DataInfo`, not merely refuses on a home
        mismatch. The M-1036 conservative-refuse regression corpus (`ctor_seal.rs`) is extended with
        the previously-refused-but-legitimate shadow+cross-nodule-reach cases now correctly
        ACCEPTED. No regression on the existing refuse-on-genuine-mismatch cases. Guarantee posture
        moves the affected resolution path `Empirical` once witnessed by the extended differential
        (VR-5).

  - id: M-1071
    title: "Affine-tracker gap: a same, pre-existing Handle-typed local referenced+destructured twice is not tracked as a duplicated affine move (M-919/DN-71)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:bug, area:language, priority:P3, status:todo]
    epic: E30-1
    depends_on: [M-919]
    doc_refs:
      - corpus:DN-71
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/src/tests/checkty.rs
    body: |
      Filed 2026-07-11 at the M-1036/DN-112 ctor-seal integration close-out, surfacing a
      **pre-existing** gap the M-1054 Stage-3 affine work's own regression corpus documents and the
      ctor-seal leaf's soundness audit independently re-confirmed is NOT a regression from either of
      those landings (mitigation #14 -- verified, not assumed). Pinned by
      `crates/mycelium-l1/src/tests/checkty.rs::
      stage3_prior_handle_alias_destructured_twice_is_a_known_pre_existing_gap`: referencing the
      *same* pre-existing `Handle`-typed local twice and destructuring each occurrence
      independently (`match h { Wrap(s1) => s1 }` used alongside a second, independent `match h {
      Wrap(s2) => s2 }` over the same `h`) is accepted by the landed M-919/DN-71 Model-S affine
      `Tracker` -- and, confirmed by an equivalent ordinary hand-written (non-sugar) `fn` fixture in
      the same test, is accepted identically with NO sugar/facility machinery involved at all. Each
      `match`'s field-capture creates its own fresh, independent tracker slot (DN-71 §4.2), so the
      tracker does not itself track a composite value's identity across separate binding sites.

      User stories:
      - As a `.myc` author relying on the affine tracker to catch a duplicated-move bug, I want a
        genuinely duplicated consume of the same `Substrate`-carrying value to be caught even when
        it is reached through two independent pattern-match sites on the same prior local, not just
        within a single match's own arms.

      Definition of Done:
      - The `Tracker` (or its caller) gains composite-value identity tracking across independent
        binding sites reached from the same prior local (or a documented, ratified decision that
        this is out of scope, with a Draft DN recording why). A property test over generated
        multi-site-destructure programs. The existing
        `stage3_prior_handle_alias_destructured_twice_is_a_known_pre_existing_gap` regression is
        updated to assert the refusal once closed (or is documented as an accepted, ratified
        limitation if the DN scoping concludes fixing it is out of scope).

