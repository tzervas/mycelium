  - id: M-660
    title: "M-660 — spec + feat(l1): Effect annotations on fn signatures (RFC-0014 stage-1 surface)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-659]
    epic: E7-1
    doc_refs: [corpus:RFC-0014, corpus:RFC-0007, src:crates/mycelium-l1/src/ast.rs]
    body: |
      DONE (2026-06-22): effect annotations land on fn signatures — surface `fn … -> ret !{eff1, eff2}` (maintainer-decided `!{}`; absent ⇒ pure; effect names = identifiers; duplicate = parse refusal — G2); `ast.rs` `FnSig.effects`, `Tok::Bang`. The `checkty.rs` **effect-coverage** pass enforces **declared ⊇ performed** (performed = union of every callee's declared effects — a top-level fn OR an unqualified trait method — checked over fn AND impl-method bodies, so no effect is hidden from a caller; under-declaration = explicit `CheckError`, over-declaration OK — I5). Guarantee `Declared`; no new L0 node (KC-3). RFC-0014 §3.4 pins the surface (append-only, still Enacted); DN-14 §3 row 8 → `present`. **Deferred (was task 5, out of scope):** wiring declared effects into the `mycelium-interp::budget` runtime ledger + per-effect budget syntax (`retry(<=3)`) → **M-677**; `wild`-sourced effects → M-661. 203 `mycelium-l1` tests green (effect suite + monotonicity property + trait/impl conformance + a soundness regression for trait-method/impl-body coverage). — Original task:
      RFC-0014 §4.3 defines declared effects (RT3); the L1 surface has no effect-annotation syntax in `FnSig` or `FnDecl` (DN-14 §3 row 8). This issue: (1) amends RFC-0007 or RFC-0014 to define the stage-1 surface syntax (`fn f() -> T / {time, entropy}`); (2) extends `ast.rs` `FnSig` with an effects field; (3) adds effect-annotation parsing to `parse.rs`; (4) implements an effect-checking pass in `checkty.rs` (declared effects propagate; undeclared effect in a callee is a `CheckError` — I3); (5) wires declared effects into the `mycelium-interp::budget` ledger (M-353 landed the enforcement mechanism). Effect inference is monotone (adding a callee never removes effects from the caller) — property tested.
      Acceptance: `fn rng() -> Binary{64} / {entropy} = wild { … }` is a valid annotated signature; an unannotated caller of `rng` is a `CheckError`; property test for monotone effect inference; DN-14 §3 row 8 → `present`.

  - id: M-677
    title: "M-677 — feat(runtime): wire declared effects → mycelium-interp budget ledger + per-effect budget syntax"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:execution, priority:P2, status:needs-design]
    depends_on: [M-660]
    doc_refs: [corpus:RFC-0014, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      M-660 landed the effect-annotation SURFACE + the checker-side coverage check (declared ⊇ performed); it does NOT wire declared effects into the runtime. This issue: (1) thread a fn's declared effect set through elaboration to the L0 evaluator so the `mycelium-interp::budget` ledger (M-353) is primed/consumed per declared effect; (2) add the per-effect BUDGET surface syntax (`!{retry(<=3), alloc(<=64KiB)}` — RFC-0014 §3.4/I4) that M-660 left out (M-660 parses the effect SET only); (3) an overrun yields the explicit `EffectBudgetExhausted` (RFC-0014 I4), never a hang/OOM. No new L0 node (KC-3) — effects stay metadata threaded as budgets. Acceptance: a budgeted effectful fn runs under its budget and yields `EffectBudgetExhausted` on overrun; the M-210 three-way differential agrees; property test for budget monotonicity.
  - id: M-661
    title: "M-661 — feat(l1): `wild` block typechecking — enable auditable FFI surface in std-sys context"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-660]
    epic: E7-1
    doc_refs: [corpus:RFC-0016, corpus:RFC-0006, corpus:DN-14, src:crates/mycelium-l1/src/checkty.rs, src:crates/mycelium-l1/src/lexer.rs, src:crates/mycelium-l1/src/elab.rs]
    body: |
      DONE (2026-06-22): the audited `wild`/FFI floor type-checks in `mycelium-l1`, gated to an explicit **`@std-sys` nodule-header attribute** (`nodule std.sys.fs @std-sys`) — **not** a naming convention (maintainer-decided). Atomic `Tok::AtStdSys` lexing (`lexer.rs`/`token.rs`; narrow whole-word — `@std`/`@ Exact`/`@std-system` unaffected) → `Nodule.std_sys` (`ast.rs`/`parse.rs`), threaded through ambient resolution + the resolved twin to `checkty.rs` `Cx::check_wild`. A `wild { body }` block type-checks **iff** it is inside a `@std-sys` nodule **and** its `fn` declares the **`ffi` effect** (`wild` is the `ffi` effect *source*, fed into the M-660 coverage pass); a `wild` elsewhere is a **hard `CheckError`** — the issue's "lint warning" wording is **amended to a hard refusal** (cleaner LR-9; never silent — G2). The `wild` body is the **trusted/opaque** FFI escape — NOT recursively type-checked (audited, not verified — VR-5/ADR-014) — so synthesis refuses with "ascribe …"; the gate covers **impl-method bodies** too. **Execution stays staged** (no FFI host in v0): `elab.rs` lowers `wild` → an explicit `Residual`, `eval.rs` refuses with a staged message (never a fabricated value — G2), consistent with M-657/659/660. Guarantee **`Declared`**; no `unsafe` added. `myc-sec` `audit_wild` (the `// SAFETY:` audit) is orthogonal + unchanged. DN-14 §3 row 9 → `conditionally present (audited, std-sys context; type-checks + gates; execution staged)`; RFC-0016 §8-Q6 + RFC-0006 LR-9 carry append-only "implemented Rust-first, pending ratification" notes. 217 `mycelium-l1` tests green (10 `wild` cases + lexer/parser unit tests + `accept/18-wild-std-sys.myc`); `cargo fmt`/`clippy --lib -D warnings`/`test -p mycelium-l1` green. — Original task:
      `checkty.rs` rejects all `wild` blocks ("denied by default, LR-9"). DN-14 §3 row 9 records this as a gate-fail. RFC-0016 §8-Q6 resolved that the audited `wild` floor splits into a `std-sys` phylum (M-541 design done). This issue implements the typechecker path that accepts `wild { body }` inside a function annotated with the appropriate effect set (e.g., `/ {ffi}`). The `myc-sec` wild-audit gate must flag any `wild` block in a non-`std-sys` nodule (never a silent accept — G2). Enables the three call sites: `fs` syscalls, `rand` entropy, `math` libm.
      Acceptance: `fn read_byte() -> Binary{8} / {ffi} = wild { … }` typechecks and runs; a `wild` block in a non-`std-sys` nodule is a lint warning; `myc-sec` wild-audit gate continues to flag unapproved wild blocks; DN-14 §3 row 9 → `conditionally present (audited, in std-sys context)`.

  - id: M-662
    title: "M-662 — feat(l1): `phylum` construct + cross-nodule import resolution"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:needs-design]
    depends_on: [M-657, M-659]
    epic: E7-1
    doc_refs: [corpus:DN-06, corpus:RFC-0006, src:crates/mycelium-l1/src/parse.rs, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      `phylum` is lexed as `Tok::Phylum` (token.rs:29) but no parser production consumes it — falls to error arm (parse.rs:218); confirmed by lib.rs:87–95 test. This issue implements: (1) `phylum <path> { … }` header construct in the parser and typechecker (library-scale organizational unit per DN-06 §4); (2) cross-nodule `use` path resolution so `use std.collections.List` resolves across phylum boundaries; (3) multi-nodule typechecking (a phylum's nodules see each other's exported names). Requires generics (M-657) and traits (M-659) to already be in the typechecker because a phylum's public surface will include generic types and trait impls.
      Acceptance: a two-nodule phylum with cross-nodule `use` type-checks and elaborates; `phylum` is an active keyword in the grammar (conformance corpus updated); `just check` green; DN-14 §3 row 10 → `present`.

  - id: M-663
    title: "M-663 — feat(l1): Enact RFC-0018 stage-1 static guarantee grading in checkty.rs/elab.rs"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:needs-design]
    depends_on: [M-657]
    epic: E7-1
    doc_refs: [corpus:RFC-0018, corpus:RFC-0007, src:crates/mycelium-l1/src/elab.rs, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      RFC-0018 is Accepted (2026-06-18) but not yet enacted in `mycelium-l1`. `elab.rs` returns `Residual` for any `@ g` guarantee annotation on function return types or parameters (lines 215–223, 542–546, 580–583, 880–887). This issue implements the RFC-0018 Design A (data-lineage / data-provenance integrity) graded typing pass: the guarantee index `@ g` on a type becomes a statically-checked constraint; the checker enforces the lattice (`Exact ⊐ Proven ⊐ Empirical ⊐ Declared`) and propagates guarantee meets at call sites. Honesty: the noninterference argument remains `Declared-with-argument` per RFC-0018 §4 — this issue does not upgrade it.
      Acceptance: `fn f(x: Binary{8} @ Exact) -> Binary{8} @ Exact = …` type-checks correctly; calling `f` with a `@ Empirical` argument is a `CheckError`; `elab.rs` no longer returns `Residual` for `@ g` annotations; RFC-0018 Status → Enacted (after audit per M-648 criteria); DN-14 §3 row 11 → `present`.

  - id: M-664
    title: "M-664 — feat(l1): `consume`/`grow`/`impl` — surface language keywords for substrate consumption, capability extension, and inherent methods"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:needs-design]
    depends_on: [M-659]
    epic: E7-1
    doc_refs: [corpus:DN-03, corpus:RFC-0006, src:crates/mycelium-l1/src/token.rs]
    body: |
      DN-03 §1 ratifies `consume` (acquire affine `Substrate` resource), `grow` (derive-like capability extension), and `impl` (inherent method blocks) as chosen terms. None are in the lexer or parser. Note: `impl` reservation is a prerequisite of M-658 (the spec amendment); the lexer change for `impl` should land with M-658. This issue completes the three constructs: (1) reserves `consume` and `grow` in `keyword()` (token.rs); (2) implements `consume <expr>` expression for affine substrate acquisition (paired with `Substrate{name}` type); (3) implements `grow <trait> for <type> { … }` as the derive-like surface; (4) implements `impl <type> { fn … }` inherent-method block parsing and checking. Gated on traits (M-659) for the `grow` and `impl` constructs.
      Acceptance: `consume`, `grow`, `impl` are reserved keywords (never silent identifiers; reject-corpus entries added); `consume` elaborates to an affine move of a `Substrate` value (never copyable; LR-8); `grow Debug for MyType { … }` generates the declared trait impl; `impl MyType { fn to_bits(self: MyType) -> Binary{64} = … }` type-checks.

  - id: E7-2
    title: "E7-2 (epic) — RFC-0008 Runtime Vocabulary: Lexer Reservation → L1 Construct Activation (R1 then R2)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:epic, area:execution, priority:P2, status:needs-design]
    depends_on: []
    evidence_date: 2026-06-21
    landed_basis: "status:needs-design (NOT done) — evidence is a REFERENCE/partial, not a completed landing; git log 1d67da8 (2026-06-21) 'feat(l1+mlir): hypha/colony real-concurrency lowering, RT2-validated (M-666, E7-2 R1)'"
    epic: E7
    doc_refs: [corpus:RFC-0008, corpus:DN-03, corpus:DN-06]
    body: |
      Epic activating the RFC-0008 runtime vocabulary at the L1 surface. The 10 DN-03 §4 runtime terms (`hypha`, `fuse`, `mesh`, `graft`, `cyst`, `xloc`, `forage`, `backbone`, `tier`, `reclaim`) are ratified but none appear in `keyword()` or the `Tok` enum (token.rs fully inspected 2026-06-21). This is a G2 never-silent obligation: a ratified reserved word must never silently become an identifier. Additionally `colony` is lexed as `Tok::Colony` (token.rs:33) but no L1 parser production consumes it.

      Children (dependency-ordered): M-665 (lexer: reserve all 10 terms — no construct yet, just never-silent) → M-666 (L1 hypha + colony surface constructs; RFC-0008 R1) → M-667 (L1 fuse/reclaim/tier; RFC-0008 R1 remaining) → M-668 (RFC-0008 R2 planning: xloc/mesh/cyst/graft/forage/backbone). Orchestrator owns Cargo.toml, CHANGELOG, issues.yaml, RFC-0008 §4.6 enactment tracking, and DN-03 §5 reserved-word-set cross-ref.

      E7-2 is independent of E7-1 — the runtime lexer reservation (M-665) can start immediately; the L1 constructs (M-666/M-667) depend on M-357 (done) but not on the E7-1 language features. Only M-668 (R2 planning) optionally benefits from E7-1 being further along.
      Acceptance: all 10 DN-03 §4 runtime terms in `keyword()`; `hypha`/`colony` active L1 constructs; `fuse`/`reclaim`/`tier` active; R2 planning note produced; RFC-0008 §4.6 R1 enactment note updated; `just check` green.

  - id: M-665
    title: "M-665 — feat(l1-lexer): Reserve all 10 DN-03 runtime terms in keyword() — never-silent reservation (G2)"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:language, priority:P2, status:done]
    depends_on: []
    epic: E7-2
    landed_pr: 332
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Added (2026-06-21: M-665 — L1 reserves the 10 DN-03 runtime terms, never-silent (G2))'; merged-PR-list #332 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:DN-03, corpus:RFC-0008, src:crates/mycelium-l1/src/token.rs, src:crates/mycelium-l1/src/parse.rs]
    body: |
      DN-03 §4 ratifies 10 runtime vocabulary terms (`hypha`, `fuse`, `mesh`, `graft`, `cyst`, `xloc`, `forage`, `backbone`, `tier`, `reclaim`) as the one-per-concept names against RFC-0008 §4.5 operational meanings. None appear in `keyword()` or the `Tok` enum (token.rs fully inspected 2026-06-21). G2 never-silent obligation: a ratified reserved word must never silently become an identifier. This issue adds all 10 to `Tok` and `keyword()` as reserved-not-active tokens (like `phylum`/`colony` today — they lex as keywords, produce a "reserved for the runtime model (RFC-0008), not yet active" parse error, never a silent accept). Conformance reject-corpus entries added for each.
      Acceptance: all 10 appear in `Tok` and `keyword()`; each produces an explicit parse error if used as identifier or in an expression (G2); reject-corpus entries added; no grammar production yet consumes them (lexed-reserved, not active); `just check` green.

  - id: M-666
    title: "M-666 — feat(l1+runtime): RFC-0008 R1 `hypha` + `colony` L1 surface constructs"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P2, status:done]
    depends_on: [M-665]
    epic: E7-2
    landed_pr: 342
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Added (2026-06-21: M-666 — RFC-0008 R1 `hypha`/`colony` real-concurrency L1 constructs)'; merged-PR-list #342 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0008, corpus:DN-06, src:crates/mycelium-mlir/src/runtime.rs, src:crates/mycelium-l1/src/parse.rs]
    body: |
      M-357 (done) implemented Rust-level `Scope`/`Colony`/`Task` runtime in `mycelium-mlir::runtime`; M-356 (done) implemented per-task budgets and supervision. The gap is the L1 surface constructs: no parser production consumes `Tok::Colony` or (once M-665 lands) `Tok::Hypha`. This issue implements: (1) `colony { … }` as the L1 concurrency scope construct (wraps a `hypha`-spawning block; elaborates to runtime `Scope::join_all`); (2) `hypha <expr>` as the L1 concurrent task spawn (elaborates to a `Task` over a deterministic computation). Per RFC-0008 §4.6 R1: deterministic forms only; RT3 nondeterminism constructs are separate. FLAG: verify current state of SPSC channels in `mycelium-mlir::runtime` / `channel.rs` — M-357 body notes channels as a "next slice" item; this issue is gated on that clarity.
      Acceptance: `colony { hypha compute(x), hypha compute(y) }` parses, type-checks, and elaborates to `Scope::join_all` + `Task` calls; RT7 invariant enforced (a `colony` block cannot exit before all `hypha` children complete); RT2 differential holds; `hypha` and `colony` become active keywords in the grammar.

  - id: M-667
    title: "M-667 — feat(l1+runtime): RFC-0008 R1 remaining vocabulary — `fuse`, `reclaim`, `tier`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:feature, area:execution, priority:P2, status:needs-design]
    depends_on: [M-666]
    epic: E7-2
    doc_refs: [corpus:RFC-0008, src:crates/mycelium-mlir/src/runtime.rs]
    body: |
      After `hypha`/`colony` activate (M-666), the R1 vocabulary remaining is: `fuse` (lawful state fusion — RT6 semilattice merge), `reclaim` (supervision-tree reclamation of runtime units — RT7; the L1 surface hook into the `Supervisor`/`RestartIntensity` mechanism from M-356), and `tier` (execution-mode switch — the RFC-0004 `ExecutionMode` bridge). Each needs: (1) an L1 surface construct; (2) a type-checking pass; (3) elaboration to the runtime/AOT layer. `fuse` requires declared merge operations satisfying semilattice laws (RFC-0008 RT6); `reclaim` attaches a reified supervision policy (RT3/RFC-0005); `tier` switches RFC-0004 `ExecutionMode` with an EXPLAIN-able record.
      Acceptance: `fuse` expression type-checks with declared semilattice constraint (non-associative merge is a `CheckError`); `reclaim` supervision construct elaborates to `Supervisor` calls (M-356); `tier` switches execution mode with EXPLAIN-able record; all three active in the grammar; `just check` green.

  - id: M-668
    title: "M-668 — design: RFC-0008 R2 planning — `xloc`, `mesh`, `cyst`, `graft`, `forage`, `backbone`"
    milestone: "Phase 7 — Runtime & Concurrency Execution Model (RFC-0008)"
    labels: [phase:7, type:design, area:execution, priority:P3, status:needs-design]
    depends_on: [M-667]
    epic: E7-2
    doc_refs: [corpus:RFC-0008, corpus:DN-03, corpus:RFC-0005]
    body: |
      RFC-0008 §4.6 R2 covers the distribution vocabulary: `xloc` (explicit value movement across nodes), `mesh` (gossip/pub-sub overlay — RT5, probabilistic guarantees), `cyst` (content-addressed checkpoint of a dormable computation — RT2), `graft` (capability contract with external infrastructure — RT4), `forage` (adaptive placement policy — RFC-0005 site), `backbone` (declared high-bandwidth transport path — RT3). None have implementation RFCs yet; RFC-0008 §4.5 status rule requires each to have its own implementation RFC committing typing + elaboration. This planning issue produces the R2 decomposition: a design note or DN-11 append splitting R2 into per-construct implementation RFCs, with explicit dependency ordering, honesty bounds (probabilistic guarantee tags for `mesh` per RT5/T4.2, fallible typing for `xloc` per RT4), and gate conditions.
      Acceptance: a design note (or DN-11 append) decomposing R2 into per-construct implementation RFCs with explicit gates and honest guarantee tags; each R2 term's typing + elaboration strategy sketched (sufficient for a future implementation RFC); R2 explicitly gated on R1 completion (M-667); CHANGELOG entry.

  # ---------------- 2026-06-21: Dogfooding wave (post-1.0; see .claude/kickoff.md Track 3) ----------------
  - id: M-669
    title: "M-669 — feat(mycelium-lsp): lexical/scaffolding completion provider (dogfooding DX)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P2, status:done]
    depends_on: []
    landed_pr: 330
    landed_date: 2026-06-21
    landed_basis: "CHANGELOG.md '### Added (2026-06-21: M-669 — mycelium-lsp baseline completions, dogfooding DX)'; merged-PR-list #330 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [src:crates/mycelium-lsp/src/completions.rs, src:crates/mycelium-lsp/src/wire.rs]
    body: |
      Dogfooding developer-experience: a baseline LSP completion provider so developers scaffold Mycelium code easily. `crates/mycelium-lsp/src/completions.rs` offers (1) the 36 **ACTIVE** keyword completions drawn from `mycelium_l1::token::keyword()` (structural / expression / type / scalar / strength), and (2) five grammar-grounded snippets — `nodule-header`, `fn-def`, `type-adt`, `match-expr`, `swap-expr` (the swap snippet pins both `to:` and `policy:` per the S1/WF2 invariant). `wire.rs` advertises `completionProvider` and handles `textDocument/completion`.
      Honesty (G2/VR-5): scope is **Declared** — lexical/scaffolding only, no semantic/type-aware resolution (stated in the module doc). Reserved-not-active (`phylum`/`colony`) and not-yet-lexed runtime words (`hypha`…`reclaim`, plus `impl`/`consume`/`grow`) are **excluded** — never offered as if usable.
      Acceptance: `cargo test -p mycelium-lsp` green (83 tests); `completionProvider` advertised in `initialize_result`; ACTIVE keywords offered, reserved/not-yet-lexed words excluded; 5 grammar-grounded snippets. DONE (2026-06-21).

