    body: |
      From DN-99 §8 ENB-7 (Draft backlog). Closes register rows #79 (host-effect wild execution, partial)
      and #88 (never-type divergence `-> !`, genuinely open — verified `ast.rs` has no bottom BaseType).
      Grant real `wild:read/write/get_env/exit` ops from `mycelium-std-sys` into the PrimRegistry; add a
      fixture/sandbox differential for non-deterministic host ops (equality differential is defeated by
      real syscalls). Model `-> !` (never-type) as a divergent host-effect prim + a `diverges` effect —
      do NOT add a bottom `BaseType` (YAGNI, house rule #5) — with the totality-checker interaction
      specified. HIGH semcore-lane collision — touches `crates/mycelium-l1/**`: cloud-semcore-lane,
      coordinate M-1013. Needs a Draft DN.

      User stories:
      - As a std-sys author, I want real host syscalls exposed as never-silent `wild:` prims (and `exit`
        modelled as divergence), so that std.sys ports run against the OS with an honest fixture witness.

      Definition of Done:
      - One real syscall end-to-end + a fixture/sandbox witness for the non-deterministic ops; `exit`/
        divergence modelled as an effect with the totality interaction specified (no bottom BaseType);
        never-silent on out-of-domain host ops; a Draft DN records the effect model.

      DN-107 filed (Draft, 2026-07-10): a design-reasoner note working this decision forward — a ranked
      recommendation only, not a ratification (house rule #3). Status stays `todo` here until the
      maintainer ratifies DN-107 and implementation lands (VR-5 — no status flip on a Draft basis).

