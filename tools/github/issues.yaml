      - corpus:RFC-0034
      - corpus:RFC-0001
      - src:crates/mycelium-core/src/meta.rs
      - src:crates/mycelium-core/src/content.rs
    body: |
      Introduce `CertMode { Fast, Balanced, Certified }` in mycelium-core and attach the ACTIVE mode to
      every result's `Meta` (dynamic metadata). The foundation the rest of the epic builds on.
      Acceptance / DoD (TDD):
      - Property test: every constructed result carries a CertMode tag (never-silent, RFC-0034 §3.1).
      - Property test: the mode is EXCLUDED from the content hash (ADR-003 / RFC-0001 §4.6) -- switching
        modes does not change a value's content-id (mirrors how dynamic Meta is already excluded).
      - Tooling surfaces the active mode. fmt/clippy -D warnings/test -p mycelium-core green.

  - id: M-787
    title: "M-787 -- mode-gated provenance tagging: `fast` omits Empirical/Proven (RFC-0034 §7, §3.2)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:core-ir, priority:P1, status:done]
    epic: E21-1
    depends_on: [M-786]
