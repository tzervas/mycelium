    body: |
      Minted 2026-07-07 (DN-87 §4/§6). The query layer over Layer 1: structured queries (by id,
      status, kind, cross-reference walk) + text search, every answer carrying resolvable
      citations and the guarantee tag of what it cites. An answer without a resolvable citation
      is a REFUSAL, not an answer (never-silent applied to retrieval). Retrieval decisions are
      EXPLAIN-able (why these sources, in what order).

      User stories:
      - As the maintainer, I want a wrong answer traceable to its source in one hop, so that the
        memory system can be audited exactly like the corpus it encodes.

      Definition of Done:
      - Query API (in-crate) with citation-mandatory answers; refusal path tested; EXPLAIN output
        for ranking; latency measured and recorded (Empirical) on the real corpus.

