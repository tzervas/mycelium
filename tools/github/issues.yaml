      (4) DN-09 §9 (or §10) updated append-only with final result; M-381 and M-646 closed.
      Guarantee tags: scorer pass/fail logic Exact (deterministic parser); trial counts Empirical; retention ratio verdict Empirical (if run completes with ≥3 seeds).
