    landed_basis: "CHANGELOG.md '### Added (2026-06-17: `myc-lint` — lint + auto-fix, folded — M-366; the M-361 suite is complete)'"
    body: |
      Sub-issue of M-361. The error/issue checking AND auto-fixing tool: surface the M-141 invariant lints + the RFC-0013 diagnostics + the RFC-0015 auto-baseline "this class is only logged — add a handler?" lint (RFC-0015 §9) as ACTIONABLE fixes, and offer RFC-0014 recovery scaffolds (an explicit handler skeleton — never an implicit control-flow change; A2/I5). Also hosts the M-363 §4.1 documentation quality-bar lint (the 8 checks over the doc IR — checked examples, undocumented-is-flagged, dual-projection parity, …). Every fix is a reified, inspectable, opt-in edit (no silent rewrite; G2). No kernel change (KC-3). Acceptance (design-first): the fix model (suggest vs apply; the opt-in boundary) before folding.
  - id: M-367
    title: "M-367 — security checks as tooling (secrets / supply-chain / `wild`-audit)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: `myc-sec` — security checks as tooling, folded — M-367)'"
    body: |
      Sub-issue of M-361. The /security-review posture as a tool: secret scanning, supply-chain checks (pinned deps, lockfile integrity, no `curl|bash`), and a `wild`-block audit (LR-9/S6 — every denied-by-default unsafe region is inventoried + justified). Reuses the existing scripts/checks/{secrets,deny}.sh discipline, lifted into the full-fat suite with honest, EXPLAIN-able findings (a flagged item cites why; G2). Adding any new external dependency stays a decision (ADR), not a build detail. No kernel change (KC-3). Acceptance (design-first): the check set + severity/honesty contract before folding.
  - id: M-368
    title: "M-368 — packaging & publishing: `mycelium-proj.toml` → spore (ADR-013)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-359, M-361]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: `spore` — packaging & publishing, folded — M-368)'"
    body: |
      Sub-issue of M-361. The packaging/metadata + publishing layer: consume the M-359 `mycelium-proj.toml` manifest (the `[spore]`/`[surface]`/`[dependencies]` tables M-359 accepts-but-does-not-yet-interpret) to build a `spore` — the content-addressed, deployable artifact of a `phylum`/program (ADR-013; the germinates-into-a-colony unit, DN-06/Glossary). Content-addressed identity is canonical (ADR-003); metadata is not identity. Honest: a missing/ambiguous publish input is an explicit error, never a guessed default (G2). No kernel change (KC-3). Acceptance (design-first): the spore build + dependency-resolution contract before folding.

  # Phase 9 (M-369) — the toolchain gate's end-to-end conformance fixture (Wave D). Folds under the
  # M-361 gate: grow examples/ from the minimal hello-phylum into a richer, still-green-and-real
  # corpus that dogfoods all four gates over representative L1 programs. Landed this session; no
  # GitHub issue number minted yet (resolved at the next gh-sync-all.sh board reconcile).
  - id: M-369
    title: "M-369 — examples/ end-to-end conformance fixture (Phase 9 Wave D): richer toolchain dogfood"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-361, M-364, M-365, M-366, M-367, M-368]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: the toolchain gate's richer end-to-end conformance fixture — Phase 9 Wave D; M-369)'"
    body: |
      Sub-issue of M-361 (Phase 9 Wave D). Grow examples/ from the Wave-A minimal `hello-phylum` into a richer end-to-end fixture that exercises MORE of the L1 surface through ALL FOUR gates (mycfmt --check, myc-check --project, myc-sec wild-audit, myc-lint), so the gate proves the tools on representative programs rather than a toy. Lands `examples/repr-tour/` — a multi-nodule phylum touring a guarantee-annotated swap (the LR-6 honesty index across the Exact ⊐ Proven ⊐ Empirical ⊐ Declared lattice), a trait, a matured fn (matured ⟹ total), ambient representation (RFC-0012 default paradigm / `{N}` / `with paradigm`), and a `for` fold (RFC-0007 §4.8) — every nodule canonicalized with `mycfmt --write` and PASSING all four gates. Adds a NON-GATING `myc-spore` packaging smoke (`spore build`, M-368) that always exits 0 — it dogfoods the 5th tool without gating, since packaging is a build artifact not a correctness property. Honest findings, deliberately kept OUT of the gated examples (each an open deferral, not a forced-green gate; G2/VR-5): the L1 `spore(…)` expression is deferred in the type-checker (E2-5/M-260), and mycfmt v0 refuses interior comments (the §10.2 comment-preserving deferral). New fixtures live under examples/ (real project roots) and MUST stay green — they are NOT must-fail inputs (locked decision #3: tests/fixtures/ + reject/ stay ungated). No kernel change (KC-3), no new dependency. Acceptance: `bash scripts/checks/all.sh` prints ALL CHECKS PASSED with both phyla green across the four gates.

  # ════════════════════════════════════════════════════════════════════════════════════════════════
  # BACK-FILL (2026-06-17, PM reconcile) — the Phase-2 M-2xx epic decomposition + M-351, recovered into
  # the manifest. These task-ids were CREATED on GitHub (idmap.tsv #48–#65, #114) from docs/planning/
  # phase-2.md when Phase 2 was worked, but the entries were never written back into issues.yaml — so the
  # manifest was the incomplete side (gh-issues-sync.py --validate flagged "idmap.tsv: 19 task(s) not in
  # issues.yaml"). Recovered here APPEND-ONLY (existing entries untouched; ordering preserved) and grounded
  # ENTIRELY in the cited corpus (phase-2.md §2/§6 for the M-2xx set; CHANGELOG + RFC-0012 §8/§9 for M-351)
  # — reconstructed, never invented (the planning analogue of never-silent, G2). All are DONE at the task
  # level (phase-2.md §8 exit-gate met 2026-06-12; M-351 #114 decided 2026-06-16); status:done is a label,
  # not a state change — the reconciler never infers OPEN/CLOSED from it.
  # ── Phase 2 — E2-4 (verified-numerics) decomposition: M-201…M-204 ──────────────────────────────────
  - id: M-201
    title: "M-201 — ErrorBound (ε) affine-arithmetic kernel"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:numerics, priority:P0, status:done]
    depends_on: [M-101]
    body: |
      E2-4 (#31) decomposition (ADR-010 §1 / RFC-0001 §4.7). Affine-form ε composition (add/sub/mul/neg/scale) with a radius→eps projection; Soundness/Monotonicity/Determinism each property-tested. The kernel only ever degrades strength (composition is monotone-downward); a norm mismatch is an explicit None, never a coercion (G2).
      DONE (2026-06-09): mycelium-numerics::error — AffineForm (shared noise symbols cancel — the correlation advantage over interval arithmetic) with exact linear ops + a sound mul (second-order remainder); the scalar ErrorBound{eps,norm} projection; 20k-trial property tests per law. (phase-2.md §6.1.)

  - id: M-202
    title: "M-202 — ProbBound (δ) union-bound kernel"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:numerics, priority:P0, status:done]
    depends_on: [M-101]
    body: |
      E2-4 (#31) decomposition (ADR-010 §2 / RFC-0001 §4.7). union(δ₁..δₙ)=min(1,Σδ); apRHL [SEQ] ⟨ε,δ⟩; Soundness/Monotonicity/Determinism tested; a DIFFERENT monoid from ε by construction (T0.1c) — does NOT supply VSA crosstalk content (ADR-010 §5; that stays on RFC-0003's cited-theorem path).
      DONE (2026-06-09): mycelium-numerics::prob — ProbBound{delta} with saturating union/or + ApRhlJudgment{eps,delta} with seq; union over-estimates the empirical "any fails" rate over 200k Monte-Carlo trials. (phase-2.md §6.2.)

  - id: M-203
    title: "M-203 — Shared {ε,δ,strength} certificate + tier-i checker"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:numerics, priority:P0, status:done]
    depends_on: [M-201, M-202]
    body: |
      E2-4 (#31) decomposition (ADR-010 §3/§4 + the trusted base). Certificate{eps,delta,strength} (strength by meet, serializable); a tier-i Rust checker that REJECTS a too-tight certificate; accuracy_to_probability the single legal cross-kernel rule. Incompleteness is an explicit Rejected/Malformed, never a silent pass (RFC-0002 §2); strength never upgraded without a checked basis (VR-5).
      DONE (2026-06-09): mycelium-numerics::cert — Certificate + recompute_error; check_error_claim/check_union_claim → Valid/Rejected{recomputed,claimed}/Malformed (tighter-than-rederivation rejected, looser is sound); compose_error_bound (the M-204 entry, basis by meet). (phase-2.md §6.3.)

  - id: M-204
    title: "M-204 — Interpreter honest approximate composition"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:core-ir, priority:P0, status:done]
    depends_on: [M-201, M-202, M-203]
    body: |
      E2-4 (#31) decomposition (RFC-0001 §4.7). Retire EvalError::ApproxCompositionUnsupported for composable approximate inputs: an exact-over-exact op stays Exact/bound=None (M-I1); an op over approximate inputs carries the kernel-composed Bound + meet-strength; a golden test checks the propagated {bound,guarantee} against the kernel's direct composition; M-I1…M-I4 stay enforced.
      DONE (2026-06-09): mycelium-interp::prims — exact_result generalized to compose_result with a per-prim ApproxRule (core.id Passthrough; trit add/sub/neg sound 1-Lipschitz ε; bit.* and trit.mul still Refuse — explicit, never silent). Closes the documented Phase-1 honesty gap. (phase-2.md §6.4.)

  # ── Phase 2 — E2-3 (full swap + shared certificate checker) decomposition: M-210…M-212 ─────────────
  - id: M-210
    title: "M-210 — Shared translation-validation certificate checker"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:swap, priority:P0, status:done]
    depends_on: [E2-4, M-120, M-151]
    body: |
      E2-3 (#30) decomposition (RFC-0002 §2 / RFC-0004 §3). ONE check(A,B,R,claimed-bound,certificate) with a RefinementRelation (bijection | bounded-similarity | observational-equiv); Exact instances discharge by equality, bounded instances consume the E2-4 certificate; TV incompleteness is an explicit fallback, never a silent pass; the M-120 swap cert and the M-151 interp↔AOT differential both validate through the one checker.
      DONE (2026-06-10): mycelium-cert::check — CheckVerdict::Validated{strength}/NotValidated{reason,fallback}; bijection by structural re-derivation equality (re-checks the round-trip lemma + legal_pair side-condition), BoundedSimilarity twice-validated through the tier-i kernel (a claim never outruns its checked evidence, VR-5), ObservationalEquiv folding the M-151 differential. This is the M-302 native differential's checker. (phase-2.md §6.5.)

  - id: M-211
    title: "M-211 — Bounded/lossy swap (Dense F32→BF16)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [E2-4, M-210, M-230]
    body: |
      E2-3 (#30) decomposition (RFC-0002 §5 / ADR-010 §1) — the first Bounded swap. dense_f32_to_bf16 emits the converted value + a Bounded cert with a basis-derived ε bound; validates through M-210; NaN/Inf handling explicit. Subnormal/approximate sources are REFUSED, not tagged with a bound the theorem doesn't cover (VR-5; RFC-0002 §5 "type error, not a Declared gamble").
      DONE (2026-06-10): mycelium-cert::dense — round-to-nearest-even with the proven per-element {eps:2^−8, norm:Rel} bound, ProvenThm basis (Higham 2002 Thm 2.2 at β=2,p=8) checked PER ELEMENT; 20k-sweep soundness + idempotence. Scope note: needed only the Phase-1 Dense{dim,dtype} repr (M-101/M-103); M-230's Dense ops stayed independent. (phase-2.md §6.6.)

  - id: M-212
    title: "M-212 — KC-4 cert-overhead measurement + SC-3 global exit"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:swap, priority:P1, status:done]
    depends_on: [M-210, M-211]
    body: |
      E2-3 (#30) decomposition (KC-4 / SC-3). A bench harness reporting cert-check cost per swap kind with an HONEST measured verdict vs the KC-4 budget (no pre-written "within budget", VR-5); a test asserting every swap in the legal-pair table emits and validates a certificate, and every unimplemented/rejected row fails EXPLICITLY (SC-3 global, never silent anywhere).
      DONE (2026-06-10): cargo xtask kc4 (refuses to measure a debug build) — measured per-swap cert checking costs the SAME ORDER as the swap itself (bijective ≈1.3×, bounded ≈0.13×), so the KC-4 downgrade path is NOT triggered on this evidence; a numeric budget ratification stays a pending maintainer decision. tests/sc3.rs pins SC-3 global. (phase-2.md §6.7.)

  # ── Phase 2 — E2-6 (selection policy + EXPLAIN) decomposition: M-220…M-222 ─────────────────────────
  - id: M-220
    title: "M-220 — Decision-table SelectionPolicy + cost function"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P0, status:done]
    depends_on: [M-101, M-102, M-103]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §2/§3). Ordered (predicate over queryable Meta) → candidate rules + explicit cost; TOTAL (default arm) and terminating by construction; deterministic; content-addressed; first-class override; fixed declared precedence. The "statistics" are the kernel's exact metadata — the cardinality-estimation opacity trap does not arise (RFC-0005 §2.5).
      DONE (2026-06-10): new crate mycelium-select (KC-3 §5 decision — selection stays out of the trusted kernel) — SelectionPolicy with a validating constructor, a small closed non-Turing-complete Predicate language, a CostModel in real storage BITS (not "arbitrary internal units"), policy_ref() content-addressing the canonical serialization. (phase-2.md §6.8.)

  - id: M-221
    title: "M-221 — Mandatory EXPLAIN trace + LSP surfacing"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P0, status:done]
    depends_on: [M-220, M-140]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §2.2/§4 / SC-5). A serializable Explanation populated on EVERY selection (candidates + per-candidate cost + chosen + override state); explain(policy, meta) total and deterministic; the LSP facade exposes EXPLAIN as a surfaced artifact kind; a ranking test. Mandatory EXPLAIN is the operational form of "no black boxes" (G2/ADR-006).
      DONE (2026-06-10): Explanation emitted by select on every call (no selection without an EXPLAIN); mycelium-lsp::analyze_with adds the FIFTH artifact kind to the M-140 facade + a policy-divergence warning that keeps even overridden selections inspectable. (phase-2.md §6.9.)

  - id: M-222
    title: "M-222 — Wire selection into swap-target (and packing) sites"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:selection, priority:P1, status:done]
    depends_on: [M-220, M-221]
    body: |
      E2-6 (#33) decomposition (RFC-0005 §4) — one mechanism, two sites. The swap path records Meta.policy_used = PolicyRef + EXPLAIN on auto-selection; a single select(policy, candidates, meta) → (choice, explanation) serves both sites; override forces the alternate target deterministically; a wrong-kind candidate is an explicit WrongSiteKind refusal, never a coercion.
      DONE (2026-06-10): select_swap_target / select_packing thin adapters over the single select; the wiring test asserts "which policy chose this?" is answerable from the value alone. The packing-site CONSUMPTION is honestly deferred to E2-7/M-250 exactly as the issue scopes it. (phase-2.md §6.10.)

  # ── Phase 2 — E2-1 (Dense) decomposition: M-230…M-231 ──────────────────────────────────────────────
  - id: M-230
    title: "M-230 — Typed dim-tracked Dense{dim,dtype} ops"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [M-101]
    body: |
      E2-1 (#28) decomposition (RFC-0001 §4.1 / RFC-0002 §5). Dense construction over ScalarKind (F32/BF16) with dim IN the type; elementwise + similarity ops with Exact/Bounded tags per op; dim mismatch a typed error; property tests; float-op ε via E2-4. An off-grid payload contradicts its Repr — refused, never re-rounded.
      DONE (2026-06-11): new crate mycelium-dense (KC-3, like numerics/selection) — add/sub/scale Proven per-element Rel ε (Higham Thm 2.2 checked per element), neg Exact; dot/similarity f64 helpers; a 20k-pair sweep per dtype (SC-2). F16/F64 explicitly unsupported; approximate-source composition refused (ApproximateSource), the open magnitude-aware rule recorded. (phase-2.md §6.11.)

  - id: M-231
    title: "M-231 — Dense↔VSA swaps with ε/δ bounds"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:swap, priority:P1, status:done]
    depends_on: [E2-4, M-210, M-230, M-130]
    body: |
      E2-1 (#28) decomposition (RFC-0002 §5 / RFC-0003). dense_to_vsa / vsa_to_dense emit Bounded certs with ε and/or δ, basis DERIVED (ProvenThm where a cited capacity theorem's side-conditions check, else EmpiricalFit); certs validate through M-210; SC-2 for the new swaps.
      DONE (2026-06-11): mycelium-cert::dense_vsa — bipolar Dense encoded as a MAP-I superposition over a deterministic versioned codebook (so the T0.2 capacity theorem applies), provenance-gated decode; δ basis = ProvenThm iff vsa_dim ≥ requiredDim(n,δ) (reusing the M-131 checked instantiation) else EmpiricalFit else explicit InsufficientCapacity. The M-210 checker's δ-side lands here (the Incomplete placeholder retired). General-real components refused (NotBipolar). (phase-2.md §6.15.)

  # ── Phase 2 — E2-2 (remaining VSA models) decomposition: M-240…M-242 ───────────────────────────────
  - id: M-240
    title: "M-240 — VSA models MAP-B + BSC"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4). MapB/Bsc implement the VsaModel trait; bind/unbind/permute Exact (property-tested round-trips); bundle carries the HONEST capacity tag per the §4 matrix. A Proven value tag without a corpus formula would violate M-I2/VR-5 — so Value-level bundles carry a trial-backed Empirical δ instead, with an explicit refusal outside the validated profile (OutsideEmpiricalProfile).
      DONE (2026-06-11): mycelium-vsa::{mapb,bsc} — MAP-B (bipolar, sign-rounded bundle) + BSC (XOR bind, majority bundle, centered Hamming similarity); intrinsic bundle tag Proven per the matrix but Value-level Empirical from declared EmpiricalProfile constants exercised with exactly the declared 10⁴ trials (M-I3). RR-13 NestedBundleUnsupported refusal landed here. (phase-2.md §6.12.)

  - id: M-241
    title: "M-241 — VSA models HRR + FHRR (Empirical unbind)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130, M-132, E2-4]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4 / T1.2). Hrr/Fhrr implement the trait; bind algebraic; unbind tagged Empirical with a trial-validated EmpiricalFit bound, routed through cleanup; bind→unbind→cleanup recovery trials within the stated δ. The matrix is normative, never upgraded (FHRR stays Empirical even where pure-pair recovery is near-exact).
      DONE (2026-06-11): mycelium-vsa::{hrr,fhrr} — HRR (naive-O(d²) circular convolution reference; correlation unbind) + FHRR (phase-angle, explicit DegenerateBundleComponent refusal); unbind is the residual Empirical weak link, Value-level unbind_values trial-validated and provenance-gated to the validated single-factor regime (T1.2). Multi-factor recovery left to the Phase-3 resonator, not silently approximated. (phase-2.md §6.13.)

  - id: M-242
    title: "M-242 — Sparse/SBC + the §4 matrix + RR-13"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-240, M-241]
    body: |
      E2-2 (#29) decomposition (RFC-0003 §4 / RR-13). A sparse model with declared sparsity as a static refinement + observed sparsity as runtime metadata (T1.3, both halves); the §4 matrix as a SINGLE source-of-truth table asserted in tests; MAP-B deep nesting an explicit flagged condition.
      DONE (2026-06-11): mycelium-vsa::sbc (sparse block codes; exact algebraic unbind; counting-Bloom bundle) carrying declared Sparse{max_active} in the Repr + observed SparsityObs in Meta; mycelium-vsa::matrix encodes RFC0003_MATRIX (6 models × 4 ops) with tests/matrix.rs asserting every implemented tag equals the table; RR-13 NestedBundleUnsupported enforced. A Value-level SBC bundle bound is recorded future work (no corpus Bloom formula), not approximated. (phase-2.md §6.14.)

  # ── Phase 2 — E2-7 (packing selector) decomposition: M-250…M-251 ───────────────────────────────────
  - id: M-250
    title: "M-250 — Schedule-staged packing selector (I2_S/TL1/TL2)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:execution, priority:P1, status:done]
    depends_on: [M-222, M-112]
    body: |
      E2-7 (#34) decomposition (RFC-0004 §5 / DN-01). A packing candidate set + cost function; EXHAUSTIVE selection over the fixed bitnet.cpp set (I2_S/TL1/TL2) through the M-222 select API, emitting an EXPLAIN trace; the chosen layout recorded in meta.physical (lossless, M-I5); determinism + override tested; an E1 perf-harness stub recorded. Packing is a SCHEDULE concern, not a type distinction (DN-01 §2/§6) — never in the type or content hash.
      DONE (2026-06-12): mycelium-select::{bitnet_packing_policy, select_layout, record_packing_layout} — the one E2-6 mechanism (no parallel selector), bits/element cost (TL2 the deterministic cheapest), the lossless Meta::with_physical (M-I5), cargo xtask e1 stub with an explicit "not established" verdict (VR-5). The packing-codec bytes live in mycelium-mlir, NOT the trusted kernel (KC-3). (phase-2.md §6.17.)

  - id: M-251
    title: "M-251 — E3 wrong-layout soundness differential"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:verification, area:execution, priority:P1, status:done]
    depends_on: [M-250, M-151]
    body: |
      E2-7 (#34) decomposition (RFC-0004 §8 / NFR-7). Extend the M-151 interp↔AOT differential so a deliberately MISLABELED meta.physical layout FAILS observational equivalence through the M-210 checker, and a correct one passes — proving the layout record is sound-by-checking (the Mycelium analogue of the MLIR-transpose / Rust-packed "wrong layout misreads memory" bug DN-01 §4 cites).
      DONE (2026-06-12): mycelium-mlir::pack (bijective trit↔byte codec, the three schemes mutually distinct; total decode — a misread, never a panic) + aot::run_with_layout; tests/wrong_layout.rs flips the M-210 verdict SOLELY on the layout tag (correct ⇒ Validated, mislabeled ⇒ NotValidated{Diverged} ⇒ fall back to the reference). Real native pack/unpack kernels + the calibrated E1 answer deferred to the native backend (ADR-009). (phase-2.md §6.18.)

  # ── Phase 2 — E2-5 (reconstruction manifest) decomposition: M-260 ──────────────────────────────────
  - id: M-260
    title: "M-260 — Reconstruction manifest (ReconInfo)"
    milestone: "Phase 2 — Full Unification & Verified Swaps"
    labels: [phase:2, type:feature, area:vsa, priority:P1, status:done]
    depends_on: [M-130, E2-4]
    body: |
      E2-5 (#32) decomposition (RFC-0003 §6). A ReconInfo serializing to reconstruction-manifest.schema.json (the ratified name — the issue's recon-info.schema.json reconciled, §7 naming OQ resolved) distinguishing indexed retrieval from compositional reconstruction; content-addressed codebooks; attached bound; the compositional path recovers a NOVEL combination; round-trip + reconstruction tests. Resonator factorization stays Phase-3 with the probabilistic-only ceiling enforced IN THE TYPE (a ProvenThm basis is refused — FR-C2).
      DONE (2026-06-11): mycelium-core::recon (kernel carries the metadata field per RFC-0003 §2) + Meta.reconstruction; mycelium-vsa::recon::reconstruct_role executes the manifest. Acceptance: bundle(color⊗red, shape⊗cube) with both pairs absent from every codebook recovered role-by-role (the §6 exit criterion). This is the M-350 resonator's gated dependency. (phase-2.md §6.16.)

  # ── Phase 4 — M-351 (RFC-0012 ambient deferred extensions) ─────────────────────────────────────────
  # NB: idmap.tsv files M-351 (#114) under "Phase 4 (RFC-0012 ambient deferred extensions)"; the task is
  # the M-344 ambient follow-up that resolves RFC-0012 §8 R12-Q1/Q2. (The PM-task prompt's "Phase-3
  # toolchain task" label does not match the corpus — grounded here in Phase 4 where the corpus places it;
  # the milestone/phase is recorded as found, not as described, per "ground every task / never invent".)
  - id: M-351
    title: "M-351 — RFC-0012 R12-Q1 & R12-Q2 resolution (ambient deferred extensions)"
    milestone: "Phase 4 — Interpreted↔Compiled ABI, Hot-Inject & AOT-Fragment Completion"
    labels: [phase:4, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-344]
    landed_date: 2026-06-17
    landed_basis: "CHANGELOG.md '### Added (2026-06-17: PM phase-allocation reconcile — Phase-2 M-2xx back-fill + M-351; Phase 5 & 6 task sets)'"
    body: |
      The two RFC-0012 §8 open questions the M-344 ambient enactment deferred. R12-Q1 (per-use size) → NO new sugar: a paradigm-less ascription `e : {N}` already states an explicit size at the use site (paradigm from the central default), elaborating identically to longhand (I2); sizes stay explicit (no ambient default width) and a u8/f64 literal suffix was REJECTED (imports signed/dtype affordances the kernel does not provide — a false-affordance footgun; v0 Binary is unsigned). R12-Q2 (paradigm-boundary swaps) → crossings stay at swap sites: no default swap policy; `with paradigm` stays pure tag-scoping (SoC); the boundary-AUDIT value is routed to observability tooling (M-345 → DN-04 / RFC-0013 §4.6, the representation-crossing audit view) where lossy conversions are enumerated with their honesty bound (never upgraded, VR-5).
      DECIDED — DONE (2026-06-16): M-351 (#114) closes with NO new ambient surface; R12-Q1/Q2 both resolve to the M-344 baseline. The enforced block-edge boundary is recorded as an optional future discipline (RFC-0012 §9, not adopted). (CHANGELOG "Decided (Phase 4 — M-351 …)"; RFC-0012 §8/§9.)

# ════════════════════════════════════════════════════════════════════════════════════════════════
# Phase 5 — Self-Hosting & Core Library (ANTICIPATED — not yet ratified; scope firms at the Phase-4 gate).
# Created 2026-06-17 (PM phase-allocation reconcile) so the defined-but-unused phase:5 label + the
# "Phase 5 — Self-Hosting & Core Library" milestone are no longer empty (gh-issues-sync.py --validate
# flagged both). DECOMPOSES the M-346 stdlib epic (which already NAMES its candidate modules + acceptance:
# "draft a Core Library RFC … and decompose into per-module tasks") and the milestones.json Phase-5 charter
# (self-host the RFC-0013/0014 diagnostics + recovery in Mycelium-lang). Grounded ENTIRELY in M-346 +
# milestones.json + RFC-0013/0014; scoped to what the roadmap implies, NOT over-invented. All design-first
# (status:needs-design) and out-of-gate (P3); M-501 is the keystone gate the rest depend on. Like the
# M-364…M-368 staging precedent: GitHub issue numbers are minted on the next gh-sync-all.sh run at the
# Phase-5 gate (the MCP cannot create milestones/colored labels); idmap records them then. Sequencing vs
# Phases 6-7 is a maintainer gate decision (MILESTONES.md). FLAGGED open question: whether self-hosting
# precedes or follows the Phase-7 runtime track is unresolved in the corpus — recorded, not decided here.
  - id: M-501
    title: "M-501 — Core Library RFC (scope, module boundaries, the per-op guarantee/EXPLAIN contract, Rust→Mycelium migration)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:toolchain, priority:P3, status:done]
    depends_on: [M-346]
    body: |
      The design-first keystone M-346's acceptance NAMES: "when self-hosting is close, draft a Core Library RFC (scope, module boundaries, the guarantee/EXPLAIN contract every stdlib op must meet, Rust→Mycelium migration) and decompose into per-module tasks. Present before folding." This is that RFC — the gate the rest of Phase 5 depends on. The contract every stdlib op must meet is the language's own house rules lifted to library scope: never-silent (G2), honest per-op guarantee tags (VR-5), no black boxes / EXPLAIN, content-addressed (ADR-003), small auditable kernel — the stdlib lives ABOVE it (KC-3). Rust-first now (ADR-007), Mycelium-lang eventually (dogfooding).
      Acceptance (design-first): the Core Library RFC presented + ratified (Draft→Accepted, maintainer) before any stdlib code; it fixes the module set, the per-op guarantee/EXPLAIN contract, and the Rust→Mycelium migration order. FLAG any module whose intent is not yet grounded rather than inventing scope.

  - id: M-502
    title: "M-502 — Self-hosting readiness gate (surface language sufficient to author stdlib modules in Mycelium)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:language, priority:P3, status:done]
    depends_on: [M-346, M-320]
    landed_date: 2026-06-19
    landed_basis: "CHANGELOG.md '### Added (2026-06-19: Wave-4B landed — M-541 std-sys FFI floor, M-502 DN-14 self-hosting gate, M-540 RFC-0012 ergonomics annotations)'"
    doc_refs: [corpus:DN-13, corpus:RFC-0007, src:crates/mycelium-l1/src/lib.rs, src:docs/notes/DN-14-Self-Hosting-Gate.md]
    body: |
      M-346 conditions the whole stdlib decomposition on a precondition: it is "decomposed once the surface language is self-hosting enough to write stdlib modules in Mycelium itself (dogfooding; free of other languages)". This task makes that precondition CHECKABLE: enumerate the surface-language capabilities a stdlib module needs (the RFC-0007 term language M-320 extends; data + recursion; the RFC-0012 ambient surface; nodules/phyla per DN-06; the M-359 manifest) and produce an honest readiness verdict — self-hosting is "close" / "not yet" (never pre-declared, VR-5).
      Acceptance (design-first): a readiness assessment against M-501's contract; a "not established" verdict stays honest until the surface actually supports it. Gates M-510…M-520.
      DONE (2026-06-19): DN-14-Self-Hosting-Gate.md created (Draft, 156 lines). Verdict: 5/11 features present, 5 gate-fails, 1 partially missing — self-hosting NOT YET established. Gate-fails: generics, trait interfaces, effect annotations, wild/FFI blocks, static guarantee index. Grounded in actual source files (checkty.rs, ast.rs). Honest: no feature stamped present on intent alone.

