      `crates/mycelium-l1/**`, coordinate M-1013" framing is CORRECTED as over-scoped (DN-99 #89's own
      tags already agree — layer `tr`, collision `low`; no M-1013 coordination, no L1 change).

      - Part 1 — statement-sequencing `let _ = e in body` — is an ordinary `let` whose binder is the
        identifier `_` (grammatical `ebnf:291`/`ebnf:447`; parsed, checked, evaluated, elaborated; the
        established affine drop/use-once surface, DN-71/M-903). The residual is the TRANSPILER emit of
        `let _ = e in body` for value-producing discarded `Stmt::Local` statements.
      - Part 2 — functional field-update — is the already-expressible destructure-and-reconstruct
        `match base { Ctor(f0, …) => Ctor(f0, …, NEW, …) }` (Mycelium has positional constructors, no
        named-field record literal and no field-projection BY DESIGN — DN-106 §2/§3, KC-3; the
        `{ ..base, field: v }` record-update literal is a never-silent parse refusal today, G2). The
        residual is the TRANSPILER mutation→functional rewrite (a translation policy that must never
        fabricate a mutation it was not taught).

      This issue is therefore now scoped to the transpiler-lane residual only (both parts land in
      `crates/mycelium-transpile/**`, no semcore coordination). Design ratification of the triage +
      Part-2 fork resolution rides DN-106 (Draft).

      User stories:
      - As a transpiler maintainer, I want value-producing statements emitted as `let _ = e in body` and
        Rust struct-update / in-place mutation rewritten to the already-expressible functional
        destructure-and-reconstruct target, so that statement-sequenced and field-updating Rust bodies
        translate without dropping the effect or fabricating a mutation the transpiler was not taught.

      Definition of Done:
      - L1/semcore residual: NIL (closed — three-way witnessed by the PR #1373 pins; do not re-implement).
      - Part 1: the transpiler emits `let _ = e in body`; vet shows `let (`/discarded-value sites off the
        MultiStmtBody gap. Part 2: the mutation→functional rewrite lands per DN-106's fork A (translation
        rules only, no L1 record-update sugar); neither part fabricates mutation the transpiler was not
        taught (never-silent, G2/VR-5).

