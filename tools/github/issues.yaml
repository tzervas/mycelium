    body: |
      Minted 2026-07-07 from the M-993 staged-port plan (increment 2 of the semcore SCC ladder). Ports
      checkty.rs's four PURE type-algebra leaves into lib/compiler/semcore.myc: has_var (does a Ty
      mention an abstract type/width variable?), type_head (the stage-1 coherence head-key), subst_ty
      (type-/width-variable substitution), param_subst (build the parameter->argument substitution
      map). These are the substitution primitives the WHOLE checker/elaborator/monomorphizer build on
      (RFC-0007 SS11.2/SS11.3), and all four are pure Ty-transformers with NO dependency on checkty's
      checking LOGIC, the L1 evaluator, or the L0 IR -- so they port ahead of the heavy entangled core.
      Representation choices are DOCUMENTED in-file (FLAG-semcore-11: BTreeMap->assoc list, the
      FLAG-semcore-4 convention; FLAG-semcore-12: ty_eq is differential-support scaffolding faithful to
      Ty: PartialEq, not a checkty.rs port). No depth budget is threaded (structural recursion on finite
      Ty/Vec[Ty], the render/render_list shape). LANDED this PR (to dev; closes at integration tier).

      User stories:
      - As a compiler engineer auditing the frontend, I want the type-substitution algebra written in
        Mycelium, so that the primitives the whole checker builds on are readable in the language they
        compile.

      Definition of Done:
      - has_var/type_head/subst_ty/param_subst ported into semcore.myc; native `myc check` ok; a
        LIVE-ORACLE Rust differential (crates/mycelium-l1/src/tests/compiler_stage5_typealg.rs) asserts
        each .myc verdict against the real checkty fn's own computed result across all arm classes
        (Empirical); no logic *.rs modified (only the in-crate test module + its one mod line).
      - DONE (2026-07-07): all above met -- 6 tests / ~46 live-oracle cases green; `myc check` ok;
        increment-1 differential (compiler_stage5_semcore 17/17) unregressed.

