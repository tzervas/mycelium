  - id: E7-4
    title: "E7-4 (epic) — Comment-preserving mycfmt (docstrings survive the formatter)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:epic, area:toolchain, priority:P1, status:done]
    depends_on: []
    epic: E7
    doc_refs: [src:crates/mycelium-l1/src/lexer.rs, src:crates/mycelium-fmt/src/lib.rs, src:docs/spec/Mycfmt-Formatter-Contract.md]
    body: |
      landed on main via #397 squash-merge (2026-06-23)
      Hard requirement (maintainer, 2026-06-23): docstring-style "why" comments must be writable in `.myc`
      code and survive `mycfmt`. Today the lexer discards `//` comments as trivia and `mycfmt` rebuilds the
      body from the AST, so to avoid silently dropping comments (G2) it REFUSES any interior or extra-header
      comment (Mycfmt-Formatter-Contract §7.2/§10.2 — a documented deferral). This epic enacts that deferral.
      Lexer + formatter only — disjoint from E7-3 (no ast.rs/parse.rs edit; fully parallel) per the design.
      Faithful preservation of any `//` comment is v1 (no grammar change, no RFC); a structured `///`
      doc-comment convention (myc-doc-extractable) is a fast-follow RFC (M-691 note).
      Children (ordered): M-689 (lexer captures comments into a side table — `lex_with_comments`) -> M-690
      (formatter interleaves them in canonical positions; replace the refusals with placement) -> M-691
      (conformance fixtures + Mycfmt-Formatter-Contract enactment note + api-index regen).
      Acceptance: a nodule with a docstring above a fn + interior + trailing comments formats canonically
      with every comment preserved, idempotent + round-tripping; the `std.result` pseudocode moves back
      inline into `result.myc` (companion deleted) once this lands; `just check` green.
  - id: M-689
    title: "M-689 — feat(l1): lexer captures // comments into a side table (mycfmt stage 1)"
    milestone: "Phase 8 — Toolchain & Release Engineering"
    labels: [phase:8, type:feature, area:toolchain, priority:P1, status:done]
    depends_on: []
