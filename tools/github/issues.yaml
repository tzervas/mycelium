      The milestones.json Phase-5 charter names this directly: "self-host the RFC-0013/0014 diagnostics + recovery (per their self-hosting trajectory)". Port the reified recovery subsystem (RFC-0014, today crates/mycelium-lsp/src/recover, Rust) into Mycelium-lang — the result-sum Outcome, the closed recovery-action set, the registry-shared on-ErrorClass policy, declared+budgeted effects with graceful EffectBudgetExhausted, and the never-silent handle (every error recovered or re-propagated, never dropped — I1). Builds on the self-hosted diagnostics (M-510). Recovery elaborates to L0 Match — no new kernel node (KC-3, NFR-7).
      Acceptance (needs-design): meets the M-501 contract; the central never-silent invariant I1 + the effect-budget invariants (I3/I4/I5) hold in the self-hosted form; differential against the Rust implementation (NFR-7). FLAG: depends on the surface supporting error-sum Match + the effect-budget surface (M-353) being expressible in Mycelium-lang.

  # ── Phase 5 — the full stdlib module taxonomy (RFC-0016 §4.3/§4.4) ─────────────────────────────────
