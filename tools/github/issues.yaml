  - id: M-658
    title: "M-658 — spec(rfc-0007): Amend RFC-0007 for stage-1 trait interfaces + `impl` blocks"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:spec, area:language, priority:P1, status:done]
    depends_on: [M-657]
    epic: E7-1
    landed_pr: 349
    landed_date: 2026-06-22
    landed_basis: "CHANGELOG.md '### Changed (2026-06-22: M-658 — RFC-0007 §12 trait surface + `impl` reserved)'; merged-PR-list #349 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, corpus:DN-03]
    body: |
      DONE (2026-06-22): RFC-0007 §12 appended (append-only) pinning the stage-1 trait surface (single-parameter `trait`/`impl Trait for T` + coherence = orphan rule + global uniqueness, per RFC-0019); `impl` reserved in the lexer (`token.rs` `keyword()` → `Tok::Impl`, never a silent identifier — G2); reject-corpus `reject/14-impl-reserved-ident.myc` added + conformance table entry (self-policed, green); DN-14 §3 row 7 captured (no flip — M-659 flips it); Doc-Index + CHANGELOG updated. Elaboration staged identically to §11.3 (dictionary typing in the checker M-659; L0 lowering of an instantiated dictionary → M-673). No v0 calculus change; no new kernel node (KC-3).

      RFC-0007 deferred traits (LR-2) from v0 scope; RFC-0019 (Accepted) ratifies trait coherence and the surface contract. This amendment (append-only §N) records the minimal stage-1 trait surface: `trait T<A> { fn method(…) -> … }` declarations, `impl T<Foo> for Bar { … }` blocks, and coherence obligations (orphan rule + global uniqueness). Also decides `impl` as the reserved keyword (DN-03 §1 records this; must now be reserved in the lexer). Blocks M-659.
      Acceptance: RFC-0007 §N appended with trait surface + impl keyword decision; `impl` reserved in `keyword()` (token.rs) — never a silent identifier; reject-corpus entry for `impl` added; DN-14 §3 row 7 gate formally captured.

  - id: M-659
    title: "M-659 — feat(l1): Implement trait checking + `impl` blocks in checkty.rs"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-658]
    epic: E7-1
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      CHECKER LANDED (2026-06-22): trait/impl checking + coherence (global uniqueness + single-nodule orphan rule) + exact method-set conformance + bounded-call/trait-method resolution landed across `ast.rs`/`token.rs`/`parse.rs`/`checkty.rs`/`elab.rs`; every coherence/orphan/missing-method/extra-method/no-instance/ambiguous case is an explicit `CheckError` (G2). Guarantee `Declared` (RFC-0019 §4.5 coherence is Declared-with-argument, not machine-checked — VR-5). Single-parameter self-bound sugar `T: Cmp ≡ T: Cmp<T>` supported; ambiguous/multi-param bounds are explicit errors. Dictionary-passing **L0 lowering STAGED** → **M-673** (explicit `Residual`, mirroring M-657). 187 `mycelium-l1` tests green incl. a coherence property sweep + `accept/14-trait-impl.myc` / `reject/15-trait-param-bound.myc`; RFC-0007 §12 + RFC-0019 carry append-only impl notes. **status: in-progress** — DN-14 §3 row 7 → `partial` (type-checks; elaboration staged), flips to `present` when M-673 lands the dictionaries. — Original task:
      `checkty.rs` currently skips `Item::Trait(_)` with no check arm; `Item::Fn` does not handle `impl`-block methods. Implements: (1) trait declaration checking (method signature type-checking, coherence checking per RFC-0019 orphan rule); (2) `impl` block parsing + type-checking; (3) dictionary-passing elaboration in `elab.rs` so trait method calls lower to the correct L0 application. No new kernel node (KC-3). Coherence violation is an explicit `CheckError`, never silent.
      Acceptance: `trait Cmp<A> { fn cmp(a: A, b: A) -> Binary{2} }` + `impl Cmp<Binary{8}> for Binary{8} { … }` parse, check, and elaborate; RFC-0016 §4.1 C1–C6 contract expressible as surface trait constraints; property tests for coherence check; DN-14 §3 row 7 → `present`. DONE (2026-06-23): M-673 landed the dictionary-free static trait-instance resolution + a reified EXPLAIN selection record — trait-method calls now lower to closed L0; DN-14 §3 row 7 → present; status → done.

