      - src:proofs/vsa-multihop-bound
    body: |
      DN-64 OQ-F disposition: "must be r&d'd on gpu" (maintainer desktop). Build runnable experiments
      mapping the tractable subset of multi-hop VSA programs admitting `Proven` capacity bounds.
      As a maintainer, I want a GPU sweep over {model, F, k, d, h, delta}, so that I can see where a
      closed-form bound still upper-bounds the measured failure rate (candidate `Proven` subset).
      Harness: experiments/mycelium_experiments/vsa_bounds/ (numpy reference + optional torch/CUDA;
      never-silent backend; VR-5 — measures rates, never asserts `Proven`; verdict is maintainer analysis).
      Extended (maintainer follow-up) toward the MECHANICAL PROOF (the OQ-A/M-827 bridge): the harness
      now DISCOVERS candidate closed-form multi-hop bounds (candidate_bound.py — effective-m models
      A_exponential/B_linear/C_sqrt, fit + never-silent regime validation) and EMITS checkable proof
      obligations (proof_obligation.py — SMT-LIB + Liquid-Haskell skeletons mirroring proofs/lh-bundle +
      capacity.rs's checked-instantiation), scaffolded under proofs/vsa-multihop-bound/. VR-5 absolute:
      it proposes a theorem + emits the obligation a prover must discharge; it NEVER stamps `Proven`.
      DoD: maintainer runs the sweep locally; SUMMARY.md + PROOF-SUMMARY.md present data, candidate
      regimes, and the emitted obligations for ratification; the `Proven` upgrade requires a proof
      assistant to discharge the obligation AND the underlying multi-hop theorem to be established (M-827).
      FLAGs resolved (maintainer "all and both", 2026-06-29): the harness now tests ALL THREE
      effective-m models (A_exponential/B_linear/C_sqrt) comparatively per composition AND emits
      obligations for BOTH proof assistants (Lean 4 via native_decide + Liquid Haskell via Z3),
      alongside SMT-LIB. proofs/vsa-multihop-bound/lean/ scaffold added; committed EXAMPLE-* artifacts
      from a CPU --demo run. Both assistants axiomatize the candidate theorem (the open OQ-A/M-827
      question); neither stamps `Proven`.
