  - id: M-1055
    title: "E1 + E3 hygiene experiment prototype -- DN-110 §8.2 expression-position sugar-rule hygiene, Rank-1 go/no-go for J3"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    epic: E28-1
    depends_on: [M-1051]
    doc_refs:
      - corpus:DN-110
      - corpus:DN-110-8.2-hygiene-deepdive
      - corpus:DN-54
      - src:crates/mycelium-l1/src/tests/hygiene_expr_sugar.rs
      - src:crates/mycelium-l1/src/tests/hygiene_defsite_resolution.rs
      - src:crates/mycelium-l1/src/tests/hygiene_affine_expanded.rs
    landed_basis: >
      status:in-progress (E1 of this issue's E1+E3 DoD landed with a PASS verdict; E3 is NOT built —
      see below; E2/E5 landed as ADDITIVE, non-gating exploration — see the 2026-07-10 addendum below
      — and are NOT progress against this issue's formal DoD) — PR #1413
      (`claude/leaf/m1055-e1-capture-avoidance`, merged to `dev` 2026-07-10) adds a test-only
      `crates/mycelium-l1/src/tests/hygiene_expr_sugar.rs` prototyping deep-dive §4 (A)+(B) (`%`-
      freshening of RHS binders + capture-safe verbatim substitution). **E1 verdict: PASS.** All 4
      core fixtures (`binder_shadows_use_site`, `arg_mentions_raw_binder_spelling`,
      `multi_param_used_twice`, `nested_binder_in_rhs`) pass both `alpha_eq`-to-oracle and
      independent `mycelium_interp::Interpreter::eval` observational-equality checks; each also
      carries a hand-built unhygienic "captured" counter-expansion evaluating to a demonstrably
      different, hand-derived wrong value (proving the harness can observe a real capture bug); a
      live negative control (freshening temporarily disabled in `expand()`) made both checks fail as
      expected, then was reverted before commit. An optional non-gating E4 bonus fixture also
      passes. `cargo test -p mycelium-l1` green (498 passed, 1 ignored, 0 failed). This moves
      capture-avoidance for **(A)+(B) only** from `Declared` to `Empirical` (VR-5) — E2 (def-site
      resolution, sub-question (C)) and E5 (affine-on-expanded-L0, sub-question (D)) are unbuilt and
      stay `Declared`. **E3 is deliberately NOT built and is not merely deferred-but-pending: the
      deep-dive's own §7 header and `reveal.rs`'s honest-scoping callout (M-1051's landed_basis)
      both record that `reelaborate(reveal_l0(x))` is definitionally `x.clone()` at v0** — `reveal`
      v0 has no lossy step for `reelaborate` to invert, so an E3 harness built against v0 `reveal`
      would compare a term to a bit-identical clone of itself (vacuous, would pass even with a
      broken comparator — the same trap PR #1412's adversarial review caught and fixed in `reveal`
      itself). E3 becomes meaningfully non-vacuous only once M-1051 Increment-3 (the `certified`-
      mode round-trip check, DN-38 §5) lands. **Consequently E1 is, for now, the sole empirical half
      of this issue's own E1+E3 go/no-go DoD** — the DoD's E3 leg is blocked on M-1051 Increment-3,
      not abandoned. This issue stays `in-progress`, not `done`; M-1054 (the implementation epic)
      stays design-gated pending E3 (or a maintainer-ratified disposition accepting E1-only as
      sufficient for a J3 go, which this close-out does not itself decide — house rule #3/#4, no
      self-ratification).

      **Addendum (2026-07-10, this close-out — append-only, does not rewrite the E1 record above).**
      PR #1415 (`claude/leaf/m1055-e2-e5-hygiene`, merged to `dev` 2026-07-10) adds two further
      test-only sibling harnesses: `hygiene_defsite_resolution.rs` (E2) and `hygiene_affine_expanded.rs`
      (E5). **Both PASS. Neither is progress against this issue's formal DoD** (E1+E3, the Rank-1
      go/no-go for J3) — **E2/E5 are additive, non-gating exploration**; E3 still needs `reveal`
      Increment-3 (M-1051) and remains unbuilt, so the DoD stays unsatisfied regardless of this PR.
      DN-110 and `DN-110-8.2-hygiene-deepdive.md` stay `Accepted`, not `Enacted` (house rule #3) — no
      guarantee tag is upgraded past its checked basis by this close-out (VR-5). What a green E2/E5
      actually establishes:
      - **E2 — def-site resolution: PASS for the in-scope, same-nodule case only.** Moves clause (C)
        `Declared → Empirical` strictly for that case; the cross-phylum question **OQ-H1 stays open
        and unexercised** (see the M-1054 addendum above). A scope caveat surfaced post-review: the
        def-site splice in this prototype is verbatim, not routed back through the (A) freshening
        walk — a non-issue for the real content-addressed design, an unexercised composition gap in
        the prototype.
      - **E5 — affine soundness on the expanded L0: PASS for the duplication upper-bound property
        only.** Moves clause (D) `Declared → Empirical` strictly for that property, via the real,
        landed M-919 static pass (`crate::affine::Tracker`) run on a fully-substituted expanded
        surface program — reusing the landed checker rather than reimplementing a parallel one. The
        drop/lower-bound property is explicitly **NOT validated**: it is a documented M-904 runtime
        concern the static pass does not enforce (`tests/affine.rs:304-312`'s own doc comment; DN-71
        §8 FLAG-4) — this corrects an initial task-brief assumption that dropping would REJECT
        statically; it does not.
      - `cargo test -p mycelium-l1` green (503 passed, 0 failed; 7/7 hygiene tests incl. E1/E2/E5).
      No new tracking issue minted for the E2/E5 residuals (OQ-H1 cross-phylum, the E2 verbatim-splice
      gap, the E5 drop-case scope correction): each is already carried forward as a dated design note
      on **M-1054** (the implementation epic, above) — the same append-only mechanism the E1 close-out
      used for OQ-H5/OQ-H1 — rather than as a separate issue, since no distinct tracking need was
      identified beyond what M-1054's own body already carries for "whoever picks up the follow-on
      design/implementation work" (the PR's own FLAG language). This issue stays `in-progress`, not
      `done`.

      E3 close-out (2026-07-10, append-only, does not edit the record above). PR #1423
      (`claude/leaf/m1051-inc3-e3-reveal-roundtrip`, merged to `dev`) builds M-1051 Increment-3
      (`certified_roundtrip`) and the E3 experiment itself
      (`crates/mycelium-l1/src/tests/reveal_roundtrip_e3.rs`). **E3 verdict: BUILT AND RUN, PASS,
      narrowly scoped** — non-vacuity shown via an independently-spelled oracle plus an `eval`
      differential plus a mutation self-check (disabling freshening is caught), never via
      `reelaborate`'s clone-on-success path (the trap this issue's own body flagged, avoided). Full
      record: `docs/notes/DN-110-8.2-hygiene-deepdive.md`'s "E3 Result" addendum. **With E1 (PASS,
      above) and E3 (PASS, this addendum) both built and run, this issue's own E1+E3 Definition of
      Done is SATISFIED.** Status corrected `in-progress -> done` (label above), landed basis = PR
      #1413 (E1) + PR #1423 (E3). This does not itself certify the facility (M-1054) as built — only
      that the go/no-go gate M-1054 was blocked on is now met (see DN-110 §8.4 addendum 2 and M-1054's
      own gate-met correction, same pass).
    body: |
      Filed 2026-07-10 from the maintainer's ratification of DN-110-8.2-hygiene-deepdive.md (the
      companion §8.2 deep-dive, itself accepted as the basis for DN-110 §8.2 at this ratification).
      Prototypes the two experiments the deep-dive names as the **Rank-1 go/no-go for J3** (DN-110 §9):

      - **E1 -- capture-avoidance** (the `swap!` classic): validates the `%`-namespace-freshening plus
        capture-safe substitution model (deep-dive §4 (A)+(B)) against a table of collision cases,
        asserting alpha-equality and observational equality versus a hand-written oracle.
      - **E3 -- `reveal` round-trip fidelity** (the gating experiment, designed to possibly BREAK the
        model): asserts `reelaborate(reveal_l0(expand))` is alpha-equal to `expand` at the L0-term
        level, and forces the OQ-H3 decision (L0-level identity vs a documented surface display-
        renaming) rather than discovering it after `reveal`/M-1051 ships. **A FAIL here is a blocker
        signal for Rank-1 on J3** -- the honest fallback is DN-110 Rank 2 (blessed-core desugarings
        only) for expression-position sugar.

      E3 needs `reveal`/expand-on-demand (M-1051, `status:todo`) to exist first; M-919 (the affine
      tracker E5 would need) is already landed. **OQ-H1** (def-site resolution across phyla / separate
      compilation, the expression analogue of DN-54 §10 OQ-D) is the other critical-path open question,
      exercised by E2 (not gating for this issue's go/no-go, but tracked alongside E1/E3 if scope
      allows).

      User stories:
      - As the maintainer deciding whether to fund DN-110's implementation epic (M-1054), I want E1 and
        E3 run against the real elaborator, so the go/no-go is `Empirical`, not `Declared` (VR-5).

      Definition of Done:
      - E1 and E3 are implemented per the deep-dive's §7 harness shape (in-crate white-box test module,
        table-driven, alpha-equality plus observational equality) in `crates/mycelium-l1` and return a
        PASS/FAIL verdict with the pass/fail criteria the deep-dive names (§7 E1, §7 E3); the verdict
        is recorded back into DN-110-8.2-hygiene-deepdive.md / DN-110 (a Ratification addendum, not a
        rewrite) before M-1054 proceeds past its design-gate.

  - id: M-1056
    title: "/native-translate methodology skill -- Rust-construct classification decision procedure (DN-110 §9)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:tooling, priority:P3, status:done]
    epic: E28-1
    depends_on: []
    doc_refs:
      - corpus:DN-111
      - corpus:DN-110
      - corpus:DN-109
      - corpus:DN-99
      - corpus:DN-106
      - src:.claude/skills/native-translate/SKILL.md
    landed_basis: >
      status:done (2026-07-11, integration close-out; mitigation #14 -- verified against the merged
      code, not rubber-stamped). PR #1422 (`worktree-agent-ad6a3b32b58f55011`, merged to `dev`)
      authors `.claude/skills/native-translate/SKILL.md`: implements DN-110 §9's six steps verbatim
      (verify-first against the DN-99 register + a corpus grep; identify the underlying PROBLEM, not
      Rust's mechanism; classify via the DN-111 {exact?}x{native?} generator into
      NativeEquivalent|IdiomaticRemapping|Approximation|InteropBridge; apply the DN-109 §3.2 auto-fire
      ratchet; a sugar-specific `lower`-rule case; produce the §9 Step-6 register-style artifact),
      the per-category VR-5 tag ceiling, the (construct, context)-pair + time-indexed caveat (DN-111
      §8.1/§8.4), and the `wild`-fold seam (DN-111 §8.3). Self-check basis: rather than a standalone
      synthetic self-check against the DN-110 §1 J1-J5 table, the skill was applied in the SAME PR to
      classify all 47 `tools/grammar/sugar.yaml` rows (45 keyword sugars + `?` glyph + `reveal`
      not-lexed) -- a materially stronger validation than the DoD's literal minimum, covering the J1
      exemplar (`lower`/`derive` -> NativeEquivalent, matching DN-110 §1's J1 row) and the J2 exemplar
      (`object`/`via`/`impl` -> IdiomaticRemapping, matching DN-110 §1's J2 row) directly, plus 33
      further NativeEquivalent rows, 1 Approximation (`lambda`'s deferred capture semantics), and 8
      honestly `unclassified # needs-review` (Gap rows with no landed L1 construct, or `grow`'s
      deliberate non-functional reservation) -- marked, never fabricated (VR-5). See M-1058's own
      addendum for the sugar-index population detail. `python3 tools/grammar/sugar_index.py
      --self-test` and `scripts/checks/sugar-index.sh` both green.
    body: |
      Filed 2026-07-10 from the maintainer's ratification of DN-110. A follow-up deliverable (DN-110
      §9/§12, not authored in DN-110 itself -- it would race the design note on scope). Authors a
      reusable skill, working name `/native-translate`, that operationalizes DN-110 §9's operational
      decision-procedure: given one Rust construct/surface gap, verify it is not already closed
      (mitigation #14 -- check the DN-99 register/delta ledger and grep the codebase first), identify
      the underlying PROBLEM (not Rust's mechanism), classify it against the **DN-111 canonical
      taxonomy** (Native Equivalent / Idiomatic Remapping / Approximation / Interop Bridge -- see below),
      apply the DN-109 §3.2 EXPLAIN-able ratchet to any auto-fire, and emit a register-style record into
      the DN-99/DN-109 manifest.

      TERMINOLOGY UPDATE (2026-07-10, at the DN-111 ratification pass): DN-111 has been authored and
      Accepted -- the canonical enum is **NativeEquivalent | IdiomaticRemapping | Approximation |
      InteropBridge**, with DN-110's Adaptation/Solution/Approximation/Bridge handles retained as
      aliases for legibility. This note, filed while DN-111 was still unauthored, is superseded on this
      one point: implement the skill's Step-3 classification and Step-6 register emit against the
      **DN-111 canonical enum**, not the provisional DN-110 §2 handles -- a terminology-only change,
      DN-110 §9's six steps are otherwise unchanged.

      User stories:
      - As an engineer translating any Rust construct (not just macros), I want a decision procedure
        that tells me whether the construct is a Native Equivalent / Idiomatic Remapping / Approximation
        / Interop Bridge (DN-111's canonical taxonomy, aliases Adaptation/Solution/Approximation/Bridge
        retained) and what the honest native target + explicit delta is, so I classify by evidence
        against the corpus, not by shoehorning Rust's idiom (DN-110 §4 user story 4).

      Definition of Done:
      - A `.claude/skills/native-translate/` skill (or equivalent) implements DN-110 §9's six steps
        verbatim, producing the §9 Step 6 register-style artifact; validated against at least the DN-110
        §1 worked examples (J1-J5) as a self-check.

  - id: M-1057
    title: "DN-111 -- canonical Rust->Mycelium native-translation taxonomy (companion to DN-110 §2, DN-109, DN-99, DN-106)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:language, priority:P3, status:done]
    epic: E28-1
    depends_on: []
    doc_refs:
      - corpus:DN-111
      - corpus:DN-110
      - corpus:DN-109
      - corpus:DN-99
      - corpus:DN-106
    landed_basis: >
      status:done -- DN-111 (docs/notes/DN-111-Canonical-Rust-To-Mycelium-Native-Translation-Taxonomy.md)
      authored (Draft PR #1405) and ratified Accepted by the maintainer 2026-07-10 (see DN-111's own
      "Ratification (maintainer, 2026-07-10)" section). Canonical taxonomy: Native Equivalent /
      Idiomatic Remapping / Approximation / Interop Bridge, with DN-110's Adaptation/Solution/
      Approximation/Bridge handles retained as permanent aliases. DN-110 §2 gained the append-only
      pointer resolving its provisional-labels carve-out at this same pass (DN-110's own Ratification
      text unchanged, append-only per house rule #3). Accepted ratifies the TERMINOLOGY + TAXONOMY
      only -- individual classifications against it stay `Declared` until independently checked
      (VR-5); this issue's DoD ("authored and ratified, settling the canonical taxonomy terms") is
      fully met by that ratification, distinct from any downstream classification work.
    body: |
      Filed 2026-07-10 from the maintainer's ratification of DN-110. DN-110 §2 proposed a general
      Rust->Mycelium native-translation taxonomy (Adaptation/Solution/Approximation/Bridge) as the
      problem-relationship re-reading of vocabulary already used, informally, by DN-99's register
      Status column, DN-109's L4 idiom buckets, and DN-106's gap-closure default. The maintainer's
      ratification (2026-07-10) accepted DN-110 §12.1's own reasoned recommendation that this taxonomy
      warrants its own **companion DN** (not a DN-109 append-only extension), but explicitly declined to
      lock in DN-110 §2's four specific labels as canonical -- they are ratified only as provisional,
      intuitive handles pending this DN.

      This is a DESIGN AUTHORING task, not a redecision: DN-111 should (a) settle the canonical
      terminology (refining or replacing Adaptation/Solution/Approximation/Bridge), (b) formally
      reconcile the taxonomy's relationship axis with DN-109's decidability axis (Mechanical/
      Heuristic/Judgment) per DN-110 §2.1, and (c) cross-link every corpus artifact that already
      instantiates the informal version (DN-99, DN-106, DN-109, DN-110) without re-deciding any of
      their own settled forks. Per DN-110 §12.1: "its scope is the maintainer's to set" -- this issue
      does not presume DN-111's authoring session or approach.

      User stories:
      - As a designer classifying a new Rust construct's native Mycelium translation, I want one
