      - binary add      → enablement.rs::add_bin_in_range (+ overflow-refusal on every path); std_math.rs.
      - indexed Seq/Vec → enablement.rs::seq_get_surface_three_way (+ OOB refusal); std_collections.rs.
      - Bytes slice     → std_bytes_slice.rs::slice_in_range_preserves_value (+ OOB/inverted refusal).
      Never-silent (G2) is pinned on every path: add_bin/sub_bin overflow, seq.get OOB, and bytes.slice
      out-of-range/inverted-range each refuse on L1-eval, L0-interp, AND AOT (no silent wrap/clamp).

      E13-1 PRECONDITION FLIPS (all in place, demonstrated not asserted): M-716 (⟸ M-749 Repr::Seq) is
      status done, citing enablement.rs + std_collections.rs; M-717 (⟸ M-750 Repr::Bytes) is status
      done, citing enablement.rs + std_text.rs/std_fmt.rs; M-718 (⟸ M-747/M-748 cmp/binary-math) is
      status done, citing std_math.rs/std_cmp.rs (the .myc ports) + enablement.rs (the Tier-1 prim
      three-way). The width-cast/slice gap this body previously flagged on M-717 was CLOSED by
      M-799/DN-43 (bytes_slice/bytes_concat surfaced, never-silent on every path).

      HISTORY (superseded by the verification above, retained for audit): TIER-2 SMOKE PORTS LANDED
      (2026-06-26, wave-n1) — the indexed Vec op + byte index/decode ports landed (std_collections.rs,
      std_text.rs, std_fmt.rs); at that point a full Bytes-native string-slice port was still REMAINING
      (awaiting the width-cast/slice prim surface, since landed via M-799/DN-43). Tier-1 (#518): the
      width-typed eq/lt + binary add/sub three-way + never-silent refusals + a Bool-bridge port in
      enablement.rs.

      Definition of Done:
      - Every enabler has a passing three-way differential test; no enabler is undifferentiated.
      - A .myc smoke port per unblocked E13-1 tier; each E13-1 issue's precondition flipped with a pointer
        to the demonstrating test.
      - just check green; CHANGELOG append-only.

      DoD status (2026-06-30, kickoff kpr): clause 1 MET (every enabler has a passing three-way test —
      enablement.rs + the std_* ports, all green); clause 2 MET (a .myc smoke port per unblocked tier,
      and M-716/M-717/M-718 each flipped to done with a demonstrating-test pointer); clause 3 — change-
      scoped tests green (full `just check` + CHANGELOG append-only is the integration tier's close-out,
      flagged). REMAINING: only the tracking flip status in-progress → done, which integration owns.

  - id: M-753
    title: "M-753 -- width-generic functions (const-generic over representation width) [E11-1/s10]"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    epic: E11-1
    depends_on: [M-708]
    doc_refs:
      - corpus:RFC-0032
      - corpus:RFC-0030
      - src:crates/mycelium-l1/src/checkty.rs
      - src:crates/mycelium-l1/tests/width_generic.rs
    body: |
      DONE (2026-06-27, rsm W1; DN-42 Option A, v1 = free functions). Width is now a const-generic
      parameter bound at monomorphization: Ty::Binary(Width)/Ty::Ternary(Width) with Width::{Lit,Var};
      resolve_ty maps Binary{N} -> Width::Var; unify binds N same-paradigm-only (cross-paradigm + width
      mismatch are explicit refusals, never a swap -- S1/G2); mono pins N per call site (undetermined N
      -> Residual, never a default) and fragments specializations honestly (id_bits$Binary8/$Binary16).
      Surface syntax = positional-by-use (maintainer-chosen). 11 three-way tests (Binary{8/16} +
      Ternary{3/6} + delegation + refusals) + 3 white-box mono tests green; full mycelium-l1 suite green;
      clippy clean. Unblocks M-718. Instance coherence (DN-42 §7 Q5) deferred past v1.

      Width-generic function parameters: const-generic over representation width, e.g.
      fn f<N>(x: Ternary{N}) -> Ternary{N}, so math/cmp can be width-POLYMORPHIC rather than fixed-width.
      Today width {N} is a concrete literal, not a generic parameter (the reason M-715/M-718 could not
      ship a general, non-fixed-width std.math/cmp surface -- a fixed-width-only port would bake e.g.
      Ternary{4} into the stdlib, VR-5).

      OWNERSHIP (RFC-0032 §5 D5, maintainer 2026-06-23): this is a SURFACE-LANGUAGE type-system feature
      that edits the mycelium-l1 checker, so it is owned by the s10 leg (E11-1, surface-language
      completeness) -- which already owns the mycelium-l1 type system -- NOT by E19-1 (the prims+reprs
      leg). Keeps exactly one leg editing the l1 type system (no kpr<->s10 collision). Reassigned here
      from E19-1/M-751 (which closes as a pointer to this issue).

      User stories:
      - As a stdlib author, I want fn f<N>(x: Ternary{N}) so a single math/cmp definition covers every
        width, instead of one copy per concrete width baked into the stdlib.

      Definition of Done:
      - Width parameters parse + type-check + monomorphize to closed concrete-width L0; a width-generic
        op runs three-way (L1-eval == L0-interp == AOT).
      - A width-generic ternary-math .myc smoke port demonstrates the unblock; E13-1 M-718's general
        (non-fixed-width) surface precondition is marked satisfied with a pointer.
      - just check green; honest tags (VR-5); never-silent on any width mismatch (G2).

  - id: E20-1
    title: "E20-1 (epic) -- Value-Model Collections & Precision (RFC-0033)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:core-ir, priority:P1, status:in-progress]
    epic: E20
    doc_refs:
      - corpus:RFC-0033
