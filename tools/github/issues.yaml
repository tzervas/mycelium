  - id: E28-1
    title: "E28-1 (epic) — Phase-I H1: below-grammar enabler-gap closure"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P1, status:in-progress]
    epic: E28
    depends_on: [M-766, M-767, M-887, M-888, M-889, M-890, M-891, M-892, M-893, M-894, M-895,
                 M-896, M-897, M-898, M-899, M-900, M-901, M-902, M-903, M-904, M-905, M-906,
                 M-907, M-908, M-909, M-910, M-911, M-912, M-913, M-914]
    doc_refs:
      - corpus:ADR-038
      - corpus:RFC-0033
      - corpus:ADR-028
      - corpus:DN-39
      - corpus:DN-63
      - src:docs/planning/road-to-1.0.0-and-mycelium-rewrite.md
      - src:docs/spec/stdlib/self-hosting-readiness.md
    body: |
      EPIC (Phase-I H1, kickoff `enb`; ADR-038 §2.2/§2.6 + roadmap §3). Close the below-grammar
      functional-usability enablers so a Mycelium program can exercise the whole ratified surface
      end-to-end: the serial prim lane B (binary integer arithmetic + signed ops) → C (dense/VSA
      op-prims) → A (scalar float, route ii) → E (Substrate/consume execution), the parallel tracks
      D-lite (forage/backbone subset of M-828), `myc run`, textual string literal, and `hash.*`
      surfacing — each never-silent, honestly tagged (VR-5), conformance-tested (accept + reject),
      with a property test per bound. This epic IS Phase I's critical path: its DoD is the bulk of
      ADR-038's Phase-I usability gate.

      Sequencing: the wave sits under H0 `acy` (E27-1), which LANDED 2026-07-02 — no live blocker;
      every task here lands under the cycle-enforcement gate. Collision law: the prim lane
      (B → C → A → E) plus the string-literal tasks are SERIAL on `crates/mycelium-interp/src/prims.rs`
      + the `mycelium-l1` frontend (one L1 surgery in flight at a time, shared with `grm`'s
      implementation slots M-915/M-916/M-921/M-923); `myc run`, `hash.*`, and the mesh research note
      are disjoint by directory and run concurrently.

      Maintainer gates inside the wave (FLAG, never guess): M-895's float ADR must be Accepted +
      the DN-39 review passed before M-896…M-900; M-901's consume-model memo signed off before
      M-902…M-904; M-905's D-lite split signed off before M-906/M-907.

      User stories:
      - As a language user, I want Mycelium programs to run end-to-end through `myc run` with
        integers, floats, strings, dense/VSA ops, and affine handles, so that Mycelium is a language
        I can use, not a corpus I can read.
      - As the maintainer, I want the H1 gap set closed under the transparency rule with explicit
        gates on kernel growth, so that usability lands without eroding the trusted base (KC-3).

      Definition of Done: each gap A–E closed (or explicitly maintainer-deferred with rationale —
      G2); the three small items landed; M-914's demo runs; readiness §0 re-verified and recorded
      (Empirical); every op never-silent + honestly tagged; no content-address rehash spent
      (RFC-0033 §7, verified in M-896); grammar + api-index regenerated at the integration tier.

      Children: M-887/M-888/M-889/M-766/M-767 (Gap B), M-890…M-894 (Gap C), M-895…M-900 (Gap A),
      M-901…M-904 (Gap E), M-905…M-907 (D-lite), M-908…M-913 (small items + research start),
      M-914 (capstone).

