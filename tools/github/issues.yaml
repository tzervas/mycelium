  - id: M-656
    title: "M-656 — spec(rfc-0007): Amend RFC-0007 to ratify stage-1 generic type parameters"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:spec, area:language, priority:P1, status:done]
    depends_on: []
    epic: E7-1
    landed_pr: 346
    landed_date: 2026-06-22
    landed_basis: "CHANGELOG.md '### Changed (2026-06-22: M-656 — RFC-0007 §11 discharges the §4.4 generics deferral)'; merged-PR-list #346 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, corpus:DN-14]
    body: |
      DONE (2026-06-22): RFC-0007 §11 appended (append-only) discharging the §4.4 generics deferral → RFC-0019; pins the stage-1 generics surface (unbounded `type List<A>`/`fn head<A>` for M-657; bounded generics + traits via dictionary-passing for M-658/M-659); never-silent-swap restated at the polymorphic level (S1/W8); DN-14 §3 row 6 gate captured (§11.4); Doc-Index + CHANGELOG updated. No v0 calculus change; leans on RFC-0019's Declared-with-argument results without upgrading them (§11.5).

      RFC-0007 §4.4 explicitly defers generic type parameters to stage-1; RFC-0019 (Accepted 2026-06-18) ratifies the coherence and Repr-polymorphism restriction set. This issue produces the RFC-0007 amendment (append-only §N) closing the stage-0 deferral: records the dictionary-passing elaboration strategy per RFC-0019 §4 and defines the minimally-sufficient surface (monomorphic instantiation of generic type declarations — `type List<A> = Nil | Cons(A, List<A>)` and `fn map<A, B>(…)`) that `mycelium-l1` v1 must check.
      Does NOT implement the checker changes (that is M-657); this is the spec gate that unblocks them.
      Acceptance: RFC-0007 §N appended (append-only) recording the stage-1 generics scope and the RFC-0019 coherence/Repr-polymorphism restriction set; Doc-Index row updated; CHANGELOG entry; DN-14 §3 row 6 gate formally captured in the amendment.

  - id: M-657
    title: "M-657 — feat(l1): Implement generic type parameters in checkty.rs + elab.rs"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-656]
    epic: E7-1
    evidence_pr: 346
    evidence_date: 2026-06-22
    landed_basis: "status:in-progress (NOT done) — evidence is a REFERENCE/partial, not a completed landing; CHANGELOG.md '### Added (2026-06-22: M-657 — stage-1 unbounded generics checker + depth-safe recursion)'; merged-PR-list #346 (cross-checked; no (#NNN) in the curated subject)"
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, src:crates/mycelium-l1/src/checkty.rs, src:crates/mycelium-l1/src/elab.rs]
    body: |
      CHECKER DONE (2026-06-22); elaboration STAGED → M-673. The `checkty.rs` checker now implements unbounded parametric generics (RFC-0007 §11): `Ty::Var` abstract type variables + applied `Ty::Data`; generic data + function declarations register and check; **call-site instantiation by unification** infers type arguments; constructor/match field types are instantiated by substitution. Honest never-guess refusals: wrong arity, an undetermined type parameter, and a representation-specific op on a type parameter (RFC-0019 §4.6 — `Var` is representation-opaque; S1 enforced at the checker, so the elaborator is never asked to insert a `Swap`). `elab.rs` **stages** the L0 lowering of a generic *instantiation* behind an explicit never-silent `Residual` (monomorphization → M-673); a monomorphic program elaborates unchanged. RFC-0007 §11.2–§11.4 corrected to this as-implemented split. Also landed (necessitated by the wider `Ty`): depth-safe checker/elaborator recursion — explicit `MAX_CHECK_DEPTH=4096` budget (banked guard 4) + deep worker stack (`crate::deep`, 256 MiB; measured physical ceiling ~24,600 levels debug → ~6× margin).
      Verified: `cargo test -p mycelium-l1` green (incl. generics accept/refuse tests + width-sweep property bound + depth-budget regression); `cargo clippy -p mycelium-l1 --lib` clean; workspace builds; reverse-deps (lsp/check) green. Honesty: `head<A> -> A` is non-total (no `A` for `Nil`; W7) — replaced by total `first_or`/`is_empty`; higher-order `map` needs L2 arrow types. DN-14 §3 row 6 → **partial (type-checks; elaboration staged)**, flips to `present` when M-673 lands. Original acceptance ("elaborate to closed L0") is split: checker here, monomorphization in M-673 (maintainer-scoped decision 2026-06-22: checker-now, stage-elab). DONE (2026-06-23): M-673 landed the monomorphization elaboration (`crates/mycelium-l1/src/mono.rs`) — a generic instantiation now lowers to closed L0; `cargo test -p mycelium-l1` green (M-210 three-way differential on the mono'd env). DN-14 §3 row 6 → present; status → done.

  - id: M-673
    title: "M-673 — feat(l1): Monomorphization elaboration for generic instantiations (M-657 follow-up)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P1, status:done]
    depends_on: [M-657, M-659]
    landed_date: 2026-06-23
    landed_basis: "DONE (2026-06-23) — the run-kickoff wave landed the monomorphization elaboration (crates/mycelium-l1/src/mono.rs) + static trait-instance resolution + a reified EXPLAIN selection record; CHANGELOG.md '### Added (2026-06-23: M-673 — monomorphization makes generics + traits run to closed L0)'; flips M-657/M-659 to done and DN-14 §3 rows 6/7 to present."
    doc_refs: [corpus:RFC-0007, corpus:RFC-0019, src:crates/mycelium-l1/src/elab.rs]
    body: |
      M-657 landed the generics CHECKER; the L0 elaboration of a generic *instantiation* is currently an explicit never-silent `Residual` ("monomorphization staged" — RFC-0007 §11.3). This issue lands the elaboration. Chosen strategy (RFC-0007 §11.3): **monomorphization** — a pre-pass over the checked `Env` specializes each concrete generic use (`List<Binary{8}>`, `first_or` at `A=Binary{8}`) into a monomorphic registry declaration + function instance under a mangled name, rewriting ctor/type/call references, so the existing trusted elaborator/registry run unchanged (no `mycelium-core` change; KC-3). Honest cost (RFC-0019 §4.4): a generic's content-addressed identity fragments across specializations — recorded, not hidden. The alternative (uniform/dictionary "one hash" elaboration via a new abstract-parameter `FieldSpec` in `mycelium-core`) is a separate, trusted-core decision (deferred). Acceptance: a program defining + instantiating `List<A>`/`first_or<A>` elaborates to closed L0 (no `Residual`); the M-210 three-way differential agrees (L1-eval ≡ L0-interp ≡ AOT) on the monomorphized output; never silently inserts a `Swap` (S1); `cargo test -p mycelium-l1` green; DN-14 §3 row 6 → `present`; unblocks M-649 self-hosting of a generic stdlib nodule. ALSO lands the **trait dictionary-passing** lowering staged by M-659 (trait-method + bounded-generic calls elaborate to dictionary construction/projection via the same monomorphization/`Residual` mechanism); DN-14 §3 row 7 → `present` when this lands.
      DONE (2026-06-23, run-kickoff wave). As-implemented: a frontend monomorphization pre-pass (`crates/mycelium-l1/src/mono.rs`) specializes generic data/fn instantiations and **statically resolves** each trait-method call to a direct call to the coherent instance's method body — dictionary-free under monomorphization — reified in a queryable EXPLAIN selection record (`MonoSelections`; no black boxes, house rule #2). An additive `Env.impls` field retains the instances' resolved method bodies. Mangling is injective + surface-disjoint (`$`-joined, with a `#` tag on a nullary data type so a data type named like a repr can never alias it — never-silent, G2). No `mycelium-core` change (KC-3). The **literal RFC-0019 §4.5 runtime dictionary records remain deferred** — they need an abstract-parameter `FieldSpec` in the trusted core, a separate ADR. Verified: `cargo test -p mycelium-l1` green (M-210 three-way differential L1-eval ≡ L0-interp ≡ AOT on the monomorphized env + a mutant-witness + injectivity + determinism). DN-14 §3 rows 6/7 → present; M-657/M-659 → done.

  - id: M-674
    title: "M-674 — robustness: uniform explicit-budget + deep-stack discipline across all recursion limit points"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P2, status:done]
    depends_on: [M-657]
    evidence_pr: 349
    evidence_date: 2026-06-22
    landed_date: 2026-07-01
    landed_basis: "commit e26f08a (W1-674 leaf, merged via 702e910) — the totality checker's own call-graph/mutual-descent traversal (walk_expr/descend_walk/pattern_binders) and the ambient resolution pass's own expr/type_ref/pattern recursion now each carry an explicit MAX_WALK_DEPTH/MAX_AMBIENT_DEPTH budget (4096), refusing cleanly with a never-silent WalkDepthExceeded/AmbientError::DepthExceeded past it, running on mycelium-stack's deep worker stack; empirically measured headroom >=1,000,000 levels (>200x the budget). CHANGELOG.md '### Added (2026-07-01: Wave-1 ...)' M-674 entry."
    doc_refs: [src:crates/mycelium-stack/src/lib.rs, src:crates/mycelium-l1/src/checkty.rs, src:crates/mycelium-l1/src/elab.rs, src:crates/mycelium-l1/src/totality.rs, src:crates/mycelium-l1/src/ambient.rs]
    body: |
      Generalize the "explicit reified depth budget (banked guard 4) + deep worker stack (`mycelium-stack`, isolated outside the `#![forbid(unsafe_code)]` kernel) + measured-safe ceiling" discipline to EVERY recursion/resource limit point, so they all refuse cleanly and never crash, and the pattern is uniform + self-hosting-portable (the explicit budgets carry to the Mycelium-native frontend; the host-stack adapter is transitional). The explicit budget is the load-bearing primitive; the deep stack is only needed where frames are large enough that the budget would otherwise outrun a normal host stack.
      Status (2026-06-22): DONE — checker (`MAX_CHECK_DEPTH`, deep stack), elaborator (`MAX_ELAB_DEPTH`, deep stack), parser (`MAX_EXPR_DEPTH`, explicit budget; small frames fit the normal stack), **evaluator** (`Evaluator::call` runs on the deep worker stack; `DEFAULT_DEPTH=64` stays the explicit ceiling but `with_depth(N)` is now host-stack-safe — est. physical ceiling ~65k–130k levels in debug; `SwapEngine: +Send+Sync`; clean-refusal test). Isolation crate `mycelium-stack` + kernel `forbid(unsafe_code)` landed.
      TODO (the remaining limit points): (2) **totality** + **ambient** passes — give each an explicit budget (today bounded only transitively by the parser's 256); (3) audit cross-crate recursion limit points (MLIR lowering in `mycelium-mlir`, the runtime task/supervision depth, reconstruction recursion in `mycelium-core::recon`, dense/VSA recursive ops) and apply the same discipline (budget where it recurses; the isolated deep-stack adapter where frames warrant it). (4) Optional: wire the documented `grow-on-demand` (stacker) feature in `mycelium-stack` (unsafe contained in the leaf dep) if unbounded-growth is ever wanted. Each gets a clean-refusal regression test. Honesty: a budget is an honest ceiling (never silent), not a guess; never raise one without measuring the physical headroom (as `MAX_CHECK_DEPTH` records).

      DONE (2026-07-01, W1-674 leaf): closes TODO item (2) — the totality checker's `walk_expr`/
      `descend_walk`/`pattern_binders` traversal and the ambient resolution pass's `expr`/`type_ref`/
      `pattern` recursion now each carry their own explicit budget (`MAX_WALK_DEPTH`/
      `MAX_AMBIENT_DEPTH`, 4096), refusing cleanly (`WalkDepthExceeded`/`AmbientError::DepthExceeded`)
      past it and running on `mycelium-stack`'s deep worker stack, so the budget — not a host-stack
      overflow — is what bounds a pathologically-nested input. Empirically measured: `walk_expr`
      survives >=2,000,000 levels, the ambient resolver >=1,000,000, both >200x the 4096 budget.
      `checkty`/`elab`'s own call-graph/effect-coverage collectors share `walk_expr` (M-641) and were
      updated to propagate the budget, closing the same gap there too. Regression tests added for both
      passes (just-under-budget succeeds, past-budget refuses cleanly), including the self-recursive
      `descend_walk` path.
      FLAG (honest, not silently dropped — G2): the sibling `mono.rs` `free_vars`/`pattern_binders`
      recursion (monomorphization's own AST descent, distinct from `totality.rs`'s traversal) remains
      UNBOUNDED — item (3)'s cross-crate audit did not reach it. This is a follow-up, explicitly out
      of this issue's totality/ambient scope (item (2)), not a silent gap. Items (3) (the broader
      cross-crate audit: MLIR lowering, runtime task/supervision depth, `mycelium-core::recon`,
      dense/VSA recursive ops) and (4) (optional `grow-on-demand` stacker feature) remain open.
      This mono.rs remainder is now tracked as M-866.

