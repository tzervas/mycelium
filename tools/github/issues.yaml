      Review the 10 JSON Schemas (docs/spec/schemas/) against their source RFCs; add >=1 valid + >=1 invalid example per schema; CI runs check-jsonschema/ajv over examples.
      Acceptance: examples validate in CI; schema status draft -> ratified.

  - id: M-011
