  - id: E13-1
    title: "E13-1 (epic) -- Standard library in Mycelium (self-hosted stdlib + core libs)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:stdlib, priority:P1, status:done]
    depends_on: [E11-1]
    epic: E13
    landed_date: 2026-07-01
    landed_basis: "ADR-035 (maintainer-ratified) narrows this epic's lang 1.0.0 Definition of Done to the stable-API freeze (DN-66) + the core-lib self-host slice -- all named children (M-714/M-715/M-716/M-717/M-718/M-719) are now done under that narrowed scope. Full RFC-0031 D6 Rust-crate retirement (all 26 mycelium-std-* crates) continues post-1.0 as M-867, off the lang 1.0.0 critical path."
    doc_refs:
      - corpus:RFC-0031
      - corpus:RFC-0016
      - corpus:DN-25
      - corpus:DN-66
      - corpus:ADR-035
    body: |
      THE defining full-language-1.0.0 criterion: the stdlib and libraries beyond the bare Rust
      core are written fully in Mycelium (.myc), stable, and fully usable. Today only
      lib/std/result.myc self-hosts (M-649); all other mycelium-std-* crates are Rust-first.
      This epic delivers the complete migration -- core/prelude, collections, text+fmt,
      math+numerics -- differential-tested and stable, so that the language is genuinely
      self-hosting at the library layer and the full honesty contract (G2/VR-5) is visible at
      source level in every stdlib op. The Rust kernel (mycelium-core/l0/l1) stays Rust; that
      boundary is defined by RFC-0031.

      User stories:
      - As a language user, I want to import std.collections, std.text, and std.math as .myc
        nodules, so that my programs do not depend on Rust internals and the honesty contract
        is visible at source level.
      - As a stdlib author, I want a clear per-module stability bar (differential tests,
        guarantee-tag obligations, API-freeze criteria), so that I know when a .myc port is
        done without ad hoc review criteria at each PR.
      - As a compiler engineer, I want the phylum layout and layering defined before any port
        begins (RFC-0031 Accepted), so that import paths, content-addressed identity (ADR-003),
        and spore packaging (ADR-013) are consistent across the migration.
      - As a library/phylum author, I want the per-module stability bar documented, so that
        a contributed .myc phylum can be accepted by the same criteria as the core stdlib ports.
      - As a maintainer, I want the migration sequenced by language-surface readiness (RFC-0024
        HOF for combinators, RFC-0019 traits for iter/cmp/Ord/Eq, operator syntax for math),
        so that each increment is reviewable and the wave is not a big-bang rewrite.
      - As a downstream app developer, I want every ported std module to have a stable,
        documented API before I depend on it, so that upgrading Mycelium does not silently
        break my code.

      Issues to resolve:
      - What is the irreducible-Rust boundary -- which mycelium-std-* crates can never be .myc
        (bootstrapping, unsafe memory, platform I/O)?
      - What is the correct phylum layout and nodule naming (lib/std/ root, import paths,
        versioning) consistent with ADR-003 and ADR-013?
      - What is the migration order given revised language-surface readiness (RFC-0024 HOF now
        landed; RFC-0019 traits available)?
      - What is the per-module stability bar -- differential test granularity, minimum guarantee
        tags, Rust crate retirement policy?

      Definition of Done:
      - RFC-0031 reaches Accepted (M-714 complete); the irreducible-Rust boundary, phylum
        layout, stability bar, and migration order are ratified.
      - lib/std/core.myc (Option/Result/Ord/Eq) and lib/std/iter.myc land, differential-tested
        against the Rust reference, with honest guarantee tags and never-silent G2 (M-715).
      - lib/std/collections.myc (Vec/Map/Set) lands with honest bounds, differential-tested (M-716).
      - lib/std/text.myc + lib/std/fmt.myc land, differential-tested (M-717).
      - lib/std/math.myc + lib/std/numerics.myc land with honest epsilon/delta surface (M-718).
      - Every ported module has a stable documented API; the corresponding mycelium-std-* Rust
        crate is deprecated or retired per RFC-0031's stability bar (M-719).
      - just check green on the full lib/std/ tree.

      Children:
      - M-714 -- stdlib composition + phylum layout (RFC-0031 authoring): the module set,
        layering on the Rust core, irreducibly-Rust vs must-be-.myc boundary. [type:design]
      - M-715 -- core/prelude in Mycelium: Option/Result/cmp/Ord/Eq + iter traits as .myc
        (port from the Rust std-* crates), differential-tested. [type:feature]
      - M-716 -- collections in Mycelium: Vec/Map/Set as .myc with honest bounds. [type:feature]
      - M-717 -- text + fmt in Mycelium: string handling + formatting as .myc. [type:feature]
      - M-718 -- math + numerics surface in Mycelium: math ops + epsilon/delta numerics surface
        as .myc. [type:feature]
      - M-719 -- stdlib conformance + stability: every std module has differential tests + a
        stable documented API; the Rust std-* crates beyond the bare core are superseded by
        .myc. [type:verification]

      DONE (2026-07-01, ADR-035 ratification act): the maintainer narrowed this epic's lang 1.0.0
      Definition of Done (ADR-022 T4) to the documented stable-API freeze (DN-66) + the core-lib
      self-host slice (M-714...M-718) -- NOT full RFC-0031 D6 retirement of every mycelium-std-*
      Rust crate, which is real, tracked work but is deferred to the post-1.0 long-term arc
      (ADR-022 §10; see ADR-035). All named children are done under the narrowed bar, so this epic
      closes for its 1.0.0 scope. The full-retirement ambition continues as **M-867** (post-1.0
      backlog, status:todo), not as an open item of this epic.

  - id: M-714
    title: "stdlib composition + phylum layout (RFC-0031)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:design, area:stdlib, priority:P1, status:done]
    epic: E13-1
    doc_refs:
      - corpus:RFC-0031
      - corpus:RFC-0016
      - src:lib/std/result.myc
    body: |
      DONE (2026-06-23): RFC-0031 → Accepted. §5 D1–D7 ratified — D1 irreducible-Rust boundary
      (core/l0/l1/cert/swap/prims/mlir/std-sys) + the (a)trust-root/(b)bootstrap-floor/(c)value-model-
      FFI/(d)unsafe-ABI criterion; D2 phylum layout (std.<module> → lib/std/<module>.myc); D3 no
      bootstrap circularity (Rust frontend compiles the .myc stdlib; ring layering forbids use-cycles);
      D4 surface-readiness-TIERED migration order (Tier-0 structural core executable NOW; Tier-1
      cmp(width)/math blocked on a comparison + binary-arith prim; Tier-2 collections/iter/text/fmt
      blocked on a sequence/string representation — VR-5: ports sequenced behind their enabling prims,
      never claimed ahead); D5 per-op stability bar + the std_result/std_option/std_cmp prototype
      pattern; D6 Rust crate kept as differential oracle; D7 one spore per phylum. Gates M-715…M-719.

      Author RFC-0031 (Self-Hosted Standard Library Composition): define the module set,
      the phylum layout, which parts of the system are irreducibly Rust vs must-be-.myc, and
      the per-module stability bar. This is the design gate that must reach Accepted before any
      M-715...M-719 implementation leaf starts -- getting the layout and boundary wrong here
      would force all subsequent ports to be re-done.

      User stories:
      - As a stdlib author, I want the phylum layout and nodule paths fixed before I write a
        single .myc line, so that import paths and content-addressed identity are consistent
        across all ports.
      - As a compiler engineer, I want the irreducible-Rust boundary explicitly named, so that
        no port accidentally tries to self-host the interpreter or kernel.

      Issues to resolve:
      - Which mycelium-std-* crates are irreducibly Rust (candidates: mycelium-core, l0, l1,
        swap/cert, unsafe memory, platform I/O)?
      - Does lib/std/result.myc (M-649) correctly establish the path convention for all ports?
      - What is the per-module stability bar (differential test requirements, guarantee-tag
        obligations, API-freeze criteria, Rust crate retirement policy)?
      - What is the migration order given RFC-0024 HOF is now landed?

      Definition of Done:
      - RFC-0031 draft is written with all open questions in ss5 addressed or explicitly
        deferred with direction.
      - RFC-0031 reaches Accepted (maintainer ratification).
      - The irreducible-Rust boundary is documented as a named list with reasoning.
      - The phylum layout (nodule paths, groupings, versioning) is specified.
      - The per-module stability bar is documented.
      - The migration order is sequenced and grounded.

  - id: M-715
    title: "core/prelude in Mycelium: Option/Result/cmp/Ord/Eq + iter traits as .myc"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:stdlib, priority:P1, status:done]
    epic: E13-1
    doc_refs:
      - corpus:RFC-0031
      - corpus:RFC-0016
      - corpus:RFC-0024
      - src:lib/std/iter.myc
      - src:crates/mycelium-l1/src/mono.rs
      - src:crates/mycelium-l1/tests/std_iter.rs
      - src:lib/std/result.myc
      - src:lib/std/option.myc
      - src:lib/std/cmp.myc
      - corpus:DN-25
    body: |
      DONE (2026-06-27, rsm Session-3): the recursive-HOF clause is CLOSED — the last M-715 remainder.
      lib/std/iter.myc's map/filter/foldl/any/all/find now EXECUTE three-way (L1-eval == L0-interp ==
      AOT), not just type-check. The fix is a self-contained extension of stage-1 defunctionalization in
      crates/mycelium-l1/src/mono.rs::resolve_fn_args (no kernel change, KC-3): when a HOF fn-valued
      argument is a VALUE PARAMETER already bound to a static specialization in the current emit scope
      (fn_param_subst), it is threaded through as the SAME specialization the outer call pinned — so the
      recursive self-call `map(rest, f)` resolves to e.g. map$inc with the fn-arg dropped (no runtime
      closure). std_iter.rs: 10 executable three-way tests replace the prior cannot-monomorphize
      smoke-checks. Full mycelium-l1 suite green (610). With Option/Result, width-generic cmp (Session-2),
      and the iter combinators all running three-way, M-715's core/prelude scope is complete. STILL
      DEFERRED as a SEPARATE item (M-704, never faked): closures / lambdas, multi-arg arrows (a true
      binary foldl f: A -> B -> B), and partial application — these are NOT part of M-715.

      RE-FLAG (2026-06-27, rsm Session-2): two updates, kept honest and distinct (VR-5).
      (1) The width-generic cmp<N> forms ARE NOW LANDED (M-718/M-753): cmp.myc's cmp/le/ge/max/min are
      width-generic over Binary{N}, superseding the cmp_u8/... Binary{8} interim. That clause is CLOSED.
      (2) The recursive-HOF / RFC-0024 defunctionalization gap REMAINS DEFERRED and was NOT re-attempted
      this wave (per the rsm kickoff): the iter HOF combinators (map/filter/fold/any/find) still type-check
      but mono refuses (never-silent Residual) -- recursive application of a function PARAMETER is outside
      RFC-0024 (only named top-level fns resolve). IMPORTANT distinction: the M-718 "width-var pass-through"
      (checkty.rs unify, which DID land and unblocks recursive WIDTH-generics like map_get) is a SEPARATE
      mechanism from this function-PARAMETER recursion gap -- closing the former does NOT close the latter
      (a higher-order value, not a width, is what fails to defunctionalize). Status stays in-progress.

      WAVE-N2-P1 (2026-06-26): lib/std/iter.myc (iterator surface) + cmp.myc width-typed Binary{8} helpers
      landed. EXECUTABLE three-way: iter length/is_empty + a fold-overflow refusal; cmp_u8/le/ge/max/min (10
      helpers). DEFERRED (flagged, VR-5): the iter HOF combinators (map/filter/fold/any/find) type-check but
      mono REFUSES (never-silent Residual) -- recursive application of a function PARAMETER is outside RFC-0024
      defunctionalization (only named top-level fns resolve); a recursive-HOF defunctionalization gap, sibling
      to width-generics. Width-generic cmp<N> forms await M-753. Status stays in-progress.

      IN PROGRESS (2026-06-23) — Tier-0 landed (RFC-0031 §5 D4): lib/std/option.myc (Option<A> +
      is_some/is_none/unwrap_or/map/and_then/fold/or_else/flatten), lib/std/cmp.myc (Ordering +
      is_lt/is_eq/is_gt/reverse + structural bool_eq/bool_cmp/ord_eq over finite types), and an
      extended lib/std/result.myc (map_err/or_else added to the M-649 surface) are written, three-way
      differential-tested (L1-eval ≡ L0-interp ≡ AOT — crates/mycelium-l1/tests/std_option.rs +
      std_cmp.rs + std_result.rs, 44 tests green), honest tags (Exact for total finite/structural
      ops + the Some/None/Ok/Err discriminators; Declared for generic value combinators; agreement
      Empirical), never-silent G2. This is the executable core/prelude surface.
      DEFERRED (honest, VR-5): width-typed cmp/Eq/Ord over Binary{N}/Ternary{N} needs a reduce-to-Bool
      comparison prim (not surfaced — only bit.not/bit.xor + trit arith exist) → Tier-1, blocks with
      M-718. The `iter` trait surface needs a concrete sequence type to iterate → Tier-2, blocks with
      M-716. Neither is claimed self-hosted ahead of its enabling surface.

      Port the core/prelude module family to Mycelium (.myc): Option, Result (extending
      lib/std/result.myc), cmp, Ord, Eq, and the iter traits. This is the foundation all other
      stdlib ports depend on -- Vec, Map, and fmt all require Option/iter/Ord. The port must
      be differential-tested against the Rust mycelium-std-core reference and carry honest
      guarantee tags throughout. Requires RFC-0024 HOF (for map/and_then/fold) and RFC-0019
      traits (for Ord/Eq/iter) to be implemented Rust-first at minimum.

      User stories:
      - As a language user, I want Option and Result to be importable as std.core .myc nodules
        with combinators (map, and_then, fold) that work natively in .myc code.
      - As a stdlib author, I want Ord/Eq/iter defined as .myc traits so that subsequent
        collection and math ports can depend on them without a Rust FFI boundary.

      Issues to resolve:
      - Is RFC-0019 traits (for Ord/Eq/iter dispatch) sufficiently complete to write these
        in .myc, or does M-715 require a further language surface increment?
      - Does lib/std/result.myc (M-649) need to be refactored, or just extended?
      - What is the differential test strategy: per-function or per-module aggregate coverage?

      Definition of Done:
      - lib/std/core.myc (or equivalent) is written in .myc with Option/Result/cmp/Ord/Eq.
      - lib/std/iter.myc is written in .myc with the iter trait surface.
      - Differential tests pass: .myc eval == Rust mycelium-std-core reference (Empirical).
      - Honest guarantee tags on every exported op; never-silent G2; EXPLAIN-able selections.
      - just check green on the new nodules.

  - id: M-716
    title: "collections in Mycelium: Vec/Map/Set as .myc with honest bounds"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:stdlib, priority:P1, status:done]
    epic: E13-1
    depends_on: [M-715, M-749]
    doc_refs:
      - corpus:RFC-0032
      - corpus:RFC-0031
      - corpus:RFC-0016
      - corpus:DN-25
      - src:crates/mycelium-l1/tests/enablement.rs
      - src:crates/mycelium-l1/tests/std_collections.rs
      - src:lib/std/collections.myc
    body: |
      IMPLEMENTED (DoD met — Vec/Map/Set with honest O(n) bounds, never-silent, 20 differential tests; 2026-06-26,
      wave-n1): lib/std/collections.myc landed in .myc — Vec (cons-list),
      Map + Set (association lists), with honest O(n) bounds (Declared; never claimed Exact O(1)) and
      never-silent Option on empty/out-of-range/missing-key (G2). Demonstrated three-way (L1-eval ≡
      L0-interp ≡ AOT) by crates/mycelium-l1/tests/std_collections.rs (20 passing differential tests,
      incl. a len-bound add_bin overflow refusal). DEFERRED (flagged, not silently dropped — VR-5):
      (a) snoc/reverse are O(n²) — a bare-nullary-constructor-in-abstract-position check limit
      (RFC-0007 §11.3 ascription would restore O(n)); (b) Map/Set lookup is monomorphic at Binary{8}
      because eq is width-typed and width-generics (M-753) are not yet landed — generic-key lookup
      waits on M-753. Differential gate is the three-way self-differential (the shipped-.myc-nodule
      gate, std_option.rs precedent) with expected values anchored to the Rust mycelium-std-collections
      reference; the literal "vs Rust crate" structural diff is not achievable (different data model)
      — maintainer-flagged. Status ready → done (DoD met; landed this wave). Follow-ons (O(n) reverse via
      RFC-0007 §11.3; generic-key lookup via M-753) are flagged enhancements, NOT DoD gaps.

      PRECONDITION SATISFIED (2026-06-26): the M-749 kernel sequence repr landed (`Repr::Seq` +
      `Payload::Seq` + never-silent `seq.get`/`seq.len`, RFC-0032 D3; Rust-first, RFC Accepted-not-Enacted)
      with a `.myc` surface (`[..]` → `Seq{T,N}`) demonstrated three-way (L1-eval ≡ L0-interp ≡ AOT) in
      `crates/mycelium-l1/tests/enablement.rs` (`seq_*_surface_three_way`). The indexed-collection
      substrate this task needed now exists; status `blocked → ready` (the port itself is still to do,
      and also rides M-715's Option/iter surface). Original blocking note retained below.

      BLOCKED (RFC-0031 §5 D4 Tier-2) on E19-1/M-749 (sequence/array value representation + indexing,
      gated by RFC-0032): efficient Vec/Map/Set self-hosting needs a kernel sequence/collection value
      + an indexing prim. The surface today bottoms out on bit.* / trit.* over fixed-width Binary{N}/
      Ternary{N} with no heap/sequence value, so there is nothing for an indexed .myc Vec to be built
      on. (Note: a purely functional cons-List -- type List<A> = Nil | Cons(A, List<A>) -- is an
      ordinary recursive .myc ADT and is NOT blocked; RFC-0032 Q3 delimits which collection surface
      needs the new Repr vs which the ADT machinery already covers.) Not claimed self-hosted ahead of
      that surface (VR-5/G2). Also depends on M-715 (Option + the iter surface).

      Port the collections module family (Vec/Map/Set) to Mycelium (.myc) with honest bounds:
      every op carries an explicit guarantee tag (Exact/Empirical/Declared) and out-of-range
      or capacity-exceeded conditions are never-silent (G2 -- Option/Result, never a silent
      sentinel or panic). Depends on M-715 (core/prelude, especially Option and iter).
      The Rust mycelium-std-collections crate stays as the differential reference.

      User stories:
      - As a language user, I want std.collections.Vec to be a .myc nodule with honest
        capacity bounds, so that I never get a silent overflow or capacity failure.
      - As a stdlib author, I want the Map and Set ports to use the .myc iter/Ord/Eq traits
        (from M-715), so that the collection types are fully self-contained in .myc.

      Issues to resolve:
      - What is the honest bound model for Vec growth (amortized O(1) push -- Empirical or
        Declared)? How is the amortization disclosed?
      - What Map implementation is used (B-tree vs hash) and how is the selection reified
        (EXPLAIN-able per ADR-006)?

      Definition of Done:
      - lib/std/collections.myc written in .myc with Vec, Map, Set.
      - Differential tests pass vs Rust reference (Empirical).
      - Honest guarantee tags on every op; never-silent capacity/range conditions.
      - just check green.

  - id: M-717
    title: "text + fmt in Mycelium: string handling + formatting as .myc"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:stdlib, priority:P1, status:done]
    epic: E13-1
    depends_on: [M-715, M-750]
    doc_refs:
      - corpus:RFC-0032
      - corpus:RFC-0031
      - corpus:RFC-0016
      - corpus:DN-25
      - src:crates/mycelium-l1/tests/enablement.rs
      - src:crates/mycelium-l1/tests/std_text.rs
      - src:lib/std/text.myc
      - src:crates/mycelium-l1/tests/std_fmt.rs
      - src:lib/std/fmt.myc
    body: |
      DONE (2026-06-27, rsm Session-2): UTF-8 VALIDITY layer CLOSED -- the last M-717 remainder. decode_one
      now rejects overlong encodings, surrogate-range codepoints (U+D800..U+DFFF), and codepoints above
      U+10FFFF via the reject_two/three/four gates (the assembled Binary{32} codepoint compared, Exact lt,
      against the per-length minimum + the surrogate gap + the ceiling). Utf8Error gains Overlong/Surrogate/
      TooLarge(Binary{8}) variants carrying the lead byte -- never-silent (G2), never U+FFFD. Boundary
      values (U+0080, U+10FFFF) are accepted, not over-rejected. std_text.rs: 4 validity-rejection + 2
      boundary-acceptance tests three-way (31 total green). With ENCODING + SLICING already met (WAVE-N2),
      M-717's text scope is complete; decode_one now yields only well-formed Unicode scalar values (RFC-3629).

      WAVE-N2-P3 (2026-06-26): slicing DoD clause MET -- bytes_slice/bytes_concat SURFACED (M-799/DN-43);
      FLAG-text-3 CLOSED. CORRECTION (VR-5): the p2 note below saying these "need their own surface prim"
      was a MISDIAGNOSIS -- the kernel prims existed + were never-silent since M-750; only the surface
      mapping (prim_kernel_name) was missing. text.myc now has slice/slice_opt/concat; out-of-range +
      inverted slice refuse on all 3 paths. M-717 now meets ENCODING + SLICING; the only remainder is the
      UTF-8 VALIDITY layer (overlong/surrogate/>U+10FFFF) -- a flagged increment.

      WAVE-N2-P2 (2026-06-26): multi-byte UTF-8 decode COMPLETE -- byte_at + decode_one now decode
      1/2/3/4-byte sequences three-way (via the width_cast prim, M-798); never-silent Err(Invalid(byte))
      on malformed lead/continuation (no U+FFFD). FLAG-text-1 (byte_at) + FLAG-text-2 (Binary{32}
      codepoints) CLOSED. ENCODING DoD MET. STILL DEFERRED (VR-5): (a) Bytes-native slice/concat --
      bytes_slice/bytes_concat still not surface-callable (need their own surface prim, the next analog
      of width_cast/M-798); the slicing DoD clause is the only remainder. (b) UTF-8 VALIDITY layer --
      decode does not yet reject overlong/surrogate/>U+10FFFF encodings (a flagged increment).
      Status stays in-progress until slicing lands.

      IMPLEMENTED PARTIAL (2026-06-26, wave-n1): lib/std/text.myc + lib/std/fmt.myc landed in .myc.
      text.myc: byte_len/is_ascii_byte + decode_ascii (UTF-8 ASCII fast-path, U+0000–U+007F) returning
      Result<Binary{8}, Utf8Error> — a malformed/multi-byte lead byte → never-silent Err(Invalid(byte)),
      no U+FFFD substitution (G2). fmt.myc: hex_digit/nibble_lo/nibble_hi/to_hex (first-order rendering;
      no reflective Display — .myc has no Value introspection). Demonstrated three-way by std_text.rs (11)
      + std_fmt.rs (19) — 30 passing differential tests. DEFERRED (flagged — VR-5): (a) byte_at and full
      decode_one→Binary{32} Unicode scalar — there is NO surface zero-extension/width-cast prim to
      compare a Binary{32} length/offset against a Binary{8} index (a real kernel-surface gap, FLAG-up
      for a follow-on prim task); (b) bytes_slice/bytes_concat are not surface-callable, so a Bytes-native
      slice/concat is deferred (modeled only over a local byte cons-list). Multi-byte UTF-8 decode will ride that
      width-cast prim once it is surfaced. Differential gate as for M-716 (three-way self-diff + Rust mycelium-std-text/
      -fmt value oracle). Status ready → in-progress (PARTIAL; stays open for the multi-byte + slice
      follow-on once the width-cast/slice prim surface lands).

      PRECONDITION SATISFIED (2026-06-26): the M-750 kernel byte-string repr landed (`Repr::Bytes` +
      `Payload::Bytes` + never-silent `bytes.{get,slice,len,concat}`, RFC-0032 D4; Rust-first, RFC
      Accepted-not-Enacted) with a `.myc` surface (`0x…` hex → `Bytes`) demonstrated three-way
      (L1-eval ≡ L0-interp ≡ AOT) in `crates/mycelium-l1/tests/enablement.rs` (`bytes_*_surface_three_way`).
      UTF-8 decode is written in `.myc` over these byte prims (never in the kernel — D4). The byte
      substrate this task needed now exists; status `blocked → ready` (the port itself is still to do,
      and also rides M-715's Result/Option surface). Original blocking note retained below.

      BLOCKED (RFC-0031 §5 D4 Tier-2) on E19-1/M-750 (byte/string value representation + codepoint ops,
      gated by RFC-0032): text/fmt self-hosting needs a kernel string/byte-sequence value. The surface
      today has no string value (only fixed-width Binary{N}/Ternary{N} + bit/trit prims), so a .myc
      text type has nothing to bottom out on. This port lands once the string/byte-sequence
      representation is surfaced. Not claimed self-hosted ahead of that surface (VR-5/G2). Depends on
      M-715 (Result/Option for never-silent encoding errors).

      Port the text and fmt module families to Mycelium (.myc): string handling (slices,
      concatenation, search, encoding) and formatting (the Display-equivalent surface).
      These are Tier-B common modules per RFC-0016 but prerequisite for diagnostics and any
      user-facing output from .myc programs. Depends on M-715 (core/prelude, especially Result
      and Option for never-silent encoding errors).

      User stories:
      - As a language user, I want std.text and std.fmt as .myc nodules so that I can write
        .myc programs that handle and display strings without a Rust FFI boundary.
      - As a stdlib author, I want encoding errors (invalid UTF-8, out-of-bounds slices) to be
        never-silent (G2 -- Result, not a sentinel), so that the text surface is as honest as
        the rest of the library.

      Issues to resolve:
      - What encoding does the Mycelium text type assume (UTF-8 only, or multi-encoding)?
      - How is the fmt/Display equivalent expressed in .myc (trait-based per RFC-0019, or a
        simpler first-order interface)?

      Definition of Done:
      - lib/std/text.myc and lib/std/fmt.myc written in .myc.
      - Differential tests pass vs Rust reference (Empirical).
      - Never-silent encoding/slicing errors (Result); honest tags.
      - just check green.

  - id: M-718
    title: "math + numerics surface in Mycelium: math ops + epsilon/delta surface as .myc"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:stdlib, priority:P1, status:done]
    epic: E13-1
    depends_on: [M-715, M-747, M-748, M-753]
    doc_refs:
      - corpus:RFC-0031
      - corpus:RFC-0032
      - corpus:RFC-0016
      - corpus:DN-25
      - src:lib/std/math.myc
      - src:lib/std/cmp.myc
      - src:lib/std/collections.myc
      - src:crates/mycelium-l1/tests/std_math.rs
      - src:crates/mycelium-l1/tests/enablement.rs
    body: |
      DONE (2026-06-27, rsm Session-2; M-753 width-generics now landed). The WIDTH-GENERIC math/cmp
      surface ships against the SURFACED prims only (VR-5/G2 -- nothing claimed ahead of a prim):
      - std.cmp: cmp/le/ge/max/min are now width-generic over Binary{N} (supersede the wave-n1 cmp_u8/...
        Binary{8} interim); le/ge/max/min delegate to cmp (DRY).
      - NEW std.math: width-generic binary add/sub (badd/bsub, never-silent overflow via bit.add/bit.sub)
        + bitwise band/bor/bxor/bnot (total), and balanced-ternary tadd/tsub/tmul/tneg over Ternary{M}
        (never-silent overflow via trit.*). Each op Exact on its in-range result (grounded in prims.rs).
      - std.collections: map_get<N,V> + set_contains<N> now width-generic over the key/element width
        (the recursive linear scan rides the M-718 unify width-var pass-through), replacing the Binary{8}
        interim; value type V stays fully generic.
      Honest boundary (FLAGged, NOT faked): NO division or binary multiply (no surfaced prim) and NO
      epsilon/delta Dense numerics surface (a Dense workstream, E2-1/E2-4) -- both future increments.
      Enabling L1 fix: checkty.rs unify now binds a width var against another width var (the type-var
      pass-through analog) so recursive/delegated width-generics check; mono resolves the concrete width.
      Tests (new fns vs dev): std_math.rs (+19), std_cmp.rs (+7), std_collections.rs (+4),
      width_generic.rs (+7), std_text.rs (+10), std_generic_conformance.rs (M-719, +4) -- full
      mycelium-l1 suite green (604 tests). The
      numerics.myc / epsilon-delta clause of the original DoD is explicitly DEFERRED (no prim), not
      claimed; M-718's math/cmp + generic-key-lookup scope is complete.

      BLOCKED (RFC-0031 §5 D4 Tier-1) on E19-1: width-typed comparison needs M-747 (reduce-to-Bool
      comparison prim); binary math needs M-748 (binary arithmetic surface); a GENERAL (non-fixed-
      width) math/cmp surface needs M-751 (width-generic fns) -- all gated by RFC-0032. The kernel
      surfaces only bit.not/bit.xor for Binary{N} (bit.and/bit.or are registered but not surfaced via
      prim_kernel_name; no add/sub/cmp), and width {N} is a concrete literal,
      not a generic parameter, so a fixed-width-only port would bake Ternary{4} into the stdlib (a weak
      surface -- not taken, VR-5). NOTE: the ternary-arithmetic ops (add/sub/mul/neg over Ternary{N})
      are already surfaced as trit.* prims, so once M-751 lands a width-generic ternary-math leaf is
      the first increment. Not claimed self-hosted ahead of the prims/width-generics (VR-5/G2). Depends
      on M-715 (Result/Option for never-silent overflow). Operator-syntax sugar (M-705) optional.

      Port the math and numerics module families to Mycelium (.myc): arithmetic ops (add,
      sub, mul, div, and the Mycelium-native ternary math), the epsilon/delta numerics surface
      (honest rounding, overflow, and precision disclosure), and the binary/ternary/dense
      representation math surfaces. The numerics surface is a Tier-A differentiator per
      RFC-0016 -- the honest-bounds obligation is especially load-bearing here (VR-5/G2:
      rounding is never silent, overflow is always an explicit condition). Depends on M-715
      (core/prelude for Result/Option). May depend on operator syntax (DN-23/future RFC-0025)
      if infix math sugar is wanted; otherwise word-based (add/mul/etc.) is sufficient.

      User stories:
      - As a language user, I want std.math to expose ternary and binary arithmetic as .myc
        nodules with honest rounding and overflow (never silent, never a sentinel).
      - As a downstream app developer, I want the epsilon/delta numerics surface in .myc so
        that numeric accuracy guarantees are visible in my source without reading Rust crates.

      Issues to resolve:
      - Does M-718 wait for operator syntax (RFC-0025) or land with word-based math first?
      - What is the overflow policy for each numeric type (Exact for non-overflowing ops;
        Empirical/Declared for floating-point rounding)?

      Definition of Done:
      - lib/std/math.myc and lib/std/numerics.myc written in .myc.
      - Differential tests pass vs Rust reference (Empirical).
      - Rounding and overflow are never-silent (Result/Option); honest epsilon/delta tags.
      - just check green.

  - id: M-719
    title: "stdlib conformance + stability: differential tests + stable documented API"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:verification, area:stdlib, priority:P1, status:done]
    epic: E13-1
    landed_date: 2026-07-01
    landed_basis: "ADR-035 (maintainer-ratified, 2026-07-01) narrows ADR-022 track T4's lang 1.0.0 bar to the stable-API freeze (DN-66) + the core-lib self-host slice (M-714...M-718) -- NOT full RFC-0031 D6 Rust-crate retirement. M-719's stable-API-freeze half (DN-66, landed 2026-07-01 W1-719 leaf) now closes this issue's 1.0.0 scope. The D6-retirement half (deprecate/retire all 26 mycelium-std-* crates) is re-scoped post-1.0 per ADR-035 and spun out to M-867 (status:todo)."
    doc_refs:
      - corpus:RFC-0031
      - corpus:RFC-0016
      - corpus:DN-25
      - corpus:DN-66
      - corpus:ADR-035
      - src:crates/mycelium-l1/tests/std_generic_conformance.rs
    body: |
      PARTIAL (2026-06-30, lib10 Session): per-op conformance gap-closure landed (branch
      claude/lib10-m719-conformance). Audited every exported op of all 8 self-hosted nodules
      (result/option/cmp/iter/collections/text/fmt/math) against its differential harness for the
      RFC-0031 §5 D5 bar (>=1 three-way differential per EXPORTED op). result/option/cmp/iter/fmt were
      already 100% covered. Closed the remaining gaps:
      - std.collections: the 6 constructor/builder ops (empty/push_front/map_empty/map_insert/
        set_empty/set_add) are NOT runnable through a three-way differential under the current surface
        (RFC-0007 §11.3: a nullary generic constructor/fn cannot have its type argument determined from
        an enclosing return-type ascription, and a bare base constructor in builder-arg position fails
        re-inference at monomorphization). Rather than fake a Declared "pass" (VR-5), pinned the
        never-silent REFUSAL for all 6 as the honest asserted fact (std_collections.rs +2 tests:
        nullary_constructors_refuse_undetermined_type_never_silent,
        builders_over_bare_base_constructor_refuse_never_silent). FLAG: runnable per-op coverage for
        these 6 lands when RFC-0007 §11.3 ascription syntax / nullary-call type-arg inference is
        available -- a never-silent open item, not a silent omission.
      - std.text: added isolated three-way per-op tests for is_cont_byte (4 region cases) and the
        .myc-SURFACE wrappers concat + slice (3 cases; previously only the kernel bytes_concat/
        bytes_slice prims were tested, not the wrappers). std_text.rs +7.
      - std.math: the consolidated gate's "every width-generic op at >=2 widths" claim was an
        overclaim -- bor/bxor (binary) and tsub/tmul (ternary) had only ONE width. Added the second
        width for each: std_math.rs +4 (bor16/bxor16/tsub6/tmul6) and EXPANDED MATH_CASES in
        std_generic_conformance.rs to cover the full badd/bsub/band/bor/bxor/bnot + tadd/tsub/tmul/tneg
        surface at >=2 widths each, so the gate's header is now honest.
      - API surface: lib/std/mycelium-proj.toml [surface].exports OMITTED std.iter (a self-hosted,
        differential-tested nodule); added it so the frozen export surface is complete.
      All change-scoped gates green: cargo fmt --check, cargo clippy -p mycelium-l1 --tests (no findings
      in changed files; the 8 mycelium-mlir warnings pre-exist, outside scope), and the std_* /
      std_generic_conformance targets (collections 26, text 42, math 23, generic_conformance 4, iter 16,
      cmp 38, bytes_slice 14 -- all pass).

      PARTIAL (2026-06-27, rsm Session-2): the "conformance over the new generic surface" clause is
      DONE -- std_generic_conformance.rs is the named gate: the width-generic stdlib surface (std.cmp
      cmp/le/max, std.math badd/tadd, std.collections map_get/set_contains) is checked three-way
      (L1-eval == L0-interp == AOT) at >=2 widths each, plus a consolidated never-silent width-mismatch
      refusal table. Per-module three-way coverage also lives in std_cmp/std_math/std_collections/
      std_text/width_generic. STILL OPEN (not claimed -- VR-5): the BROADER M-719 closure -- retire or
      deprecate the reference mycelium-std-* Rust crates, and freeze a documented stable public API per
      RFC-0031 §5 D5 (the API-freeze + crate-retirement decision; this is a maintainer/orchestrator
      decision, not closed by this leaf). Status stays in-progress.

      Integration and conformance gate for E13-1: verify that every ported .myc stdlib module
      (M-715...M-718) meets the RFC-0031 stability bar, retire or deprecate the corresponding
      mycelium-std-* Rust crates, and document a stable public API for each module. This is
      the closure task that makes the stdlib "fully usable" per the full-language-1.0.0
      criterion -- not just implemented but differentially tested, honestly tagged, and stable
      enough to depend on.

      User stories:
      - As a maintainer, I want a conformance gate that confirms all ported modules meet the
        RFC-0031 stability bar before E13-1 is closed, so that the 1.0.0 criterion is
        verifiably met, not just asserted.
      - As a downstream app developer, I want the stdlib API documented and stable, so that
        I can start building on it without risk of breaking changes.

      Issues to resolve:
      - What is the final stability bar (API-freeze criteria, documentation requirements)?
      - Which mycelium-std-* crates are retired (removed) vs deprecated (kept as differential
        reference) per RFC-0031?
      - How is the three-way differential (interpreter == .myc nodule == any AOT path) checked
        at the stdlib level?

      Definition of Done:
      - Every .myc module from M-715...M-718 has differential tests passing (Empirical) against
        the Rust reference; no module is undifferentiated.
      - Each module has a stable documented public API (stable import paths, documented ops,
        honest guarantee tags visible in the API docs).
      - The corresponding mycelium-std-* Rust crates are deprecated or retired per RFC-0031's
        stability bar; no Rust crate is left as an undeclared dependency of .myc code.
      - just check green on the full lib/std/ tree.
      - E13-1 issue status -> done; CHANGELOG entry append-only with honest framing.

      PARTIAL (2026-07-01, W1-719 leaf): the "broader closure" clause's FIRST half — the
      stable-API-freeze — is now DONE. **DN-66** (`docs/notes/DN-66-Stdlib-Stable-API-Freeze-And-Rust-Crate-Retirement-Status.md`)
      freezes the current public-API baseline for all 26 `mycelium-std-*` crates as a single dated,
      grounded snapshot (spec status + `GUARANTEE_MATRIX` location + public-surface size per crate,
      cross-checked against the 5 same-named `.myc` prototypes) and adds additive, non-breaking
      stability doc-comments to all 26 crates' `src/lib.rs` (or README where the crate doc is
      `include_str!`-sourced). This satisfies the DoD's "stable documented public API" bullet.
      **The SECOND half — crate retirement/deprecation — is STILL OPEN, honestly, not claimed
      done (VR-5):** DN-66 §3 grounds (not asserts) that no crate yet clears the RFC-0031 §5 D6
      retirement trigger — the 5 same-named `.myc` prototypes (`math`/`fmt`/`cmp`/`collections`/
      `iter`) are structurally disjoint subsets of their Rust crates' full surface, not full ports,
      so none is retirement-eligible. No `#[deprecated]` attribute is applied; no crate is removed.
      DN-66 §4 additionally flags: (a) `mycelium-std-sys-host` has no `docs/spec/stdlib/*.md` yet;
      (b) the real precondition for any future `#[deprecated]` call is a per-op audit as each
      module's D4-sequenced `.myc` port lands its *full* surface, not a one-time note; (c)
      `mycelium-std-runtime` is load-bearing (depended on directly by `crates/mycelium-mlir`), not
      reference-only, and needs cross-crate coordination before any retirement conversation; (d)
      final crate removal waits for RFC-0031 to reach Enacted plus an explicit maintainer act, even
      once D5/D6 are cleared.

      DONE (2026-07-01, ADR-035 ratification act): the maintainer narrowed ADR-022 track T4's
      lang 1.0.0 Definition of Done to the stable-API freeze (DN-66) + the core-lib self-host slice
      (M-714...M-718) -- full RFC-0031 D6 Rust-crate retirement is deferred to the post-1.0
      long-term arc (ADR-022 §10; see ADR-035). Under this narrowed scope, M-719's stable-API-freeze
      half (already landed, above) IS the whole of M-719's 1.0.0 requirement, so this issue is CLOSED
      (status -> done) for 1.0.0 purposes. The D6-retirement half (per-op D5 audits + `#[deprecated]`
      marking for the 21 crates with no `.myc` prototype, plus completing the 5 disjoint prototypes
      into true supersets, plus the `mycelium-std-runtime` cross-crate-coordination retirement) is
      real, tracked work that continues -- it is spun out to **M-867** (new issue, `status:todo`,
      explicitly post-1.0, off the `lang 1.0.0` critical path). Nothing about the DN-66 findings
      changes; only the 1.0.0-gating scope narrows (VR-5: this is a status report on a checked basis,
      not an upgrade of any prior claim).

  - id: E15-1
    title: "E15-1 (epic) -- Native AOT maturity, optimization, and acceleration"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:epic, area:execution, priority:P2, status:done]
    depends_on: [E6-1]
    epic: E15
    landed_date: 2026-07-01
    landed_basis: "M-863 ratification act: all 5 children (M-725/726/727/728/729) done, each with a checked three-way differential (M-729's own durability DoD closed by M-858's unified harness, PR #851). RFC-0029 (the design gate this epic's DoD names) reaches Enacted in the same act. Subsumed under, and closed alongside, E25-1's expanded DoD per ADR-034."
    doc_refs:
      - corpus:RFC-0029
      - corpus:RFC-0004
      - corpus:DN-25
    body: |
      DESIGN GATE CLEARED (2026-06-23): RFC-0029 reached Accepted, with its open questions
      resolved against the live crates/mycelium-mlir/. Honest re-scope: E6-1 is `done`, so the
      JIT (M-340 jit.rs), BitNet packed-ternary accel (M-360 bitnet.rs), real arith/func->LLVM
      MLIR-dialect lowering (M-601 dialect/native.rs), and the three-way native differential
      (M-602 threeway_differential.rs) ALREADY landed; ADR-019 is Enacted; ADR-009 already
      sanctions interpreter/JIT for dynamic VSA. The one genuinely-new mechanism is M-726
      (optimization passes — no src/passes/ exists yet); M-725/727/728/729 are coverage-widening
      / formalization / capability-gating / differential-unification (see RFC-0029 §5/§7).

      Mature the native AOT path into a real optimizing backend (a 1.1 track per ADR-022 §8 Q4 —
      QoL/perf, not a 1.0.0 blocker; see the SCOPE note in the DoD below). Per the re-scope above,
      the path is already substantial (E6-1 `done`: direct-LLVM
      backend + in-process JIT + BitNet accel + real MLIR-dialect lowering for the element-wise
      fragment + a three-way native differential). The interpreter stays the trusted base; the
      native path is the performance path. This epic delivers the REMAINING work:
      EXPLAIN-able never-silent optimization passes (inlining/CSE/DCE — the one genuinely-new
      mechanism, M-726), libMLIR lowering COVERAGE WIDENING beyond the element-wise fragment
      (M-725, with an explicit refusal at every honest boundary — not a re-unblock; the binding is
      present via ADR-019/setup-mlir.sh), JIT FORMALIZED as an explicit never-silently-selected
      mode (M-727 — ADR-009 already sanctions interpreter/JIT, so this is hardening, not a deferral
      lift), BitNet capability-flag + graceful-degradation formalization (FR-C3, M-728), and a
      unified mutant-witnessed three-way differential (interp == AOT == JIT, M-729). Every
      transform is EXPLAIN-able per ADR-006/G2 -- no black-box optimization is permitted.

      User stories:
      - As a language user, I want programs compiled AOT to produce the same results as the
        interpreter (Empirical three-way differential), so that I can trust AOT output without
        re-auditing my code under a different execution model.
      - As a compiler engineer, I want optimization passes (inlining, CSE, DCE) to be
        EXPLAIN-able -- reified, inspectable, auditable -- so that no optimization is a black
        box violating ADR-006.
      - As a stdlib author, I want the AOT backend to cover the language surface it honestly can,
        and to refuse the rest explicitly (never silently), so that I always know whether a .myc
        module compiled natively or fell back to the interpreter.
      - As a downstream app developer, I want JIT available for VSA/HDC dynamic workloads, so
        that I get native performance for streaming pipelines without an offline AOT step.
      - As a tool author, I want BitNet packed-ternary acceleration behind an explicit
        capability flag, so that portability is never silently compromised.
      - As a maintainer, I want the three-way differential to be mutant-witnessed, so that a
        codegen regression is caught before it reaches main.

      Issues to resolve (ALL RESOLVED by RFC-0029 — see §5/§7):
      - libMLIR binding status: RESOLVED — ADR-019 Enacted; the binding is provisioned by
        scripts/setup-mlir.sh and probed at runtime (skip-gracefully when absent). M-725 is
        coverage-widening, not unblocking. (RFC-0029 §5.1)
      - Optimization-pass EXPLAIN model: RESOLVED — a reified transform-log of
        (pass, rule, site, before->after, reason), extending M-673's MonoSelections. (§5.2/§7.2)
      - JIT scope: RESOLVED — VSA/HDC + the bit/trit subset it already compiles; explicit mode;
        REPL/interactive deferred beyond 1.0.0; ADR-009 already sanctions JIT. (§5.3/§7.3)
      - BitNet hardware targets: RESOLVED — 2-bit {-1,0,+1} packing (I2_S/TL1/TL2) + the
        runtime-data dot kernel; tile/MMA deferred beyond 1.0.0. (§5.4/§7.4)

      Definition of Done:
      - [done] RFC-0029 reaches Accepted (design gate).
      - libMLIR lowering coverage is widened beyond the element-wise fragment (M-725), each
        increment keeping an explicit never-silent refusal at its honest boundary.
      - Inlining/CSE/DCE passes implemented as EXPLAIN-able never-silent transforms (M-726);
        differential tests confirm optimized output == unoptimized (Empirical).
      - JIT formalized as an explicit, never-silently-selected mode (M-727);
        JIT result == interpreter result (Empirical).
      - BitNet packed-ternary acceleration behind explicit capability flag; graceful degradation
        never-silent; accel result == reference ternary (Empirical) (M-728).
      - Three-way differential (interp == AOT == JIT) is mutant-witnessed (M-729).
      - just check green on crates/mycelium-mlir/ with all new features enabled.
      - SCOPE (ADR-022 §8 Q4): this is a 1.1 track, NOT a 1.0.0 blocker — T6 native AOT is un-gated
        (QoL/perf, patched in post-1.0.0; 1.0.0 runs on the interpreter + direct-LLVM kernel subset).

      Children:
      - M-725 -- libMLIR lowering coverage widening (beyond the M-601 element-wise fragment),
        each increment with an explicit honest-boundary refusal. [type:feature]
      - M-726 -- optimization passes (RFC-0029): inlining/CSE/DCE as EXPLAIN-able, never-silent,
        differential-checked transforms (the one genuinely-new mechanism). [type:feature]
      - M-727 -- JIT formalized as an explicit never-silently-selected mode (ADR-009 already
        sanctions interpreter/JIT — hardening, not a deferral lift). [type:feature]
      - M-728 -- BitNet-class packed-ternary acceleration (FR-C3): capability-flag +
        graceful-degradation formalization over the M-360 kernels. [type:feature]
      - M-729 -- codegen differential durability: interp == AOT == JIT three-way agreement,
        mutant-witnessed. [type:verification]

      CLOSED (2026-07-01, M-863 ratification act): all 5 children done; RFC-0029 -> Enacted in the
      same act. This epic's original SCOPE note above (a 1.1 track per ADR-022 §8 Q4) was itself
      superseded by ADR-034 (2026-06-30), which re-gated T6 INTO the lang 1.0.0 Definition of Done
      and expanded the remaining work under the new umbrella epic E25-1 (M-850..M-863) -- this epic's
      own DoD (M-725..M-729 + RFC-0029 Accepted) is met independent of that expansion. status:done.

  - id: M-725
    title: "full libMLIR integration: ternary-dialect to MLIR to LLVM lowering"
    milestone: "Phase 6 — Native Acceleration & Deployment"
    labels: [phase:6, type:feature, area:execution, priority:P2, status:done]
    epic: E15-1
    landed_date: 2026-07-01
    landed_basis: "Commit f9f6c5b (waveN2, 2026-06-26); CHANGELOG.md '### Added (2026-06-26: waveN2 Phase-1 — stdlib enablers, width-cast prim, MLIR carry-chain, design notes (E13-1/E19-1/E15-1))' — the trit.add/trit.sub balanced-ternary carry chain lowers through the real MLIR-dialect path (arith/func -> mlir-opt -> mlir-translate -> clang); three-way differential (interp == direct-LLVM == MLIR-dialect) ran end-to-end (mlir-18-tools provisioned; skip-graceful where absent). NOTE (2026-07-01 resync): the base bit/trit + trit.add/sub fragment landed here; the remaining Dense/VSA-dialect coverage is tracked separately as M-856b (not silently folded into this issue's DoD — G2)."
    doc_refs:
