  - id: E30-1
    title: "E30-1 (epic) — Phase-I H2a: grammar-stability gate"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:epic, area:language, priority:P1, status:done]
    epic: E30
    depends_on: [M-915, M-916, M-917, M-918, M-919, M-920, M-921, M-922, M-923, M-924]
    doc_refs:
      - corpus:ADR-038
