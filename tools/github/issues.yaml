  - id: M-642
    title: "M-642 — L1 backwards-compatible API ergonomics (Default/From/ctors/non_exhaustive/getters)"
    milestone: "Phase 5 — Self-Hosting & Core Library"
    labels: [phase:5, type:feature, area:language, priority:P3, status:done]
    depends_on: []
    doc_refs: [src:crates/mycelium-l1/src/ast.rs, src:crates/mycelium-l1/src/eval.rs, src:crates/mycelium-l1/src/error.rs, src:crates/mycelium-l1/src/checkty.rs]
    body: |
      ADDITIVE-only leaf (owns only `crates/mycelium-l1/src/{ast.rs,eval.rs,error.rs,checkty.rs}`). Non-destructive ergonomics the survey grounded: `TypeRef` (ast.rs:143) gains `::unguaranteed(base)`/`::with_guarantee(base,g)` constructors + `impl Default`; the value enums `Scalar` (ast.rs:192) / `Strength` (ast.rs:205) gain `derive(Hash)` (already Copy); the closed-and-rare-to-grow `Literal` (ast.rs:324) gains `#[non_exhaustive]` + `binary`/`ternary` ctors; `Evaluator` (eval.rs:187, already a fluent builder) gains an `EvaluatorOpts` options-struct + a `with_opts` constructor (the existing `with_*` chain is kept); `Env` (checkty.rs:104) gains `type_info`/`fn_decl`/`fn_totality` getters; `ParseError`/`CheckError` (error.rs) gain ergonomic `::at` aliases. SOURCE-backwards-compatible: every change ADDS a method/impl/attribute; no field/variant/signature is removed or changed, so no existing call site breaks and the `cargo public-api` baseline only-adds. Honest caveat: `#[non_exhaustive]` on `Literal` is additive to the public-API surface (the attribute is added, nothing removed) but does force a `_` arm on any *external-crate* exhaustive `match` — there are none in-workspace today, and in-crate matches are unaffected; if the cost outweighs the benefit at implementation time, drop the `#[non_exhaustive]` and keep the ctors (which are unconditionally additive). No guarantee tag changes (VR-5).
      Acceptance: existing callers compile unchanged; `cargo test -p mycelium-l1` + clippy -D warnings green; the `cargo public-api` baseline diff is ADDITIONS-only (regenerated, never removals); zero guarantee-tag change.

