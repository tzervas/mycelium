    body: |
      The first M-346 candidate module ("diagnostics (DN-04/M-345)") — self-host the RFC-0013 structured-diagnostics layer (today crates/mycelium-lsp/src/diagnostics, Rust) in Mycelium-lang per its stated self-hosting trajectory ("Rust-first … eventually self-hosted in Mycelium-lang"). Must preserve the central never-silent invariant I1 (presentation never gates propagation) and honest sink guarantees on the lattice (RT5/VR-5).
      Acceptance (needs-design): meets the M-501 per-op guarantee/EXPLAIN contract; the I1 never-silent test holds in the self-hosted form; differential against the Rust implementation where they coexist (NFR-7-style). The early candidate-module anchor M-345 names.

