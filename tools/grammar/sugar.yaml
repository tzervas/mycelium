    grammar_rule: "ebnf:object_item (mycelium.ebnf:190); token.rs:458"
    lowering_target: "type + impl + via (checkty.rs Phase 0 structural expansion + Phase 0b via-forwarding impl generation)"
    defining_doc: DN-53
    build_status: Empirical
    note: >
      M-811 landed; three-way differential (observe(object) == observe(lower(object))) in
      tests/object_desugar.rs. Item-level `pub fn` inside an object body is deferred (DN-53 §B.2).

  - keyword: via
    status: active
    grammar_rule: "ebnf:via_clause (mycelium.ebnf:192); token.rs:461"
    lowering_target: "generated forwarding impl (delegates to a held field by index; not subtype inheritance)"
    defining_doc: DN-53
    build_status: Empirical
    note: "Active only inside object bodies; reserved everywhere else (never-silent — G2)."

  - keyword: lower
    status: active
    grammar_rule: "ebnf:lower_item (mycelium.ebnf:203); token.rs:462"
    lowering_target: "declares a user-extensible generative-lowering rule; RHS elaborated to L0 (KC-3 kernel-growth guard: existing L0 nodes only)"
    defining_doc: DN-54
    build_status: Empirical
    note: >
      M-812 + M-812-cont landed (RHS elaboration, IL-grammar RHS type-check, KC-3 guard,
      cross-rule acyclicity, §7 verification discipline) per the DN-75 completion audit; DN-54
      itself is held at `Accepted` pending a deliberate `Enacted` follow-up.

