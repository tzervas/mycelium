# tools/grammar/sugar.yaml — the Mycelium surface-sugar / lowering registry (v0).
#
# HAND-AUTHORED source of truth (like an ADR/RFC/DN, NOT a generated artifact — contrast
# tools/grammar/keywords.json, which IS mechanically generated from token.rs::keyword()). This
# file realizes DN-38's §6 "per-feature Lowering Map" as a committed, structured, drift-gated
# registry: one row per identifier keyword the L1 lexer's `keyword()` table
# (crates/mycelium-l1/src/token.rs) knows, recording where it's written, what it lowers to, and
# an honest (VR-5) build-status tag. tools/grammar/sugar_index.py cross-checks this file against
# token.rs and renders docs/sugar-index/ — see that script's docstring for the drift-guard
# mechanics.
#
# HONESTY (VR-5 / G2): this registry is `Empirical`/`Declared` itself — a curated PROJECTION of
# the DNs + token.rs, not a re-derivation of their claims. The DNs (DN-38/DN-53/DN-54/DN-102) and
# the source (token.rs, mycelium.ebnf) are ground truth; where a row's `build_status` differs from
# a defining DN's OWN current status, the DN wins — this file may lag a fresh DN edit until the
# next regen/review. No row is omitted because a feature is unbuilt (G2) — an unbuilt or
# reserved-not-active keyword gets a `Gap` row, never a silent absence. `status: active` here
# reuses tools/grammar/generate.py's `STRUCTURAL_KEYWORDS` classification (the same
# empirically-verified-against-the-conformance-corpus set the editor grammars already trust) —
# NOT independently re-derived, so this registry cannot silently diverge from the editor-grammar
# generator's notion of "does a real production consume this word" (kept in lockstep by
# `sugar_index.py`'s own cross-check, which imports `generate.py`).
#
# SCOPE (v0): rows cover the IDENTIFIER keyword set (`token.rs::keyword()`'s bucketed "keyword"
# class — declaration/control/runtime-vocabulary words). The type/scalar/strength buckets
# (`Binary`, `F32`, `Exact`, …) are base type/literal vocabulary, not surface "sugar" in DN-38's
# sense, and are out of v0 scope. Glyph-lexed sugars (the `?` try-operator, DN-102 — a single
# atomic token lexed OUTSIDE `keyword()`) and not-yet-lexed named sugars (`reveal`, DN-38 §5 /
# M-1051) don't participate in the mechanical `token.rs::keyword()` cross-check; they're recorded
# separately below (`glyph_sugars` / `not_lexed_sugars`) so DN-38/DN-102's documented sugars are
# still represented, honestly scoped out of the keyword-driven drift guard.
#
# DEFERRED (do not invent values): a `native_strategy` column (Native Equivalent / Idiomatic
# Remapping / Approximation / Interop Bridge — DN-111's now-ratified canonical taxonomy, with the
# original Adaptation/Solution/Approximation/Bridge handles retained as aliases; DN-109 supplies
# the orthogonal decidability axis) is NOT added here. The taxonomy itself is settled (DN-111,
# Accepted 2026-07-10) but classifying each of this file's 45 rows against it is deferred, bounded
# follow-up work — not invented per-row here (VR-5).
# TODO(DN-111): native_strategy column — populate against the ratified DN-111 enum (tracked as a
# residual note on M-1058; see tools/github/issues.yaml).
#
# `build_status` values: Exact | Proven | Empirical | Declared | Gap (VR-5 lattice, `Gap` added
# for "documented but genuinely unbuilt/reserved" — the same use DN-38 §6 makes of the word).
# `status` values: active (a real L1 production consumes it) | reserved (lexed, never a silent
# identifier, but no production consumes it yet).

sugars:
