    defining_doc: "DN-54; DN-38 §8.1 (naming settled: `derive` over `grow`)"
    build_status: Empirical
    note: "Settles the grow -> derive reconciliation (DN-38 §8.1); `grow` is now a rejected/superseded token (see reserved rows)."

  - keyword: consume
