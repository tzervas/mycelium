# Glyph-lexed sugars (a single atomic token OUTSIDE the identifier keyword() table — lexer.rs, not
# token.rs::keyword()). NOT part of the mechanical keyword()-driven cross-check (scope note above).
glyph_sugars:
  - glyph: "?"
    status: active
    grammar_rule: "ebnf: not yet in mycelium.ebnf (EBNF-drift gap, DN-102 §4); lexer: crates/mycelium-l1/src/lexer.rs (single(Tok::Question))"
    lowering_target: >
      `let x = e? in body` -> a type-directed match: Result -> `match e { Ok(x) => body, Err($f) =>
      Err($f) }`; Option -> `match e { Some(x) => body, None => None }` (DN-102 §2/§4)
    defining_doc: DN-102
    build_status: Declared
    note: >
      DN-102 is Draft (2026-07-10), not yet ratified — the desugar rule and the v0 position
      restriction (legal only as a let-binder RHS; DN-102 §5) are Declared pending ratification.
      Empirical evidence exists from the differential/conformance witnesses named in DN-102 §7, but
      the row stays Declared overall (VR-5: no upgrade past the ratification-pending basis). Any
      non-let-RHS position is a never-silent CheckError (G2), not a general CPS lift (deferred).

# Named sugars that are documented (DN-38) but NOT YET LEXED at all — no token.rs entry exists, so
# these fall outside even the glyph cross-check. Recorded here so DN-38 §6's atlas rows are not
# silently dropped from this registry (G2), clearly separated from the mechanically-checked sets
# above. Cross-reference: M-1051 tracks the SEPARATE desugar/expand-on-demand TOOLING (the runtime
# transparency spine) — not this static catalog; the two are complementary, not duplicative.
not_lexed_sugars:
  - name: reveal
    status: not-lexed
    grammar_rule: null
    lowering_target: "tooling — reads the L0 term, emits surface (round-trips in certified mode); no surface grammar production exists yet"
    defining_doc: "DN-38 §5, §8.1"
    build_status: Gap
    note: >
      Greenfield (DN-38 §6: "no surface form today"). Precedent (cargo-expand/Lean/Racket) is
      Empirical; the Mycelium `reveal` inspector itself is unbuilt. See M-1051 for the related but
      DISTINCT desugar/expand-on-demand tooling issue (general, developer-facing "show me the lower
      grammar at this sugar site" capability) — that issue is NOT this static catalog.
