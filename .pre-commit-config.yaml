# Optional, easy-DX local gate. The substantive checks call the SAME scripts/checks/*
# that `just check` and CI run, so pre-commit stays in parity (no second implementation).
#   install:  just hooks      (or: pre-commit install --install-hooks)
#   run all:  just pre-commit (or: pre-commit run --all-files)
minimum_pre_commit_version: "3.5.0"
# commit-msg installs the commitizen conventional-commits lint (M-1107 / Wave 0-CZ).
default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  # Fast file-hygiene hooks (not covered by our scripts).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Secret-scanning — gitleaks in --redact mode (pre-commit manages the Go binary; no manual
  # install). Allowlist + scope live in .gitleaks.toml; .example templates stay scanned.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--redact", "--config", ".gitleaks.toml"]

  # Commitizen — Conventional Commits message lint (M-1107). commit-msg stage only;
  # does not touch existing pre-commit/pre-push hooks. Config: .cz.toml.
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.5
    hooks:
      - id: commitizen
        stages: [commit-msg]


  # Substantive checks — delegate to our scripts so local == pre-commit == CI.
  - repo: local
    hooks:
      # Branch-protection guard (rsm) — never commit on / push to a protected branch
      # (main/integration/dev/claude/head/*). The git-level twin of the Claude PreToolUse hook.
      - id: branch-guard
        name: branch-protection guard (no commit on main/integration/dev/claude/head/*)
        entry: scripts/checks/branch-guard.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: branch-guard-push
        name: branch-protection guard (no push to a protected branch)
        entry: scripts/checks/branch-guard.sh --push
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      - id: structured
        name: structured data parses
        entry: scripts/checks/structured.sh
        language: script
        pass_filenames: false
        files: \.(json|ya?ml|toml)$
      - id: shellcheck
        name: shellcheck
        entry: scripts/checks/shell.sh
        language: script
        pass_filenames: false
        files: \.sh$
      - id: md-wrap-fix
        name: markdown soft-wrap reflow (MD004 +/*-at-line-start autofix — findings-driven, safe)
        entry: scripts/checks/md_wrap_fix.py --fix
        language: script
        pass_filenames: true
        files: \.md$
      - id: markdownlint
        name: markdownlint
        entry: scripts/checks/markdown.sh
        language: script
        pass_filenames: false
        files: \.md$
      - id: links
        name: cross-references resolve (offline)
        entry: scripts/checks/links.sh
        language: script
        pass_filenames: false
        files: \.md$
      - id: schema
        name: json-schema valid
        entry: scripts/checks/schema.sh
        language: script
        pass_filenames: false
        files: ^docs/spec/schemas/.*\.json$
      - id: spell
        name: codespell
        entry: scripts/checks/spell.sh
        language: script
        pass_filenames: false
      - id: secrets
        name: secret scan
        entry: scripts/checks/secrets.sh
        language: script
        pass_filenames: false
        always_run: true
      # Mycelium toolchain gates (M-361) — delegate to the same scripts `just check`/CI run.
      - id: myc-fmt
        name: mycfmt --check (canonical .myc formatting)
        entry: scripts/checks/myc-fmt.sh
        language: script
        pass_filenames: false
        files: \.myc$|mycelium-proj\.toml$
      - id: myc-check
        name: myc-check (parse + L1 type-check)
        entry: scripts/checks/myc-check.sh
        language: script
        pass_filenames: false
        files: \.myc$|mycelium-proj\.toml$
      - id: myc-sec
        name: myc-sec (wild-block audit)
        entry: scripts/checks/myc-sec.sh
        language: script
        pass_filenames: false
        files: \.myc$|mycelium-proj\.toml$
      - id: myc-lint
        name: myc-lint (invariant + header lints)
        entry: scripts/checks/myc-lint.sh
        language: script
        pass_filenames: false
        files: \.myc$|mycelium-proj\.toml$
