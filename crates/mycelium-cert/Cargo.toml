[package]
name = "mycelium-cert"
version.workspace = true
description = "Swap certificates, the binary<->ternary certified swap (RFC-0002 ¬ß3/¬ß4; M-120), and the single shared translation-validation checker (RFC-0002 ¬ß2 / RFC-0004 ¬ß3; M-210)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mycelium-core = { path = "../mycelium-core" }
mycelium-interp = { path = "../mycelium-interp" }
# The M-210 checker discharges bounded instances through the E2-4 tier-i kernel and consumes the
# shared {Œµ,Œ¥,strength} certificate (ADR-010; RFC-0002 ¬ß2).
mycelium-numerics = { path = "../mycelium-numerics" }
# The M-231 Dense<->VSA swap reuses the M-131 checked capacity instantiation (RFC-0003 ¬ß5).
mycelium-vsa = { path = "../mycelium-vsa" }
# The canonical RFC-0013 `Diag`/first-fault-envelope record (W-A, DN-142 ¬ß4.2): the `swap_check`
# emitter site (`mode.rs`) presents a `CheckVerdict` through this crate's `Diag`, never a second
# diagnostic schema (KC-3 / G-9 ‚Äî `mycelium-diag` depends only on `mycelium-core`, so this adds no
# cycle).
mycelium-diag = { path = "../mycelium-diag" }
serde.workspace = true
serde_json.workspace = true
blake3.workspace = true

[dev-dependencies]
# serde_json moved to [dependencies] above (the store's cert-body hashing needs it outside test
# cfg too); no longer duplicated here.
# M-882: `mycelium-proj`/`mycelium-spore` were previously dev-dependencies here for the M-794 ¬ß13
# conformance suite (tests/conformance.rs). That created two dev-dep cycles ‚Äî `cert ‚Üí[dev] proj ‚Üí ‚Ä¶
# ‚Üí l1 ‚Üí cert` and `cert ‚Üí[dev] spore ‚Üí proj ‚Üí ‚Ä¶ ‚Üí l1 ‚Üí cert` ‚Äî because (unlike the removed comment
# claimed) `mycelium-proj` depends on `mycelium-l1`, which depends on `mycelium-cert`. On inspection,
# the clauses that used those crates (d/e/f) never actually exercised any `mycelium-cert` code path:
# they called `mycelium_proj::cert_scope::{explain_mode, compose, ‚Ä¶}` and
# `mycelium_spore::build_spore` on values built entirely from `mycelium-core` types
# (`CertMode`/`GuaranteeStrength`), with no wiring back through cert. That exact coverage already
# exists ‚Äî more thoroughly, with proptest ‚Äî in each owning crate's own suite: see
# `crates/mycelium-proj/src/tests/cert_scope.rs` (clauses d/f) and
# `crates/mycelium-spore/src/tests/lib_tests.rs` (clause e). The redundant cross-crate duplication is
# removed; `tests/conformance.rs` now covers clauses a/b/c (the ones that genuinely exercise this
# crate) plus pointer comments to where d/e/f are verified.
