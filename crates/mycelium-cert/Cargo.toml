[package]
name = "mycelium-cert"
version = "0.0.0"
description = "Swap certificates + the binary<->ternary certified swap (RFC-0002 §3/§4; M-120). The unified translation-validation checker is still E2-3/E2-4."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mycelium-core = { path = "../mycelium-core" }
mycelium-interp = { path = "../mycelium-interp" }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = "1"
