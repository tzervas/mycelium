[package]
name = "mycelium-interp"
version = "0.0.0"
description = "Reference interpreter — the trusted executable semantics for the Core IR (RFC-0004; ADR-009). Skeleton; M-110."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mycelium-core = { path = "../mycelium-core" }
# The verified-numerics kernels: composing an approximate input's bound honestly (M-204; ADR-010).
mycelium-numerics = { path = "../mycelium-numerics" }
# M-862: bounded, work-stealing thread pool for the parallel-pure-fragment evaluator (`parallel.rs`).
# Crate-local (not hoisted to `[workspace.dependencies]`, DN-17 §2.1) — FLAG: worth hoisting once a
# second crate (e.g. the AOT env-machine) also depends on rayon; that's the orchestrator's call since
# the workspace manifest is shared-file territory.
rayon = "1"
