# Commitizen — Conventional Commits + 0.x.x SemVer policy (ADR-018 / ADR-038).
#
# Message lint is ON (commit-msg hook). First history-derived cut: **0.463.1** (2026-07-16).
# Basis (Empirical): chronological Conventional-Commit stack on origin/dev — each feat → +minor,
# each fix/perf → +patch; merge/wip skipped → 0.463.1. monorepo co-version until component split.
# Still source-only: publish=false (ADR-018). major_version_zero=true → BREAKING under 0.x bumps
# 0.y, never auto-1.0.0 (1.0.0 is M-703/M-738 class).
#
# Type set matches tools/github/conventions.json type_to_label keys (DRY — do not invent
# parallel types). Default cz_conventional_commits covers: feat fix docs refactor perf
# style test build ci chore revert (plus bump). Agent intermediate commits may use the
# `wip` / `WIP` prefix (allowed_prefixes — startswith match, so `wip(batch N/M): …` works).

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.463.1"
version_provider = "commitizen"
version_scheme = "semver"
tag_format = "v$version"
# ADR-018: per-crate 0.x.x until a deliberate 1.0.0 gate. Under 0.x, BREAKING → 0.(y+1).0.
major_version_zero = true
# Hand-kept Keep-a-Changelog wins (CHANGELOG.md is orchestrator-owned).
update_changelog_on_bump = false
changelog_file = "CHANGELOG.md"
annotated_tag = true
# Do not auto-push tags from tooling (ADR-018 source-only).
gpg_sign = false
# Allow agent intermediate commits and git merge machinery without failing the hook.
# Note: allowed_prefixes is startswith — any message beginning with these tokens skips the
# conventional-commits pattern check (so bare `wip stuff` also passes; that is intentional
# for agent batch commits, not a loophole to paper over).
allowed_prefixes = [
    "Merge",
    "Revert",
    "Pull request",
    "fixup!",
    "squash!",
    "amend!",
    "wip",
    "WIP",
]
# version_files: workspace root Cargo.toml [workspace.package].version + this file.
# Members use version.workspace = true (co-release until component-repo decomposition).
version_files = [
    "Cargo.toml:version",
    ".cz.toml:version",
]
