# Test fixture for the `forbidden-target-prefix` named-rule kind (M-879 rule 1 shape).
#
# `tier_order` must precede EVERY `[table]` header (including `[meta]`) to bind at the TOML root —
# once any `[table]` opens, subsequent bare keys belong to that table, not the root document.
tier_order = ["core", "std"]

[meta]
derived_from = "test fixture"
strata_guarantee = "n/a (test fixture)"
tiers_guarantee = "n/a (test fixture)"
basis_ref = "test fixture"

[strata]
mycelium-interp = 1
mycelium-core = 0
mycelium-std-runtime = 1

[tiers]
mycelium-interp = "core"
mycelium-core = "core"
mycelium-std-runtime = "std"

[[named_rules]]
id = "no-interp-std-dep"
description = "test: interp must never depend on std-*"
basis_ref = "test fixture"
kind = "forbidden-target-prefix"
source = "mycelium-interp"
forbidden_target_prefix = "mycelium-std-"
