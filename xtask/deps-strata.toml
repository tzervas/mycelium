# xtask/deps-strata.toml — the acyclic-deps stratum + tier map (M-877 / M-878 / M-879).
#
# Consumed by `cargo run -p xtask -- deps` (`xtask/src/deps/`). This is DATA, not prose: every
# violation the checker prints cites an entry here (never a hard-coded magic number/string — G2).
#
# Two independent, purpose-built views of the same 53-crate workspace dependency graph (52
# `mycelium-*` crates + `xtask` itself):
#
# `[strata]` — a FINE per-crate numeric layer, one entry per workspace crate (M-877). Guarantee:
# **Empirical** — derived once from `cargo metadata --format-version 1` at the point noted in
# `[meta]`, as the longest NORMAL-only dependency chain from a sink (leaf = 0; each crate's number
# is `1 + max(stratum(dep) for dep in its normal deps)`), computed INCLUSIVELY over the graph as it
# stood at derivation time (no edges excluded). It is a FROZEN snapshot, not re-derived on every
# run: the `deps` check loads this file and validates every *current* NORMAL edge against it
# (source stratum must be strictly greater than target stratum). Because the numbers were derived
# inclusively, this file is tautologically consistent with HEAD's normal-dep graph today (0
# violations for the base M-877 check — "normal deps are already clean"); its value going forward
# is as a REGRESSION gate — a normal edge added later that does not respect this frozen ordering
# (e.g. a new edge from a low-stratum crate up to a high-stratum one) is caught, even though the
# map itself cannot see an architecture problem that already existed at derivation time (that's
# what `[tiers]` + the M-879 named rules are for, below).
#
# `[tiers]` — a COARSE, manually-curated 3-bucket architectural layering (`core` < `std` <
# `tools`), independent of `[strata]`. Guarantee: **Declared** — an asserted judgment call about
# intended architecture (VR-5: flagged as asserted, not derived/proven). `core` = language kernel +
# runtime substrate (must stay independent of the standard library — KC-3 trusted-base boundary);
# `std` = the `mycelium-std-*` library layer, built ON TOP of `core`; `tools` = user-facing
# CLI/tooling/automation built on top of both. Used only by the M-879 `[[named_rules]]` below —
# which is exactly why it catches what the tautological `[strata]` cannot: `mycelium-mlir` (tier
# `core`) currently has a NORMAL dependency on `mycelium-std-runtime` (tier `std`) — an upward-tier
# anomaly that `[strata]` silently absorbed at derivation time (mlir's own stratum just grew to
# accommodate it), but the `no-upward-tier-edges` rule flags it, because a crate's `[tiers]` bucket
# is a fixed architectural assertion that doesn't move just because a bad edge exists. This is a
# KNOWN, EXPECTED violation at HEAD — fixed later by M-883/M-884, not by this checker.
#
# Never-silent (G2): a crate missing from either table is itself reported as a violation by the
# checker (`crate not in stratum/tier map`), not silently skipped.
#
# `tier_order` (below) is declared BEFORE `[meta]` deliberately: once any `[table]` header opens
# (even `[meta]`), subsequent bare `key = value` lines belong to THAT table, not the root document
# — so a key meant to bind at the TOML root must precede every `[table]`/`[[array]]` header.

# The declared order of `[tiers]` buckets, lowest (most-depended-upon) first. A normal or dev edge
# from a crate in an earlier tier to a crate in a later tier is "downward" (allowed); same-tier is
# allowed; an edge from a LATER tier to an EARLIER one is "upward" and is the anomaly the
# `no-upward-tier-edges` rule below reports.
tier_order = ["core", "std", "tools"]

[meta]
derived_from = "cargo metadata --format-version 1, workspace at dev@388a865, 2026-07-02"
strata_guarantee = "Empirical (point-in-time topological derivation over the NORMAL-dep graph; not re-derived live — see file header)"
tiers_guarantee = "Declared (manually-asserted architectural intent; flagged per VR-5, not derived from the graph)"
basis_ref = "DN: acyclic-deps invariant (M-885, pending authorship — orchestrator wires the final doc path)"

